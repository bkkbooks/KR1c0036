body:
  text: 詩說解頥正釋卷十一明季本撰秦朱子曰秦國名其地在禹貢雍州之域近鳥鼠山初伯益佐禹治水有功賜姓嬴氏其後中潏居西戎以保西垂六世孫大駱生成及非子非子事周孝王養馬於汧渭之間馬大蕃息孝王封為附庸而邑之秦至宣王時犬戎滅成之族宣王遂命非子曽孫秦仲為大夫誅西戎不克見殺及幽王為西戎犬戎所殺平王東遷秦仲孫襄公以兵送之王封襄公為諸侯曰能逐犬戎即有岐豐之地襄公遂有周西都畿內八百里之地至𤣥孫德公又徙於雍今按伯益與稷契同時佐舜而伯益又復相禹七年稷契皆為諸侯則伯益必亦為諸侯矣但後失其官而居西戎以保西垂亦猶周不窟失官而自竄於戎狄之間也直至周孝王時始使非子養馬於汧渭之間汧水在今鳯翔府隴州汧陽縣南一里渭水在南由廢縣南四十里今為隴州地東南汧水人渭之處即秦地也孝王時尚在畿內而命非子邑之蓋與之近地使之食力以便養馬非封為附庸之國也故宣王時始命秦仲為大夫則漸進之而秦之族自是亦浸强矣及平王東遷其後世以兵送之封為諸侯是為襄公資之以逐犬戎而遂有畿內八百里之地豈以當時周德既衰日蹙國百里而沒於西戎之地隨其所闢歟夫秦伯爵也制地七十里而與之以八百里之廣且併岐豐故都而授之非禮甚矣東遷之前秦地猶屬畿內至於德公兼併及雍而其强遂不可制得非封國過大之故邪季札歌秦而曰能夏則大此後人見其强大稱王時之言也兹非邪說乎秦即今鞏昌府秦州德公所徙之雍今鳯翔府鳯翔縣地鳥鼠山渭水所出在今臨洮府渭源縣西二十里宋時亦屬秦州車鄰經㫖曰賢者嘗遭暴虐憂死不遑晚遇時君能屈己忘勢而與之同樂故喜及見之而作此詩也舊說以為創見秦君車馬侍御之盛而誇美之於未見君子既見君子之義何所當乎有車鄰鄰有馬白顛未見君子寺人之令賦也鄰鄰衆車密比之聲白顛額有白毛今謂之的顙君子指君而言寺人守門之閽也令備使令以通命也阪有漆隰有栗興也既見君子並坐鼓瑟今者不樂逝者其耋興意阪陂陀隰下濕非髙平之地漆可飾器栗可實籩皆有用之材言阪隰之間亦有嘉木以興夷方之國亦有賢君也八十曰耋阪有桑隰有楊興也既見君子並坐鼓簧今者不樂逝者其亡興意楊栁之揚起者也桑可為弧楊可為箭亦有用之材秦近西戎其俗尚陋故賢者言未見君子之時但見其輿從出入車衆馬良而人有欲見國君者必先使閽人傳命通之似亦仍其故習而已及既見之則相與並坐鼓瑟鼓簧以為樂屈己下人略無驕傲之氣豈非時俗之僅有哉故又言今日若不享此樂則老死將及必不能逄蓋幸其得見之辭欲及時而為樂也其所感於往日之罹憂者深矣車鄰三章一章四句二章章六句駟驖經㫖曰此刺秦君之用私人恣游獵也蓋以此詩比之車攻氣象逈别故知其為刺耳駟驖孔阜六轡在手公之媚子從公于狩賦也驖黑色如鐡也阜肥大也媚愛也駟馬驖色而甚阜馬之良者也御者把握其轡以制馬之遲速使之惟手是聽見其善御也云媚子則非正人矣此言從狩者惟私人而所重在御者也奉時辰牡辰牡孔碩公曰左之舍拔則獲賦也奉者下奉上之辭時是也辰牡及時之牡獸謂翼送時所宜用之獸也如冬獻狼夏獻麋春秋獻鹿豕之類蓋君乘田車虞人乘佐車從左驅禽此即毛氏所謂虞人翼以待公之發周禮田僕掌佐車之政設驅逆之車即其事也左之者命御者左其車以射獸之左也蓋射必中左乃為中殺御禮所謂逐禽左者為是故耳拔矢括也言御者能從公意欲左則左而公舍矢則中此即御者與射者比而得禽獸之意也蓋詭遇獲禽非聼其不用命者此小人之心也遊于北園四馬既間輶車鸞鑣載獫歇驕賦也間習也謂不待指示而間習於北園之道也雖為馬言而御者之善解公意亦可見矣輶輕也輕車驅逆之車也鸞鈴也鑣馬銜外鐡置鸞於鑣也詳見蓼蕭字義獫歇驕鄭氏以為皆田犬名長喙曰獫短喙曰歇驕王雪山戴岷隱嚴華谷皆以為非别以歇其驕逸為解但短喙歇驕之釋起於爾雅必是犬名而喙之短否則未有以考其必然耳古者狩以講武主習馳射擊刺未嘗以鷹犬從禽也今載獫歇驕而特用鸞鑣之輶車重禽荒之樂真衰世之事也駟驖三章章四句小戎經㫖曰秦伐西戎飾其車甲而選卒不精至使士人逺戍久不得歸故婦人思其君子而作此詩也有刺意焉舊說以為美襄公者非也小戎俴收五楘梁輈游環脅驅隂靷鋈續文茵暢轂駕我騏馵言念君子溫其如玉在其板屋亂我心曲賦也收所以載俴之取其便也輈所以駕楘之取其堅也游環所以制驂馬使不得出也脅驅所以制驂馬使不得入也隂靷鋈續所以制驂馬使不得前也文茵所以藉馬頸也暢轂所以安車行也加茵則馬頸不易傷暢轂則車輪不易敗而後可以駕騏馵矣此皆言兵車器具之修也君子指其夫言云溫其如玉則士人德性之溫厚者而非勇力之武夫矣板屋築室而居以為久戍之計也地理志云天水隴西山多林木民以板為屋故毛氏曰西戎板屋四牡孔阜六轡在手騏駵是中騧驪是驂龍盾之合鋈以觼軜言念君子溫其在邑方何為期胡然我念之賦也合盾則車有防繫軜則轡不亂此皆言車馬服乘之用也在邑即板屋所居之地方將也俴駟孔群厹矛鋈錞蒙伐有苑虎韔鏤膺交韔二弓竹閉緄縢言念君子載寢載興厭厭良人秩秩德音賦也厭平聲後凡厭厭並同此章言甲兵裝飾之盛使其君子行役久而不歸故思念之深坐卧不寧也厭厭久也以久戍言也秩秩德音謂其德之見於言者秩然不亂而非若他人之有怨也此亦溫其如玉之意此詩極稱車馬甲兵之盛宜可以壯軍容威敵志然在西北方必多勇悍之人不能精選而士人之溫其如玉者乃不得免焉則其政事之不均師徒之無實亦可知矣安能决勝千里之外哉是以久戍戎方歸期甚逺婦人以其夫之不堪任此役也故思念及之而其夫無懟上之心其君無息兵之䇿具可見焉小戎三章章十句蒹葭經㫖曰此詩言人不可逺人以為道也蓋知學者所作也蒹葭蒼蒼白露為霜所謂伊人在水一方遡洄從之道阻且長遡游從之宛在水中央比也蒹葭詳見碩人字義白露露至秋而白也伊人猶曰此人指道之所在而言也遡向也逆流而上曰遡洄順流而下曰遡游蒹葭凄凄白露未晞所謂伊人在水之湄遡洄從之道阻且躋遡游從之宛在水中坻比也未晞秋露重而不易乾也湄水草之交也躋升也言其逆上之難也蒹葭采采白露未已所謂伊人在水之涘遡洄從之道阻且右遡游從之宛在水中沚比也未已秋露重而不易止也右舊說謂不相直而出其右今按右無不相直之義必遡洄在其所居之右故耳此詩以蒹葭白露為喻見秋為晚景日月逝而嵗不我與不可不惜也然而道有定在猶伊人之在一方也遡洄而求是逺人求道也則逺且長而難至順而求之求之於身也求之於身則即此而在我欲仁斯仁至矣宛在水中央何逺之有蒹葭三章章八句終南經㫖曰賢者因國君親來見己故作此詩以美之終南何有有條有梅君子至止錦衣狐裘顔如渥丹其君也哉賦也終南鎬京之南山在今西安府鄠縣南三十里條山楸也色白宜為車板君子指其君至止至終南之下也錦衣狐裘衣狐白裘而以素布錦衣裼之也渥丹猶簡兮所謂渥赭言其有樂意而顔色赤澤也其君者稱其可以為君也終南何有有紀有堂君子至止黻衣繡裳佩玉將將夀考不忘賦也紀山之亷角處猶柳宗元所謂奧如也堂山之寬平處猶柳宗元所謂矌如也黻蔽膝其狀如亞兩已相戾也黻繡於裳而衣無文因裳而名為黻衣耳此加於錦衣之上者也夀考不忘祝其夀考而不可忘也終南者賢者所居之地而其所有惟條梅紀堂耳不敢自以其地為生賢也國君屈己下賢而至於此則真足以為君而宜其夀考矣終南二章章六句黃鳥經㫖曰秦穆公卒以子車氏之三子為殉國人哀之為之賦黃鳥事見春秋傳文公六年交交黃鳥止于棘興也誰從穆公子車奄息維此奄息百夫之特臨其穴惴惴其栗彼蒼者天殱我良人如可贖兮人百其身興意從從葬也殱盡贖貿也交交黃鳥止于桑興也誰從穆公子車仲行維此仲行百夫之防臨其穴惴惴其栗彼蒼者天殱我良人如可贖兮人百其身興意防當也謂一人可以當百夫也交交黃鳥止于楚興也誰從穆公子車針虎維此針虎百夫之禦臨其穴惴惴其栗彼蒼者天殱我良人如可贖兮人百其身興意禦猶當也此詩以黃鳥起興正以目三良也蓋黃鳥善鳴者也當時三良於穆公必知無不言言無不盡交相往來亦如黃鳥之善鳴而交交也止于棘桑楚人所共見之地也若止於丘隅則人所不見而可以免矣此見三良雖忠而未免傷於直也然其賢則人所共惜故欲百其身以代之耳黃鳥三章章十二句三良殉葬之事實秦康公所驅也康公為世子時三良正為穆公所信用其言必有非康公所悅者如燕惠王之於樂毅也故使以忠殉穆公豈非假此以害之乎或謂穆公命從己死而三良從之蓋本左氏則又邪說也夫穆公用百里奚以霸顯名垂後乃賢君也豈肯使三良從葬而肯從葬者又兒女子小不忍之忠也三良亦豈肯為乎觀臨穴惴惴之言則為康公所迫而非三良所欲可知矣然則謂從穆公之命者乃文奸之言耳既殺其父之賢臣又欲自文而歸咎於父其為不孝孰甚焉三良之被驅豈其所得已哉若秦之有殉要亦起於殉所嬖愛之人而其人亦自以殉為盡忠也因遂習以成俗意必不及於賢臣而亦豈至如史記所謂從死者六十二人與百七十七人之多哉况穆公之賢又不可以妄議矣晨風經㫖曰此賢臣被棄而思慕之詩也鴥彼晨風鬱彼北林比也未見君子憂心欽欽如何如何忘我實多賦也疾飛貌晨風鸇也似鷂因風飛急善擊鳥雀鬱茂盛貌欽欽憂而不敢肆之意言晨風疾飛而入鬱然之北林深而可棲也此以比賢者去之速而得其可隱之地也君子指其君言山有苞櫟隰有六駁未見君子憂心靡樂如何如何忘我實多賦也櫟橡斗即皂斗也其實房生其房名梂詳見綿字義駁梓榆也𣗳皮青白如駁馬色故謂之駁櫟駁亦據歸隱之地所有者而言山有苞棣隰有樹檖未見君子憂心如醉如何如何忘我實多賦也棣常棣也爾雅以常棣為棣詳見七月字義檖赤羅也實似梨而小酢可食亦據隱居所有而言如醉則憂又甚矣此詩言速歸所隱之地而享所有之櫟駁棣檖亦無不樂但心常以不得見君子為憂耳蓋不得於君則熱中之意我未忘君而君如何忘我邪此見其惓惓之餘意也晨風三章章六句無衣經㫖曰此將帥與士卒同甘苦者所作必襄公始封為諸侯時詩也蓋當時猶以王命興師故有王于興師之言耳豈曰無衣與子同袍王于興師修我戈矛與子同仇賦也子指士卒言袍衣之有表者也以綿實之用新綿則為襺因舊絮則為緼同袍者解衣衣之之意戈鈎孑㦸也詳見下章字義矛指酋矛攻國之兵也詳見字義豈曰無衣與子同澤王于興師修我矛㦸與子偕作賦也澤與襗同袴也以其親膚有垢澤之義㦸車㦸也詳見字義豈曰無衣與子同裳王于興師修我甲兵與子偕行賦也此詩將兵者自言豈以子之無衣而與子同衣服乎蓋王將興師當備器械而與子同事則所服用不容不與同耳無衣三章章五句渭陽經㫖曰春秋僖公二十四年晉惠公卒重耳自秦歸立是為文公秦康公時為世子送之渭陽故作此詩然康公殘忍薄行人也未可以許其本心之良意必穆公知文公之賢令康公篤親親之恩而因以重禮相贈歟詩雖康公所作實以見穆公之美也穆公卒從文公敗楚勤王以成霸業其原蓋在此矣及穆公既沒康公即乘文公之喪而伐之兵爭不息其本心何在哉故渭陽之思歸美於穆公可也我送舅氏曰至渭陽何以贈之路車乘黃賦也乘去聲秦穆公夫人晉文公之姊也生康公故康公稱文公為舅爾雅曰母之昆弟曰舅乘黃路車中有黃馬四也我送舅氏悠悠我思何以贈之瓊瑰玉佩賦也悠悠我思者謂寓懷於文公者長非謂念母也瓊詳見木瓜字義瑰孔氏謂美玉之名是也毛氏以為石而次玉則不可以為瓊矣珮玉詳見有女同車字義范氏處義曰以瓊瑰為佩也渭陽二章章四句集傳所述左傳載晉文公事多失其實辨見春秋私考僖公十年晉里克弒其君卓及二十四年晉侯夷吾卒下權輿經㫖曰此刺時君不能敬賢如始不足以任重也於我乎夏屋渠渠今也每食無餘于嗟乎不承權輿賦也夏大屋具也渠渠猶勤勤言君始於我厚設禮食大具以食我其意勤勤然此古注說是也無餘者僅足食也有餘則可以備餕承當也權在衡輿在車皆能任重者不承權輿言其不足以當權輿之任也舊說以為造衡自權始造車自輿始而嘆其有始無終則是較短論長之言其德不廣矣於我乎每食四簋今也每食不飽于嗟乎不承權輿賦也四簋以盛黍稷孔氏曰公食大夫宰夫設六簋是禮食此言每食則是平嘗燕食器物不具故惟四簋今按上章言無餘則猶足食今曰不飽則食不充腹見其益薄也權輿二章章五句毛鄭以來皆以四乎字各為句蓋乎與輿協韻故也詩說解頥正釋卷十一
