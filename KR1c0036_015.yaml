body:
  text: 詩説解頥正釋卷十三明季本撰檜檜國名國語作鄶漢地理志作會髙辛氏火正祝融之墟在禹貢豫州外方之地滎陽之南溱洧之間其君妘姓武王封祝融之後於濟洛河潁之間為檜子其地與虢比鄰至平王時國滅而併虢以封於鄭今所存詩四篇皆衰世之言而亦不知果檜風否也蘇氏以為檜詩皆為鄭作如邶鄘之於衛也亦未敢必以為然焉餘詳見鄭下羔裘經旨曰此詩蓋大夫憂國者之所作非去位而有是言也羔裘逍遙狐裘以朝豈不爾思勞心忉忉賦也羔裘詳見唐羔裘字義狐裘詳見終南字義羔裘本諸侯朝服而其君服之以遊衍狐白裘本諸侯燕服而其君服之以視朝失其宜矣羔裘翺翔狐裘在堂豈不爾思我心憂傷賦也翺翔與上章逍遙意同並説見清人堂謂正寢之堂孔氏曰人君出視朝乃退適路寢以聽大夫所治之政羔裘如膏日出有曜豈不爾思中心是悼賦也膏謂潤澤如脂漬也有曜謂日照之而有光也此正言其出遊而照曜人目也觀於此言則其裘不加裼衣而見美又可知矣羔裘三章章四句素冠經旨曰賢者思見終喪之人而不可得幸得見之而作此詩也庶見素冠兮棘人欒欒兮勞心慱慱兮賦也素白也練布使白謂之練冠是既祥之冠也不能三年喪則祥而除服矣棘因棘刺而言棘刺葉少而體常露故謂居喪而骨立見者為棘人欒欒瘠貌慱慱謂心勞而圑聚於中也庶見素衣兮我心傷悲兮聊與子同歸兮賦也冠素則衣亦素矣傷悲者有感於心而興悲也蓋此作詩之人必亦能終三年之喪者但以獨行無助為衆所憎故憂思如此以其可與共學故欲與同歸也庶見素韠兮我心藴結兮聊與子如一兮賦也韠蔽膝而以皮為之也民間之所通用詳見終南字義衣素則韠亦素矣藴結思畜於中而不解也可與同歸則志同故曰如一也素冠三章章三句隰有萇楚經旨曰政繁賦重人不堪其苦而自嘆之詩也隰有萇楚猗儺其枝夭之沃沃樂子之無知賦也猗於可反儺乃可反下章同萇楚一名銚弋今羊桃也子如小麥長尺以上則引蔓草上苖弱不能為樹猗儺柔弱也隰有萇楚猗儺其華夭之沃沃樂子之無家賦也無家言無纍也隰有萇楚猗儺其實夭之沃沃樂子之無室賦也有家則有室隰下地楚賤材以比民之在下楚之猗儺以比民之柔弱沃若言其得遂生長之性而潤澤也楚以蠢然無纍故得樂生嘆人之不若也隰有萇楚三章章四句此詩小序以為疾君淫恣而思無情欲説者遂以萇楚枝柔牽蔓比人之多欲而以未有牽蔓之時生意沃然者為赤子之心至長有室家而後為所牽蔓意亦善矣但此詩三章以枝華實為次蓋自枝而華而實能遂其生之意義不在於引蔓故無取焉匪風經旨曰小國聽大國之令會盟征伐不勝其煩百姓苦之而思文武成康之澤故作是詩也匪風發兮匪車偈兮比也顧瞻周道中心怛兮賦也偈疾貌周道適周之路也言風急而車疾取以為會盟征伐疾驅而往無所停息之喻匪云者言此不足傷嘆所傷者周室衰微政教不行於天下而方伯不能撫恤其民耳怛傷也匪風飄兮匪車嘌兮比也顧瞻周道中心弔兮賦也回風謂之飄嘌漂搖不安之貌弔亦傷也誰能亨魚溉之釡􅑄誰將西歸懷之好音賦也亨音烹古字通用後凡此類並同溉滌也􅑄釡屬治民若亨小鮮故以亨魚為喻毛氏曰亨魚煩則碎治民煩則散知亨魚則知治民矣張子曰溉之釡􅑄欲治民不煩也得其意矣懷之好音謂欲以治民之道告之以見所以思周之意如此此蓋幽厲之世未東遷時詩匪風三章章四句東萊吕氏曰匪風下泉思周道之詩獨作於曹檜何也曰政出天子則強不凌弱各得其所政出諸侯則徴發之煩供億之困侵伐之暴唯小國偏受其害所以眷懷宗周為獨切也戰國時房喜謂韓王曰大國惡有天子而小國利之以此二詩驗之其理益明賈誼欲衆建諸侯而少其力雖其言略而不精亦可謂少知治體矣曹朱子曰曹國名其地在禹貢兖州陶丘之北雷夏荷澤之野周武王以封其弟振鐸今之曹州即其地也今按曹伯爵非大國也猶録其詩滕薛邾杞皆當時諸侯會盟之國與曹密邇又孔子所嘗往來之地豈無一詩可録而併其國名無之豈非詩有散逸邪蜉蝣經旨曰國君飾其衣服而無德以居之詩人以其浮華易悴如蜉蝣之朝生暮死故憂之而作此詩欲其從己而相與論道為久長之計也蜉蝣之羽興也衣裳楚楚心之憂矣於我歸處興意蜉蝣略渠也似蛣蜣身狹而長角黃黑色生糞土中朝生暮死楚楚猶言濟楚謂其羽之美也上衣下裳人君之盛服以蜉蝣為喻而起興蓋薄之矣蜉蝣之翼興也采采衣服心之憂矣於我歸息興意采采華飾也蜉蝣掘閲興也麻衣如雪心之憂矣於我歸説興意説音稅掘閲者蜉蝣土中所生掘地而出其文采即有可見也管子曰掘閲得玉蓋當時常談如此麻衣麻布為之如雪言其色白而鮮潔也鄭氏以麻衣為深衣諸侯之禮朝朝服夕深衣孔氏疏之則曰麻衣純用布而色白如雪者惟深衣為然蜉蝣三章章四句候人經旨曰曹之賢者因其君進用小人而逺君子故作此詩以諷之也彼候人兮何戈與祋彼其之子三百赤芾賦也何上聲後凡負荷之何並同候人道路送迎賔客者蓋役屬非指其官也何與荷同擔揭也戈見秦無衣祋殳也見衛伯兮各字義皆短兵赤芾詳見車攻字義當時蓋有以候人為大夫而與於三百赤芾之中者故舉以為言彼其之子即指此人非泛指三百人也然曹之赤芾者有三百人則亦見其王制隳而小人衆矣晉文公入曹數其不用僖負羈而乘軒者三百人其謂是歟維鵜在梁不濡其翼興也彼其之子不稱其服興意稱去聲後凡取能勝之義者並同鵜鶘也俗名淘河好羣飛入水食魚歐陽氏曰鵜當居泥水中以自求魚而食今乃邈然髙處魚梁之上竊人之魚以食而得不濡其翼咮如彼小人竊祿於髙位而不稱其服也維鵜在梁不濡其咮興也彼其之子不遂其媾興意咮喙遂順也媾遇謂恩遇也薈兮蔚兮南山朝隮婉兮孌兮季女斯飢比也薈蔚草木茂盛也隮雲升也南山雲氣朝升則草木之茂盛益隂晦矣此以喻小人衆多而暗昧日進也婉孌説見齊甫田季女少女也既少而美宜為人所取矣今不妄從人而不免於飢亦猶君子守道見棄而至於貧賤也故以為比候人四章章四句鳲鳩經旨曰此美其君德之足以正人也觀正是四國一語則似稱美天子之辭意曹風不宜有此耳鳲鳩在桑其子七兮興也淑人君子其儀一兮其儀一兮心如結兮興意鳲鳩秸鞠也亦名戴勝即今布榖詳見鵲巢字義飼子朝從上下暮從下上故以起興則淑人君子當以能親民而天下皆得其平者言之儀即心之裁制義之發見者大學藏身之恕是也一則其心固結而不散故曰如結鳲鳩在桑其子在梅興也淑人君子其帶伊絲其帶伊絲其辨伊騏興意帶大帶有雜色飾焉辨色如青黑之馬故以騏為名詳見淇奧字義此言正衣冠尊瞻視見其心之所存者一而威儀之不忒足以起人敬也鳲鳩在桑其子在棘興也淑人君子其儀不忒其儀不忒正是四國興意棘小棗忒差也儀不忒本上心之一者而言正四國則化及於天下矣鳲鳩在桑其子在榛興也淑人君子正是國人正是國人胡不萬年興意四國之化本於國人故復推本言之國人觀感則皆柷其壽考矣鳲鳩常在桑其子每章異木子自飛去母常不移從一以俟之則彼此不相失也鳲鳩四章章六句下泉經旨曰周室既衰王綱廢墜德澤不及於民民方愾念賴郇伯能勞之故詩人美之而作此詩也冽彼下泉浸彼苞稂興也愾我寤嘆念彼周京興意冽寒也下泉泉下流者也苞草叢生也稂童梁莠屬也愾嘆息聲周京天子所居也先王盛時民勤農業則引泉上流以灌禾黍今田野荒蕪無復有良苖者而冽泉在下惟浸苞稂蕭蓍而已下泉寒無生意而草皆病焉以比民之憔悴於虐政而因以起興也所以愾嘆而念周京者良欲其留意於恤民耳冽彼下泉浸彼苞蕭興也愾我寤嘆念彼京周興意蕭蒿屬萩蒿也京周猶周京也冽彼下泉浸彼苞蓍興也愾我寤嘆念彼京師興意蓍亦蒿屬即筮草也芃芃黍苖隂雨膏之興也四國有王郇伯勞之興意勞去聲後凡慰勞之勞並同郇雖文王之子所封而郇伯則其後也故鄭氏謂其為文王子而集傳則改為文王之後亦不知其為何時人矣郇伯為州牧治諸侯能行仁政使民得盡力於農畝故隂雨所膏者黍苖而芃芃然生意之盛以比民之得蘇息而因以起興也蓋王者之不作久矣四國所以被周之澤而有王者實由郇伯能勞來我耳舊説以郇伯為先王盛時州伯詩人追言之而傷今之不然此狃於小序曹人疾共公之説而不知其不足據也夫共公魯僖公時人也東遷之後周之人望已絶誰復有念周京之憐恤者乎故郇伯者必非文武成康時人而此詩之作其亦在幽厲之間歟當幽厲之間而得州牧如郇伯者寧非人心之所共愛慕者乎下泉四章章四句詩説解頥正釋卷十三
