body:
  text: 詩説解頥正釋卷七明季本撰鄭鄭國名本姬姓周厲王子宣王母弟桓公友之後也宣王封友於鄭是為畿內咸林之地即今陜西西安府華州城北古鄭城幽王無道友為司徒遷其民於虢檜之間死犬戎難其子武公定平王於東都亦為司徒因得其地遂國于檜都焉在濟西洛東河南潁北四水間今為河南開封府鈞州新鄭縣史記以為桓公懼王室多難將逃死洛東虢檜之君見其用事分獻十邑則桓公賢君也豈有懷二心而先謀自利邪且畿內之地非可以封諸侯者虢即左傳虢叔死焉之虢檜則與之相鄰而國皆已滅意者友之初封本以王子食采畿內而檜都之遷則因其有功而徙封也然則所取虢檜之地蓋國已先滅而以與桓公耳先王封國以其有功非以懿親鄭武公以桓公故而得封鄭亦猶伯禽以周公故而得封魯也詳見春秋私考隱公元年鄭之所載多淫風孔子所謂惡鄭聲之亂雅樂者也樂記言衛文侯聽鄭衛之音則不知倦蓋鄭衛皆淫風而鄭為尤甚故孔子尤惡之今之所列豈聖人所刪之舊哉緇衣經旨曰此國君好賢之詩其必鄭武公為諸侯時事歟舊説鄭武公父子為周司徒善於其職國人宜之故美其德則周人所作當屬王風不當為鄭風也且改衣適館授粲豈國人所得施於貴卿者邪若謂周王以此待武公則武公入相在平王時平王亦昏主豈能好賢之無已如此詩乎故好賢者鄭武公也而改衣適館授粲則言其好賢之實事也緇衣之宜兮敝豫又改為兮適子之館兮還豫授子之粲兮賦也緇黑色緇衣卿大夫朝退而居私朝之服也以布為之宜稱其服也館即其私朝所直之廬也詳見羔羊羔裘字義還謂人君親造其廬而返也粲粟治之精者謂以白米為飯也緇衣之好兮敝豫又改造兮適子之館兮還豫授子之粲兮賦也好亦謂德與服稱也緇衣之席兮敝豫又改作兮適子之館兮還豫授子之粲兮賦也席安貼之意亦謂其德之稱也緇衣三章章四句記曰好賢如緇衣蓋謂此詩也當於其情之真切處求之將仲子經旨曰舊説以仲為蔡仲而謂其不當與莊公誅叔段之謀詩人之閔叔段未知其得正與否然以詩意求之則謂武薑為母可也而武公已死安得併言父邪且曰可懷則非所以語祭仲也此蓋女子私其所私者之言耳集傳獨取夾漈鄭氏淫奔之説得之矣將仲子兮無踰我里無折我樹杞豈敢愛之畏我父母仲可懷也父母之言亦可畏也賦也折音舌下章同將請也仲子男子之字也里里居本女子以其所居言非二十五家之里也謂之踰則亦有垣矣杞柳屬樹如柳葉粗而白色理微赤蓋其家所植以備器用者也將仲子兮無踰我墻無折我樹桑豈敢愛之畏我諸兄仲可懷也諸兄之言亦可畏也賦也墻垣也即孟子所謂踰東家墻也古者樹墻下以桑將仲子兮無踰我園無折我樹檀豈敢愛之畏人之多言仲可懷也人之多言亦可畏也賦也園者里居之園也言踰則亦垣也檀皮青滑澤材強韌可為車人指一家之人言篇內言折謂踰墻而壓折之非采折之折也畏者謂畏其責詈之言非愧恥之畏也其意惟在仲之可懷苟非踰墻折木則無不可從矣此所以為淫奔也將仲子三章章八句叔于田經旨曰叔段居京多才好勇能以私恩結人其在邑出田之際里巷之私黨皆媚悅而從之故詩人敘其事而賦之以見其得衆如此其旨微矣叔于田巷無居人豈無居人不如叔也洵美且仁賦也叔莊公弟共叔段也田取禽於田恐其害稼也美以其容貌之動人而言也仁以其賜豫之惠人而言也巷非無人以其美且仁而人從之田故無居人耳叔于狩巷無飲酒豈無飲酒不如叔也洵美且好賦也狩者張羅守獸之名非以冬田為狩也詳見春秋私考桓公四年公狩于郎下好以酒飲人而其情好也巷非無飲酒者叔美而又以酒相好則巷中之飲酒者皆從之田耳叔適野巷無服馬豈無服馬不如叔也洵美且武賦也服乘也武謂武力能招致人也美而且武故巷中之服馬者皆從之田而無其人耳觀後二章之言可見段之居京惟以飲酒馳馬悅人心也叔于田三章章五句大叔于田經旨曰兩叔于田篇名無異故加大字以别之然大之為義亦因田事本有大小而起也上篇叔于田田之小者也此篇叔于田田之大者也田之小者昆蟲已出不以火田但恐獸之害稼則隨時搜索而已所用止以井邑之民非大合國人也田之大者君臣俱出合境同行蓋在農功既畢之後昆蟲既蟄之時也程子曰古者昆蟲蟄而後火田去莾翳以逐禽獸非竭山林而焚之也此言火田乃在冬月而段之火烈具舉正冬田之事也而又以所暴之虎獻于公所則莊公亦在焉豳風七月所謂二之日其同載纘武功言私其豵獻豜于公即其事也以其大衆竭作故大田謂之同則田之大者乃以國事舉也然詩人不詠莊公而詠段者以段射御足力為國人之所愛也纍言其田見段常以田狩習武而人歆羡之亂本之所在焉為段而發故皆譽段之辭然意則微婉含蓄甚深默而求之當自得於言外矣叔于田乘乘馬執轡如組兩驂如舞叔在藪火烈具舉袒裼暴虎獻于公所將叔無狃戒其傷女賦也下乘字去聲後凡車乘之乘並同上乘字為乘之之乘則平聲藪澤也鄭之藪為圃田火焚而射也烈熾盛貌袒裼袒去外衣而見裼衣也暴空手摶獸也狃習也袒裼暴虎先言其有武力絶人之技也將請也戒其無狃見國人愛之之情也叔于田乘乘黃兩服上襄兩驂鴈行叔在藪火烈具揚叔善射忌又良御忌抑磬控忌抑縱送忌賦也行音杭後凡行列之行並同揚起也忌抑皆語辭良亦善也騁馬曰磬止馬曰控舍拔曰縱覆彇曰送射正所以田也但射以御行而段兼善其事故因上章如組如舞之能而併及之叔于田乘乘鴇兩服齊首兩驂如手叔在藪火烈具阜叔馬慢忌叔發罕忌抑釋掤忌抑鬯弓忌賦也鴇當作鴇阜盛也馬行遲曰慢矢發希曰罕此詩三章皆首以乘言以射者之獲禽必以御行而段本善射又兼善御故先以御言如組如舞正言其御之善也及上襄鴈行齊首如手則皆服習之意而統於善御之中矣繼之以火烈則舉火而田方可以翼獸而射也未射之時先矜才技暴虎獻公而人皆愛之戒其無狃此其多才得衆之驗也次言其善射而有御能正見段之多才也末言田畢射止之事又以見其從容間暇衆所共安也大叔于田三章章十句清人經旨曰狄之入衛也患未迫鄭而鄭文公遣兵禦於河上久而不召棄師之道也國人惜之而作此詩小序謂文公欲逺高克而使將兵禦狄則詩辭原無惡克之意及以春秋鄭棄其師觀之則書鄭者所重在國也安得歸罪於克哉辨見春秋私考閔公二年清人在彭駟介旁旁二矛重英河上乎翺翔賦也重直龍反後凡重倍之重並同清衛地按水經注朝歌以南暨清水土地平衍悉牧野矣今淇縣界清水合淇水入衛近牧野處即其地也本在河北鄭玄誤謂清為高克所帥衆之邑而水經注亦以中牟之清陽亭當之則在河南矣彭衛邑之在河北者也介甲也駟介四馬而被甲也旁旁者旁出無常之意蓋言其行之旁午也鳥緩飛曰翺布翅而盤回曰翔言其遊衍如鳥之翺翔也清人在消駟介麃麃二矛重喬河上乎逍遙賦也消亦衛地之在河北者也麃麃本取獸疾走為義與吉日儦儦同載驅儦儦雖從立人皆行疾之意而此則以師衆疾行為戲也逍遙行樂逺遊之意清人在軸駟介陶陶左旋右抽中軍作好賦也軸亦衛邑之在河北者也陶陶樂而自適之貌左謂御者旋還車也右謂主擊刺者抽拔刃也中軍將軍在中也好謂容好也狄患先及於衛則清人宜當其衝今但南避於彭消軸近河之邑未見狄之追逐則其患尚未遽能渡河至鄭也苐遣一旅至河更畨偵伺待有警急而後大發車徒未為晚也今乃盡以其師次于河上使之翺翔逍遙遊嬉間暇而御車之在左者則習旋車主刺之在右者則習抽刃為將之居中者則為容好而已皆未嘗實有所用也此豈恤師之道哉清人三章章四句羔裘經旨曰集傳謂美大夫之辭而不知其所指者得之但辨説以為子皮子産之徒可以當此則詩意所稱乃德足潤身之士必非政事之偏長者可及耳羔裘如濡興也洵直且侯彼其之子舍命不渝興意羔裘詳見唐風羔裘字義渝變也直者心無回曲也侯者順理之意舊説訓美蓋本韓詩然以羔裘如濡推之則如濡者潤澤也與後章彥之為美者相侵不若以順訓之蓋侯有中順之義以順應如濡於義為近耳舍命不渝謂其安天命之正而不變也此言其心之能順理也羔裘豹飾興也孔武有力彼其之子邦之司直興意豹詳見韓奕字義飾緣袖也司主也直直道也主直非強有力者不能也民之具瞻故以邦言此言其守之有定力也定力本上章不渝之意羔裘晏兮興也三英粲兮彼其之子邦之彥兮興意晏鮮盛也三以三德言知仁勇是也舊説以剛克柔克正直為三德者誤言彼書文意矣英者英華之發於外也粲者光輝粲然也彥美也美在其中而暢於四肢發於事業之意此詩三章以大夫服羔裘故皆以羔裘起興洵直且侯孔武有力三英粲兮應興之言謂人之德當如是也蓋羔裘所以如濡者貴於德之洵直且侯也所以豹飾者貴於德之孔武有力也所以晏兮者貴於德之三英粲兮也皆泛以德言彼其之子則正指大夫之有此德者矣君子之德在心則居之以正理在官則主之以定力而光輝之發則為事業其言之序如此則德足以彰身而民仰之斯於羔裘為稱矣羔裘三章章四句遵大路經旨曰淫婦因所私者别去而於大路中留之之詩也或以為棄婦之迫詞則婦既棄去夫又豈肯出至大路送之而為婦所攬乎遵大路兮摻執子之袪兮無我惡兮不寁故也賦也惡烏路反後凡憎惡之惡並同摻攬也寁速言絶之速也遵大路兮摻執子之手兮無我魗兮不寁好也賦也魗醜也遵大路二章章四句女曰雞鳴經旨曰賢妻能警夫以勤樂夫以善而又輔之親賢故詩人述其言而美之也女曰雞鳴士曰昧旦子興視夜明星有爛將翺將翔弋鳬與鴈賦也昧晦旦明將旦而晦明之交也明星啓明之星先日而出者即曉星也弋繳射也鳬水鳥如鴨青色背上有文此賢婦警戒其夫以勤生也始雖述夫婦相問答之言而大意則歸重於婦耳弋言加之與子宜之宜言飲酒與子偕老琴瑟在御莫不靜好賦也加中也史記所謂以弱弓微繳加諸鳬鴈之上是也宜和其所宜內則所謂牛宜稌羊宜黍豕宜稷犬宜梁鴈宜麥魚宜苽之類此言賢妻能宜夫而相和樂也飲酒而琴瑟靜好其樂而不淫如此知子之來之雜佩以贈之知子之順之雜佩以問之知子之好之雜佩以報之賦也雜佩者以常佩之物言藍田吕氏所謂觽燧針管凡可佩者是也來謂夫所招來而新至者則贈送之順謂與夫和順而不可踈者則問遺之好謂與夫結好而來加禮者則報答之皆以雜佩不吝於解也此則欲其親賢以成德也女曰雞鳴三章章六句有女同車經旨曰舊説鄭人刺忽不昏於齊辨説既詳辨之蓋忽本無救齊有功請妻辭昏之事乃後儒之所附會愚亦詳辨於春秋私考桓公十年戰即及十一年忽奔衛矣若集傳以為淫奔之詩則篇中略無狎邪之語又似不然焉竊意此詩蓋國君始娶夫人妾媵同時俱至而一娶之中惟夫人為獨賢故詩人稱其德而美之耳有女同車顔如舜華將翺將翔佩玉瓊琚彼美孟薑洵美且都賦也同車以姪娣之從嫁者言舜木槿也樹如李其華朝生暮落取瞬之義者也將者將下車而行也翺翔者詳審周旋之貌此句已起孟薑矣美以色言孟薑指嫡夫人也都者邑人所聚之處義取於聚言其德之聚也有女同行顔如舜英將翺將翔佩玉將將彼美孟薑德音不忘賦也將將之將音鏘同行錢氏以為同以車行是也英謂華之英發也將將衆集聲德音不忘謂其賢聲久而不可忘也此詩言國君娶妻始至妾媵同車以行其色皆異於常但舜華非長久之容則不若嫡夫人之美而有德也方將翺翔而節以佩玉則行有度矣此其德聚於身而賢聲可久夫豈徒有其色者可得而同哉有女同車二章章六句山有扶蘇經旨曰此詩或據魯詩之傳以為鄭靈公棄其世臣而任狂狡大夫憂之而作夫魯詩絶傳已久不知其散見於何書但謂狂狡為鄭靈公時人則據春秋傳宣公二年大棘之戰宋狂狡賂鄭鄭獲狂狡而為説也此尚鄭穆公事明年穆公卒而靈公嗣不半載而為公子歸生所弒蓋實歸生之謀而假手於公子宋者也則歸生當國而公子宋輔之事權屬焉豈宋囚狂狡之所能與而靈公在位日淺即已被弒何遽能用狂狡哉且狂狡一小人耳其惡必不至如歸生與宋之甚大夫不責歸生與宋而區區於咎狂狡此非公論而孔子豈得録之蓋不過因小序所美非美之説而附會之耳夫謂所美非美理本可通但以為刺忽則鑿矣况以歸於靈公則尤為不可通乎今定為國君不用賢臣而刺之之詩故集傳淫女戲其所私之説亦無取焉山有扶蘇隰有荷華興也不見子都乃見狂且興意扶蘇扶胥小木也荷華芙蕖也菡蓞之已發者子都古之美男子借以為賢人之喻狂謂狂縱指小人也山有橋松隰有遊龍興也不見子充乃見狡童興意橋與南有喬木之喬同遊枝葉放縱也龍紅草也一名馬蓼葉大而色白生水澤中高丈餘子充亦古之美男子與子都同故借以為賢人之喻狡謂姦狡指小人也扶蘇木之非美者也荷華華之美者也橋松木之美者也遊龍草之非美者也山以顯位言隰以庶位言或生於山或生於隰雖地有崇卑而或美或惡卑高異陳亦未嘗盡無賢者也今舉朝之中不見一賢者而皆小人也隰併荷華而無之山併橋松而無之亦如子都子充之姣而世人不見也豈不重有傷哉山有扶蘇二章章四句蘀兮經旨曰國亂將傾諸大臣莫能任事而小臣願忠於國故作此詩然非刺忽也若集傳以為淫詞則恐未必然耳蘀兮蘀兮風其吹女興也叔兮伯兮倡豫和女興意和音賀蘀稿葉未辭柯者也叔伯指諸大臣而言吹女之女指蘀和女之女指叔伯蘀兮蘀兮風其漂女興也叔兮伯兮倡豫要女興意要平聲要要與共成國事也木稿則其蘀懼風風至而隕猶民離則其國懼亂亂至而亡故以起興言諸大臣無有任事而倡之者倡則我將和之不患於無輔也蘀兮二章章四句狡童經旨曰姦人圖事誣上行私朝堂之上不使賢臣與謀共食而賢臣憂其誤國食息不安故作是詩也蓋非刺忽亦非戲淫也彼狡童兮不與我言兮維子之故使我不能餐兮賦也狡童指姦臣而言彼狡童兮不與我食兮維子之故使我不能息兮賦也食謂朝堂共謀而食也狡童二章章四句褰裳經旨曰此淫女語其所私而謔之也舊説皆以為望大國之正已蓋亦自忽言也則褰棠之語狂童之云豈所以望大國正已之言哉子惠思我褰裳涉溱子不我思豈無他人狂童之狂也且賦也溱鄭水名指所私之男子而言子惠思我褰裳涉洧子不我思豈無他士狂童之狂也且賦也洧亦鄭水名至鄭下與溱合流而入潁士未娶者之稱他士猶他人也褰裳二章章五句丰經旨曰此淫風也女子與人私期而不得專向既而悔之則謂不拘何人而嫁之亦得免於求者之衆也子之丰兮俟我乎巷兮悔豫不送兮賦也丰豐滿也巷門外之巷也子之昌兮俟我乎堂兮悔豫不將兮賦也昌盛壯貌堂門孰之堂也詳見絲衣字義堂進乎巷矣內外有人而不得見女也衣錦褧衣裳錦褧裳叔兮伯兮駕豫與行賦也錦錦布錦而加褧庶人妻嫁時之服或叔或伯但駕車來迎即與同行不拘何人也此因上章之悔而言不拘何人嫁之亦得免於多人之求也裳錦褧裳衣錦褧衣叔兮伯兮駕豫與歸賦也歸即之子于歸之歸丰四章二章章三句二章章四句東門之墠經旨曰此女子淫奔之詩也或以唐棣之華翩其反而豈不爾思室是逺而四句當為此篇首章之脫簡而謂之王者棄賢大夫風之之詩則唐棣四句文雖相近而唐棣之與東門各為起語室逺之與室邇亦各異情不得合而為一也以為大夫風之則篇內所云思者思何人邪牽強難通當從舊説東門之墠茹藘在阪其室則邇其人甚逺賦也東門城東門也墠除地去草之名茹藘茅搜也一名茜即今蒨草可以染絳陂者曰阪男子所居在東門之外女必與之相近欲奔未遂故以其人為甚逺耳東門之栗有踐家室豈不爾思子不我即賦也栗樹之生於路上者踐行列貌女欲奔而未得望男之就已也觀有踐家室之言則女之居必與男相近矣東門之墠二章章四句風雨經旨曰亂世而得一君子如一陽復於窮隂之下憂時者之所幸見也故作此詩辨説謂此詩之詞輕佻狎䁥則未見其然也風雨凄凄雞鳴喈喈興也既見君子云胡不夷興意華谷嚴氏曰風雨凄凄然寒涼雞猶守時而鳴喈喈然其聲之和興君子雖居亂世不改變其節度我得見此人則其心豈不坦然而平夷哉風雨瀟瀟雞鳴膠膠興也既見君子云胡不瘳興意瀟瀟風雨聲膠膠鳴聲相交之意瘳病愈也風雨如晦雞鳴不已興也既見君子云胡不喜興意華谷嚴氏曰晝而如晦風雨之甚而雞晝鳴不已也風雨三章章四句子襟經旨曰此女子淫奔而思男子之詩也舊説以為刺學校之廢則末章不能不強解矣青青子襟悠悠我心縱我不往子寧不嗣音賦也青青純緣之色具父母衣純以青襟領也此淫女望男子之常通音問也青青子佩悠悠我思縱我不往子寧不來賦也青青組綬之色佩佩玉也此淫女望男子之來就也挑兮逹兮在城闕兮一日不見如三月兮賦也逹音撻挑輕儇跳躍貌逹放恣也挑逹而登城上之高闕言男子好遊而不來也一日不見如三月兮思之甚也子襟三章章四句揚之水經旨曰懦弱之夫為妻所侮故作是詩以開導其妻使知親親之情也揚之水不流束楚比也終鮮兄弟維豫與女無信人之言人實迋女賦也此以水緩不流束縛之楚比己之弱蓋妻本從夫宜為夫制如楚之束也别無兄弟而止有夫妻二人則情宜親而不可相侮之意也當時必有離間其夫於妻者故欲其無信人言也揚之水不流束薪比也終鮮兄弟維豫二人無信人之言人實不信賦也不信則非真有親愛之心者故以迋言相間也此詩詞意懇切聞之者必有所感動矣揚之水二章章六句出其東門經旨曰世方淫亂夫能自親其妻雖見淫俗之女不為所動心不失正可以為難矣出其東門有女如雲雖則如雲匪我思存縞衣綦巾聊樂我員賦也鄭之東門必淫女所聚之處也如雲者其來如雲之起以其髮美言也縞白色薄繒之不染者也綦青黑之色見小戎孔氏疏巾褁頭之巾縞衣綦巾言其妻之淡妝猶云荆叉裙布也聊粗略也員與云同語辭出其闉闍有女如荼雖則如荼匪我思且縞衣茹藘聊可與娛賦也闉曲城也闍城臺也荼華秀之名舊説以為茅秀其華輕白可愛故以比女之美茹藘可以染絳故以名其妻下裳之色娛樂也出其東門二章章六句野有蔓草經旨曰男子遇女於野田草露之間樂而賦此詩也野有蔓草零露漙兮有美一人清揚婉兮邂逅相遇適我願兮賦也蔓延也漙露多貌清揚者目清眉揚也婉宛曲之媚態也邂逅不期而會也野有蔓草零露瀼瀼有美一人婉如清揚邂逅相遇與子偕臧賦也瀼瀼亦露多貌婉如猶言婉然臧善以得所欲為善也野有蔓草二章章六句溱洧經旨曰男女淫奔相謔而詞人喜談樂道故述其事而為此詩也溱與洧方渙渙兮士與女方秉蕳兮女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其相謔贈之以勺藥賦也渙渙春水盛貌蓋氷解而水散之時也蕳蘭也其莖葉似澤蘭廣而長節節中赤高四五尺訏大也勺藥草名三月開花芳色可愛贈以勺藥男女交相贈也溱與洧瀏其清矣士與女殷其盈矣女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其將謔贈之以勺藥賦也瀏深貌殷衆也將當作相聲之誤也鄭國之俗三月上已之辰采蘭水上以祓除不祥故其男女出遊當人衆之中而為此戲謔之事其俗之無恥甚矣溱洧二章章十二句集傳曰鄭衛之樂皆為淫聲然以詩考之衛猶為男悅女之詞而鄭皆為女惑男之語衛人猶多刺譏懲創之意而鄭人幾於蕩然無復羞愧悔悟之萌是則鄭聲之淫有甚於衛矣故夫子論為邦獨以鄭聲為戒而不及衛蓋舉重而言固自有次第也詩可以觀豈不信哉詩説解頤正釋卷七
