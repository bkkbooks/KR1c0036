body:
  text: 詩說解頥正釋卷二十明季夲撰頌頌者容也公也臣子形容功德之辭有稱頌先君之德而追思者有稱頌時君之德而祝願者皆公言也亦面陳之而非私諷故與風人歌咏之體不同但周頌亦宜有臣子稱羙時君之德如魯頌泮水閟宫者必皆亡失矣詳見緫論六義及魯頌下周頌諸詩皆止一篇而無章句盖多殘闕然亦無可考矣詳見緫論章句音韻清廟經㫖曰此詩乃祭文王之樂歌舊説以為成洛邑朝諸侯而作則洛邑者即書所謂新邑也宜有文武二廟而詩中畧不及武王何邪在武王時豐鎬皆有文王廟至洛邑之成則在成王時矣恐此詩當作於武王時也自此至維清似宜合為一篇於穆清廟肅雝顯相濟濟多士秉文之德對越在天駿奔走在廟不顯不承無射於人斯賦也穆者穆然幽隠貌文王之德無形與聲不可名狀故以穆言清清静也清廟以文王之廟言也肅雝敬且和也顯相以助祭者言謂其有明顯之德即肅雝也多士通言與祭者之多也秉文之德所執者莫非文王之德也駿大也駿奔走在廟即對越在天也自其神之所交而言則曰在天自其身之所在而言則曰在廟不顯言文王之德不見其顯也而與祭者如在其上不承言文王之德不見其承也而與祭者無怠其心人自顯之人自承之此文王之德在人無斁乃其化之所被也所謂秉文之德者如此維天之命於穆不已於乎不顯文王之德之純賦也此承上章不顯不承而言文王之德之不顯也在天曰命在人曰德命與德一也不顯即穆也天之命維穆故流行不已文王之德維不顯故純一不雜穆者天命之體不顯者文德之體不已即穆之無止息處純即不顯之無間斷處知文王則知天知天則知文王故曰文王與天一也文德如此所以清廟之祭顯相之多士秉德而無斁也假以溢我我其收之駿惠我文王曽孫篤之賦也假者假借以與之之意溢鄭氏以為盈溢是也言文王之德能使人感動以開發聦明如歐陽氏所謂如水溢而旁及也我豈敢不收而受之乎駿惠者大順文王之德即所謂收也如此則衍之無窮曾孫亦篤厚之而不忘也曽孫篤之亦大順之意我自主祭者言曽孫以後王言自孫之子而下凡事先祖者皆稱曽孫此言後王當世守文王之德而不敢忘以見無斁之意維清緝熈文王之典肇禋迄用有成維周之禎賦也清即清廟之清緝熈即穆之不已非緝熈不可以為穆非穆則廟不可以為清維主祭者有維清緝熈之德則廟之穆然清静可見矣清而緝熈文王之常道也肇禋者横渠張氏以為始大祀文王也蓋禋者精意以享之義非周禮祭天之禋禮也迄至也自今始為禋祀以至於祀事有成鬼神享之周之禎祥莫大於此周禎自鬼神享祀上見之然非駿惠文王之德者不能也清廟四章二章章四句一章八句一章五句集傳清廟也維天之命也維清也分為三篇今合為一篇而分四章清廟舊説以為升歌之詩蓋樂莫重於升歌今考清廟一節但言助祭者之肅雝而尚未詳文王之德必合維天之命二節言之而後見其德之純祭文王而以升歌意必在此故文王世子言飬老也則曰登歌清廟下管象舞仲尼燕居言饗賔也則曰升歌清廟下而管象象者文王之舞陳氏澔謂維清乃象舞之樂歌是也升歌在堂上所貴人聲象管在堂下則合樂而舞矣是一詩而分兩奏也後人以其為先王之盛德故燕饗亦用之以樂賔焉若明堂位祭統謂魯禘周公升歌清廟下而管象亦以文王為所出之祖故用此詩則僭禮而非諸侯之所得為矣烈文經㫖曰此必成王時諸侯助祭於文武之廟既歸而訓戒之詩當為大雅烈文辟公錫兹祉福惠我無疆子孫保之賦也烈文以文德而成功烈者也辟公諸侯也辟公以文德而成功烈則德合於先王矣故其助祭能致神明之感格是即辟公之錫以祉福也錫如書師錫帝堯之錫故臣亦有錫君之義若惠我以無疆之福則我之子孫當世世保之而辟公之功所係豈小哉無封靡于爾邦維王其崇之念兹戎功繼序其皇之賦也無封靡所以惠我無疆也崇崇高之也戎功大功也無封靡即戎功矣言爾之在邦也無專利以自封殖又不靡汰以自奢侈則所以惠我者至矣王豈不尊崇爾邪所以然者錫福之夲在此是爾之戎功也則我子孫之繼序将世世保之而大其業我所望於辟公之惠無疆者蓋如此無競維人四方其訓之不顯維德百辟其刑之於乎前王不忘賦也無競者志夲强而不見其强也不顯者德本顯而不見其顯也先王有不强之道不顯之德而人心自服四方訓百辟刑故辟公皆無封靡爾邦也苟辟公不率則是王者德不足以表正而有愧於前王矣辟公又豈可不脩德以惠無疆之戎功而使我成民不能忘之治哉四方訓百辟刑即所謂不忘也烈文一章二章章四句一章五句集傳一章分三節今為三章天作經㫖曰集傳以此為祀大王之詩則大王肇基王迹其德業之盛尚多可稱而獨舉荒山一事何以盡大王之功烈哉况連及文王則語亦似不專為大王發者竊意此蓋祀岐山之樂歌而亦必有斷簡闕文矣天作高山大王荒之彼作矣文王康之彼徂矣岐有夷之行子孫保之賦也作者開造之意言天欲開此山以興周也荒治也大王荒之所以作也自其既荒而言則天實作之矣作矣下疑當有荒字蓋闕文耳康謂靖亂安民民歸者衆而其道得通也徂當作岨險阻之意也岐字當屬上句與韓昌黎彼岐有岨義同言岐山之高大王既荒治之而文王又康之民得通行故有平夷之道可以乆安而子孫得以世世保之皆天作此山之功也天作一章七句昊天有成命經㫖曰此詩祭成王之樂歌康王時所作辯説已詳論之矣昊天有成命二后受之成王不敢康夙夜基命宥密於緝熈單厥心肆其靖之賦也成命謂不易之定命也二后指文王武王也言天命所歸而二后受之以有天下也成王名誦武王之子也基者積累乎下以承籍乎上也宥寛大也密縝密也單盡也緝熈單心言其學也所以成宥密之德夙夜務成此德以固先王所受之命所謂不敢康也肆發語辭靖安也靖天下然後為能保天命也昊天有成命一章七句我將經㫖曰此宗祀文王於明堂以配上帝之樂歌明堂之祭蓋朝諸侯於方岳時事也以文王為方伯有功於方岳故時廵則以配帝蓋天之主宰一方者曰帝唐虞廵狩而以燔柴祭天即此禮也而配文王以嚴父則周公為之故宗祀明堂非季秋大享之謂也然此詩上下亦必有闕文矣我将我享維羊維牛維天其右之賦也按祭法云燔柴於泰壇用騂犢則明堂祭天當用特牛而有羊者周禮羊人曰積共羊牲謂積柴祭天則用羊實柴也先柴而後獻故維羊文在維牛之上將者奉羊以供柴也享者獻牛以供祀也孔氏以為祭天貴誠用犢其配之人當用太牢則天與文王異饌矣以父配帝牲牢自宜如一不得異施如召誥用牲于郊以稷配而曰牛二也况牛羊之下但曰維天其右之則首舉羊牛専為天言而不及配帝之文王矣右尚也若謂在饌之右則下言既右享之於義不通豈有文王與上帝同列而右牲之理哉儀式刑文王之典日靖四方伊嘏文王既右享之賦也儀者象其心也式者敬其事也刑者畏其法也皆所以法文王之常道也靖安也嘏錫福也言我法文王之典以安天下則無愧於文王矣我既無愧於文王則所以感格之者有素而此錫福之文王所以右享我者又豈待今日哉實既右享之矣享與饗同歆也於天曰其者望之而不敢必也於文王曰既者信之而知其必享也我其夙夜畏天之威于時保之賦也此言儀式刑之實也天與文王既皆右享我矣我其夙夜畏天之威于時保而弗失庶㡬所以儀式刑文王之典日靖四方者益至矣又不可以兾其常享我乎東萊吕氏曰於天維庶其饗之不敢加一辭焉於文王則言儀式其典日靖四方天不待賛法文王所以法天也卒章惟言畏天之威而不及文王者統於尊也畏天所以畏文王也天與文王一也我將三章二章章三句一章四句集傳一章分三節今為三章時邁經㫖曰此必武王廵狩朝㑹諸侯祭帝於方岳而諸侯頌天子之詩也觀詩中兩稱允王則為諸侯之頌辭而非天子之自道意必周公所作故祭公謀父以為周文公之頌歟此與上篇似一時之事但上下亦必有闕誤耳時邁其邦昊天其子之賦也邁廵行也邦諸侯之國也昊天其子之謂祭帝而克饗也蓋諸侯頌王之辭實右序有周薄言震之莫不震疊懐柔百神及河喬嶽允王維后賦也此明其實為天所子也實右序有周猶曰歴數在爾躬也蓋天命所右次序及之之意薄少也薄言震之謂雖以征誅得天下而實不專尚威震也疉重複也震疊震震不已也如此則以德服人而神亦格之矣百神河嶽無不懐柔非因乎震也則為天所子而信乎其為天下君矣明昭有周式序在位載戢干戈載櫜弓矢我求懿德肆于時夏允王保之賦也此言以昭明之德保天命也自天命而言則曰右序自君之政治而言則曰明昭式用也式序在位謂在位者式序之而不混蓋惟賢則立之以位也戢收櫜韜也戢干戈櫜弓矢歛武事而不用也懿德即上文明昭之德也肆陳也夏中國也求懿美之德布陳於中國也歛武事而脩文德保天命之夲也故曰允王保之時邁三章一章二句一章六句一章七句集傳一章分三節今為三章魯語叔孫穆子謂金奏肆夏樊遏渠天子所以饗元侯也韋昭注云肆夏一名樊韶夏一名遏納夏一名渠即周禮九夏之三也吕叔玉則謂肆夏時邁也樊遏執競也渠思文也韋説雖畧與吕不同然皆夲於周禮鐘師之九夏夫夏禹樂也九夏本周詩而以夏名猶齊景公作君臣相説之樂而名為徴韶角韶也詩篇今亦散亡故鄭氏曰九夏詩篇載在樂章樂崩亦從而亡是以頌不能載如此則九夏亦不知其為何詩矣今觀時邁執競思文畧無饗元侯之意則穆叔所指三夏安得必其為此三詩邪執競經㫖曰此祫祭武王成王康王神既錫嘏而加爵娱尸之樂歌也觀醉飽降福之言則非祼獻時語矣蓋祭不祈福而神之降福但可言於錫嘏之後耳然其上必有正祭三王之詩而今亦闕矣古序謂祀武王則辯説論之詳矣但不可語於時祭也以為時祭則四親當各專一廟廟各有尸而三王合一其上又不及文王未備四親之數以為時祫則亦主四親於禮有礙乃世儒附㑹之説也惟大祫則凡為君者皆得列於創業之君之廟而統於一尸此蓋昭王時以成康二王祫食於武王廟之詩也昭王以下尚未及焉故止於三王而已但不知其何故而舉此祭耳時祭不當祫祫祭止一尸詳論於廟制考義卷一執競武王無競維烈不顯成康上帝是皇自彼成康奄有四方斤斤其明賦也競者自强之意既曰執競而又曰無競維烈言武王雖執競而實不見其競以成功也不顯者闇然不見其成功之迹也武王無競故成康亦不顯乃其家學所傳之一致也皇大也使之大其業也奄有大有也斤斤其明者明察如斧斤之斷也此其不顯之顯所以能大其業而上帝是皇也周人之稱先王宜曰維此成康云自彼者非外之之辭言自彼奄有四方以來其明能斷而斤斤不息也正祭之詩必有特言以别成康之德者至此則既錫嘏而其文從畧耳鐘鼓喤喤磬筦將將降福穰穰降福簡簡威儀反反既醉既飽福禄來反賦也喤喤大也将将集也穰穰盛也簡簡者不妄施之意猶簡在之簡也反反者重複之意反而又反也言神之降福不苟必其有反反之威儀者而後福及之也既醉既飽神饗之也如此則福禄之來反復不厭矣執競二章章七句集傳一章分四節今為二章思文經㫖曰序以為后稷配天也如此則當先有祭天之文而不宜專重稷也故集傳不的言之則以之為祭后稷之詩亦可也思文后稷克配彼天立我烝民莫匪爾極貽我來牟帝命率育無此疆爾界陳常于時夏賦也思語辭文有文德也立樹立之立立我烝民莫匪爾極所謂王建其有極也蓋后稷之德克配彼天所以立極於天下也來小麥也牟與麰同大麥也詳見七月字義率徧育飬也貽來牟而率育之有恒産而有恒心是其極之所以立烝民也故無此疆彼界人人皆得復其性而常道陳於諸夏矣古人之治所重在使人歸善所以飬民使遂其生者正為此耳華谷嚴氏曰后稷播百榖獨舉來牟者以其先熟濟民之食尤切也思文一章八句周之先公有功德而當祀如公劉大王王季宜皆有樂歌而詩皆亡之所存者惟文王武王之詩畧備可以見其殘闕者多矣詩說解頥正釋卷二十六
