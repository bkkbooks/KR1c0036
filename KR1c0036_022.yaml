body:
  text: 詩說解頥正釋卷二十明季夲撰北山經㫖曰士人以大夫役使不均已勞於王事而不得以養其父母故作此詩而正言以譏切時事也夫以士子而任經營四方之事非若老成更事之有素望者則非所當使而使矣欲辭不得而無所控愬此其所以不得不正言以發其不均之情歟蓋恐或僨國事則所係尤重也三山李氏以為北山不當怨而怨夫子不刪之者所以刺幽王也則不知作者之意夲出於不得已耳陟彼北山言采其杞偕偕士子朝夕從事王事靡盬憂我父母賦也偕偕強壯率人之意士子詩人自謂蓋文上也文士非所以任膂力經營之事者故以士子為言此言役使非宜而不得免也士子本但可以養父母者而力小任重此父母所以憂歟溥天之下莫非王土率土之濵莫非王臣大夫不均我從事獨賢賦也漙徧濵涯也此言役使不均而已獨任其勞也不均言大夫者見王委政非人而不能察也賢猶勞也恊韻故言賢耳四牡彭彭王事傍傍嘉我未老鮮我方将旅力方剛經營四方賦也彭彭蘇氏以為壯盛貌是也蓋欲其行而不息故選馬之壯盛者用之傍傍傍出貌言事之沓至也嘉善鮮少将進也旅與膂同以膂力方剛之人而使之經營四方蓋難處之事也惟老成更事者為能任之非可以使士子也士子獨任此勞所以為不均也此申上章獨賢之意或燕燕居息或盡瘁事國或息偃在牀或不已于行賦也燕燕安息貌事國從事於國也不已於行謂驅馳道路也或不知呌號或慘慘劬勞或栖遲偃仰或王事鞅掌賦也不知呌號謂深居安逸而外人有呌呼亦不知也栖遲偃仰謂栖遲於家而偃仰者鞅如馬鞅之鞅掌謂以手執持拘束之意也或湛樂飲酒或慘慘畏咎或出入風議或靡事不為賦也風音諷風議謂聞風則任口舌以議論人也靡事不為雖有咎之事亦不敢辭也此上三章皆言役使不均之意其間蓋有可使之人而大夫不以為意也北山六章三章章六句三章章四句無将大軍經㫖曰士大夫有經營家事而多思以累其心者其朋友以此為小人之事非君子所當為也故作此詩以戒之勿使心昏焉蓋樊遲請學稼圃而孔子告以不如老農老圃之意無将大車祗自塵兮無思百憂祗自疧兮賦也疷音昬将扶進也大車平地任載之車駕牛者也民間禾黍薪蒸皆載以此車治家事者百憂累之故戒以無思疧昬也劉氏曰當作與􅢌同無将大車維塵冥冥無思百憂不出于熲賦也冥冥昏晦也熲與耿同小明也不出于熲謂心昬而明不能發也無将大車維塵雝兮無思百憂祇自重兮賦也雝去聲雝與壅同重重其昬也無将大車三章章四句小明經㫖曰大夫正直露才為人所忌畀之以難為之事使困於征役而不得歸故作詩以自咎而戒其僚友之不妬賢也明明上天照臨下土我征徂西至于艽野二月初吉載離寒暑心之憂矣其毒大苦念彼共人涕零如雨豈不懐歸畏此罪罟賦也艽野毛氏以為荒逺之地其地在西故曰徂西或曰即西戎也二月周正建丑之月也蓋據其在艽野念共人之日而言離與罹同遭也云再離寒暑距其初行既兩年矣毒者為人所害也共人指其僚友蓋在位而能靖共者丘氏以為隠居不仕者非也罟網也欲歸則罹罪罟所以不敢言歸而念其僚友之恭也昔我徃矣日月方除曷云其還嵗聿云莫念我獨兮我事孔庶心之憂矣憚我不暇念彼共人睠睠懐顧豈不懐歸畏此譴怒賦也憚丁佐反除除寒而入暖也以下章日月方奥例之當是卯辰月之交也此在昔初徃之時蓋追叙徃年之月也當時計度還期不出其年之嵗莫謂亥月之終也今又不得歸而至於次年之二月初吉猶在艽野故上章云載罹寒暑庶衆憚勞也事孔庶謂衆事交畀也以一身獨當故曰憚我不暇此小人困人以難為也譴責即罪罟昔我徃矣日月方奥曷云其還政事愈蹙嵗聿云莫采蕭穫菽心之憂矣自詒伊戚念彼共人興言出宿豈不懐歸畏此反覆賦也奥與燠同奥暖促急也蓋蹙夲上章孔庶言采蕭穫菽嵗莫之事謂未得歸也自詒伊戚蓋悔其露才而不能沉晦非謂不能見㡬逺去也出宿謂憂而不能安枕故出宿於外也反覆謂小人傾險無常恐有不測之禍也此前三章皆言小人不如僚友之恭而不敢言歸以取禍也嗟爾君子無恒安處靖共爾位正直是與神之聽之式榖以女賦也君子指其僚友也靖與静同與猶助也榖善也以猶與也無恒安處謂其不可以緘黙安身為常也共而曰靖則沉晦而非露才者矣正直之人是助而不忌才則神亦助之以善不求禄而禄自至也嗟爾君子無恒安息靖共爾位好是正直神之聽之介爾景福賦也好愛介助景大也此上兩章皆戒其僚友以不忌才之意小明五章三章章十二句二章章六句鼔鐘經㫖曰舊說幽王鼔鐘淮水之上為流連之樂乆而忘反聞者憂傷思古之君子而不能忘理或然也蓋周之先世惟穆王好遊天下将皆有車轍馬跡然是時徐偃王稱王與淮夷共為中國患值周中衰不能討至宣王始自將以伐之則自穆至厲諸王必無東巡至淮之理及淮夷既服徐土盡平天子始有復巡至此者幽王者宣王子也謂為幽王事豈可謂不然乎淑人君子蓋指宣王也宣王平淮之後必嘗扵此作樂以和人心而人心歡欣鼔舞思慕不忘及聞今王之鼔鐘不能不傷今思古故特舉鼔鐘而言以見宣王之餘音猶在其則不逺也鼔鐘將將淮水湯湯憂心且傷淑人君子懐允不忘賦也鼓鐘徒鼔鐘也如尚書大傳出入撞鐘之類詳見楚茨將將聲之大也故與淮水之湯湯沸騰者相應徒鼓鐘則無意於愛民非與民同樂也故憂至於傷淑人君子能以鐘起衆音而作樂以和人心者也故懐之允而不忘懐允猶允懐也鼔鐘喈喈淮水湝湝憂心且悲淑人君子其徳不囬賦也喈喈以聲言湝湝以流言皆前後相催之意徳即鼔舞人心之徳囬邪也鼔鐘伐鼛淮有三洲憂心且妯淑人君子其徳不猶賦也鼛犬鼔與臯同長尋四尺周禮鼓人所謂以鼛鼔鼔役事者也鼔鐘而又伐鼛所鼓者大鐘所伐者大鼓不過警出入興役事而已非以作樂也淮夲有三洲非謂乆於淮上而始見也妯動也謂動念也猶若也謂不如是也鼔鐘欽欽鼓瑟鼓琴笙磬同音以雅以南以籥不僭賦也此言淑人君子之作樂也古者作樂必先擊鐘說見大雅靈臺故首以鼓鐘言但曰欽欽則鼓鐘有敬謹之意非若伐鼛之肆矣鐘以宣之而堂上之琴瑟與堂下之笙磬同音其恊比琴瑟以歌者則以雅以南皆正聲也以此樂音之和而吹籥以起舞其節相應何有於僭差㦲見先王之作樂皆夲其徳之中正而足以養和也鼓鐘四章章五句楚茨經㫖曰此周王既祭宗廟而同姓燕私者作此詩以答之也頌祝之言當為周頌蓋武王時事也楚楚者茨言抽其棘自昔何為我蓺黍稷我黍與與我稷翼翼我倉既盈我庾維億以為酒食以享以祀以妥以侑以介景福賦也楚楚長盛貌茨蒺藜也抽除去之也棘刺也茨雖長盛然有刺則不得不去也與與言黍之稠密如相與也翼翼言稷之鋪開如張翼也互文以見其多耳自昔指大王言蓋遷岐自大王始言古人除治此地所以使我得種黍稷也廪藏曰倉在野而露積曰庾庾倉之無屋者十萬曰億享獻也鄭氏謂以黍稷為酒食獻之以祀先祖也妥安也尸入将坐而安之也侑勸也尸食告飽而勸之也以祭神言則曰享祀以事尸言則曰妥侑尸即所以依神也但神之所歆者氣而尸之所嗜者味欲神依尸而飲食事死如生之意也介助景大也謂神以大福助君也此章言力田致祭而獲福也濟濟蹌蹌絜爾牛羊以徃烝嘗或剥或亨或肆或將祝祭于祊祀事孔明先祖是皇神保是饗孝孫有慶報以介福萬壽無疆賦也絜音㓗祊音崩濟濟脩飭齊一之貌蹌蹌翔舉舒揚之貌牛羊者用大牢也大牢牛與羊豕為三牲但舉牛羊便文耳言群臣從君以所絜之牛羊供祭也烝嘗者四時祭名而祭之在秋冬者皆謂之烝嘗故舉此二名以緫之剥落也謂體解其肉而節落之舊說以為剥其皮非也亨飪也謂煑之使熟也肆陳也謂既亨而陳於俎也將進也謂奉特而進之如特牲少牢云佐食奉俎肉是也蓋序㓗牲之次第有此四者皆蒙濟濟蹌蹌而言以其各有所司故曰或枋在廟門内平生待賔客之處使祝祭之於送尸之後恐神之隨尸而去也明著也言神之發見昭著而祀事至此為甚明也皇大也流動充滿之意尸為先祖之神所依故稱神保先祖與神非有二也饗歆也受其祭也孝孫以主祭者言慶喜之溢也喜存於心慶發於外報答也謂神答之以助其福也此承上章言事神禮備而獲福也執㸑踖踖為爼孔碩或燔或炙君婦莫莫為豆孔庶為賔為客獻酬交錯禮儀卒度笑語卒獲神保是格報以介福萬壽攸酢賦也㸑竈也祭有饔㸑以煑肉廪㸑以炊米而此則以饔人煑肉言也踖踖斂足小歩也蓋恭敬不寧之貌俎載牲體所容比籩豆為大故曰孔碩本執㸑而言謂薦熟之俎也燔燒肉也炙炙肝也皆所以從獻詳見瓠葉字義因上文執㸑為俎而併及之肉肝肥美故取以為㸑㸑爼皆諸宰之事也君婦主婦也莫莫静敬之意豆以盛内羞庶羞則主婦之事也庶多也獻酬者賔主相獻酬而行旅酬之禮也禮儀者獻酬時之儀文也卒盡也度法度也獲得宜也當獻酬之時賔主相交錯然易亂而賔客之禮儀笑語終無所愆則其情通而得以申敬亦可以見神之娛矣故曰神保是格此承上章言合敬娛神而獲福也我孔熯矣式禮莫愆工祝致告徂賚孝孫苾芬孝祀神嗜飲食卜爾百福如㡬如式既齊既稷既匡既敕永錫爾極時萬時億賦也㡬音期熯行禮乆而筋力乾竭也蓋既饋食而至於酳尸其用禮皆無過差見其敬而不怠也善其事曰工工祝致告者祝致神意告之以嘏辭如少牢所云也徂徃賚與也苾芬馨香也如㡬者如有期也如式者如有常也皆言所錫之福如此齊讀為齋一也稷與畟同嚴也匡正也敕整也齊稷以心言匡飭以事言申上文式禮莫愆之意時是也萬億詳見豐年字義永錫爾極時萬時億申言卜爾百福如㡬如式之意錫福而曰極者以其至善為得福之夲也此章歸結於主祭者致敬不怠而神錫之福也禮儀既備鐘鼔既戒孝孫徂位工祝致告神具醉止皇尸載起鼔鐘送尸神保聿歸諸宰君婦廢徹不遲諸父兄弟備言燕私賦也禮儀既備謂九獻之後加爵旅酬之禮皆畢也戒告也至此時則擊晉鼓而大鐘應之所以告樂之備而萬舞陳於庭也徂位者祭事畢而主人徃阼階上西面之位也工祝致告致尸意於主人而告利成也具皆也孔氏以為群廟非止一人故也知其皆醉者誠敬之至如将見之蓋尸者神之所依因尸醉而知神之皆醉也群廟之神止立一尸而諸皆統之矣詳見廟制考義昭穆之制條下鼔鐘送尸者徒鼓鐘也如尚書大傳出入撞鐘之類若送尸則别有樂如周禮所謂尸出入則奏肆夏是也廢去徹收也諸宰徹去諸饌君婦則徹籩豆而已備言燕私者謂禮既備而行燕毛之禮也蓋天子之禮祭祀既畢賔客則令與明日賔尸之事然後歸俎同姓則祭日留與之燕所以尊賔客親骨肉也此章言祀禮既成而燕同姓以盡私恩也樂具入奏以綏後禄爾殽既将莫怨具慶既醉既飽小大稽首神嗜飲食使君壽考孔惠孔時維其盡之子子孫孫勿替引之賦也樂具入奏者廟制前廟以奉神後寢以藏衣冠祭於廟而燕於寢故樂皆入奏於寢也綏安也欲其安受後禄也蓋人君燕同姓所以睦族将進也殽将具慶醉飽稽首族既睦矣此則和氣感於神明而後禄之所以綏也故承前章神嗜飲食而言君之祭祀甚順甚時無所不盡是以鬼神饗之錫之以福而使君壽考此禄之受於前者也替廢也子孫不替而引長之所謂綏後禄者如此此祝頌之辭也此詩每章皆言祭祀獲福之意以見鬼神饗祀係於人君盡惠時之誠而同姓與燕私之樂者亦以此頌之而欲其綏後禄也祭之獲福豈苟然㦲此篇及下篇所言祭祀之節品物之供及禮樂之用並詳見廟制考義末篇楚茨六章章十二句舊說以此詩為述公卿有田禄者力於農事以奉其宗廟之祭然觀詩意似言王者之盛禮而禮備樂具非公卿之祭所得有者况詩為燕私而作不為祭也蓋祭不徼福詩内所言錫福皆已然之辭神既福之故可言之以是知其為燕私之詩而燕私之有頌亦答謝之辭耳若謂其為武王時詩則說見大田篇後云信南山經㫖曰此周人喜其君秋成致祭而以勤民獲福之事祝頌之亦周頌也集傳謂公卿奉祭之詩與楚茨同則辯見上篇矣信彼南山維禹甸之畇畇原隰曽孫田之我疆我理南東其畆賦也南山終南山也在鎬京之南畇畇墾治均平之意曽重也曽孫非特主祭者得稱曲禮外事曰曽孫某侯武王禱名山大川曰有道曽孫周王發是也曽孫自曽祖後三代以至無窮皆得稱之然此蓋指武王也自大王遷岐至武王為曽孫夲大王而言也田之即疆理按緜之詩大王遷岐之初已疆理矣而以此為武王者蓋大王之所疆理者殷人七十畆之助武王既有天下則復開拓覈定之而為百畆之徹也此章言畿内徹法之田皆曽孫之所疆理而民得以享地利也畆壟也長樂劉氏曰其遂東入于溝則具畆南矣其遂南入于溝則其畆東矣上天同雲雨雪雰雰益之以霡霂既優既渥既霑既足生我百榖賦也同雲雲一色也將雪之候如此冬有雪而後春夏有雨故以雨雪起之雰雰雪亂貌霡霂小雨貌優多渥浹霑潤足盈也皆饒洽之意蓋雪多則斂陽密而足以固根夲雨小則入土深而足以滋發生言曽孫感召天時之和以生百榖養民也疆埸翼翼黍稷彧彧曽孫之穡以為酒食畀我尸賔壽考萬年賦也埸畔也翼翼整齊不亂貌彧彧域限分明貌言疆理既定而黍稷之成如其畆域則無不收之田矣曽孫之穡以公田所入言也畀與也尸賔者祭時有獻尸獻賔之事也蓋曽孫以其所收之黍稷為酒食以獻尸賔也此章言曽孫秋成祭饗而獲福也中田有廬疆場有𤓰是剥是菹獻之皇祖曽孫壽考受天之祜賦也𤓰在田中新熟進之於君而剥之為菹以獻於皇祖所以薦時物也菹酢菜也此承上章言田中所收之黍稷既為酒食矣而田畔所種之𤓰乃野人所獻之時物曽孫亦以獻於皇祖不敢遺田之所入其致敬如此所以能獲福也祭以清酒從以騂牡享于祖考執其鸞刀以啓其毛取其血膋賦也祭灌地以降神也清酒鬱鬯之酒以其清㓗而名也從從而迎牲也騂牡赤色之牛尚未殺也享獻也享祖考承騂牡而言事在殺後先言之以從文便蓋殺牛取膋方將焫蕭以求神尚未享也天子宗廟用大牢之祭獨言牛而不及羊豕者正以取膋為重耳執謂殺者所執主人但視之而已不必親殺也鸞鈴也刀環有鈴則割應聲而中節也啓毛者將以毛從血以别於所殺之牲也取血者將薦血以歆神也膋膓間脂取膋以升臭即記所謂焫蕭合羶薌也求神所重在此而薦血歆神亦未獻而求神也此章言求神之事祭酒求神於隂也薦血亦求神於隂也燔膋求神於陽也先求神而後可以享矣是烝是享苾苾芬芬祀事孔明先祖是皇報以介福萬壽無疆賦也烝享方言享祖考也報以介福謂報之以助其福使享無疆之萬夀也此章言曽孫祭祀致敬而獲福也信南山六章章六句甫田經㫖曰此因王者省耕以致豐年而農人頌美之詩也必亦頌武王者矣倬彼甫田嵗取十千我取其陳食我農人自古有年今適南畆或耘或耔黍稷薿薿攸介攸止烝我髦士賦也倬大貌甫田大田也千與阡同十阡指公田百畆言每十畆千歩為阡故百畆為十阡也詳見臣工篇之噫嘻章我者農人自我也陳公田所入之舊榖也古之省耕者察民之不足而補助之是以其陳食農人也而我取之自古如此所以人得盡力而有年也自古有年由大王遷岐以後言今適南畆以省耕者言也耘除草也耔壅夲也薿薿茂盛貌有多而相礙之意見農人之耘耔而黍稷盛茂亦有有年之望也介助止息烝進也髦士民間之俊士也言既有所補助而止息其地以進髦士而勞之使歸告父兄欲其勤於力田也此章緫言曽孫省耕而補助作興之事也以我齊明與我犧羊以社以方我田既臧農夫之慶琴瑟擊鼔以御田祖以祈丼雨以介我稷黍以榖我士女賦也齊明明粢也犧純全之羊也蓋飬之以供祭者故曰犧社夲春祈方夲秋報今則天子省耕而合祭於一處即大田所謂來方禋祀也孔氏曰郊特牲云社稷大牢則四方之神亦大牢此獨言羊以㑹句竊意大夫無故不殺牛大夫與庶民成群立社亦宜養羊以為犧而因天子之至則即以其所飬之羊供祭據犧羊為義故不及大牢耳粢盛牢醴皆當地丘乘所供故農人自稱曰我既盡臧善御迎也田祖亦與社方合為一祭一方之社方本非尊神作樂以迎田祖而主之介助也榖養以五榖養民也田盡臧以為農夫之慶甘雨助稷黍以資士女之養皆夲上文社方田祖之祭言一事而互其文也可以見曽孫為民祈福之意矣田祖方社之祭互見豐年曽孫來止以其婦子饁彼南畆田畯至喜攘其左右嘗其㫖否禾易長畆終善且有曽孫不怒農夫克敏賦也曽孫來止正謂省耕也田畯至喜喜農家婦子之勤饟足以慰曽孫之意也攘其左右謂攘却其左右之從人親為嘗其饁之㫖否言其與民親也民盡力於田故其禾易治竟畆如一而能終善且有也與民相親則不待有所督責而民勤於耕矣不怒申上文攘其左右嘗其㫖否之意農夫克敏申上文禾易長畆終善且有之意此章言曽孫省耕親民而農自勸也曽孫之稼如茨如梁曽孫之庾如坻如京乃求于斯倉乃求萬斯箱黍稷稻粱農夫之慶報以介福萬壽無疆賦也曽孫之稼以天子公田之入言也在田未刈曰稼已刈未入倉而露之曰庾茨屋蓋言其比密也梁橋梁言其穹窿也坻水中之髙地也京髙丘也爾雅以京為廪而曰方謂之京非此如京之義矣箱車箱也黍稷稻梁詳見七月字義承上章言農夫既敏則曽孫公田所入之稼積於庾者多矣即所謂終善且有也於是求千倉以貯之萬車以載之而黍稷稻粱無所不有見其稼之皆善也曽孫獲豐年之福如此此農夫之所以慶也前章言農夫之慶曽孫期望其民之辭也此章言農夫之慶農夫喜慰其君之辭也君以福望其民而民以福歸於君非曽孫有愛民之誠而何以致此福乎故又願天為民報之以助其福蓋既有豐年之福矣而又益之以萬壽則其福無窮是所以助也民愛其君故頌禱之如此集傳以為歸美於下則失之矣君之於民豈有稱萬壽者哉甫田四章章十句大田經㫖曰此周人喜其君省斂報賽而頌羙之蓋亦武王時之頌也大田多稼既種既戒既備乃事以我覃耜俶載南畆播厥百榖既庭且碩曽孫是若賦也大田盡所省之地而言多稼則據今日禾之已成者而言也種擇其種戒飭其具也備謂備此二事也此本其未耕之初而言覃利載事也此本其已耕之時而言播布處直碩大也此則言其在田而未刈者即上文所謂多稼也若順也此章言曾孫惟以多稼為善而民以力農為能順也既方既皁既堅既好不稂不莠去其螟螣及其蟊賊無害我田穉田祖有神秉畀炎火賦也方皁而至於堅好則禾已成稼而可刈矣以稂莠除故也然此人力之能為者也惟螟螣蟲賊四蟲之害則非人力所能為皆頼田祖之神秉執此蟲付之炎火盡燒絶之使無遺種此即去之之意也穉以禾中之㓜穉者言尤蟲之所欲食也此蓋已稼時之言非始望於田祖也後世如姚崇捕蝗掘坑而以火焚之蓋必古法而亦有頼於田祖耳此言榖之生成無害惟神是相而實歸於君徳之所感通也有渰萋萋興雨祁祁雨我公田遂及我私彼有不穫穉此有不斂穧彼有遺秉此有滯穗伊寡婦之利賦也渰雲興貌萋萋盛貌祁祁徐也雲欲盛盛則多雨雨欲徐徐則入上公田詳見讀禮疑圖卷一穉小也謂禾内之熟遲而未可刈者穧束也謂禾已刈而束縳之所不及者秉把也謂禾以東而輦載之所不及者滯漏也謂禾穗已刈折亂而併穫之所不逮者此章言雨澤得宜而公私皆有餘利亦君徳之所致也曽孫來止以其婦子饁彼南畆田晙至喜來方禋祀以其騂黒與其黍稷以享以祀以介景福賦也曽孫來止正言省斂也禋精意以享之名來方之方以天子所至之地言謂畿内之一方非四方之方也禋祀則以田租主方社而合祭之蓋一時省斂祭不暇分也騂黒毛氏以為騂牛黒羊豕是也此章言曽孫省斂為民賽禱而民祝之受福也大義與甫田社方田祖之祭同但彼以省耕言此以省斂言耳大田四章二章章八句二章章九句按楚茨信南山甫田大田四篇或疑其為豳雅朱子以其辭與七月相類亦有㫁無可疑之說然考之詩辭似皆為天子事且豳之時殷世也其牲宜稱白牡而謂之騂牡乃周天子之禮而曽孫之云必因大王肇迹岐周而言四詩以類相從有如一體此豈可以為豳風哉但皆似周頌而誤入於小雅耳若豳雅則固亡之矣瞻彼洛矣經㫖曰此宣王因車攻之狩㑹諸侯講武事而諸侯作此詩以美之見其為保國家之計也事與車攻同瞻彼洛矣維水泱泱君子至止福禄如茨韎韐有奭以作六師賦也洛水出陜西洛南縣冡嶺山東流至河南府是為洛陽即東都㑹諸侯之處也泱泱深廣貌君子指天子韎赤色茅蒐所染也韐鞸也合韋為之鞸與韎韋之裳同色是戎服也詳見六月及車攻字義作起也六師天子之六軍也天子親至東都戎服而起六師見其有征討之事也瞻彼洛矣維水泱泱君子至止鞞琫有珌君子萬年保其家室賦也鞞容刀之鞞今刀鞘也琫刀鞘之上飾珌其下飾也毛氏曰天子玉琫而珧珌諸侯璗琫而璆珌按此亦戎服也天子以天下為家京師為室故曰家室瞻彼洛矣維水泱泱君子至止福禄既同君子萬年保其家邦賦也人心所歸即是福禄之同瞻彼洛矣三章章六句裳裳者華經㫖曰此天子美賢者之詩非美來朝之諸侯也宜為大雅裳裳者華其葉湑兮興也我覯之子我心寫兮我心寫兮是以有譽處兮興意裳裳泛言華也謂華如裳之下垂以喻人有謙抑之徳也湑霑潤貌以喻君有恩澤之及也故遂以興天子虗心下賢而賢者得安處於譽也裳裳者華芸其黄矣興也我覯之子維其有章矣維其有章矣是以有慶矣興意芸黄盛貌黄正色言其有中正之徳也美在其中而光輝發外故曰有章此言其文章外見所以有譽處之慶也裳裳者華或黄或白興也我覯之子乘其四駱乘其四駱六轡沃若興意白者質素之意或黄而又轉為白歛華歸樸之喻也駱白馬黒鬛亦取此義沃若謂其轡之采順易使欲去亦不難也此言其徳之顯而能晦也舊說以裳裳為常棣則或黄或白之言不可通矣左之左之君子宜之右之右之君子有之維其有之是以似之賦也左逆行也不用之義右順行也見用之義左之而不宜者不能藏也右之而不有者不能行也有中之所有也似符合也惟其有之於中是以似之於外謂其表裏稱也此承上章言君子行臧之具在我所以為全徳也裳裳者華四章章六句詩說解頥正釋卷二十
