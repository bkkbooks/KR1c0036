body:
  text: 詩説解頥正釋卷四明季本撰鄘説見邶風柏舟經旨曰舊説衛世子共伯蚤死其妻共薑守義父母欲奪而嫁之共薑作此詩以自誓也竊意父母即共伯之父母也共伯為衛世子共薑齊女其父母豈有越他國奪嫁之理哉蓋父母者舅姑之通稱也共伯者釐侯之子釐侯既葬而共伯始死則欲奪嫁共薑者共伯之母也其父且不與焉以為薑氏之父母可乎史記又謂衛武公攻殺共伯則尤誕説也東萊吕氏辨之詳矣泛彼柏舟在彼中河興也髧彼兩髦實維我儀之死矢靡他母也天只不諒人只興意中河中於河也齊地西以河為境而衛居河之西故以河言柏舟堅實而在中河以比志節之堅而夫死無所著也髧髮垂貌髦小兒剪髮也謂以所剪髮作為偽髻垂兩眉之上也蓋兒生三月剪髮夾囟曰兩髦女則為三髻曰羈與男不同長大猶用為飾不敢忘孝思也內則云子事父母拂髦是也親死然後去之故兩髦以男言蓋指共伯是時共伯父死母猶存則髦猶未去也儀以夫為法也母以姑言泛彼柏舟在彼河側興也髧彼兩髦實維我特之死矢靡慝母也天只不諒人只興意柏舟在河側則有畔崖蓋以禮義為依也特獨也謂心之所從獨在夫也慝邪也柏舟二章章七句牆有茨經旨曰舊説公子頑通乎君母言之而醜故詩人作此詩以刺之君母即宣薑也或以為鄘人諷三叔之謗周公則三叔流言顯然衆所共知有何不可道之醜哉牆有茨不可掃也興也中冓之言不可道也所可道也言之醜也興意茨蒺藜也蔓生細葉子有三角刺人掃掃除也中冓材木交構在堂之中言其隱奧也中冓之言但謂閨門之事非指其相淫之私語也道言也醜惡也言茨掃之則牆必頺猶傷君心但為君者亦當默有所處不可以牆之不頺而藏惡於其中也牆有茨不可襄也興也中冓之言不可詳也所可詳也言之長也興意襄除謂駕而出之也長者難竟之意語長則勞託此以見其實不欲言也牆有茨不可束也興也中冓之言不可讀也所可讀也言之辱也興意束束而去之也讀誦言也辱汚口舌也詩人咏嘆其事雖若甚惡而亦不欲言其可惡之實猶有隱惡之意存焉牆有茨三章章六句龜山楊氏曰公子頑通乎君母閨中之言至不可讀其汙甚矣自古淫亂之君自以為密於閨門之中世無得而知者故自肆而不反聖人所以著之於經使後世為惡者知雖閨中之言亦無隱而不彰也其為訓戒深矣君子偕老經旨曰舊説刺衛夫人淫亂失事君子之道故陳人君之德服飾之盛宜與君子偕老也蓋指公子頑與宣薑相通事然朱子疑之謂此詩所以作亦未可考今觀詩辭或但為夫人之德不足以相君子而發未必為淫亂也朱子未盡之意宜更求之君子偕老副笄六珈委委他他如山如河象服是宜子之不淑云如之何賦也他與蛇同音移君子指夫言偕老言誓與同老無他志也副祭服之首飾即女冠服之所以祭宗廟也笄簮也所以卷髮在副謂之衡笄以玉加笄故謂之珈而以垂於副之兩旁當耳處其下以紞懸瑱紞織如縧而上屬於笄者也笄本婦人之常飾惟副之珈則后夫人有之卿大夫以下妻所無也珈之以六則夫人之制也此言夫人與諸侯共承國祀之重故以祭服言委他解見羔羊如山言其性之安重也如河言其度之𢎞廣也安重則不輕佻𢎞廣則不褊狹然後可以為委他山河衛國之疆域故特舉以明同主山川之意而夫人當似之也象服如舜典豫欲觀古人之象象翟形而綴於服即下章所謂翟也象服從副以祭者也謂夫人之德委他而如山河乃於象服為宜耳子指夫人與三章子之清揚之子同云如之何謂不足以配君子而承宗廟之祀也玼兮玼兮其之翟也鬒髮如雲不屑髢也玉之瑱也象之揥也揚且之皙也胡然而天也胡然而帝也賦也玼鮮潤貌翟雉羽也刻繒為翟雉之形而彩畫之以綴祭服者即象服也鬒黑也如雲稠密也今亦謂之雲鬟髢與鬄同髲髢也髲髢者剪髮之名人少髮則剪他髮益已髮而合綰為髻也髮美則不用他髮而自善故曰不屑髢也瑱塞耳也以玉為之詳見著字義象象骨也揥如今篦子以象骨為之用之摘髮而因插髮以為飾也摘音剔揚眉上廣也且語辭皙白也承上章象服而言翟之玼者乃其外飾也而鬒髮如雲則其本質自然之美也然亦但以玉為瑱以象為揥而已其實容色之美無待於外飾故又繼之曰揚且之皙以見其美不但在髮也胡然者問之之辭帝者天所主宰之名言天與帝胡為而生此人也蓋欲其君子之親愛相與宜室家而共承祭祀耳瑳兮瑳兮其之展也蒙彼皺絺是紲袢也子之清揚揚且之顔也展如之人兮邦之媛也賦也瑳玉色整潔貌展衣色白乃夫人以禮見君及見賔客之服蒙覆也葛之精者曰絺其精尤細靡者曰皺皆當暑之服也玉藻疏曰夏則中衣之上不用裘而加葛葛上加朝服展衣即朝服也見內司服疏紲袢束縛意以展衣蒙皺絺而為之紲袢所以自斂飭也清目清秀也揚眉揚開也顔額角豐滿也言夫人服展衣蒙皺絺而以禮拘束故不見其自然之態度耳若其清揚之顔本非外飾可加也展不拘束而但順此人清揚態度之自然則邦中之女美孰過焉爾雅云美女為媛以其為夫人在一國女人之上故曰邦之媛也見其色雖擅國中之美而德則有愧於為夫人也辭雖不露而其意宛然在言表矣君子偕老三章一章七句一章九句一章八句華谷嚴氏曰此詩惟述夫人服飾之盛容貌之尊不及淫亂之事但中間有子之不淑一言而譏刺之意盡見碩人惟述莊薑之美不言莊公不見答但中間有大夫夙退二語猗嗟惟述魯莊之美不言不能防間其母但中間有展我甥兮一語三詩體同但中間冷下一二語而首尾不露其意也桑中經旨曰衛俗淫奔雖巨室之妻亦比比與人期會而迎送之不以為恥其後所私之男子託采物以至其地而追思之故作此詩也觀所分三地則知其非初至時所能遍厯而又有薑弋庸三姓則亦非一時所能盡私至於三姓皆貴族而字皆言孟則必其為巨室之妻也若妾則多言叔仲矣爰采唐矣沫之鄉矣云誰之思美孟薑矣期我乎桑中要我乎上宫送我乎淇之上矣賦也要音腰後凡要約要截之要並同唐兔絲也詳見頍辨字義沫衛邑即書妹邦紂所都朝歌也薑齊之姓也桑中采桑之處也宫猶室也合院曰宫桑在下濕之地而宫在其上故曰上宫爰采麥矣沫之北矣云誰之思美孟弋矣期我乎桑中要我乎上宫送我乎淇之上矣賦也麥榖名秋種夏熟者弋與姒通杞女夏后氏之姓也爰采葑矣沫之東矣云誰之思美孟庸矣期我乎桑中要我乎上宫送我乎淇之上矣賦也葑説見邶谷風庸亦貴族之姓也衛之男子至於沫而思其所私巨室之妻言所以思者以其當采桑之時期於桑中而要於上宫以相私又送於淇上有不忍之意焉厯數三人而見其風俗之淫奔彼此不以為醜也桑中三章章七句桑中即所謂桑間濮上也蓋濮水之上地有桑而以為桑間耳桑中本衛詩而樂記乃曰鄭衛之音亂世之音也桑間濮上之音亡國之音也特别桑間於衛者則以桑中之詩淫亂尤甚必至於亡國耳然此亦秦火以後儒者見此詩序於定之方中之前而又誤以定之方中為衛文公徙居楚邱事因而附益其説歟按東萊吕氏謂詩皆雅樂此桑中非桑間濮上之音朱子辨之曰桑中小序政散民流而不可止與樂記合則是詩之為桑間又不為無所據者今必曰三百篇皆雅而鄭風不為鄭邶鄘衛之風不為衛桑中不為桑間亡國之音則其篇帙混亂邪正錯揉非復孔子之舊矣鶉之奔奔經旨曰舊説刺宣薑也亦為公子頑故朱子則釋此詩所以作亦未可考以今論之公子頑之蒸宣薑不可謂無但計其事當在宣公既卒之後宣公卒而惠公立甫厯四年而公子泄公子職挾公子黔牟以逐惠公又八年而始得復當其初中冓之言猶未大著兄弟之間自宜為親者諱而顯然指斥其人略無忠厚之意不足以為訓也至泄職逐君之際黔牟者惠公之庶兄而公子頑之母弟也亦既從亂矣誰復知倫理為重而真心公所惡乎若浮浪之作不足以感動人者亦何取焉且人之無良本指一人而分屬兄君義亦牽強也意其必為宣公新臺之事而發耳奪伋之妻而又使其兄弟乘舟以出此則惡大迹彰不可復掩而宣公羣弟之中有能恥其無良而憤然興刺則其惡惡之公出於真心而聞之者足以興矣聖人之刪定豈苟然哉其序當在二子乘舟之前云鶉之奔奔鵲之強強興也人之無良我以為兄興意鶉䳺屬奔奔鬪也鶉喜鬪惡亂其匹也強強剛也鵲性剛不淫其匹也以興宣公之奪子婦亂匹孰甚焉此則鶉鵲之不如也作詩者必宣公之庶弟故稱為兄鵲之強強鶉之奔奔興也人之無良我以為君興意君亦指宣公鶉之奔奔二章章四句定之方中經旨曰舊説以為美衛文公也衛為狄滅文公徙居楚丘營立宫室百姓悅之而作此詩其説非也蓋楚丘魯地築宫以為勞勸農桑之所也必魯先君之賢者所為非伯禽不足以語此也而謂衛文公能之乎詳辨見春秋私考僖公二年城楚丘及三十一年衛遷帝丘下然則此詩當為魯風而篡入於此耳定之方中作于楚宫揆之以日作于楚室樹之榛栗椅桐梓漆爰伐琴瑟賦也定丁佞反定營室星此星昏中建亥之月也農功既畢而營作可興矣楚宫楚邱之宫魯襄公薨於楚宫即此宫也其名為楚不知何義豈其地本多楚木而因以名邱歟左氏以襄公適楚之故而作楚宫則誕説耳揆度也樹八尺之臬度日出入之影以定東西又參日中之影以正南北也室宫內之室楚室猶楚宫互文以協韻耳榛栗二木以供籩實椅桐梓三木以備材漆以飾之皆為琴瑟之用蘇氏所謂種木者求用於十年之後不求近功者是也此章言農隙興工為勞勸農桑之所而種木畜材因以備禮樂之用非妄用民力也升彼虛矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終焉允臧賦也虛墟地髙而可望者故曰升望謂相視之也曰望楚則為楚水之地可知矣堂指其前寬廣可容之處而言猶堪輿家所謂堂局也景與影同測日影也即上章揆日之事京髙邱也此章本其作宫之始而言既升高相度之然後可因山邱測日影以定室之方位而又降下觀桑以細察其土宜則人謀合矣於是稽之於卜神亦告吉至其終也信如卜稽所言而果獲善應之吉謂神謀合於人謀非以私意役民也靈雨既零命彼倌人星言夙駕説于桑田匪直也人秉心塞淵騋牝三千賦也雨及時而應如有神然故曰靈雨倌人主駕者也星見星也見星而駕則雨止矣桑田者時農桑之務作而往勞勸之故兼言桑田之野也觀於此言可以見楚宫之作為勞勸農桑之所矣諸侯千乘則馬當四千匹問國君之富數馬以對至於千駟亦云多矣此則七尺之騋牝而能育者已有三千牡不在列也則其富不止於千駟而已蓋非塞淵之德不能致馬之蕃息如此蓋即伯禽思無疆思馬斯臧之意然凡有德者或能善身未必能及於馬政也故又言此人不但有德以善其身而已又能見於行事之實而其所以訓百官馭群牧者細微曲盡故能致馬蕃息如此也觀馬之蕃息則民富可知矣此即終焉允臧之意國人所以悅而美之也夫秉心塞淵之德豈人所易能哉自左氏有文公大布之衣大帛之冠務材訓農通商惠工敬教勤學元年革車三十乘季年乃三百乘之説而後儒遂真信文公為賢殊不知文公之薄德備載於春秋可考也而盛稱以罔後世吁可嘆哉定之方中三章章七句蝃蝀經旨曰舊説以為刺淫奔之詩是也衛之女子在母家嘗與人私及既嫁而猶與所私者通焉故詩人惡之而作此詩也蝃蝀在東莫之敢指比也女子有行逺父母兄弟賦也蝃蝀虹也在東暮虹也日映雲而虹見則雨止矣東陽方陽勝隂之義也指者指而向之也暮虹見而莫敢指以比其夫在前雖暮亦不敢向也今女子既嫁逺其父母兄弟而去則非昔者可與私之時矣朝隮于西崇朝其雨比也女子有行逺兄弟父母賦也隮升雲也與候人南山朝隮義同崇終也從旦至食時為終朝俗以西方早雲為雨之候言雲氣升於西方苟無虹以止之則必有終朝之雨以比淫女不畏其夫而外慕雖朝亦遂私情蓋上章以蝃蝀目淫女之夫此章以朝隮目淫女也乃如之人也懷昏姻也大無信也不知命也賦也乃如之人指淫奔者而言懷昏姻謂懷思其夫而相親愛此昏姻之常天命之正也既嫁而猶慕所私不顧其夫則非貞信以懷所當懷之昏姻失天命之正矣蝃蝀三章章四句相鼠經旨曰此詩刺在位者竊祿欺人本無實德而外又慆淫不檢盡喪威儀至於傷化敗俗不可以為人可疾之甚也相鼠有皮興也人而無儀人而無儀不死何為興意相去聲後凡相視之相並同相視也皮者鼠之所以庇也儀儀文也無儀則不以禮庇矣相鼠有齒興也人而無止人而無止不死何俟興意齒者鼠之所以食也止容止也無止則不以禮食矣相鼠有體興也人而無禮人而無禮胡不遄死興意體肢體鼠之所以行也禮禮度也無禮則不以禮行矣鼠之為物竊食穿墉欺人不見如在位者竊祿營私閉藏邪穢故以起興言人既貪汚苟祿負其本心而外之不檢又失其所以為用曽鼠之不若矣甚惡之之辭也鼠以皮齒體取義不必以禮鼠之拱立者言鼠也相鼠三章章四句東萊吕氏曰相鼠之惡無禮何其如是之甚也蓋溺於淫亂之俗不如是不足以自拔也疾惡不深則遷善不力干旄經旨曰衛之下邑有賢者居於其郊而邑大大好善乘其車馬建其旌旄親往迎之而見之者作此詩也舊説以為衛文公臣子好善賢者樂告以善道則似文公德化所及者其不知文公甚矣蓋文公非賢君也孑孑干旄在浚之郊素絲紕之良馬四之彼姝者子何以畀之賦也孑孑特立貌干旄以旄注於旗竿之首而建於車後旄以旄牛尾為之如今之幢也浚衛下邑有邑大夫治此邑外謂之郊紕織組也蓋以素絲織組而維其旄也四之一車四馬也姝美也子指所見之賢者言畀之謂告以善道也孑孑干旟在浚之都素絲組之良馬五之彼姝者子何以豫之賦也豫音與後凡取與義者並同鳥隼曰旟旟在旌旄之下乃大夫之旗也都民所聚也以次序言之則當為郊內近城之地組紕所織成者也亦以維之賢者至都則漸近恐四馬之力或有疲乏故又備一良馬以待敝則併前四馬而為五矣孑孑干旌在浚之城素絲祝之良馬六之彼姝者子何以告之賦也告音谷析羽為旌用翟羽之半而注於旄上也大夫得用之故曰大夫以旌城都城也祝與屬同著也維之而與干相屬也至城則益近又備一良馬以待之則并前五馬而為六矣蓋賢者同乘欲車之安故所至即益馬以為備也干旄三章章六句載馳經旨曰衛懿公時狄入衛懿公死而戴公代之東徙渡河野處漕邑戴公者宣薑之子而許穆夫人之兄也夫人以諸侯無救之者閔其將亡而思歸唁之其欲為衛圖存之情切矣特為大夫所阻不得遂焉故作是詩也舊説本於左傳大略得之矣載馳載驅歸唁衛侯驅馬悠悠言至于漕大夫跋涉我心則憂賦也走馬謂之馳䇿馬謂之驅弔失國曰唁衛侯者戴公也歸唁之者閔其將亡而欲見之以圖存也悠悠逺也草行曰跋水行曰涉蓋許大夫以衛既國破君亡在漕野處夫人非所宜歸歸亦無能為助故跋涉來追以阻其行而夫人則以不能歸唁為憂焉此原其心之不得遂也既不我嘉不能旋反視爾不臧我思不逺既不我嘉不能旋濟視爾不臧我思不閟賦也不我嘉者許大夫不以為善也旋反謂還衛也爾指許大夫不臧謂爾之所言亦未為善也不逺者近人情也濟渡也謂渡自許適漕之水也不閟謂通世故也蓋我之所思於人情為近於世故為通但爾不以我為善是爾之不近人情不通世故也故我視爾亦不得為善耳此明其心之本善也陟彼阿丘言采其虻女子善懷亦各有行許人尤之衆稚且狂賦也偏高曰阿丘虻貝母也可療鬱結之疾言許人阻我之歸使我成鬱結之疾故欲陟阿丘而取虻以療之也善懷者能憂思也行道尤過狂率意妄為也言女子之能思豈可以為常性然哉蓋事情迫切有不得不然者則亦各有道焉而不可執童稚之見率意以為過也蓋許人本意但欲使大夫往唁無恤患分災之志故以為稚狂而切責之謂其不能知己之心也我行其野芃芃其麥控于大邦誰因誰極大夫君子無我有尤百爾所思不如我所之賦也芃芃盛貌麥方盛長未收刈也蓋夏正三四月之交也控持而告之也因依也極窮也謂盡力以來救也君子賢者之稱即大夫也百爾所思惟欲代夫人往唁也狄之入衛自閔公二年十二月始至麥盛之時將四閲月矣而控於大國如齊桓公但與宋曹救邢而未嘗至衛此衛之所以無因極也如此可坐視其亡乎故欲親自歸衛謀於戴公使之竭力事大國以求其必救耳所謂我所之者意蓋如此惜乎諸大夫之無逺志而其君之不能立也使非齊桓公救邢却狄而衛文公終復其國則許穆夫人之憂鬱雖有虻可得而療乎許穆夫人之思在於憂宗國覆亡非為念親之私情也婦人之見如此豈不賢哉世之丈夫多有所不及者矣載馳四章二章章六句二章章八句此篇分章與毛鄭不同朱子蓋據蘇氏之説也今從之詩説解頥正釋卷四
