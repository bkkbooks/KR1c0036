body:
  text: 詩説解頥正釋卷二十八明季本撰閔豫小子經旨曰成王免喪始見於武王之廟而作此詩閔豫小子遭家不造嬛嬛在疚於乎皇考永世克孝念兹皇祖陟降庭止維豫小子夙夜敬止於乎皇王繼序思不忘賦也閔成王自憂也小子成王自稱也遭家不造謂不為造物所成而遭大喪也嬛與煢同煢煢然孤獨在哀疚之中則無所依怙也皇考指武王嘆其能以繼述為心雖文王已沒而不忘故曰永世克孝也皇祖謂文王言武王之於文王思念之切常若見其升降之在庭此申永世克孝之意夙夜敬止蓋亦欲如武王之念文王者而不敢忽也皇王舊説指文王武王而錢氏則以為武王是也序緒也繼之而思不忘此即所謂夙夜敬止也蓋此詩夲為見武王而思繼之辭閔豫小子一章十一句集傳一章分三節今為一章訪落經旨曰成王既免喪復辟因作此詩以道延訪群臣之意觀其自稱曰朕則非陳於宗廟之言蓋大雅也訪豫落止率時昭考於乎悠哉朕未有艾將豫就之繼猶判渙維豫小子未堪家多難賦也訪訪問也落始也既免喪而更新有落之義蓋訪始治天下之道而皆以為當率昭考武王也此述已然之辭也然武王之道悠逺難及故嘆其悠哉艾爾雅以為歷也禮五十曰艾服官政時成王尚幼沖未嘗歷事故曰未艾將進就成也判渙與道不合一也家謂國家多難指管蔡以殷畔之事也言我未有所歷賴羣臣進而就之欲繼昭考之道而猶泮渙不相合况小子煢煢一身當家多難豈能堪哉以明必資於群臣之匡輔也紹庭上下陟降厥家休矣皇考以保明其身賦也紹謂武王之繼文王也陟則在上降則在下此即上篇皇考念皇祖之陟降庭止也言文王陟降於庭之上下者皆國家之事惟武王能紹之而其美足以保明其身也人心歸之則其身安之矣此言己德不及武王之能永世克孝也敬之敬之天維顯思命不易哉無曰高高在上陟降厥士日監在兹賦也士與事同謂所為之事也天常降監於我之所為即是日監如所謂昊天曰明及爾出王昊天曰旦及爾遊衍者也此成王自言天命之當敬也維豫小子不聰敬止日就月將學有緝熙于光明佛時仔肩示我顯德行賦也佛音弼上章言不可不敬蓋已知率昭考之要矣但工夫不能無判渙故曰不聰敬止日就月將即緝熙不己之功也佛弼通輔也仔小子之稱以幼沖言肩任也言幼沖之肩不克任重致逺也所以欲求群臣匡輔之力而助我任道不至於半途而廢也爾群臣尚當閔豫不聰而示我以明顯之德行使我得以日就月將可也言此以終訪落之意豫其懲而毖後患莫豫蜂自求辛螫肇允彼桃蟲拚飛維鳥未堪家多難豫又集于蓼賦也懲有所創而戒之也毖慎螫毒也螫則必辛故曰辛螫莫豫蜂言無有人使蜂以螫我者乃我自取其螫耳以喻己自惑於管蔡之流言以致禍也肇始允信也桃蟲即鷦鷯拚與翻同鷦鷯小鳥僅巢一枝然既鳥族則能拚飛無所不至如陸農師所謂鷦鷯化為雕者亦拚飛之能變也以喻管蔡雖小才亦能為亂而今始信其然耳多難謂管蔡之亂也蓼毒草詳見良耜字義以喻武王之喪也言己方幼沖不堪國之多難而又適當大喪之苦故曰又集于蓼也此以流言疑周公之事自懲見己德之不及武王而欲群臣之助也或曰此章當在訪落之後敬之之前文義始順懲字上下必有小字故舊名小毖訪落五章二章章八句二章章六句一章四句集傳以訪落敬之小毖為三篇今合為一篇而分五章安成劉氏曰朱子以此詩作於成王免喪之際則武王崩後之三年也按書曰周公位冢宰正百工群叔流言則是武王方崩流言即起成王不能無疑時周公方巡行在外而天有雷風之變於是王迎公歸及公居東二年罪人既得明年成王免喪朝廟而此四詩繼作故此篇深懲管蔡之事也載芟經旨曰此農功成而閔勞農人之詩序以為秋冬報非也新安胡氏曰此詩不見有祈報之意非告神之樂歌也得之矣詩夲豳雅當屬於豳風云蓋公劉始至豳時事也載芟載柞其耕澤澤千耦其耘徂隰徂畛賦也芟除其草也柞除其木也新除地上之草木蓋始開荒之田也秋官柞氏掌攻草木即其職也草木既去則其土潤澤而可以耕未謂其已耕也千耦耕阡之偶詳見臣工之噫嘻章耘當與信南山畇畇原隰之畇同隰下濕為田之處也畛田畔也言千耦之田既墾而均平可耕於是始出田而往隰畛也諸家解耘字率牽強今皆不從此序其出耕之始事也侯主侯伯侯亞侯旅侯疆侯以有嗿其饁思媚其婦有依其士有略其耜俶載南畝賦也主家長也伯長子也亞仲叔也旅衆子弟也疆有餘力而來助者也以傭力之人隨主人所左右者也嗿衆飲食聲思語辭媚愛依就皆相親之意士指其夫略利也利則入土昜不甚費力故曰略也言主伯亞旅疆以皆出而治田而婦則饋餉男則共食夫婦相親同勤農事皆利其耜而始有事於南畝也此則言其已耕矣一家親愛同力一心農夫之所以有年者蓋夲於此播厥百榖實函斯活驛驛其逹有厭其傑厭厭其苗綿綿其麃賦也函含活生也驛驛聮絡也逹出土也厭受氣足也傑先長者也綿綿詳密也麃耘也承上章言既耕而播種則其實含氣而生矣既生則苗驛驛然而出土矣其受氣足者桀然先長及受氣皆足則厭厭然無不長矣但苗間之草亦或隨苗生長反為苗害故必耘之詳密綿綿然不至傷苖乃為善也種播而活苗長而耘皆飬苗之功此以上備言耕耘之事以見農夫之勞也載穫濟濟有實其積萬億及秭為酒為醴蒸畀祖妣以洽百禮賦也濟濟人衆而齊也實與實函斯活之實同謂榖實也積者榖之積也萬億及秭積之多也為酒醴蒸祖妣周於祀先也百禮祭祀之百禮也詳見豐年有飶其香邦家之光有椒其馨胡考之寧賦也飶本取苾草之香椒本取椒實之香遂借以言酒醴芬香之氣也以之燕饗賔客則賔客慶而邦家光矣以之供飬耆老則耆老怡而胡考寧矣此與上章言以酒醴供祭祀燕飲皆賴農夫所穫之多也匪且有且匪今斯今振古如兹賦也且聊且也今今日也匪且匪今言非且於今日偶一為之也振古者振起於古昔也謂自后稷始教稼穡以來即用黍稷為酒醴以供祭祀燕飲之用此其立蒸民之極者也不然則賔客之禮皆將廢矣農夫之功豈可不念哉載芟六章三章章四句二章章六句一章八句集傳一章分九節今為六章此詩與良耜文義相同但一事不應有二詩故先儒或以此為豳頌以芟柞之語觀之則似公劉始荒豳地之言也至其終篇説俱無礙但以君勞民之辭非頌體也似當為豳雅耳周禮籥章所謂祈年于田祖則吹豳雅以樂田畯者其即此詩歟良耜經旨曰此時主至省斂之方因年豐報賽而閔勞農人之詩也以天子勞農蓋大雅也畟畟良耜俶載南畝播厥百榖實函斯活賦也畟畟耜之嚴利也故曰良耜此言其既耕而播種也或來瞻女載筐及筥其餉伊黍賦也瞻省視也謂婦子饋餉於農夫也筐筥皆餉具所餉維黍無珍味也此言農家饋餉之勤也其笠伊糾其鎛斯趙以薅荼蓼荼蓼朽止黍稷茂止賦也糾結於頷下使不動也笠所以禦暑雨詳見都人士字義鎛鋤藝田之器詳見臣工字義趙刺也薅去也荼陸之穢蓼水之穢孔氏以為田有原有隰故並舉水陸穢草是也乘暑雨藝田以去荼蓼荼蓼朽而後黍稷始茂見農夫治田之勤苦也穫之挃挃積之栗栗其崇如墉其比如櫛以開百室百室盈止婦子寧止賦也挃挃穫聲栗栗堅貌墉城櫛篦也此以在野言也百室猶言百家謂同鄉之人也開百室所以藏於家也百室並開則家家皆熟矣舊説百室以四閭之族言有室礙處詳見讀禮疑圖卷三此言收穫多而婦子始安也殺時犉牡有救其角以似以續續古之人賦也犉者牛之一色者也與無羊九十其犉之犉同殺犉牡者用大牢以報先農方社之神也周人尚赤牲當用騂即大田所謂來方禋祀而以騂黑之義也救曲貌救其角者毛氏所謂社稷之牛角尺也似續者即嗣嵗以續祭祀之禮古之人謂后稷后稷肇杞乃其所以教民稼穡之意也今得嗣而不廢其禮謂非農夫力田之功可乎此見農之當勞也良耜五章二章章四句一章三句一章五句一章七句集傳一章分八節今為五章此詩與載芟語意相同故先儒或疑其為豳頌但一事二詩似乎煩瑣意必後王刪舉前篇要義以為此詩非開荒時語故不及芟柞耳且殺牛以祭先農方社則天子之禮也按禮天子祭社稷用太牢諸侯則少牢而已牛非豳公所宜用故此當為王者之詩而不可以列於豳也絲衣經旨曰此祭統所謂尸飲九而君以散爵獻士之樂歌也獻酢也然則卿大夫士凡與祭天子之廟者皆有酢焉而詩惟及士其上必有闕文矣絲衣其紑載辨俅俅自堂徂基自羊徂牛鼐鼎及鼒兕觥其觩旨酒思柔不吳不敖胡考之休賦也絲衣祭服也紑潔貌載戴也辨爵辨士祭於王之服也俅俅恭順貌堂階上之堂也基則門孰之基蓋自堂而至門外之地也羊牛者大牢三牲之二也鼎烹飪之器鼐大鼎鼒小鼎也鼎有冪則覆鼎之巾也按特牲禮宿賔之明夕主人揖賔入位于堂室人升自西階視壺濯及豆籩降東北面告濯具賔出主人出宗人視牲告充饔正作豕宗人舉獸尾告備舉鼎冪告潔此祭前日夕之事也視壺濯在堂上視牲視鼎在門外時牲尚未殺鼎尚未入但從君省視而以具充備潔告於君耳特牲所言乃士禮若天子之祭則省牲視滌濯乃少宗伯之事而士則奔走以聽使令者序此以見其有事於宗廟之勞也兕觥蓋觶散之屬所謂散爵也思語辭吳譁敖慢也旨酒思柔戒其無失德也不吳不敖則柔也如此則獲夀考之福矣絲衣一章九句酌經旨曰此亦大武之詩當屬耆定爾功之下於鑠王師遵飬時晦時純熙矣是用大介我龍受之蹻蹻王之造載用有嗣實維爾公允師賦也龍當作寵鑠如金之鑠言耀動也遵飬時晦時當晦而遵飬之非有心於得天下也純熙但言修德使緝熙也介助也大助者蘇氏所謂天下無不助之也集傳以介訓甲則非矣我自後人作頌者言寵受謂受人心之歸也蹻與矯同武貌王之造謂武王創造基業後人寵受繼嗣不絶故曰載用有嗣爾指武王師衆也謂我之所以繼嗣不絶者皆爾武王合天下之公能信於衆故耳見其伐商非私也酌一章八句此詩於酌無關蓋附會之言也集傳以為十三舞勺之勺則恐非感發童子之要義焉竊意舞勺之詩或當是泂酌耳桓經旨曰左氏以此為大武之六章也前數章言武王順人心此言武王合天命也綏萬邦屢豐年天命匪解桓桓武王保有厥士于以四方克定厥家於昭于天皇以間之賦也綏萬邦言克商以安天下也順天命故屢致豐年此天命於周所以久而不厭也士謂天下之衆也于猶言於是也以四方克定厥家者謂因四方之心以定國也皇大也間代也言其保民之德昭于天以大代乎商非以力也桓桓武王以下是言所以綏萬邦屢豐年之故桓一章九句賚經旨曰左氏以此為大武之三章其意亦在於以德安民也文王既勤止我應受之敷時繹思我徂維求定時周之命於繹思賦也修德安民自朝至於日中昃不遑暇食此文王之勤而我後人之所當受也受則欲有以承之而尋繹其緒於心以敷布於天下自兹以往維求所以安定人心此則武王創業以貽子孫使之繼述之意也故曰時周之命如此則武王本非以力爭天下而欲後人求之於文王之德也故再言於繹思以歎之詩中不及武王但言時周之命而其意可見矣賚一章六句詩亦全無賚意般經旨曰此詩當在賚之後其大武之四章歟於皇時周陟其高山嶞山喬嶽允猶翕河敷天之下裒時之對時周之命賦也高山泛言山也嶞則其狹而長者嶽則其最高而尊者猶與由同翕河大河合衆水而為一也嶞山喬嶽夲陟高山而言陟高山由翕河皆指武王伐紂所過之名山大川蓋自豐歷華至孟津而渡河也敷者布天下以伐商之事也裒時之對謂合天下仰望之心而答之也時周之命因上章之言而申明之見周之伐商夲順人心也般一章七句般之名亦無意詩説解頤正釋卷二十八
