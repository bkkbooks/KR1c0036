body:
  text: 詩説解頥正釋卷八明季本撰齊齊國名本少昊時爽鳩氏所居之地在禹貢為青州之域周武王以封太公望東至於海西至於河南至於穆陵北至於無棣太公薑姓名尚本四嶽之裔四嶽封於吕故尚稱吕尚佐武王號師尚父定天下封於營丘為齊侯其故城在今青州府昌樂縣東五十里傳六君至獻公而徙治臨災今青州府臨災縣北古齊城是也齊風多雜魯詩可以見魯之宜有風矣雞鳴經旨曰此賢妃警戒其君以蚤起視朝之詩也雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲賦也蒼蠅羽蟲即小雅青蠅蒼蠅之聲未嘗先於雞鳴天將曙而蒼蠅始有聲耳此賢妃疑其已遲之辭也東方明矣朝既昌矣匪東方則明月出之光賦也昌盛也東方將明則蒼蠅已有聲矣然猶未大明也故月光尚顯而曰月出之光古者羣臣之朝别色始入此賢妃幸其尚蚤之辭也蟲飛薨薨甘與子同夢會且歸矣無庶豫子憎賦也蟲飛薨薨則蒼蠅聲亦在其中可知會且歸者蘇氏謂羣臣之會於朝者亦欲退朝而歸治其家事得其意矣集傳以為俟君不出將散而歸則恐無此禮耳無乃以我之故而併以子為憎此賢妃欲其蚤起之辭也雞鳴三章章四句還經旨曰獵者相遇因人譽已而稱其賢蓋少年意氣相得而相悅之辭亦不美之俗非可以為訓者也子之還兮遭我乎峱之間兮並驅從兩肩兮揖我謂我儇兮賦也還便捷貌以技習言峱山名在齊郊並驅者相遭峱間而與我同逐兩肩也肩與􅜏同獸之大而有力者豕三嵗之説有難通處今不從焉儇巧慧也子之茂兮遭我乎峱之道兮並驅從兩牡兮揖我謂我好兮賦也茂以貌美言牡雄健之獸亦以其有力也子之昌兮遭我乎峱之陽兮並驅從兩狼兮揖我謂我臧兮賦也昌以體大言狼猛健之獸亦以其有力也三章言獸皆以有力者矜其能也還三章章四句著經旨曰舊説刺不親迎也今按諸侯無越境親迎之禮止是出至界上説見春秋私考隱公二年紀裂繻逆女下則婦至而俟著俟庭俟堂亦禮之常耳又何刺焉婦始至未及合卺而即以三俟議其夫此何心哉竊意此蓋賢者刺時君接不以禮也俟我於著乎而充耳以素乎而尚之以瓊華乎而賦也我賢者自我也著與寧同孫炎曰門內屏外人君視朝所寧立處也此賢者始至而其君出至於此以俟之也尚加也加瑱於紞也俟我於庭乎而充耳以青乎而尚之以瓊瑩乎而賦也此賢者既入而其君俟之於堂下大庭之內也俟我於堂乎而充耳以黃乎而尚之以瓊英乎而賦也此賢者升階而其君俟之於堂上也此詩素青黃皆言紞也瓊華瓊瑩瓊英皆言瑱玉之美光彩瑩然也人君之於賢者初俟於寧繼俟於庭又俟於堂亦可謂致敬矣但三變其紞之色與瑱之玉以耀其服采之華則其好賢止於文飾之間而其心未必誠於求善道也故歷言充耳之異色異玉而微示譏焉言充耳則衣服可知矣著三章章三句東方之日經旨曰此女子淫奔之事而男子賦之也東方之日兮彼姝者子在我室兮在我室兮履我即兮賦也東方之日言初晨也室在寢內謂初入之時也即就也東方之月兮彼姝者子在我闥兮在我闥兮履我發兮賦也東方之月言初昏也闥在門內謂將出之時也發行也日始出而女已在室月始出而女乃在門則來就者終一日而始發行此見女之淫奔也東方之日二章章五句東方未明經旨曰舊説此詩刺其君興居無節號令不時觀詩意不如此而以此説經甚害義也古之為善者皆雞鳴而起而夙興夜寐以事一人乃臣道之當然也如此則東方未明而顛倒衣裳已疑於遲矣况可以為興居無節乎周公夜以繼日坐以待旦又安可以自公之召為太蚤邪竊意此詩必賢臣欲勤力事君而不敢荒寧者之所作也東方未明顚倒衣裳顚之倒之自公召之賦也東方未明顚倒衣裳自驚其遲起也衣裳方顚倒之而自公召者已來安可不夙興乎東方未晞顚倒裳衣倒之顚之自公令之賦也晞明始升而微照也令命令猶召也折柳樊圃狂夫瞿瞿比也不能晨夜不夙則莫賦也莫音暮後凡晚暮之莫並同柳楊之下垂者樊與藩同籬也圃菜園也圃樊之則為園瞿瞿心懼而左右相顧之貌柳性柔脆折之以樊其圃此事之易辦者也而狂夫以勇敢之志為之猶瞿瞿然恐其後時而難集况於國事所係之重而可荒寧乎晨夜者當夜而即以為晨也不晨夜則為不夙不夙則必至於晚而行之不逮矣甚言不可不蚤起也東方未明三章章四句南山經旨曰此詩魯人所作刺文薑恣意如齊而不知恥也何以知其作於魯人乎以詩稱齊子則知之矣桓公如齊不返魯人絶不為親故春秋於莊公元年夫人如齊原魯人本心而去其薑氏今稱為齊子使若宋女然正此意爾舊説以為刺齊襄公也則此詩語意似不為齊或又以為刺桓公則此詩作於桓公既沒之後亦有不通焉者蓋桓公四年始娶文薑以庇紀故與齊絶無往來凡十四年而始與文薑同往終桓公之身文薑僅一如齊公又在焉其時襄公未宜有懷私之心而桓公亦安得有縱淫之事及桓公既沒文薑乃始恣行安可謂桓公為縱乎雖襄公後有鳥獸之行不為無罪然詩人本為魯而發所重則在文薑耳然則此詩豈非魯風而誤入於齊者邪南山崔崔雄狐綏綏興也魯道有蕩齊子由歸既曰歸止曷又懷止興意南山齊南山也崔崔猶崔嵬言高也綏綏安舒相待之意蓋狐妖媚之獸故以喻齊人待文薑之來也文薑之與齊人淫者不知幾人不可專以為襄公也蕩平曠也歸嫁而歸魯也懷謂文薑思齊也葛屨五兩冠緌雙止興也魯道有蕩齊子庸止既曰庸止曷又從止興意屨舄類復下曰舄禪下曰屨下謂底也夏葛屨冬皮屨舄從朝祭正服屨則次之蓋常用者也故以屨言周禮屨人注有纁屨黃屨白屨黑屨散屨之五等每屨皆二隻故言五兩兩亦雙也緌垂也謂冠纓之下垂者纓惟一等故單言雙蓋謂屨下冠上貴賤雖殊而各自為匹不過於多也庸謂用此道以歸魯也從謂既嫁從夫夫死從子而今乃從齊也藝麻如之何衡從其𤱔興也取妻如之何必告父母既曰告止曷又鞠止興意衡音橫從音蹤取音娶後凡此類並同藝樹也鞠窮也婦人以紡績為事故以藝麻起興而言當藝麻時可以在畝中縱橫而娶妻則必以正禮請父母之命故既嫁不可妄行也桓公娶妻時父母已沒而此云告父母者告廟亦事死如生之禮如楚子圍所謂告於莊共之廟而來也鞠謂窮其所往是為妄行矣析薪如之何匪斧不克興也取妻如之何匪媒不得既曰得止曷又極止興意婦人以執㸑為事故以析薪起興而言析薪時可以用斧裁斷而娶妻則必以正禮聽媒妁之言故既嫁不可專斷也得得相合也極謂從其意之所極亦專斷之意也南山四章章六句甫田經旨曰此詩欲人循序漸進而不躐等逺求也集傳得之矣無田甫田維莠驕驕無思逺人勞心忉忉比也無田之田佃也謂耕治也甫田之田謂大田也甫大也莠害苖之草也驕驕人力不能芟治而致其驕縱也忉忉憂思貌無田甫田維莠桀桀無思逺人勞心怛怛比也桀桀亦人力不能芟治而致其桀傲也怛怛慘切貌婉兮孌兮總角丱兮未幾見兮突而辨兮比也婉孌少好貌蓋委曲順從之意丱兩角貌未幾不多時也突忽然高出之貌辨者冠之大號加冠則成人矣甫田三章章四句盧令經旨曰此稱美獵者之詩亦淫俗也大意與還同盧令令其人美且仁賦也令平聲盧田犬也令令犬頷下環聲仁如叔于田洵美且仁之仁盧重環其人美且鬈賦也重環大環貫一小環所謂子母環也鬈與拳同鄭氏以為勇壯也則與仁字意合盧重鋂其人美且偲賦也鋂一大環貫二小環也毛氏曰偲才也盧令三章章二句敝笱經旨曰此刺魯莊公不能防間文薑亦魯風也舊説魯桓微弱不能防間則桓公時文薑尚未肆集傳得之矣敝笱在梁其魚魴鰥比也齊子歸止其從如雲賦也敝壞也笱説見邶谷風鰥毛氏以為大魚蓋本孔叢子然此詩以配魴鱮且入笱中者必非大魚也敝笱在梁其魚魴鱮比也齊子歸止其從如雨賦也鱮似魴亦謂之鰱敝笱在梁其魚唯唯比也齊子歸止其從如水賦也唯音委唯唯出入不禁之貌此詩三章皆以敝笱比魯莊公也夫死從子莊公當知所自立矣齊子反歸於齊而從者如雲如雨如水言其衆多而勢不可遏也雲雨水皆有隂氣感通之意蓋以况從行者之有淫心也敝笱三章章四句趙伯循曰或曰子可以制母乎曰夫死從子通乎其下况國君乎君者人神之主風化之本也不能正家如正國何若莊公者哀痛以思父誠敬以事母威刑以馭下車馬僕從莫不俟命夫人徒往乎夫人之往也則公哀敬之不至威命之不行耳載驅經旨曰小序云齊人刺襄公無禮義盛其車服疾驅於通道大都與文薑淫播其惡於萬民焉據序説則上二句言襄公下二句言文薑一章四句之中分作二人辭意斷續華谷嚴氏辨之謂四句並言文薑文意方貫今以詩辭考之皆優遊行樂之意未見其疾驅也蓋魯人刺文薑之言故舉魯地要亦魯風耳集傳以為齊人所作似亦不然載驅薄薄簟茀朱鞹魯道有蕩齊子發夕賦也驅以䇿馬言也薄薄猶言略略不急之意也簞編竹為方文席也茀詳見碩人字義朱漆以朱也鞹獸皮以皮鞔車之前後也夫人之車當用翟茀而以簟但以革鞔漆之而不用他飾取其固而可久也發夕謂行而遇夕即宿於其舍不急於計程也四驪濟濟垂轡濔濔魯道有蕩齊子豈弟賦也濟子禮反豈開改反後凡此類並同驪馬黑色也濟濟齊一貌凡言濟濟皆整齊相濟之意以此言馬則非馳驟者矣濔濔謂入於水中而為其所蕩漾見轡之緩而非有如組之勢矣豈弟樂易也蓋溫言煦人之意汶水湯湯行人彭彭魯道有蕩齊子翺翔賦也彭必亡反汶水源出濟南府泰安州萊蕪縣西南流經本州徂來山之陽與小汶河合又西南流至兖州府寧陽汶上縣界在齊南魯北自魯至齊之道湯湯沸騰之貌彭彭多貌翺翔者緩舉盤旋之貌汶水滔滔行人儦儦魯道有蕩齊子遊敖賦也滔滔下流貌儦儦衆貌上章言翺翔此章言遊敖正見其優遊行樂也載驅四章章四句猗嗟經旨曰魯莊公容儀伎藝之美人罕及之但不能防間其母使與舅氏私焉故齊人敘其美而稱之無一貶辭但曰展我甥兮而其重齊輕魯之意隱然見於言外可謂婉而盡矣猗嗟昌兮頎而長兮抑若揚兮美目揚兮巧趨蹌兮射則臧兮賦也猗嗟嘆辭抑若揚言其長之不能抑也美目之揚目在廣眉之上也詩中凡言揚者皆以額廣為義故毛氏於此亦曰眉揚集傳獨以為目動則於他言揚者有不合矣頎長目揚即是昌意此言其容貌之美也趨疾走也蹌鳥舞貌巧趨如鳥之舞此言其禮度之習也射則臧言其技藝之精也猗嗟名兮美目清兮儀既成兮終日射侯不出正兮展我甥兮賦也射音食後凡以人射之言者並同正音征美目之清乃其所以得名者此言其容貌之美也儀既成終事而無所違言其禮度之習也終日盡一日也盡日張侯以射蓋自試其藝非禮射也若禮射則三而止謂三畨射訖即止豈待終日哉正者侯之中射之的也射不失正言其伎藝之精也姊妹之子曰甥展我甥者言其以甥之親而在齊能為齊重也猗嗟孌兮清揚婉兮舞則選兮射則貫兮四矢反兮以禦亂兮賦也清揚婉乃其所以為孌者此言其容貌之美也舞象舞靺舞之類選異於衆也此言其禮度之習也貫中而貫革不但中的而已四矢者每射必發四矢即孟子所謂乘矢也反復也中皆得其故處有力故也貫革之射故足以禦亂此言其伎藝之精也猗嗟三章章六句詩説解頥正釋卷八
