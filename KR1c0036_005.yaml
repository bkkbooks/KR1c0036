body:
  text: 詩説解頥正釋卷三明季本撰邶鄭氏詩譜曰邶鄘衛者商紂畿內之地其封域在禹貢冀州大行之東北逾衡漳東及兖州桑土之野周武王伐紂以其京師封子武庚為殷後乃三分其地置三監使管叔蔡叔霍叔尹而教之自紂城而北謂之邶南謂之鄘東謂之衛武王既喪三監導武庚叛成王既黜殷命殺武庚復伐三監更於此三國建諸侯以殷餘民封康叔於衛使為之長後世子孫稍併彼二國混而名之朱子曰邶鄘不詳其始衛則武王弟康叔之國也衛本都河北朝歌之東淇水之北百泉之南其後不知何時并得邶鄘之地朝歌故城在今衛州衛縣西二十二里所謂殷墟衛故地即今衛縣今按漢地里志云三監叛周公誅之盡以其地封弟康叔故邶鄘衛三國之詩相與同風然而鄭氏不主其説朱子亦與鄭同蓋諸侯封國止於百里而衛以一國兼三國之地則過大而非制也然康叔乃武王時所封不在成王誅三監之後所謂三監者但指管蔡霍而管蔡霍亦武王時所封之國管在今鄭州蔡在今上蔡縣霍在今霍州皆不逺於紂都而亦不與紂城密邇監之者為之尹以教武庚猶云天子使吏治其國也蓋管叔之所專而蔡霍二叔則遙相為輔耳其國固各有本封而未嘗分受邶鄘之地邶鄘之地猶屬武庚若衛則别為一國地在紂城之東豈可與邶鄘並列為三監之數哉及管叔以武庚叛而蔡霍二叔亦與比周傳布流言周之罪人既得而殷之頑民亦遷於是始以其地分封邶鄘二國而後亦盡併於衛其世則無可考焉國風雖存邶鄘之號其詩亦散亡矣今所存者乃衛詩之雜而奚必強為之解邪或以為一國而三其名得於衛者為衛得於邶鄘者為邶鄘或以為存其舊號者因其聲之異有鄘音者謂之鄘有邶音者謂之邶皆求其説而不得之辭耳衛縣今為衛輝府淇縣地朱子以衛為狄滅而文公徙居楚邱為説則妄傳之事也詳見定之方中柏舟經旨曰婦人不得於夫而怨慕也小序為衛頃公時仁人不遇之説朱子既詳辨之矣以其與下篇相類疑為莊薑之詩竊意此詩怨而不怒非莊薑之賢不能及此列女傳以為衛宣夫人之詩者非也至孔叢子載孔子讀柏舟而見匹夫執志之不易則又以為非婦人之詩今觀二章訴兄弟而逢怒之言此豈男子辭哉泛彼柏舟亦泛其流興也耿耿不寐如有隱憂微我無酒以敖以遊興意敖平聲後凡以敖遊燕敖言者並同泛謂浮於水流謂流於下也耿耿小明憂之貌也隱痛之藏於內也微猶非也敖與遨同亦遊也而有放縱意言以柏木為舟堅實而不以乘載無所依薄但泛然於水中如婦人見棄而無家事可任也故以興其隱憂之深如此莊薑本非樂酒敖遊者謂雖使以酒遨遊亦不能自解也我心匪鑒不可以茹亦有兄弟不可以據薄言往訴逢彼之怒賦也鑒鏡茹納也如柔亦不茹之茹據依訴告也言鑒能容物妍醜無不納之而我心則知其善惡而分别之不能悉容也故不能不訴於兄弟訴之者訴妾侮己之事欲其言於夫而有處也此亦親親迫切之情不能自己但兄弟皆嬖愛其妾而怒其妻者故訴則逢怒也莊薑以齊女嫁衛必無至齊訴兄弟之理其必遣人往言歟我心匪石不可轉也我心匪席不可卷也威儀棣棣不可選也賦也卷音捲石生於山在山則甚固然有時而鑿之可得而轉也我心之固則不可轉席鋪於地在地則常舒然有時而撤之可得而卷也我心之舒則不可卷自其可動而言則曰轉自其可收而言則曰卷棣棣者棠棣華蕚相承接續之意也選簡去也謂威儀無有差失而不可簡去也此因兄弟怒沮而言守之不易如此蓋秉德有常不因人而遷就動容有度不因人而雷同此見其處群妾之間不失常度而德容表裏之正皆無可議矣憂心悄悄愠于群小覯閔既多受侮不少靜言思之寤辟有摽賦也辟音闢悄悄憂貌慍怒意群小衆妾也覯與搆同閔病也謂搆讒以病之也彼搆病則此受侮矣曰既多曰不少見群小之衆也辟拊心也摽拊心貌蓋寤時不覺如此也言既不能混俗以同於衆妾則為其所讒侮而無所訴矣日居月諸胡迭而微心之憂矣如匪浣衣靜言思之不能奮飛賦也居諸皆語辭微光不明也言日往月來而其光漸微猶言日朘月削也匪浣衣言垢積之深不可復浣也衛莊公寵愛諸妾而不禮其妻無尊卑之分他日州吁弒桓公之禍已基於此蓋積之既深將有不可解者故以匪浣衣為喻若在他人則當見幾矣但婦人以從夫為正於義不可奮飛耳奮飛者如鳥之奮翼而飛去也由此章觀之可以知其為莊薑詩矣柏舟五章章六句緑衣經旨曰舊説莊公惑於嬖妾而夫人莊薑失位故作是詩而藹然有怨而不怒之意非忠厚者不能也緑兮衣兮緑衣黃裏比也心之憂矣曷維其已賦也緑蒼黃之間色黃中央之正色間色賤而以為衣衣在上而顯也正色貴而以為裏裏在內而幽也此託言以比賤妾尊顯而正嫡幽微皆失其所也南軒張氏曰緑衣之憂言嫡妾之亂其弊將至於不可勝言者憂在宗國也豈特為一身之私哉緑兮衣兮緑衣黃裳比也心之憂矣曷維其亡賦也上曰衣下曰裳按周禮內司服注謂婦人連衣裳不異其色今間色之緑為衣而在上正色之黃為裳而處下皆託言以見其失常也亡與忘同緑兮絲兮女所治兮比也我思古人俾無訧兮賦也女音汝女指其夫而言治謂理而織之也訧過也言緑衣本絲而染以為衣以比成妾於尊顯者皆夫所為言其失序蓋有自也故言我欲求古道以處之而使其夫歸於無過也華陽范氏曰致其敘則在我也我思古之人能使尊卑有分而無過也絺兮綌兮凄其以風比也我思古人實獲我心賦也凄寒貌絺綌而遇寒風猶已之過時而見棄也思古人而得其所求如上章所謂俾無訧者乃為得本心之安耳緑衣四章章四句燕燕經旨曰莊薑無子以陳女戴媯之子完為已子莊公卒完即位是為桓公嬖人之子州吁桓公庶弟也弒桓公故戴媯大歸于陳莊薑送之既别而作此詩也燕燕于飛差池其羽興也之子于歸逺送于野瞻望弗及泣涕如雨興意差初宜反燕鳦鳥燕燕重言之以見其雙飛也差池不齊貌之子指戴媯歸大歸也泣無聲出涕也淚自目出曰涕華谷嚴氏曰燕以春來秋去有離别之義故以起興莊薑撫戴媯之子平時與戴媯恩信相親及莊公既沒嫡妾相依如雙燕之飛其羽差池相為前後而常相隨逐也今戴媯大歸而已獨留不復得如雙燕矣我逺送于野而與之别稍稍更逺瞻望弗及令人念之泣涕如雨之傾也風人含不盡之意此但敘離别之恨而子弒國危之戚皆隱然在不言之中矣蘇氏曰禮婦人送迎不出門今送于野情之不能已也燕燕于飛頡之頏之興也之子于歸逺于將之瞻望弗及佇立以泣興意飛而上曰頡飛而下曰頏佇久立也燕燕于飛下上其音興也之子于歸逺送于南瞻望弗及實勞我心興意下去聲上上聲凡在下之下上聲自上而下之下去聲在上之上去聲自下而上之上上聲鳴而下曰下音鳴而上曰上音送于南者陳在衛南此句可以為送戴媯之證仲氏任只其心塞淵終溫且惠淑慎其身先君之思以朂寡人賦也任如今反塞音嗇後凡塞實之塞並同仲戴媯字任德藏於內也塞實淵深終竟溫和惠順也先君謂莊公也朂勉也寡人莊薑自稱也其心塞淵故能終溫且惠終者終始如一之意此所謂以善慎其身也而於其行又勉夫人以思先君情緒暗然矣龜山楊氏曰州吁之暴桓公之死戴媯之去皆夫人失位不見答於先君所致也而戴媯猶以先君之思勉其夫人真可謂溫且惠矣燕燕四章章六句日月經旨曰莊公無親親之恩而不禮其夫人無以為定國之本莊薑傷之而猶望其相親也故作此詩辨説謂此莊公在時所作篇次當在燕燕之前日居月諸照臨下土乃如之人兮逝不古處胡能有定寧不我顧賦也日月者呼而訴之以其明能遍照而不遺也乃者反語辭之人指莊公逝發語辭有往而不返之意古謂古人親親之道不以古道處已則寡恩也定謂定國言此不足以定國也寧猶能也冀其相念而不忍絶之辭日居月諸下土是冒乃如之人兮逝不相好胡能有定寧不我報賦也好去聲後凡愛好之好並同冒覆好愛報答也以禮事莊公而不以恩報見其不好日居月諸出自東方乃如之人兮德音無良胡能有定俾也可忘賦也日旦必出東方月望亦出東方言其出而照物也德音者有德意而以溫言相加也無良則非德音矣俾也可忘言不使我為可以忘也亦冀之之辭日居月諸東方自出父兮母兮畜我不卒胡能有定報我不述賦也夫為妻綱妻所仰望以為終身之飬如父母之於子也故以父母言之而實以指夫也畜飬卒終也如此會意方與胡能有定一句相屬述祖述之述謂豈無古道可法而述以報我乎亦冀之之辭日月四章章六句終風經旨曰序云衛莊薑傷已也辨説則謂若果莊薑之詩則當在莊公之世而列於燕燕之前今按此詩辭頗切直與前四篇愛夫憂國溫柔敦厚者不同似非出於一手且莊薑一人已取四詩如終風者可以無録矣豈别一賢婦不得於夫者所作而併入於莊薑之類歟終風且暴比也顧我則笑謔浪笑敖中心是悼賦也敖五報反終風終日風也暴疾也謔戲言也浪放蕩也悼傷也終風暴疾以比夫之狂暴也言夫雖狂暴亦有顧我則笑之時但皆出於戲慢而無愛敬之誠則又使我不敢言而心獨傷之耳此可以見其貞靜自守與夫之暴慢無常者不合所以忤其意而不見答歟然其心傷悼必欲得其心而後已則亦其怨慕之真切也終風且霾比也惠然肯來莫往莫來悠悠我思賦也霾大風揚塵而上下霿也蓋狂惑之比言夫雖狂惑亦或惠然而來然其來也莫往莫來心實不定而非真來也則使我悠悠而思耳悠悠思之長也終風且曀不日有曀比也寤言不寐願言則嚏賦也有音又隂而風曰曀不日不終日也有古又通用終風曀而又曀以比人之狂惑暫開而復閉也願言者思出於心之意嚏徐鍇以為腦鼻中氣壅塞噴嚏則通也言寤時則憂而不能寐思則氣鬱於鼻而嚏發矣曀曀其隂虺虺其靁比也寤言不寐願言則懷賦也曀曀隂貌蒙上章有曀而言虺虺靁將發而未震之聲此亦不日有曀之意也東萊吕氏曰驟風迅雷其止可待至於曀曀之隂虺虺之靁則殊未有開明之期也終風四章章四句擊鼓經旨曰衛人怨州吁阻兵也州吁弒桓公自立欲求寵於諸侯結陳平宋而以兵助宋伐鄭夏伐既還秋又伐之暴師日久故國人怨而作此詩左傳以為伐鄭五日而還者不足信也詳見春秋私考隱公四年擊鼓其鏜踊躍用兵土國城漕我獨南行賦也踊躍跳躍也喜之之意兵謂戈戟之屬土興土工也漕衛邑在古黃河東一統志云廢白馬縣在今大名府滑縣治南本衛之漕邑華谷嚴氏曰鼓以進衆為三軍號令今聞鼓聲鏜然乃是州吁踊躍喜於用兵也夫兵者不得已而用之州吁踊躍自喜故國人怨之言衛國之人或役土工於國中或築城於漕邑非不勞苦然猶處境內今我獨南行而伐鄭則死亡未可知雖欲為土國城漕之人不可得也從孫子仲平陳與宋不我以歸憂心有忡賦也孫氏子仲字時軍帥小序以為公孫文仲非也觀春秋稱衛人不列其名姓則孫子仲非大夫也平和也合二國之好也不我以歸南行故也此見孫子仲非能恤民而思戢者憂憂己之不得歸也爰居爰處爰喪其馬于以求之于林之下賦也喪去聲後凡喪失之喪並同爰於也居者坐所安也處者行所止也言在外不歸從其居處於是有喪馬而求於林下者矣見其部伍不收人無鬪志也死生契闊與子成説執子之手與子偕老賦也契苦結反契與恝同恝闊隔逺之意言雖隔逺而生死不相棄也子指妻言蓋初婚之時以此與妻相約故曰成説然又執妻之手而期於偕老不謂便至於死也此敘其室家約誓之情于嗟闊兮不我活兮于嗟洵兮不我信兮賦也信音申後凡取伸義者並同闊本上章契闊而言活生洵信也信伸也言今之契闊遂成死别而偕老之信不得伸也民之嗟怨其深如此州吁所以卒為衛人所殺蓋有由矣擊鼓五章章五句州吁弒君天下大惡此詩略無一言及於君臣之義而不欲從逆者其所自述不過征役之憂室家之愛而非大義所關也蓋此言出於上人閔勞則為説道若下民自敘則為私情在太師采之可以察民隱而不可以播聲歌也其言不足為勸何以興起人心邪列國之風如此類者何啻千百而於衛特存此詩其故何也今考邶鄘衛皆衛詩也衛詩列於經者三十九篇其次則鄭詩二十一篇其次雖齊晉大國不過十餘一二然尚有他國之詩雜焉其下則皆不及矣至於鄶曹則止四篇而已他國之詩何其少而鄭衛之詩何其多邪意者鄭衛之詩人所樂道雖經刪定其故猶存及秦火之後詩多焚散世儒掇拾民俗所傳而併入之則有義不足録如擊鼓之類亦得與於三百篇之列歟或曰衛人非不知州吁之為賊但不明大義敢怒不敢言耳凱風經旨曰衛有七子不能安其母之心故作此詩以自責無怨言也孟子曰親之過小而怨是不可磯也所謂過小必奉飬有闕而其母憤怒諸子欲自勞苦耳非謂衛之淫風盛行而其母欲嫁也如此尚得為小過哉自小序以後説詩者蓋皆失之矣凱風自南吹彼棘心棘心天天興也母氏劬勞興意凱和煦也南風和煦能長飬萬物故曰凱風棘即酸棗至夏始生難長之物必待凱風吹之而後生心以其稚弱未成者言也至於天天則少長矣此以風之吹棘心者興母之育幼子而棘又叢生多刺則七子之喻也劬勞病苦也華谷嚴氏曰母之飬子於少時最勞苦故於天天言劬勞凱風自南吹彼棘薪興也母氏聖善我無令人興意聖睿也本其愛子之德言生意萌動於內者謂之心枝條發生於外者謂之薪棘可以為薪則已成立非心之天天時矣然非美材故以興子之壯大而無善也言七子之中無一善人能安母心其自責也至矣爰有寒泉在浚之下興也有子七人母氏勞苦興意寒泉清冽之泉而可以飬人者也浚衛邑必七人所居之地言寒泉在浚邑人賴之以生飬今子七人反不能養一母而使之勞苦也睍睆黃鳥載好其音興也有子七人莫慰母心興意睍晥清和圓轉之意載則也載之聲轉而為則故則為載義此言黃鳥猶能好其音以悅人而我七子獨不能慰悅母心何哉凱風四章章四句雄雉經旨曰婦人以其夫逺遊於外有所沮抑而不得以行其志故作此詩以規戒之而欲其全身以歸也雄雉于飛泄泄其羽興也我之懷矣自詒伊阻興意泄音異後凡泄泄並同雉耿介之鳥喻其夫也泄泄舒緩貌言其不得高飛也懷謂所懷之人即夫也詒與貽同遺也阻謂阻抑也言自詒則其夫自取矣雄雉于飛下上其音興也展矣若子實勞我心興意下上其音言飛鳴不定其聲不能即聞逺也展誠也言誠又言實甚言君子之勞我心也瞻彼日月悠悠我思道之云逺曷云能來賦也本上章勞我心而言見日月之往來而思其君子久羈於外也百爾君子不知德行不忮不求何用不臧賦也行去聲後凡德行之行並同君子本指夫言不欲顯言故泛言百爾耳忮妨害也求貪欲也欲以利已即是有求欲以責人即是有忮苟有忮求之心則為不知德行矣臧善也不能順人心以行已志故曰不臧此規戒其夫之辭冀其全身而歸也雄雉四章章四句匏有苦葉經旨曰此女子守正不妄從人者所作非謂刺淫也匏有苦葉濟有深涉深則厲淺則揭比也匏瓠屬與瓠異匏苦不可食特可佩以濟水濟渡處也涉渡水之通名匏尚有葉未可用之時也匏可用則以匏濟水矣何待於徒涉哉厲危也若今之浮水其事危也舊説謂以衣涉水曰厲則水深之中亦豈能兼衣而涉哉揭以攝衣涉水為義則在淺處庶幾可通耳然深厲淺揭皆出身見體之事世俗不以為羞者也故以引起乘舟得正之意見婚姻當以禮也有瀰濟盈有鷕雉鳴濟盈不濡軌雉鳴求其牡比也瀰水滿貌鷕䳄雉聲軌車轍也牡本雄獸之名鳥之雄者亦稱牡如雞之雌者書稱牝雞也言濟盈而欲厲者必車至水涯淺處其軌先濡由揭而後厲也今不濡軌則有待於乘舟矣乘舟者濟之正也如婚姻以禮乃為得正而雉鳴求牡各從其匹則尤見其不可苟合矣雍雍鳴鴈旭日始旦士如歸妻逮冰未泮賦也雍雍和鳴聲鴈性不再偶有從一之德故婚禮納采請期用鴈而皆以旦故曰旭日始旦旭者日初出貌歸妻者使之來歸也氷泮者氷至建寅之月而渙散也周禮仲春令會男女此則夏正建卯之月也蓋霜降婦功成則娶嫁行氷泮農功起則婚禮殺故婚期盡於卯月恐其過時故曰逮氷未泮也此言婚禮之正則濟盈以舟而非徒涉矣招招舟子人涉卬否人涉卬否卬須我友比也招招以手相呼之貌舟子舟人主濟渡者此言各從其匹而不妄合之意華谷嚴氏曰人皆徒涉我獨招舟子而不徒涉者既待舟而後濟又須待我友而同濟喻人必待禮而行又以配耦相從也匏有苦葉四章章四句谷風經旨曰時有寵新妾而棄其妻者其妻不忍去故作此詩以敘其悲怨之情也怨而不怒可謂賢婦人矣但詩中以涇渭為喻則涇渭者周畿內之水也詩人詠物多述土風衛人不應逺引涇渭東萊吕氏雖為之解亦似強求意者其為王風之雜歟習習谷風以隂以雨興也黽勉同心不宜有怒興意采葑采菲無以下體比也德音莫違及爾同死賦也習習連續不斷之貌谷風華谷嚴氏以為來自大谷之風大風也蓋本桑柔大風有隧有空大谷之意舊説東風謂之谷風則與小雅谷風之義不同矣言谷風連續而不斷即終風也而又隂雨無開霽之時以喻夫之暴怒無休息也黽勉者勉力而強為也葑蔓菁也菘類菲蒠菜也葍類其根莖皆可食下體舊説指根謂根有美時有惡時惟錢氏以為凡菜近地之莖葉多黃腐不可食此説得之以其近地故云下體葑菲二菜常食之物不可以其莖葉之近地者偶有黃腐遂棄其上而不采以比夫之於妻亦不可以小過而棄其善也德者仁愛之言也違背也蓋冀其夫以仁愛之言相加而不背於理也此章言其從一而終之本心而夫不宜加怒也行道遲遲中心有違不逺伊邇薄送我畿賦也誰謂荼苦其甘如薺比也宴爾新昏如兄如弟賦也遲遲舒緩貌心不欲行故曰有違畿門內也荼苦菜非蓼也薺甘菜荼苦而反甘如薺以比已之見棄其苦有甚於荼也宴與燕同安也新昏指夫所娶之妾也如兄如弟言愛之太過而使與已齊無貴賤之等也此章言夫以新昏棄舊必欲去之而妻不忍去見其心之甚苦也涇以渭濁湜湜其沚比也宴爾新昏不我屑以母逝我梁毋發我笱我躬不閲遑恤我後賦也涇渭二水名涇入於渭俱在雍州王畿內地湜湜水清見底也涇濁渭清及既合流則渭亦因涇而濁然二水相交之處壅土成沚而渭在沚之上者則湜湜然見底而本清之體固自若也以比棄妻本善新昏以不善牽之而夫為其所惑也此説本程子而華谷嚴氏取之屑瑣細也不我屑以謂視我為瑣瑣而不以為事也即涇以渭濁之意逝之也梁魚梁也堰石障水而空其中以通魚往來者也笱以竹為器而承梁之空以取魚者也閲視恤憂也逝梁發笱恐其失魚蓋當家時不妄取魚之事故雖已去而猶戒新昏顧恤之既而曰我身既不能視何暇憂我後乎言其權在新昏不復能理也此見既去而猶以勤家為念其惓惓不已之心無以加矣就其深矣方之舟之就其淺矣泳之遊之比也何有何亡黽勉求之凡民有喪匍匐救之賦也亡音無後凡有無之亡並同方桴舟船也濳行曰泳浮水曰遊水深則方舟水淺則泳遊以比隨事重輕以為緩急也求之求足其所無也此言事之急者則當黽勉以求也匍匐小兒手行伏地之狀言其急也救周恤也蓋鄉鄰之喪事之不可緩者故急救之以見當其無時不可不求也此棄婦自敘平日勤勞以曲承夫意之事不我能慉反以我為讐既阻我德賈用不售昔育恐育鞠及爾顛覆既生既育比豫于毒賦也賈音古比毗至反後凡商賈之賈比及之比並同慉與畜同飬也阻抑也上章所敘勤勞之事皆棄婦平日所以飬夫以安者夫既不以我為能飬而反以為讐則於我之德抑而不用矣售賣物出手也有德而不為夫所取如有物而不為賈所買也則何所售哉育生理也生理不遂曰鞠窮也毒螫也初欲求足所無則恐生理之窮而與夫至於顛覆不支今生既遂而反比我於毒螫而棄之乎比於毒則視為讐矣此承上章言有勞而為夫所棄其情可哀也我有旨蓄亦以御冬興也宴爾新昏以我御窮有洸有潰既貽我肄不念昔者伊余來塈興意旨美蓄聚所聚之美菜也御與禦同當也言我有旨畜之菜以禦冬月闕乏之時至春蔬新美則不食矣以興其夫安於新昏而厭棄我亦但使我禦窮苦之時至於安樂則棄之也洸武也如水之湧故曰洸潰怒也如水之決故曰潰肄即伐其條肄之肄謂萌孽復生而不已也塈塗也謂彌縫其闕如塗屋壁之罅隙也言夫奮其武怒而遺我以禍如萌孽之生生不已曽不念往日來此彌縫闕失之時乎此申歎上章之意冀其夫之感悟也谷風六章章八句式微經旨曰狄人迫逐黎侯黎侯寓於衛及狄已退黎侯猶望衛之助已而衛不禮焉黎侯可以歸而不歸故其從行之臣勸之去而不欲其留也其序當在旄邱之後夫狄人迫逐黎侯小序言之然春秋中略不經見不知其為何時事也近黎之狄赤狄也朱子據左傳載宣公十五年伯宗數赤狄潞子奪黎氏地之言疑其為衛穆公事亦非經文所有安知其不為浮誇乎黎即今潞安府黎城縣杜預云黎侯國上黨壺關縣有黎亭在衛之西即其地也式微式微胡不歸微君之故胡為乎中露賦也式發語辭微以微視之如無有也故猶事也微視君之事而不以為急則無望其助已矣故其臣勸之以歸也臨川王氏曰中露露中也言其有霑濡之辱而無所芘覆也式微式微胡不歸微君之躬胡為乎泥中賦也躬身也臨川王氏曰泥中言有陷溺之難而不見拯救也觀於此詩可見黎之臣子有主憂臣辱之忠而志欲其君之自立矣式微二章章四句旄丘經旨曰黎侯為狄所迫而寓於衛久而衛救不至故黎之臣子嘆其無恤患之志而作也亦本舊説黎在衛西自西寓衛必尚在其西鄙之邑故以衛為東詳觀詩意皆在外望之之辭似非寓其國者也故華谷嚴氏曰舊説越衛國而寓於東非也旄丘之葛兮何誕之節兮興也叔兮伯兮何多日也興意旄丘地在衛西或以為開州東北有旄丘則在衛東蓋附會之説耳故毛氏云前高後下曰旄丘蓋不以為地名也誕濶也叔伯指衛之諸臣也叔卑而先伯者自下而上不敢遽逹所尊也不斥其君而但言叔伯婉辭也黎之臣子寓衛日久因登旄丘而見其所生之葛其節已闊蓋葛始生其節蹙而密既長其節濶而踈故即所見以為多日之興也何其處也必有與也何其夊也必有以也賦也處安處也有與謂待與國而同來也有以為有他事而未暇也此因上章何多日也而言所以不得來之故蓋委曲以盡人情耳狐裘蒙戎匪車不東叔兮伯兮靡所與同賦也狐裘黎大夫自謂也蒙茸毛聚貌狐裘本冬月之服至見葛節之誕已在春夏之交踰三時矣言其久也當至衛地之後常服狐裘以求救於衛故曰匪車不東觀於此言可以見黎寓於衛西矣不専以其在黎日初告難而言也靡無也同謂同憂患之心也惟其心不相同故雖告之而不來救耳於是其言始有所諷切矣瑣兮尾兮流離之子叔兮伯兮褎如充耳賦也瑣細尾末也流離流移他國離去本國也褎多笑貌耳聾之人常多笑充耳瑱也瑱之塞耳本不欲聞也黎之諸臣言流離漂散之人瑣尾甚矣而衛人略不憐之雖訴告已及而褎然如瑱塞耳付之不聞也其無救患之志可知此黎人盡其辭而責之蓋亦憤激之深亦可見其憂國之誠有所不能自己矣旄丘四章章四句簡兮經旨曰賢者不得志而仕於伶官蓋不得已而非其所欲也故作此詩以見本心焉簡兮簡兮方將萬舞日之方中在前上處賦也簡擇也擇人以舞也曰方將則將舞時也祭祀旦明行事不用日中云日之方中者蓋以燕飲言也將舞之時值日方中而處在前列之上見其所擇以為用者如此而不顧其恥辱於顯明之地也集傳以不恭釋簡而曰有輕世肆志焉恐詩意未必然耳碩人俁俁公庭萬舞有力如虎執轡如組賦也碩大也以容體言俁俁大貌公庭即前上列舞之位也轡馬之韁也組織絲為之而五采錯雜成文也如虎言其武也御能使馬則轡旋如組之文言其藝也此其勇捷之才足任將帥而舞於公庭豈其所宜哉此雖以才自譽而實有自恥之意焉左手執籥右手秉翟赫如渥赭公言錫爵賦也赫赤貌渥厚漬也赭赤色公猶言當衆也錫爵雖古獻工之禮而實良人之所恥故羞而面赤也程子曰錫之以爵勞賤者之道也山有榛隰有苓興也云誰之思西方美人彼美人兮西方之人兮興意榛果名似栗而小隰下濕之地苓藥名一名大苦即今甘草也言山隰之間有榛苓可以食貧也美人美好之婦人也西方美人託言以指西周之盛王也復揭西方而言之以見其逺而不得見也簡兮四章三章章四句一章六句舊本三章章六句今從集傳之所改定泉水經旨曰衛女嫁於諸侯思歸省其父母而不得故作此詩以自見也舊説以為思歸寧非也諸侯妻無有歸寧之禮使果有之既曰父母終矣又何可以言思歸寧乎歸寧之禮説見葛覃毖彼泉水亦流於淇興也有懷于衛靡日不思孌彼諸姫聊與之謀興意毖泉水流貌泉水即衛之百泉也淇亦衛水泉水注之以興已之欲歸衛也有懷於衛謂懷父母亦親親之恩也孌好貌諸姬同姓媵從之姪娣也以其孌好為夫所悅故與之謀欲其以情逹也出宿于泲飲餞于禰女子有行逺父母兄弟問我諸姑遂及伯姊賦也逺去聲後凡逺之之逺並同泲禰皆衛地當近衛都而地里志謂泲在臨邑禰在寃句者非矣言始嫁時將出宿而先飲餞固已逺其父母兄弟矣况於義不可而夫不從故問之姑姊姑姊蓋先君時之媵婦以其老成必為夫所敬信非諸姬比也按孔氏韓奕疏曰祖於國外畢乃出宿則出宿當在飲餞之後出宿于干飲餞于言載脂載舝還車言邁遄臻于衛不瑕有害賦也干言皆所嫁國之地名而今欲適衛之所經也當為異姓昏姻之國而九域志謂干言為邢地者非矣舝與轄同車軸頭鐡也不駕則脫之設之而後行載脂者先以脂膏塗舝使滑澤也載舝者塗畢然後設舝而行也故兩言之還車猶言回轅舊説謂嫁時乘來之車似牽強矣邁逺行也遄速臻至也瑕與遐同何也言今亦欲如來嫁時之出宿飲餞而還車以往衛則至衛為速但恐於義有害故疑之而不敢自遂也我思肥泉兹之永嘆思須與漕我心悠悠駕言出遊以寫我憂賦也肥泉自衛而來所渡之水也須漕自衛而來所經之邑也駕乘舟也寫與寫同言必乘舟出遊於衛然後可以解憂也蓋欲歸不得而自解之辭非必欲往也衛女思歸者發乎情也卒不得歸者止乎禮義也守禮義之正而不為私情所奪即此一念則凡情愛之私可以自克矣聖人著之於經所以示教也泉水四章章六句北門經旨曰忠臣勞於役而困於貧不得以行其志故作此詩而安於命也出自北門憂心殷殷終窶且貧莫知我艱已焉哉天實為之謂之何哉賦也忠臣勞於逺役故因出北門而發此嘆也舊説以北門背陽向隂為暗君之比恐不必然殷殷憂之隱也窶謂無財可以為禮貧謂無財可以自給貧視窶為切也蓋財不足以備禮而人莫之知使之勞於逺役故憂其不能供也非憂貧也已焉哉者嘆其終莫我知也謂之何哉無所歸咎之辭也王事適我政事一埤益我我入自外室人交遍謫我已焉哉天實為之謂之何哉賦也王事諸侯遣使於天子之事也適之也政事諸侯國內所差役之事也一専也埤與禆同皆加以逺役之意室猶家也謫責也見其貧無以自給也王事敦我政事一埤遺我我入自外室人交遍摧我已焉哉天實為之謂之何哉賦也遺夷季反後凡加遺之遺並同敦厚遺加摧阻也此二章申説首章之意北門三章章七句龜山楊氏曰忠信重祿所以勸士也衛之忠臣至於窶貧而莫知其艱則無勸士之道矣士之所以不得志也先王視臣如手足豈有以事投遺之而不知其艱哉然不擇事而安之無懟憾之辭知其無可奈何而歸之於天所以為忠臣也北風經旨曰衛之賢者知國亂將危招其同志避地而去也北風其涼雨雪其雱比也惠而好我攜手同行其虛其邪既亟只且賦也雨去聲邪音徐只音止且音疽後凡雨之之雨及只且並同北風寒風也涼寒氣也雱初雪貌惠愛也虛寬貌邪爾雅作徐緩也只且語辭言北風而又雨雪其愁慘甚矣以比國家危亂將至而日迫也故言朋友之愛好我者可以攜手而相與同行矣虛徐言其者尚疑可以寬緩之辭既而曰亟則事勢已迫而不可不速去矣此見其心雖不忍而見幾則明決也北風其喈雨雪其霏比也惠而好我攜手同歸其虛其邪既亟只且賦也喈風疾聲霏雪飛而密也歸歸於所安之處也莫赤匪狐莫黑匪烏比也惠而好我攜手同車其虛其邪既亟只且賦也狐獸名似犬黃赤色烏鳥名黑色詳見鸒斯字義狐妖邪而善媚人烏貪殘而善攫物皆不祥而可惡者也狐色赤君大夫之服纁裳者似之烏色黑君大夫之服玄衣者似之故以比衛之君臣皆狐烏也同行之人必富而有車馬者故曰同車東萊吕氏曰同車不必指貴者特協韻耳北風三章章六句靜女經旨曰此淫風也蓋衛人因女子贈物以相期會故恱之而作此詩也毛鄭之説大失經意歐陽氏既辨之明矣靜女其姝俟我於城隅愛而不見搔首踟蹰賦也靜女謂其處深閨幽靜之中而意獨専向也姝色之美也城郊外邑城而隅則其幽僻之處必女家所近而俟於此也不見者男子失期而不至也踟蹰行不進貌言靜女雖愛之而不得遂但搔首踟蹰欲去不去而已靜女其孌貽我彤管彤管有煒説懌女美賦也管管籥之管蓋以樂器相貽也漆以赤故其色彤煒赤貌此靜女既得見之以彤管相贈以結殷勤而男子以女為恱也舊説以管為筆非也古以刀為筆未有用毫者安得有管自牧歸荑洵美且異匪女之為美美人之貽賦也牧郊外也歸亦貽也荑與碩人手如柔荑之荑同茅之始生者也以其柔白可愛故以相貽女贈而男恱之亦猶上章之意也靜女三章章四句新臺經旨曰刺衛宣公也舊説衛宣公為其子伋娶於齊而聞其美欲自娶之乃作新臺於河上而要之國人惡之而作此詩也新臺有泚河水瀰瀰燕婉之求籧篨不鮮賦也鮮斯淺反後凡鮮少之鮮並同泚明潤也言河水者表作臺之處也瀰瀰滿也求謂齊女欲得婉順之男以相安樂也籧蒢者龜胸之疾言其不能俯也蓋蘧蒢本竹席之名人或編以為囷其狀如人之臃腫而不能俯者故又因以名此疾也鮮少也新臺有灑河水浼浼燕婉之求籧篨不殄賦也灑高潔也浼浼濁漲貌殄絶也魚網之設鴻則離之燕婉之求得此戚施賦也魚網本欲得魚以喻齊女之遣嫁本為伋也而鴻麗其中以比所得者衛宣公也離附也離本分離無附麗之義猶治亂之亂訓治云耳戚施駝背之疾言其不能仰也宣公以翁為君初至新臺時則以尊臨卑外為尊大之態如籧篨然其後見齊女有未順者則俯而求之極其卑屈如戚施矣故衛人形容其情狀如此亦可以見人心惡惡之公焉新臺二章本在臺言而皆曰籧篨魚網鴻離一章則言戚施義各有所當也鄭氏據爾雅以口柔釋籧篨以面柔釋戚施歐陽氏已辨其失矣新臺三章章四句二子乘舟經旨曰伋不得於父宣公與其弟壽俱出亡以死國人傷之而作此詩也舊説以為朔搆伋於宣公而使盜殺之因及於壽於義難通辨見春秋私考桓公十六年衛侯朔奔下二子乘舟泛泛其景願言思子中心飬飬賦也景即古影字後凡取影義者並同二子指伋壽也乘舟以其方渡河言也飬飬猶漾漾憂不知所定之貌二子乘舟泛泛其逝願言思子不瑕有害賦也不瑕者疑辭此見其不歸而疑之也二子乘舟二章章四句此詩必以宣公奪伋之妻使伋不安因奔而壽以愛兄故亦併及之詩人傷悼蓋以此也不過數言而辭意懇至聞之而不流涕者無人心矣意其序當在鶉之奔奔之後云詩説解頥正釋卷三
