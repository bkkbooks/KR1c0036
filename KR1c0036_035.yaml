body:
  text: 詩説解頥字義卷三明季本撰王風君子陽陽一章簧笙竽管中金葉也蓋笙竽皆以竹管植於匏中而竅其管底之側以薄金葉障之吹則鼓之而出聲所謂簧也故笙竽皆謂之簧笙十三簧或十九簧竽十六簧也竽亦笙屬房東房也屋次棟之下曰楣後楣以北為室與房房在東而室在西朱子曰房只是人出入處古人於房前有壁後無壁所以通內二章翿者纛也孫炎以為舞者所持羽蓋本注於旗竿之首之羽以其覆幬而謂之翿舞者之羽亦本此而名翿即翟也詳見宛丘字義然簡兮稱右手秉翟而此以左手執翿者蓋方以右手招友尚未舞也揚之水一章蒲水草似莞而褊有脊生於水崖柔滑而溫可以為席毛氏以蒲為草正指此爾鄭氏不從則釋為蒲柳夫蒲柔物也故栁之弱者亦以蒲名蓋本爾雅而左傳所謂董澤之蒲者即蒲栁也鄭所以異於毛者以首章言薪下言蒲楚則蒲楚是薪之木名不宜為草故也然陸農師則曰揚之水不流束蒲言蒲輕揚善泛今反不流則以水力微而不勝也説者以為上章言薪言楚則蒲亦水名不宜為草誤矣夫芻亦草也而綢繆之詩乃曰束薪束芻束楚則豈以言木故妨草哉故曹氏曰楚小於薪蒲輕於楚兔爰一章尚有三訓一曰猶也一曰庶幾也一曰加也此章尚無為之尚猶也尚寐無訛之尚庶幾也故安成劉氏曰二尚字義不同若著尚之以瓊華之尚則加也後凡如此類各隨文義求之而已大車一章大車周禮及論語皆有此名説者皆以為平地任載之車與駟車不同大車以一牛駟車以四馬大車即役車以其方箱可載任器以供役故謂之役車先儒以役車為牛車周禮巾車云庶人乘役車是也陳氏祥道曰大車兩轅也蓋兩轅之車一牛在轅內衡短而轍狹一轅之車兩服在轅外衡長而轍廣故牛車轍廣六尺與駟車八尺之轍不同牛車衡長六尺與駟車六尺六寸之衡不同駟車橫六尺六寸縱四尺四寸而牛車縱橫各六尺故謂之方箱但駟車軫長四尺四寸牛車軫長八尺而箱方能載故以牛車為大車耳又按巾車云大夫乘墨車疏謂墨漆革車而不畫者也此亦同為駟車毛氏以大車為大夫之車則誤以牛車為駟車矣故孔氏曰役車庶人之所乘庶人賤以供役為名耳毳衣毛氏以為大夫之服蓋以周大夫聼男女之訟者言也然許慎以毳為􅖯而下章之璊則以為虋而曰禾之赤苖也明非毳冕矣毳冕非所以聼訟而聼訟之衣不得如菼青璊赤慎為此論已足破舊説之非矣陸農師既援引之又以青近玄赤即纁而以禮大夫之玄冕者玄衣纁裳為解則經文但言毳衣今以纁裳之色遷就於衣似猶牽強亦未為有定見也且如菼如璊之毳衣以毛布為衣而冕服之毳則畫虎蜼於衣也蓋古者宗廟之彛有畫虎畫蜼者故章服以虎蜼名宗彛而毳冕五章之畫衣起於宗彛故遂以其冕名毳冕而其衣則以絲為之非布也毳衣雖同其實則異大車之毳衣豈可以為冕服之毳哉鄭風大叔于田一章乘馬者一車四馬也此田車也田車之制詳見車攻字義凡駕車致逺必取馬之有力者當以牡馬故詩中多言四牡况田獵之齊足者乎言乘馬則牡可知矣二章言乘黃四馬皆黃也三章言鴇爾雅云驪白雜毛曰鴇鴇從馬則馬而非鳥也乘鴇亦四馬一色也既牡而四馬又一色可見其馬之良矣二章兩服兩驂凡乘車六尺六寸中有一轅兩馬在轅外謂之服馬服馬在衡兩端之內故集傳曰衡下夾轅兩馬曰服其外各有一馬為驂故集傳曰衡外兩馬曰驂襄駕也馬之最良者為上駕猶史言上駟也鴈行者驂少次服後頸當其胸如鴈行之有次序也上章言兩驂如舞言其調和中節也服馬制於衡不得自由故以如舞言於驂耳下章言兩服並首在前則曰齊首兩驂在旁稍次其後如人之兩手則曰如手也餘詳見干旄字義磬控范氏處義曰磬謂使之曲折如磬也控謂有所控制不逸也縱送集傳以舍拔為縱拔括也矢銜弦處覆彇為送彇弓弰也又謂之弭即弓末受弦處也華谷嚴氏曰縱放箭也送送箭也今射者云前手攧後手絶攧即送也絶即縱也舊説從禽曰送今不用三章釋棚釋解也棚矢筒蓋即春秋傳所謂氷也華谷嚴氏曰用矢則舉棚以開筒既用則納矢筒中釋下棚以覆筒鬯弓鬯與韔同弓囊也鬯弓亦謂之韜弓孔氏曰謂韜弓而納諸鬯中也清人一章二矛蓋指夷矛守國之兵也而一矛併副為二鄭氏閟宫注云備折壞也詳見秦無衣字義重英者矛各有英飾也二矛並建車上其英相纍而見故曰重英蓋絲纒毛羽而朱染之故魯頌閟宫曰朱英懸於喬下近柄不礙於用處鄭氏云喬矛矜近上及室題所以懸毛羽是也矜矛柄室謂矛之銎孔受刃處題識也蓋矛柄近上及於銎孔之下懸毛羽以題識之為英飾也二章重喬義與重英同喬韓詩作鷮鄭氏亦云居橋反雉名蓋雉飛髙止一丈長止三丈一起即下故矛旁勾謂之喬下向而曲狀如雉飛也見日久英弊所存者喬耳三章左謂御者主御車旋回右謂車右主抽刃擊刺中軍為將者居中在鼓下主擊鼓調度蓋春秋時卿大夫為將者大抵如此君將亦然此與士卒兵車之法不同如閟宫公車千乘是以士卒出車言故鄭氏注二矛重弓則曰兵車之制左持弓右持矛中主御以經文但言矛弓而發此義耳考之甘誓左不攻于左右不攻于右御非其馬之正皆曰汝不共命則左右主攻而中主御欲其驅馳不失中正也甘誓夏書此必古法故周制士卒出車猶仍之也然君大夫將而使御居左蓋必春秋時將欲親觀行陳而御者則從其詭遇歟若人君常御之乘車則君在左僕人中央勇士在右見於曲禮孔疏又與卿大夫兵車法異然御者在中不失古法而君左人持弓之位可以蔽身於禮自宜然耳因備論之遵大路一章袪袂口也孔氏曰袂是袖之大名袪是袖之小稱又曰袂是袪之本袪是袂之末俱是衣袖女曰雞鳴一章弋鄭氏以為繳射也繳音灼孔氏曰謂以繩繫矢而射也繳謂生絲為繩今按生絲為繩則甚細故史記謂之微繳三章雜佩以婦人之常佩言舊説以為玉佩非也其夫弋鳥之婦蓋民家也安得佩玉邪建安熊氏曰婦人左佩紛帨刀礪小觹金燧右佩針管線纊火觹木燧之屬備尊者使令也鐫解結狀如錐以象骨為之燧取火針貯以管有女同車一章佩玉左右佩玉也集傳云上橫曰珩下繫三組貫以蠙珠中組之半貫一大珠曰瑀末懸一玉兩端皆鋭曰衝牙兩旁組半各懸一玉長博而方曰琚其末各懸一玉如半壁而內向曰橫又以兩組貫珠上繫珩兩端下交貫於瑀而下繫兩璜行則衝牙觸牙而有聲也今按瑀或以為玉云珠者先儒以為此不可考又佩必有環當在組間擊有聲處故經解曰行步則有環佩之聲佩之等差見於玉藻天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玖而緼組綬玉以白為貴瓀玖為賤故以為差然瑜亦美玉也雖山玄水蒼色不純白必皆美玉也組綬者以組為綬貫佩之珠玉而相承受故謂之綬耳婦人亦有佩玉但其等差不可以考陳氏祥道曰或亦視其夫而為之度歟今按此詩言瓊琚必亦美玉也故謂之瓊瓊琚别見木瓜字義二章將將與鶬鶬同鶬本鳥名故借衆鳥搶食之聲以狀聲之衆集衆集則聲大故又取大義而言將將從金則為鏘鏘以金聲言也從玉則為瑲瑲以玉聲言也樂聲亦通用之其義一也將將對噦噦則將將為大噦噦為細故釋將者則曰集釋噦者則曰徐知此可以得將將之義矣惟綿之應門將將閟宫之犧尊將將不可以聲言則專有取於大義耳丰三章衣錦褧衣詳見碩人字義裳錦褧裳孔氏曰婦人之服不殊裳而經衣裳異文者以别韻句耳其實婦人之服衣裳連俱用錦皆有褧下章倒其文互言之又曰庶人之妻嫁服也出其東門二章荼秀名也孔氏曰釋草有荼苦菜又有蒤委葉邶風荼苦即苦菜也周頌荼蓼即委葉也此言如荼乃是茅草秀出之穗非彼二種荼也華谷嚴氏謂此章之荼為英荼其義與孔説同詳見弼谷風及鴟梟字義齊風著一章充耳塞耳也即所謂瑱孔氏曰懸瑱當耳故謂之塞耳以素絲為紞也紞懸瑱之繩紞用雜綵線織之天子諸侯五色臣二色今按古者五等之爵朝會祭祀皆以充耳著蓋諸侯待賢之詩而懸瑱之紞或以素或以青或以黃必為君者得以通用故其色不同集傳謂以纊懸瑱則紞即纊矣其瑱則毛氏云天子玉瑱諸侯以石故淇奧言充耳琇瑩琇謂石之似玉者則諸侯之瑱以石可知矣著亦諸侯之瑱而曰瓊華瓊瑩瓊英瓊玉之美名華瑩言其光彩瑩然也不用美石而同於天子用玉之飾見其僭侈矣鄭氏以此詩之瓊為石色似瓊者亦強解耳朱子又云古人充耳以瑱或用玉或用象據此則瑱又有用象者用象之瑱當又次於琇矣載驅三章彭彭多貌蓋讀為必亡反則如合幫而行故以為多與本音蒲庚反者不同蓋彭本以鼓聲而會意轉讀為蒲光反者亦鼓聲也故取大義故凡車馬言彭彭者皆壯盛之意因大而言也與必亡反者不同矣四章儦儦衆貌本因麃字乃獸疾走之名傍從立人則以人言耳獸走多群行故以為衆猗嗟二章侯孔氏曰正者侯中所射之處大射則張皮侯而設鵠賔射則張布侯而畫正正大如鵠正以綵畫為之其外之廣皆居侯中三分之一中央之綵方二尺以外凖其綵之多少正之廣狹均布之以至於外畔也正與鵠大小同矣鵠乃用皮謂之正者正亦鳥名齊魯之間名題肩為正正鳥之捷黠者射之難中以中為雋故射取名焉大射射鵠賔射射正此言不出正兮據賔射為文也今按正當作鴊鵠取名於鳱鵠鳱鵠小鳥亦捷黠難中是以中之為雋正畫於布侯故曰畫布為正鵠棲於皮侯故曰棲皮為鵠大射賔射之外又有燕射其侯之中非鵠非正陳氏祥道謂燕射之侯則畫熊麋虎豹鹿豕之形以象鵠蓋天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕皆丹質質即的也故燕射謂之獸侯而所畫之差如此大射者為祭祀而射王與諸侯以射擇群臣可以與祭者射以觀德中多者得與於祭此以射鵠也周禮司裘以卿大夫共麋侯而皆設鵠列於大射則恐衰世之僭禮耳賔射謂諸侯來朝王與之射及諸侯以事會諸侯而射於其國此以射正也燕射者謂勞使臣若與群臣飲酒而射者此以射獸形也凡此三射皆朝廷之正禮分言之實有鵠正獸形之殊或以燕射之質即為正鵠豈亦有時而通用乎今魯桓公在齊非賔射也以其為賔而用布侯以射正故孔氏曰據賔射為文也此外又有鄉射則卿大夫若州長因行鄉飲酒禮而射不列於三射之中所用必亦布侯之畫虎豹鹿豕者則但可以為獸而不可以為正鵠矣燕與飲不同故燕為朝廷之禮有辨在彤弓三章四矢集傳以為禮射每發四矢蓋本鄭氏鄭氏又曰禮射者大射賔射燕射是矣四矢象有事於四方此據禮射而言耳但禮射不主皮而貫革則主皮之射也蓋魯桓公嘗與齊人狩禚自試其善射故云然耳凡射皆以四矢為一發豈必禮射哉魏風陟岵章岵及二章屺毛氏曰山無草木曰岵山有草木曰屺爾雅則謂多草木岵無草木屺二説不同必傳寫者有一誤集傳主毛今從之伐檀一章坎坎毛氏云伐檀聲集傳則以為用力之聲曹氏亦曰檀木堅韌故伐之聲坎坎然非若丁丁之易也如此則以坎坎與丁丁分難易矣竊意坎與宛丘坎其擊鼓坎其擊缶之坎同謂其聲之直率而不宛轉也若丁丁則或在空林或在空谷皆虛中相應之聲與坎坎異耳豈以難易分哉河本黃河以清漣言則未濁也蓋黃河上流其水猶清自龍門以下涇渭雜入至蒲而始濁耳此必君子隱於石隰二州之間河水清漣之地能自食其力而其俗又勤耕好獵儉嗇多藏故詩人以此美之此蓋晉之西鄙近於西河者而列於魏風亦猶汾沮洳之言公路公行公族也得非以其地之交界而相混歟稼穡毛公以種之斂之分釋集傳因之孔氏曰以稼穡相對者皆先稼而後穡故知種之曰稼斂之曰穡若散則相通大田云曽孫之稼非唯種之也湯誓云舍我穡事非唯斂之也㕓以一夫所居言謂三百户家家皆得取禾非謂一夫自有三百㕓也李悝言於魏文侯曰一夫治田百畝畝收粟一石五斗勤者益三斗則百畝之田以勤者計之不過收粟一百八十石耳安得三百㕓之多邪蓋三百以邑中户數言古之言邑者小曰十室大曰千室約其中則恆曰三百如易所謂邑人三百户論語所謂駢邑三百也一户即一家受一㕓而為氓是為夫家矣二章億十萬也以刈禾把數言按李悝言於魏文侯曰一夫五口治田百畝畝收粟一石五斗為粟百五十石治田勤謹畝益三斗損亦如之則百畝之增當為粟百八十石矣古之百畝當今田四十一畝強粟未脫殼者也百畝得禾一億把則每把為粟一合八勺億把則為百八十石矣以上農夫八口之家之力計之可以恆得此數否則所收或不及矣鄭氏以三百億為禾秉之數秉即把也夫每夫受一㕓而為氓者得粟億把已為大熟矣而云三百億則太多矣特爾雅謂豕生一曰特是也集傳以為獸三嵗曰特蓋本毛氏竊意上下章言貆鶉皆專指一物不應此章則泛言獸也故以爾雅之説為正三章囷倉類民家所以藏粟者也與庾不同在野而無屋為庾在屋下為囷説文曰囷廪之圓者從禾在口中圜謂之囷孔氏曰方者為倉故圓者為囷飱説文云晡時食也本從夕食又云水澆飯也蓋人旦則食飯夕則食飱飯饔而飱薄此朝夕之所以異食也然集傳則主毛傳熟食曰飱之説蓋兼肉與食而言耳狩獵之所獲以之為肉稼穡之所獲以之為食蓋發此意也碩鼠一章碩鼠大鼠也陸璣曰今河東有大鼠能人立食人禾苖人逐則走入空樹中有五技其形大故云大鼠今按五技謂能飛不能上屋能遊不能渡谷能緣不能窮木能走不能先人能穴不能覆身碩鼠蓋即爾雅鼫鼠唐揚之水一章素衣舊説以為中衣也中衣如深衣衣裳相連而色同君視朝之外禮賔等事亦常服皮辨皮辨之服素衣素裳素衣謂麻衣而色白者鄭氏所謂白布衣積素以為裳也而中衣在內亦用布與表相稱陳氏澔謂外服用布則不得用帛為中衣是也玉藻孔氏疏引皇氏曰凡服先加明衣次加中衣冬則加袍繭夏則不袍繭用葛也次加祭服若朝服用布衣先以明衣親身次加中衣冬則次加裘裘上加裼衣裼衣之上加朝服夏則中衣之上不用裘而加葛葛上加朝服賈氏聘禮疏曰凡服四時不同假令冬有襯身襌衫又有襦袴襦袴之上有裘裘上有裼衣裼衣之上又有上服皮辨祭服之等若夏以絺綌絺綌之上則有中衣中衣之上復有上服皮辨祭服之等若春秋二時則衣夾褶夾褶之上加以中衣中衣之上加以上服也此疏與皇氏之説不同皇氏則裘葛之內俱用中衣而賈疏則裘上有裼衣而內無中衣絺葛夾褶之上有中衣而中衣不在內又但言中衣而不言裼衣則中衣即裼衣蓋互相備也二説皆主朝祭之服言但今諸侯訪賢者之詩不知其上當加何服意者其以無繪之襌衣歟袒而見美故以中衣言耳中衣者必白色之布也故謂之素非以素為絲也先儒以祭服言絲則不知此為下賢之詩矣襮領也爾雅云黼領謂之襮黼領者繡刺黼文於領也黼文者非若章服之繡斧形也考工記云白與黑謂之黼五色備謂之繡繡與黼嫌於同用故繡為刺繡之繡非五色備之義也如此則襮兼黑白二色而為黼耳鄭氏以其義難通乃改下章之繡為綃綃繒名也則不必然故石梁王氏以為繡當依時文不必改也朱襮者染繒為赤色以為中衣之領緣而黼則繡於領中也故曰朱襮領為衣首故言襮以表其貴若緣則統於其中不必言矣郊特牲曰繡黼丹朱中衣大夫之僭禮也則諸侯為之不為僭矣然非見美致敬必不用黼領也故朱襮之素衣即裼衣也言中衣亦見其為通名耳若皇氏謂在裘葛之中則近體之褻服也何必加黼領哉裼衣之上有正服蓋朝服之類謂之襲衣裼襲之説詳見碩人字義椒聊一章升與前漢志合籥為合十合為升之升同當今升之二合崔靈恩謂古者為升上徑一寸下徑六分其深八分則其量太小而二合亦不能容矣若毛氏謂兩手為掬吕氏謂古量二升曰掬則似掬大於升而陸農師曰兩掬為升則又升大於掬何其相戾哉要之當以前漢志之説為古法之正綢繆一章三星參與心皆三星不知何所指也毛氏以秋冬為昏時則以三星為參建亥之月參星始見於東方於禮可以昏矣鄭氏以嫁娶用仲春則以三星為心建辰之月心星見則時已晚矣而在隅在户各以移時異月言則詩中所謂今夕者非指一時矣豈文意哉蓋此詩本淫風其曰在天在隅在户者以其夕所見而言也始見於天少移於西南則為隅矣夜深於户中見之則為在户矣何必強解邪羔裘一章羔裘在朝上下之通服但君純羔大夫則以豹飾華谷嚴氏曰疏云韠與裳同色衣與冠同色冠黑則服亦黑故用黑羔皮為裘而以緇布為衣以裼之袒而有衣曰裼見美也以緇布衣覆之使可裼也必覆之者裘褻也其上乃加朝服此緇衣羔裘諸侯日視朝之服卿大夫朝服亦服之其所異者君則純色臣則以他物飾其褎所謂羔裘豹褎羔裘豹祛是也今按羔裘而裼以緇衣經傳每有明文毛氏傳於緇衣以為卿士聼朝之正服鄭氏亦謂緇衣者居私朝之服孔氏疏之則謂緇衣諸侯與其臣服之以日視朝蓋諸侯旦朝以冠辨其服緇布衣故知是聼朝之正服既朝退大夫適治事之館猶服緇衣以聼政也據聼政則館尚在私朝不在私家也若在私家則謂之燕居而用狐貉之厚以居故陳氏祥道謂君子狐青裘豹褎玄綃衣以裼之蓋大夫士之燕服也是不敢褻用羔裘也不用羔裘則不以緇衣可知矣故緇衣羔裘非私家燕居之服也按燕服當用玄端麻衣也今用玄綃衣為裼蓋以綃為領緣耳秦風駟驖一章六轡御者所執之六轡也孔氏曰每馬有二轡四馬當八轡矣言六轡者以驂馬內轡納之於觖故在手惟六轡耳三章輶車注以為驅逆之車驅逆之車即佐車非君車也凡田獵君所乘者則謂之田車不宜以輶為名鸞鈴之效鸞鳥聲者故名為鸞鑣馬銜兩旁之鐡驅逆之車置鸞於兩銜之兩旁驅逆之車田車之佐也和鸞别詳蓼蕭字義小戎一章戎戎車即兵車也以其挽之以革漆之無他飾故又名革車自天子諸侯言總謂之戎路對大車而言則曰小戎董氏謂天子之戎車為元戎諸侯之戎車為小戎非也民俗稱君之車豈可以小名乎大車乃牛車庶人之役車也言小戎正以從軍不得用大車供民役耳俴收俴淺也收軫也所以收斂所載者也鄭氏謂輿後橫木是也凡升車皆自後軫入於車內其深四尺四寸周禮謂之隧至軾前則為軓一作􅓶鄭司農所謂軓式前也蓋輿下三面之材輢式之所植而賴軓以持車正者其面出於式前矣蓋隧深四尺四寸本因其輿之廣六尺六寸而三分去一也又三分隧以其一出式前以其二居式後故輿人曰三分其隧一在前二在後以揉其式夫軾前之軌不名為軫而兵車之軫與乘車同孔氏謂車前後橫木皆曰軫自後軫至前軫淺於乘車故曰俴非矣陳氏祥道考之於禮而辨之曰車前有軌有隂而已未聞有軫而軫則許慎亦以為車後木也然則四尺四寸之隧比於牛車之牝服長八尺者為淺牝服謂軫而其箱方則深矣淺收之義蓋如此餘詳見王風大車字義五楘梁輈五五束也楘歷歷然文章貌輈轅端之軏所以鈎衡而駕馬者論語所謂小車無軏是也轅長一丈四尺四寸前為頸後為踵頸以持衡踵以承軫其四尺四寸自軓而下以至於軫則以轅之踵承之隧深四尺四寸正合此數其十尺則在軓前周禮輈人所謂軓前十尺而䇿半之也䇿御者之䇿也䇿半則五尺也以䇿五尺則御者執之適可以及馬而無過不及也輈從軓前則稍曲其上至末為頸當轅之端值衡則向下鈎之此即輈也衡轅前橫木當兩服領上缺去七寸以扼馬領於前使不得去謂之軛其上平處為衡通言之衡即軛也輈則所以鈎而就之輈形穹窿上曲如屋之梁蓋轅端之輈與轅通為一木轅當兩服之中恐礙服馬體膚故特穹之而為輈車以輈為主懼輈之不堅也故一輈以皮革五處束之其文章厯録然也馬牛駕車皆任於肩而用力吳氏程謂牛力全在肩馬力散在一身之説非也遊環靷環也以皮為環當兩服馬之背上遊移前却無定處引兩驂馬之外轡貫其中而執之所以制驂馬使不得外出也脅驅亦以皮為之前繫於衡之兩端後繫於軫之兩端當服馬脅之外所以驅驂馬使不得內入也此所謂軫蓋即軌也隂靷鋈續隂掩軓也軾在車前輢在車兩旁當軓之處則以橫板側置車前垂輈上左右三面隂蔽此軓故謂之隂也或以軓為軓或以為轊頭轊頭即軸兩端皆非也鋈者沃灌之義靷以皮二條前繫驂馬之頸後繫隂板之上而隂板之上有續靷之處則消白金沃灌其環以為飾蓋車衡之長六尺六寸止容二服驂馬在衡外其頸不當於衡故别為二靷以引車亦謂之靳此則制驂馬使不得前也靷靳皆引轡之名即轡也餘見韓奕字義白金者孔氏謂金銀銅鐵總名為金兵車之飾或是白銅白鐵未必皆白銀而鋈亦非白金之名也毛氏以鋈為白金誤矣文茵茵褥也以虎皮為之有文采故曰文茵舊説以為車中所坐但方言駕車之事未宜遽及坐褥蓋指服馬藉領之褥而言也暢轂暢長也轂車輪之中以外持輻而內受軸者也大車之轂長一尺有半兵車之轂長三尺二寸考工記曰短轂則利長轂則安蓋大車本安則欲其利小車本利則欲其安故兵車用暢轂也騏綦文也孔氏曰色之青黑者名為綦馬左足白曰馵二章中兩服馬之在中者也赤馬黑鬛曰駵黃馬黑喙曰騧馬黑色白驪四牡孔阜馬雖齊力而雜用四色之馬蓋軍士所乘之車不能盡齊色也龍盾盾干也以木為之而畫龍於上也合者合二盾以蔽車車廣非一盾所能蔽故耳王肅云合而載之以為車蔽是也集傳謂合二以備破壞非矣蓋合盾與下章交韔二弓者不同觼環之有舌者亦消白金以沃之蓋鋈觼也軜驂馬之內轡也置觼於軾前以繫之納而不執故謂之軜每車八轡而經傳但言六轡者正以此二轡當繫於觼也孔氏曰馬之有轡所以制馬之左右令隨人意驂馬欲入則逼於脅驅內轡不須挽故納驂二轡繫於軾前也三章俴駟駕俴收之四馬也群謂群集非以調和言也厹矛謂刃有三角蓋即酋矛名異耳詳見無衣字義錞矛下端之平底也亦消白金以沃之故曰鋈錞蒙龎雜也伐中干也盾之别名苑文貌謂畫雜鳥之羽於盾上而其文苑然也盾為大盾故畫龍伐為中干故畫鳥羽虎韔以虎皮為弓室鏤刻金以為飾也膺胸也范氏處義謂弓室之胸是也詩中凡言車馬處如采芑鈎膺鞗革嵩髙鈎膺濯濯韓奕鈎膺鏤鍚皆以膺為馬當胸帶以其上下文皆言車馬之飾也惟此則為韔弓而發毛氏亦以為馬帶則與上文不相屬矣故華谷嚴氏獨以范氏之説為長交韔者交二弓於韔中謂顛倒安置之必二弓以備壞也閉弓檠也禮記作䪐緄繩縢約也以竹為閉而以繩約之於弛弓之裏檠弓體使正也孔氏曰縢為約之以繩非訓縢為繩又曰以繩約弓然後納之韔中也終南一章狐裘狐白裘也玉藻云君衣狐白裘錦衣以裼之鄭氏以錦為素錦言其色之稱也素白而曰錦蓋用五色絲織以成錦而以素為主顯其白耳君兼天子諸侯而言鄭氏謂天子狐白之上服皮辨服則天子皮辨之下有狐白錦衣也皮辨服亦白色與裘稱也則皮辨者天子視朝之服而諸侯在天子之朝亦狐白裘故通稱君耳此本臆説經無正文故陳氏祥道曰君衣狐白裘錦衣以裼之燕服也王之燕服不但玄端而已所以有狐白裘錦衣也言王則諸侯可知蓋狐白裘粹白之色裘之難得者也欲人有粹白之德則上下可以通服或賤者力不能備則但衣狐青而已非以狐白為禁也蓋狐比羔為賤故朝服常用羔裘而燕服多用狐裘但以狐之白者難得故紂以狐白免西伯田子方以狐白禮子思田文以狐白脫秦患然而人人皆得用之於此亦可見矣故集傳曰錦衣狐裘諸侯之服也既以錦衣為燕服則不必用絲織錦意必麻衣之素質而為錦文者歟二章黻衣繡裳黻與芾同蔽膝也一名韠古者席地而坐以臨俎豆故設蔽膝以備濡漬韠之言蔽也其初制服之意如此內則子事父母端韠是以韠從玄端之衣乃古人之常服也故其服通於上下則用韋而謂之韠在冕服為貴者所服則用繡而謂之黻考工記曰黑與青謂之黻黻如兩已相亞之形取君臣可否相濟之義也據書疏則以青黑二色線繡之於裳繡者刺也刺文之總名非必五色備然後為繡也冕服有十二章以次降殺至於三章皆以衣為繪裳為繡黻者取其辨也陳氏祥道謂理成於辨故服章以黻終雖殺窮於一章衣可以無文而裳不可以無黻裳必繡黻以存古人蔽膝之意也主黻而言故遂以其衣名黻衣黻本在裳非謂衣有黻也然祭服之黻衣用絲常服之黻衣用布即麻衣也而貴者之用繡黻則以别於常人之韋韠焉常服不以冕而以辨或以冠則不可知耳上章言錦衣狐裘而此言黻衣繡裳則錦衣裼裘之上又加此衣裳也按司服掌王之吉凶衣服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭群小祀則玄冕公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服大夫之服自玄冕而下如孤之服士之服自皮辨而下如大夫之服孔氏曰古天子冕服十二章日也月也星辰也山也龍也華蟲也此六者畫以作繪施於衣也宗彛也藻也火也粉米也黼也黻也此六者紩以為繡施於裳也鄭注云古天子冕服十二章至周以日月星辰畫於旌旗所謂三辰旗旗昭其明也而冕服九章登龍於山登火於宗彛尊有神明也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彛皆畫以繢次六曰藻次七曰粉米次八曰黼次九曰黻皆絺以為繡則衮之衣五章裳四章凡九也鷩畫以雉謂華蟲也其衣三章裳四章凡七也毳畫虎蜼謂宗彛也其衣三章裳二章凡五也希刺粉米無畫也其衣一章裳二章凡三也玄者衣無文裳刺黻而已是以謂玄焉凡冕服皆玄衣纁裳竊謂五冕不常服惟祭祀則服之及王受諸侯朝於廟則服衮冕其以大裘祀天而不言章服者亦必有衮以加裘也大裘則在五冕章服之中宜皆有之但於祀天首發之以見例耳裘本褻服豈可不加上衣以祭天哉鄭氏又謂周以日月星辰之三辰畫於旗而冕服雖天子止用九章則天子與上公無别就使天子用升龍降龍諸公但用降龍亦五十步百步之間耳此豈聖人制禮以辨上下之意哉故虞書之十二章乃天子等威之所繫後王亦烏得而變之但其取義以龍德為重故雖十二章有三辰亦主龍而言衮耳上得以兼乎下故天子於冕服之異等者皆得用之其餘則公自衮冕以下侯伯自鷩冕以下子男自毳冕以下天子之孤自希冕以下亦皆得用其所用則大祀中祀小祀之類各有其差焉然以孟子考之則天子地方千里公侯皆方百里伯七十里子男五十里侯與公同一等不與伯同等也天子之卿受地視侯不與子男同等也大夫受地視伯元士受地視子男而今冕服皆在其等之下則司服之言似亦非古制也且衮冕九章以龍為首龍首卷然故謂之衮鷩冕七章華蟲為首華蟲即鷩雉故謂之鷩毳冕五章宗彛為首宗廟彛器有虎彛蜼彛因名宗彛為虎蜼虎蜼毛淺毳是亂毛故謂之毳孔氏固謂鄭氏此解配文甚便矣若夫希冕之名為希則不知其何指鄭氏必以絺紩之義解之而曰刺粉米而無畫衣疏謂粉米非可畫之物雖在衣亦刺之也豈有本在下裳之粉米而可刺於上衣之理乎其為臆決甚矣夫大裘之冕衮衣之冕鷩衣之冕毳衣之冕希衣之冕此五冕者同用冕也其章服不同而旒數有等故冕亦異名耳然鄭氏辨師注言衮衣之冕十二斿鷩衣之冕九斿毳衣之冕七斿希衣之冕五斿玄衣之冕三斿斿即旒也是以天子之冕為十二斿侯伯之冕為九斿子男之冕為七斿孤之冕為五斿大夫之冕為三斿也夫冕旒既以十二九七五三為差則章服亦宜與之相配以旒之十二配章之十二旒之九配章之九旒之七配章之七旒之五配章之五旒之三配章之三可也而以十二旒為九章之冕九旒為七章之冕七旒為五章之冕五旒為三章之冕三旒為一章之冕何其各自為等而不相直乎况辨師但言天子之斿十二就諸侯之斿九就而已侯伯以下皆無及焉亦不明言其孰為衮衣之冕孰為鷩衣之冕也鄭氏何必強為之解哉以五冕配五章則旒至三而止章亦至三而止玄冕之一章則不得有一旒之冕矣若冕以一旒則在前左右不足以蔽目故冕至於一章則無旒矣鄭氏謂爵辨如冕無旒不可盡以其説為無據也蓋冕服皆玄衣纁裳然以其用於宗廟而不敢褻故以絲為之玄冕之衣亦謂之黻衣繡裳以裳繡黻而衣無文也士亦當有此服周頌所謂絲衣也絲衣則加爵辨爵辨即韋辨特以助祭為重而尊其名為冕耳漢輿服志以爵辨為夏收商哻在禮記則以周冕與之並稱此又以見冕可以為辨之通名也知此則冠冕之制皆可通貫而無疑矣無衣一章矛如鋋而大考工記云刺圍則以為刺兵説文云象形則以為勾兵陳氏祥道合二説言之則以為矛之為器上鋭而旁勾上鋭象物生之芒旁勾象物生之勾蓋可以刺可以勾者也矛之為用如此而已其有長短亦隨所便耳或建於車上或執於軍中兵勢長短各有所宜也大凡兵器皆然如戚揚本同一斧而鉞大斧小用各不同故以戚為斧揚為鉞也考工記謂矛有酋矛夷矛酋矛長二丈夷矛長二丈四尺攻國之兵欲短以地逺涉阻也守國之兵欲長以地近不涉險也此雖近乎強名然相傳已久姑從其説酋言其近夷言其長然則此章之矛與秦小戎之厹矛皆出兵征討攻國之兵也當用酋矛鄭清人與魯頌閟宫之二矛皆未出境內守國之兵也當用夷矛矣厹與觩通言其勾下曲觩觩然也其實當與酋矛同義特以刃有三角而異名耳曲禮疏曰矛如鋋而三稜固以三稜者同名為矛也二弓之義鄭氏前後不同於清人則曰酋矛夷矛於閟宫則以二矛與重弓共文重弓是一弓而重之則二矛亦一矛而有二又别立一義而曰備折壞也如此則清人之二矛既與閟宫異義而一車中建二矛長短不齊亦豈所以整軍容哉故通以備折壞釋之而於義始安耳二章戈戟屬即漢之勾孑戟也雙枝曰戟單枝曰戈孑者其胡單枝孑然謂之胡孑鄭氏曰戈勾兵主於胡也孔氏曰戈如戟而橫安刃但頭不向上為鈎直刃長八寸橫刃長六寸刃下接柄處四寸並廣二寸書圖因之曰戈廣二寸內四寸胡六寸援八寸柲六尺有六寸內謂胡以內接柲者胡謂矛之旁出者曲猶牛胡也援謂直刃也柲謂柄也戈之用主於胡胡過於直則倨但可以刺胡過於曲則勾但可以鈎惟得其中制往無不利陳氏祥道曰五兵之所以便於用者戈而已其柲短而易持其胡則援廣而易入可以樁可以斬可以擊可以鈎觀富父終生以戈樁僑如之喉狼瞫以戈斬秦囚子南以戈擊子晳長魚矯以戈殺駒伯則戈之為用可知矣戈奚適而不用哉二章戟一作棘以其能刺也亦曰勾兵自其在車言則曰車戟按考工記車戟常一丈六尺也戟廣寸有半寸內三之四寸半胡四之六寸援五之七寸半倨勾中矩刺重三鋝戟中旁出之兩枝對分上下其橫貫於援者皆為胡橫貫於援恐力弱而易欹也故必有胡胡之直方而罄折者謂之倨其罄折而下垂者謂之勾罄折故為矩刺即鄭司農所謂援蓋以刺申明援義耳非有二也後鄭不從司農之説乃以刺提分二類似有不通者蓋戈戟形同而制異其所以異於戈者雙枝耳惟其雙枝故有三鋒其中在援之末者則主刺之鋒也其旁在上枝之上者則向上之鋒也在下枝之下者則向下之鋒也無向上之鋒則不可刺無向下之鋒則不可勾故賈公彥曰三鋒皆向上者無用也惟以中鋒言則重三鋝戟與戈同耳鋝色劣反三鋝者一斤四兩也戈戟之刃皆以金為之考工記云四分其金而錫居一謂之戈戟之齊蓋有錫則刃白也戈下鐏戟下鐓亦皆以銅為之本鄭氏注故小戎厹矛言鋈鐓非銅安可鋈哉曲禮曰進戈者前其鐏進矛戟前其鐓注云鋭底曰鐏平底曰鐓此可以見戈戟之别矣三章甲軍中所被以衛身之服也曰介曰函曰鎧皆其别名陳氏祥道曰鎧所以致其凱經中言甲不及鎧蓋古者之甲以革為之後世乃用金耳管子曰蚩尤以金為鎧不可考也兵謂五兵弓矢殳矛戈戟也説禮者以此為步卒之兵而於兵車則以酋矛夷矛為二而不及弓矢安有此理哉夫弓矢攻兵之可以及逺者也殳擊兵矛刺兵而亦可勾戈戟勾兵而亦可刺皆接戰之短兵也隨其所往惟此五兵而已五兵之應長短不同而逺近之間用各有濟在習之使熟耳修則習之熟矣渭陽一章渭水名説見邶谷風字義鄭氏曰秦是時都雍至渭陽者蓋東行送舅氏於咸陽之地孔氏曰雍在渭南水北曰陽晉在秦東行必渡渭地理志右扶風渭城縣故咸陽也其地在渭水之北今按雍秦德公所徙之都漢置縣屬右扶風今為鳯翔府鳯翔縣地咸陽漢為渭城縣今為咸陽縣屬西安府渭水南去縣三里秦舊縣在今縣東三十里路車按周禮巾車掌王之五路曰玉路金路象路革路木路蓋玉路金路象路乘車也革路兵車也木路田車也見考工記輪人注象路以下諸侯得通用之金路天子以賜有功及同姓諸侯之異等者而後得用若玉路則惟天子乘之諸侯不敢用也路者大也若路門路寢路車路馬之稱皆以大言非謂行於道路而為路也故惟天子諸侯之車稱路若卿大夫非特賜不得有路如左傳襄公十五年王賜鄭子僑以大路二十四年王賜叔孫豹以大路杜氏以為草木二路理或然也既賜於天子則亦稱路矣然此亦衰周之事若衛叔仲于奚得請繁纓之類耳賜以草木之説雖無明文豈非金路象路皆諸侯之賜歟然則重耳雖以同姓當為諸侯尚未有功渭陽之贈未宜即用金路其必用象路矣詳見采芑字義權輿一章夏屋諸家多以宫室之美為夏屋謂居大屋而食無餘也鄭獨不然而以為大具孔氏謂下章始則四簋今則不飽皆説飲食之事不得言屋宅也眉山史氏亦取鄭氏大具之説而謂詩夏屋不指屋宇也經言夏屋惟此而已至揚雄乃云震風凌雨然後知夏屋之帡幪則誤以為屋宇矣竊意夏屋蓋指俎也其即閟宫所謂大房歟故元隂幼逹云夏屋本食俎亦不以為巨室也食小食謂燕食也若禮食則為大食與公食大夫之食同矣禮食似饗無酒詳見彤弓字義二章簋即敦也虞曰敦夏曰瑚商曰璉周曰簠簋皆有會會者蓋也簋與簠同而方圓異內方外圓曰簋以盛黍稷外方內圓曰簠以貯稻梁皆容一斗二升考工記旊人為簋則瓦器也賈氏據易象謂亦以木為之則臆説耳黍稷各二簋多以備餕故曰四簋公食大夫禮宰夫設六簋今言每食四簋是燕食非禮食也禮食則主國之君食聘客即所謂公食大夫也上章言夏屋渠渠鄭氏以為大具則禮食矣燕食乃常食也嘉榖之中黍為尤美故食貴黍而多以簋言詩説解頥字義卷三
