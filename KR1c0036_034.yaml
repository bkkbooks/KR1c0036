body:
  text: 詩説解頥字義卷二明季本撰邶風擊鼓一章鼓鼖鼓也長八尺面四尺周禮鼓人云以鼖鼓鼓軍事又曰軍動則鼓其衆蓋鼖鼓大鼓也鏜鼓聲之大者與逄逄填填同漕衛邑非曹也當在帝丘之北與泉水之漕同即衛文公東徙渡河而野處之地也其城之築在此雄雉一章雉野雞雄者有冠長尾身有文采善鬬蓋鳥之耿介者也二章下上其音燕燕之詩亦有此言華谷嚴氏曰燕燕言下上其音謂雙燕相追逐而飛鳴也雄雉言下上其音謂一雉之音或下或上也匏有苦葉二章匏與瓠異陸農師曰長而瘦上曰瓠短頸大腹曰匏蓋匏苦瓠甘且有短長之殊非一物也故瓠可食而匏之大腹者但可用以涉水其小而有柄者則用以為笙耳不可食也涉厲揭舊説皆本爾雅謂揭者揭衣也以衣涉水為厲繇膝以下為揭繇膝以上為涉繇帶以上為厲此説亦頗不明蓋匏有苦葉之詩本欲待舟以濟而不以涉水為正所謂厲者正若今之浮水耳故以為危而謂之厲何取於以衣之義哉以衣之義不可通則不得不強以褌釋矣揭衣乃是褰裳之義則揭當讀如丘竭反而淺揭之揭讀如苦例反則以叶厲韻耳豈有二音哉至以涉厲分屬膝上帶上殊不知深則厲之深即濟有深涉之深也而豈可以涉厲分二義哉故涉者渡水之通名也而深涉則為厲矣谷風二章荼苦菜顔氏家訓云葉似苦苣而細斷之有白汁花黃似菊陸農師云生於寒秋經冬歷春至夏乃秀月令孟夏苦菜秀即此是也陸璣云得霜甜脆而美華谷嚴氏曰經有三荼一曰苦菜二曰委葉三曰英荼此詩誰謂荼苦及唐采苓云采苦采苦綿堇荼如飴之荼皆苦菜也良耜以薅荼蓼之荼委葉也鄭出其東門有女如荼英荼也鴟梟豫所捋荼傳云菼苕疏云薍之秀穗亦英荼之類今按英荼者華之秀也在有女同車則以茅華言在鴟梟則以菼華言各論於本章字義三章涇水出陜西平涼府鎮原縣西笄頭山東南流徑西安府邠州至髙陵縣入渭渭水出臨洮府渭源縣西鳥鼠山流徑鞏昌府秦州又經岐周南即今鳯翔府岐山縣地又過武功縣北興平縣南至咸陽縣界豐水南來注之又東過長安縣北與涇水合於髙陵東流至華隂縣界入黃河四章匍匐説文云匍手行也匐伏地也此與集傳手足並行之説小異旄丘三章狐裘毛氏以為大夫狐蒼裘蒼青色也此説禮無明文惟據玉藻君子狐青裘豹褎玄綃衣以裼之故鄭氏注因以為玄衣之裘而孔氏謂為玄端之裘也但考大夫朝祭之服皆用黑羔裘豹褎而裼以緇衣上加朝服若黃狐裘則大夫蠟祭息民之服狐蒼裘不知其所施其必以其溫而用於境外之服如狐貉之厚以居者歟蒙戎左傳作龍茸毛氏云亂也雖謂之亂豈可遂以為敝哉故毛氏亦無裘敝之説蓋蒙戎者毛聚之狀東萊吕氏直以蒙戎為狐裘之貌亦知訓敝之為非矣蓋自服狐裘而至葛誕但見其為久耳不必以為裘敝也葛誕之時人豈尚服狐裘哉簡兮一章萬者東萊吕氏以為二舞之總名也舞有文舞武舞文執羽籥武執干戚干羽之舞起於有虞氏征苖之師以萬人為義故謂之萬而三章左手執籥右手秉翟則舉其文舞一節而言也翟雉羽本注旗干之首而取之為舞以習指麾籥如笛毛氏以為六孔鄭氏以為三孔未詳孰是羽舞必執籥者何休謂吹以節樂而陳氏晹亦云舞者執籥於左而吹之秉羽於右而舞之蓋亦約度之説耳夫舞與吹本二事而不可相兼者也豈有右手秉羽以舞而左手執籥以吹之理乎竊意舞入庭下當合樂之後其去堂上之樂則既逺矣而堂下之樂亦有編懸之隔或不相聞也則舞者吹籥以先之而籥始於黃鍾之管聲氣之最先者也故使舞者先吹而堂下之樂知羽籥之鼓動也乃合作焉於是舞者應節以舞但以舞成而籥不終奏也故或以六孔或以三孔似皆無害若以籥為節樂則不可通耳泉水一章泉淇俱衛地之水藍田吕氏曰泉水即今衛州共城之百泉也淇水出相州林慮縣東流泉水自西北來注之故曰亦流于淇而竹竿詩言泉源在左淇水在右者蓋主山而言之相衛之山東面故以北為左南為右今按衛州共城即衛輝府輝縣古共伯國在朝歌西南相州林慮即今彰德府林縣也在朝歌西北泉水與淇合蓋當於此是為衛河古黃河自今大名府濬縣東大伾山北流合衛河於濬縣界東北流入海二章飲餞者古之行者必有祖道之祭出國門封土象山為壇樹茅為主以依神而祭故祭道之神謂之祖乂謂之道山行曰軷故又謂之軷其牲或以犬或以羝既祭以牲伏地而以車轢之而去故謂之犯軷喻無險難也周禮犬人祭祀供犬牲伏瘞亦如之生民取羝以軷皆此祭也但生民之軷言嵗終之祀行神耳故毛氏云祖而舍軷飲酒於其側曰餞顔師古謂黃帝之子纍祖好逺遊而死於道故後人祭之以為行神或曰共工氏之子好逺遊祀之以為祖神皆附會之説也四章肥泉水名須衛邑漢地理志東郡有須昌縣故須句國即水經注所謂須城也按須城今為兖州府東平州治非衛地也鄘風君子偕老一章副婦人之首飾按周禮追師掌王后之首飾有副編次鄭氏謂副之言覆所以覆首為之飾其遺像若今步搖服之以從王祭祀編列髮為之其遺像若今假紒服之以桑也次次第髮長短為之所謂髲髢服之以見王王后之燕居亦纚笄總而已步搖者行步則搖動漢時有此名蓋若今之鳯冠而制稍異然非編髮為之也若編髮則為編即今之假髻而編之下又有髢賤者髮以次第長短而益之則謂之次皆非祭祀之副也象服即三翟周禮內司服掌王后之服有褘衣褕狄闕狄褘當為翬榆當為搖皆聲近而誤也鄭氏謂翟雉名伊雒而南素質五色皆備成章曰翬江淮而南青質五色皆備成章曰搖王后之服刻繒為之而采畫之綴於衣以為文章褘衣畫翬者榆狄畫搖者闕翟刻而不畫此三者皆祭服婦人無外事所祭者宗廟從王祭先王則服褘衣祭先公則服褕翟祭群小祀則服闕翟按翬亦是翟故謂之三翟搖一作鷂翬與鷂雉之異名也若闕翟不畫則未備而為闕耳三翟之首飾皆以副也但周禮止以王后言不及夫人然祭統會于太廟君卷冕立於阼夫人副褘立於東房則諸侯之妻亦副褘與后同矣故衛人以此而咏其夫人也定之方中一章榛栗皆果木之同類者榛小栗大可供籩實椅桐梓三木名陸璣曰梑之踈理白色而生子者為梓梓實桐皮曰椅類同而小别華谷嚴氏曰桐有三種青白之外復有岡桐即油桐也青桐即梧桐一名梧一名櫬詩所謂梧桐生矣是也椅桐梓漆之桐為白桐今按青桐有實是為鳯凰食油桐即素桐此則但可為桐油耳若白桐則華而不實爾雅謂之榮桐中琴瑟者惟白桐也漆木有液黏黑可飾器椅桐梓漆四木皆琴瑟之材種之以其可伐而以為琴瑟故曰爰伐琴瑟見其新造之初即為久逺之圖也二章桑木名葉可飼蠶者三章騋説見漢廣字義蝃蝀一章蝃蝀虹也日色映雲而生為虹隂氣升而陽能勝之故虹能斷雨也陸農師謂雄曰虹雌曰霓虹常雙見鮮盛者雄暗者雌也一曰赤白色謂之虹青白色謂之霓分言之則或有二者之分但通言之則皆謂虹也故孟子云大旱之望雲霓而虹可以霓言矣先儒皆以虹為天地之淫氣竊意蝃蝀之詩但取斷雨為義似不以虹為淫也二章隮鄭氏以為朝有升氣於西方華谷嚴氏取之謂與候人南山朝隮之隮同而集傳獨取鄭氏以虹釋周禮視祲之隮殊不知視祲之隮鄭司農亦以為升氣而後鄭别為説耳竊意以虹釋隮似乎牽合干旄一章干與竿同杠也旗竿也旄旄牛之尾也山海經有獸如牛四節有毛此旄牛也以旄牛尾為之謂之旄而注於旗竿之首郭璞云載旄於竿頭如今之幢是也周禮夏采疏謂鳥羽亦為旌旗之緌蓋緌者垂也旗旄垂下之名亦作綏即旄也若兼鳥羽而言緌則緌不但有旄牛尾而已此蓋據秦漢以羽毛為葆幢之制古者羽毛異用以毛為旄以羽為旌末章言干旌則析羽而注於旗竿之首者也孫炎曰析五采羽注旄上陳氏祥道曰干首注以旄旄上注以旌則是以翟羽插於􅓚上以表其髙故謂之旌干首雖毛羽皆有非混而為幢者也但所謂析羽者非以一羽析而為二也蓋翟惟二羽在尾最長謂之翹即薛綜所謂雉之健者為鷮尾長六尺者也全用之則為全羽半用之則為析羽周禮司常云全羽為旞析羽為旌此以貴賤而分也蓋必天子諸侯之旗用全羽之旞而卿大夫之旗得用析羽之旌故孟子曰大夫以旌而士以下旗竿必不得用旌故特以旌别言於大夫也司常又曰道車載旞斿車載旌此為天子言上得兼乎下故併旌用之道車者朝會之車道德之事也故曰道車斿車者田獵之車遊樂之事也故曰斿車此亦以事之貴賤分用旞旌矣若旄則凡旗皆當有之上下之所通用故不别言耳然此詩干旄干旌皆以大夫言也二章旟旗名也按周禮司常掌九旗之物名各有屬日月為常交龍為旗通帛為旜雜帛為物熊虎為旗鳥凖為旟龜蛇為旐全羽為旞析羽為旌此别其名物之異有文以識之故謂之幟即六月詩所謂織文也鄭氏以九旗名物之屬為衣徽則陳氏祥道固辨其誤矣常旗旌旐在經傳固有通言者而非通名旗則為九旗之通名也凡旗之制竿首有旄旄上有旌旞旌旞在上非旗幟也旄之下有縿以組維於竿日月交龍熊虎鳥凖龜蛇之形畫於縿上此則所謂幟也其幅必廣而長亦過之爾雅謂充幅長尋亦臆説耳故陳氏祥道曰其幅長而不特尋也得之矣漢志謂天子大常九仞龍旗七仞鳥旟熊旗皆五仭龜旐四仭禮書又有天子九仭諸侯七仭大夫五仭士三仭之説夫謂九仭者六丈三尺天子至士長短禮宜有差但恐不應太髙如此意必戰國時有此制觀秦有五丈旗之説則可知矣縿之下有斿斿即旒也其勢象水之流故謂之旒旒蓋練帛為之故爾雅謂之練旒縿之旁則有斾以揚於外斾必戰而後建非旒也其詳别見六月字義旗之為用本别軍容師行則有五方之旗如曲禮所謂左青龍者交龍之旗也右白虎者熊虎之旗也前朱鳥者鳥隼之旟也後玄武者龜蛇之旐也招搖在上者日月之常也招搖北斗也虞書疏據左傳三辰旗旗之説謂三辰為日月星則大常之上又畫星也穆天子傳稱畫日月七星蓋星即北斗也然則司常言日月而不言星曲禮言星而不言日月蓋各舉所重互相備耳通帛之旜純用一帛而無飾雜帛之物則用他帛以飾邉而皆不畫竊意青龍在左東方之旗其色宜青白虎在右西方之旗其色宜白朱鳥在前南方之旗其色宜赤玄武在後北方之旗其色宜黑所以識四方也招搖在中中央之旗其色宜黃蓋以指麾四方之旗也故陳氏祥道謂大常於其中加髙焉所謂招搖在上也此五者皆正旗也若通帛雜帛亦必如五方之色分屬正旗以為之從而制必小焉然其制别則固各有在矣此七旗者方各不同帛因異色故自正旗之在中者而言則謂之大常青者謂之大旗赤者謂之大赤白者謂之大白黑者謂之大麾此即巾車所謂建大常大旗大赤大白大麾者蓋亦以五者青赤白黑之色為差以互相備非為同姓異姓與蠻服蕃服各專一色此見旗之可以通言也但自諸侯之别於王禮而言則用王禮者言大用侯禮者言小如王制所謂天子殺下大綏諸侯殺下小綏綏與緌同是以旄言旗也旗固有大小之殊矣左傳亦云分魯公以大旗分康叔以少帛皆龍旗也魯得用王禮故曰大衛止用侯禮故曰少若以諸侯皆用龍旗言則通謂之大可也説禮者以明堂位有殷之大白周之大赤之文遂以大赤為周之正色而釋通帛以大白為殷之正色而釋雜帛則前五色之外又特用此二色此何義乎竊意王者易命固各有所尚之色蓋必自天子以至庶人其所專建之旗皆用當代之色如夏則用麾殷則用白而周則用赤也故鄭氏云凡九旗之帛皆用絳爾雅云纁帛縿纁絳色赤之淺者也此必一代之通制旗之常也而用於五方則異色以别軍容非可專用者矣專用之旗如孟子所謂大夫以旌士以旗庶人以旃旌不言幟以别士庶人之不得用旌而旌下之縿必鳥隼之旟也觀干旄之詩以旟與干旌並言則旟為大夫之旗可知矣而士之以旗則與諸侯龍旗同似乎踰分士在庶人之上疑當用物而誤為旗字耳旃與旜同則固一色之帛在雜帛之下而不得與交龍鳥隼熊虎龜蛇同為正旗之文也及詳孟子之言止為招大夫士庶人而發上不及天子諸侯下不及卿意必有如虞人之以皮冠者而其説尚未備邪今亦不可得而考矣其可考者惟司常有曰國之大閲贊司馬頒旗物王建大常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐至大司馬則曰中秋教治兵辨旗物之用王載大常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟此與孟子絶異蓋大閲治兵皆司馬搜軍之事陳氏祥道分别軍實軍法為説謂各有所重故旗物不同雖不能無牽強然亦見旗可隨時部分本無定用而其差則有斿數焉天子大常十二斿而亦通同九斿之旗陳氏祥道曰周禮典命自上公至士其車旗各視其命之數而行人公侯伯子男建常九斿七斿五斿皆以命數為節然即王之孤卿六命大夫四命公侯伯之孤四命卿三命大夫再命士一命子男之卿再命其大夫一命旜物之斿蓋亦稱是竊謂庶人無命數旜必無斿焉斿數有差所以别旗之用也故為天子之事而舉者則數從天子之斿為諸侯之事而舉者則數從諸侯之斿為大夫士之事而舉者則數從大夫士之斿於通用之中又各有尊卑之節焉此與孟子所言之常旗皆一定而不可易者也視命數以制斿此旗所以可通用歟若考工記序四方之旗而曰龍旗九斿以象大火鳥旟七斿以象鶉火熊旗六斿以象伐龜蛇四斿以象營室則又臆説矣夫青龍七宿非止九星也朱鳥七宿非止七星也白虎七宿非止六星也玄武七宿非止四星也而皆倚象以取數則斿又有不視命數者矣禮家之説雜亂而不可通故特辨論之知此則經中凡言旌旗旟旐之屬皆可類推矣三章良馬六之觀集傳以兩服兩驂釋良馬四之而謂六之為六馬則似據夏書凛乎如朽索之馭六馬而言矣考之車有乘車以吉行者也有戎車有田車以師行者也城門之軌天下所同故凡車之制皆輿廣六尺六寸轍廣八尺雖天子之大輅亦惟四馬而已禮校人掌王馬之政凡頒良馬而飬乘之乘馬注謂良馬五路之馬四匹為乘故言車皆謂之乘又謂之駟大明云駟騵彭彭則武王之戎車亦四馬也車攻云四牡龎龎則宣王之田車亦四馬也節南山云四牡項領則大夫之乘馬亦四馬也是一車四馬上下同之無間於古今曷嘗有六馬之車哉自公羊傳及王度記有天子駕六之説而後儒遂附益之謂中兩馬為兩服外兩馬為兩驂此四馬也而六馬則驂外復加兩馬謂之騑然非車之常制也意者衰世之君巡遊無度懼車力之不勝或有四馬之外復加二馬或加四馬如穆王之八駿者夏書之言六馬蓋危語也得無為太康逸豫滅德而發歟漢志有乘輿駕六馬之制蓋緣此而起耳故干旄所謂良馬四之者乃一車正馬之數而五之六之則與賢者同乘欲車之安恐四馬力或有疲而欲代之故隨所至而加一馬以為備耳衛風淇奧二章辨皮辨也考之周禮司服及注王祭祀以冕兵事以韋辨受諸侯朝覲於廟以衮冕日視朝以皮辨甸以冠辨諸侯視朝以皮辨日視朝以冠辨冕辨皆冠也而亦以冕辨為通名韋辨孔安國以為即爵辨劉熙云以爵韋為之蓋皮其質爵其色如爵頭然鄭氏巾車注謂雀飾黑多赤少然鄭氏原不以韋辨為爵辨而以靺韋為辨釋之夫韎者赤也則陳氏祥道固謂其為無據矣但軍國之容與禮服不同軍容者鄭氏所謂以韎韋為衣裳是也若禮服則以絲衣周頌所謂絲衣其紑是也至於聘禮君使卿歸饔餼於賔介亦宜禮服而注以韋辨為韎韋之辨兵服而曰其服蓋韎布以為衣而素裳則誠臆説耳輿服志云爵辨有收持笄所謂夏收商哻者也然則韋辨豈可專指為兵服哉皮辨即書綦辨鳲鳩所謂其辨伊騏者也孔安國曰綦辨皮辨也以鹿皮為之詩疏云色之青黑者名為綦冠辨以皂繒為之司服謂冠辨以甸則田獵當用皮冠亦皮辨也而以冠辨則因未獵之前司徒誓之未服戎服而猶著冠辨耳孔疏固已論之矣蓋冠辨即委貌也此豈田獵之冠乎委貌在夏為母追在殷為章甫其名雖異其制則一太古冠用布至夏殷而始用繒故知冠辨用繒也孔子曰麻冕禮也今也純儉正謂此矣若緇布冠則猶仍古制焉按辨師冕有旒韋辨皮辨皆有玉天子諸侯大夫皆得用之而玉各有等此其所以差也其韋與皮之辨則疏謂有毛曰皮無毛熟治曰韋本是一類而其尊卑不但以玉别也先儒謂士之服止於爵辨以爵辨為士之祭服也此言冠辨皮辨以上至於爵辨士皆得用之特不敢用冕耳冠辨無玉飾而爵辨尊於皮辨諸侯亦不常用故知會玉於辨為皮辨也陳氏祥道曰皮辨天子以視朝以宴以聼祭報以舞大夏諸侯以聼朔以巡牲以卜夫人世婦以迎王之郊勞以待聘賔卿大夫以王命勞侯氏以聘於鄰國以卜宅士以冠學士以釋菜凡大夫士之朔月皆皮辨服則皮辨之所施者衆矣蓋人為者多變自然者不易皮辨因其自然而已此所以三王共皮辨素積而周天子至士共用之也據此則皮辨者上下所得通用而亦人君所常用者歟其緇布冠亦上下之所通用而庶人則以之為常服也賈氏曰庶人雖服委貌而儉者服緇布冠則冠辨亦通於庶人矣凡此辨冕皆玄冠也祭則用玄衣纁裳朝則用玄衣素裳在朝則君臣上下同服故凡言衣者皆曰緇衣緇即玄之深者也自其下於緇衣而言則為玄端故玄端為士服玄端以布為之其裳則或玄或黃或雜各有所施然尊者亦得通之或施於冕或施於委貌故武王端冕而聼丹書魏文侯端冕而聼古樂劉定公端委以治民晉文侯端委以入武宫晏嬰端委以立虎門董安于端委以隨宰人公西華端章甫以相宗廟會同此可見端之可通於冠冕焉端冕之冕或即冠之通名未必專指冕也陳氏祥道曰玄端大夫士以為私朝之服玉藻朝玄端是也天子至士亦以為燕服玉藻天子卒食玄端而居內則事父母端鞸是也祭之冕服皆玄齋之端衣亦玄若夫朝服天子以素諸侯以緇未聞以玄端也今按私朝之服謂退朝釋緇衣之服以聼政則更玄端耳然見君則猶服緇衣也故鄭武公適大夫聼政之館則曰緇衣之宜兮見其在館而服緇衣以見君也儀禮特牲少牢饋食所謂大夫祭以朝服士祭以玄端者則自祭其先之服也若助祭於公大夫以上服冕士服爵辨皆以絲衣詳見周頌字義三章重較毛傳以為卿士之車此因衛武公嘗以諸侯入為卿士而言以卿士之車為重較則似其他當有單較然周禮無重較單較之文必無等差也輿人注云較兩輢上出軾者輢車兩旁也則較謂車兩旁橫穿之木以其出於軾上與軾為兩層故以重取義耳藍田吕氏曰古者車箱長四尺四寸三分之前一後二橫一木下去車牀三尺三寸謂之式又於式上二尺二寸橫一木謂之較去車牀凡五尺五寸古人立乘若平常則憑較若應為敬則落手憑下式而頭得俯今按輿人之車其箱廣而不方箱即輿也橫廣六尺六寸縱長四尺四寸其長四尺四寸者周禮謂之隧三分者以四尺四寸之長三分之一分得一尺四寸又三分寸之二其二分得二尺九寸又三分寸之一一分在輿前二分在輿後以揉其式碩人一章衣錦褧衣鄭氏云國君夫人翟衣而嫁今衣錦者在塗之所服也尚之以襌衣為其文之太著然毛氏於丰傳則謂嫁時之服孔氏曰毛云錦衣錦裳庶人之妻嫁時之服非為在塗異也夫所以謂之庶人妻之服者以士昏禮有曰女䊷衣纁襜䊷衣絲衣襜緣也禮婦人連衣裳而不異色則但纁襜而已士妻所服如此則衣錦而加褧乃庶人妻所服矣錦者織布為錦文也而褧則無飾之襌衣也此豈與夫人之服同哉蓋上得以兼乎下故莊薑亦服民間之服而又襌衣覆錦以晦其美蓋言其常服如此見莊薑不事表暴所以為賢也按玉藻君衣狐白裘錦衣以裼之錦裼狐裘竊謂其為錦布也必婦人得通用之而裼衣之上乃加襌衣凡裼衣所加之衣則謂之襲襲以覆裼玉藻所謂充美也去外之衣以見在內之裼衣則謂之裼玉藻所謂見美也聘禮注曰裼者免上衣見裼衣也凡當盛禮者以充美為敬非盛禮者以見美為敬蓋裘葛在內為褻故上加裼衣裼衣即中衣也免襟上之服以見裼衣為袒故玉藻注曰袒而有衣曰裼即曲禮疏所謂去體上外服以見在內裼衣者也不袒上衣即為襲矣裼襲之義如此但裼衣未有言裳者必亦連衣裳而不異色如深衣之類故言衣而裳在其中矣但朝祭燕饗則以衣裳分上下而各異色與婦人不同耳餘見唐揚之水字義邢姬姓侯爵國周公庶子所封其國即今順德府邢臺縣與衛為鄰至春秋僖公時為衛所滅談亦國名今濟南府歷城縣東七十里有談城與齊為鄰至春秋莊公時為齊所滅談本子爵當莊薑時必嘗入相於周故得稱公三章鑣鑣自毛氏以來皆訓盛惟華谷嚴氏謂與清人駟介麃麃載驅行人儦儦義異蓋麃無邉傍儦從立人而鑣則從金也然麃之為字象鹿之四足本獸疾走之名吉日所謂儦儦俟俟是也故從人與否皆取疾走之義勒馬銜外之鐡則亦以疾走故名其鐡為鑣翟茀孔氏謂婦人不露見車之前後設幛以自隱蔽謂之茀因以翟羽為飾今按凡婦人車皆坐乘謂之安車惟翟羽乃后夫人之茀其他不得用也然夫人常朝亦不用翟茀周禮巾車注謂安車無蔽后朝見於王所乘者也今諸侯夫人始至故乘翟蔽之車以朝見於君蓋始至則本自外而來也翟蔽有二巾車所謂重翟厭翟也重雉羽而為之謂之重翟比次翟羽以壓其本謂之厭翟重翟者説者謂從君祭祀所乘厭翟則從君賔饗所乘如此則非祭祀不得用重翟故鄭氏曰此翟蔽蓋厭翟也竊意重翟厭翟或亦可以通用説禮者過於分析耳四章葭蘆也亦名葦葦之未秀者為葭菼萑也亦名荻荻之初生者為萑萑初生亦名薍其未秀者則名蒹皆水草本一物但葦大萑小而於其中又有小大之分故以為别詩中或言蒹葭或言萑葦不過葭菼之别名耳陸農師辨之詳矣氓一章布許慎以為枲織蓋用麻紵葛為之毛氏以布為幣而説者因之然許慎則曰幣帛也又曰帛繒也則布不可以為帛矣孔氏曰幣者布帛之名是以布帛為通名幣也豈亦因毛説而強求其通歟三章鳩類非一然鳲鳩鳴鳩各以其名别之此單言之則與鵲巢維鳩居之之鳩同鳩亦好食椹者不以為别鳩也詳見鵲巢字義四章帷裳婦人坐乘其車設帷裳以障之亦茀也以為容飾故謂之重容若丈夫車立乘則有蓋無帷裳五章總角女子未許嫁則未笄但結髮為兩角而已竹竿四章檜栝也柏葉松身楫橈也或謂之棹撥水而行舟疾也芄蘭二章韘即車攻決拾之決以象骨為之射者著右手大指所以鈎弦開體伯兮一章殳兵車之器積竹為之主於擊所操之圍當二尺四寸細而可舉毛氏曰殳長丈二而無刃鄭氏曰有八觚孔氏曰戈殳戟矛皆插車畸此云執之者在車當插用則執之陳氏祥道曰殳雖建於車賔客往來則候人荷而趨竊意為王執殳者亦候人也二章蓬即騶虞彼茁者蓬之蓬但彼以叢聚言此以飛散言爾雅有齧雕蓬薦黍蓬其種類不一陸農師曰蓬蒿屬草之不理者也其葉散生末大於本故遇風輒拔而旋説苑曰秋蓬惡於根本而美於枝葉秋風一起根且拔矣此首如飛蓬之義也集傳以蓬華如柳絮之飛如亂髮不知何所本邪木瓜一章瓊毛氏以為玉之美者許氏以為赤玉但經言玉處多以瓊加之如瓊琚瓊玖瓊華瓊瑩瓊英之類不以瓊自為一玉也故孔氏曰瓊是玉之美名非玉名也三章玖與丘中有麻貽我佩玖義同毛氏以為石次玉者但丘中有麻之詩冀望賢人來遺善道不應以石之非玉者比之也况此篇瓊琚瓊瑶皆言美玉而此章獨以次玉之石配之似亦不倫故集傳曰玖亦玉名也蓋不以為石矣詩説解頥字義卷二
