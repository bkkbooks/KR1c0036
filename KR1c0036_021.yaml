body:
  text: 詩説解頥正釋卷十九明季夲撰小旻經旨曰上無道揆大臣不肯任事而嘉謀不得信用故在位大夫之不得行其志者憂而作此詩也此亦在位者直言以譏切時事與正月同旻天疾威敷于下土謀猶回遹何日斯沮謀臧不從不臧覆用我視謀猶亦孔之卭賦也旻閔恤之意説見雨無正敷布回邪遹僻沮止卭病也謀猶回遹則足以病國病國則民困即天之疾威也視謀猶之不臧而我已甚病則何待於禍敗之及哉此為大臣不任事而發然實王所為也無所歸咎故曰是天潝潝訿訿亦孔之哀謀之其臧則其是違謀之不臧則具是依我視謀猶伊于胡底賦也潝潝和也訿訿詆也同乎已者則以為是而潝潝然相和異乎已者則以為非而訿訿然相詆小人之好惡不公如此則謀猶不歸於臧而將何所底乎謂當止於善也此申言上章謀猶回遹之意我龜既厭不我告猶比也謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道賦也龜厭不告以比賢者不樂告以善道也蓋以初筮之誠則告若二三其德則厭而不告矣謀夫孔多二三孰甚焉發言盈庭即謀夫之多也中無執咎之人如卜無初筮之誠此所以龜不告猶而謀用不集也行邁謂曽經行路之人也欲行路則問經過之人可也若非問於經過之人則何得於道路之事哉此言人當自任其咎以求老成練事者而與之謀則謀臧矣哀哉為猶匪先民是程匪大猶是經維邇言是聽維邇言是爭如彼築室于道謀是用不潰于成賦也先民古聖賢也程法猶道經常也邇言謂非逺圖也潰遂也築室而謀於道傍之人即古語所謂作舍道傍三年不成也此申言上章之意國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾如彼流泉無淪胥以敗賦也艾音又止定靡定謂搖也膴大靡膴謂少也皆以喪亂之餘言聖否分屬於國哲謀肅艾分屬於民皆互文也聖哲謀肅人即洪範五事之德也淪沒也此言國有賢人可用而謀不患於不臧也若不信賢人而使不賢者為之則不肯任事謀皆不臧而必至於敗如流泉之不反矣愚不肖皆受其敗故曰淪胥不敢暴虎不敢馮河人知其一莫知其他戰戰兢兢如臨深淵如履薄氷賦也馮音憑暴虎徒搏馮河徒涉戰戰恐也兢兢戒也臨深恐墜也履氷恐陷也暴虎馮河禍之在目前者也如勇於任事而觸主怒忤權姦不過目前之禍耳目前之禍人皆知之而其他禍之隱於無形則人不知也故又曰當戰戰兢兢而不可有一時之忽也如此然後能夙夜匪懈而免於淪胥之敗矣小旻六章三章章八句三章章七句按蘇氏曰小旻小宛小辨小明四詩皆以小名篇所以别其為小雅也其在小雅者謂之小故其在大雅者謂之召旻大明獨宛辨闕焉意者孔子刪之矣雖去其大而其小者猶謂之小蓋即用其舊也竊謂宛辨之在大雅者蓋秦火後之所亡非孔子刪之也既為孔子所刪則小旻小明何必復加小字且未刪之前未便即有小大之别而孰為之預以名篇邪小宛經旨曰亂世兄弟懼以無辜致罪而相戒以免禍之詩集傳以為大夫所作則孝親教子之人而癲寡握粟得非士之貧者歟宛彼鳴鳩翰飛戻天興也我心憂傷念昔先人明發不寐有懷二人興意宛小貌鳴鳩小物不能高飛然亦有時而飛至於天陸農師曰勉強故也以鳴鳩起興蓋取勉強自強之意明發至旦而光始發也二人謂父母即先人也懷二人則必敬身而能全歸矣人之齊聖飲酒溫克彼昏不知一醉日富各敬爾儀天命不又賦也齊整肅也聖通明也克勝也一醉專務酣飲也富益也飲酒至醉者多剛暴故以溫克為良敬爾威儀所以求溫也此言欲守身以事親者莫先於戒酒也中原有菽庶民采之賦也螟蛉有子蜾螺負之興也教誨爾子式榖似之興意中原曠地非八家所受之田也菽大豆也當原之中有菽而庶民皆得采之以明人知禮義則風俗美而利均於人也蜾螺舊説以為負螟蛉之子而七日化為己子以喻人之可化而為善也式用榖善謂當教訓其子使以善似續其先業也題彼脊令載飛載鳴興也我日斯邁而月斯征夙興夜寐無忝爾所生興意題大計反題視也脊令即常棣之脊令但彼以在原言此以飛言也而汝也我長故以日計而幼故以月計日邁月征言老將至也所生即父母勉其當及時為善而不可自怠以辱二人也交交桑扈率場啄粟比也哀我填寡宜岸宜獄握粟出卜自何能榖賦也交交往來之貌桑扈竊脂也俗呼青雀嘴曲食肉桑扈夲食肉不食粟之鳥而率場啄粟以比肉食者盡剝民財之意填與癲同病也宜者難免之辭岸亦獄也韓詩作犴鄉亭之繫曰犴朝廷曰獄言上既剝民則民不堪命癲寡之人不能償其所征則必不免於岸獄於是握粟出卜以求自善之道其心之不安甚矣此言貧無以自容也溫溫恭人如集于木惴惴小心如臨于谷戰戰兢兢如履薄氷賦也人溫恭則能免禍恭者不敢怠忽之意以溫為恭即前章所謂敬爾儀而溫克也如此則人皆愛之而得其蔽蔭如集木下矣惴惴小心如臨于谷蓋恭人之功夫也功夫惟其敬謹常溫故能有所蔽蔭言不可不敬以勉於溫也舊説以集木為恐墜則在木上當云升于木矣今曰集則聚於木下之辭也小宛六章章六句小辨經旨曰舊説幽王娶於申生太子宜臼後得褒姒而惑之信其讒黜申后逐宜臼宜臼之傅知其無罪而閔之故述太子之情而為之作是詩也竊謂宜臼立為平王蓋昏庸之主也夲無慈孝之實德安能作此詩乎故説者謂其傅所作則人子哀怨之情孟子所謂小辨之怨親親也豈他人所能代言哉意作詩者必有怨慕真切之心而不能自己者方可以語於此朱子於辨説蓋嘗疑其為放子之作而不必其為宜臼也以今觀之蓋信然矣然必士大夫家父子間之正論故以列於小雅蓋小辨之名孟子時已有之以在小雅而謂之小耳辨彼鸒斯歸飛提提比也民莫不榖我獨于罹何辜于天我罪伊何心之憂矣云如之何賦也辨加於首者也鸒鴉也提提前領後之貌鴉之歸飛則一領於前如辨而群鴉從之若前者有所提携也以喻子為父逐而不得隨父提携以歸也何辜于天我罪伊何非謂無罪也蓋自反其不得於父之罪如舜父母之不我愛於我何哉之意也云如之何謂無可奈何而惟欲待其父之感悟也此章言其以不得乎親為憂而無以解也踧踧周道鞠為茂草比也我心憂傷惄焉如搗假寐永歎維憂用老心之憂矣疢如疾首賦也踧與論語踧踖之踧同踧踧不寧之貌言行於大道之中已踧踖不寧至其窮盡之處皆為茂草則無路可行矣以比未逐之時猶不敢肆况於已逐則無可往也如搗忽然心驚也假寐不脫衣冠而寐於恍惚之中也假寐而亦長歎則以憂而易於老矣疢如疾首申言其憂如此此章言行無可往而不能不憂也維桑與梓必恭敬止興也靡瞻匪父靡依匪母不屬于毛不離于裏天之生我我辰安在興意桑梓二木名古者五畝之宅樹之墻下以遺子孫桑以治蠶食梓以具器用言桑梓父母所植亦必恭敬豈有父母之身而敢慢乎瞻者尊而仰之依者親而倚之瞻依莫非父母則無時而不慕也屬連也毛體膚之餘氣也離合也裏腹心之在內者也天性之親本通一氣然父母之不我愛豈果不親哉特我生不辰不得逄其親愛之會耳此言其怨慕之情惟欲盡孝以待其愛也觀下章言君子信讒則逐子者父所主也連言父母者以其恩同併及之耳菀彼柳斯鳴蜩嘒嘒有漼者淵萑葦淠淠興也譬彼舟流不知所屆心之憂矣不遑假寐興意菀茂也漼深也淠淠盛也蜩微蟲也得依茂柳則嘒嘒而鳴萑葦賤草也得依深淵則淠淠而盛人無所依則如舟之流而無所底止矣不遑假寐即上章假寐永歎之意常歎則假寐亦不遑矣此章言其憂如窮人無所歸也鹿斯之奔維足伎伎雉之朝雊尚求其雌興也譬彼壞木疾用無枝心之憂矣寧莫之知興意伎伎舒貌雊雉鳴也壞傷病也鹿奔猶待其類雉鳴猶求其雌無不思其親者以興見逐而遲行號呌亦欲父母之相親也今父母不復追悔使我無親譬彼壞木疾用無枝矣則我心之憂誰知之哉此言父母不我愛而不知我親親之心也相彼投兔尚或先之行有死人尚或墐之興也君子秉心維其忍之心之憂矣涕既隕之興意先去聲投見逐而投人也先謂逐兔者未至而先脫之也行道路也墐埋也皆言其有不忍之心也君子指父而言忍即不我愛也此申上章莫知之意君子信讒如或酬之君子不惠不舒究之賦也伐木掎矣析薪杝矣興也舍彼有罪豫之他矣興意酬報惠愛舒緩究察也掎與倚同陸氏以為從後牽也杝與扯同錢氏以為手離也華谷嚴氏皆取其説伐木既以斧而又以繩牽之言必欲其斷絶也析薪既以斧而又以手離之言必欲其分離也皆夲不惠而言不惠即上章所謂忍也有罪者謂人所陷我之罪即其人之罪也舍者置而不問謂不察也不察其罪之所在而即以與之他人所謂信讒如酬者如此此與晉驪姬獻毒於君而以歸之申生事同惟父無愛子之心故讒言得以間之放子欲求父母之愛故惓惓於天性之親而不惠與忍則信讒之根故特推夲而言讒言得入之由欲其父之加察也加察則有愛心矣莫高匪山莫浚匪泉君子無易由言耳屬于垣賦也無逝我梁無發我笱我躬不閲遑恤我後比也莫高匪山言不必山然後為高也積讒而高即為山矣莫浚匪泉言不必泉然後為深也積讒而深即為泉矣然讒之所起惟纎微間隙耳父若少有不愛其子之言則聞之者必乘間而生讒其幾甚細而其發甚大故於言當慎也此雖若為言而發實夲其愛子之心矣然放子雖為父所逐其愛父猶不能自己也故指其代已為嗣子者而言無逝我之梁無發我之笱惟以幹家為事可也既而曰我躬不閲遑恤我後則又歎其既去而不能自為無可奈何耳當時必亦嬖妾欲以其子奪嫡而讒於其父故放子之言如此此章欲其父以親愛杜讒言之根而明已不忍去之意也小辨八章章八句小辨之怨本親親之仁與舜之怨慕一也但舜則夔夔齊栗以盡事親之道雖焚廪浚井屢瀕於死而不去初不知父母之有不是也故終致瞽瞍之底豫小辨之事不知其所終意者見逐而去心雖有憂不能如舜之兢兢致孝歟觀其卒章之言雖若惓惓有去後之慕而卒付之於無可奈何則其德量才猷有逺不及舜者故卒不能使父母之我愛耳否則後世之言孝何以獨推舜哉巧言經旨曰讒人在位隂使無位之小人伺察隱微以害賢者賢者遭讒無所控訴故作此詩也悠悠昊天曰父母且無罪無辜亂如此憮昊天已威豫慎無罪昊天泰憮豫慎無辜賦也曰父母者謂昊天為父母也憮大也已泰皆甚也慎者敬謹不取罪辜之意此言已無罪而遭讒口之為亂也亂之初生僭始既涵亂之又生君子信讒君子如怒亂庶遄沮君子如祉亂庶遄已賦也無實之言曰僭始者以其初發之端言也涵容如水之涵物漸漬而入也君子指王言怒與涵對涵故信不涵則怒怒讒言則必喜善人而有福祉矣故以祉訓喜有祉最為去讒之要惟有好賢之心則讒言不能進矣此言亂由於王之容讒也君子屢盟亂是用長君子信盜亂是用暴盜言孔甘亂是用餤匪其止共維王之卭賦也屢數也盟者邦國有疑則殺牲歃血告神以相要束也暴驟進也蓋讒暴之人不畏明誓雖欲自結於君使之無疑而要神以示誠信然實無誠也君心信之則資其以讒為亂之姦此亂所以因盟而益長也盜指讒人言甘則人嗜餤者食之進也止共猶言為人臣止於敬也讒人不忠則足以病國故曰維王之卭此言信讒之為害也奕奕寢廟君子作之秩秩大猷聖人莫之他人有心豫忖度之賦也躍躍毚兔遇犬獲之比也奕奕重疊貌宫室後曰寢前曰廟莫定也躍躍跳疾貌毚狡也作寢廟所以饗祖宗也定大猷所以立法制也皆王者治天下之規模也言治天下者規模宏逺如此必自順人心始故他人之心不可不默忖而度之也蓋賢者夲忠於國家而不察其心何以能成治功乎能度賢者之心則為有祉而讒言自退如毚兔遇犬必為所獲不勞王之餘力也王特不加意於賢者故人不敢犯小人耳此言去讒甚易而在於有好賢之心也荏染柔木君子樹之興也往來行言心焉數之蛇蛇碩言出自口矣巧言如簧顔之厚矣興意荏苒柔貌柔木桐梓之屬數計也蛇蛇委順貌柔木良材也君子當培植之不可使有牛羊斧斤之害也往來道路之言則無稽之讒言也當以心計之而不可盡信也不信讒言則可以養善類如樹柔木矣然言亦不難辨彼蛇蛇之碩言內正外順從口而出無所慚也若巧言則其心有怍而顔面之厚無所不隱忍矣以此别之則讒人之情狀豈能逃哉碩言但舉以起巧言非謂辨此兩等人也此章言辨讒言以扶善類也彼何人斯居河之麋無拳無勇職為亂階既微且腫爾勇伊何為猶將多爾居徒幾何賦也水草之交曰麋何人斯者明知居於河麋之小人而不斥言也此蓋為讒人伺察人短而知賢者隂事者云居河之麋則非邑中大族也拳力階梯也骭瘍為微腫足為腫既微且腫則居下濕之地而實有此病者也為猶將多謂其害人之謀將漸多也即此謀害人之事乃亂階也何必有拳勇而後為亂哉此章言聽使之小人不足慮所慮則有拳勇而為首惡者欲王之加察也巧言六章章八句何人斯經旨曰此詩究極讒人使人伺察之情莫能遁矣自詩序以來皆主蘇公刺暴公之説惟朱子辨其無據而以為未敢信其必然得經意矣彼何人斯其心孔艱胡逝我梁不入我門伊誰云從維暴之云賦也何人斯指伺察人者言也艱險孔艱言其設心甚險也梁橋也過我橋而不入我門見其意在伺察也暴即上篇亂是用暴之暴蓋指讒人之為暴者舊説因此遂附會之而誤為暴公也云語辭此言小人以伺察濟人之暴也二人從行誰為此禍胡逝我梁不入唁我始者不如今云不我可賦也從行伺察者從讒者行也誰為此禍以二人從行不可專指也唁弔失位也必賢者因讒而去位矣始者指為讒之初而言其時讒人猶不直言我之不可至今則直言耳蓋伺察之言入而濟之者多矣此言小人濟惡而禍益甚也彼何人斯胡逝我陳我聞其聲不見其身不愧于人不畏于天賦也陳堂塗堂下至門之徑也逝陳則入門內矣聞聲而不見其人以其忽然而去也伺察之態如此誠不愧于人矣天其可不畏乎不畏天所以敢於為惡也此言伺察者之欺天妄為也彼何人斯其為飄風胡不自北胡不自南胡逝我梁祗攪我心賦也飄風忽然而來言其來之疾不知所起也胡不自南自北言其何不從南北以去而復來也蓋既逝陳不見其身而去矣今又來逝我梁如飄風然則可疑而攪亂我心矣此言伺察者蹤迹詭變而可憂也爾之安行亦不遑舍爾之亟行遑脂爾車一者之來云何其旴賦也安徐舍止也盱張目而望也一者之來謂既逝陳而去今又忽然逝梁而來也當爾徐行之時亦不暇止况亟行而暇膏其車乎今乃忽然一來張目望我則佇立而少延矣果何為哉蓋欲窺覘而得其隂事也爾還而入我心易也還而不入否難知也一者之來俾我祗也賦也還謂又逝梁而一來也易平坦也否以我為不可也難知莫測也祗懼也言爾既去矣今又忽然還來盱目而視然不入我門也使還而入也其還為有所事知其無害我之謀而我心平易無恐矣今還而不入則爾必不以我為可豈能窺測爾心哉故今一者之來豈能不使我畏懼爾哉此言其忽然來盱之可畏也伯氏吹塤仲氏吹箎及爾如貫諒不我知出此三物以詛爾斯賦也伯仲兄弟之稱指二人從行者言塤箎俱樂器謂其如兄弟而相唱和也貫者以繩貫物之名謂相連屬也三物犬豕雞謂刺其血以詛盟也二人同聲唱和如塤箎然而事之次比又如繩之貫物彼此相連人固不得而間之矣然猶恐於人之異已者不盡力以相攻也於是又出三物以相詛盟而自固其黨欲力排之故言此誠不知我而以為有傾爾之心耳使能知之則亦何必至是哉此言讒人為謀之同而結黨之固也為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側賦也蜮短狐也江淮水皆有之能含沙射水中人影其人輒病而不見其形也靦者面見人之貌鬼蜮比伺察之人也言爾為鬼為蜮則不可得而見矣然乃人也人則有靦然之面目而能視人無有窮極謂其見人無不盡也由此觀之則人亦豈不知爾乎反側翻覆不正直之意言其邪辟之情皆能究之而不可欺人以自欺也此言小人之情狀不能掩如此何人斯八章章六句集傳謂此詩與上篇文意相似疑出一手但上篇先刺聽者此篇專責讒人耳竊意此篇所重乃是依附讒人而窺伺以濟姦者耳巷伯經旨曰巷伯者宫中永巷之長蓋寺人也時有孟子遭讒被宫刑為巷伯故作此詩而因以名篇萋兮斐兮成是貝錦比也彼譖人者亦已大甚賦也大音泰後凡大堪大苦並同萋錯雜貌斐文也貝水中介蟲也不可以為錦但以其背有錯雜之文有似於錦遂以錦名以比讒言起於疑似亦以見文致之意也大甚言成之而不可解也哆兮侈兮成是南箕比也彼譖人者誰適與謀賦也哆張口也侈張也箕詳見大東字義箕星也不可以為箕但以其口有開張之象而似於箕遂以名箕以見讒口之意適主也誰適與謀言必有主此謀者此上兩章皆言譖言成於疑似而可信也緝緝翩翩謀欲譖人慎爾言也謂爾不信賦也緝緝如績麻之端緒接續也翩翩如鳥飛之來往經營也捷捷幡幡謀欲譖言豈不爾受既其女遷賦也捷捷儇利貌幡幡反覆貌女遷謂轉而及女身也此上兩章戒其譖人之不可常也驕人好好勞人草草蒼天蒼天視彼驕人矜此勞人賦也好好以甚樂言也草草以苟活言也譖言得行所以驕人得志也若能察之則其遷及也不難矣此言人君不可保安驕人也彼譖人者誰適與謀取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊賦也投棄也豺狼屬似狗而長尾白頰其色黃有北北狄之地也投畀豺虎謂不使有生道也幸而得免於死則投畀有北謂不與同中國也又幸而得免以歸蓋其人生遭邪世得以苟容故從重以及於輕非謂物所共惡而不食不受也如此則無可奈何付之昊天而已此言譖言者得僥幸而苟免也楊園之道猗于畝丘比也寺人孟子作為此詩凡百君子敬而聽之賦也栽楊之園下濕之地畝丘則成畝可種麻菽之丘地之高者也猗倚也倚靠相接連之意楊園之道而猗于畝丘猶譖始於小臣之卑者而將上及於貴戚大臣也故作詩使敬聽之懼讒之上及而欲其謹於微也巷伯七章四章章四句一章五句一章八句一章六句記曰惡惡如巷伯以其情之真也惡惡而不如此詩亦難以感動人矣谷風經旨曰此朋友常有救患之功而為其所棄故作此詩習習谷風維風及雨比也將恐將懼維豫與女將安將樂女轉棄豫賦也谷風與邶谷風義同將且也恐懼謂憂患之時言暴風出於大谷而風雨交作以比事變之來也當其事變則惟我與同恐懼及事平而遂棄我矣習習谷風維風及頽比也將恐將懼置豫于懷將安將樂棄豫如遺賦也回風從上而下曰頽風之焚輪者也遺如行道遺忘物而不省存也習習谷風維山崔嵬無草不死無木不萎比也忘我大德思我小怨賦也大風摧物維山之高者崔嵬獨存而其山之草木無不萎死喻大患難也萎衰落也故舊無大故則不棄也况嘗同其患難者乎其棄友之人必可與同患難而不可與同安樂者此詩雖未免有施勞之意然有大功而其友負之則非平日所以納交之意矣君主於責善而無望報之心則亦可以為怨而不怒也否則全出於計較之私何足取焉谷風三章章六句蓼莪經旨曰父母棄背孝子追悼之而作此詩也舊説民人勞苦孝子不得養其親則詩中未見有此意耳蓼蓼者莪匪莪伊蒿比也哀哀父母生我劬勞賦也始生為莪長大為蒿莪猶可食其後為蒿則無用矣喻父母生育我身至於長大乃成無用之子此孝子自怨之辭也蓼蓼者莪匪莪伊蔚比也哀哀父母生我勞瘁賦也蔚亦莪長之名比蒿又粗大矣此上兩章孝子自言喪其父母所賦之良心不能成立而無以報父母之恩也瓶之罄矣維罍之恥比也鮮民之生不如死之久矣無父何怙無母何恃出則銜恤入則靡至賦也瓶小罍大皆酒器自罍而酌之於瓶者也蓋人之得生理以生者皆父母之所賦人子喪其良心不能自盡則若父母不能成其子者如瓶罄而罍恥也父母尚在則猶得以資其教訓而成然後可以言報也鮮民者華谷嚴氏以為單獨之民無父母者是也父母既死則無以資之成德生理既盡不可為人雖生無益故曰不如無生自上庇下而言則曰怙自下倚上而言則曰恃其實一也互言之耳銜恤抱永恨也靡至者無歸也此皆言生不如死之意父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之德昊天罔極賦也生得其生氣也鞠窮也母之保子無不盡也此分言父母生鞠之恩下乃總言之拊初生時拊摩之防其驚也畜乳之如畜初生也養謂順其性無所撓也長謂能就口食則哺之也育謂當寒暑時則近身而覆育之也顧謂行戲於地時去之而反顧也復謂顧之又顧不能暫捨也腹謂出入常置之於懷抱也此章曲盡父母愛子之情而恩之所以難報也南山烈烈飄風發發興也民莫不榖我獨何害興意烈與冽同言氣之寒也鄭氏曰烈烈猶栗烈也發發疾貌此皆慘酷之意以喻天降毒害而使父母終也南山律律飄風弗弗興也民莫不榖我獨不卒興意律律猶烈烈弗弗猶發發蓋烈與律發與弗皆聲相似也此兩章皆言天降慘酷之禍而使不得終身致孝也蓼莪六章四章章四句二章章八句大東經旨曰周衰國亂無政京師之人絡繹使於諸侯道途困於供輸故東人怨而作此詩也序以為談大夫所作蓋未有據焉有饛簋飱有救棘七周道如砥其直如矢君子所履小人所視眷言顧之潸焉出涕賦也饛滿也簋盛黍稷之器客一斗二升詳見權輿字義此則以民間一簋之食而言也飱熟食謂黍稷也禮簋盛黍稷或曰飱蓋水澆飯也人旦則食飯夕則食飱救曲貌棘匕以棘為匕長樂陳氏謂廪人所概黍稷之匕也飱饛簋而匕用棘盛時富足者如此周道大道非謂適周之道也砥礪石言平也蓋盛時君臣志在足民食而已但從大道而行初無難事故以如砥如矢言之君子所履以行法於上小人所視以取法於下故民忘其功而不知誰之所為也今乃不然故回顧盛時而潸焉出涕也眷與眷同顧而回首也顧謂顧西周之盛非顧適周之道也潸涕下貌小東大東杼柚其空糾紏葛屨可以履霜佻佻公子行彼周行既往既來使我心疚賦也小東大東東方小大之國也周在西故諸侯之國為東杼持緯之梭也柚卷織之軸也杼柚空則人無衣矣然有葛屨亦可履霜雖奔走於寒月不足憂也惟佻佻之公子奉使適周往來絡繹無有已時此則使我心疾耳佻佻輕薄不耐勞苦之貌公子謂諸侯之子為大夫者以周人責禮於諸侯而諸侯使貴戚之卿修問無常期也則其禮物之徴科道途之供億皆取辦於民所以顧西周之盛而潸焉出涕者蓋在於此有冽氿泉無浸穫薪興也契契寤歎哀我憚人興意薪是穫薪尚可載也興也哀我憚人亦可息也興意冽寒意側出曰氿泉穫刈也契契憂苦也憚勞也載載以歸也當時民困於役蓋有穫薪不得載而浸於汍泉者故以起興謂使人得載穫薪以歸而少息其勞也東人之子職勞不來西人之子粲粲衣服舟人之子熊羆是裘私人之子百僚是試賦也東人諸侯之人也職專主也來慰撫之也西人京師之人也舟人私人皆夲西人言舟人為之駕遊戲之舟者而其子亦以熊羆為裘武服以熊羆為裳蓋武士之飾也私人謂夲無官職卑賤之屬也試用也謂得見用而列於百僚也此言西人與其從人皆美衣食祿而東人之所以困也或以其酒不以其漿鞙鞙佩璲不以其長維天有漢監亦有光跂彼織女終日七襄賦也鞙與娟同玉淨貌璲與瑞同古者君臣以瑞玉為佩漿酒之米汁相載者見周禮酒正此言西人至東國而東人或以酒燕飲之則彼不以為漿或以玉贈送之則彼不以為長蓋眇視之而欲責其禮之厚也無以給之而人亦無恤者惟天漢有光庶乎可以監視而織女三星跂然鼎足則終日七襄庶乎能成文章以助我之供億也此言東人不勝西人之誅求而欲求助於天也亦無所訴之辭雖則七襄不成報章睆彼牽牛不以服箱東有啓明西有長庚有救天畢載施之行賦也報章謂織之用緯一往一來相報而成章也睆明貌牽牛星名服駕也箱大車之箱也啓明長庚天畢皆星名行行列也有牛駕車可以載物而不服箱得日可久照以助勞役得畢可獲禽以供賔客而皆無實用但施之行列而已故因論織女而併及之歐陽氏曰雖有織女不能為我織而成章雖有牽牛不能為我駕車而載物雖有啓明長庚不能助日為晝俾我營作雖有天畢不能為我掩捕鳥獸維南有箕不可以簸揚維北有斗不可以挹酒漿維南有箕載翕其舌維北有斗西柄之揭賦也箕斗皆星名挹酌也翕猶張也揭高舉也箕以簸米斗以挹酒天有此星而無實用蓋承上章之意而言無所望於天也又言箕斗不惟不為東民之用而反若助西人以病民者見天運如此無可奈何也大東七章章八句四月經旨曰此必仕者之子孫為南國之州牧而為小人搆禍無所容身故作此詩也四月維夏六月徂暑先祖匪人胡寧忍子賦也四月周正建卯之月而六月則建巳之月也周之六月方將入暑而暑已先徂則秋氣之交太蚤而生意之逹遂窮此不仁之徴也先祖蓋嘗有功於國家者豈非人乎今亦不念之而忍於其子孫此指王而言也舊説以為無所歸咎之詞則孫之於祖豈可以匪人言之歐陽氏蓋嘗辨之矣秋日凄凄百卉具腓亂離瘼矣奚其適歸賦也腓草根瘇病如足之腓也秋日者午未申三月之日也物方長盛雖與申交未能殺物百卉不宜盡病也今至於具腓則政事嚴急之過也以嚴急之故而至於亂離之瘼則將何所適歸哉言無可往也卉以下章山有嘉卉例之可以兼木但此云具腓則止可以言草耳蓋卉散言之則草木宜有分通言之則皆謂之卉冬日烈烈飄風發發民莫不榖我獨何害賦也冬日酉戍亥三月之日也亥月雖漸寒而氣尚未冽氣冽而又飄風甚疾乃隆冬之候也而酉戍亥三月常如此焉則慘酷之過也民指在位者言榖善也蓋在位者小人衆而君子獨則小人得以安身自善而君子則受害矣上三章皆一意山有嘉卉侯栗侯梅比也廢為殘賊莫知其尤賦也栗梅美材也以比賢人而傷殘之賊害之則廢而無可用矣莫知其尤謂殘賊者之罪王不之知也相彼泉水載清載濁興也我日搆禍曷云能榖興意搆結也合成之意泉水夲清攪擾之而後濁一息則復清矣今小人日日搆禍則天下無復清時矣我何能安其身而自善乎此承上章言王不能知小人之罪則禍不止也滔滔江漢南國之紀盡瘁以仕寧莫我有賦也江漢詳見漢廣字義紀經帶包絡之意言江漢所以經紀南國其水滔滔泛濫下民墊溺所係而我仕其地以句宣之鞠躬盡瘁可謂有功矣而王不有其功略不記念所以忍使小人搆禍也匪鶉匪鳶翰飛戾天匪鱣匪鮪濳逃于淵賦也鶉大雕也鳶鷹類詳見旱麓字義鱣鮪説見碩人言魚鳥皆能逺害自全今不能高飛逺逝則無所逃於小人之搆禍矣山有蕨薇隰有杞桋興也君子作歌維以告哀興意蕨薇説見草蟲杞枸杞詳見四牡字義桋當作荑如自牧歸荑之荑故曹氏從荑解而曰茅始生也蕨薇杞荑皆可食者既無可往而於山隰之間采此四物以為食如伯夷食薇四皓茹芝之類則遁山林而無所用於世矣此情之可哀者也故作詩以告之庶幾知我抑鬱之情耳四月八章章四句詩説解頥正釋卷十九
