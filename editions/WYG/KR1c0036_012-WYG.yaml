body:
  text: 詩説觧頥正釋卷十明季本撰唐鄭氏詩譜曰唐者帝堯舊都之地今曰太原晉陽是堯始居此後乃遷河東平陽成王封母弟叔虞於堯之故墟曰唐侯南有晉水至子爕改為晉侯其封域在禹貢冀州太行恒山之西太原大岳之野至曽孫成侯南徙居曲沃近平陽焉華谷嚴氏曰成王封弟叔虞於堯之墟曰唐侯其子爕以晉水所出改為晉侯晉陽實晉水所出則唐叔虞之始封在晉陽矣唐以堯得名晉以水得名其地一也晉之遷徙不一歴歴可考自叔虞始封於晉陽其後三世至成侯自晉陽徙曲沃八世至穆侯自曲沃徙絳十世至昭侯自絳徙翼自昭侯以曲沃封桓叔至其孫武公併晉又自曲沃徙絳集傳曰其地土瘠民貧勤儉質朴憂深思逺有堯之遺風焉其詩不謂之晉而謂之唐蓋仍其始封之舊號耳今按經之所録必唐時詩非晉後詩也故以唐名而今亦非舊次矣晉陽即今太原府治曲沃今為觧州聞喜縣絳翼俱在翼城縣東南屬平陽府蟋蟀經㫖曰國人乗農隙燕樂而不敢過於荒也故作詩以警戒之如此蟋蟀在堂嵗聿其莫今我不樂日月其除無已大康職思其居好樂無荒良士瞿瞿賦也嵗暮云者即􅃎風七月所謂十月蟋蟀入我牀下曰為改嵗之意也除去也大康過於樂也職主也瞿瞿懼貎即無荒之意惟良士能之欲取以為法也蟋蟀在堂嵗聿其逝今我不樂日月其邁無已大康職思其外好樂無荒良士蹶蹶賦也外餘也謂思慮之所不及者蹶蹶恐有顛蹶而以為懼也蟋蟀在堂役車其休今我不樂日月其慆無已大康職思其憂好樂無荒良士休休賦也役車庶人収納禾稼之車即牛車也詳見大車字義慆過也休休以安為念亦懼意也集傳釋此似未盡耳蟋蟀三章章八句山有樞經㫖曰此刺儉而不中禮之詩非謂可以及時而樂也與前篇蟋蟀之指大不侔集傳以為答前篇之意失之逺矣山有樞隰有榆興也子有衣裳弗曵弗婁子有車馬弗馳弗驅宛其死矣他人是愉興意婁音縷樞荎今刺榆也為茹美滑榆種頗多但皮理異耳此與樞對則榆之白而為枌者故陸璣遂謂榆為白枌也曵拖地也婁曵而至於褸裂也宛坐見貎愉樂也山有栲隰有杻興也子有廷内弗洒弗埽子有鐘鼓弗鼓弗考宛其死矣他人是保興意栲山木也爾雅謂之山樗陸璣則以為誤而曰栲葉如櫟木皮厚數寸可為車輪或謂之栲櫟杻檍也葉似杏而尖色白皮正赤多曲少直材可為弓弩幹廷内謂堂寢也洒埽以水濕地而掃之也考擊也保居而有之也山有漆隰有栗興也子有酒食何不日鼓瑟且以喜樂且以永日宛其死矣他人入室興意君子無故琴瑟不離於側故曰日鼔瑟人多憂則日短惟飲食作樂可以永長此日也華谷嚴氏謂來日已短宜及今作樂以引延此日非也此篇以山有樞栲漆隰有榆杻栗興子有衣裳車馬廷内鐘鼓酒食相應惟在有字大意言天地變化草木蕃未嘗閉而不發也人於衣服車馬宫室噐具飲食凡禮所當為者乃皆閉而不用徒自憂苦畧無隨時自得之意何哉惟其富而不好禮故鄙吝至於如此耳故詩以刺褊狹固陋之人則可若以為人不可不及時為樂則将使人荒寜自肆非所以為訓矣山有樞三章章八句揚之水經㫖曰此諸侯訪賢者於其所居之地而咨其密謀之詩也舊説以為國人将叛歸桓叔而作則害義傷教之甚不可以為訓矣揚之水白石鑿鑿興也素衣朱襮從子于沃既見君子云何不樂興意鑿鑿巉巖貎素衣朱襮諸侯自言其所服也此中衣以布為之素衣而露襮則袒而見美矣子指賢者即君子也沃賢者所居之地揚之水白石皓皓興也素衣朱繡從子于鵠既見君子云何其憂興意皓皓㓗白也繡襮之繡領也鵠亦賢者游息之地蓋其所居在沃而游息或在鵠也揚之水白石􅉿􅉿興也我聞有命不敢以告人興意􅉿􅉿水流石間而有􅉿也命賢者之教命也此篇皆以水石起興蓋指賢者所居水石之間又以見其悠揚之中常存剛介也諸侯親至其地而訪之以得見為幸及聞其教命但中心藏之而不敢以告人蓋賢者因諸侯求見之誠而其言痛切時弊諸侯恐其為人所忌故不敢泄也非真心求治者能如是乎揚之水三章二章章六句一章四句椒聊經㫖曰此美徳盛而致宗族蕃衍也小序以為君子見沃强盛知其蕃衍則桓叔之簒竊何足以語碩大之徳哉辯説固已不信其然矣椒聊之實蕃衍盈升比也彼其之子碩大無朋賦也椒聊且逺條且比也椒𣗳似茱茰有針刺其實味辛而香烈聊語助辭盈升一捋即盈升言其多也逺條長枝也之子指君而言碩大者推親親之愛以及於人而成其大徳也無朋者言其無朋比之私也椒聊之實蕃衍盈匊比也彼其之子實大且篤賦也椒聊且逺條且比也篤厚也言徳積之厚也此詩以椒實比宗族之蕃衍而言其君有碩大之徳所致故又即椒聊而嘆之以條之逺者明其蕃衍也椒聊二章章六句綢繆經㫖曰此女悦男之詩亦淫風也綢繆束薪三星在天今夕何夕見此良人子兮子兮如此良人何賦也綢繆猶纒綿也良人指男子子女子自稱也綢繆束芻三星在隅今夕何夕見此邂逅子兮子兮如此邂逅何賦也芻草也邂逅不期之㑹女遇男而悦也綢繆束楚三星在户今夕何夕見此粲者子兮子兮如此粲者何賦也户室户也粲舊説以女三為粲故指女言竊意男子亦可以為粲如束晢補亡詩所謂粲粲門子是也束薪芻楚以綢繆其所居上可以見三星則非富家深密之室矣詳觀詩意當是滛風也綢繆三章章六句杕杜經㫖曰此詩之意欲人厚於兄弟而篤親親之恩非真無兄弟而自傷其孤特也但不知其何所指耳有杕之杜其葉湑湑興也獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉興意比毗志反後凡親比之比並同杕特生也杜赤棠也説見甘棠湑湑潤澤貎踽踽無所親貎行之人非同父也比親也佽助也有杕之杜其葉菁菁興也獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉興意菁菁茂盛貎睘睘無所依貎同姓以同宗言亦謂兄弟也行之人非同姓也言杕杜雖特生亦有湑湑菁菁之葉以庇本根人苟獨行而無兄弟則無庇矣見人不可無兄弟也非兄弟則為行路之人矣行路之人相遇何嘗相親比乎其所以不相比者正為人之無兄弟者不相助所以為行之人也此即常棣所謂雖有良朋况也永歎之意杕杜二章章九句羔裘經㫖曰此國人羙大夫能順民心而為治也羔裘豹袪自我人居居豈無他人維子之故賦也袪詳見遵大路字義居居各安其所也羔裘豹褎自我人究究豈無他人維子之好賦也褎與䄂同究究各盡其分也好言其善也大夫治民能順所欲故國人稱之曰服此羔裘者從我所欲而為治故人人各安其所各盡其分而他人之分治者亦體大夫之意而皆有恩及人故曰豈無他人然皆大夫之所倡率也故特歸美焉羔裘二章章四句鴇羽經㫖曰民困於征役而不得以飬其父母故作此詩以叙其無所控愬之情也觀王事靡盬之言意其當為王風而誤入於唐耳肅肅鴇羽集于苞栩比也王事靡盬不能蓺稷黍父母何怙悠悠蒼天曷其有所賦也肅肅羽聲鴇鳥名似鴈而大無後趾集止也苞叢生也栩柞也非櫟也詳見綿字義鴇本水鳥性不𣗳止以下無可棲之地而集於苞栩之上如易所謂鴻漸於木或得其桷以比民之性本欲安居而久勞征役急於求息也王事以周室言盬從監從古乃監視古昔之義靡盬則視古不若謂世道之亂也怙恃也謂恃子以養也無所控愬則歸之天而已後二章義同肅肅鴇翼集于苞棘比也王事靡盬不能蓺黍稷父母何食悠悠蒼天曷其有極賦也棘小棗極所至之處也肅肅鴇行集于苞桑比也王事靡盬不能蓺稻粱父母何嘗悠悠蒼天曷其有常賦也行列也常復其常也黍稷稻粱詳見七月字義鴇羽三章章七句無衣經㫖曰此羙賢士在下位者徳稱其服之詩也豈曰無衣七兮不如子之衣安且吉兮賦也豈曰無衣六兮不如子之衣安且燠兮賦也七六皆受命之數按周官典命侯七命王之卿六命内外之爵惟上公九命王之公八命然異數不常加人也故舉侯之七命卿之六命者以言其服之為貴耳凡輿服等威上得以兼乎下故七命者得服七等之衣六命者得服六等之衣蓋畿外之侯畿内之卿受天子之命其貴至於七六之數而服其服者亦常有之但不如子之安而吉且燠耳蓋賢者徳稱其服其心無愧也子必指賢而在下位者今亦不知其的為何人矣無衣二章章三句有杕之杜經㫖曰此寒士好賢真切之詩也集傳得之序以此亦為刺晉武公而作可發一笑唐風不過十二篇而連及曲沃武公者十居八九豈其國止有武公可言邪其識之陋亦甚矣有杕之杜生于道左比也彼君子兮噬肯適我中心好之曷飲食之賦也飲音䕃食音翤後凡取飲之食之之義者並同杕杜獨生道旁言其䕃不足以休息以比己之寡弱不足以致賢者也噬發語辭有杕之杜生于道周比也彼君子兮噬肯來遊中心好之曷飲食之賦也周曲也有杕之杜二章章六句葛生經㫖曰此婦人以其夫征役或至䘮亡而誓死以守之之詩也程子以為此詩思存者非悼亡者而華谷嚴氏則直以為悼亡今觀詩意角枕錦衾之粲爛夏日冬夜之懐思豈悼亡者之所宜言乎但曰予美亡此則知其或已䘮亡而心猶冀其歸也其情亦可哀矣葛生蒙楚蘞蔓于野比也予美亡此誰與獨處賦也蘞草名似栝樓葉盛而細葛蒙楚而蘞蔓野以比己死則覆楚葬野之意予美亡此者謂其夫或䘮亡也誰與獨處程子曰誰與乎獨處而已葛生蒙棘蘞蔓于域比也予美亡此誰與獨息賦也域瑩域指墓而言蓋婦已期於死矣角枕粲兮錦衾爛兮予美亡此誰與獨旦賦也角枕猶言角巾言其方也粲爛皆華美鮮明之貎獨旦獨處至旦也角枕錦衾非縞素之服故不可言於夫亡夏之日冬之夜百嵗之後歸于其居賦也夏日冬夜言其永也居以墳墓言冬之夜夏之日百嵗之後歸于其室賦也室以塚壙言葛生五章章四句采苓經㫖曰此賢人被䜛退隱首陽而作此詩也采苓采苓首陽之巔人之為言苟亦無信舍旃舍旃苟亦無然人之為言胡得焉賦也舍音捨後凡捨置之舍並同苓即簡兮隰有苓之苓首山名即禹貢雷首在平陽府蒲州東南山南曰陽巔山頂也苟猶言或者不敢必焉之辭也旃之也苟亦無然蒙上三句之意采苦采苦首陽之下人之為言苟亦無與舍旃舍旃苟亦無然人之為言胡得焉賦也苦即邶谷風荼苦之苦與許也采葑采葑首陽之東人之為言苟亦無從舍旃舍旃苟亦無然人之為言胡得焉賦也葑即邶谷風采葑之葑賢人被䜛隱於首陽而言采苓采苦采葑以供食亦無不樂但人之為言或有不可信者謂不必其皆實也若舍之而或不以為然則人之為言豈有得行者哉正以其必可信而畧無所疑故人得以行其言耳不為必然之辭而曰苟者不敢自决其無招謗之實而欲人之少加察也婉而不迫亦可見其心氣之和平矣采苓三章章八句詩說解頥正釋卷十
