body:
  text: 詩說解頥正釋卷十四明季本撰豳豳孟子作邠唐開元間改豳州為邠州今屬西安府朱子曰豳國名在禹貢雍州岐山之北原隰之野虞夏之際棄為后稷而封於邰及夏之衰棄稷不務棄子不窟失其官守而自竄於戎狄之間不窟生鞠陶鞠陶生公劉能復脩后稷之業民以富實乃相土地之宜而立國於豳之谷焉十世而大王徙居岐山之陽十二世而文王始受天命十三世而武王遂為天子武王崩成王立年㓜不能涖阼周公旦以冢宰攝政乃述后稷公劉之化作詩一篇以戒成王謂之豳風夫豳文武以前之國也不列於周召之南其詩冝為周公在成王時所述别為一類但特以豳名則必舉一國所存之風而録之當不止七月一篇而已竊意篤公劉豐年載芟諸篇皆為豳詩先儒亦多以為然惟公劉則以為召康公所作恐周公述豳風不宜遺此遷豳之始事也但其中有為祭祀而作者則豳之頌也有為勸戒而作者則豳之雅也本有雅頌而併目為風則所重在備一國之風矣周禮籥章云凡國祈年于田祖吹豳雅擊土鼓以樂田畯祭蜡吹豳頌擊土鼓以息老物但言豳雅豳頌而不言豳風故程大昌遂以此為詩有二南雅頌而無風之證然籥章上言逆暑迎寒皆曰擊土鼓而吹豳詩則不知所謂豳詩者何所指邪竊意周太師采詩之時於列國之風必併其雅頌而名之此亦采陳國風之通例也而謂詩本無風可乎鄭氏以七月一篇自具三體分析殆及公子同歸以上為豳風以介眉壽以上為豳雅萬壽無疆以上為豳頌則穿鑿甚矣至於鴟鴞以後皆周公事也亦混為豳風而所謂豳雅豳頌者反有遺焉蓋不止公劉豐年載芟三章而已則七月一詩既以戒成王而作則為正論雖附於雅可也而何必特列一國邪豳非時王所採之風特列於諸國之後亦猶商頌非時王之頌而列於魯頌之後也歟舊說以不窟為稷子非也詳辯於公劉篇下七月經㫖曰豳人以農桑為業以忠愛為心故作此詩以自序其勤力誠心之事也舊說以為周公遭變而陳王業之艱難蓋陳其言以告成王云耳非謂此詩為周公作也若特作此詩則告君之正言宜為大雅而安可列於風邪惟其豳人所自作故其序月皆以夏正七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒嵗三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜賦也七月建申之月也一之日建子之月也或言日或言月者日主陽月主隂故子丑寅夘辰巳六陽辰皆以日言午未申酉戌亥六隂辰皆以月言交互成文而天時之始子夏正之始寅具可見矣餘見後四月秀葽字義火大火心星也以六月之昏加於地之南方至七月之昏則下而西流矣見豳人之慮寒豫於暑退之月也至九月霜降始寒而蠶績之功亦成乃授人以衣而使禦寒也觱發風寒也栗烈無風而氣寒也褐毛布賤者之服也嵗與後章十月改嵗之嵗同嵗始於子而終於亥婦功以成衣為終一嵗之事故十月即為卒嵗不必主寒退言而至夏正之寅月然後為改嵗也耜田噐所以起土于耜言徃脩田噐也舉趾舉足趾而耕也我家長自我也饁餉田也田畯田大夫勸農之官謂之司穡即穡夫也家長與其婦若子饁於南畝所以田畯見其勤而喜之此章前段言治衣先事之慮見其以衣為急也後段言治田同出之勤見其以食為急也農事惟此數言已盡大意故後章申言之說但以急於民事及農隙慶勞為義而於女工則此章未備下章始詳言之七月流火九月授衣春日載陽有鳴倉庚女執懿筐遵彼㣲行爰求柔桑春日遲遲采蘩祁祁女心傷悲殆及公子同歸賦也載鄭氏訓則諸家多從之而集傳以為始其義異也倉庚鳴時將蠶之候也懿筐筐之羙者也㣲行小徑避人通行之路也蘩所以生蠶今人洗蠶種尚用之蠶之新出者女執懿筐而求穉桑以飼之蠶之未出者女則采蘩以洗之令其易出祁祁或以為衆多或以為舒緩集傳每從衆多之說竊意訓舒遲者為長傷悲者治蠶為昏嫁之備所以衣其夫恐公子來親迎時將别離父母與之同歸故因蠶事之始而即有所傷感也古者公子娶於國中而貴家大族連姻公室者無不力於蠶務故云然言公子特舉其貴者耳其餘齊民皆可類推矣未嫁而即以衣夫為念見女心之専一而當時父母所以教其女者亦惟此而已七月流火八月萑葦蠶月條桑取彼斧斨以伐逺揚猗彼女桑七月鳴鵙八月載績載𤣥載黄我朱孔陽為公子裳賦也萑葦詳見碩人字義萑葦以八月成而預收蓄之以為曲薄也蠶月治蠶之月也臨川王氏曰治蠶非一月故不指言某月華谷嚴氏曰桑之髙大者其枝條逺而揚起人手所不能及故取斧斨以伐其條然後就地采其葉而棄其條所謂條桑也桑性伐而始茂故條桑女桑乃桑之低小者猗倚也倚取之不斬其條但就𣗳以采其葉也上章柔桑乃桑葉之嫩者嫩葉始生未多故以筐求之養新出之蠶耳蠶有新出者又有未出者故同采蘩言之皆言蠶事之始也此章女桑乃桑樹之小者大樹既條取之小樹又倚取之蠶已大食故桑之大小取之無遺蓋言蠶事之成也鵙伯勞也績緝也謂績麻也陽明也集傳云蠶事既備又於鳴鵙之後麻熟可績之時則績其麻以為布而凡此蠶績之所成者皆染之或𤣥或黄而其朱者尤為鮮明皆以為公子之裳也今按為公子裳本殆及公子同歸而言即所謂昏嫁之備衣其夫者也若諸侯則夫人親蠶以供之不必以此為供上而託言公子也此上二章皆言蠶績之事以終首章前段無衣之意四月秀葽五月鳴蜩八月其穫十月隕蘀一之日于貉取彼狐狸為公子裘二之日其同載纉武功言私其豵獻豜于公賦也穫謂禾之早者可收也言其則非盡然之辭隕落也落葉謂之蘀鄭氏曰秀葽也鳴蜩也其穫也隕蘀也四者皆物成而將寒之候物成自秀葽始今按西北地寒非狐貉之厚不可以居而其民當取狐狸之皮以為裘故先言氣候之將寒以起之也貉似狐善睡其子名貆貉賤故禮但言狐裘于貉徃摶貉也蓋一之日農工已畢而民間私取狐狸之皮為公子裘與上章為公子裳義同以女功言也既為公子裳又為公子裘可見當時連姻公室者其遣嫁之衣服亦甚備而皆民力之所自致矣同者國之大狩也說見大叔于田纉習而繼之也本為講武而狩故曰纉武功也豵獸之小者豜獸之大者非豕也詳見騶虞字義及還因講武而以所得之獸小者則私之而大者則獻于公以寓尊君親上之義焉蓋豵與豜皆有皮可以為冠屨而有毛可以為褐備褐則又足以禦賤者之寒也此章專言狩獵以終首章前段無褐之意五月斯螽動股六月莎鷄振羽七月在野八月在宇九月在户十月蟋蟀入我牀下穹窒熏䑕塞向墐户嗟我婦子曰為改嵗入此室處賦也動股始躍而以股鳴也振羽能飛而以趐鳴也宇屋之四垂謂簷下也在野在宇在户從逺而至於近也入我牀下自外而入於内也暑則在外寒則依人此見蟋蟀之知寒也穹空之也窒塞也謂室中為土所堆塞處空之使可居也熏䑕使之出而不能存也向者北出牗也北牗通風故塞之墐􅂗也户蓽户也庶人以荆竹織之謂之蓽户亦以通風故墐之嗟閔嘆之辭改嵗謂嵗事畢而不必出冐大寒也此章以物類感寒氣之至而閔婦子終嵗之勤故因其事畢而處之密室以息其勞蓋終上章禦寒之意而見其有慈㓜之心也六月食鬰及薁七月亨葵及菽八月剥棗十月穫稻為此春酒以介眉壽七月食𤓰八月斷壺九月叔苴采荼薪樗食我農夫賦也斷音短食我之食音嗣後凡此類並同剥落謂擊而落之也介助也眉壽者年老有毫眉秀出也鬰薁葵菽棗其品稍嘉老者之時食也至於十月穫稻則釀為春酒以養和而眉壽有所助矣𤓰荼常蔬壺樗賤物苴亦麤食在田則食𤓰斷壺既叔苴則采荼薪樗以供食而農夫有所資矣稻與苴皆可食而精麤異稻言於眉壽苴言於農夫長少貴賤之節也此章見養老恤農之意九月築場圃十月納禾稼黍稷重穋禾麻菽麥嗟我農夫我稼既同上入執宫功晝爾于茅宵爾索綯亟其乗屋其始播百榖賦也宫者合院之内以所居五畝之宅言也自田而上故曰上入于茅徃取茅也索繩也綯絞也言絞索也乗升也舊說以執宫功為執公室之役則公宫必不以茅蓋以索縛也而索綯以宵亦非經始勿亟之義且古者用民之力嵗不過三日其制有常必不久役也何妨於播榖而曰亟乗屋乎若以治二畝半在邑之宅則其制乃先儒之所妄分已辯於讀禮疑圖卷一五畝宅圖下矣此因上章治田為養生所資而言所以民俗自相警戒不待督責而急於治屋者蓋恐來春將復始播百榖以預計出田之蚤也乗屋但以茅蓋屋而絞索以縛之為終嵗計耳與前章冬月塞向墐户而入處於室者自不相妨也二之日鑿氷冲冲三之日納于凌隂四之日其蚤獻羔祭韭九月肅霜十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬壽無疆賦也凌力證反鑿氷取氷於山以氷在窮谷則堅也冲冲鑿深貎凌隂氷室也蚤旦朝也韭菜名滌掃蕩也公堂君之堂也稱舉也疆竞也此章言豳君有志於民故以爕調為事而以用氷節陽氣之過故天時得正氣復嚴凝而九月肅霜也時和年豐至於十月則嵗功成而滌場矣於是蜡祭鬼神而黨正屬民以飲於鄉鄉大夫之與飲者飲畢則升公堂稱兕觥以祝壽如今鄉飲之謝恩然蓋非大夫不可以言升公堂見君以民樂為樂而人亦以其樂樂君也七月八章章十一句此詩所重在於衣食衣食足而後知禮義其敬老慈㓜尊君愛民之意藹然忠厚之風禮義之俗成而人心悅矣周之王業不基於此歟鴟鴞經㫖曰周公以管蔡流言之故作此詩以貽成王此說本於書之金縢誰能易之但金縢之書亦有錯簡故舊說皆以此詩作於管蔡既誅之後殊不知管蔡既誅何必復作此詩邪愚於書文已畧叙正辯見說理㑹編卷十書論下今以此詩言於管蔡未誅之前然後成王有所感動而周公得以致辟於罪人耳然以殷畔者孟子専言管叔則管叔者罪之首也詩意當有所歸重焉此周公告成王之詩宜當為大雅也鴟鴞鴟鴞既取我子無毁我室恩斯勤斯鬻子之閔斯比也鴟鴞詳見墓門字義本惡鳥攫鳥子而食者也室鳥自名其巢也鬻與育同養也此詩為管叔而作則鴟鴞當比管叔子當指百姓恩斯勤斯言忠愛勤勞王室也惟其忠勤所以閔百姓而養育之也迨天之未隂雨徹彼桑土綢繆牖户今女下民或敢侮予比也土音杜徹取也土韓詩作杜方言謂根為杜牖巢之通氣户其出入處也綢繆牖户正是愛䕶百姓處蓋言預備國家之意予手拮据予所捋荼予所蓄租予口卒瘏曰予未有室家比也拮持据拘謂以手拘持草也捋採取之也荼萑苕蓋茅穗之類可藉巢者也蓄積租聚卒盡瘏病也室家巢也此章言己勤勞作室之意予羽譙譙予尾翛翛予室翹翹風雨所漂摇予維音嘵嘵比也譙譙殺也翛翛敝也翹翹危也嘵嘵呌呼也此章言所以作詩哀鳴之意鴟鴞四章章五句集傳觧文義大抵得之所不同者以鴟鴞比武庚以子指管蔡耳東山經㫖曰周公勞東征之歸士而序其在途及歸家之情也勞歸士而為之道其情似亦當為王風耳我徂東山慆慆不歸我來自東零雨其濛我東曰歸我心西悲制彼裳衣勿士行枚蜎蜎者蠋烝在桑野敦彼獨宿亦在車下賦也敦都囬反後章同篇内凡言我者皆托以征夫言東山即魯之東山魯蓋古之奄國書所謂王來自奄即東征而歸之事也慆慆如水下流而不返也零落也濛細雨貎曰歸猶云言歸西西周也裳衣者平居之衣士與事同謂事其事也行陣也枚如箸衘之有繣結項中以止語也周公之東征未嘗用兵事戰特經畧及三年而後歸耳詳見說理㑹編卷十書論下久而不歸歸而遇雨在途以雨為苦見其時之愁慘也大抵軍士思家之情在久住之處猶或可忍歸心已動而未至則其情尤切故東歸矣而復言西悲也制裳衣以征役久而衣破敝欲更制之而自令勿復從事於行枚也烝升也自野而上升於桑也桑野在途所經見其為蠋所升則在家蠶桑必已廢業可知敦者獨處不移之貎獨宿車下言尚未歸也古者用車止則為營衛故士卒宿於車下身在外則不能治桑野之桑矣此言其在途思歸之切也我徂東山慆慆不歸我來自東零雨其濛果羸之實亦施于宇伊威在室蠨蛸在户町畽鹿場熠燿宵行不可畏也伊可懐也賦也首章四句言其徃來之勞在外之久故每章重言見其感念之深也果臝括樓也以夏正六月華七月實九月熟施延也蔓生故延施宇下也伊威壁間甕底所生小蟲也一名鼠婦室無人掃則有之蠨蛸小蜘蛛長脚者也一名蟢子户無人出入則有之町畽廬傍畦壠也無人治之故鹿以為場也熠燿明閃爍貎宵行蟲名如螢夜行喉下有光舊說以熠燿即螢宵行為夜飛但熠燿與下章熠燿其羽相戾故從董氏之說以宵行為似螢之蟲而以熠燿如下章之云然後於義為順也言室廬荒廢雖若可畏而不能已於懐思也華谷嚴氏以此言歸士無室家而以末章所謂其新者當之則鑿矣蓋雖有妻室在家而或有不盡掃除之屋耳我徂東山慆慆不歸我來自東零雨其濛鸛鳴于垤婦嘆于室洒掃穹窒我征聿至有敦爪苦烝在栗薪自我不見于今三年賦也鸛水鳥頭無丹項無烏帶似鶴不善唳但以喙相擊而鳴垤蟻塜也將隂雨則穴處者先知故蟻出垤而鸛就食之遂鳴于其上也將雨則恐行人不易至故婦以為嘆也洒掃洒地而掃穹窒說見七月皆以待夫之至也我征征夫自我也聿至謂忽然而至足以慰婦之思也𤓰苦苦𤓰也人所不取故敦然獨存栗薪者周土宜栗民家多種之而為苦𤓰升上者所蔓栗亦成薪矣蓋言其初歸感歎之情也金縢稱周公居東者二年此云三年者通徃來在途之數而言耳我徂東山慆慆不歸我來自東零雨其濛倉庚于飛熠燿其羽之子于歸皇駁其馬親結其縭九十其儀其新孔嘉其舊如之何賦也馬色有白處有黄處者曰皇馬色有駵處有白處者曰駁駵赤色也縭婦人帨巾也九其儀十其儀言儀之多也倉庚飛而羽熠燿昬姻之時也當此時女于歸者其新孔嘉但以起舊日之室家相見亦宜脩新昏之樂耳非必以新為歸士之未有室家者也其舊如何本上章婦嘆於室而言此則言其歸家遂願之情也以此慰勞見在上者之能體其意矣東山四章章十二句破斧經㫖曰此東征之士稱美周公之詩也集傳謂其答前篇周公勞己之勤則若出於有意而不見人心之自然矣自此以下四章皆當為王風既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將賦也斧斨詳見七月字義易旅卦註斧所以除荆棘四國四方之國毛氏以為管蔡商奄者非也就如其說亦不當以奄列其間蓋其時奄已封魯非叛國也而四國之叛者實商與管蔡霍耳皇齊詩作匡正也將大也既破我斧又缺我錡周公東征四國是吪哀我人斯亦孔之嘉賦也錡鑿屬吪化也化之而不殺也既破我斧又缺我銶周公東征四國是道哀我人斯亦孔之休賦也銶木屬遒聚也言不使離散失所也休言天下和平也華谷嚴氏曰詩人言兵噐必曰弓矢干戈矛㦸無專言斧斨錡銶者斧雖兵噐所用而與斨並言乃豳民所用以採桑者又錡為鑿屬銶為木屬以類言之知皆非兵噐矣周公奉王命以討罪有征無戰四國聞王師之至即窮蹙自守周公又遲之三年不為急攻之計故未嘗從事於戰陣惟行師有除道樵蘇之事斧斨之用為多歴時之久則必破故言但能破我之斧缺我之斨而已其兵噐元無損也蓋周公東征惟四國是正而已征者正也各欲正己也焉用戰彼雖自外於周周公一視同仁均為我民不忿疾之乃哀矜之周公之徳如天地之無不覆載豈不大哉今按周公之東征期以撫安其地從征之人必少雖有兵噐亦不用而所用以除道樵蘇者惟斧斨錡銶而已華谷之言可謂深得周公之意矣破斧三章章六句伐柯經㫖曰成王能觧流言之疑信用周公而東方頼以安靖故東人喜之而作是詩也伐柯如何匪斧不克取妻如何匪媒不得比也伐柯用斧以為東方徂征之比也得妻用媒以為金縢解疑之比也君之於臣猶夫之於妻故托妻為言伐柯伐柯其則不逺我遘之子􅇼豆有踐比也遘遇也因媒得妻故以遇言之子即指妻也踐行列也妻主中饋故以􅇼豆言此以比周公征東不假兵威而能綏之以徳蓋以身為本故曰其則不逺也俎豆之事則嘗聞之即􅇼豆有踐之意惟如此然後能折衝樽俎也蓋疑先釋而後志得行矣伐柯二章章四句九罭經㫖曰周公征東將歸而東人願留之故作此詩周公之歸事畢而歸非成王迎之也成王之迎不在東征之後辯見說理㑹編卷十書論下九罭之魚鱒魴興也我覯之子衮衣繡裳興意九罭九囊之網也鱒似鯉而鱗細眼赤魴說見汝墳九罭常網非大網也鱒魴常魚非大魚也但以九罭所遇者惟鱒魴興我之所遇則衮衣繡裳之周公見網羅豪傑得如周公者乃大網也此言周公不易得之意鴻飛遵渚興也公歸無所於女信處興意遵循也再宿曰信渚鴻所居飛則不定也故得至此地信處鴻飛遵陸興也公歸不復於女信宿興意髙平曰陸陸鴻北向則歸而不復矣言周公既歸則留王室而不復來東也是以有衮衣兮無以我公歸兮無使我心悲兮賦也承上二章言周公信處信宿於此是以東方有此服衮衣之人願其且留而無遽歸故惜其去而心悲也九罭四章一章四句三章章三句狼䟦經㫖曰周公遭流言之謗成王之疑未解而公處之不失其常故詩人美之而作此詩也狼䟦其胡載㚄其尾興也公孫碩膚赤舄几几興意孫去聲後凡孫順之孫並同䟦躐也胡頷下懸肉也㚄一作躓跲也狼胡垂尾長食滿腹則勢重而行相礙孫委曲柔順之意碩膚指其功業之大而言也几几安重也蓋不動聲色之意狼㚄其尾載䟦其胡興也公孫碩膚徳音不瑕興意瑕疵也徳音不瑕永終譽也華谷嚴氏曰狼猛徤之獸平時不至䟦㚄其尾者雖項下垂胡若在平地亦無䟦之之理䟦胡㚄尾者謂其落機穽之時進退求脫不能也今按狼之䟦㚄不必以其落機穽時言蓋因腹滿而有䟦㚄耳䟦於前則必却而頓後㚄於後則必進而躐前觀其間加一載字義當如此狼䟦三章章四句詩說解頥正釋卷十四
