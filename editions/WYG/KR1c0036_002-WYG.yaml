body:
  text: 詩說解頥總論卷二明季本撰刪次史記孔子世家古者詩本三千餘篇孔子去其重取其可施於禮義者三百五篇皆弦歌之以求合韶武雅頌之音孔頴逹曰按書傳所引之詩見在者多亡逸者少則孔子所錄不容十分去九馬遷言古詩三千餘篇未可信也據今存及亡詩六篇凡三百一十一篇而史記漢書云三百五篇闕其亡者以見在為數也周召風之正經固當為首自衛而下十有餘國編比先後舊無明說左傳襄公二十七年吳公子札來聘請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌邶鄘衛曰羙哉淵乎憂而不困者也吾聞衛康叔武公之徳如是是其為衛風乎為之歌王曰羙哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以徳輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令徳之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不貳怨而不言其周徳之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之徳乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不偪逺而不􅂝遷而不淫復而不厭衰而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛徳之所同也歐陽氏曰周南召南邶鄘衛王鄭齊豳秦魏唐陳曹此孔子未刪之前周太師樂歌之次第也周召邶鄘衛王鄭齊魏唐秦陳檜曹豳此今詩之次第也周召邶鄘衛檜鄭齊魏唐秦陳曹豳王此鄭氏詩譜次第也今按孔子言詩三百而今詩三百一十一篇亡南陔白華華黍由庚崇丘由儀六篇存者實三百五篇史遷以為取於三千餘篇之中是十而得一也今詩中國風為國止十五耳如使盡得天下諸侯之詩而刪之奚啻十一然文武成康之盛太師已列于樂者必已傳於學士大夫如周南召南載文武之詩則先有其名不待孔子刪詩而後有也其下昭宣盛時王者之迹未熄命太師采詩以觀民風而瞽矇歌之以待司樂敎國子者皆雅樂也自雅頌失所之後雖或不能無錯亂者而舊次亦必有傳焉至於東遷日久王道荐衰天子不采詩而詩之散在諸國者非有所傳聞訪問孔子安得一一而見之宜乎他國之詩固有不及錄者矣夫齊楚吴越之變於夷邾滕紀莒之困於弱如此類者或其國無詩或其詩不足錄亦無怪乎其不與於國風也然當其盛時稱美賢君咏歌同類豈無一言在太師采取之列况宋之有微子衛之有康叔齊之有太公陳之有胡公皆先王時之賢諸侯也其國豈無愛慕之詩如衛武公之淇奥鄭武公之緇衣者而今皆無之至於逸詩則隨處附見不一而足得非全經之有散失乎且聖人所錄以為敎者將以正人興觀群怨之情必皆雅歌如史遷所謂孔子皆弦歌之以求合韶武雅頌之音者是也而鄭衛之音淫哇之語皆得列於國風使頌之者感動邪心則於孔子所謂放鄭聲思無邪者自相戾矣宋程文簡公有言淫詩之傳盖出於里巷狎邪誦習之口秦火之後聖經不全漢儒取其里巷之傳者補綴其間以足三百篇之數盖皆夫子之所已刪而未有能辯之者耳近世王文端公先師陽明王公之說亦然可以見詩之非古經矣季札所叙觀樂次第其名數與毛詩相合但不言曹耳然曰自檜以下則固兼之矣鄭元詩譜移檜於鄭前移王於豳下則以鄭併檜封王承豳世各就其類而言耳其叙互有後先本無意義也歐陽氏以季札所叙為周太師樂章之次第則穿鑿矣季札之言浮泛虛誇率非正論如以秦為能大魏為明主豳為周公之東小雅為周徳之衰皆邪說也况其時詩樂未經孔子刪正篇章必多乃欲一時請觀似亦難遍而其國數又與毛詩適合無所增損得非左氏之學與毛同出一宗而附㑹其說歟盖左傳出於張蒼之家蒼為淮南王相稍在大毛公前二家之學盖相聞者也未可遂以左為先秦古書之據若其諸國諸篇編比則秦火之餘類多錯亂或以風而雜雅或以雅而雜風至於二南三頌皆無舊次可求故鄭氏之譜與歐陽子叙次之言皆穿鑿之說也章句音韻國語閔馬父曰昔正考父校啇之名頌十二篇於周太師以那為首其輯之亂曰自古在昔先民有作温恭朝夕執事有恪論語子曰師摯之始闗雎之亂洋洋乎盈耳哉孔頴逹曰自古而有篇章之名故那序曰得商頌十二篇東山序曰一章言其完是也句則古者謂之為言論語云詩三百一言以蔽之曰思無邪則以思無邪一句為一言趙簡子稱子太叔遺我以九言皆以一句為一言也秦漢以來衆儒各為訓詁乃有句稱風雅之篇無一章者頌者述成功以告神故一章而已魯頌不一章者魯頌美僖公之事非告神之歌也商頌長發殷武重章者或詩人所作之意不同詩之大體必須依韻其有乖者古人之韻不協耳之兮矣也之類本取以為辭雖在句不以為義故處末者皆字上為韻左右流之寤寐求之其實七兮迨其吉兮之類是也亦有即將助句之字以當韻者是究是圖亶其然乎其虚其邪既亟只且之類是也朱子曰周頌多不協韻吴棫撰毛詩補音序云詩音舊有九家唐陸徳明以已見定為一家之學釋文是也所補之音皆陸氏未叶者也叶者悉從陸氏今按亂者樂之卒章也凡樂始作則其聲舒樂記所謂奏以文也曲終則其節急樂記所謂亂以武也史記云闗雎之亂以為風始朱子取之是以首尾三章皆為亂也然觀閔馬父之言則那之卒章乃為亂辭耳韋昭曰輯成也凡篇章既成撮其大要以為亂辭歌所以節舞如今三節舞曲終乃更變章亂節故謂之亂也詩之分章多寡不一必不混而無别也但秦火之後散亂者多如周頌清廟八句為一章其始末無所屬似有闕文商頌之那以二十二句為一章必是記錄者失於圈别說者以為風雅無一章頌以告神故一章然魯頌及長發殷武各有分章不得不别立一例矣牽强之說何可通乎詩篇之末必總計章句之數皆毛詩之舊也鄭氏亦稍有不同如闗雎後二章分作四章章四句今集傳仍依舊本及集傳另有改正者俱從集傳諸國及雅頌之末皆有章句總數及雅頌什計之數亦毛舊也以非大義所闗皆置而不錄詩之有叶韻為諧歌聲以入樂也朱子以補音多有刋補而集傳已備註矣若周頌清廟之詩不用韻語商頌那之詩疊用三聲盖詩人别有此例也今止發明經義未及於樂故不錄叶音欲審音者宜於集傳考焉凡賦比興三體集傳每章但總揭賦也比也興也一語今以三體分屬句下如闗雎之參差荇菜左右流之是興也而窈窕淑女寤寐求之則應興之語其義以流之二字與求之二字相倡和而求之不得寤寐思服悠哉悠哉輾轉反側四句乃興意未盡今通謂之興意也皆分别言之如此類者頗多如行露以誰謂雀無角何以穿我屋興誰謂女無家何以速我獄而雖速我獄室家不足二句則未盡之興意也泉水以毖彼泉水亦流于淇興有懐于衛靡日不思而孌彼諸姬聊與之謀二句則未盡之興意也淇奥以瞻彼淇奥綠竹猗猗興有匪君子如切如瑳如琢如磨而瑟兮􅍀兮赫兮咺兮有匪君子終不可諼兮四句則未盡之興意也栢舟以汎彼栢舟在彼中河興髧彼兩髦實維我儀之死矢靡他而母也天只不諒人只二句則未盡之興意也又有興語多寡不一者如氓之三章則以桑之未落其葉沃若于嗟鳩兮無食桑椹四句興于嗟女兮無與士躭二句而士之躭兮猶可說也女之躭兮不可說也四句則未盡之興意也四章則以桑之落矣其黄而隕二句興自我徂爾三嵗食貧淇水湯湯漸車帷裳四句而女也不爽士貳其行士也㒺極二三其徳四句則未盡之興意也五章則以淇則有岸隰則有泮二句興總角之宴言笑晏晏信誓旦旦不思其反四句而反是不思亦已焉哉二句則未盡之興意也又有以字相應為興如小星以二在字二與字之應為興而寔命不同實命不猶二句則未盡之興意也揚之水以二之字二不字之應為興而懐哉懐哉曷月予還歸哉則未盡之興意也荇葦則以勿踐履興莫逺而或肆之筵或授之几則未盡之興意也凡如此類以文句求之斯得矣訓詁傳授前漢藝文志漢興魯申公為詩訓詁而齊轅固燕韓生皆為之傳三家並立於學官又有毛公之學自謂子夏所傳而河間獻王好之未得立後漢儒林傳趙人毛萇傳詩是為毛詩孔頴逹曰趙人毛公名萇也譜云魯人大毛公為詁訓傳於其家河間獻王得而獻之以小毛公為博士然則大毛公為其傳由小毛公而題毛也陸徳明經典釋文吴太常卿徐整曰子夏授髙行子髙行子授薛倉子薛倉子授帛妙子帛妙子授河間人大毛公大毛公為詩詁訓傳於家以授趙人小毛公徐堅初學記荀卿授魯國毛享詁訓傳以授趙國毛萇時人謂享為大毛公萇為小毛公前漢儒林傳毛公授同國貫長卿長卿授解延年延年為阿武令授徐敖徐敖授九江陳俠陸璣草木疏陳俠傳謝曼卿後漢儒林傳衛宏字敬仲東海人初九江謝曼卿善毛詩宏從曼卿受學後鄭𤣥作毛詩箋隋書志齊詩魏代已亡魯詩亡於西晉韓詩雖存無傳之者惟毛詩鄭箋至今獨立陸徳明經典釋文曰鄭𤣥作毛詩箋申明毛義難三家於是三家遂廢矣今按毛氏之學雖自謂出於子夏然詩序之來毛亦不知起於何人未敢斷以為子夏作也至鄭𤣥則直指古序為子夏作盖亦因毛學出於子夏之言而足成之也夫子夏嘗因論詩知學而孔子稱其可與言詩又七十子中子夏最後沒而其授徒又最多後儒言詩者遂依附之故漢儒纂輯家語因有子夏習於詩而通其義之說子夏在孔門以文學名而其用功實以博學篤志切問近思求仁孔子謂其知詩得非以其得性情於言意之表而非玩心於章句之末者歟今觀毛說淺陋牽強往往有難通處子夏之學必不如此雖或得於其徒轉授則亦大失其宗矣魯申公漢文帝時人轅固景帝時人韓生名嬰文帝時人皆為博士或謂子夏四傳至荀卿傳大毛公此傳聞之未有定㨿者也毛氏之名傳亦不的或謂大毛公名亨小毛公名萇或謂萇不知其大毛公歟小毛公歟竊意二毛公必各有名儒林傳亦不明指然世有大毛公名享小毛公名萇之說必非無因者今當從之盖大毛公乃為傳之人而小毛公則受其傳而為河間博士者也毛公作傳之後則有鄭𤣥之箋孔頴逹之䟽以至於宋皆祖毛詩今之章句是也至朱子始辯毛說之非於是集傳行而詩遂不以毛稱矣嗟夫詩學之失傳久矣所幸遺經尚存是非具列即其辭而紬繹之以意逆志當自躍然於心目之間豈待傳註而後明哉今於諸篇下首標經㫖不盡用舊說也庶以見其意不逺於經文而可求焉宋儒註詩者皆宗小序鄭夾漈專詆其說而朱子獨從之如將仲子之類今之所謂淫風而非本於舊序者大抵皆夾漈說也世之文士泥於好古以為孔子正樂之時凡不止於禮義無闗於風敎者一切刪去今之詩經無淫詩於凡靜女木𤓰采葛遵大路子衿揚之水防有鵲巢諸詩皆求舊說以解之而以夾漈為誤朱子如此則桑中諸篇之錄於衛風者義不可通不得不從楊龜山著衞為狄㓕之由之說以自救矣夫詩之為敎本道性情與史法之垂鍳戒者不同不必牽合其說也且自幽厲以來諸侯之失道而亂亡者不可勝數而不皆錄其所由其說亦有不可盡通者故謂詩無淫風則是而不知滛風之有存者乃為漢儒掇拾增加顧欲強為之解不亦勞乎至其所求之舊說則又主於右經所書之魯詩或以為鄘詩而雜於衞或以為齊詩而雜於鄭其有篇章可稽似非臆說者亦可以見漢時詩篇之有錯亂矣夫魯詩出於漢文帝時而石經蔡邕所書刻在漢末㝷經兵火不存所傳多非邕舊通志略固已辯之豈可取以為先秦古書之據哉故魯詩已絶雖有一二存者不過附見於他書耳未必得經㫖也然則義有不通者須於經文中平心玩味以得其意固不可偏執己見而亦安可盡拘舊說邪詩說解頥總論卷二
