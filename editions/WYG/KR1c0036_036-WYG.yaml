body:
  text: 詩説觧頥字義卷四明季本撰陳宛丘一章宛丘地名蓋在陳城南道東毛氏曰四方髙中央下曰宛丘然爾雅則謂丘上有丘曰宛丘與毛説相反考之輿地廣記獨取爾雅之説謂今其地形則然蓋必有所徴矣二章鷺鳥名陸農師曰一名舂鋤歩於淺水好自低昻故曰舂鋤色雪白頂上有絲長尺餘欲取魚則弭之藏殺機也其翔集必舞而下每至水面數尺則必低回少盤其勢與飛時徑起特異蓋其天性然也無冬無夏按古者春秋教以禮樂冬夏教以詩書則舞者春秋二時之所習也今雖祁寒大暑亦遇其舞其遊蕩而無度甚矣羽者舞人所持以指麾也毛氏以為鷺鳥之羽可以為翳故郭璞遂以為所持以自蔽翳殊不知古固有以纛訓翳者翳乃文鳥之名山海經云五采之鳥名翳蓋即雉也謂雉之長尾其名為翹本析羽而注旗竿之首者在旗竿則有覆幬之義故謂之翿翿即纛也本爾雅釋言纛謂之翳可也但以為蔽翳則失之矣蓋干羽之舞本起於舜之征苖即其旗竿之羽以為舞正以習指麾也故伶官之舞但云秉翟則正旗竿之翟羽而鷺羽之長不及翟羽必非舞者所宜執此云鷺羽蓋民俗不能具翟羽則從便取鷺羽續長以為用耳墓門二章鴞惡聲之鳥即鴟鴞也故七月集傳觧鴟鴞為鵂鶹而曰惡鳥攫鳥子而食者也爾雅有怪鴟郭璞註以為即鴟鵂蓋指鴞也陸璣曰鴞大如斑鳩緑色入人家㐫賈誼所謂鵩鳥是也今人謂之鵂鶹亦名怪鴟其肉甚美可為􅃵􅌜又可為炙陸農師曰鴞所鳴其民有禍證禍鳥也又以鴟鵂别鴞為一類而曰怪鴟晝無所見夜即飛噉蚊蝱舊説雀目夕昬即此類他無異義也又爾雅以鴟鴞為鸋鴂郭璞註曰鴟類陸農師乂别為一類以别於鴟鵂只如郭氏鴟類之説而亦無異義竊意鴟必怪鳥之大名故鴟鴞鴞鵂皆得名鴟考之楚辭鸞鳯伏竄鴟鴞翶翔鴟鴞與鸞鳯相對故註云鴟鴞二物又云鵩似鴞蓋有分而為二者矣然本草云其實一耳今亦不知何為而另為一名也鴞與梟不同孔氏以為鴞一名梟則誤矣别見瞻卬字義防有鵲巢一章苕苕饒也其莖葉緑色可生食如小荳非小雅苕之華矣之苕苕之華矣傳曰陵苕此則直云草而已孔氏曰彼陵苕之草好生下濕此則生於髙丘與彼異也今按毛氏本觧卭為丘故其義異殊不知卭非丘安得以此為别乎但謂之㫖苕則以可食者言耳而苕之華矣則謂之陵苕可也二章鷊小草五色如綬鷊本鳥名咽下有囊如小綬具五色名為綬鳥鷊草之名因鳥色而取義也澤陂二章蕳舊訓蘭鄭氏曰當作蓮孔氏曰上下皆言荷蒲則此章亦當言荷不宜别據他草蘭是陸草非澤中之物故知當作蓮今按爾雅曰荷芙渠其華菡萏其實蓮其根藕郭璞曰江東人呼荷華為芙蓉北方人便以藕為荷亦以蓮為荷許慎曰未發為菡萏已發為芙蓉陸農師曰荷緫名也然則荷蓮菡萏一類也皆以其華之芳美特易名以恊韻耳檜匪風三章􅑄大釡也毛氏許慎皆以􅑄為釡屬釡屬故可烹魚若爾雅云甑謂之􅑄則甑乃甗之有底者本陶噐也故孔氏曰烹魚用釡不用甑蓋􅑄名同而一為釡屬一為甑屬也曹下泉二章蕭蒿屬俗謂之牛尾蒿爾雅謂蕭為萩乃萩蒿也郭璞以為即蒿則疑於青蒿矣陸農師曰其字從肅秋風之過肅然故蕭一名萩似白蒿莖麤科生有香氣能上逹故祭祀以脂爇之凡祭灌鬯求諸陽周人先求諸隂故先灌鬯而焫蕭在後商人先求諸陽故先焫蕭而灌鬯在後三章蓍蒿屬筮草也似藾蕭青色科生本草註曰其生如蒿髙五六尺一本多者至三五十莖生便條直異於衆蒿秋後有華出枝端上紅紫色四章郇毛氏以為郇侯也蓋文王子本封為侯其後世為州牧故稱伯也水經註云郇城郇伯故國也今觧故城北二十四里有郇城在猗氏縣西北按猗氏今屬山西平陽府蒲州豳七月一章耜起土之田噐也廬陵羅氏曰耜廣五寸耒耜上勾木也耜古以木為之易曰斷木為耜揉木為耒亦以金為之周禮註古者耜一金兩人併發之今按兩人併發所以為耦耕南畝畝以南為正也范氏處義曰田事喜陽而惡隂南東向陽則茂遂西北傍隂則不實三章斧斨斧隋銎斨方銎凡物狹而長者謂之隋與般嶞山之嶞義同銎斧孔也孔氏曰斨即斧惟銎孔異耳鵙伯勞月令仲夏鵙始鳴應隂氣之動而至是謂夏正建午之月也至七月則應三隂之候而将去故七月聞鵙之鳴則寒将至而先時感事以見八月之當績也𤣥黄朱𤣥黒而有赤色黄中央正色朱深纁色即赤也按公子者諸侯之子将有大夫之責故染繒與布以為之裳繒絲所為也布麻所為也禮冕服𤣥衣纁裳𤣥端服𤣥衣𤣥裳或黄裳玉藻曰衣正色裳間色亦大畧言之耳蓋黄裳亦正色也而為裳𤣥者帶黒之赤亦間色也而為衣不必正色然後為衣間色然後為裳也四章秀朱子嘗以吐華曰秀釋論語秀而不實之義蓋草木之華曰秀本有此訓而爾雅則曰木謂之華草謂之榮不榮而食謂之秀榮而不實謂之英是以秀為已實也蓋單言秀則可以為實之通名耳葽逺志圖經云三月開花白色四月采根葉據此則亦開花者也不可以為不榮曹氏曰四月陽氣極於上而㣲隂已受胎於下葽感之而早秀臨川王氏曰陽生則言日隂生則言月然四月正陽秀葽言月何也秀葽以言隂也四月隂生者氣之先至也葽感隂氣而先秀此皆以秀言成實之義也蜩蟬也諸蟬之緫名也爾雅有蜩蜋蜩螗郭璞曰蜋蜩者五色具螗蜩者蝘俗呼為胡蟬是蜋蜩螗蜩二種蟬其説是也或謂蜋蜩與螗蜩本一物而異名則蕩之詩曰如蜩如螗豈可以為一物哉彼以蜩對螗則此所謂蜩乃指蜋蜩矣陸農師曰蜋蜩似蟬而小鳴聲清亮蜩亦蟬之一種形大而黒一名蟬為其變蜕而蟬也臨川王氏曰蜩感隂氣而先鳴五章斯螽蓋蟋蟀初生之名與螽斯不同螽斯之螽蝗也斯語辭而斯螽則别為一名蓋螽蝗之害稼乃天之大灾其生感於戾氣故陸農師有魚子為日暴而生飛蝗之説而蟋蟀之生則嵗所常有者也或又以螽斯即阜蟲則阜螽與草蟲自以異類相感亦常有之物也但以形與螽類故通以螽名耳其實非一種也華谷嚴氏曰斯螽舊説以為即螽斯非也其説得之但以為即阜螽則又誤矣斯螽一名蚱蜢似蝗而小斑黒五月中以兩股相切作聲聞數十歩莎雞一名絡緯似蝗而斑色毛翅數重其翅正赤六月中飛而振羽索索作聲蟋蟀一名促織斯螽莎雞蟋蟀一物隨時變化而異其名也今螽斯之螽不聞其以股羽相切作聲而有竒音其别為一種可知矣六章欎雀李即爾雅所謂棣也薁郁李即爾雅所謂栘也二物形相似但鬱小而薁大鬱先熟而薁後熟耳詳見常棣字義葵菜名其心向日而覆根莖大葉小可茹菽鄭氏常以大豆言之不但以其實之大人所利種而葉亦可為也孔氏曰公食禮云鉶芼牛羊苦豕薇皆有滑註云豆葉也苦苦荼也滑堇荁之屬是也以鼎煑牛取其骨體置之於俎其汁則芼之以調以鹹酸乃盛之於鉶謂之鉶􅃵今按菽言烹以為􅃵具也所用必其葉矣故濮氏亦曰荳葉謂之𤓰種於田畔所謂疆埸有𤓰味甘美可止渇農夫在田之所食也壺瓠也嫩者可供茹枯者可為壺故名為壺至八月已不可食而漸就稿矣三山李氏曰壺蔓生斬之故曰㫁蓋農功未畢無暇取他木為薪則姑取薪於㫁壺耳叔拾也苴麻子也麻子榖中之賤者孔氏曰麻子以供食也荼苦菜即苦荼也詳見邶谷風字義其葉經冬不凋采之所以為菹樗類椿葉脱處有眼故江東呼為鬼目此木最無用惟堪為薪故曰惡木七章場圃者以種植之圃築之為場也鄭氏曰場圃同地自生物之時耕治之以種菜茹至物盡成熟築堅以為場禾稻也稼者在野而未穫之稱禾在十月可納場圃則指稻矣故禾稼者據稻而言也以稻為重故首言之非謂禾是大名而緫言於八榖之上也黍榖名苖似蘆髙丈餘穗黒色實圓重華谷嚴氏曰黍似粟而非粟米黏者為秫可以醸酒黏者為黍如稻之有秔穤耳考之本草註黍有數種今别而言之有黒黍謂之秬黒黍之中一桴二米者謂之秠桴皮也一桴二米異於一米者故宗廟之祭常以秠醸酒秬秠即生民之維秬維秠也又有丹黍皮赤米黄爾雅謂虋赤苖郭璞註云今之赤粱粟又有白黍爾雅謂芑白苖郭璞註云今之白粱粟虋與糜同即生民之維糜維芑也此四者皆黍類故黍為緫名分而言之則秬秠為黍而糜芑為粱梁似粟而大即今之膏粱也五榖中黍為最美故言榖者常以黍為先稷一名穄似黍而小即粟也曲禮云稷曰明粢是也華谷嚴氏曰八榖之中最為下今人不甚珎惟祠事則用之農家種之以備他榖之不熟則為糧耳重亦作穜穋亦作稑孔氏曰先種後熟謂之重後種先熟謂之穋又按閟宫重穋之下有稙穉毛傳先種曰稙後種曰穉孔氏曰重穋稙穉生熟早晚之異稱耳非榖名稙穉當謂先種先熟後種後熟集傳畧而不言其熟耳禾與春秋大無麥禾之禾同蓋偏言之禾即稻也稻有秔有糯粇與粳同糯即稌也秔糯甚相類黏不黏為異耳秔不黏而糯黏然同謂之稻也集傳以秫苽粱言則秫粱黍屬也苽乃茭白非禾也麻即今黄麻也麻子名苴上章叔苴之苴也集傳謂麻榖名子可食皮可績為布則麻亦在榖明矣菽鄭氏於經中言菽者皆以大荳釋之蓋本生民蓻之荏菽而言爾雅以荏菽為戎菽即胡荳也其種為大農家多種之故以為大荳耳若泛言之則荳之可食者尚多也餘見前章字義麥有小麥有大麥小麥一名來可以作麵大麥一名牟可以作飯皆秋種夏熟我稼既同同臨川王氏以為所納之備也則併黍稷重穋禾麻菽麥八榖而言矣蓋禾黍熟於秋麻麥熟於夏所収異時而緫計農事之畢則謂之同非以為皆同於十月也併重穋而為八榖然重穋者虚名耳不列於榖數者也八章二之日建丑之月周禮十二月令斬氷是也鑿氷集傳以為取氷於山蓋本左傳昭公四年申豐言其藏氷也深山窮谷固隂沍寒於是乎取之所以取於深山窮谷者貴其堅也十二月斬氷即其月納之而三之日建寅乃始言納者謂豳土地寒正月風未觧凍氷猶可藏而言納於畢藏之月也凌隂氷室也氷分則為凌獻羔祭韭者鄭氏謂出氷而先薦寢廟也時韭新出故併羔以祭月令仲春獻羔開冰先薦寢廟是也鄭氏謂祭司寒獻羔而啓之或有此禮但經意止謂特羊告廟而薦新以獻氷與月令意同氷非先薦寢廟則不敢他用故以薦廟為重而司寒之祭則可畧耳四之日四陽上逹大壮之時宜防其過故即出冰以節之孔氏曰二月開氷公始用之未賜臣也至於夏初其出之也朝之禄位賔食䘮祭於是乎普用之此皆本申豐而為説蓋藏氷致用亦爕調愆伏之事也故冬無愆陽夏無伏隂春無凄風秋無苦雨雷出不震無灾霜雹癘疾不降民不夭札此其所係於治者大矣七月之詩上章言寒冬休息之時而民已急於田事見其民之勤也此章則以鑿氷言之見其君欲天時之正而當陽氣之洩則以爕調為先也見其有憂民之心焉否則鑿氷之義與上下何所屬乎朋酒兩尊之酒也鄉飲酒禮尊兩尊於房户間此蓋以鄉飲言也黨正每嵗國索鬼神而祭之則以禮屬民而飲酒於序索鬼神者蜡也凡鄉中有所聚㑹者或以賔興或以敬長或以習射或以合歡皆謂之鄉飲而此詩所言則事在十月滌埸之後是因蜡而飲黨正屬民之事也孔氏曰朋酒則酒有兩尊滌埸是農夫之事則斯饗是民自飲酒禮鄉人飲酒以狗為牲大夫與焉則加以羔羊又曰記云其牲狗是鄉人以狗也王制云大夫無故不殺羊是大夫有故得用羊也今鄉飲名飲不得謂之燕而况可言饗乎此言饗則又以為通名耳詳見彤弓字義鴟鴞三章荼萑苕本毛氏傳孔氏以為薍之秀穗也今按萑一名薍苕爾雅作芀秀穗者謂抽條遥逺生華而無莩蕚也華谷嚴氏謂之英荼詳見􅆁谷風字義夫英荼者以其吐華之秀穗言故邢氏曰華秀名也或茅或萑而皆可兼之故邢氏又以為萑茅之屬但釋出其東門説者以秀言於茅而此以秀言於萑則若可以相通耳東山一章東山泛言魯地之山書言王來自奄即征東而歸之事也奄本曲阜之地而以封魯故東山以魯言以其為東方諸侯之國故云東山耳然非孔子所登之東山也登而小魯必魯山之髙者故地志相傳以為東蒙而周公東征之兵必不至此也烝有六訓有以為升者有以為進者有以為衆者有以為君者有以為祭名者有以為上淫者皆本於氣上升之義上升則進氣聚則衆衆則得民而為君物品衆盛而祭則為烝祭其淫於上而為烝者亦㑹上升之意也然則升者烝之本訓也此詩首章及三章兩烝字程子以為烝升也得其義矣毛氏以烝在桑野之烝訓窴其音為田鄭氏則又申之曰古者聲窴填塵同蓋因爾雅云塵久也見窴與塵同而轉為久義也至於烝在栗薪毛又以烝為久蓋皆强觧故集傳以為發語辭亦求其説而不得也惟程子之義為長四章縭鄭氏以為香纓非也爾雅云婦人之禕謂之縭孫炎以褘為帨巾是也帨巾故可結士昏禮母戒女施衿結帨即此事衿衣小帶所以繫佩者也内則云婦左佩紛帨蓋結於此伐柯二章籩豆禮噐形制相類其容皆四升竹曰籩以薦果脯及糗餌粉餈木曰豆以薦葅醢及酏食糁食九罭一章衮衣繡裳集傳云衣裳九章一曰龍二曰山三曰華蟲雉也四曰火五曰宗彛虎蜼也皆繪於衣六曰藻七曰粉米八曰黼九曰黻皆繡於裳天子之龍一升一降上公但有降龍以龍首卷然故謂之衮詳見終南字義狼䟦一章狼豺類而不同狼頷下有袋謂之胡陸農師曰狼大如狗青色做聲諸竅皆沸豺祭狼卜又善逐獸皆獸之有才智者里諺云狼将逺逐食必先倒立以卜所向善顧其後草蟲經云老狼項下有袋求食滿腹向前行乃觸之退後又自踏踐下礙其尾赤舄舄履類夏葛履冬皮履在舄亦然鄭氏曰複下曰舄禪下曰履王吉服有九舄有三等赤舄為上冕服之舄也詩云王錫韓侯𤣥衮赤舄則諸侯與王同下有白舄黒舄天子諸侯吉事皆舄其餘惟服冕著舄耳今按九服謂六冕及韋弁皮弁冠弁服凡履舄各象其裳之色冕服皆𤣥衣纁裳赤色故冕服用赤舄其下則白舄配韋弁皮弁黒舄配冠弁服所服之裳時有不同或亦各隨其用也其餘則服履而已几几取安義以几為人所馮以為安也詩說觧頥字義卷四
