body:
  text: 詩説觧頥正釋卷九明季本撰魏朱子曰魏國名本舜禹故都在禹貢冀州雷首之北析城之西南枕河曲北渉汾水其地陿隘而民貧俗儉蓋有聖賢之遺風焉周初以封同姓後為普獻公所滅而取其地今河中府觧州即其地也魏地入普久矣列於唐風之前猶邶鄘之於衛也篇中公行公路公族皆普官疑實普詩又恐魏亦嘗有此官蓋不可考矣今按魏在汾水之曲故城南西並去大河二十餘里北至首陽山十餘里處河山之間季札歌魏而謂為明主此與春秋傳閔公元年卜偃辛廖占畢萬賞魏之辭意同蓋戰國時見魏稱王而附為誇大之言如後世追述符命云爾豈非邪説乎葛屨經㫖曰此詩蓋為富而不好禮者發也糾糾葛屨可以履霜掺掺女手可以縫裳要之襋之好人服之賦也要與同糾糾盤結貎掺掺與纎纎同小而嫩也要裳腰襋衣領好人富貴人也葛屨可以履霜女手可以縫裳言無不可也女手而曰掺掺女之小者也言雖小女可以縫裳而治要襋雖好人亦必服之此勤儉之俗美俗也好人提提宛然左辟佩其象揥維是褊心是以為刺賦也辟與避同後凡退避之辟放此提提警惕貎宛委曲遜順貎辟避路也凡讓而避者必左象揥説見君子偕老言好人之心常提提然警惕惟恐召禍故與人之際宛然左辟常退譲以自全至於首之所飾者象揥而已初無金玉之美雖好人而服象揥可見其儉矣禮與其奢也寜儉儉美徳也但富而不好禮則知有已而不知有人終成自私自利耳故詩人以為褊心而刺之葛屨二章一章六句一章五句汾沮洳經㫖曰此美隱者之詩也彼汾沮洳言采其莫彼其之子美無度美無度殊異乎公路賦也莫音暮汾水出太原府晉陽山西南入河蓋即自晉入魏也沮洳水浸下濕之地莫菜也似栁葉厚而長有毛刺可為􅃵采莫可以充食也無度非尺寸可量也公路主君路車之官彼汾一方言采其桑彼其之子美如英美如英殊異乎公行賦也方彼一方也蓋隔水望見之稱采桑可以供蠶公行即公路以其主君兵車之行列則曰公行耳彼汾一曲言采其藚彼其之子美如玉美如玉殊異乎公族賦也一曲謂水曲流處藚葉似車前草一名水舄即今澤舄也采藚可以為藥公族掌君之宗族者賢人隱於汾水之間采莫采桑采藚足以自娛故見之者稱其美不可及而與在位者殊不同也公路公行公族皆晉之貴大夫汾沮洳三章章六句園有桃經㫖曰賢人懐才而不得用有憂世之志焉故作此詩舊説謂憂其君國小而無政未為盡得詩意也園有桃其實之殽興也心之憂矣我歌且謡不知我者謂我士也驕彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思興意何其之其音箕後凡以其為語辭者並同果為核肉為殽果不言核而言殽猶禽不言雄而言牡也心之憂者具在我而人不用不能無不豫色之意也我賢者自謂歌者長言也本歌曲之緫名與謡相對則合曲為歌徒歌曰謡有感即歌如太山梁木之歌未必合樂則謡亦但當為歌而不已之名耳故陳氏暘曰謡者歌聲之逺聞也士未仕之稱驕者以其輕世肆志而言彼人指當國之人也以當國者為是則同流合汚之類所以為不知我也園有棘其實之食興也心之憂矣聊以行國不知我者謂我士也罔極彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思興意棘小棗説見凱風行國謂出遊於國中也罔極亦有驕意此詩二章言桃棘皆果之賤而有實則可以為殽而食以興人有實徳而不見用此當國者無意於治所以憂世者不能不切於心也然有不可與人言者則亦歌游自肆而已不知我者則謂我乃士也而驕縱無極亦何為哉以其無志不以世道為憂故不思也思則必能知我耳此可見其憂世之心矣園有桃二章章十二句陟岵經㫖曰孝子行役不忘其親而想像其念己之言也集傳得之矣陟彼岵兮瞻望父兮父曰嗟予子行役夙夜無已上慎旃哉猶來無止賦也山無草木曰岵上與尚同止獲也古以見獲為止陟彼屺兮瞻望母兮母曰嗟予季行役夙夜無寐上慎旃哉猶來無棄賦也山有草木曰屺季少子也婦人之情最憐少子無寐猶言醒睡棄謂棄屍於外陟彼岡兮瞻望兄兮兄曰嗟予弟行役夙夜必偕上慎旃哉猶來無死賦也偕謂與同役者俱無失伍也此詩想像父母及兄念己之言曰無已曰無寐曰必偕皆勸其子弟勤於王事則猶得歸而不至於死也亦可見其家人皆有為國之忠矣陟岵三章章六句十畝之間經㫖曰此里宅同居之友見世亂國危而相約歸田之詩也十畝之間兮桑者閑閑兮行與子還兮賦也十畝者兩其五畝之宅也古者一夫各受五畝之宅宅必依田以居子者指同仕之人蓋居亦同里者故合兩家之宅言之而為十畝也自漢儒以二畝半在田二畝半在邑為説而其義遂不可通矣辯見讀禮疑圖卷之一閑閑閑暇自得也十畝之外兮桑者泄泄兮行與子逝兮賦也十畝之外謂不但同仕者之兩家蓋併同井之八家而言也泄泄舒而不廹之貎此則又得與鄰里同樂矣十畝之間二章章三句伐檀經㫖曰君子以無功素食為耻不敢怠其勤勵自强之志故詩人美之而作此詩也坎坎伐檀兮寘之河之干兮河水清且漣猗不稼不穡胡取禾三百㕓兮不狩不獵胡瞻爾庭有縣貆兮興也彼君子兮不素餐兮興意猗與兮同縣音懸後凡懸掛之縣并同坎坎伐檀聲檀木性堅可以為車者寘安置也漣風行水成文也種之曰稼斂之曰穡狩亦獵也張羅而守之曰狩㨗躐而取之曰獵縣縣於庭而暴之也貆貉類素空也餐吞食也無功而食謂之素餐坎坎伐輻兮寘之河之側兮河水清且直猗不稼不穡胡取禾三百億兮不狩不獵胡瞻爾庭有縣特兮興也彼君子兮不素食兮興意輻在車輪中輳轂者老子所謂三十輻共一轂也亦伐檀為之直波文之直也億孔氏以為刈禾之把數也特豕特生之名坎坎伐輪兮寘之河之漘兮河水清且淪猗不稼不穡胡取禾三百囷兮不狩不獵胡瞻爾庭有縣鶉兮興也彼君子兮不素飱兮興意輪車輪亦伐檀為之漘厓也郭璞云上平坦而下水深為漘淪者小風水成文轉如輪也囷圓倉也熟食曰飱伐檀為車車至水澤腹堅然後可用然當河水方清未凍之時檀已先伐而寘於水次不以其未用而遂怠於伐也正以力必先勞而後可以得食耳如先稼穡然後得禾先狩獵然後得獸此皆治生之不可怠者也故以興君子之立徳立功其得食不虛蓋先有其具矣君子指學道者言伐檀三章章九句碩鼠經㫖曰民苦虐政不得已而欲歸仁故作此詩當此時賢者不能不辟地况於凡民乎其情亦可閔矣碩鼠碩䑕無食我黍比也三嵗貫女莫我肯顧逝将去女適彼樂土樂土樂土爰得我所賦也貫音慣下章同貫習也樂土有道之國而可安者也莫我顧謂初無念我之心也得我所謂得其所安也碩䑕碩䑕無食我麥比也三嵗貫女莫我肯徳逝将去女適彼樂國樂國樂國爰得我直賦也莫我徳謂不以恩徳加我也得我直謂可以直道而行也碩䑕碩䑕無食我苖比也三嵗貫女莫我肯勞逝将去女適彼樂郊樂郊樂郊誰之永號賦也苖指嘉榖謂禾也不我勞謂不肯慰勞我也永號長呼也慶源輔氏曰三嵗貫女則民之於上至矣莫我肯顧則上之於民甚矣於是而决去焉非民之罪也碩䑕三章章八句詩說解頥正釋卷九
