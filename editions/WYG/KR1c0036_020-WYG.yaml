body:
  text: 詩說解頥正釋卷十八明季本撰祈父經㫖曰祈當作圻毛氏以為職掌封圻之兵者得之但即以為司馬則恐未然春秋時宋有司馬司城二官則圻父當為司城之類歟盖京師之兵有二有守宫城之内者宿衛之兵也謂之禁軍有守京城之内者巡徼之兵也謂之京軍以漢制考之宫城之兵衛尉所掌京城之兵中尉所掌各有専官在周則宫正掌宫城而圻父者其必専掌京城之兵而司馬則又緫理軍政者乎古者禁兵不出以重宫衛故也京城之兵則可調用正圻父之所掌者而王之爪牙則禁兵也圻父則調發逺征使之乆役故後者怨而作此詩也發兵而及於禁旅則軍政之廢已甚世道又下降矣當為王風祈父予王之爪牙胡轉予于恤靡所止居賦也父音甫後凡姓名如皇父家父之類並同鳥用爪獸用牙以防衛王之爪牙以鳥獸為喻也轉移也祈父予王之爪士胡轉予于恤靡所底止賦也爪士爪牙之士也底至也祈父亶不聰胡轉予于恤有母之尸饔賦也尸主也饔熟食也言不得奉養而反使母主勞苦之事也祈父三章章四句按此詩以下自白駒以至無羊凡六篇序皆以為刺宣王也毛鄭後儒皆祖其說竊意宣王之學聖人之學也其政王者之政也其所用以為将相者南仲吉甫方叔仲山甫申伯召虎諸賢其所建立皆以徳行仁畧不雜於功利觀於出車六月采芑車攻雲漢崧髙烝民江漢常武諸詩遺風所存真皆文武之徳意所謂中興以復先王之舊者豈在於聲色之可見者哉諸臣固皆格心之學也然傳述未詳所可考者仲山甫之徳最為精宻又事宣王最乆其朝夕啟沃必有黙成至其晚年益宜堅固豈至一變無終如序所刺哉大抵秦漢陋儒好為異論其於賢聖每摘瑕疵如國語載魯武公以括與戯見宣王仲山甫諫不聽而卒立戯遂以是為諸侯不睦之本以理論之諸侯豈得有以子見王之事乎至於不籍千􅅕䘮師南國之事皆非宣王所宜有而好事者以為侈談亦何怪乎序詩者之不並縁乎後儒未有能察此者惟朱子疑之而曰多不可考然亦未嘗斷其决無此事也夫一日萬幾事亦安能保其無闕但隨時匡救即是聖功故吁咈之言唐虞不免何害其為聖也若終䘮厥徳如兩截人則聖學必不至此耳聖人之徳将為萬世法程妄加訾議使人懐不信之心其害教不小矣故特叙而論之白駒經㫖曰此詩不知何人所作但其辭則似在位之臣以賢者欲去不可留而不欲其終絶也賢者之去無以考其所因豈聞所聞而來見所見而去者歟然留之者則出於至愛耳群臣靣留賢者則亦當為小雅矣皎皎白駒食我場苖縶之維之以永今朝所謂伊人於焉逍遥賦也皎皎㓗白也場蓋舎傍積聚之區非以築場圃者言也榖之始生曰苖縶絆其足維繫其靷永乆也伊人指賢者逍遥言但得其遊息耳非能拘束也皎皎白駒食我場藿縶之維之以永今夕所謂伊人於焉嘉客賦也藿豆葉也嘉客言非有職守可拘也此二章言賢者至於國中其白駒之所食者乃苖藿皆嘉榖也而不肯留但維縶其駒而得其於此逍遥為客耳皎皎白駒賁然來思爾公爾侯逸豫無期慎爾優游勉爾遁思賦也賁然光彩之貎來謂夲非絶我者欲留則亦可留也爾公爾侯非謂以官爵許之如横來大者王小者侯之云也盖謂爾之徳夲可以為公為侯而非逸豫之期也故優游隠遁皆非其宜慎者欲其勿優游也勉者欲其勿隠遁也盖日月逝矣嵗不我與之意而欲其仕也二思字皆語辭此章嘉其來而勸之仕也皎皎白駒在彼空谷生芻一束其人如玉母金玉爾音而有遐心賦也空谷寂寥無人之所也生芻新刈之草則非苖藿之嘉榖矣此言賢者不可留而在空谷則白駒但食生芻一束而賢者安之其人之徳瑩然如玉畧無瑕疵我特留之而不可得耳然猶望其嘉言之及也故又語之曰毋貴重爾之音聲如金玉然而有逺我之心也其眷望惓惓之意豈因其去而遽已乎白駒四章章六句黄鳥經㫖曰民適異國不得其所而作此詩集傳得之矣但其體似風耳黄鳥黄鳥無集于榖無啄我粟此邦之人不我肯榖言旋言歸復我邦族賦也穀木名説見鶴鳴榖善也此以黄鳥自比而戒之以不可於此居室食粟也黄鳥黄鳥無集于桑無啄我梁此邦之人不可與明言旋言歸復我諸兄賦也不可與明謂不可與之明言被侮也黄鳥黄鳥無集于栩無啄我黍此邦之人不可與處言旋言歸復我諸父賦也栩木名說見鴇羽黄鳥三章章七句我行其野經㫖曰世亂賢者適異國依其昏姻而不見收䘏故作是詩與黄鳥意同當屬國風我行其野蔽芾其樗昏姻之故言就爾居爾不我畜復我邦家賦也野所經之野也蔽芾說見甘棠樗詳見七月字義畜與慉同養也我行其野言采其蓫昏姻之故言就爾宿爾不我畜言歸思復賦也蓫羊蹄菜也野生煮為茹滑美我行其野言米其葍不思舊姻求我新特成不以富亦祗以異賦也成當作誠葍䔰也亦野生可蒸為茹新特新親也此詩言我從夲國而來經行於野所蔽芾者樗木而已無嘉樹也所采食者蓫與葍而已無嘉蔬也以爾昏姻之故特來相就以其富而可依也則於夲國之舊姻皆不之思矣然至此乃無收恤我者是其人無特異之行耳可見人不在於富而在於有異行也如有異行豈至此哉我行其野三章章六句斯干經㫖曰此必武王營鎬京成燕飲以落之而群臣因有頌禱之辭也當為大雅歐陽氏曰古人成室而落之必有稱頌禱祝之言如歌於斯哭於斯聚國族於斯謂之善頌善禱者是矣秩秩斯干幽幽南山如竹苞矣如松茂矣兄及弟矣式相好矣無相猶矣賦也干水涯也南山長樂劉氏以為鎬京之陽終南之山者是已鎬京臨大水對終南以此知為武王營鎬也苞叢生而固也言作室之地臨水涯則秩然整齊對南山則幽然深逺以植根基則根基固而如竹之苞以長枝葉則枝葉繁而如松之茂此言其地之善未及作室也兄弟者人君繼世而立多疑忌其兄弟則有不得室家君王者矣此與蓼蕭宜兄宜弟意同但此為頌禱而發耳盖欲其和於一家以立垂裕之夲也猶謀也似續妣祖築室百堵西南其户爰居爰處爰笑爰語賦也似嗣也妣祖南豐曽氏以為姜嫄后稷者是也西南云者必鎬京之室木因地勢而西南向也否則言西南而不言東北亦無謂矣居處說見擊鼔此章緫言築室之事将以乆居而嗣先祖之業也約之閣閣椓之槖槖風雨攸除鳥䑕攸去君子攸芋賦也約束板也閣閣上下相乘也椓築也槖槖杵聲也此章言墙垣之固也毛氏曰芋大也曹氏曰居於其間心廣體胖是以大也如跂斯翼如矢斯棘如鳥斯革如翬斯飛君子攸躋賦也跂竦立也人竦敬則如鳥舒翼也棘急矢行緩則枉急則直也革變謂鳥之悚顧也翬雉也此章言其堂之美也躋升也升以聽事也此盖路寝君日出眡朝退適路寝聽政即其所也殖殖其庭有覺其楹噲噲其正􅎪􅎪其冥君子攸寧賦也此章言其室之羙也盖寝室在路寢之後者也君既眡朝聽政使人眡大夫退然後適小寢釋服即其所也故孔氏以庭為宫寢之前庭廬陵李氏謂堂下至門謂之庭則以路寢言非攸寧之意矣殖殖平正也覺古訓為大為直殊無意義盖髙峻而可見之意故孔氏亦謂宫寢之楹柱是也正對偏而言則正是内寢之寛明處故曰噲噲冥是奥窔之間幽隠處故曰噦噦藍田吕氏以正為正寢亦非也臨川王氏曰噲噲其正則知噦噦其㝠是偏也噦噦其㝠則知噲噲其正是明也下莞上簟乃安斯寢乃寢乃興乃占我夣吉夣維何維熊維羆維虺維蛇賦也此章因居室而祝其有夣兆以開子孫之祥也安斯寢即上章所謂攸寧也大人占之維熊維羆男子之祥維虺維蛇女子之祥賦也大人占夣之官也人之精神與天地隂陽流通晝之所為常感於夣故設官以占之熊羆陽物在山彊力壮毅男子之祥也虺蛇隂物穴居柔弱隠伏女子之祥也此言大人占夣而告志也乃生男子載寢之牀載衣之裳載弄之璋其泣喤喤朱芾斯皇室家君王賦也此章祝其生男子之祥也寢之牀尊之也衣之裳備盛服也半圭曰璋以行禮之璋玉言非祼宗廟之璋瓉也喤喤聲之大亦吉徴也朱芾者天子純朱諸侯黄朱皆謂之朱詳見車攻字義室家君王謂服朱芾而有室有家以為君為王也乃生女子載寢之地載衣之裼載弄之瓦無非無儀唯酒食是議無父母貽罹賦也此章祝其生女子之祥也寢之地卑之也裼褓也今之縳兒被也衣之褓即其在身者而無所加也瓦黄東發以為覆膝以索麻線之瓦非磚也於義為近不違君子之命故曰無非不專君子之事故曰無儀唯酒食是議而無貽父母之憂即易所謂無攸遂在中饋貞吉也斯干九章四章章七句五章章五句無羊經㫖曰賢者隠於牧人而牧事有成其夢兆亦闗國家之富庶故君子美之而作此詩也然則斯人其百里奚爵禄不入於心而飯牛牛肥之儔歟誰謂爾無羊三百維羣誰謂爾無牛九十其犉爾羊來思其角濈濈爾牛來思其耳濕濕賦也爾指牧人犉與醇同牛之一色成體者謂之犉獸三為群羊以三百為群言其群之多也牛之犉者九十非犉者尚多也臨川王氏曰濈濈和也羊以善觸為患故言其和謂聚而不相觸也濕濕潤澤也牛病則耳燥安則潤澤也愚謂無羊無牛者其心不知有羊牛也故人以此謂之此章言牧事之成而牛羊衆多也或降于阿或飲于池或寢或訛爾牧來思何蓑何笠或負其餱三十維物爾牲則具賦也訛動也荷蓑笠以為備賫乾糧以隨行盖從牛羊之所適也三十維物謂齊其色而别之凡為色者三十也爾牲則具用無不周也此言善牧而牛羊衆多也爾牧來思以薪以蒸以雌以雄爾羊來思矜矜兢兢不騫不崩麾之以肱畢來既升賦也麤曰薪細曰蒸薪蒸者牧人閒暇則就牧地采之暮則以之來歸也雌雄者當歸之際辨畜之雌雄以視其多寡之數也矜矜堅強貎兢兢畏懼貎騫羸瘦也崩耗敗也肱臂也升升入於牢也此言牧人暮歸不勞箠楚而牛羊馴擾從人意也臨川王氏曰言羊得其性而無耗敗也言羊而不言牛者羊善耗敗故也言羊不耗敗則牛可知矣牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱賦也大音泰後凡大師大王之類並同夢人而乃是魚年嵗豐登之祥也夢旐而乃是旟室家昌盛之兆也大人得是夢而獻之故有此占言牧人之夢闗於國家之富庶也此非托辭乃牧人實有此夢也盖其人神清氣定能先天地之幾如此此豈常人哉無羊四章章八句節南山經㫖曰此詩家父以尹氏專權致亂而作雖為尹氏作而亦以告於王也故其卒章直言家父作誦無所諱也與􅀻言之譏刺者不同矣父者名也告王之言自宜稱名春秋中凡言父如孔父季孫行父荀林父之類皆名也家父必家伯之子孫以伯為字則父之為名信矣家伯用事在幽王之世而家父見於春秋在桓王之時則尹氏之擅權當在平王之後矣觀十月之交刺皇父也歴叙家伯畨允棷橛楀諸小人而不及尹氏則幽王時尹氏子孫尚有吉甫遺風未甚失徳也至桓王時兩遣家父過魯篇内所謂駕彼四牡四牡項領者其必指此而言歟然亦可見家父乃尹氏之所信用者也家父亦賢臣欲救正尹氏故作此詩以面折之而因以告王故曰以究王訩使知警焉亦可以見其忠直矣然實僚友自相規誨之言不可以為大雅也節彼南山維石巖巖興也赫赫師尹民具爾瞻憂心如惔不敢戯談國既卒斬何用不監興意節音截下章同節髙峻貎巖巖積石貎南山節然而石巖巖以其可望而不可躋者起興也赫赫顯盛貎師大師尹氏吉甫之後為大師則三公也惔燔也不敢戯談謂不切已而閒談以見已之所言實治亂所闗欲其必聽非謂畏其威而不敢言也斬絶監視何用不監謂尹氏也此章言尹氏係天下之望而不以民憂為已憂也節彼南山有實其猗興也赫赫師尹不平謂何天方薦瘥䘮亂𢎞多民言無嘉㦧莫懲嗟興意實以草木遍滿而言猗倚也言南山有巖石而草木倚於其間則不平也故以起興方者言方來不已也薦與荐同重也瘥病𢎞大㦧痛也謂可㦧痛而無懲創嗟憐之心也此章言尹氏之失人望在於不平也尹氏大師維周之氐秉國之均四方是維天子是毗俾民不迷不弔昊天不宜空我師賦也氐夲均平維持毗輔弔恤也不弔昊天言民之䘮亂不為天所恤也尹氏正宜懲嗟以救遺民不宜使之盡空也師衆也此章言尹氏不稱重任以申上章之意弗躬弗親庶民弗信弗問弗仕勿罔君子式夷式已無小人殆𤨏𤨏姻亞則無膴仕賦也仕謂官使之也罔欺也君子對下文小人言夷平已止殆危也𤨏𤨏小貎壻之父曰姻兩壻相謂曰亞膴厚也弗躬弗親委政於小人也故民弗信於君子而不詢問之不官使之乃以為無可用者是欺罔君子也尹氏之不平止是任用姻亞小人耳故能平其心以止小人而去之則國不至於危殆矣平其心以去小人所謂式夷式已也姻亞無膴仕則小人去矣此章言尹氏惟用小人所以為不平也昊天不傭降此鞠訩昊天不恵降此大戾君子如届俾民心闋君子如夷惡怒是違賦也傭用力之意鞠窮也訩與匈匈同衆語讙擾亂之象也惠愛戾乖也天降訩戾謂天生小人禍天下也君子即上章君子也届至闋息也惡怒謂民之怨惡也違逺也言用君子而君子至至而平其政則民息而惡怒逺矣此章言救不平之禍惟在於用君子也不弔昊天亂靡有定式月斯生俾民不寧憂心如酲誰秉國成不自為政卒勞百姓賦也式月斯生言其禍之日進與月俱生也病酒曰酲國成即國鈞以綱紀法度一成而不可變故謂之國成不自為政即前章弗躬弗親而委之小人也此章言守其不平之徳則無以救亂盖欲其必改也駕彼四牡四牡項領我瞻四方蹙蹙靡所騁賦也項領引領四顧之貎蹙蹙縮小之貎謂其狹而不能馳騁也家父嘗奉使於諸侯之國見其窮蹙故言此以見天下皆亂之意方茂爾惡相爾矛矣既夷既懌如相醻矣賦也相爾之相去聲言平時以惡加人視之雖如矛㦸及既平心而得人恱懌則歡然如飲酒之相醻矣見人心易感而舊惡可改也舊說以為小人喜怒不常則非開導良心之言矣昊天不平我王不寧不懲其心覆怨其正賦也不平者昊天不弔而降之訩戾也王見天意如此則其心必不自寧欲尹氏之知警也乃復不自懲創其心則必反怨人之正已者其惡何時而已哉此亦欲其自反而不責人也家父作誦以究王訩式訛爾心以畜萬邦賦也不平之政國家訩亂之所由也故曰以䆒王訩式訛爾心以尹氏言欲其改也篇内爾字皆指尹氏或以此為責宣王當改化其心則篇内指切尹氏者皆規誨之言朋友責善之道自當如此使王知之自足以警矣何必切責王身哉節南山十章六章章八句四章章四句正月經㫖曰幽王暴虐寵愛褒姒而小人依附者皆得以訛言中傷善類君子之遭讒者無所控愬故作此詩以發其憂憤不平之情焉然惓惓為國而冀王省悟亦可謂怨而不怒矣盖在位之臣直言以譏切朝政非若風人之自叙􅀻情者也正月繁霜我心憂傷民之訛言亦孔之將念我獨兮憂心京京哀我小心癙憂以痒賦也正月舊説皆以夏正建巳之月為正陽之月在周正則為六月也盖夲左傳昭公十七年六月日食所載大史之說意必古者常以純陽為正而以此稱已月歟繁多也繁霜者政事嚴急之應戮及無辜故致此爾憂傷者憂政事之嚴急也訛言者讒言也隨口化成而無實跡故曰訛言将大也訛言為害足以䧟人於刑戮人皆憂之而曰我獨者必此人以國家為念而尤為小人所忌如下章所謂有侮也京京亦大也小心者雖有憂而不使人知之意即癙憂也䑕病則憂在穴内人所不知故癙憂謂之幽憂痒病也此章言國政嚴急而訛言可憂也父母生我胡俾我瘉不自我先不自我後好言自口莠言自口憂心愈愈是以有侮賦也瘉病也莠惡也以莠害嘉榖故借以為惡愈愈益甚之意好言莠言謂有時言人之善有時言人之惡變亂無常也以此為憂則與小人不合而為所忌矣故反見侮侮之者謂加以讒言也此章言已適當訛言之為害而不能避也憂心惸惸念我無禄民之無辜并其臣僕哀我人斯于何從禄瞻烏爰止于誰之屋興也惸惸獨也即上章獨憂之意無禄不有禄也雖有粟吾得食諸之謂也為臣僕謂國將亡而見虜也我人之人言我也無辜之民既同為臣僕我亦将從何所而可安於食粟乎與上無禄意同無辜之民亦皆并為臣僕則人無所分别如烏之首尾無異色故以烏為言非可止之處則不可止故曰于誰之屋此章言訛言将至亡國而人無所歸也歐陽氏曰烏巢烏也當止於林木屋非烏所止也止屋則近偪而将及禍也餘詳見第五章瞻彼巾林侯薪侯蒸興也民今方殆視天夣夣既克有定靡人弗勝有皇上帝伊誰云憎興意夣音蒙後言夣夣同蘓氏曰中林之木莫不摧毁而維薪蒸在焉其殘之也甚矣此說夲於鄭氏盖林以叢聚得名宜有喬木而所存者惟薪蒸則可見當時賢者已盡凋落其有存者則值訛言方殆之時視天夣夣不明使罹於禍是天之不福善也然豈常理哉盖天夲無憎人之􅀻但其時未定耳若克有定則能勝人而訛言之人不能嫁禍矣君無可愬而歸之於天以天言君心也此因流言方進於殆而望王悔禍之意謂山葢卑為岡為陵興也民之訛言寜莫之懲召彼故老訊之占夣具曰予聖誰知烏之雌雄興意山夲起於平地至卑者也然自一簣而積之則可以為岡為陵猶訛言之禍不可以為小也其積之大則成岡陵之髙矣故人君不可不懲也但訛言無實能變亂人之是非使人不可辨盖以其君自聖不聽善言故耳故耆舊之老可以决事理之得失者也占夣之官可以决徴兆之吉凶者也凡國有事皆當召之訊之以審治亂之幾而王與親近之臣皆自以為聖不聽其言謂從我所為斯已矣故治亂之㡬莫先於君子小人之别而使小人得以讒間君子則於人之是非皆不能辨如烏之雌雄皆不能知矣此言王之不能懲訛言也歐陽氏曰凡禽獸之雌雄多以首尾毛色不同而别之烏之首尾毛色雌雄不異人所難别故引以為言謂天蓋髙不敢不局謂地蓋厚不敢不蹐維號斯言有倫有脊哀今之人胡為虺蜴賦也號音豪後几呼號之號並同局曲也蹐累足也號長言之也倫序脊理也虺蜴皆毒螫之蟲也曲身而行懼壓也小歩而行懼䧟也此過為憂懼之言然於時當懼故為有倫脊也此言人肆訛言之毒雖欲避而不可得也瞻彼阪田有菀其特天之扤我如不我克彼求我則如不我得執我仇仇亦不我力賦也阪田崎嶇嶢崅之處菀茂也特苖之特盛者也扤動揺臲􅑶之意克勝也言天盡力以挫我也盖阪田而有菀然之特以壅培灌溉之力至耳喻人能加講習克治之功則無不可入於善也王之初心求我惟恐不得此其善根也其後為訛言所讒則遂堅執我為不善而視之如仇仇之又仇故曰仇仇而信我之意亦不力矣此即所謂天之扤我也王之所以不能成徳而反不如阪田者良以是耳心之憂矣如或結之今兹之正胡為厲矣賦也燎之方揚寧或滅之興也赫赫宗周褒姒烕之興意正與政同古字通用厲暴惡也此言我之憂心所以纒結而不可解者以國政暴虐将至㓕亡而原其禍實起於褒姒也盖訛言之人皆倚褒姒而肆惡耳火田為燎宗周鎬京也烕亦㓕也言火勢方楊之際夲不可撲滅者以興赫赫之宗周亦如火揚之盛也而褒姒乃以一人烕之盖可傷也時宗周未㓕以事理論之而知其必然耳終其永懐又窘陰雨其車既載乃棄爾輔載輸爾載将伯助予比也爾載之載才再反下章同窘困也隂雨則泥濘而車易䧟也載車所載也輔可解脫之物如今人縳杖於輻以防輔車也輸隳也輸載乃棄輔所致将請也伯或者之字也此言思其永終将有隂雨窘迫之時必有輔為依而後載可不隳以比平時棄賢而臨難求之則已晚矣無棄爾輔員于爾輻屢顧爾僕不輸爾載終踰絶險曾是不意比也員益也輔所以益輻也僕将車者也屢顧爾僕則非臨時将伯助予者矣既有輔而又顧僕則載必不輸而終踰絶險矣曾是之不以為意而能然乎言其嘗留意於用輔也此覆說上章之意言輔之有益而不可棄也魚在于沼亦匪克樂比也潛雖伏矣亦孔之炤憂心慘慘念國之為虐賦也炤與灼同明也此言禍亂将及而國事可憂也盖禍亂之幾已獨知之魚夲相忘於江湖在沼則懼有害故不樂也雖潛伏於沼之深處而其一㸃懼患之心亦甚自知也喻君子在亂世雖韜晦亦自知其不能避禍也慘慘愁戚貎念國之虐見其不為一身之慮也彼有㫖酒又有嘉殽洽比其鄰昏姻孔云念我獨兮憂心慇慇賦也云音員彼指小人殽解骨肉使可食也凡非榖而食曰殽比親比也云與員同周旋之意慇慇病之隠於心者也此痛小人之樂其憂也佌佌彼有屋蓛蓛方有榖民今之無禄天夭是椓哿矣富人哀此惸獨賦也佌佌瑣小貎蓛蓛窶陋貎指王所用之小人榖禄夭禍椓害哿可獨單此言民皆不堪於虐政而窮獨者尤無告欲王首先哀之也三山李氏曰衰亂之世要其極貧富俱受其禍言其一時之虐政則富者之財猶可以勝其求貧者愈不堪也正月十三章八章章八句五章章六句此詩憤世嫉邪不避忌諱忠於國而不顧其身者也自險艱之世言之鮮有不蒙危禍者矣然而敢於直言如此類者皆得免焉豈非先王立采詩之官正欲得人憤鬰之情以觀國政之有闕言雖誹謗而不以為尤故凡情之不得伸者皆欲因詩而達此文武之澤所以沒世而不忘也殺諫臣之事至春秋中葉始有之然後有誹謗之誅矣孔子謂邦無道危行言孫其有感於此歟史記載厲王使衛巫監謗得謗者而殺之之事厲王固虐君也不可以常理論然觀其直言之風乆而不絶未嘗以為懲則史遷所言亦未可盡信也十月之交以下凡譏切時政者義與此同十月之交經㫖曰皇父以犬戎方熾患将及之因而作都于向遷民之富者實之為自安計其築城之役甚大受役之賢者勞於從事而不免於讒故作此詩以警幽王也義與前篇同十月之交朔日辛卯日有食之亦孔之醜彼月而㣲此日而㣲今此下民亦孔之哀賦也十月者周正建酉之月也鄭氏義同惟集傳以為夏正建亥之月則周人以建子為正不應尊用夏時按唐志載周幽王六年十月辛夘朔日入蝕限亦不言建亥也華谷嚴氏引以證建亥之說則誤矣交者日月交㑹晦朔之間也上古君徳不虧日不常食至中古始有之故一食即為大變㣲光弱而不明也月以隂魄受日光相對不敢亢日故有㣲時而至於食若日則衆陽之宗豈宜為隂所掩而㣲哉以日食起亂政之端而言下民之罹亂者為可哀也日月告凶不用其行四國無政不用其良彼月而食則維其常此日而食于何不臧賦也日月而不用之者月不避日而干犯之也良謂善人散而無政政之亂也亂起於不用善人故致日食日食之變全係於此隂㣲者臣妾退聽之常不足為異而日食則為小人用事而不臧矣此申明上章之意􅏎􅏎震電不寧不令百川沸騰山冡萃崩髙岸為谷深谷為陵哀今之人胡憯莫懲賦也􅏎􅏎光閃貎震電雷震而電也寧安令善也沸湧起也騰上升也山頂曰冡萃崔嵬也髙岸崩䧟故為谷深谷填塞故為陵憯痛也言隂陽失節雷電震驚山川崩溢陵谷變遷災異薦臻不但日食而已此追言日食前事皆由於用小人之故而幽王不能懲也皇父卿士番維司徒家伯冡宰仲允膳夫棸子内史蹶維趣馬楀維師氏豔妻煽方處賦也趣七走反皇父與皇甫同盖氏也不然則父當為名而宣王時既有皇父矣一家相承之世豈應同名乎凡稱氏而不名者皆寵異之如尹氏也家伯仲允皆字也畨棸蹶楀皆氏也子如尹氏仍叔子之子七人之中卿士最為要職其餘司徒冡宰膳夫内史趣馬師氏六人之中雖官有崇卑而皆權寵相連者也其序則必以寵任為先後耳美色曰豔豔妻褒姒也皇父為卿士而引用家伯仲允畨棸蹶楀諸小人同依褒姒為内主也煽熱盛若火之煽也方處謂得處於勢位根據而不動揺也此言災變之大不惟無以弭之而又益之也抑此皇父豈曰不時胡為我作不即我謀徹我牆屋田卒汙萊曰予不戕禮則然矣賦也抑發語辭作謂動之而遷徙也即就也謀謂謀及庶人也如盤庚将遷而告民之意徹去卒盡也汙停水也萊草穢也戕害也謂非我害民乃民供役之常禮也此専言皇父擅權役衆之事以著其為小人亂政之首也皇父孔聖作都于向擇三有事亶侯多藏不憗遺一老俾守我王擇有車馬以居徂向賦也聖通明也孔聖自以為甚聖也正月所謂具曰予聖者皇父當在所指之中矣向地名盖東都近地三有事三卿也亶信侯維藏蓄也憗勉力為之之意老謂老臣即為卿者有車馬者謂士大夫以上有馬乘者也皇父本畿内之卿但有采地視諸侯之禄而已不當逺都於向也今擇三卿之多藏者皆運所有之財以入於向而不以一老之家遺於王所又擇其車馬而富者皆使往實向城惟以為自安計而已如使犬戎患至有何富室與王共守哉此言皇父恃寵專權蔑君避患而幽王委任不疑也黽勉從事不敢告勞無罪無辜讒口囂囂下民之孽匪降自天噂沓背憎職競由人賦也罪辜通言之則皆罪也散言之則罪之小者曰罪犯罪應死者曰辜囂囂衆口聲孽者禍之萌也噂群聚也沓重複也職主也競力之強也噂沓背憎謂噂噂聚語㳫㳫多言皆以談論人之短長而其實背則憎賢也蓋此即讒口囂囂之状然則下民之禍端豈天所降哉主此而力為之者實讒口之小人耳蓋從事於向役之賢者雖不敢言勞苦而亦不免於讒也悠悠我里亦孔之痗四方有羡我獨居憂民莫不逸我獨不敢休天命不徹我不敢傚我友自逸賦也悠悠憂長之意我里賢者所居之里也痗病羡餘徹均也當時天下皆以勞役為病而獨言我里據所親厯而言耳四方有羡民莫不逸非以為有羡餘之地安逸之民也盖得免於役以自偷安者皆行賄於皇父而為其所蔽者也我友自逸亦此類也北山所謂不均意正如此此人寧遭讒而不肯自逸亦可謂國無道至死不變者歟十月之交八章章八句雨無正經㫖曰此平王時詩也周室東遷平王不能自強於政治頼衛武公鄭武公相之而得以立國及二公去位既乆王至晚年失道滋甚正大夫離居群臣莫肯供職其􅉏御之臣獨以為憂故作此詩以責留者之怠事去者之棄君盖朋友規誨之辭其憂幽深其言切直可以為忠矣浩浩昊天不駿其徳降䘮饑饉斬伐四國旻天疾威弗慮弗圖舎彼有罪既伏其辜若此無罪淪胥以鋪賦也浩浩廣大貎昊天亦廣大之意駿大也榖不熟曰饑菜不熟曰饉旻天者仁覆閔下之名但篇内皆言昊天此不應别出一旻天盖旻當作昊字之誤也疾威謂急其威虐也慮圖皆謀也舎置淪䧟胥相鋪徧也言䘮亂者死於流離饑饉者死於困乏此皆四國無辜之民為天所斬伐而淪胥以鋪也故言有罪伏辜於理宜然置而勿論可也此無辜之民而皆䘮亂饑饉以死天之疾威如此而何天之弗慮弗圖哉夫民之災禍夲王所為不敢斥王而歸咎於天亦婉辭也周宗既滅靡所止戾正大夫離居莫知我勩三事大夫莫肯夙夜邦君諸侯莫肯朝夕庶曰式臧覆出為惡賦也周宗宗周也東遷之後鎬京之地皆已封秦周雖未滅而今滅形已成故曰既滅也正長也班在上而為諸大夫之長故曰正非謂大夫也盖世臣而不任事者離居去位以避禍也勩勞也我勩􅉏御自謂從王而勞也三事大夫謂三公及諸大夫當國用事者也夙夜謂夙夜匪懈也朝朝見夕暮見謂朝王而朝暮見也此言周既東遷群臣解體而王心猶不知用善自懲乃反出而為惡威虐愈甚也如何昊天辟言不信如彼行邁則靡所臻凡百君子各敬爾身胡不相畏不畏于天賦也辟言法言也此下四章皆為三事大夫莫肯夙夜者言凡百君子即指三事大夫之在位者此承上章言王心所以覆出為惡者本以不聽法言行無所據故耳然則法言實切於治在位者豈可以不告哉故勸之以各敬爾身欲其直言以供職也畏即敬身自畏所以畏天也戎成不退饑成不遂曽我􅉏御憯憯日瘁凡百君子莫肯用訊聽言則答譖言則退賦也曽在登反戎兵曽但也􅉏御近侍之臣即國語所謂居寢有􅉏御之箴者也憯憯憂貎瘁病而形瘁也言三事大夫莫肯夙夜䘮亂則兵形已成而不能退其患也饑饉則死形已成而不能遂其生也用訊謂以直言告王也聽言謂人言可以聽者則言之者無罪而答應之若其言足以致譖是謂譖言則退而不聽勿使得及已也此言其隨時趨避免禍容身之計故不肯用訊也哀哉不能言匪舌是出維躬是瘁哿矣能言巧言如流俾躬處休賦也不能言謂忠直而不能以巧言順人也如此之言不但出於舌而已出則必取禍故身至於瘁也前章所謂辟言不信者正謂此耳直言不若巧言者之能處休此人所以不用訊也然則巧言者非忠矣王安可不察而乃棄直言乎維曰于仕孔棘且殆云不可使得罪于天子亦云可使怨及朋友賦也于仕謂仕於此也棘急殆危也直言者天子之所謂不可使也而言出得罪此仕之所以孔棘且殆也惟巧言而天子以為可使雖無仕之棘殆然公論之所不與朋友短之則未免怨歸於朋友矣此言仕者當無得罪於公論以見不可不盡其忠直也謂爾遷于王都曰予未有室家鼠思泣血無言不疾昔爾出居誰從作爾室賦也此章為正大夫離居者言正大夫盖王之世臣與國同休戚者不當避而出外也當其出居必併京師之第而盡廢故今使之還王都則曰予未有室家以未有室家為辭見其無意於王室也其所言者如此使我聞之疾痛於心而人未有知我心者則但鼠思泣血而已鼠思與正月癙憂意同夫欲遷歸王都亦何難哉故又詰之曰昔爾出居誰從作爾室謂不必有室但肯歸則可以作矣此惓惓欲其歸輔王室之意也正大夫與三事大夫踈戚不同正大夫謂世臣無可去之義者也故責其離居三事大夫則比正大夫為稍踈而義可以去者也但既居位則有官守言責當夙夜匪懈知無不言以濟國家之難豈可為持禄容身之計哉至於不得其職不得其言然後可以言去耳不去而又不言此其所以可責也若邦君諸侯則逺臣也盖視朝政以為輕重者其不王不足責矣然則􅉏御小臣雖深有意於效忠而獨立寡儔無與共濟亦将如之何哉雨無正七章二章章十句二章章八句三章章六句此篇命題全無意先儒亦無以明之惟元城劉氏以為嘗讀韓詩有雨無極篇篇首多雨無其極傷我稼穡八字朱子以為有理獨以前二章章句長短不齊為疑此拘於文義之論也若以首章加此二句而分為二章理亦可通則劉說似未可廢焉詩說解頥正釋卷十八
