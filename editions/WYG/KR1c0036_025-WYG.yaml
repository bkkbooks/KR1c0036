body:
  text: 詩説解頥正釋巻二十三明季本撰大雅義見小雅文王經㫖曰此詩周公追述文王之徳所以受命而代商者以戒成王也東萊吕氏曰吕氏春秋引此詩以為周公所作味其詞意信非周公不能作也文王在上於昭于天周雖舊邦其命維新有周不顯帝命不時文王陟降在帝左右賦也於歎辭帝上帝也在上非必以既没言蓋其徳合於天而尊之之辭也其命維新於人心歸者見之陟降猶言進退即其心之動静也言文王昭明之徳上合於天而始受天命皆莫之為而為也蓋文王之徳本至微而無所顯之迹也上天之命本於穆而無所向之時也特以文王一動一静常與天俱所謂於昭于天也是以天命自歸耳此章言文王受命之由也亹亹文王令聞不已陳錫哉周侯文王孫子文王孫子本支百世凡周之士不顯亦世賦也亹亹勉强之意以文王之純亦不已者言也令聞則此不已之没世不忘耳陳敷也哉語辭侯維也本宗子也支庶子也言文王敷陳其徳而錫之於周使皆同徳故其子孫在夲宗則為天子支庶則為諸侯皆百世不絶而親其親矣至於本支百世所頼以謀國者在於羣臣而文王之徳亦錫及之故凡周之士亦有不顯之徳而賢其賢矣凡言不顯者皆謂為已謹獨之功不求人知之學也雖文王純亦不已不過如此以不顯言周士者以為有此徳然後可以佐理也亦世者亦百世也此正其陳錫於周者而令聞之所以不已也此章言文王徳澤及人之逺也世之不顯厥猶翼翼思皇多士生此王國王國克生維周之楨濟濟多士文王以寧賦也猶謀也翼翼敬也思語辭皇顯也惟多士有不顯之徳故其猶翼翼而顯也濟濟齊一貎與楚茨濟濟同此承上章言周士之多足以為夲支百世之楨幹而又追言文王時頼此濟濟之多士以寕者此其所以當以文王之徳敷錫之也此章言周有頼於多士之意穆穆文王於緝熈敬止假哉天命有商孫子商之孫子其麗不億上帝既命侯于周服賦也穆穆即前章所謂不顯也緝即前章所謂亹亹也熈即前章所謂昭也敬者不敢忽也止即大學止於仁敬孝慈信之意敬而止之則常明也緝熈敬止正文王不顯之徳而天命之於穆者也最為要義假大麗數也不億不止於億也謂天命之大係於商之孫子以其不億之盡服于周者驗天命也此章言文王以徳受命之實侯服于周天命靡常殷士膚敏祼將于京厥作祼將常服黼冔王之藎臣無念爾祖賦也作音佐殷士者商孫子之臣屬也諸侯之大夫入天子之國曰某士膚大敏㨗也祼灌鬯也将送也孔氏云灌時送爵也於禮王正祼后亞祼而殷士助祭行灌鬯耳宗廟之祭以祼為主故舉祼言之京周京也作助也黼黼裳也祭服上公九章舉一章以見之也冔殷冠也蓋先代之後統承先王􅁱其禮物故以冔為常服存殷制而不變也王指成王藎進也忠愛之篤進進無已也蓋以戒成王而不敢斥言故以藎臣言之猶所謂敢告僕夫云耳無念念也爾祖文王也殷士之助祼将乃武王得天下以後事然受命實自文王始故歸於文王也此章言天命不可恃而商士之臣周為可鑒也無念爾祖聿􅁱厥徳永言配命自求多福殷之未䘮師克配上帝宜鑒于殷駿命不易賦也易音異後凡難易之易並同聿發語辭永長配合師衆駿大也此申上章之意言當鑒殷而􅁱徳以求合於天命也命之不易無遏爾躬宣昭義問有虞殷自天上天之載無聲無臭儀刑文王萬邦作孚賦也有去聲遏絶宣布也義徳義也問聞通有又通虞度載事儀象刑法孚信也無遏爾躬不自絶於天也則能配命矣宣昭義問則有令聞矣有虞殷自天惟以殷之見絶於天者自度也然天道無聲無臭於穆而已實未嘗有意於亡殷即所謂帝命不時也但能儀刑文王如所謂緝熈敬止者則萬邦自孚信之矣蓋文王即天也天所賦於我之理人所同得徳足以感人心而天命豈外是哉此章言當法文王以合天命也文王八章章八句大明經㫖曰此詩周公言天命難保而陳文武受命代商之由以戒成王上篇推夲於文王此篇則歸重於武王也明明在下赫赫在上天難忱斯不易維王天位殷適使不挾四方賦也明明徳之明也赫赫命之顯也此泛言天人昭鑒之理也忱信也天位天子之位也殷適殷之適嗣也挾有也謂紂居天位為殷嗣乃使之不得挾四方而有之也此章即紂之失天下以明天命之歸有徳也摯仲氏任自彼殷商来嫁于周曰嬪于京乃及王季維徳之行大任有身生此文王賦也任音壬後凡姓任之任並同摯國名中女字曰仲壬摯之姓也殷商商之諸侯也嬪婦也京周京也嬪于京疊言来嫁于周之意王季大王之子文王父也有身懐孕也為王季生文王而發也先言摯任者任氏生於他國而與王季合徳来與之配蓋天意欲生文王見文王之生非偶然也維此文王小心翼翼昭事上帝聿懐多福厥徳不囬以受方國賦也懐来也方國四方之國也受方國言得人心之歸見文王之受天命也天監在下有命旣集文王初載天作之合在洽之陽在渭之涘文王嘉止大邦有子賦也有命旣集集於文王也文王初載為世子時也洽陽渭涘為莘國即大邦也文王嘉止者言其當行昏禮之時而大邦即生女以待之也此起下章親迎于渭之意大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光賦也俔譬也妹少女之稱譬如天之妹以其徳與天合見大姒亦天所生也文禮文也祥吉也謂卜得其吉而行納幣之禮文也不顯顯也昏禮明著故其光顯也此承上章皆起下章生武王之意有命自天命此文王于周于京纉女維莘長子維行篤生武王保右命爾爕伐大商賦也纉繼也女女事也謂大姒亦能維徳之行而克纉大任之女事自莘國来嫁故曰維莘長子長女即大姒也行嫁篤厚也言天篤厚之旣生文王而又生武王也右助爕和也爾指武王謂天保之佑之而命之爕和人心以伐商也此言武王之生不偶然而成伐商之業也殷商之旅其㑹如林矢于牧野維予侯興上帝臨女無貳爾心賦也矢誓也牧野在朝歌南七十里即書牧野誓師之事也維予侯興言我從征之人皆興起也上帝臨女無貳爾心爾作詩者指武王言人心皆興無不欲伐商者所謂予有臣三千惟一心也人心所在即上帝之所臨也故武王之心無所疑貳順之而已非謂恐或有疑而賛其决也此承上章言武王順人心以伐商之意牧野洋洋檀車煌煌駟騵彭彭維師尚父時維鷹揚凉彼武王肆伐大商㑹朝清明賦也洋洋廣大貎檀堅木宜為車者即臨戎之革車也煌煌明盛貎駵馬白腹曰騵彭彭壮盛貎師尚父太公望為太師而號尚父也鷹揚如鷹之飛揚而将擊言其猛也凉當作諒信也肆伐大聲其罪也㑹朝出兵相㑹之晨也言武王以革車三百兩伐商其在洋洋廣大之牧野宜若不見其多然其車則煌煌然明盛其駟則彭彭然壮盛亦可見其聲威之足以震人矣而師尚父之鷹揚又為武王所信而仗大義以縱兵伐商所以商紂如林之旅㑹于牧野㒺有敵于我師而前徒倒戈攻于後以北不崇朝之間盡除穢濁而天下清明矣此章言武王以徳服商實由天啟以終首章之意大明八章四章章六句四章章八句緜經㫖曰此詩周公歴舉大王避狄患遷岐周而王迹於此肇基且及文王得人心之事以戒成王也篇内言古公對今而言故謂之古則此詩必作於周有天下之後矣緜緜𤓰瓞比也民之初生自土沮漆古公亶父陶復陶穴未有家室賦也緜緜不絶貎大曰𤓰小曰瓞𤓰之近夲初生者常小其蔓不絶而後大以比太王初自豳踰梁山時其國尚小至岐周民歸者衆而始大也民周民也土齊詩作杜杜漆沮三水名漆沮者扶風之漆沮合杜水於岐山之北而流出岐下以入渭者也詳見吉日字義蓋大王初遷未至岐周定居故未有家室而先於杜漆沮三水之間野處焉陶窰也復重窟也穴土室也或為重窟或為土室皆若瓦窰之空其中故通謂之陶此言大王初遷時之小也古公亶父来朝走馬率西水滸至於岐下爰及姜女聿来胥宇賦也来者自土沮漆而来也岐下岐山之下即岐周也蓋朝發於三水之間循其水滸而一日即至岐下也岐周在后稷邰城西八十里間蓋復其舊封地也姜女大王妃也但云及姜女来居者未敢期豳民之必從已也此章言大王遷岐定居之事夲無意於國之必大也周原膴膴堇荼如飴爰始爰謀爰契我龜曰止曰時築室于兹賦也周原在岐山之南膴膴肥厚貌堇美菜如内則婦養舅姑以堇之堇許慎謂蒸食之甘者是也荼如七月采荼食農夫之荼苦菜也得霜而甘脆飴餳糖也言周原肥厚菜無分於甘苦而皆如飴也始者謀於已也謀者謀於豳人也契者以荆木然火而灼龜也契龜謂謀於鬼神也即洪範謀及乃心謀及卿士庻人謀及卜筮之序曰者龜告之辭也止者於止為宜也時者於時為宜也此章蓋因豳人從之者衆而為之謀居也迺慰迺止迺左迺右迺疆迺理迺宣迺畆自西徂東周爰執事賦也慰者慰勞之止者奠安之上章言曰止則龜告以於時宜居此也此言迺止則遂安於此以成龜告之意也左右者左右開地置邑以居其民也比已通在野而言矣疆理以分田言疆者畫其大界也理者别其條理也宣畆以營田言宣者導其溝洫也畆者治其田疇也自西徂東者言西自漆沮之水滸而東往岐山之下也周爰執事者皆西来之人競出力以為其所當為也此章言大王定民居而為之制田里也乃召司空乃召司徒俾立室家其䋲則直縮版以載作廟翼翼賦也司空掌營國邑司徒掌徒役之事凡量地制邑必先度地以居民而後致衆庶令徒役故先召司空而後及司徒也䋲所以為直凡營度位處皆先以䋲正之旣正則束板而築也縮束也載上下相承也言以索束板投土築訖則升下而上以相承載也此以䋲定室家之位而築板先作宗廟也禮君子将營宫室宗廟為先廐庫為次居室為後此見大王之重宗廟也捄之陾陾度之薨薨築之登登削屢馮馮百堵皆興鼛鼓弗勝賦也度如字馮音憑勝音升後凡憑藉之馮勝任之勝並同捄盛土於蘽也陾陾衆也度度於版上而投土也薨薨投土版中之聲登登漸髙貌削屢牆成而重複削其凸處也馮馮有所依馮而取正也五版為堵説見鴻鴈築牆而百堵興則衆工皆起矣鼛鼓鼓役事説見鼓鐘弗勝者言其樂事勸功鼓不能勝其速也此言大王之作宫室先築牆而民心勸也迺立臯門臯門有伉迺立應門應門将将迺立冡土戎醜攸行賦也伉髙貌将将大貌以臯言髙以應言大互相備也作室先立二門以尊觀望也而宫室之事自此畢矣冡土大社即諸侯之國社詳見小雅甫田字義戎大醜衆也大王於是又立冡土以依國社之神而凡有動大衆之事則宜社以行蓋社為民而立者也周之大事莫重於戎故特以戎醜言以起服昆夷之端也此可以見大王肇基王迹之逺圖矣肆不殄厥愠亦不隕厥問柞棫拔矣行道兑矣混夷駾矣維其喙矣賦也混音昆肆大也用以為發語辭殄絶也愠謂昆夷怒大王之遷居近地也隕墜也問聲聞也謂大王雖為昆夷所怒然以徳綏之而昆夷亦稱其美不失聲聞也柞栩也棫白桵也皆惡木叢生有刺而能塞路者也拔抽也抽去其根使不得生長也兑通也駾馬疾行貌言突去如馬行之疾也喙張喙而息也言昆夷所以敢於為患者恃其深林大麓之中路岐阻塞而人不易入耳今柞棫抜去而道可通行則生齒漸繁徃来不絶而昆夷駾然避去喘息不暇矣即皇矣篇所謂串夷載路也蓋大王居豳北有獯鬻之侵及旣遷岐則西有昆夷之擾但北狄大而西戎小豳地迫近強狄非可力争故去豳而遷岐此以小事大之智也若昆夷實未嘗伐也惟以徳綏之其心自服此則以大字小之仁也他日至於文王而亦事昆夷不過率大王之遺法耳此承上章言大王遷國肇基惟以服昆夷為安民之急務也虞芮質厥成文王蹶厥生予曰有䟽附予曰有先後予曰有奔奏予曰有禦侮賦也質正成平蹶動也生生意即良心也言文王能動虞芮二國之良心故質正而求成也若岐周有昆夷之患今自大王以来能盡以大字小之仁而文王纉之旣有以服其心則所行皆安民之政而化行於諸侯之國莫不皆服矣安民之政自得賢之助始故又以四臣之助終焉予詩人自予也率下親上曰䟽附相道前後曰先後喻徳宣譽曰奔奏武臣折衝曰禦侮以見文王之造周皆纉大王之緒而成王所以繼大王之業者當如文王之用賢也緜九章章六句此詩前八章皆言大王遷岐創造之事以見周家王業所由興也九章言文王得虞芮之歸心與上文似不相屬雖遷就其説以求通終屬牽强竊意虞芮一章或是錯簡惟以屬於思齊譽髦斯士之後庶㡬理順耳棫樸經㫖曰此詩周公述武王作人之徳以戒成王也舊説謂詠歌文王之徳則以辟王為後人尊稱之辭理猶可解但六軍乃天子之軍制而豈文王所得有哉此但可以為武王事而不可以文王言也芃芃棫樸薪之槱之比也濟濟辟王左右趣之賦也樸叢生也根枝迫迮而相附着也槱積也積以待乾也棫夲惡木徒足以害嘉卉去之則嘉卉生然棫樸之乾者則薪之未乾者則槱之皆得用以烹飪亦未嘗棄也以比去小人然後可以養君子而於小人亦不棄此王者作人之道也濟濟齊楚貌義見楚茨辟王指武王左右謂在其左右而不離也此章言武王能作人則人心歸附而於朝廷之事百執事皆欲在其左右而趨承矣濟濟辟王左右奉璋奉璋峩峩髦士攸宜賦也璋璋瓉也祭祀之禮王祼以圭瓉諸臣助之亞祼以璋瓉瓉勺也圭璋其柄也璋比圭得其半故半圭為璋執璋以亞祼者大宗伯而羣臣在其左右賛祼将之事者非一人曰奉則謂奉承璋事非謂左右兩人交奉而内可判也峩峩壮偉之貌髦士俊士言諸臣之賢也宜猶稱也此章言宗廟之事諸臣之賢者皆欲在其左右而助之以奉璋也淠彼涇舟烝徒楫之興也周王于邁六師及之興意淠舟行貌涇水自豳西發源南入於渭武王都鎬在渭水南則涇舟注渭所以通鎬京也故以涇舟起興言涇舟順流而下徒衆以楫棹之猶武王往邁而六師追及之衆歸其徳不令而行也自武王伐紂惟用虎賁三千人其他征伐未有六師盡行者意必以大狩講武於焦穫者言歟但此詩之意惟以見人心之歸不必指實事也此章蓋言軍旅之事為士卒者皆欲從之以徃邁也倬彼雲漢為章于天興也周王壽考遐不作人興意倬大也雲漢天之文也為章于天言其文之髙大也武王老而受命嘗自言綏我眉壽此周王之所謂壽考也言武王壽考則其徳積之悠乆斐然有文與天同其髙大人皆鼓舞何有不興起者乎蓋武王得人心之歸附其原在於作人也追琢其章金玉其相比也勉勉我王綱紀四方賦也追音堆追雕也金曰雕玉曰琢相質也追琢比功夫之有文也金玉比生質之夲美也此以自治言也言所以作人者豈在求之人哉亦惟自治以復其夲體而已我王指成王綱者舉綱之大䋲以張網之目也紀者理目之小縷以屬網之綱也綱紀四方惟在於得人心故戒成王以􅁱徳作人之功勉勉不已然後可以為四方之綱紀也棫樸五章章四句旱麓經㫖曰此亦周公歌武王之徳自求多福者以告成王也蓋四章言騂牡旣載則當自武王為天子尚赤之後言耳瞻彼旱麓榛楛濟濟興也豈弟君子干禄豈弟興意麓山足也旱麓山麓之不通水泉者榛似栗而小楛似荆而赤皆賤木而人灌溉之所不及也濟濟滋濡齊盛之貌君子指武王言旱麓之榛楛夲不資人力之灌漑而自然有濟濟之盛以喻人之生理自不能遏也蓋君子有豈弟之徳則福禄隨之是以豈弟而干禄也君子夲無干禄之心猶所謂以堯舜之道要湯云耳瑟彼玉瓉黄流在中興也豈弟君子福禄攸降興意瑟縝密貌玉瓉圭瓉也黄流秬鬯也玉瓉貴噐黄流羙酒有玉瓉則自然有黄流之注而黄流不能外玉瓉矣猶君子有豈弟之徳則自然有福禄之降而福禄不能外豈弟矣此申上章干禄豈弟之意鳶飛戾天魚躍于淵興也豈弟君子遐不作人興意天地發育萬物生意無所不至故鳶之飛則至于天魚之躍則在於淵皆自然之生理而吾道之所察也君子有作人之徳則人皆興起無不化而為善如鳶魚之飛躍於天淵則為察矣此章言武王之徳能感人也感人則人歸所以為福清酒旣載騂牡旣備以享以祀以介景福賦也清酒兼祼獻之酒謂鬱鬯并五齊也載盛於尊也騂牡用之以取膋求神故特言之而自燔膋以至剥烹禮無不備也故下文以享祀承之此章言武王能感神也感神則神饗所以助之大福也清酒騂牡詳見信南山享祀詳見楚茨各字義瑟彼柞棫民所燎矣興也豈弟君子神所勞矣興意瑟亦以密言燎者取以供㸑也因上章享祀則有廪㸑饔㸑而言蓋柞棫小木非美材長育之乆至於茂密則民得以為薪燎以事神况君子有豈弟之徳積乆而能作人豈不足以為神所勞乎此申上章言神所以介景福之意莫莫葛藟施于條枚興也豈弟君子求福不囬興意莫莫説見葛覃條枚説見汝墳葛藟以喻福條枚以喻君子之徳條枚無意於求葛藟猶君子無意於求福也不囬正言其無求福之心也旱麓六章章四句思齊經㫖曰此詩歌文王之徳而推其夲於閨門也思齊大任文王之母思媚周姜京室之婦大姒嗣徽音則百斯男賦也思語辭齊徳之一也媚愛也周姜大王之妃大姜也京周也大姒文王之妃也徽美也百斯男言其子孫之多舉成數也媚周姜謂致孝也嗣徽音繼大任之羙也百斯男謂不妬而多男曰百者并子孫言之也此章為文王刑于寡妻而發故推夲大任閨門之教以見大姒之賢有自也惠于宗公神㒺時怨神㒺時恫刑于寡妻至于兄弟以御于家邦賦也惠順也宗公宗廟先公也時是恫痛刑法也閨門之中一有欺㒺得罪於神則為神所惡而怨矣為神所傷而恫矣不欺鬼神所謂惠也隠微之間一毫無愧如此則能為法於寡妻矣言寡以見其雖寡弱而不可侮也御臨也自族人而言則曰家自國衆而言則曰邦近之而至于兄弟逺之而御于家邦皆自刑寡妻始家齊而後國治也此章要㫖在於刑寡妻而已雝雝在宫肅肅在廟不顯亦臨無射亦保賦也雝雝和也肅肅敬也在宫和之處也在廟敬之處也在宫而和常恐其䙝故在宫雝雝之時必有在廟肅肅之敬然後為不欺鬼神也不顯言人所不見也臨如臨民臨事之臨言其顯也射與斁同厭也言獨知之地常若有臨則工夫純而不已矣然兢兢自持不以已純而忽於保此可見其心之嚴於隠㣲而閨門之内所以為寡妻之法者在是矣肆戎疾不殄烈假不瑕不聞亦式不諫亦入賦也肆發語辭而有大意戎疾大難如崇侯之讚姜里之囚密湏之征昆夷之事是也殄絶也烈光假大也瑕玷也言大難雖不能無而光大之徳則無所瑕也蓋徳極其盛遇事而不動心如此聞泛聞於人也諌見規於人也式合於法也入入於善也文王徳性之知非因事而有假於聞見然其亦式亦入即其不顯亦臨無射亦保之功也肆成人有徳小子有造古之人無斁譽髦斯士賦也冠以上為成人小子童子造謂為其業也古之人指文王無斁不已也髦俊也此章言文王之徳純亦不已故能成就人才使為髦士而皆有美譽也首篇所謂不顯亦世者蓋在於此按緜之虞芮質厥成一章若以屬於此章之下理亦可通思齊五章二章章六句三章章四句皇矣經㫖曰此周公叙大王王季文王王迹之所起以告成王使之所夲也集傳得之皇矣上帝臨下有赫監觀四方求民之莫維此二國其政不獲維彼四國爰究爰度上帝耆之憎其式廓乃眷西顧此維與宅賦也耆音指皇大也赫盛明也監觀莫定也二國夏商也不獲謂失其道也四國四方之國也究究其極度度其宜皆言民心謀欲得君而主之也耆與武耆定爾功之耆同致也憎當作増式以規制言廓以幅員言謂増大其立國之規模也眷囬顧也此者指岐周之地宅居也此章首言天眷大王使居岐周為根夲之地也作之屏之其菑其翳􅁱之平之其灌其栵啟之辟之其檉其椐攘之剔之其檿其柘帝遷明徳串夷載路天立厥配受命旣固賦也屏必郢反菑翳皆木之已死者則㧞去之灌栵皆木之妄生者則治平之檉椐無用之木則辟除之使不萌芽檿柘有用之木則踈剔之使無繁冗此皆通道之事蓋豳民相從大王遷岐開闢地闢則民可居而道路通也明徳者明徳之君即大王也串夷當作昆夷載路即前篇昆夷駾矣之事大王初遷與姜氏聿来胥宇姜氏蓋有助焉故言天立厥配以見其有内助之功也此章言大王定宅於岐而天命始固也帝省其山柞棫斯㧞松栢斯兑帝作邦作對自大伯王季維此王季因心則友則友其兄則篤其慶載錫之光受禄無䘮奄有四方賦也省視㧞去兑通也柞棫㧞而松栢通所謂通道也義見緜上章作屏􅁱平啟辟攘剔之事亦此意也帝省其山如此見周有興起之勢也作邦以後日得天下言作對以後日配上帝言大伯大王之長子也王季大王之少子也蓋謂周家配天之業始於大伯王季也當時大伯以王季之徳人心所歸足以任天下之重而已則恭黙無為才畧殆不及焉故以國讓王季使王季為小亷之避則周家之業未必能成而王季友愛切至因於夲心能體其兄大伯之意遂受而不辭故周家之慶益篤雖其功業非大伯所為而亦錫之以光如書所謂於湯有光也舊説以為與其兄以讓徳之光則與孔子所謂民無得而稱者有戾矣蓋大伯之讓止是家庭常事有何異焉而王季受之亦不以為将得天下也但原周所以得天下之由則自王季受大伯之讓始故推及大伯言之自史遷以来言此事者多失夲意詳見説理㑹編卷六奄忽也奄有四方即上文作邦作對也蓋以文王言文王能得天下之人心即已奄有四方矣此章言文王得國之事以明周有天下之由維此王季帝度其心貊其徳音其徳克明克明克類克長克君王此大邦克順克比比于文王其徳靡悔既受帝祉施于孫子賦也貊音莫度華谷嚴氏謂為他人有心予忖度之之度是也上言帝省其山以功言此言帝度其心以徳言貊韓詩作莫貊其徳音者莫然清静而無聲無臭之意蓋王季此心之㣲與天通也明明其明徳也類肖乎天地也自其容養而言謂之長自其主宰而言謂之君王大邦者謂興王業於周也順比以人心言克順能使人愛也克比能使人從也言王季有明類長君之徳能使人順比以興王業也至于文王其徳亦如王季而無可悔無可悔則無亳髪之慊於心矣故能受天之福而延及子孫此亦王大邦之意也此章言王季之徳能興王業以貽文王也左傳釋此章度莫明類長君順比文九字之義語旣强排而文亦繁複今不從帝謂文王無然畔援無然歆羨誕先登于岸密人不恭敢距大邦侵阮徂共王赫斯怒爰整其旅以按徂旅以篤周祐以對于天下賦也共音恭按音遏帝謂者言天意知文王也無然者實無也非謂不可如此也畔援者有畔岸而攀援之人心依於物則有畔有畔則有援矣文王之心至虛無物何有畔援歆羡者有歆動而羡慕之也心感於欲則有歆有歆則有羡矣文王之心至静無欲何有歆羡此所以先登干岸也誕亦大也而用為發語辭岸即至善之地先登者猶言先得即先知先覺之謂也惟其心如此所以至公無私順民好惡而密人肆患不容以不遏也密近岐而界於戎翟之國在今平凉府涇州距逆也大邦謂周阮小國共則阮之邑也與密人相鄰殷政不綱故諸侯放恣而密人敢侵小國然文王已為西伯則其所專征之地也於是整我之旅以遏密人徂共之旅整旅之旅文王之旅也徂旅之旅密人之旅也言旅則不用大衆可知然密人聞文王起兵蓋亦退去矣此阮人望文王来救者也故曰對于天下天下之心歸之周祐所以篤也此章言天以文王有徳而使之伐密以得天下之心也依其在京侵自阮疆陟我髙岡無矢我陵我陵我阿無飲我泉我泉我池度其鮮原居岐之陽在渭之將萬邦之方下民之王賦也京周京依其在京言其有根夲可以憑也文王之兵一出旣遏密人徂共之旅矣乃從阮之疆畔與密相鄰之處衘枚卧鼓出密人不意而侵之所以示神速使知懼也然未嘗與戰而密亦不言出降見其已遁去而小醜不足為慮故遂還師也陟我髙岡以下皆旣還而諭密之辭也蓋使之無陳師於我陵之阿無飲水於我泉之池且自度岐周之地乃鮮少之原萬邦所向而下民所歸依此以為根夲孰敢當之以戒密人之不犯也而密人自此亦靖謐矣此終上章伐密之事舊説以度鮮原居岐陽為徙都程邑則於上文伐密之事不相連屬而又不言遷程之詳語亦近晦竊意大王遷岐經營周悉已歴三世人心安焉遷國重事也豈可輕議雖民歸漸衆自宜就野受㕓何必併國邑遷之而况岐陽渭將非逺在故都之外者乎且不數年而即遷豊豊在岐之東南三百里因㓕崇而以其地作邑焉蓋闢地漸廣而崇之頑民未馴宜親鎭撫之以定其疆理導其化源為生民計不得不然耳觀文王有聲之詩歴叙文武豊鎬之遷而不及於程則遷程之説夲不經見及考史記亦無遷程之事惟逸周書稱王宅程三年遭天大荒而遷豊蓋附㑹也後儒因以程為漢扶風安陵即今咸陽縣又或以程為畢郢之郢亦皆臆説耳帝謂文王予懐明徳不大聲以色不長夏以革不識不知順帝之則帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉賦也予設為上帝之自稱也懐眷念也明徳文王之明徳也聲謂言辭色謂容貌夏謂侈大革謂變更不大不長非但言不大之不長之而已蓋已入於無之意正所謂無畔援歆羡也此將舉伐崇之事而先言其喜怒之合於天而無私也仇方指崇也集傳據史記以為崇侯虎嘗譖西伯於紂紂囚西伯於羑里西伯歸三年伐崇如此則為私怨矣蓋虎之在崇倚紂為虐其害民有不可勝言者其譖之也亦忌之也虐民已甚衆所共讎故曰仇方文王乆以西伯專征有功紂疑已解因崇罪不可赦而伐之非私怒也故又以帝謂發之見其當伐而伐所以順帝則也兄弟與國也鉤援雲梯也援引也所以鉤引上城故謂之鉤援臨臨車在上臨下者也衝衝車從旁衝突者也皆攻城之具備鉤援臨衝以為攻具亦可見崇之負固矣墉城也崇詳見文王有聲字義此章言文王伐崇之順天命也臨衝閑閑崇墉言言執訊連連攸馘安安是類是禡是致是附四方以無侮臨衝茀茀崇墉仡仡是伐是肆是絶是忽四方以無拂賦也閑閑不暴急也言言使其言語得逹也執訊其所出降之人當訊問者則執之也連連謂不絶也攸馘謂訊之而所當馘者安安使安其生而不殺也類謂類聚所當祀之羣神以告祭非常祭也禡謂祭軍中旗纛之神也致致其来也附使之来附也茀茀將攻之時蔽芾之也仡仡城將壊而人心揺也絶㓕其國也忽忽然言其易也此言文王於崇夲無殺戮之心但示安閑而祭神以致其来附既服則待之以不死也其負固不服者然後臨城攻之縱兵大伐而城中人心揺動故其國忽然而㓕不勞餘力也當時必崇人先有出降者文王既以不死處之而崇侯猶負固故㓕之也無侮者懐㤙而不敢有侮慢之心也無拂者畏威而不敢有拂逆之事也順逆之情異而恩威之感殊此侮拂之所由别也按左傳文王伐崇三旬不降退􅁱敎而復伐之因壘而降其序與此詩不合不必盡以為據也皇矣八章章十二句靈臺經㫖曰周人追思文王有臺池鳥獸之樂而又於辟廱作樂以樂育人材也故作此詩文王存日未嘗稱王曰王在見其為武王時詩矣經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子来賦也臺而曰靈民樂而以明神之靈稱之也靈囿靈沼亦然經度營表攻作也經始勿亟謂經始之時量工命日勿急其期非謂文王戒以勿亟也此章言文王作靈臺而民樂於趨事也王在靈囿麀鹿攸伏麀鹿濯濯白鳥翯翯王在靈沼於牣魚躍賦也囿者築墻為界域而養禽獸於其中也攸伏安於孳乳而不驚動也濯濯肥澤貌翯翯㓗白貌牣滿也魚满而躍言多而得其所也此言文王樂臺沼之樂也虡業維樅賁鼓維鏞於論鼔鐘於樂辟廱賦也賁音墳虡業懸鐘磬者此編鐘編磬也舉此則八音皆備可知矣賁大鼔所以鼓衆而興事者也鏞與書笙鏞以間之鏞同即鏄鐘也論與倫同先後有序之意鼔與賁鼓不同周禮鼔人所謂以晉鼔鼔金奏者是也鐘亦從晉鼔以節之大鐘非鏞也蓋以鐘鼔先之而後作樂鼓鐘鼔每並言之陳氏暘曰樂之作也先鼓以警戒後鐘以應之意正謂此詳見廟制考義二卷末於論鼓鐘以上三句但言其設樂噐耳於樂辟廱言文王自沼囿而至辟廱樂育人材之意未及作樂也於論鼔鐘於樂辟廱鼉鼓逄逄矇瞍奏公賦也逢薄紅反鼉象龍形長丈餘聲如鼔皮堅厚故以冐鼔而名鼉鼔蓋即賁鼔以其大也鼉鼔鼔衆而後矇瞍始奏作樂之事也蓋至此而後樂始作矣此詩言文王旣樂臺池鳥獸夲有萬物各得其所之意而又樂育人材於辟廱旣乆而民猶思之此非文王與民同樂而能致其然哉靈臺四章二章章六句二章章四句下武經㫖曰此羙武王能纉大王王季文王之緒也蓋成王時詩意亦周公所作云下武維周世有哲王三后在天王配于京賦也下武者不尚武之謂也不尚武則周之哲王皆有文徳者矣王謂武王配對也謂三后徳合於天而武王能配之也京鎬京也蓋武王以武定天下然非其心之所尚也故特發之以明周之家法惟在於文徳也王配于京世徳作求永言配命成王之孚賦也武王所以能配三后于京者以其志在繼述於先世之徳能起而求之以長言合乎天命故能成王者之信於天下而配三后也王者之事業莫大於信信則天下心服而王矣此章言武王所以能合三后之徳也成王之孚下土之式永言孝思孝思維則賦也此言武王信孚於天下而為民之法者惟其心長存於孝耳孝思永則民之為法亦永矣所以為永言配命也媚兹一人應侯順徳永言孝思昭哉嗣服賦也媚愛侯維也媚而應之以順其徳即是下土式武王之孝也昭即其孝之著也服事也謂嗣先世之事也此覆説上章之意昭兹来許繩其祖武於萬斯年受天之祜賦也兹即上章之哉蓋聲相近而通用也来来世也許陳氏以為語助也繩者以為凖繩而取正也武迹也繩祖武即上章所謂嗣服也言武王之徳所以昭明於来世者亦惟繩其祖武而已故萬年之乆能受天祜見其徳之昭明其福悠乆無疆也受天之祜四方来賀於萬斯年不遐有佐賦也賀朝賀也遐何佐助也言無不助周也此申上章受福無疆之意下武六章章四句文王有聲經㫖曰此詩專叙文王遷豐武王遷鎬之事明其皆以得民心而為君也文王有聲遹駿有聲遹求厥寧遹觀厥成文王烝哉賦也遹與聿同發語辭駿大也烝之訓君蓋夲爾雅竊意烝衆也得衆然後可以為君故直以為君耳此章言文王以安民觀成功而聲名洋溢所以為君也文王受命有此武功既伐于崇作邑于豐文王烝哉賦也受命者以安民而受命也有武功以起伐崇而作豐邑非以武功為重也豐即崇地文王既滅崇則拓地漸廣而其民未馴宜親撫治之故徙居焉而文王之澤所及益逺矣蓋自岐周而遷豐也逸周書稱王宅程三年遭天大荒而遷豐其説妄矣説見皇矣此章言文王受命遷都而徳澤及逺也築城伊淢作豐伊匹匪棘其欲遹追来孝王后烝哉賦也淢城溝也方十里為成成間有溝深廣各八尺則方圍四十里城之大者也匹稱謂禮所得為稱上公之制也欲謂廣都邑以自侈大之欲也追来孝者謂追先人来及之孝也興王之夲在此故曰王后此章言文王之築豐邑夲繼志而興王業也王公伊濯維豐之垣四方攸同王后維翰王后烝哉賦也公功也濯者洗濯一新之意垣即城也豐之有垣以為保障此王功之所以一新而四方人心歸向皆以文王為楨榦言楨榦則所以為垣之夲在人矣稱王后與上章意同此章言文王為人所倚仗而莫不歸心也豐水東注維禹之績四方攸同皇王維辟皇王烝哉賦也豐水東北流經豐邑之東入渭而注於河此便於舟楫之道而禹功正欲便民如此也武王起於豐邑以有天下四方於此来同而武王遂得為君故稱皇王變王后言皇王者一統天下則其事又大也自其根基之積厚有所樹立而言謂之后自其徳業之顯著無不遍覆而言謂之皇此其所以為文王武王之别也此章言豐水係於王業之成而為下章遷鎬張夲也鎬京辟廱自西自東自南自北無思不服皇王烝哉賦也鎬在豐東武王既有天下而始遷之以其地為四方舟楫之所便所以親諸侯也既遷而即為辟廱以講學行禮則所以綏文徳者莫切於此此人心之所以無不心服而徳敎溢乎四海矣自西自東自南自北者以四方来同者言也心服故曰思考卜維王宅是鎬京維龜正之武王成之武王烝哉賦也考稽也考於人心也人心順則為吉兆矣於是以龜决而正之而武王乃居鎬京以成龜兆之吉也蓋承上章而言其遷鎬夲於天定而王業成也豐水有芑武王豈不仕詒厥孫謀以燕翼子武王烝哉賦也芑嘉榖白粱粟也詳見七月字義仕事也燕燕安之道也翼如輔翼之翼子指成王言豐水夲出嘉榖可以久居而武王所以不有事於豐者正欲貽其孫以乆逺之謀也乆逺之謀惟以燕安之道輔翼其子耳蓋惟得人心之歸然後可以燕安故鎬京之遷所以順四方之心也文王之在豐非不順人心者但為方伯四方雖同其至有時都於豐水上流舟亦足以容矣及武王為天子則四方之同来者益衆故於豐之下流為尤便也於是遂以宅鎬京為首務詩人以豐水東注言於武王其有以哉文王有聲八章章五句詩説解頥正釋巻二十三
