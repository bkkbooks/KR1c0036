body:
  text: 詩說解頥正釋卷十七明季本撰彤弓經㫖曰此天子饗有功諸侯而賜以弓矢之樂歌也蘇氏所謂其賜也行之以饗禮是己以君饗臣當為大雅彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼔既設一朝饗之賦也彤弓朱弓也弨弛貎受受於弓人也藏藏於王府也中心言誠也貺與也一朝言速也大飲賔曰饗彤弓弨兮受言載之我有嘉賔中心喜之鐘鼔既設一朝右之賦也載載於弓檠而抗弓體使正也右尊之也古人以右為尊尊其功而右之所以有饗也彤弓弨兮受言櫜之我有嘉賔中心好之鐘鼔既設一朝醻之賦也櫜韜也謂弢弓也醻報也饗之所以報其功也彤弓三章章六句鄭氏曰凡諸侯賜弓矢然後専征伐華陽范氏曰先王知天下諸侯之不可無長故為之方伯連帥以維之其有功則賜之弓矢使專征伐以正諸夏此王室之所以尊也不然則強陵弱大併小而莫之制天子之政令有所不行矣東萊吕氏曰所謂專征者如四夷入邉臣子簒弑不容待報者其他則九伐之法乃大司馬所職非諸侯所專也與後世強臣拜表輙行者異矣又曰受言藏之言其重也受弓人所獻藏之王府以待有功不敢輕予人也中心貺之言其誠也中心實欲貺之非由外也一朝饗之言其速也以王府寳藏之弓一朝舉以畀之未嘗有遲留顧惜之意也後世視府藏為己私至有以武庫兵賜弄臣者則與受言藏之者異矣賞賜非出於利誘則廹於事勢至有朝賜鐡券而暮屠戮者則與中心貺之者異矣屯膏吝賞功臣解體至有印刓而不忍予者則與一朝饗之者異矣菁菁者莪經㫖曰此人君得賢而愛樂之詩也序以為樂育人材者意固不切至集傳謂燕賔客之詩則詩中凡為燕饗而發者皆有嘉賔㫖酒鼔樂之語而此一無及之恐不可目以為燕或因以用於燕耳如蓼蕭亦無燕語則亦但可為送來朝諸侯之詩耳凡言樂歌而語不及於燕饗者皆當以此例之此詩亦大雅也菁菁者莪在彼中阿興也既見君子樂且有儀興意菁菁茂貎莪羅蒿也莖可食既老則為蒿蔚而不可用詳見蓼莪字義中阿阿巾也以喻賢者在山澤之間宜及時用之及其既老則不可用而終於棄置矣君子指賢者樂者得見而中心樂之也有儀謂敬畏賢者則而象之不敢肆也菁菁者莪在彼中沚興也既見君子我心則喜興意樂出於心即是喜也菁菁者莪在彼中陵興也既見君子錫我百朋興意百朋者元龜之直至重者也元龜長尺二寸直二千一百六十為大貝十朋盖二貝為朋凡言朋者皆以貝言也至於十朋以上則為龜矣此班固食貨志龜貝之品也况百朋又十倍於十朋者乎賢者能邃知來物而以先幾啓人如元龜然其重莫加是天賜我以百朋也舊說以為如得重貨之多則計利之言非所以加於賢者也汎汎楊舟載沉載浮興也既見君子我心則休興意楊舟楊木為舟也載則也毛鄭以載為載物殊不知沉浮為未見君子而心不安之喻也烏得以載物言之菁菁者莪四章章四句六月經㫖曰尹吉甫伐玁狁成功而歸以飲御諸友故在朝之君子作此以美之非朝廷勞還之詩也勞還宜别有詩而今不傳耳六月棲棲戎車既飭四牡騤騤載是常服玁狁孔熾我是用急王于出征以匡王國賦也六月長樂劉氏云建巳之月是也集傳以為建未非矣盖周已改正士大夫在朝稱謂豈宜用夏正之月哉然與出車四章鄭氏以黍稷方華為六月者不同盖彼以黍稷之華當在建未之月故耳吉甫與南仲同時而征玁狁吉甫之詩言其先赴大原而在京發程之時也故其月在前南仲之詩言其繼往朔方而在外觸景之時也故其月在後其實同為一時事耳棲棲猶依依謂心依於王事也飭整肅言其夙戒也騤騤馬行不息貎言其欲進也行師之備莫先於車馬故特舉而言之以見其急也常服在軍則以戎服為常熾火盛貎于曰也謂王命也匡正也王國指鎬京而言即豐鎬之鎬也時玁狁至於涇陽則王國震驚矣此言六月出師之所以急也比物四驪閑之維則維此六月既成我服我服既成于三十里王于出征以佐天子賦也比物而四牡皆驪馬有力而又齊其色也可以見馬之有餘矣則法也馬皆合法所謂不稱其力而稱其徳也能閑習之可以見教之有素矣服即戎服也三十里者一舎之地也古者吉行五十里師行三十里此言行師之慎見其急而有制也四牡脩廣其大有顒薄伐玁狁以奏膚公有嚴有翼共武之服共武之服以定王國賦也共音恭後凡恭敬供給之共並同馬之身長背廣者然後為大顒者顒然可望也曹氏别以首大為顒非也盖此言馬之大而有力乃其平時所物者如此奏薦膚大公功也嚴者宻於中也翼者肅於外也共與恭同武之服謂戎衣也既著戎衣則當敬共而所以為共者不過嚴與翼耳承上章四驪閑習而言馬之強壯足以自備而吉甫但薄伐之以奏大功不待大兵之出也薄伐而成大功謂問其罪而玁狁自服也盖其所以行兵者惟以嚴翼敬共為本不敢輕於用武故能以此成功而定王國也周自文武以徳懐來蠻夷已率服矣穆懿以降徳教漸衰至於厲王失道滋甚而玁狁始復侵犯若求其故豈可窮兵吉甫復申文武之化而啟其本心則玁狁亦思反正何為而不效順哉王國前言匡此言定自其欲定而言則曰匡自其既匡而言則曰定此言吉甫能敬事而不以戰勝為功也玁狁匪茹整居焦穫侵鎬及方至于涇陽織文鳥章白斾央央元戎十乘以先啓行賦也織音志與熾同茹如柔亦不茹之茹言不可輕視也整居言其兵之整飭也焦穫在令西安府涇陽縣西北鎬在周畿近邉之地非鎬京也方即朔方玁狁自鎬方而入侵至涇陽即屯焦穫去鎬京僅百餘里耳其兵甚整此正其不可茹也央央在中不定之貎元戎十乘者不用大衆也先啟行者謂吉甫之意不在戰功但欲諭以辭命責以大義示以聲威故先至涇陽以驅逐出境盖徐相機宜以制發兵之節耳此言玁狁勢強而吉甫不以兵力屈也戎車既安如輊如軒四牡既佶既佶且閑薄伐玁狁至于大原文武吉甫萬邦為憲賦也大如字輊車之覆而前也軒車之却而後也凡車從後視之如輊從前視之如軒然後適調也佶壯健貎吉甫尹吉甫此時大将也車馬安閑皆能調習惟以自備故不言弓矢戈矛見其夲意不在於用武也而吉甫但自涇陽薄伐之驅逐以至大原以其身所備文武之徳柔服而已自其徳之能感動人而言則曰文自其徳之能震懾人而言則曰武文武夲一徳隨宜而施前章所謂共者共此而已言吉甫能不假兵力以成功而可為天下法也吉甫燕喜既多受祉來歸自鎬我行永乆飲御諸友炰鼈膾鯉侯誰在矣張仲孝友賦也燕喜者謂成功以歸則安而可喜也多受祉者謂王國既定則福亦及之也來歸自鎬而其行永乆盖鎬即大原吉甫但至此乆居經畧之而已不窮追而以兵迫也私飲酒而非公燕曰飲詳見彤弓字義御進侯維也以其在外日乆而歸故飲御諸友以叙歡洽之情而在席獨舉張仲為言則所重在於張仲耳盖張仲者吉甫之友也善父母曰孝善兄弟曰友張仲有孝友之徳吉甫平日所資以輔仁者故能以愛民為本不忍有傷以見今日之不戰屈人其原盖有所自矣此言吉甫既歸而燕朋友以明徳有所歸也六月六章章六句詩言薄伐者惟此與出車二篇觀其所稱止於車馬而不及陳師鞠旅整衆脩戎之事可以見其發兵之初意本不期於戰也聖人之所謂成功者盖在於此宜深玩之采芑經㫖曰方叔奉命南征而能以威望服蠻荆故詩人作此以美之也薄言采芑于彼新田于此菑􅅕興也方叔涖止其車三千師干之試方叔率止乘其四騏四騏翼翼路車有奭簟笰魚服鉤膺鞗革興意采取也芑嘉榖也如生民維糜維芑之芑舊說以為苦蕒菜非也田􅅕之中不宜有菜而以三千之車采之菜亦不應如是之多此以采芑起興謂新治之田雖非素稔若民得盡力於此亦畧有收故以薄言若勞於用兵則無暇治農矣涖臨也其車三千言革車之多也舊說法當用三十萬人以武王革車三百兩虎賁三千人例之則亦但當用三萬人耳每乘百人之說未可據以為常也辯見讀禮疑圖卷三車言三千則廣車輕車具在其中統而言之則皆兵車也方叔臨此三千之車其所肄習於師衆者惟在其千言干則所重在扞蔽盖師行以備擊射也路車象路也奭赤色尚未臨陣故不用戎路戎路革輓而漆之是為墨車其色非赤也此言方叔為帥而率衆惟乘象路以示閒暇不汲汲於乘革車以待戰也薄言采芑于彼新田于此中鄉興也方叔涖止其車三千旂旐央央方叔率止約軧錯衡八鸞瑲瑲服其命服朱芾斯皇有瑲葱珩興意中鄉死徙無出鄉之鄉田在鄉居之中治墾未成與菑畆同旂旐央央以三千之革車言也行軍有五方之旗但舉青龍之旂𤣥武之旐盖以東北二方見其餘耳詳見千旄字義八鸞四馬八鸞也詳見蓼蕭字義瑲瑲與鏘鏘同詳見有女同車字義命服天子所命之禮服也朱芾即赤芾詳見車攻字義皇猶煌煌也命服非戎服朱芾非韎韐言方叔乘象路而鏘然鳴鸞服命服而瑲然鳴佩皆示閒暇也蓋申説上章之意鴥彼飛隼其飛戾天亦集爰止興也方叔涖止其車三千師干之試方叔率止鉦人伐鼓陳師鞠旅顯允方叔伐鼓淵淵振旅闐闐興意鴥説見晨風隼鷂也陸農師曰一名雀鷹蓋迅疾之鳥隼之擊物遇懷胎者輙釋不戮故曰隼閔胎義也隼疾鳥有義而亦知止以興兵有義心而當蚤戢之意鉦者鐲鐃之總名鐲以節鼓鐃以止鼓皆屬於鼓人主節止而言故曰鉦人耳陳謂陳之使成行列也鞠謂告之曲盡也自其合聚而言則曰師自其部分而言之則曰旅蓋互言之鞠旅惟以警衆未及戰也鞠旅必先陳師故伐鼓以集衆衆既集則止鼓以聽誓故伐鼓文在其上而屬之鉦人也淵淵深逺之意臨川王氏所謂師衆則鼓逺鼓逺則聲深是也然亦可見其軍行之肅靜矣振旅者振作之也使之戒嚴勿或惰衰耳闐闐衆盛聲所謂鞠旅者意正如此盖先為不可勝之備也左傳以出為治兵入為振旅其說不通辯見春秋􅀻考桓公六年大閱下矣此言方叔紀律之嚴而在我者有不可勝之形也即其肅靜而觀之所謂藏於九地之下者也此非有誠明之學者不能故揭而稱之曰顯允允而既顯誠則明矣蠢爾蠻荆大邦為讐方叔元老克壮其猶方叔率止執訊獲醜戎車嘽嘽嘽嘽焞焞如霆如雷顯允方叔征伐玁狁蠻荆來威賦也蠢動而無知之貎蠻荆荆州之蠻也詳見殷武字義大邦猶言中國也元大猶謀也壮猶非謂以力勝者老成長慮而檐當不疑也執訊獲醜說見出車亦蠻荆所自就縛非以戰擒也戎車即三千之車也嘽嘽衆多聲焞焞明盛貎霆雷之急疾者即霹靂也此以軍威示先聲其實不用戰也方叔侵伐玁狁必是采􅅔時嘗為帥非與於吉甫大原之師也大原有吉甫翔方有南仲各分所部而皆以不戰成功矣何與於方叔哉來威者來服而畏威也此言方叔以素望而致蠻荆之服也采芑四章章十二句車攻經㫖曰序說宣王復古也宣王能内脩政事外攘夷狄復文武之境土脩車馬備器械復㑹諸侯於東都因田獵而選車徒焉集傳仍之已得其大意矣但古之天子未有無事而召集諸侯㑹同者周官行人曰時㑹以發四方之禁盖天下苟有不義則徴其鄰國之諸侯入㑹以定禁止不義之謀既㑹則使王臣出盟以誓同奨王室謂之同盟事無常期隨時而㑹故曰時㑹也宣王之㑹諸侯得非以其鄰境有不義如蠻荆淮夷之未服而發禁歟因而田獵以講武事則先以練習耳此豈無故而滛田哉詩人見其狩無計功計利之心真為王者之徳也故特作此詩以羙之實與瞻彼洛矣互相發明但此因狩而言故舉狩為重耳當為大雅我車既攻我馬既同四牡龎龎駕言徂東賦也我本宣王言車田車也攻治也謂治之堅也同齊也四牡有力之馬也龎龎力之厚實也觀後章四黄盖必齊其力而又齊其色矣詳見六月字義東東都洛邑也此言初發車徒而徃東都未及所為之事也田車既好四牡孔阜東有甫草駕言行狩賦也車好則攻矣牡阜則同矣甫草甫田之草也甫田藪名東都常狩之地也此言行狩則指其所為之事矣之子于苖選徙囂囂建旐設旄搏獸于敖賦也之子以天子所使掌狩者言也為苖除獸故曰苖選數也徒衆也囂囂連呼聲言徒衆無或讙譁惟數之者囂囂有聲見其靜冶也敖地名在甫田西界此言選徒而将行狩也以上三章皆舉狩備以為下文張本尚未實狩也駕彼四牡四牡奕奕赤芾金舄㑹同有繹賦也彼指諸侯言奕奕聫絡布散之貎見諸侯乘車之衆也芾與黻同蔽膝也詳見終南字義諸侯則赤芾舄諸侯亦赤舄詳見狼䟦字義赤舄而加金飾故曰金舄時㑹曰㑹同盟曰同繹不絶貎此章言諸侯因王事而來㑹於東都也决拾既佽弓矢既調射夫既同助我舉柴賦也决即韘也所以䕶大指詳見芄蘭字義拾以皮為之著於左臂以遂弦故亦名遂佽謂手與指相次比也調謂弓強弱與矢輕重相得也射夫謂諸侯來㑹者夫則男子之緫名也同謂恊於天子而從獵者也柴說文作㧘謂積禽也助天子舉柴見諸侯不􅀻其所獲也舉柴但以獲禽言非謂獲多也若獲多則與大庖不盈之言相礙而非古者不欲多殺之意矣此章言諸侯既㑹同而助我田獵以舉積禽也四黄既駕兩驂不倚不失其馳舎矢如破賦也四黄則又齊其色矣倚偏也馳馳驅之法也舎矢如破巧而力也駕馬之時先使兩驂不倚所以正其馳也不失其馳而舎矢如破則御者志不在於多獲而獲必以正矣此見其徒御之良而田獵所獲非詭遇之功也蕭蕭馬鳴悠悠斾旌徒御不驚大庖不盈賦也蕭蕭肅靜貎斾詳見六月字義臨當搏獸之時亦設斾故以斾旌言然曰悠悠則亦見其從容自得矣徒即前章選徒之徒御謂御車者不驚謂不以失禽為驚也大庖君之庖也謂寧大庖不盈而不貴於多殺也盖古人無計功計利之心其於禽獸取其不用命者足以充用而已豈欲過多而使大庖之盈溢哉此承上章而言不貴多獲之意觀徒御如此則之子之掌狩者其亦聖人之徒歟之子于征有聞無聲允矣君子展也大成賦也聞音問後凡聲聞之聞並同征行也聞徒衆之行而不聞其聲言至肅也前章所謂選徒囂囂而無或讙譁者意正如此君子指宣王自其成徳而言則曰君子自其徳之大備而言則曰大成上二章皆聖人之事也故緫而贊美之如此云按此詩雖兩言之子特以見有司之事其實主此狩者宣王也觀於瞻彼洛矣則可知矣車攻八章章四句此古人田獵之正道也孟子御者羞與射者比比而得禽獸若丘陵弗為之言可謂得此詩之心矣駟鐡吉日視此氣象何如哉吉日經㫖曰此必非宣王時詩盖時王之逺荒於田者也在位之臣作此詩以誇美之其實寓規誨焉不以陳於君則非大雅也吉日維戊既伯既禱田車既好四牡孔阜升彼大阜從其群醜賦也戊剛日也伯馬祖也求福曰禱謂祭馬祖而求禱之也醜衆謂禽獸之群衆也車堅馬肥而升大阜以從羣醜則既狩矣吉日庚午既差我馬獸之所同麀鹿麌麌漆沮之從天子之所賦也庚午亦剛日也差擇也觀上章所言盖已狩於近地矣至於庚午甫踰二日而復差馬将狩於逺地也獸之所同言其聚也麀鹿牝獸非可供乾豆者而特舉以言見其非為祭祀故不擇物但利其多故就其聚處耳麌麌衆多也漆沮二水合於同州至朝邑縣而入渭在涇水之東乃漢馮翊之漆沮也循漆沮而上皆髙山多獸是獸之所同也其地在畿内按爾雅十藪周有焦穫在今涇陽三原二縣之間當涇水之東北漆沮之西南去鎬京百餘里此周人常狩之地也但漆沮合流之處去鎬京已三百里循二水而上則又逺矣而天子親往焉故曰天子之所諷其出太逺而淫獵也瞻彼中原其祁孔有儦儦俟俟或群或友悉率左右以燕天子賦也中原漆沮之原中也祁大也趨則儦儦行則俟俟獸三曰羣二曰友燕樂也從狩者悉率左右之人以樂天子則無人不以狩為媚矣此言其欲得獸之多也既張我弓既挾我矢發彼小豝殪此大兕以御賔客且以酌醴賦也方持弦矢曰挾一矢而死曰殪豝如一發五豝之豝豝以肥得名獸比豵為大者也對兕而言則為小耳發矢本為小豝而所殪乃大兕則見虞人驅獸之多與騶虞翼五豝以待射者異矣御進也醴汁滓相将如今甜酒也但云御賔客以酌醴而不言供祭祀明其但以樂賔充庖而不知事神豈非荒於田狩而燕飲無節者乎其視車攻氣象大不侔矣吉日四章章六句鴻鴈經㫖曰此人民離散而其君能勞來安集流民喜之而作此詩盖國風也不知其屬於何國而必以為宣王則鑿矣鴻鴈于飛肅肅其羽興也之子于征劬勞于野爰及矜人哀此鰥寡興意鴻鴈春北秋南轉徙無定肅肅畏懼貎盖欲避繒繳有所懼而不敢棲故其羽肅然喻流民之不安其居也之子流民自相謂也劬勞病苦也以流民在野時言及至也矜人能矜恤人者即不忍人之民牧也老而無妻曰鰥老而無夫曰寡言我昔日在野劬勞及至今有矜我之人而後能以我鰥寡為哀也鴻鴈于飛集于中澤興也之子于垣百堵皆作雖則劬勞其䆒安宅興意鴻鴈之趾連蹄不能握木故漸于木則為不安澤者鴻鴈之所安也中澤澤中也于垣流民既歸築墻而作室也一丈為板五丈為堵雖則劬勞言其始在野之劬勞也䆒終也宅居也鴻鴈于飛哀鳴嗸嗸興也維此哲人謂我劬勞維彼愚人謂我宣驕興意嗸嗸喻流民愬苦之聲以其在野之劬勞言也宣驕者謂小民當以謙謹為恭若以愬人則其心驕肆而不能自晦矣此惟哲人為能察之而愚人不能知也鴻鴈三章章六句庭燎經㫖曰刺不蚤朝也天既明矣諸侯朝者辨色而猶不蚤起視朝故詩人作此以刺之也盖似王風夜如何其夜未央庭燎之光君子至止鸞聲將將賦也央中也處燎之光謂始然而有光也止語辭将将衆集逺聞之聲詳見有女同車字義夜當未央時則來朝者未至君門其鸞聲大而逺聞也夜如何其夜未艾庭燎晣晣君子至止鸞聲噦噦賦也艾盡也晣晣燎乆而光小也􅎪􅎪聲之㣲也夜當未艾時來朝者漸近君門其鸞聲緩而㣲也夜如何其夜鄉晨庭燎有煇君子至止言觀其旂賦也鄉音向有煇謂燎盡而見煙也觀其旂則天明而朝者之車旂皆可見矣古者人君視朝辨色而入然入朝諸侯其車自夜分而即至盖敬君之禮不敢不豫也至於向晨辨色則可入朝矣然曰觀其旂則猶在外也至此而猶不出視朝上之怠荒可知矣舊説王将視朝不安於寢而問夜之蚤晚則鄉晨何待於問也向晨而不出尚得為寢之不安乎庭燎三章章五句􅃆水經㫖曰亂世讒謗相傾而勸其友以謹言免禍故作此詩此朋友相戒之辭也􅃆彼流水朝宗于海彼飛隼載飛載止興也嗟我兄弟邦人諸友莫肯念亂誰無父母興意􅃆水流滿也水趨於海猶臣子歸向於君也隼鳥飛而能止喻鷙悍者不至於放縱也如此則人有為國之忠而不敢肆為讒言此所取之興也我兄弟即後章所謂我友也邦人諸友指在邦者而言則非我友矣莫肯念亂謂其以讒言生亂也此言在邦諸友不念亂之所起在於讒言故呼我兄弟而謂其當謹言以免禍勿貽父母以憂辱也􅃆彼流水其流湯湯彼飛隼載飛載揚興也念彼不蹟載起載行心之憂矣不可弭忌興意湯湯泛溢也飛揚不止也不蹟謂無蹟可據即無稽之言也載起載行憂之深而不遑寧處也彼飛隼率彼中陵興也民之訛言寧莫之懲我友敬矣讒言其興興意訛偽也即上章所謂不蹟以此誣加於人則謂之讒言也言隼率陵中而飛猶将有所止也而訛言則人無有以其生亂而自懲者猶前章所謂莫肯念亂也安得有止時哉故呼我兄弟而戒之曰我友當敬敬者謹言以慎其行也如此庶幾可以免禍不敬則讒言興而禍将及矣禍及則父母可知是安可忽而不敬哉􅃆水三章二章章八句一章六句集傳曰卒章脫前兩句鶴鳴經㫖曰此詩說者多異鄭氏謂教宣王求賢似非詩意惟序曰誨宣王也董氏解云此詩其師傅所作歟庶幾近之集傳雖不明言所作之由而亦謂其必陳善納誨之辭也盖亦不逺於序說云當為大雅鶴鳴于九臯聲聞于野魚潛在淵或在于渚樂彼之園爰有樹檀其下維蘀他山之石可以為錯比也鶴長頸竦身髙脚頂赤身白頸趐尾黒常夜半鳴聲髙幾聞八九里臯澤中水溢出所為坎從外數至九蘀木之先落葉者當指惡木言之方與下章榖字相應錯礪石也鶴鳴于九臯聲聞于天魚在于渚或潛在淵樂彼之園爰有樹檀其下維榖他山之石可以攻玉比也榖一名楮惡木也作榖者非攻玉所資者錯也鶴鳴而聲逺聞誠之不可掩也魚潛而或在渚理之無定在也此豈有一息之可忽乎彼園與他山相對皆以在外者言謂人之有善當擇以相從不可併其惡而不知也人之有惡當取以自礪不可以其不善而遂棄也此二者皆取諸人以為善之事進徳脩業之實功也人臣之所以誨其君者莫此為切非知道者其孰能與於此鶴鳴二章章九句詩說解頥正釋卷十七
