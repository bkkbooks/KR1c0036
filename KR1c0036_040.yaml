body:
  text: 詩說解頥字義卷八明季本撰周頌我將一章羊實柴之羊也周禮羊人凡積其其羊牲鄭氏謂積為積柴䟽云積柴實牲幣煙氣上聞也又謂祭天用犢日月以下有用羊者故云維羊維牛而鄭司農於大宗伯實柴註又直云實牛柴則其說不同矣今詳此詩夲祭上帝其牲用犢者也而維羊之文在其上牛人不言積共牛牲而獨羊人於積言羊則可見實柴當以羊矣實柴之羊非大牢之羊也臣工二章錢鏄銍三者皆田噐也毛氏曰錢銚鏄耨銍穫也管子曰一農之事必有一銍一耨一銚今按此三噐者必分耕耘刈三用故管子云然錢之為銚說者不詳世夲云垂作銚而宋仲子註為刈則銍夲刈噐而刈噐又有一銚不知其為何物矣但銚孔氏以為七遥反則即今之鍬也一謂之鍤所以起土可用於耕蓋耜類耳而刈噐則惟一銍即今之刈禾短鎌也鎛先儒或以為鋤或以為耨蓋一噐而異名也耨六寸柄尺高誘註吕覧云耨芸苖也六寸所以入苖間豐年一章廪者倉之别名韻㑹曰夲作㐭象屋形中有户牖以防蒸熱禮記月令䟽引蔡氏云榖藏曰食米藏曰廪則以廪與倉相對為二矣此亦漢儒過於分析之言也蓋廪即倉也韻書恒以倉訓廪則夲一名耳但周禮地官有廪人之軄設下大夫以掌之而倉人軄居其下則以上士掌之是以廪大於倉而下大夫為之長也夫倉人者别是司禄之一軄一軄之倉不可以並下大夫兼統之倉矣億十萬也秭百億也凡數皆以十累十其一為十十其十為百十其百為千十其千為萬十其萬為億十其億為兆爾雅註十億為秭則秭即兆也毛氏則以為數萬至萬曰億數億至億曰秭鄭氏不從其說而於伐檀楚茨皆云十萬曰億不為無據蓋古者田方百里於今數為九百萬畆而王制云方百里為田九十億畆是億為十萬矣韻㑹曰十萬曰億古數也至秦時改制始以萬萬為億而孔氏亦謂今九章筭術皆以萬萬為億故鄭氏之說於古義為合觀豐年之詩豳頌也豳以諸侯方百里提封萬井之國為公田百萬畆舉成數計之畆收一石八斗為米九斗緫得米九十萬石成之為百萬則數及秭矣若數萬至萬而又數億至億雖天子百萬井之田以把起數亦不應如此之多况於諸侯高廪所藏之米乎有瞽一章業簴崇牙詳見靈臺字義樹羽置五采之羽於崇牙之上也田鄭氏以為當作􅉧小鼓也在大鼓旁應鞞之屬也周禮太師註曰先擊小鼓乃擊大鼓小鼓為大鼓先引故曰􅉧􅉧讀為導引之引孔氏曰經傳皆無田鼓之名而太師職曰奏鼓􅉧註云為大鼓先引故知田當作􅉧其或謂之應或謂之鞞皆别名也若􅉧應之大鼓必路鼓鼓鬼享者此以節樂必有輕重疾徐如魯鼓薛鼓之節故有小鼓以引之而路鼓則以懸也按夏后氏足鼓殷人楹鼓即建鼓至周始變其制而懸之故謂之縣鼓足承以趺楹貫以柱而懸則垂於簨簴者也凡大鼓不特路鼓凡晉鼓賁鼓皆懸但此對應􅉧而言則縣鼓當為路鼓或以為晉鼓則恐不然蓋晉鼓鼓金奏者也應􅉧小鼓要之不列於縣以便用也毛氏以田為大鼓則考之不審矣鞉如鼓而小有柄兩耳持其柄而摇之則旁耳還自擊所以節樂樂未作之先則以兆晉鼓鼓金奏大射禮䟽所謂賔至摇之以奏樂者也磬石磬也在堂下非堂上之玉磬也柷状如漆桶以木為之中有椎連底挏之令左右擊以起樂者也圉亦作敔狀如伏虎背上有二十七鉏鋙刻以木長尺櫟之以止樂者也簫編小竹管為之管如篴併兩而吹之者也濳一章鰷白鰷也形狹而長若條然性浮似鱨而白鱣鮪並見碩人正釋鱨鰋鯉並見魚麗字義有客二章信宿毛氏曰一宿曰宿再宿曰信爾雅曰宿宿言再宿也信信言四宿也訪落五章桃蟲即鷦鷯小鳥也巢於葦苕取茅秀為巢至精密以麻紩之如刺襪然故名襪雀俗呼巧婦陸璣曰鷦鷯小於黄雀其雛化而為鵰陸農師則曰其化輙為鵰鶚集傳釋桃蟲拚飛維鳥亦取化鵰之說而言其始小終大恐不必然蓋但謂桃蟲既為鳥則能拚飛也載芟五章胡壽也老而有成徳故曰胡考或曰老狼垂胡老者有此狀則壽也六章且之為訓不同本字初冩反取聊且之義此云匪且有且亦謂非今日聊且為之也毛氏以且訓此則臆說耳又有起語之辭如且夫且如之類亦大畧言之而因以發語也又有訓又如北門終寠且貧之且則遂以為轉語之辭此三訓皆讀如本字其餘則為助語辭如北風只且君子偕老揚且之類是也又有訓為多貌者如韓奕籩豆有且有客有萋有且之且是也此二訓皆子餘反併附於此良耜三章荼爾雅作蒤謂為委葉即此荼也或以為苦菜非也苦菜雖亦名荼與委葉不同詳見邶谷風字義蓼亦蒤類皆穢草也但陸生則為蒤水生則為蓼孔氏所謂田有原有隰故並舉水陸穢草也集傳則曰荼陸草蓼水草一物而有水陸之異也今南方人猶謂蓼為辣荼或用以毒溪取魚即所謂荼毒也如此則蓼亦以荼名矣絲衣一章絲衣爵弁之服也禮凡衣與冠同色孔氏曰爵弁之服𤣥衣纁裳皆絲為之故曰絲衣爵弁其色赤而黒如爵頭然曹氏曰餘皆用布惟冕與爵弁服用絲大夫以上祭服謂之冕士祭服謂之弁其首服弁則衣用絲故絲衣為助祭之服也今按餘皆用布者謂皮弁服冠弁服𤣥端服皮弁服鄭氏所謂白布衣素積以為裳也冠弁服鄭氏所謂其服緇布衣亦積素以為裳𤣥端服據聘禮則𤣥端皆𤣥裳或黄裳雜裳可也陳氏祥道謂齋則衣裳皆𤣥非齋則裳不必𤣥而鄭氏以𤣥端為朝服之衣易其裳而曰上士𤣥裳中士黄裳下士雜裳又釋玉藻朝服冠𤣥端素裳陳氏祥道亦謂其無據士之朝服曷嘗用𤣥端哉詳見淇奥字義堂基舊說皆以門塾言爾雅云門側之堂謂之塾是堂即塾也蓋門之内外夾其東西皆有塾一門凡四塾外兩塾南向内兩塾北向謂之堂則宜有基矣安成劉氏謂詩所指則内塾之基也此夲毛鄭彼蓋夲詩序以繹為賔尸堂在門外而為說也殊不知此非賔尸之詩則當求其文而解之考之禮視壺濯及籩豆明言升自西階則實廟堂之上非門塾之堂也及出而視牲視鼎則出門而在堂基之下矣此詩之自堂所以不可以門堂言也朱子既辯序之為誤而以此為祭而飲酒之詩安得復以堂從門塾之說乎臨川王氏獨云自堂上而徂基得之矣自羊徂牛舊說皆以為先小後大非也蓋從韻語耳鼐鼎鼒者上中下三鼎之别也鼎有大小弇侈之不同故爾雅曰鼎絶大者謂之鼐圜弇上者謂之鼒天子諸侯有牛鼎大夫有羊鼎士則豕鼎魚鼎非用牛者不敢有大鼎也則士大夫之所通用不過鼎鼒而已言鼐則為天子之禮矣鼎有則覆鼎之巾也故視鼎者舉其也駉一章坰逺於郊野之地也爾雅曰邑外謂之郊郊外謂之牧牧外謂之野野外謂之林林外謂之坰以其逺近分之固有此别然通言之則均謂之郊可也均謂之野可也郊野者又其通名也驈皇驪黄驪馬白跨曰驈黄白曰皇本爾雅純黒曰驪黄騂曰黄本毛傳郭璞曰跨髀間所跨據之處二章騅駓騂騏蒼白雜毛曰騅黄白雜毛曰駓本爾雅赤黄曰騂蒼祺曰騏夲毛傳郭璞曰騅今騅馬駓今之桃華馬孔氏曰周人尚赤而牲用騂是騂為純赤色上云黄騂曰黄謂黄而㣲赤此云赤黄曰騂謂赤而㣲黄祺者黒色之名蒼祺謂青而㣲黒今之騘馬也今按此騘馬與烏騘不同烏騘乃驪白雜毛之駂也三章驒駱駵雒青驪驎曰驒白馬黒鬛曰駱夲爾雅赤身黒鬛曰駵黒身白鬛曰雒夲毛傳孫炎曰驒色有淺深似魚鱗也郭璞曰色有淺深斑駁隠𥻘今之連錢騘也孔氏曰鬛謂馬之騣也駵馬赤色若身鬛俱赤則騂馬故赤身黒鬛曰駵即今之駵馬也雒俗夲多作騣字然爾雅有驪白駁謂赤白雜色駁而不純非黒身白鬛也其字定當為雒今按雒與駱不同亦非東山皇駁之駁蓋其色異也四章駰騢驔魚隂白雜毛曰駰彤白雜毛曰騢二目白曰魚夲爾雅豪骭曰驔夲毛傳郭璞曰隂淺黒色今之泥騘彤赤色今之赭白馬魚似魚目也孔氏曰骭脚脛膝下之名謂毫毛在骭而白長名為驔也今按魚目非謂其眼之眊也但多白而似魚目耳又此詩四章所叙之馬凡十六種毛氏謂諸侯六閑馬四種有良馬有戎馬有田馬有駑馬而說者因以首章為良二章為戎三章為田四章為駑則分别太過矣經中不言馬之高下而皆曰牡至於車則曰彭彭曰伾伾曰繹繹曰袪袪亦皆言其有力而能勝車固未見其有四等之分也若其齊力齊色則在臨時分乗而已况駱馬騏駵詩中每稱及之今不列於首章豈可以為非良馬乎故此詩之序馬但言其馬之多而未以高下差也有駜一章駽爾雅曰青驪曰駽孫炎曰色青黒之間郭璞曰駽今之鐡騘也泮水七章束矢古者一弓百矢以賜諸侯者言之彤弓一則彤矢百也惟荀卿兵論以負矢五十箇為一弩則或分百矢為二束也然兵行常一發四矢如孟子所謂發乗矢而後反也蓋原其未發時言則通名為束矢耳閟宫四章白牡特言之則牛也對騂剛而言則羊也註家於白牡騂剛之白牡皆祖公羊周公用白牡之說而以為白牡則指為牛矣而不知公羊之說亦有所本郊特牲曰諸侯宫縣而祭以白牡擊玉磬朱干設錫冕而舞大武乗大輅諸侯之僭禮也竊意春秋時諸侯有僭天子者不敢盡當時王尚騂之禮而用殷人尚白之牲以别之世儒因見詩有白牡騂剛之文遂謂周公之牲亦嫌同於天子而從殷尚公羊得之因附㑹其說於春秋耳而明堂位魯祀周公牲用白牡之云則又漢書陋儒相沿之誤也據此則始用白牡以祭周公者伯禽也伯禽本明德之君而祭周公以白牡於義何居邪非禮之禮大人必不為也犧尊以畫犠牛於罇腹而名也王肅謂大和中魯郡得齊大夫子尾送女噐有犧罇以犧牛為尊此不可考信有之則亦末世強家之侈制耳五章朱英以飾矛主矛言緑縢以約弓主弓言蓋二矛則飾之而各懸一英重弓則縢之而同納一韔皆置車中此士卒兵車左持弓右持矛而中御者之法故但舉矛弓二噐言於公車千乗之下英矛詳見鄭清人縢見秦小戎各字義戎狄詳見韓奕字義荆舒荆即荆楚詳見殷武字義舒近楚之國魯僖公時猶止名舒其後分為数種始有舒蓼舒庸舒鳩之號謂之群舒今廬州府廬江舒城等縣皆其地也近楚而與之表裏為患蓋自周公時已慮其然矣六章泰山在今濟南府泰安州北五里蓋嘗考之魯在汶南泰山在汶北非周公百里封内後世為魯兼併得之因以為望及考泰山之南舊有小國曰鑄不知何時見滅其國當依泰山故泰山夲非魯封也龜山名在今兖州府泗水縣東南五里魯故封也龜隂之田在其北䝉亦山名在兖州府沂州費縣西北七十里在魯之東故曰東䝉七章鳬山地里攷異以為在兖州東南三十里而一統志則曰在鄒縣西南七十里繹山地里攷異以為在鄒縣南二十二里而一統志則曰在鄒縣東南二十五里如此則皆非魯封境矣殊不知詩以鳬繹與龜䝉對言則皆魯封内地也必二山之北面舊夲屬魯而地里攷異及一統志所傳乃其南面屬鄒者耳九章徂徠山名一曰尤來山在今泰安州東南四十里酈道元曰今猶有美松赤眉樊崇保此山新甫亦山名按後魏志魯郡汶陽縣有新甫山通典漢汶陽故城在兖州泗水縣東南商頌烈祖一章清酤即清酒亦用以祼者也詳見信南山字義周人尚臭先灌地以求神於隂而後迎牲殷人尚聲先合樂以求神於陽而後迎牲殷人非不祼也但不行於合樂之前與周不同耳故孔氏以為殷周先後雖異而作樂行祼相去亦㡬也長發一章幅猶言邉幅也隕讀作員義與圓同周也華谷嚴氏曰自其直方言之曰幅自其周圍言之曰員有娀國名簡狄之母家也自漢以前其地不詳故淮南子以為在不周之北朱子謂其不應絶逺如此是也夫不周山者崑崙之西北也其說信荒唐矣史記正義則以為在蒲州今按蒲州即古蒲坂在鳴條之西蓋縁殷紀桀敗於有娀之墟奔鳴條之語而附㑹之耳伊訓謂天誅造攻自鳴條朕載自亳則湯之起兵自北亳先伐韋顧昆吾而西直抵鳴條亦不應逺越河曲渡河而至蒲坂也說者謂鳴條為湯與桀戰處則仁人之兵天下無敵宜必不戰而自屈矣既曰敗於有娀又何必追至鳴條而復戰邪况蒲坂至虞夏之都不逺豈應有有娀之國入於畿内近地邪竊意有娀其即商前舊國而在商洛之地者歟以有娀封商如以邰封周也否則有所不通矣六章韋豕韋彭姓顧昆吾已姓見鄭語通典滑州韋城縣古豕韋國郡國志顧城在濮州范縣東二十八里夏之顧國括地志濮陽縣古昆吾國故城在縣西三十里今按滑州今滑縣屬大名府廢韋城在滑縣東南五十里濮陽漢縣即濮州今屬東昌府韋與昆吾皆夏時之伯至是伯業已衰韋與顧相鄰比周而助桀為虐者也夏桀都安邑今屬平陽府解州鳴條縣在縣北二十里即伊訓所謂造攻自鳴條桀走鳴條蓋亡於此殷武一章荆楚之荆古荆州也與禹貢雍州荆岐豫州荆河之荆不同雍豫之荆各指一山之名耳荆州之界自荆山南及衡陽故言荆楚則别於山而為國矣禹貢九州已有荆州則其封國蓋不特自殷始也孔氏曰周有天下始封熊繹為楚子武丁之世不知其君為何人據此則殷時之楚本别姓而尚未為芊姓之熊也楚自春秋初葉以前常以荆稱至周惠王之時魯僖公元年始改楚號不復稱荆矣然在武丁時巳曰荆楚則雖專名為荆而亦以荆為楚矣蓋荆楚一木二名因以為國號其名亦得相通必其地夲以剪除荆楚之木而得名歟二章氐羌西夷名黄氏曰羌夲姜姓三苖之後居三危今疊宕松諸州皆羌地按疊疊溪也宕順慶也松松潘也皆𨽻四川孔氏以為居秦隴之西而括地志亦云隴右岷洮叢等州西羌也故一統志以寜夏靖虜文縣皆為西羌地但隴西者夲犬戎之地其外為西戎春秋以前非羌地也意者戰國時氐羌日盛而漸併西戎之地歟享入貢也王來朝也曹氏以為氐羌之國近者以時聘享逺者亦來終王氐羌自謂此商之典常也日祭月祀時享嵗貢終王此所謂典常也曹氏之說蓋夲國語甸服者祭侯服者祀賔服者享要服者貢荒服者王而以享與王為逺近之差今詳詩意則似戎狄之在荒服者世一見王孔氏所謂逺夷父死子繼及嗣王即位乃來朝也而非來朝之日凡遇嵗貢之時則有貢獻故以獻先於王蓋待戎狄之道禮當如此不必以要荒分二等也而况賔服之享又與要荒不同乎詩說解頥字義卷八
