body:
  text: 詩説解頥正釋卷二十五明季本撰蕩經旨曰厲王無道詩人知其將亡故作此詩而託於文王所以嗟嘆殷紂者以警戒之也然惓惓之意欲以感動王心亦可以見其憂國之忠矣此詩若非面陳則當為小雅耳蕩蕩上帝下民之辟疾威上帝其命多辟天生蒸民其命匪諶靡不有初鮮克有終賦也多辟之辟音僻蕩蕩廣大貌辟君也暴虐而疾其威則非蕩蕩即是多辟也多辟多邪僻也如此則蒸民之生其命亦不可信其必善矣諶信也所以不可信者其故何哉蓋自其初言之未有不善自末而言之少有以善自終者此所謂敗以取禍非天命本然也孔子曰性相近習相逺即此意也此章言王之多辟乃其自喪本然之善耳文王曰咨咨女殷商曽是強禦曾是掊克曾是在位曾是在服天降慆德女興是力賦也此以下皆託為文王嗟歎殷紂之言也咨嗟也殷商謂紂也強禦才強粱而能禦人者也掊克聚斂之臣也服事也慆與滔同慢也強禦之人必為掊克之政使之在位用事則是天降慆慢之德而害民矣然此乃由女所作興故使彼得力為之如此文王曰咨咨女殷商而秉義類強禦多懟流言以對寇攘式內侯作侯祝靡屆靡究賦也作音詛祝音呪而汝秉執也善類之權皆其所操也流言謂禦人以口給之言流出無窮非謂流浪不根也作與詛同謂民怨惡而詛祝於神使降之禍也式解見後章強禦之人多所取怨乃以口給之言相抵對而恣為掊克之政則是為寇盜攘竊者用於內矣然則人之怨惡而詛祝者寧有屆究哉屆至究極也此申上章言殷紂用小人而取怨也文王曰咨咨女殷商女炮烋于中國斂怨以為德不明爾德時無背無側爾德不明以無陪無卿賦也炮烋言氣健如虎狼之作威也斂怨以為德多為可怨之事而自以為德也背後側旁陪二也此承上章言殷紂暴虐取怨以其力作興小人而前後左右皆無善人為輔也文王曰咨咨女殷商天不湎爾以酒不義從式既愆爾止靡明靡晦式號式呼俾晝作夜賦也號音豪湎飲酒變色也湎酒者不義之事也式用也非天使之乃從其自用也止容止也式號式呼即愆女止也無明無晦晝夜嗜飲酒也晝不理政事則晝亦如夜矣此章言殷紂之沈湎於酒而不理事也文王曰咨咨女殷商如蜩如螳如沸如羹小大近喪人尚乎由行內奰于中國覃及鬼方賦也奰皮器反蜩螳詳見七月字義蜩螳蟬亂噪者也沸羹湯亂沸者也言天下皆亂則無小無大幾於喪亡矣由行由此而行不知變也奰怒也鬼方殷時夷狄之名謂荆蠻也此章言殷紂樂所以亡而逺近無不怨也文王曰咨咨女殷商匪上帝不時殷不用舊雖無老成人尚有典刑曽是莫聽大命以傾賦也不時謂大命之傾也舊舊章即典刑也莫聽者不聽信也此章言殷紂不率舊章而失天命也文王曰咨咨女殷商人亦有言顛沛之揭枝葉未有害本實先撥殷鑒不逺在夏后之世賦也顛仆也沛者仆地之勢揭本根揭起之貌撥動其根而斷絶也無德而失人心則本先撥矣夏桀之世如此所以當鑒也此章言殷紂之失人心與夏桀同也此詩七章皆以殷紂為言所以警厲王之意切矣蕩八章章八句抑經旨曰此衛武公自警之詩也辨説論之詳矣但以為九十五嵗而作則未必然蓋其時必已老而傳矣觀戒戎作謹侯度乃強壯方為諸侯時之言必非既老而始作也或者老猶誦此詩以自警耳武公雖嘗入相於周然非告君之辭蓋小雅也抑抑威儀維德之隅人亦有言靡哲不愚庶人之愚亦職維疾哲人之愚亦維斯戾賦也抑抑者抑而又抑之意威儀揚則放抑則斂故退抑而不發揚乃修身之要功也隅廉隅隅有角則正可以知其內之方矣哲者明之細微曲折無不透徹之名靡哲不愚猶言哲亦有愚時也職主戾罪也庶人之愚亦主於威儀不謹之疾耳哲人之愚非以威儀不謹而為戾哉亦維斯戾正靡哲不愚也蓋能抑抑威儀則為哲不然則愚矣此詩専以謹威儀為德也無競維人四方其訓之有覺德行四國順之訏謨定命逺猶辰告敬慎威儀維民之則賦也競強也無競猶言莫強也覺覺悟謂能自明也覺則威儀之所以抑抑也通天下而言則曰四方即四方之國而言則曰四國其實一也訓教也順順從也人皆服從其教不待威力強之則莫強於德矣訏謨謂以威儀修身所謀係於天下國家之大也定命謂足以定天命也如此則訏謨即是逺猶矣辰告如書入則告爾后于內之告謂時時入告使我得謹於威儀也民之則即所謂訓順也此章言威儀所係之大其在于今興迷亂于政顛覆厥德荒湛于酒女雖湛樂從弗念厥紹罔敷求先王克共明刑賦也今謂當時世俗也興迷謂作興昏迷之事即湛酒也荒廢也女武公使人誦詩而命已之辭也後凡言爾言小子者放此湛樂從者惟湛樂之是從也紹謂所承之緒也敷廣也廣求先王所行之道也共奉刑法也此章言世俗所尚者湛酒亂政而欲敬奉先王之明刑也如此則能謹威儀矣肆皇天弗尚如彼流泉無淪胥以亡夙興夜寐灑掃廷內維民之章修爾車馬弓矢戎兵用戒戎作用逖蠻方賦也弗尚厭棄之也謂不為天所尚則其亡如流泉趨下之易豈可相與淪陷而至此哉夙興夜寐灑掃廷內言宫壺之潔清也宫壼者德之所始言廷內蓋微辭也德著於外故曰維民之章此言齊家以謹內治之事也戎兵戎事之兵器也戒備作起逖逺也蠻方夷狄之通名當戎事未起之前而戒備之所以逖逺蠻夷之侵擾此治國戒不虞之事也皆申上章克共明刑之意質爾人民謹爾侯度用戒不虞慎爾出話敬爾威儀無不柔嘉白圭之玷尚可磨也斯言之玷不可為也賦也質定也威儀為民之則所以質人民也克共明刑以掃廷內戒戎作所以謹侯度而戒不虞也此承上章言化民保國皆本於威儀而威儀之敬惟在慎言蓋為之難言之得無訒乎之意言不敢肆則專務實行而威儀必能柔嘉矣柔順嘉美玷缺也無易由言無曰苟矣莫捫朕舌言不可逝矣無言不讎無德不報惠于朋友庶民小子子孫繩繩萬民靡不承賦也易輕捫持也朕我也自周以前朕為通稱逝去讎答惠恩也無易由言而以言為不可苟正謹言功夫也如此則無人為我持其舌者而言自不能放也無言不讐者言從德出則人感之而亦以德報不由於德則人亦將悖入矣此可見言不可苟而當以德為本也德則有惠及人而人報之朋友以羣臣言庶民以百姓言小子則武公自謂也此蓋泛論報施之理故言羣臣百姓與小子之無知如我者皆施及之而知感也子孫指君之子孫繩繩如繩之牽連不絶也承受也蓋至其子孫繼世而天下萬民無不承其德澤者不但四方四國訓順於一時而已見其化之及後世也此承上章言謹言以敬威儀之效視爾友君子輯柔爾顔不遐有愆相在爾室尚不愧于屋漏無曰不顯莫豫云覯神之格思不可度思矧可射思賦也友君子人所共見之處也屋漏室西北隅獨知之處也射厭也輯柔爾顔正威儀之柔嘉也不遐有愆謂無過也威儀於其可見處觀之未見其功夫之密也必於獨知之地無愧屋漏乃為不顯之德此章言敬威儀之功不在於顯而當謹於微也觀此數言則武公之學可謂得其深矣辟爾為德俾臧俾嘉淑慎爾止不愆于儀不僭不賊鮮不為則投我以桃報之以李彼童而角實虹小子賦也辟君也以武公之君德言臧嘉以不顯之德言也不愆于儀以友君子時輯柔爾顔言也僭差賊害也僭則有愆而害德不足以為民則矣此申前章敬慎威儀維民之則意有威儀而民則之是以德相感如投桃報李之必然也若牛羊之童者尚未有角而何可得其角之用哉蓋有角則能觸物以喻無德則不能感觸人心也虹猶誑也小子亦武公自謂也華谷嚴氏曰虹謂幻惑也如蝃蝀不正之氣暫見於天須臾散滅武公時為諸侯之庶子故自稱小子是也此章言人君實德之足以感人而不可不謹威儀也荏染柔木言緡之絲興也溫溫恭人維德之基其維哲人告之話言順德之行其維愚人覆謂我僭民各有心興意荏染柔貌柔木柔忍之木也緡綸也被之綸以為弓也木有柔忍之質然後可緡絲為弓以射四方猶人有柔嘉之德然後可淑止為君以順四國也哲人心虛聞善若決江河故告之話言則惟德之行而必求其柔嘉愚人則不能而反謂我為差故曰民各有心此章言哲人能聽善言以順行柔嘉之德也於乎小子未知臧否匪手攜之言示之事匪面命之言提其耳借曰未知亦既抱子民之靡盈誰夙知而莫成賦也言發語辭示之事以實之不但手攜之而已提其耳以誨之不但面命之而已如此則喻之者詳且切矣此即所謂告之話言也靡盈不自滿也不自滿豈有不順德之行者哉夙知知之早也抱子則已早知必不待晚始有成也此亦申上章之意昊天孔昭我生靡樂視爾夢夢我心慘慘誨爾諄諄聽我藐藐匪用為教覆用為虐借曰未知亦聿既耄賦也夢夢不明貌慘慘謂憂其德之不明所謂靡樂也諄諄詳熟也藐藐忽略貌聿忽然也耄毛氏訓老是也言忽然既老也與亦既抱子意同非必真以九十為耄也國語謂武公九十五而作此詩蓋誤認此句文義耳不以我為教而反以我為虐下文未知蓋本此而言此章言已憂德之不明而自咎其不能聽教也於乎小子告爾舊止聽用我謀庶無大悔天方艱難曰喪厥國取譬不逺昊天不忒回遹其德俾民大棘賦也舊即前章所謂先王明刑亦以威儀言也止語辭遹僻也不謹威儀即回遹其德矣使民至於困急豈有不喪其國者哉此章言不可敗德以失人心也而意益切矣抑十二章三章章八句九章章十句桑柔經旨曰厲王之時榮夷公專利芮良夫作此詩刺之而因警王左傳云芮良夫之詩是其證也蓋朋友相戒之辭當為小雅菀彼桑柔其下侯旬捋采其劉瘼此下民比也不殄心憂倉兄填兮倬彼昊天寧不我矜賦也倉音愴兄音恍菀盛貌旬遍也桑以柔為善桑之為物其葉最盛而下皆遍滿足以為人芘蔭劉殺伐也今併其逺揚而在所伐者亦捋采之則其下者可知而葉盡矣葉盡而無芘蔭此下民之所以病於日暴也為人上者剝削其民使之失所芘蔭正與此同故以為比倉兄與愴恍同悲閔之意也填積也新安胡氏以為悲閔積滿於中是也倬大貌矜哀也此章言下民甚困而天不矜也四牡騤騤旟旐有翩亂生不夷靡國不泯民靡有黎具禍以燼於乎有哀國步斯頻賦也翩飛揚貌四牡旟旐厭苦兵革之辭也或以為厲王時無兵革之事則與旟旐有翩之言不合矣意者用兵無功而史遂不傳耳夷平泯滅也黎黑首也不夷謂不能平亂也靡國不泯禍及天下也民靡有黎言黎民皆盡即具禍以燼也頻急蹙也此章言征役不息民窮國危而可哀也國步蔑資天不我將靡所止疑云徂何往君子實維秉心無競誰生厲階至今為梗賦也疑音嶷將養也國步蔑資言征役不息民無所資以為飬也疑與嶷同定也民無所資而天不我飬則無可止之地矣欲往則又無可避患之處此即所謂靡國不泯也君子指王言無競不爭也端默無為之意謂其遺棄國事也厲惡也謂為厲階者榮夷公也至今以今日之亂言也此章言榮夷公病民生亂而王不知也憂心殷殷念我土宇我生不辰逢天僤怒自西徂東靡所定處多我覯痻孔棘我圉賦也土宇民所土著之居也僤厚也西鎬京也東東方諸侯之國也自西徂東靡所定處即上章靡所止疑云徂何往也如此則土居皆非已有而可念矣覯遇痻病也言中國亂而見病也况邉圉又急將何時而可已乎此章言亂甚而無可安之時也東萊吕氏曰一章至四章皆極言其亂也為謀為毖亂况斯削告爾憂恤誨爾序爵誰能執熱逝不以濯其何能淑載胥及溺賦也毖慎况兹也序爵以賢而序其高下如上賢則居上位中賢次之下賢又次之也逝發語辭為謀為毖言王之為謀當愼也况國亂方削而可不愼乎所以愼謀者亦惟憂恤其民而以得賢為先耳故教之以憂民之道而欲其序爵焉此則以水濯手而免於執熱之患也苟或不然則必將併其身入水相與及溺而已何能善乎此章言厲王當求賢愛民以慎靖亂之謀也如彼遡風亦孔之僾民有肅心荓云不逮好是稼穡力民代食稼穡維寶代食維好賦也遡嚮也僾唈謂風唈人而氣短也蓋國亂不暇喘息之意肅敬謂敬事而不敢忽也荓使也不逮者謂奪其民時而不及耕耨也好是稼穡謂稼穡之為善也與代食維好之好同力民代食使民盡力於農畝而祿足以代仕者之耕也寶重也謂重榖也言民以耕田為事豈無勤事之敬心哉其以不得耕耨為言者王實使之故當以稼穡為善而寶重之使民自盡其力以飬仕者而代其食此稼穡之所以為好也蓋因上章序爵而言欲王務農重榖以飬賢即孟子分田制祿之意也天降喪亂滅我立王降此蟊賊稼穡卒癢哀恫中國具贅卒荒靡有旅力以念穹蒼賦也滅我立王謂天欲滅我使不得輔王自立非謂所立之王也蟊蟲名詳見大田字義賊害也然此非以害稼者言蓋借以指當時在位貪亂之人能害國者即天所降之喪亂也天下既亂則民不得盡力於農畝所以稼穡卒病而無成也贅屬也具贅言其人皆危也荒虛也卒荒言其室盡空也穹蒼天也穹言其形蒼言其色念穹蒼所以匡王室也國危民散則賢者無以為飬而飢餓不能任事故無膂力以匡王室也中國如此豈不可痛哉此章意與上二章相反維此惠君民人所瞻秉心宣猶考慎其相維彼不順自獨俾臧自有肺腸俾民卒狂賦也惠君順理之君也宣布也秉心以執德言宣猶以發謀言言其用心於為謀者惟在考慎其輔相之人即前章序爵之意也不順者惠君之反也自有肺腸即獨臧也卒狂謂民之終亂也此章言惠君當順人心以擇賢相而不順者不能也蓋以用賢靖亂之道責之厲王矣瞻彼中林甡甡其鹿興也朋友已譖不胥以榖人亦有言進退維谷興也中林以喻中朝甡甡並育不相害意朋友謂寮宷蓋指下章所謂愚人也譖謂相讒也榖善也谷山谷墜於谷則危地也故至此為窮進退皆窮如將陷於山谷也此章言輔相者不賢則人皆讒譖而不以善相與曽鹿之不如也則賢者無容身之地矣維此聖人瞻言百里維彼愚人覆狂以喜匪言不能胡斯畏忌賦也聖人以賢臣言瞻言之言語辭也百里謂所見能及於逺也亂在百里之外靡國不泯也而能見之所謂瞻也愚人即後章所謂貪人覆狂以喜謂以亂為喜安其危而無逺慮也匪言不能謂所言能及百里之逺也此章言賢人與貪人相反畏其譖而不敢言也維此良人弗求弗迪維彼忍心是顧是復民之貪亂寧為荼毒賦也復音覆良人即聖人迪進之也忍心即愚人顧念復重也貪亂之民即化於貪戾而作亂者寧何也荼即蓼能殺物故謂之荼毒也詳見良耜字義民既為亂而王於良人不求進用至於愚人乃顧念重復使為民害是不能救民之亂而反荼毒之也貪亂者亂民也所荼毒者良民也此終前章俾民卒狂自獨俾臧之意大風有隧有空大谷興也維此良人作為式榖維彼不順征以中垢興意隧道也大風為大谷所容因可通之道而發則其暴猛之勢不可遏也以喻不順之人為君所容則亦乘間而發矣作為行事也式榖猶言以善也即不胥以榖之反也此不順對良人而言謂貪人之忍心者也征行也中中所藏也垢汙也言其中藏之汙穢盡發行之以致害物與大風之暴猛無異也此以下皆言貪人之不順也大風有隧興也貪人敗類聽言則對誦言如醉匪用其良覆俾我悖興意敗類謂欲使人同歸於不善也聽言謂所言與之相合而肯聽者也彼則喜而對之誦言謂以言誦於其前而欲強其聽者也彼則如醉而暴亂乘之矣蓋貪人喜其同而惡其異也我之有善彼不能用而反使我從其所為是不用其良而覆俾我悖也所謂貪人之敗類者如此嗟爾朋友豫豈不知而作如彼飛蟲時亦弋獲既之隂女反豫來赫賦也隂音蔭朋友即指貪人飛蟲猶言羽蟲指鳥而言豫豈不知而作謂知其不合必不聽從而亦有言也蓋如鳥之飛過或亦有時弋獲則庶幾其有偶中耳本以善言蔭覆而反加怒於我其威赫然則中垢盡行矣亦上章誦言如醉之意也此章言貪人但欲敗類而不足與言善也民之罔極職涼善背為民不利如云不克民之回遹職競用力賦也背音悖後凡反悖之背並同民之罔極謂為亂者之不止也涼薄也謂其心主於刻薄寡恩而仁厚之言則背之不疑也不利者有害於民也如不克者謂用力之強必欲勝也無德及民而力行害民之事是教民使為亂也然則民之回遹豈非貪人用力強者為之主哉回遹即罔極之邪行也此章言其寡恩背正而導民為亂也所謂生厲階而為梗者如此民之未戾職盜為冦涼曰不可覆背善詈雖曰匪豫既作爾歌賦也未戾者謂未有所至之處即所謂民之罔極也職盜為冦言盜臣為攘冦之行以導民為亂也涼曰不可以其涼薄為不可此夲善意即所謂既之隂女也善詈者工於罵也大聲以罵即所謂反豫來赫也匪豫者言彼欲自飾非己罪也然我既作歌則其罪欲辭而不得矣此章申言上二章之意以直指夷公之致亂其罪不能自解也桑柔十六章八章章八句八章章六句雲漢經旨曰此述宣王憂旱之詩也古序以為仍叔美宣王則朱子未敢必其為仍叔作也然亦意其傳授或有所自來耳倬彼雲漢昭回于天王曰於乎何辜今之人天降喪亂飢饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聽賦也倬大也雲漢天河也昭明回轉也天河明未雨之候也薦與荐通薦臻謂連年旱也靡神不舉所謂國有凶荒則索鬼神而祭之也牲以祭神圭璧以禮神也此章言旱甚而禱不應也旱既大甚藴隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨耗斁下土寧丁我躬賦也斁丁故反藴畜隆盛也蟲蟲熱氣熏人也郊者祀天地也宫者宗廟也在上曰奠謂置於地在下曰瘞謂埋於土皆指事神禮物牲玉之類宗尊也禋祀兼天神地祗人鬼故曰靡神不宗也臨饗斁敗丁當也丁我躬夲何辜今之人而言此申上章之意以見禱之所以不應也華谷嚴氏曰在宫之神莫尊於后稷非不臨顧我而力不足以勝旱災在郊之神莫尊於上帝力足以勝旱災而不肻臨顧我皆以耗敗下土也旱既大甚則不可推兢兢業業如霆如雷周餘黎民靡有孑遺昊天上帝則不我遺胡不相畏先祖于摧賦也推土雷反推去也不可推者謂后稷不克上帝不臨而無由去旱也孑者孑然獨立之貌旱甚則周民亂後之所餘者將無一人可遺矣民無遺則我無所依是即天不我遺也先祖之業以得民而成無民則先祖之業亦摧落矣安可不畏所以兢業如雷霆而憂旱者此也此章言旱甚民亡而大命將去為可畏也旱既大甚則不可沮赫赫炎炎云我無所大命近止靡瞻靡顧羣公先正則不我助父母先祖胡寧忍豫賦也沮止也不可沮即不可推之意赫赫旱氣炎炎熱氣也云我無所謂措身無所即不我遺也止猶終也近止言國運不久將終非謂死將至也靡瞻靡顧者謂無所仰望也羣公古之上公勾龍后稷之類也先正先世為官之正人即月令所謂雩祭百辟卿士之有益於民者也彼既力不能助固無望其必助矣父母先祖乃至親者豈可忍之而不我救乎所謂靡瞻顧者如此胡寧寧也亦何字意此章言鬼神不佑而國之大命乃必傾也旱既大甚滌滌山川旱魃為虐如惔如焚我心憚暑憂心如熏群公先正則不我聞昊天上帝寧俾我遁賦也滌滌言山無木川無水如滌而除之也魃旱神也山川既滌滌矣而旱魃猶為虐見旱之不止也惔燎之也憚暑者畏旱之為虐也憚暑故憂心如熏遁者措身無所而欲逃避無可奈何之辭也謂昊天上帝亦哀閔下民者何為使我遁逃無所乎蓋即云我無所之意上章呼父母而告之此章則呼天而告之迫切之情也大抵此詩之意皆本呼天呼父母而言或合或分皆致其丁寧反覆云耳旱既大甚黽勉畏去胡寧癲我以旱憯不知其故祈年孔夙方社不莫昊天上帝則不我虞敬恭明神宜無悔怒賦也黽勉畏去謂民責在我勉於濟難雖欲遁逃而不能去也癲病憯痛也謂旱之癲我痛於心而不知其得罪之故也祈年即月令所謂孟春祈榖于上帝孟冬祈來年于天宗也孟春建寅之月孟冬建亥之月也夙早祈之於未田之前也方社即小雅甫田之社方但彼言省方之合祭此則春祈社秋報方之分祭耳於禮無失則合於天而無所虞度於我故曰昊天上帝則不我虞蓋事天敬神已皆盡於心無可悔神必不怒則致旱之故不在此矣所以黽勉畏去而必欲求其故也旱既大甚散無友紀鞫哉庶正疚哉冢宰趣馬師氏膳夫左右靡人不周無不能止瞻卭昊天云如何里賦也卭音仰後凡瞻仰之卬並同友謂群臣人君為四方之綱羣臣各有統紀庶官必屬於長此禮之常也今以旱荒之急各司祈禱賑救之事故分散而無友紀也鞫窮疚病皆以救旱之勞瘁言非以其困於食也庶正者在庶位之正人而冢宰則庶官之長也趣馬師氏膳夫並見十月之交字義左右近御與趣馬師氏膳夫同為王之親臣然自冢宰而下則皆庶正也冢宰正百官各修其職親臣侍天子不䁥於私無分於職之崇卑皆勤救旱之事不以不能而自止所謂靡人不周也人人皆病力竭智窮故謂之鞫里爾雅作悝憂也言當如何以為憂乎蓋恐憂民之未至也此章言救旱憂民之實政以終上章憯不知故之意瞻卬昊天有嘒其星大夫君子昭假無贏大命近止無棄爾成何求為我以戾庶正瞻卬昊天曷惠其寧賦也假音格後凡昭假奏假之假並同嘒明貌衆星嘒然未有雨徴也大夫君子即庶正也假至贏餘也言竭其救災之力所以昭事而感假之者無所不盡故曰無贏爾成謂假天之成功也因旱之不止而不黽勉以求天之必應則棄爾成矣戾罪也棄其成而自怠則有為我之私是自取戾也寧安也惟天惠之以雨乃可安寧耳故望昊天而曰曷惠其寧此章勉群臣救災之不怠也觀此章之言真有弗得弗措之意非其有愛民之誠而能然乎雲漢八章章八句嵩高經旨曰申伯自申遷謝宣王之所改封也謝近於荆而荆與徐連舊嘗表裏為江淮諸國之患以申伯文武才全使為州牧以鎮撫南國耳穆王以降周德浸衰至於厲王失道滋甚江淮上下荆徐並興宣王命將以伐荆而蠻荆威自將以伐徐而淮夷服於是使召虎疆理江漢申在漢陽因使虎徹謝土田以築城定宅焉謝荆徐之要衝也其扼吭之慮逺矣申伯行而尹吉甫作此詩以送之朋友相送之詩當為小雅嵩高維嶽駿極于天維嶽降神生甫及申維申及甫維周之翰四國于蕃四方于宣賦也山大而高曰嵩嶽山之尊者東岱南衡西華北恆是也甫申皆薑姓國此詩本詠申伯而併及甫侯者以其皆賢而為四嶽之後四嶽總領方嶽奉嶽神之祀故推本申伯之生由嶽降神而併及於甫也甫申非名字也以其為宣王時賢諸侯而皆以賢入為卿士故特舉二國之名而稱之耳其地詳見王風揚之水蕃謂扞蔽其患難也宣謂宣布其德澤也此章言申伯之生不偶然也亹亹申伯王纘之事于邑于謝南國是式王命召伯定申伯之宅登是南邦世執其功賦也申本侯爵而稱伯者為州牧也纘謂使之繼四嶽之事也邑者臨川王氏以為國之所都亦曰邑也孔氏曰申伯先受封於申國近於謝今命為州牧故改邑於謝是也謝即今信陽州在周之南王命召伯者召虎方為陜東諸侯之長而在江漢之滸也式使諸侯以為法也登進也申伯以諸侯而升為州牧加地進律之賞也此章言宣王為申伯定宅欲使世世長為牧也王命申伯式是南邦因是謝人以作爾庸王命召伯徹申伯土田王命傅御遷其私人賦也庸城也因謝以作城所以衛謝人非謂因謝人之力也觀黍苖任輦車牛徒御師旅皆發自京師則亦不勞謝人如燕師之城韓不勞韓人矣徹什一之法也厲王之後徹法漸廢故使召伯正之傅御謂申伯傅相及治事之臣也私人家人就國而出至謝也據鄭氏則謂申伯以諸侯入為周之卿士故自京師而遷也此章言宣王欲申伯為法南邦而為之圖久安之計也蓋即上章定宅之意申伯之功召伯是營有俶其城寢廟既成既成藐藐王錫申伯四牡蹻蹻鉤膺濯濯賦也功謂營建之功俶始作之也藐藐深貌蹻蹻舉足行高見其壯也鉤膺詳見韓奕字義濯濯鮮明貌此章言營謝既成而始命申伯以往不以工役纍其心也王遣申伯路車乘馬我圖爾居莫如南土錫爾介圭以作爾寶往近王舅南土是保賦也近音記路車乘馬夲上章四牡鉤膺而言莫如南土非為土地之美謂南邦望治之切而易於肇基業也介圭長尺二寸以其為州牧而賜之近語辭王舅者宣王乃申伯之姊薑氏所生也此章命申伯就國之辭也申伯信邁王餞于郿申伯還南謝于誠歸王命召伯徹申伯土疆以峙其粻式遄其行賦也郿岐周近邑在今鳯翔府郿縣北一十五里渭水之北不近鎬京王餞于郿見申伯以卿士在京師而從王至岐周蓋先已在鎬册命於文武之廟而至此始餞别耳還南自郿還經於鎬而南至於謝也曰信邁曰誠歸見其初之數留而至此行始決也峙積粻糧遄速也此章言謝城疆理正則糧餉備而後申伯得以決於速行見宣王親親之周而繾綣之至也觀申伯至此方行則其事可以需遲而當在荆徐既服之後矣申伯畨畨既入于謝徒御嘽嘽周邦咸喜戎有良翰不顯申伯王之元舅文武是憲賦也畨音波畨畨耆艾貌嘽嘽詳見四牡字義周邦周人也戎汝也前言亹亹此言不顯則其功之不已德之不顯幾於文王矣文武是憲言其文武之德足以為法也見申伯之德為時所重而真足以為維周之翰也申伯之德柔惠且直揉此萬邦聞于四國吉甫作誦其詩孔碩其風肆好以贈申伯賦也柔和惠順也揉柔曲而使直不急迫也誦工師所誦之誦也肆大也柔惠而且直文武之德也孔碩言所係者大也肆好言其足以感人也此申言申伯文武之德能感人心者以結之嵩高八章章八句宣王命申伯居謝夲為扼荆徐之衝而其地在豫州蓋豫州之牧也然以召穆公望重分治陜東為東方諸侯之長而方疆理江漢之間故先遣營謝以張申伯之賢而吉甫又作詩以述王用申伯之意所以為先聲者至矣此詩當在黍苖之後按申伯本侯爵而封以謝則為州牧故稱伯耳與韓奕謂韓侯因以其伯同州牧之上則有方伯以統領之州牧者即所謂連帥也唐虞十二州則為十二牧夏九州則為九牧至周因之商亦九州而王制乃謂八州八伯蓋臆説也鄭氏遂傳會之以為商制王畿之內不設伯此何禮乎方伯則唐虞之四嶽商之二伯也觀文王為西伯有西伯則有東伯殷都於東東伯之治自畿內始而西伯之治在西東西由此分矣若周則陜以西周公主之陜以東召公主之周都於西則陜西夲畿內也而諸侯之附近者亦兼統焉若陜東則盡統於東伯矣故書康王之誥言太保率西方諸侯入應門左畢公率東方諸侯入應門右固分陜之舊也此非商之遺制歟古之牧伯皆以賢諸侯之有功德而係人望者為之故使其子孫世世纘之而召穆公猶仍康公之職也故曰召公是似及命申伯世執其功如以韓侯為伯而曰纘戎祖考也至於四月所謂滔滔江漢南國之紀而曰先祖匪人胡寧忍豫亦以州牧纘祖功者言也但其時待賢者之子孫已薄故云然耳申伯之牧在豫州韓侯之牧在雍州而紀江漢者荆州之牧也又下泉有郇伯者則兖州之牧也可見九州之皆有牧而召穆公之疆理江漢則方伯之兼統東方者與州牧不同矣故周禮大宗伯曰八命作牧九命作伯其差如此然既為州牧則亦得稱伯矣曲禮九州之長入天子之國曰牧蓋言其自稱云耳蒸民經旨曰宣王命仲山甫築城于齊而尹吉甫作詩以送之也朋友送行之詩當為小雅城齊夲宣王時事而史記以為齊獻公元年徙薄姑都治臨災則當與夷王同時其不足據明矣但天子使大臣往城必非小故意者徙治臨災即宣王時事當時必有大患而當遷者故宣王特重其事如此而史失其傳後遂無所考證歟天生蒸民有物有則民之秉彛好是懿德天監有周昭假于下保兹天子生仲山甫賦也蒸衆也則一定不可易之常法也秉執彛常懿美保佑也仲字山甫名樊侯之入相者也此言仲山甫之生鍾秀異於凡民而不偶然也仲山甫之德柔嘉維則令儀令色小心翼翼古訓是式威儀是力天子是若明命使賦賦也嘉美也儀威儀也色顔色也式法若順賦布也令儀令色即柔嘉也小心翼翼即維則也威儀即令儀令色而式古訓以力行威儀是其工夫之實也故能忠順天子使之布明命也此章言仲山甫之德王命仲山甫式是百辟纘戎祖考王躬是保出納王命王之喉舌賦政于外四方爰發賦也式是百辟冢宰之職也所謂外則總領諸侯也王躬是保太保之職也蓋其先世嘗為之故曰纘戎祖考今則以冢宰兼之所謂內則輔相君德也出納王命謂奉行王命而還報之不使有壅是為喉舌以代王之言也而言不苟於出可知矣此與龍作納言之官而以出納王命為專職者不同所謂典司政本也賦政以經營四方之事而發之使應所謂出則經營四方也此章言仲山甫之職所係之重如此所謂明命使賦也肅肅王命仲山甫將之邦國若否仲山甫明之既明且哲以保其身夙夜匪解以事一人賦也肅肅嚴敬也將奉行也上章言王命之所賦而此則言仲山甫奉行之肅肅也邦國順與不順而能明之謂明於人心之向背也哲謂細微曲折無不明也如此則處之曲當不至僨事而能保身即夙夜匪解以事一人也此章言仲山甫能盡職而王命是若也人亦有言柔則茹之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮矜寡不畏強禦賦也矜音鰥茹吞啖之名柔茹剛吐猶言欺善怕惡也不侮矜寡則柔不茹矣不畏強禦則剛不吐矣此承上章言仲山甫德性中和好惡能合人心也蓋必城齊之役關於國家大事恐人心不一故特遣有德重臣往經營之惟其處置得宜而後為能奉行王命也人亦有言德輶如毛民鮮克舉之我儀圖之維仲山甫舉之愛莫助之衮職有闕維仲山甫補之賦也輶輕也儀圖酌事理之宜而謀之也愛莫助之者能舉在彼非我所能與於助也衮職者不敢斥王之言也天子服龍衮故以衮為王之職也衮職闕專為保王躬而發言王躬夲賴仲山甫以保之也以起下章欲其遄歸之意仲山甫出祖四牡業業征夫捷捷每懷靡及四牡彭彭八鸞鏘鏘王命仲山甫城彼東方賦也祖詳見泉水字義業業以行為事也捷捷行之疾也東方齊也此章言仲山甫承王命城齊而惟恐其不及也有所不及則不能遄歸矣四牡騤騤八鸞喈喈仲山甫徂齊式遄其歸吉甫作誦穆如清風仲山甫永懷以慰其心賦也永懷者心在王躬而不忘也故勸之遄歸以慰其心此章言仲山甫夲以保王躬為急不得已而有城齊之行也蒸民八章章八句韓奕經旨曰韓侯初立來朝命之為州牧而歸詩人作此以送之蓋小雅也序以為尹吉甫美宣王則辨説固謂其未有據矣奕奕梁山維禹甸之有倬其道韓侯受命王親命之纘戎祖考無廢朕命夙夜匪解虔共爾位朕命不易幹不庭方以佐戎辟賦也奕奕大而疊也梁山韓鎮在禹貢雍州之域甸治也禹平水土使梁山之野皆得成田而貢賦於天子也韓武王子所封之國在梁山西北夲侯爵其後為北邉州牧厲王之時諸侯背侮韓雖禹甸亦必不通至宣王修政諸侯皆朝故追言禹時道之倬然大者以起之也受命者即位除喪以士服入見天子而聽命也戎汝也蓋其先祖世為州牧有功而欲其夙夜虔共務修職業以繼祖考之緒也易改也言其能繼祖考則我不易其命仍使為州牧也不庭方謂不來庭之國也辟君也王自謂為汝君也此又申説上文之意有不來庭之方國則使作楨幹而正之以王命討不庭而佐天子也如此然後謂之無棄王命此章言宣王命韓侯修祖職也四牡奕奕孔修且張韓侯入覲以其介圭入覲于王王錫韓侯淑旗綏章簟茀錯衡玄衮赤舄鉤膺鏤錫鞹鞃淺幭鞗革金厄賦也修長也張腹幹肥大也覲者諸侯朝天子之通名介圭詳見嵩髙字義夲韓之先祖為州牧而受賜於王者故韓侯以之入覲也初朝夲士服見而以介圭者即虞書輯五瑞之意也淑旗綏章旗飾也簟茀錯衡車飾也玄衮赤舄服飾也鉤膺鏤錫馬飾也鞹鞃淺幭所以施於車者鞗革金厄所以施於馬者備言所錫如此所以表其見重於天子也此章言韓侯入覲而宣王錫以車服之隆也韓侯出祖出宿于屠顯父餞之清酒百壺其殽維何炮鱉鮮魚其蓛維何維筍及蒲其贈維何乘馬路車籩豆有且侯氏燕胥賦也且音苴祖而餞餞而宿此出行之序今序宿於餞前者欲備言餞飲之禮故先以宿終祖義耳顯父者朝廷執政之臣故王命之出餞以致殷勤也清酒美酒之通名詳見信南山字義清酒至於百壺欲其遍及於衆也鱉魚筍蒲非謂以薄示儉蓋以珍美之味加豆欲賔之盡歡也乘馬路車以致私禮者顯父必千乘之家故有車馬之贈如渭陽之贈路車乘黃也鄭氏謂王使送以車馬則當言錫言豫而不當言贈矣且多貌與有客詩有萋有且之且同侯氏覲禮諸侯來朝者之稱指韓侯也胥相也以天子命之餞送非私飲也故謂之燕此章言韓侯還國而宣王使貴臣餞行以示隆重也韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門賦也汾王厲王也厲王流于彘在汾水之上故時人以目王焉蹶父姞姓厲王之壻而為周卿士嘗任將帥者里里居也蹶里在京師韓侯因入朝之便而親迎也百兩與鵲巢百兩同謂送車也不顯其光説見大明諸娣者諸侯一娶九女嫡夫人行則以姪娣從二國來媵亦以姪娣從不言姪者從略也祁祁舒遲貌如雲者以其髮美而並進言也盈門者已至韓侯寓邸之門也此章言貴戚重臣樂以女與韓侯為妻也蹶父孔武靡國不到為韓姞相攸莫如韓樂孔樂韓土川澤訏訏魴鱮甫甫麀鹿噳噳有熊有羆有貓有虎慶既令居韓姞燕譽賦也蹶父言孔武而靡國不到則見其嘗為將帥而遍歷諸國者矣韓姞蹶父之子韓侯妻也相攸者擇其可嫁之所也訏訏甫甫皆大也噳噳與吉日麌麌同貓似虎而淺毛者爾雅謂之虦貓亦虎類也魴鱮麀鹿皆可以供食熊羆貓虎皆可以供裘韓地物産之隆如此他國莫及焉見其先祖能控百蠻而人不敢漁獵其地故得為樂土也慶喜之溢也令善也蹶父喜其女有此善居也燕譽謂韓姞之心亦安而稱其得所也此與上章皆在京邸初昏之言蓋重其先祖之能盡職以蹶父之相攸者見之所以起下章而欲其纘戎祖考也溥彼韓城燕師所完以先祖受命因時百蠻王錫韓侯其追其貊奄受北國因以其伯實墉實壑實畝實籍獻其貔皮赤豹黃羆賦也燕平聲燕北燕國武王封召康公於此康公夲與周公分陜而治及周公沒康公為太保代治周畿兼統陜以西諸侯而韓其屬國也故康公為之築城如召穆公之營謝耳非以其為司空而掌營築之事也蓋京師發兵使從之以完韓城從燕封言故曰燕師所完見其城之固也先祖受命者嘗受王命為州牧也時是也以此百蠻賴其控制而命之也追貊北方夷狄之國即百蠻也奄大也北方蠻夷之長禮當供職貢者皆其所統故曰有北國也伯者州牧之稱墉城壑塹也畝田數也籍助法也獻貢獻也貔言其皮則赤豹黃羆亦皮也謂北夷所有而以之貢獻之物非謂中國之常貢也蓋欲韓侯因先祖之伯而為北國繕城池理田稅且使之修職貢也此申首章纘戎祖考之意韓奕六章章十六句江漢經旨曰集傳言宣王命召穆公平淮南之夷而下篇常武之詩則謂宣王自將以伐淮北之夷也竊意淮與徐相連則為徐州之地當在淮北海濵而淮南則楊州之域非徐土也故淮非兩地則亦必非兩征其必宣王自將由淮北路而召公出淮南為竒兵以相應歟淮夷既平而王命召虎疆理江漢以南之國重錫命焉故召虎作此詩以答天子之休命也虎所自作故稱名君臣之辭也此所以為大雅歟江漢浮浮武夫滔滔匪安匪遊淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪賦也召穆公之伐淮夷必自江漢順流而下故所征夲江淮之地而併漢言之也滔滔順流貌安為自安計也遊遨遊求求其罪也舒徐緩亦遨遊之意鋪陳其罪也曰求曰鋪皆問罪之意此章言為討罪而出兵也江漢湯湯武夫洸洸經營四方告成于王四方既平王國庶定時靡有爭王心載寧賦也伐淮夷亦經營四方之事也此章言定王國以安王心也江漢之滸王命召虎式辟四方徹我疆土匪疚匪棘王國來極于疆于理至于南海賦也江漢之滸蓋即二水合流之處在今武昌漢陽之間疑當時召公治所即武昌也詳見漢廣字義虎召穆公名厲王之亂荆蠻淮夷並興疆理已失文武之舊矣故淮夷事畢而欲召虎經理江漢故以江漢之滸為言亂國平則四方闢矣四方既闢則以徹疆土為重此非病民也非急衆也蓋什一之法天下之所取中欲人歸極於王國耳至于南海非曰盡南海而止當時南海極逺尚未統於周蓋兾望召公之辭也此章以正疆理為安民之夲亦以見王心之尚文德也王命召虎來旬來宣文武受命召公維翰無曰豫小子召公是似肇敏戎公用錫爾祉賦也來來至江漢之滸也旬宣謂遍布王命也召公召康公奭也小子王自謂也似嗣肇始戎汝公功也召虎苟能嗣其祖康公修文武之業以為楨幹者而敏功復自汝始則我錫爾福矣此章勉穆公之繼先業也釐爾圭瓉秬鬯一卣告于文人錫山土田于周受命自召祖命虎拜稽首天子萬年賦也稽音啓下章同釐賜也文人謂文德之人召公之先祖也屬上句錫山土田是加以土地非别封也蓋召公已封於燕而食采於召矣召祖即康公也言錫爾圭瓉及秬鬯一卣使祭于爾文人之廟而告之鄭氏所謂王賜召虎以鬯酒使以祭其宗廟告其先祖是也周宗周即鎬京也宣王常至東都命諸侯故以鎬為周特至此命召虎者以武王封召康公時在鎬明其世勳之有自而欲使繼之也召公武王所封而集傳以為受命於文王之所非矣此章申言錫祉之意而虎以夀考祝之也虎拜稽首對揚王休作召公考天子萬夀明明天子令聞不已矢其文德洽此四國賦也對答休美也召公謂康公考者成功也成功以文德言如疆理安民之事是也自召祖命而命之是王作之使勿墜其成此即所謂王休也對而揚之故祝其萬夀而欲其陳文德以洽四國之人心也如此則為令聞不已矣此述召公祝頌之言以見其欲王之尚德也江漢六章章八句宣王中興撥亂反正南征北伐四用大兵采薇初伐玁狁也及其不服而命尹吉甫南仲復伐之出車六月再伐也玁狁既平而後方叔伐荆蠻故采芑言征伐玁狁蠻荆來威荆蠻既服而後召伯伐淮夷故此詩言江漢浮浮武夫滔滔若荆蠻方畔則武夫何由可從江漢而發邪江淮之間向為荆蠻淮夷之亂先王之疆理幾於盡矣所以專遣召伯經營之也召康公嘗以此輔佐武王故惓惓使繼其業可見宣王所重在於文德而非專事武功者召伯亦以矢文德規之古之明君賢相豈有他學哉常武經旨曰此宣王自將以伐淮北之夷也觀王奮厥武王曰還歸之言其為自將明矣歐陽氏謂宣王遣將征之亦不自往不知何所據乎當時雖為淮夷出兵而挾淮夷以畔亂者實在徐也故省徐土以威之而淮夷自服矣淮夷亦在徐州之域故總謂之徐方云此與江漢夲一事而此當在前焉赫赫明明王命卿士南仲大祖大師皇父整我六師以修我戎既敬既戒惠此南國賦也大祖之大如字赫赫威之盛也明明光之顯也以奉行天討言南仲即出車之南仲也時為卿士以憑翼王之左右者祖行道之祭也天子之祖故曰大祖大師三公也皇父氏也説見十月之交但與十月之交所言皇父不同彼皇父幽王時人在宣王之後世權臣也此皇父則宣王時人賢臣也時為大師使為大將也整師謂齊其部伍也修戎謂治其兵器也部伍齊則不亂兵器治則有威宣王自將故皆係之我敬戒臨事懼而不敢忽也淮夷之亂除則南國惠矣此章戒皇父先發兵而使南仲祖道以行也舊説以南仲為文王時人而為皇父之太祖則辭甚費而亦不成文義矣王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦省此徐土不留不處三事就緒賦也䇿命內史所掌尹吉甫以卿士為之命程伯休父者命之為司馬司馬六卿之職也上章皇父已為大師但親命為帥此則䇿命程伯休父為司馬以副之也徐為今泗州地在淮水之上淮夷與徐為鄰而徐亦世與表裏為患觀偃王稱王則可知矣使休父左右陳行者謂循淮浦以省徐土則戒之以嚴行伍而先為不可勝因省察徐人之情而開諭之也不留不處者謂不久留處以擾其民而使三農之事皆得就緒也此章戒程伯休父先往省諭以安其民也赫赫業業有嚴天子王舒保作匪紹匪遊徐方繹騷震驚徐方如雷如霆徐方震驚賦也赫赫兵威著於外也業業敬畏存於中也赫赫生於業業故曰有嚴天子嚴即業業也舒徐保安作動也謂舒徐而安於行靜以制動也紹紏緊也遊遨遊也匪紹匪遊正申王舒保作之意惟安靜故非紏緊惟保作故非遨遊凡用兵之法以靜為主不靜則必急躁無常非有以制動則又遨遊無紀矣惟其用兵有法如此故徐方聞之自然繹絡騷動而震驚矣如雷如霆兵威之神也雷霆之作未嘗有意自然時震而震善用兵者常靜至於動時人不可測此徐方所以震動不遑寧處也此承上章言宣王夲以不殺為心而其威神武故兵未至而即震驚也王奮厥武如震如怒進厥虎臣闞如虓虎鋪敦淮濆仍執醜虜截彼淮浦王師之所賦也當兵未至時徐方雖已震驚及兵至而猶懷疑不服故宣王奮武而進兵也如震夲非有震也如怒夲非有怒也進鼓而進也闞虎怒聲虓虎怒貌鋪布其師也敦厚集其陳也濆涯也仍執者就而執之也醜衆也虜者囚繫之名蓋其屈服而見虜也王師所在截然不可犯所謂先為不可勝以待敵之可勝也此章言兵整而足以服人也王旅嘽嘽如飛如翰如江如漢如山之苞如川之流綿綿翼翼不測不克濯征徐國賦也揚過曰飛沖舉曰翰飛翰言其奮進之勢疾也江漢言其分合之勢長也山苞言其固而不可動也川流言其行而不可禦也綿綿隊伍之相續也翼翼紀律之不亂也不測神變不可知也不克常勝不可敵也濯征徐國徐國雖染淮夷舊惡一征而洗濯之矣謂其醜虜之已降也此章申言上章之意王猶允塞徐方既來徐方既同天子之功四方既平徐方來庭徐方不回王曰還歸賦也猶謀也謀夲於道謀即道矣天子之功以道言也來庭者朝於王庭也既來庭則回邪之心格矣徐方盡徐州之境而言也淮夷亦徐州之地徐國既征則一方皆靖淮夷不必加兵而亦服故王即言歸兵不復用於他國也此章言宣王以德服人而不窮兵力也常武六章章八句常武二字非詩中所有而以名篇夲無意義得無宣王至是已四用兵似乎常用武者而後人特立此名以示戒歟瞻卬經旨曰此詩正言以刺褒姒之亂邦而欲幽王之知警也蓋亦小雅瞻卬昊天則不我惠孔填不寧降此大厲邦靡有定士民其瘵蟊賊蟊疾靡有夷屆罪罟不收靡有夷瘳賦也惠愛也填與桑柔倉兄填兮同厲惡也瘵勞羸之病也蟊食苗根之蟲以喻讒邪之人傷殘根夲者賊害疾病夷平屆至瘳愈也君心正則國定國定則民受福而昊天為能惠矣此章言讒邪為害使人陷罪無有已時無所歸咎而歸之於天蓋為褒姒而發也人有土田女反有之人有民人女覆奪之此宜無罪女反收之彼宜有罪女覆説之賦也説音脫覆亦反也收拘説放也有土田奪民人蟊賊之害也收無罪説有罪罪罟之害也此承上章而申言其意哲夫成城哲婦傾城懿厥哲婦為梟為鴟婦有長舌維厲之階亂匪降自天生自婦人匪教匪誨時維婦寺賦也哲知也哲夫成城言賢君之能自立基業者也哲婦非謂其必傾城也但以褒姒言耳蓋其智夲哲亦懿德也然一失夲心即為梟為鴟而長舌能言由階進亂梟鴟之害豈有極哉蓋婦人之賢者其言豈無教誨之益惟其夲心亡而口舌利則顛倒是非興讒害正遂與小人相合朋比為姦其言不足以導人為善而皆厲階故曰匪教匪誨時維婦寺上言婦人之禍而兼及寺人者正見其與小人合黨而哲德為所昏耳此章指言婦人之為害而長舌之言不可聽也鞫人忮忒譖始竟背豈曰不極伊胡為慝如賈三倍君子是識婦無公事休其蠶織賦也鞫窮忮害忒變譖讒竟終慝惡也賈居貨者也三倍獲利之多也鞫人能以智辨窮人其口能抑人以辨言而其心則為害為變故謂之忮忒也以此加於王則王亦不能辨矣譖始者始惡其人而譖之於王也及以利合則又為解於王而竟背前言矣此正所謂忮忒也如此欺罔其惡豈為不極哉何為尚復為慝而無所忌乎蓋其事以賄成所取於人之利如賈三倍無如此之多者而王亦明知其如此也君子指王言王雖知之而故縱之此其所以惡雖極而猶敢於為慝也故朝廷之公事雖非婦人所宜預而蠶事不足以獲利則寧棄之而圖公事也此章言婦人貪利亂國政而王不能制也天何以刺何神不富舍爾介狄維豫胥忌不弔不祥威儀不類人之云亡邦國殄瘁賦也刺責也天亦以為責也富福也神不畀之福也即人心之歸怨者是也介大也介狄猶言女戎指褒姒言謂禍不在戎狄而在婦人也忌疾弔恤也不祥即介狄也苟以不祥為恤則必修身而威儀不得不謹矣蓋褒姒之禍甚於介狄當以為忌而王乃舍而不忌反以豫之正言相忌忌正人則賢者亡去矣邦國豈不殄瘁哉此章言聽婦人則賢者去而國必亡也天之降罔維其優矣人之云亡心之憂矣天之降罔維其幾矣人之云亡心之悲矣賦也罔即首章所謂罪罟也罔優則投之者多罔幾則入之者近人之云亡蓋以此也此申上章之意觱沸檻泉維其深矣興也心之憂矣寧自今矣不自我先不自我後藐藐昊天無不克鞏無忝皇祖式救爾後興意觱沸泉湧貌檻泉泉上出者檻泉深則出必湧猶心憂久則慮必長况適當我身而能忘於懷乎鞏固也言天之常定也無可奈何則望天意轉回以復其常定之體而使王改過以裕其後也其忠愛之心亦惓惓矣瞻卬七章三章章十句四章章八句召旻經旨曰幽王任用小人以致飢饉百姓流亡而國勢日削詩人痛之故作此詩欲警王用君子也旻天疾威天篤降喪癲我飢饉民卒流亡我居圉卒荒賦也降喪謂降以飢饉之禍即疾威也癲病也居國中也圉邉陲也言自近至逺無不盡荒廢也以國事為己事故曰我居圉也此章言嵗飢民散而無可訴則歸禍於天而已天降罪罟蟊賊內訌昏椓靡共潰潰回遹實靖夷我邦賦也天降罪罟謂小人為害陷人以罪即前篇天之降罔也蟊為害禾之賊以比小人之害物訌亦潰也內訌者禍敗自內出也昏椓靡共昏迷以為椓害之事而略無虔恭之心此所謂蟊賊也潰壞爛也潰潰即內訌也回遹邪僻也潰潰正邪僻之害也如此之人使之治國以求靖夷安得不亂此章言致亂之由在小人也臯臯訿訿曽不知其玷兢兢業業孔填不寧我位孔貶賦也臯臯深曲之狀訿訿毁謗之意小人情狀如此王曽不知其玷缺也兢兢業業敬畏之心也與靡共正相反填實也言常存敬畏憂至積實不散而不肯自安寧也乃不能保其位而見貶黜以小人用而君子不得進也此申上章言致亂之由如彼嵗旱草不潰茂如彼棲苴我相此邦無不潰止賦也潰亦自中壞出之意與前章潰潰同潰止者不至於潰不止也嵗旱則草之茂者皆潰壞如水中浮草棲於木上也此章言民卒流亡之意維昔之富不如時維今之疚不如兹彼疏斯稗胡不自替職兄斯引賦也兄音况下章同昔以民富時言也今時則民窮而疚矣兹則以今時益疚之日而言也疏與粗同彼疏斯稗毛氏謂彼宜食疏今反食精稗是也蓋糲疏稗精各有其分宜疏而精猶以小人而乘君子之器也乃冒濫居之而不自替已為過矣况為君者可為之主而引長之乎兄與况同此章言民窮之甚而小人不可引進也池之竭矣不云自頻泉之竭矣不云自中比也溥斯害矣職兄斯𢎞不災我躬賦也自頻謂頻流而所泄者多也自中謂中乾而所出者少也以比民財用之無節而生之無源也此則小人為害之溥也况可為之主而𢎞大之乎𢎞小人則國亂而災及於我矣此章申言小人之不可用也昔先王受命有如召公日辟國百里今也日蹙國百里於乎哀哉維今之人不尚有舊賦也先王指武王召公謂召康公康公輔佐武王在文王時猶未用也舊説以先王為文武誤矣此章戒幽王當用舊臣也召旻七章四章章五句三章章七句詩説解頤正釋卷二十五
