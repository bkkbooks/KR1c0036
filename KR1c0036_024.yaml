body:
  text: 詩說解頥正釋卷二十二明季本撰都人士經㫖曰此必東遷之後東都之人思西周之盛而為此詩也有似於王風耳彼都人士狐裘黄黄其容不改出言有章行歸于周萬民所望賦也彼都自東都言故以西都為彼都也士謂男子也貴賤之通稱狐黄者多黄狐裘庶人所得通用非貴服也周忠信也忠信則其徳無闕故謂之周容不改容有常也言有章言順序也行歸于周徳無闕也此章言士之有恒心者其知禮義如此彼都人士臺笠緇撮彼君子女綢直如髪我不見兮我心不悅賦也臺笠出田時所戴也以在野言緇撮居家時所戴也以在國言皆謂庶人君子女者當時人人有君子之行故女為君子之女綢宻也綢直以髪言謂但如其髪之綢直以為髻不用髢為髙髻也此章言民俗之樸素如此彼都人士充耳琇實彼君子女謂之尹吉我不見兮我心苑結賦也琇與淇奥琇瑩之琇同充耳琇實謂惟以琇為充耳而尚實無他華羙也吉與姞同尹姞二大族之以賢稱者但言尹姞而装餙之不尚華麗可知矣苑屈也此章言貴族之服餙其不侈如此彼都人士垂帶而厲彼君子女卷髪如蠆我不見兮言從之邁賦也帶大帶孔氏曰禮大帶垂三尺者是也而當作如厲者從其垂下如將履之有危厲之意焉卷髪者自髪之不綢直者言也蠆螫蟲尾長而其末楗然似髪之上曲者盖髪長則斂而短者則因曲以為餙一順自然也此緫上二章發其所未盡之意匪伊垂之帶則有餘匪伊巻之髪則有旟我不見兮云何旴矣賦也旟揚盱望也此承上章而言古之為容者惟從其自然不事脩餙也觀此則東周服餙之盛奢而不中禮者多矣都人士五章章六句此詩於男皆曰人士以男皆有士行也於女皆曰君子女以女皆賢父之所生也亦可以見民俗之皆善矣然特舉尹姞二姓以言女盖尹氏之賢著於吉甫姞氏之賢著於蹶父皆宣王時人也意此二姓具有姆儀故娶女者稱重耳然則此詩所謂彼都其在宣王之世歟采綠經㫖曰此婦人因其夫約歸過期而待之之詩也似當為風耳終朝采綠不盈一匊予髪曲局薄言歸沐賦也自旦至食時為終朝綠即菉一名王芻俗呼木賊兩手曰匊局卷也綠澁礪之草可以洗攪故采之綠本易得終朝采之而不盈一匊為夫有期而汲汲欲歸沐也女為悅已者容久不櫛而髪曲局則非所以為容故沐以待夫耳此以方及五日之期言也終朝采藍不盈一襜五日為期六日不詹賦也藍染草即今之靛襜衣蔽前當蔽膝之處而非蔽膝也詹與瞻同上言采綠此言采藍必采藍在六日不詹之後矣之子于狩言韔其弓之子于釣言綸之繩賦也理絲曰綸此追言其夫平日在家時如此非謂欲與之俱也其釣維何維魴及鱮維魴及鱮薄言觀者賦也此承上章言其夫平日釣魚以歸亦畧與我觀之其親厚如此則今日之歸安得而不早待乎采緑四章章四句黍苖經㫖曰宣王時以謝為荆徐要衝之地封申伯於此以鎮撫南國因平淮之後召穆公在江漢先使營謝而南行之士將歸故作此詩以羙其成功也南行之士止為城謝而發非從召穆公之在江漢者也芃芃黍苖隂雨膏之興也悠悠南行召伯勞之興意悠悠逺行意北自鎬京至謝故曰南行此章總言召公能慰勞南行之士使忘其勞也我任我輦我車我牛我行既集盖云歸哉賦也我南行之士自謂也任負任者輦人輓車司馬法曰周十五人而輦即謂此也車大車任重載者即牛車也盖以將車者言車中有牛而將之也下云牛以牽傍者言也在前曰牽在傍曰傍牛不在轅中者則别牽傍之故車與牛分而為二也此皆工作所需之噐具如司馬法所謂斧斤鑿鋤之類則以民間之役車載之不在天子萬乘内之車也盖必賃於民者古者寓兵於農但出車乘而已無别賦也盖者不定之辭謂將歸而尚在謝也我徒我御我師我旅我行既集盖云歸處賦也徒衆也謂歩行從車者御謂御兵車者師以合聚言旅以部分言周禮司徒五卒為旅五旅為師亦此意也皆言從行者事畢而可以歸之意上章任輦車牛言載噐具之役車此章徒御師旅言受工役之士卒皆自周調發而不以勞謝民盖先王調兵之制多自京師而不徴發於諸侯之國詳見讀禮疑圗卷三肅肅謝功召伯營之烈烈征師召伯成之賦也肅肅嚴正貎謝申伯之所改封即今信陽州屬汝寜府說見王風揚之水營治也謝功之營不但築城邑而已凡疆理之事皆在其中矣此以征師之我行既集者歸於召伯謝功之成也原隰既平泉流既清召伯有成王心載寜賦也土治曰平水治曰清原隰既平以田野言泉流既清以溝洫言相其原隰之宜通其水泉之利則謝民得以遂其生矣召伯以此成功則王心豈不寜哉亦以見宣王之志惟在於安民也黍苖五章章四句此詩當在崧髙之前本一類也隰桑經㫖曰此婦人於蠶桑之時得見其夫而作此詩盖有似於風也隰桑有阿其葉有難興也既見君子其樂如何興意難乃多反隰下濕宜桑之地也阿羙貎難盛貎皆枝葉條垂之狀君子指夫言盖感桑之方盛而以得見君子為樂也隰桑有阿其葉有沃既見君子云何不樂賦也沃光潤貎隰桑有阿其葉有幽興也既見君子徳音孔膠興意幽黒色桑茂盛則色黒徳音者徳恵之言也孔膠者謂甚固而不變其初心也心乎愛矣遐不謂矣中心藏之何日忘之賦也心乎愛者婦人自言其愛之出乎心也遐何謂言也遐不謂者不能言其所愛也中心藏之者藏其愛也何日忘之者久於愛而無以自解也盖愛本難言故既見君子而欲言不能也則有中藏於心而已其愛之真切何如哉此惟婦人於夫方有此情若以語懐賢則恐未必然耳隰桑三章章四句白華經㫖曰幽王嬖褒姒而黜申后故申后怨而作此詩也然惓惓望王之正家而自咎其不能感動亦可謂怨而不怒矣白華菅兮白茅束兮比也之子之逺俾我獨兮賦也白華野菅也似茅而滑澤無毛根下五寸中有白粉者柔韌宜為索白華已漚則為菅有為索之用而白茅則不可用也白華為白茅所束猶嫡為妾所制而不得有為也之子指幽王逺謂逺我而親褒姒也逺則獨處矣英英白雲露彼菅茅比也天歩艱難之子不猶賦也茅菅即束菅之茅謂褒姒也天無雲則有露有雲則無露白雲水土輕清之氣未為層雲也而英英如花朶然則尤輕而不蔽明矣故其氣薄而易散是將不露而猶露也以比幽王恩澤之偏於褒姒雖欲不施而不能止也天歩猶天運天歩艱難以天下將亂言此宜正身齊家以為治國之本而王不之圗乃嬖褒姒何哉滮池北流浸彼稻田比也嘯歌傷懐念彼碩人賦也滮池盖近豐之池豐水北流入渭者也池非大水對碩人而言小大之别也碩人者以其有天下國家之責而言指幽王王本碩人宜有大恩澤以遍及於物者而不如滮池之浸稻田即此一念之偏不能正國之所係也碩人如此安得不嘯歌而至於傷懐哉樵彼桑薪卬烘于煁維彼碩人實勞我心賦也樵采也桑非可以為薪言桑薪則無薪可燎而采桑以供薪也卬我烘燎也煁孔氏以為今火爐也言被黜獨處采桑薪以自供見王之恩澤不加而使我自苦之甚也鼓鐘于宫聲聞于外比也念子懆懆視我邁邁賦也宫深宻之地言鼔鐘于深宫必聲聞于外以比中有實徳則王必知之而有感動也懆舊云七到反孔氏䟽亦作慘而以慘慘釋之於義為長此盖反躬自責之辭程子曰此章自傷其誠意之不能動王也懆懆然憂戚而曾不能感動視我邁邁而去有鶖在梁有鶴在林比也維彼碩人實勞我心賦也鶖秃鶖也陸農師曰一名扶老狀如鶴而大赤目頭髙八尺好㗖蛇色青鶖似鶴而貪濁非鶴比也今鶖據魚梁而飽鶴逺引在林而饑以比褒姒進而申后黜碩人不當如此也鴛鴦在梁戢其左翼比也之子無良二三其徳賦也鴛鴦有定偶之鳥戢其左翼以依雄也說見鴛鴦篇言我常依王而王自二三其徳耳有扁斯石履之卑兮比也之子之逺俾我疷兮賦也扁音褊扁卑貎疷病也人履扁石而卑以比寵妾而賤自賤如此豈碩人所宜哉故我以逺我為病者非為我之失愛也正以王自賤則失其所以為尊耳白華八章章四句緜蠻經㫖曰賢者感大夫下士禮意之厚而不敢辭故作此詩觀其命後車載之則大夫必先驅以親造其廬矣緜蠻黄鳥止于丘阿興也道之云逺我勞如何飲之食之教之誨之命彼後車謂之載之興意緜蠻鳥聲土一成曰丘阿丘之曲中偏僻之地人所不見也我勞如何者謂道逺不勝其勞也後車副車也緜蠻黄鳥止于丘隅興也豈敢憚行畏不能趨飲之食之教之誨之命彼後車謂之載之興意丘角曰隅亦人所不見之處憚辭難也趨疾行也不能疾行亦畏勞之意緜蠻黄鳥止于丘側興也豈敢憚行畏不能極飲之食之教之誨之命彼後車謂之載之興意丘傍曰側亦人所不見之處極謂極力以往則勞矣此詩三章皆以黄鳥起興言黄鳥止於人所不見之處以喻賢者遁迹山林之間則於時事邈乎其不相及矣而衰廢之身憚於逺出有不勝疾驅極力之勞者但今飲我食我教我誨我又命後車載我則所以禮我者至矣如之何其可恝然乎哉緜蠻三章章八句瓠葉經㫖曰此士庶人飲酒常用之樂歌非必天子諸侯之燕㑹也幡幡瓠葉采之亨之君子有酒酌言嘗之賦也幡幡翩翻之貎以未采時言也瓠葉初生時熟之可以為葅嘗嘗酒也有兎斯首炮之燔之君子有酒酌言獻之賦也兎以首言猶數魚以尾也獻者以酒酌賔也有兎斯首燔之炙之君子有酒酌言酢之賦也酢者賔既卒爵而酌以報主人也有兎斯首燔之炮之君子有酒酌言醻之賦也醻者欲以醻賔而先自飲以導之也此章以瓠葉為葅以兎為殽品物甚薄而賔主以是成獻酢醻之禮而誠敬盡焉固不在於籩豆之旅陳也禮與其奢也寜儉苟無誠敬以將之雖多亦奚以為哉瓠葉四章章四句漸漸之石經㫖曰將帥出征經歴險阻不堪勞苦而作此詩蓋有似於風也漸漸之石維其髙矣山川悠逺維其勞矣武人東征不遑朝矣賦也漸漸髙峻貌武人將帥也石之髙峻人馬所難行也朝晨初也當晨初即已不暇勞可知矣漸漸之石維其卒矣山川悠逺曷其沒矣武人東征不遑出矣賦也卒與崒同崔嵬也謂山巔之末沒盡也不遑出謂深入而不能出也自不遑朝而至於不遑出則中間所歴之險阻亦多矣有豕白蹢烝渉波矣月離于畢俾滂沱矣武人東征不遑他矣賦也蹢蹄烝衆也離歴月所宿也豕汙於塗不見蹢白久雨停潦多故渉水濯其塗而見蹢之白也月離畢詳見說理㑹編十五卷謂其所值之時適當多雨之候故滂沱耳與書洪範星有好雨義同此皆既雨之事非將雨之候也遇雨如此甚切武人東征之憂豈暇於他及哉承上章不特經歴險阻而已且又有遇雨之苦焉漸漸之石三章章六句苕之華經㫖曰䘮亂之餘百物凋耗君子不忍見之故作此詩盖亦風也苕之華芸其黄矣比也心之憂矣維其傷矣賦也苕陵苕也即今紫葳蔓生附喬木之上其葉紫赤而繁將落則全變而黄苕華將落則黄以比周室將亡慘然憔悴也傷者傷周室之將亡也苕之華其葉青青比也知我如此不如無生賦也華已落盡惟葉青青以比周之人物已盡所存者一虚域耳我本不意所遇之世如此若知我如此則不如無生謂生則不忍見也牂羊墳首三星在罶人可以食鮮可以飽賦也牂羊牝羊也墳大也羊瘠則首大牝羊瘠則不能孕而將無遺種矣罶無魚動水而見三星則魚將絶矣盖羊食百卉乃肥嵗荒草木皆瘁羊所以瘠也魚與蝗本一種嵗荒盡化為蝗魚所以少也時之飢饉甚矣人之可以食者猶鮮可以飽况本無食可頼者乎此我心之所以憂傷而不忍見也苕之華三章章四句何草不黄經㫖曰周道衰㣲征役不息行者苦之故作是詩盖王風也何草不黄興也何日不行何人不將經營四方興意草衰則黄枯槁之色也將奉行也經營四方言征夫從將帥所統以經營四方之事也何草不𤣥興也何人不矜哀我征夫獨為匪民興意矜與鰥同𤣥赤黒色草既黄而𤣥腐敗之色也矜韓詩作鰥匪兕匪虎率彼曠野哀我征夫朝夕不暇賦也兕有力而善觸虎有力而善噬以比勇悍之士能攻戰者謂兕虎而循行曠野乃其宜也今征夫力皆不如兕虎而亦使之行於曠野朝夕不暇豈不可哀哉有芃者狐率彼幽草興也有棧之車行彼周道興意芃尾長貌狐有狡計能避患而率由幽草之中常自逸也棧旁有架貌此即役車非周禮士所乘之棧車也乘此車行於周道者皆愚弱之民非若狐之能避於幽草者也此其所以匪兕虎而可哀也歟何草不黄四章章四句詩說解頥正釋卷二十二
