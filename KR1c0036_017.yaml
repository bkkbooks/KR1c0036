body:
  text: 詩説解頥正釋卷十五明季本撰雅雅者正也面相告語之正論也謂之小雅乃父子兄弟朋友夫婦之正論謂之大雅則朝廷君臣之正論故用之朝會用之燕饗用之贈送用之慰勞各有攸宜而非若風之可以隨所用也但雅中有譏刺之詩如正月小旻巧言大東北山青蠅桑柔召旻之類皆諷辭也但以其為臣僚直言時政故不屬於風而為雅耳詳見總論六義下小雅諸篇有他詩雜入者説見本篇鹿鳴經旨曰此朝廷燕羣臣之樂歌當為大雅􅊯􅊯鹿鳴食野之蘋興也我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是將人之好我示我周行興意􅊯􅊯低下聲蘋藾蒿也青色白莖如筋始生香可食陸生之革非水中之萍也我主人也嘉賔指羣臣琴瑟協比歌聲升歌也吹笙合堂下之樂也儀禮有歌有笙古者作樂必歌吹間作詳見總論詩樂下承下載上之義程子所謂承以藉之是也筐篚屬承物之筐謂之承筐將奉也周行詳見卷耳字義鄉射記曰古者於旅也語此正燕禮也安成劉氏曰燕飲至旅酬正禮已終然後言語以盡嘉賔之忠告而明大道也燕饗食飲禮各有分别詳見彤弓字義􅊯􅊯鹿鳴食野之蒿興也我有嘉賔德音孔昭視民不恌君子是則是效我有旨酒嘉賔式燕以敖興意蒿即青蒿詳見蓼莪字義德音即上章所謂示我周行也言甚昭明蓋本於德者如是視與示同恌薄也君子指在位之善類燕謂燕飲敖者不拘束之意欲其勢分兩忘而樂告以道也􅊯􅊯鹿鳴食野之芩興也我有嘉賔鼓瑟鼓琴鼓瑟鼓琴和樂且湛我有旨酒以燕樂嘉賔之心興意樂音洛湛音耽後凡言湛樂並同芩草也莖如叉股葉如竹蔓生澤中下地鹹處牛馬亦喜食之湛樂之甚也燕樂其心則情相洽華陽范氏曰非止養其體娛其外而已所以樂其心也鹿本山林之性在野以食非可羈縻者如賢者隱處山林非人君所能屈致故三章皆以鹿之在野者起興此非語他國使臣之辭也後二章皆言旨酒可以見其為燕禮而其燕為燕羣臣矣鹿鳴三章章八句鹿鳴舊與四牡皇皇者華同用亦詳見詩樂下四牡經旨曰周之征夫勞於王事不得歸而思其父母故作此詩也父母之思不能不怨而不敢廢王事怨而不怒矣大略與北山相似而實不同北山則直言以譏切時事宜為小雅此則諷言以道逹私情有似王風耳然本衰世之情但説詩者惑於小序文武天保以上治內采薇以下治外之説故以鹿鳴四牡皇華諸篇皆為文王時詩雖於義本有不通亦必強為之解而不知秦火之後篇章散亂今時所存之序多紊舊經豈可慿以為世次之先後哉集傳謂舊説詩之時世皆不足信正此類也惟玩其辭以求其意斯得之矣四牡騑騑周道倭遲豈不懷歸王事靡盬我心傷悲賦也周道大路也倭遲回逺之貌盬説見鴇羽王事靡盬言所以不得歸也傷悲者以不得歸為悲也以起下章不遑將父母之意四牡騑騑嘽嘽駱馬豈不懷歸王事靡盬不遑啓處賦也啓跪處居也古者席地跪則雙膝著地而聳身居則雙膝著地而坐下也此申言在塗不得休息而無暇念父母之意翩翩者隼載飛載下集于苞栩興也王事靡盬不遑將父興意翩翩斜飛下止貌隼鳥短尾之名謂鵓鳩也一名鳻鳩即左氏祝鳩性最孝故以起興苞栩説見鴇羽言鳩飛亦有下止集木之時而人不能也將舉也猶言題起也翩翩者隼載飛載止集于苞杞興也王事靡盬不遑將母興意杞枸檵即今枸杞駕彼四駱載驟駸駸豈不懷歸是用作歌將母來諗賦也駱最耐勞駕耐勞之四駱而駸駸疾走見其不能下止也如此則無歸期而念母之情豈能遏乎諗告也舉母作歌而以告於人庶幾觀風者采之其情可逹於上耳母之育子尤為劬勞而在家念子之情尤為懇切故承上章將母而特以母言之作歌謂思母者實作此歌也豈可以為在上者逆探之辭哉四牡五章章五句舊説以此詩與鹿鳴皇皇者華俱為上下通用之樂歌意必有借此詩以勞使臣者而後遂混為他用耳皇皇者華經旨曰此天子遣使臣之詩當為大雅皇皇者華于彼原隰興也侁侁征夫每懷靡及興意皇皇光盛貌華草木之華也侁侁行在先貌征夫指使臣之將行者每懷靡及言當常思其有不及不可自以為足也原隰而有皇皇之華猶使臣將命而光華之及於下國也奉使而常懷不及之心則必能咨衆謀矣如是而後可為有光華也我馬維駒六轡如濡載馳載驅周爰咨諏賦也濡潤也周遍也咨訪也我馬維騏六轡如絲載馳載驅周爰咨謀賦也如絲言柔也我馬維駱六轡沃若載馳載驅周爰咨度賦也度徒洛反後凡謀度之度並同沃亦潤意我馬維駰六轡既均載馳載驅周爰咨詢賦也駰馬之隂白雜毛者也均調也諏謀度詢皆謀度之意因各章協韻而異其文耳無所别也周於訪問無所不盡其謀可以見其每懷靡及矣程子曰咨訪使臣之大務華陽范氏曰王者遣使於四方教以咨諏善道將以廣聰明也皇皇者華五章章四句詩歌之用説見鹿鳴常棣經旨曰此詩蓋周公所作用以為兄弟相燕飲者之樂歌雖不専為管蔡之亂然因管蔡而有感於中者亦深矣左傳載富辰之言多失聖人之意不足據也常棣之華鄂不韡韡興也凡今之人莫如兄弟興意常棣棣也子如櫻桃可食鄂與蕚同華之趺也韡韡盛而有力之貌其字從韋則有堅韌之義焉常棣以蕚承華相依甚力猶兄弟親情之固也故以起興言兄弟最親而情當固也死喪之威兄弟孔懷原隰裒矣兄弟求矣賦也威畏也謂其遭死喪之變事之最可畏避者惟兄弟則其心係於懷而相恤也裒聚也謂治葬而裒聚於隰原之材亦惟兄弟能為之營求耳此章言兄弟之恤其有喪者如此非有親親之至情而能然乎脊令在原興也兄弟急難每有良朋况也永嘆興意令平聲後脊令同難去聲後凡患難之難並同脊令行則搖於在原時見之首尾相應兄弟之急難而相應者亦如此故以起興每猶凡也况與恍同言朋友情雖愴恍亦但長嘆而已難即死喪之事蓋承上章之意而申言之見他人不如兄弟之親也兄弟鬩于牆外禦其務每有良朋蒸也無戎賦也務當作侮鬩鬪狼也禦禁止也務左傳作侮謂外患也上章急難以家禍言也此章禦侮以外患言也蒸衆戎助也兄弟急難以其素相睦者言也曰鬩墻則有隙矣然外患則必相恤見其親親之本心而小忿不能奪也朋友雖衆亦不能與以申上章良朋永歎之意喪亂既平既安且寧雖有兄弟不如友生賦也喪死喪也亂外侮也寧安之定也喪亂而朋友不如兄弟蓋親疏之等自有不同而緩急之事亦有非朋友所能與者未可盡以為朋友之薄也及事平而視兄弟不如友生則失親親之本心而以他人為親矣儐爾籩豆飲酒之飫兄弟既具和樂且孺賦也儐陳飫饜也孺親慕之意如小兒之慕父母也言設殽具酒以飫兄弟所以篤親親之恩也見兄弟有不具則無與共享其樂矣妻子好合如鼓瑟琴兄弟既翕和樂且湛賦也翕合也人所以不能篤親親之恩而薄於兄弟者以私於妻子也故言欲兄弟之和樂必自妻子好合始好合與夫相和而不違其志使和氣洽於一家也蓋刑寡妻而至於兄弟之意宜爾室家樂爾妻帑是究是圖亶其然乎賦也室家以妻子居於一家而言妻帑樂則不至各妻其妻各子其子而室家宜矣所以能親兄弟者其工夫之要只在宜妻子而已故推本言之而謂人之於此不可不究圖其實也究窮也圖謀也常棣八章章四句伐木經旨曰此燕朋友之樂歌也人君逺於民庶朝夕所與交而資之以成德者惟諸父諸舅兄弟故朋友之義於三親最切但恐或有不睦其心先携則禍本基矣故作此詩以明先施之義欲其相好而不相猶也然近於衰世寡恩之志故所陳皆逺怨之辭逺怨而得其歡心相忘於形迹然後可以諭於道也此詩序於常棣之後意亦周公感於管蔡之事而發歟此天子諸侯之所宜戒故朝廷燕朋友遂以為樂歌焉此與頍辨似互相發者宜為大雅伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲興也矧伊人矣不求友生神之聽之終和且平興意丁丁空林相應聲嚶嚶鳴聲和也幽深相視矧况也平者和之得中也伐木下人斬伐之事以喻下之伐上也鳥在其上間有惡聲避遷喬木而自求其友聲應相和喻人當上下相殘之世不可效尤而惟篤朋友之義務求其和雖有小忿亦不計也和平以德言心之所安即是神聽也伐木許許興也釃酒有藇既有肥羜以速諸父寧適不來微我弗顧於粲灑掃陳饋八簋既有肥牡以速諸舅寧適不來微我有咎興意許呼古反於音烏後凡歎詞之烏並同許許舉動勸力之聲比丁丁則聲已聞於外矣舉伐木而不及鳥鳴省文也釃泲去糟也藇美貌羜羔五月未成羊者也速召顧念咎過也言寧彼有故而適然不來我則不坐於有罪之地此所求於朋友者先施之意八簋言其器之盛蓋天子燕朋友禮宜加厚也伐木于阪興也釃酒有衍籩豆有踐兄弟無逺民之失德乾餱以愆有酒湑我無酒酤我坎坎鼓我蹲蹲舞我逮我暇矣飲此湑矣興意阪地之陂者也衍多也乾餱籩實也不與人燕會則生怨故有愆湑亦釃也酤買也蹲蹲蹲身而舞也伐木于阪則出于外矣蓋惡聲之漸迫也兄弟無逺言當速之以來而不使相逺也與上章速諸父諸舅意同皆言所以篤朋友之好也民之失德指君而言此以下通結父舅兄弟言其皆當以酒合歡而不至於乾餱之愆也無酒酤我設言也華谷嚴氏曰無酒則為我酤買之非必無酒設言縱使無酒猶當酤之篤於朋友不以無為辭也下文言飲此湑則知不待酤也此詩三章皆以伐木起興言他人雖有傷殘之禍而我則宜相親愛如鳥之和鳴不可失朋友之歡而使之相疑也勸之以飲酒歌舞而不及於乞言正德所重在忘懷耳春秋時如叔帶佞夫之類失懿親而生內變者不少然後知此詩之意垂戒逺矣伐木三章章十二句此從劉氏分章非毛舊也天保經旨曰人君能以德及民宜享多祿故其臣美之而作此詩蓋欲其德之有常也此頌體也雖稱頌之而歸於有德則責難之意寓焉古之人所以勸勉其君者亦多有將順之言如史克之頌魯僖公者皆惓惓望其進德非面諛也舊説謂人君以鹿鳴以下五詩燕其臣而臣之受賜者歌此以答之此則出於有意而非平時愛君之本心矣况前五詩者所用異時不知為何時之燕而作邪將先作此詩隨其燕而皆以此答邪蓋有求其説而不得者矣天保定爾亦孔之固俾爾單厚何福不除俾爾多益以莫不庶賦也保定謂保其身而使之安也固堅言其德也有德而得民心之歸所謂福也單盡也單厚多益以德言除除舊而生新也庶衆也除庶以福言此言其以德獲福之備也天保定爾俾爾戬榖罄無不宜受天百祿降爾遐福維日不足賦也戩盡榖善也罄亦盡也本戩榖而言罄無不宜者宜君宜王宜室宜家宜兄宜弟宜民宜人處之無不盡善即其德之單厚多益也百祿即除庶之所聚也維日不足即遐字之意此言其以德獲福之久也天保定爾以莫不興如山如阜如岡如陵如川之方至以莫不增賦也天保定爾德之固也以莫不興福之盛也山阜岡陵言其積之甚厚川至言其來之無窮所謂莫不增以終莫不興之意此申言上章所謂遐福也吉蠲為饎是用孝享禴祠蒸嘗于公先王君曰卜爾萬壽無疆賦也吉善蠲潔也饎酒食也享獻也宗廟之祭春曰祠夏曰禴秋曰嘗冬曰蒸言時祭也時祭但及於四親廟先公王以祖紺大王王季文王言蓋此詩作於武王時在三王追尊之後故云然詳見廟制考義祭享之時條下君通謂先公先王也卜期之也猶問於神而神告之故曰卜萬壽無疆者祝為尸致福於鬼神之辭即嘏辭也此言其德足以通神明而錫福無疆也神之弔矣詒爾多福民之質矣日用飲食羣黎百姓遍為爾德賦也弔與的同質諸鬼神而的然無疑也詒多福即上章所謂卜爾萬壽無疆也羣衆黎黑猶言黔首羣黎即百姓皆言民也質實無偽但日用飲食而已豈徒日用而不知哉已皆化而為德矣蓋亦爾德之所及也民心歸化而德各自新所謂詒爾多福者如此福固不在民心之外也如月之恆如日之升如南山之壽不騫不崩如松柏之茂無不爾或承賦也恆常也謂受日光而常明也升謂日出而明必進也南山終南山也騫虧也騫崩則山有損壞不得為壽矣承者承其庇覆也此皆言萬古不易之意以見福之無疆也天保六章章六句采薇經旨曰此宣王時伐玁狁以歸而勞歸士之詩也蓋出車六月皆宣王時伐玁狁事雖不必其同為一役然不可不以此為宣王詩也序以為文王時詩則玁狁者即獯鬻也自大王避獯鬻遷岐至於文王皆以安民立國不以養民者害人絶無伐玁狁之事世儒以其詩列於小雅之前而遂附會其説朱子辨説既以為未必文王之詩矣但謂之遣戍役則篇內皆既歸之辭也烏得云遣而戍役防秋之説本非古法程子雖以為言蓋未之考耳詳辨於讀禮疑圖卷之三矣其曰戍者特本於我戍未定之一言而亦非後世更畨之戍也安可遂據以説此詩之義哉慰勞之詩當為大雅采薇采薇薇亦作止興也曰歸曰歸嵗亦莫止靡室靡家玁狁之故不遑啓居玁狁之故興意薇可食之萊説見草蟲作生出地也采薇者孔氏以為二月時也嵗莫者十月將改嵗也當春月薇作之時已往出征而嵗暮當歸猶不得歸也蓋追敘其初行采薇之事而勞之采薇采薇薇亦柔止興也曰歸曰歸心亦憂止憂心烈烈載飢載渴我戍未定靡使歸聘興意柔始長而弱也憂謂憂玁狁之為患而不得歸也烈烈內熱如火也載飢載渴謂奔走道塗而不得及時飲食也戍未定謂常迎戰而無定居也聘問也欲通未得歸之問於家而無可使者故曰靡使歸聘采薇采薇薇亦剛止興也曰歸曰歸嵗亦陽止王事靡盬不遑啓處憂心孔疚我行不來興意剛者老而不可食也陽十月即前所謂嵗莫也純隂用事嫌於無陽故名之曰陽月來謂歸也采薇自作而柔自柔而剛忽已至於嵗莫已在可歸之日而尚未得歸故曰我行不來不來者未得來耳非謂致死無還心也憂心孔疚與上章憂心烈烈意同王事謂征玁狁乃周王之事也非指文王蓋文王未嘗稱王序以為文王以天子之命則朱子固謂其為衍説矣彼爾維何維常之華興也彼路斯何君子之車戎車既駕四牡業業豈敢定居一月三捷興意爾華之下垂爾爾然也常常棣也常棣以蕚承華如士卒之承將帥也故以華興君子之車即下章君子所依小人所腓之意路戎車也君子指將帥也業業者馬欲行而惟以去為事也戎車既駕則將征矣故曰豈敢定居捷勝也一月三捷者已然之辭先王用兵有征無戰宣王之時已不及古故以戰勝為功也然常戰常勝正見玁狁之急而士卒所以不得歸也駕彼四牡四牡騤騤君子所依小人所腓四牡翼翼象弭魚服豈不日戒玁狁孔棘賦也騤騤睽違貌言馬欲去而勢不可止也依依車以行也腓足肚隨足而動也小人隨君子而動可見卒乘之輯睦矣翼翼張竦貌言馬之欲行如鳥舒翼也象弭弓弰也以象骨飾之服盛矢器也魚東海似魚之獸其皮可為矢服者象弭謂韜弓於韔而露其弭也魚服謂納矢於筒而露其服也戒謂戒以愼戰也蓋其心本不欲戰但以玁狁之急不得不應之耳此申上章一月三捷之意昔我往矣楊栁依依今我來思雨雪霏霏行道遲遲載渴載飢我心傷悲莫知我哀賦也楊栁依依即薇作之時也雨雪霏霏則寒甚而在嵗莫之後矣見嵗莫之時欲歸不得至於雨雪而始得歸耳行道遲遲非謂歸途行遲也蓋追言從征之日奔走道塗而每至飢渴耳我心傷悲即前章憂心烈烈載飢載渴之意蓋申言情之可哀以勞之亦可謂深察於士卒之情矣采薇六章章八句按南仲出車言昔我往矣黍稷方華與吉甫六月同時則南仲與吉甫當同為一事而采薇言昔我往矣楊栁依依明與彼二詩者時序不同得無本兩事而出車六月則因初征未服復遣吉甫攘驅略定而南仲繼之以經理朔方歟則六月出車當在采薇之後矣觀彼二詩者皆言薄伐則固有善勝之道而不主於窮兵者也采薇不言薄伐而言一月三捷則假戰勝以示威此其所以不及吉甫南仲之能使蠻夷率服而兵不再勤歟然則宣王初政尚亦好攻至其晚年用吉甫南仲諸賢而後中興之業始盛不可以采薇之時遂為盡善也出車經旨曰宣王時南仲平玁狁以歸而勞之之詩也南仲即常武之南仲宣王時人南仲之平玁狁當與尹吉甫六月詩同時蓋因采薇時初征未服而遣吉甫以重臣追逐狄兵吉甫既至大原而居鎬經營矣又使南仲繼之以往朔方焉蓋禦戎狄之道以守備為本而朔方者狄人所以通西戎之要路也朔方城則足以制西戎而狄失右臂之助不待攻戰而可以伐謀矣否則雖一月三捷亦徒勞兵力耳彼經略不足以服人心安能保其久而不畔哉當為大雅我出我車于彼牧矣自天子所謂我來矣召彼僕夫謂之載矣王事多難維其棘矣賦也牧郊外也天子周王也僕夫御夫也此言南仲奉命出車而急於王事也我出我車于彼郊矣設此旐矣建彼旄矣彼旟旐斯胡不斾斾憂心悄悄僕夫况瘁賦也郊在牧內取協韻耳無他義也斾斾飛揚之貌况兹也此章言南仲出車而以王事為憂所謂臨事而懼也恐其勞不易息故又曰僕夫况瘁王命南仲往城于方出車彭彭旗旐央央天子命我城彼朔方赫赫南仲玁狁于襄賦也王周王也南仲時為大將以城朔方者方即朔方今陜西寧夏衛在今固原州西北彭彭壯盛貌詳見載驅字義央央在中不定之貌赫赫德威顯著之意襄即書懷山襄陵之襄謂駕出也固原乃周畿邊徼之地界連朔方相距五百餘里其東北為北狄西南為西戎城朔方所以斷戎狄往來之路也西戎道絶而不相犄角則可以駕玁狁而出其上矣故曰于襄此言南仲奉王命而城朔方蓋乘吉甫驅逐玁狁出境之後雖廟謀之先定而實其赫赫德威足以震服玁狁不待於用兵也昔我往矣黍稷方華今我來思雨雪載塗主事多難不遑啓居豈不懷歸畏此簡書賦也華方開花也塗凍釋而其泥塗也黍稷方華鄭氏云朔方之地六月時也雨雪載塗鄭氏云至春凍始釋而來反也此與采薇本二事東萊吕氏合為一事而解之牽強甚矣但鄭氏所釋黍稷方華之六月謂建未之月與後篇六月不同詳論於後篇矣簡書西戎侵境而被患之國以簡書告急也時密阮諸國猶在今涇州界上近於西戎疑即指此類也西戎雖不得與玁狁通而尚未有懲故為患耳南仲初出本城朔方城畢而又有西戎之伐故至於雨雪載塗而始得歸也始往而黍稷華既歸而雪載塗此言其行役之久也王事多難不遑啓居以城朔方言畏此簡書以伐西戎言喓喓草蟲躍躍阜螽未見君子憂心忡忡既見君子我心則降赫赫南仲薄伐西戎賦也草蟲阜螽詳見召南草蟲字義草蟲鳴鄭氏以為晚秋之時也蓋在六月出車之後雨雪載塗之前朔方城畢而西戎警急之時也此時南仲家人感於時物之變方思其歸而忽有西戎之伐尚不得歸至於歸時則雨雪載塗矣西戎近於玁狁蓋嘗與之表裏為患者故往伐之是翦玁狁之羽翼也然曰薄伐則亦但問其罪使之自服而亦不假於兵力也觀於此詩但言出車而不言甲兵師衆其意可知矣春日遲遲卉木萋萋倉庚喈喈采繁祁祁執訊獲醜薄言還歸赫赫南仲玁狁于夷賦也春日至采繁孔氏以為此時物及事皆三月也當在雨雪載塗之後蓋已歸朝而為奏功之時矣歷序三月之景見其非若草蟲之候而室家可以樂也訊謂其魁首當訊問者也醜衆也謂其徒黨來降者也執訊獲醜不殺一人而就縳也以西戎之功言其歸不見有盛大聲威故曰薄言還歸然皆南仲赫赫德威之所服也西戎服則玁狁平矣故結之曰玁狁于夷而西戎之所係亦不小焉出車六章章八句小序以此為文王時勞還之詩則文王未嘗為天子稱王而首章言自天子所三章言王命南仲則所謂王與天子者何所指邪説者強求其解而以歸之商紂迂回遷就殊不可通亦徒費辭説耳小序之陋本亦易見而世之名儒猶泥其説不知言之病一至此乎杕杜經旨曰婦人因夫久從征役過期不歸故作此詩以序其懷思之情也舊説以為勞還役之詩則既還而得見其妻矣苟欲勞之豈無餘意何必諄諄為其妻追述未還之感邪以篇內王事靡盬之言推之意其當為王風耳有杕之杜有睆其實興也王事靡盬繼嗣我日日月陽止女心傷止征夫遑止興意睆結實分明貌杕杜有實秋冬之交也陽十月也此嵗莫而可以歸之時也女妻自謂也遑暇也謂征夫亦可以暇矣有杕之杜其葉萋萋興也王事靡盬我心傷悲卉木萋止女心悲止征夫歸止興意杕杜之葉萋萋春將莫之時也自秋冬之交即望其歸而至此則春將莫猶未得歸也陟彼北山言采其杞興也王事靡盬憂我父母檀車幝幝四牡痯痯征夫不逺興意杞可采而食者枸杞也言人有陟山采杞之時亦春莫矣春莫而猶不歸則貽我父母之憂也檀木堅可為車故曰檀車幝幝敝貌痯痯病貌檀車耐用之車而亦敝牡馬有力之馬而亦病見其久且勞也不逺謂其歸期當近也匪載匪來憂心孔疚期逝不至而多為恤卜筮偕止會言近止征夫邇止賦也載裝也謂征夫不裝載而來也憂心孔疚妻自言其憂之至病也嵗莫而歸者期也至於春莫則期逝矣恤亦憂也會合也謂卜筮皆告以會期之近也此詩四章全無一語及於戍役勞苦之意但述其憂思之情故知其非勞還役之詩也杕杜四章章七句詩説解頥正釋卷十五
