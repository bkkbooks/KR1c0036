body:
  text: 詩説解頥正釋卷二十一明季本撰桑扈經旨曰此天子美方伯之善於其職也當為大雅交交桑扈有鶯其羽興也君子樂胥受天之祜興意桑扈竊脂也説見小宛此鳥食肉而不食榖喻肉食者不厲民以自養也鶯文貌言其羽文章外見也君子指為方伯者樂心無所纍也不剝其民則無計利之心而安於天理故樂也人心歸之即天祜也交交桑扈有鶯其領興也君子樂胥萬邦之屏興意屏必郢反下章同領頸也萬邦指小國言屏塞門所以蔽外者言小國皆賴之屏蔽也之屏之翰百辟為憲不戢不難受福不那賦也翰幹也所以當牆兩邉障土者也辟君也百辟言其所統之諸侯也戢謂收斂不敢肆也難謂謹畏不敢易也戢難是勉之以修德之實那多也兕觥其觩旨酒思柔彼交匪敖萬福來求賦也兕觥旨酒以邦交燕饗之禮言觩角上曲也柔謂以德懷柔之也匪敖謂柔德也即上文不戢不難意言有德則人心所歸福不待求而自至也桑扈四章章四句鴛鴦經旨曰此美人君求賢而祝頌之詩非答桑扈也亦當為大雅鴛鴦于飛畢之羅之比也君子萬年福祿宜之賦也鴛鴦匹鳥也止則相偶飛則為雙此鳥之和順而有文者以比賢者和順積中而英華發外也畢小罔長柄者也羅罔也畢則執以掩物羅則張以待鳥畢之羅之則賢者皆入於網中矣君子指其君言君子能盡收天下賢才而用之則萬年宜享此福祿矣鴛鴦在梁戢其左翼比也君子萬年宜其遐福賦也梁東萊吕氏以為橋梁魚梁皆是不必專以為石絶水之梁也戢斂也張子曰禽鳥並棲一正一倒戢其左翼以相依於內舒其右翼以防患於外蓋左不用而右便故也或謂鳥翼右掩左雄左掩右雌舉雄而言非也鴛鴦在梁而戢左翼未飛而自衛時也賢人在山林獨善其身者如此今亦為君子用之宜其享遐福於無窮也乘馬在廄摧之秣之君子萬年福祿艾之賦也摧莝芻也秣飼榖也言君子以己所乘在廄之馬而摧秣芻榖飼之以迎賢者此賢者所以為其所網也艾長久之意乘馬在廄秣之摧之君子萬年福祿綏之賦也綏言於艾後即遐福之意鴛鴦四章章四句頍辨經旨曰此天子燕兄弟甥舅而與燕者感悅之詩似亦欲逺怨以相忘於形迹者蓋與伐木意同疑即答伐木也亦為大雅有頍者辨實維伊何爾酒既旨爾殽既嘉豈伊異人兄弟匪他賦也蔦與女蘿施于松柏比也未見君子憂心奕奕既見君子庶幾説懌賦也幾音機後凡庶幾幾微之幾並同頍舉頭貌錢氏曰舉首則辨愈髙辨皮辨孔氏曰天子燕羣臣用玄冠親同姓用皮辨言天子服皮辨而頍然在首者此何為哉亦惟以我兄弟非異人而具旨酒嘉殽以燕之耳匪他無他心也施延及也我兄弟猶蔦與女蘿也施於松柏之髙猶附於天子之尊也附天子以為親此其所以非異人也但我兄弟心懷自疑則憂心不能無奕奕者奕與奕同奕奕重疊之義及見天子與之燕飲合歡而庶幾得自説焉蓋始忘其形迹矣君子正指天子也有頍者辨實維何期爾酒既旨爾殽既時豈伊異人兄弟具來賦也蔦與女蘿施于松上此也未見君子憂心怲怲既見君子庶幾有臧賦也期音箕何期之期當作其即夜如何其之其具來則無他心可知矣有頍者辨實維在首爾酒既旨爾殽既阜豈伊異人兄弟甥舅賦也如彼雨雪先集維霰興也死喪無日無幾相見樂酒今夕君子維宴興也言甥舅者燕兄弟而併及甥舅也無幾相見兄弟甥舅自相謂也蓋老則將死欲其盡今日而樂酒也如此則篤親親之情而天子之心亦安矣兄弟甥舅苟有不協而天子能坦然忘懷乎頍辨三章章十二句車舝經旨曰此君子得賢妻而自慶之辭也其體似風間關車之舝兮思孌季女逝兮匪飢匪渴德音來括雖無好友式燕且喜賦也間關軹舝間相關之意舝車軸頭鐵也無事則脫行則設之説見泉水軹者轂末之小穿亦謂之轊所以貫舝者也孌美貌逝往括會也言我所以思孌然之少女而貫牽於軹以往迎者非以飢渴之故而資其養也特以德音之善而欲其來會耳凡人之德賴友以成既得季女之賢自足以助我成德雖無好友而式燕且喜矣此則以得賢女為慶也依彼平林有集維鷮興也辰彼碩女令德來教式燕且譽好爾無射興意射音繹與斁同説見葛覃鷮雉之别名微小於雉走而且鳴其尾長肉甚美平林林木在平地者也辰時也碩女以德言鷮文鳥言平林茂木有文采之鷮集而依焉喻已有碩女能及時來配而以令德教我也如此不惟可以得其燕安且有以成我美譽則碩女之德誠可為全而我之好是懿德寧有厭射之心乎雖無旨酒式飲庶幾雖無嘉殽式食庶幾雖無德與女式歌且舞賦也女指季女此承上章言既得令德而成美譽所謂令聞廣譽施於身不願人之文繡既醉以酒既飽以德者也所以雖無美酒嘉殽而亦庶幾飲食之矣與助也歌舞興起貌言我雖無德以助女女今以令德來教而我且興起不倦則於女之為善亦少有助矣陟彼髙岡析其柞薪析其柞薪其葉湑兮興也鮮我覯爾我心寫兮興意柞惡木即鴇羽所謂栩也湑滋濡貌鮮新也初也寫傾瀉無留滯之意言柞生於髙岡之上無人培植方將析而為薪然雨露滋濡而其葉湑湑猶有生意喻已不才而生於逺人之地宜為棄物今賴賢妻而興起以成美譽也蓋當我初遇爾方新之時心即傾㵼而無留滯其感應之速真若時雨之化莫知其所以然者謂非女令德之滋益乎髙山仰止景行行止興也四牡騑騑六轡如琴覯爾新昏以慰我心興意髙山言山之髙也景行言路之大也止語辭騑騑牡馬行疾之貌如琴能調和也言賢女在車中之時御者習聞其德能調牡馬而不敢肆使之如琴之和故一見即慰我心而仰髙山行景行之心自不能已矣斯人也孔子稱其好仁載在表記豈虛語哉車舝五章章六句青蠅經旨曰此警戒王勿聽讒言之詩亦直言時事而非親告於王者也集傳得之矣營營青蠅止于樊興也豈弟君子無信讒言興意營營往來飛聲亂人聽也青蠅羽蟲之汙穢而能變黑白者止於物則穢敗而生蛆復變為蠅無有紀極也樊藩也言將入於藩籬也君子指王營營青蠅止于棘興也讒人罔極交亂四國興意棘荊棘所以為籓也四國四方也亂四國言禍之所及者逺也營營青蠅止于榛興也讒人罔極構我二人興意榛亦以為籓也四國之亂自搆我二人始已與聽者為二人青蠅三章章四句賔之初筵經旨曰衛武公懼飲酒之亂德故作此詩蓋為周卿士時自戒之言也否則當為衛風矣義與大雅抑之詩相似竊意抑當移附於此以為一類賔之初筵左右秩秩籩豆有楚殽核維旅酒既和旨飲酒孔偕鐘鼓既設舉酬逸逸大侯既抗弓矢斯張射夫既同獻爾發功發彼有的以祈爾爵賦也筵詳見行葦字義初筵初即席也左右筵上之人也楚濟楚貌肉曰殽豆實也果曰核籩實也旅衆也華谷嚴氏以為品之多是也鐘鼓之設為燕故也將射而遷樂于下以避射位此一時權宜於禮自應如此奚足論乎舉酬舉所奠之酬爵是為旅酬矣詳見楚茨字義逸逸從容有序而無急遽之狀至旅酬時易亂故以逸逸為善此以上言賔燕也大侯君侯也詳見猗嗟字義抗舉也大侯抗而弓矢亦張其節然也射夫既同此其耦也獻猶奏也發發矢也功中的之功也的質也如所謂天子熊侯白質諸侯麋侯赤質也祈求也爵罰爵即觶也不勝取觶立飲所以自罰而勝者但求免此爵而已所謂無所爭者如此此以上言既燕而射也當射時用酒惟以示罰非有所求也但射則必有燕飲之事故言射之為禮始終不亂者如此以見飲酒者不可以不敬也籥舞笙鼓樂既和奏蒸衎烈祖以洽百禮百禮既至有壬有林錫爾純嘏子孫其湛其湛曰樂各奏爾能賔載手仇室人入又酌彼康爵以奏爾時賦也仇音拘籥舞文舞也笙鼓堂下樂也蒸進衎樂烈業洽合也百禮事神之衆禮也百禮皆藴蓄於中如妊子然故曰有壬百禮皆發見於外如叢木然故曰有林錫神錫之也爾指主祭者嘏福也子孫烈祖之子孫也湛樂之甚也尸既嘏主人以福則子孫皆樂而於三獻之後長兄弟復先舉觶而獻尸以致其敬所謂奏爾能也賔載手㪺賔長加爵以獻尸也室人入又主人之佐食亦入以加爵也獻尸在室故曰室人入又康安以酒之能安體言見其非亂性之物也㪺者挹於罍也酌者注於爵也此在祭禮合於時宜故曰各奏爾時按孔氏疏加爵當在各奏爾能之前但以子孫其湛文與上連故以賔與室人附其後耳不以酌獻先後為次也此但娛尸而已其後方有旅酬之事當祭時用酒惟以娛神非志於酢也但祭則必有燕飲之事故言祭之為禮始終不亂者如此以見飲酒者不可不敬也長樂劉氏曰言文舞則武舞見矣言笙鼓則八音舉矣因射而飲者飲在射先因祭而飲者飲在祭後上二章皆言凡飲之初禮樂之盛如此則必不至於亂也賔之初筵溫溫其恭其未醉止威儀反反曰既醉止威儀幡幡舍其坐遷屢舞仙仙其未醉止威儀抑抑曰既醉止威儀怭怭是曰既醉不知其秩賦也反反顧禮也幡幡輕數也舍其坐遷謂舍己所坐之位而遷就他位也仙仙軒舉之狀抑抑謙下也怭怭媟嫚也秩即首章之秩秩此言當時凡飲酒者初皆未遽失禮而終至於亂不如初也賔既醉止載號載呶亂我籩豆屢舞僛僛是曰既醉不知其郵側辨之俄屢舞傞傞既醉而出並受其福醉而不出是謂伐德飲酒孔嘉維其令儀賦也號呼呶歡也籩豆本有楚今因號呶而亂矣僛僛傾側貌郵與尤同過也側傾也俄傾貌傞傞退蹶之狀既醉而出以起下文並受其福者謂主無慢賔之失賔無失德之愆也不出謂屢舞不已而不知去也此章極言飲醉者之狀而戒其以德將也凡此飲酒或醉或否既立之監或佐之史彼醉不臧不醉反恥式勿從謂無俾大怠匪言勿言匪由勿語由醉之言俾出童羖三爵不識矧敢多又賦也識音志監監禮者也史書過者也蓋古司正御史之屬立之監以監之佐之史以書之所以防失禮也從謂從而與之言也言不當理謂之匪言言自言也語不由心謂之匪由語與人語也由醉之言則謂匪由矣上章所謂號呶皆根於此童不角也羖牡羊也童羖猶易所謂童牛言其方在乳時也羊本柔物况當其乳乎人之柔弱不立者如乳羊然故以童羖示罰使知自愧也意此亦古人監酒者之常罰耳三爵孔氏謂獻也酢也酬也為三則每人之飲爵不及三矣故三爵者總旅酬及無算算爵而言也識記也言人之飲酒有醉者有不醉者自不醉者觀之則其視醉者反以為恥可見人之良心未嘗不顯特為醉而自昏耳此全在監史能正之也監史當醉者將怠時但不能從而與言使不至於大怠耳必使匪言者勿言匪由者勿語而言由於醉者則罰之使出童羖以示辱則三爵之後苟不能記其心必亦知警豈復肯多飲乎此章言飲酒當立監史以為戒也賔之初筵五章章十四句魚藻經旨曰序稱刺幽王也言萬物失其性王居鎬京將不能以自樂此數言者得詩意矣蓋亦譏切時事之言云魚在在藻有頒其首興也王在在鎬豈樂飲酒興意藻水草也頒大首貌首大而尾長乃魚之瘠者豈亦樂也安然而樂於飲酒也華谷嚴氏曰水深則魚樂所謂躍淵縱壑相忘於江湖者也今淺水生藻而魚在焉露其頒然之大首猶言魚在于沼亦匪克樂喻民之窮蹙窘迫也幽王在鎬京豈樂而飲酒夫民安而後君安今民失其所而王獨樂其能久乎孟子所謂雖有臺池鳥獸豈能獨樂哉魚在在藻有莘其尾興也王在在鎬飲酒樂豈興意莘長貌華谷嚴氏曰濳魚願深渺今既露其首復驚逝而露其莘然之長尾蓋在淺水之處故逃竄窘迫首尾俱見也三山李氏曰樂豈但倒其文以便韻耳魚在在藻依于其蒲興也王在在鎬有那其居興意蒲水草之近岸者也那安也華谷嚴氏曰藻猶在水之中蒲生近岸則水又淺矣愈更窘促也幽王在鎬安然以居不知危之將至也魚藻三章章四句采菽經旨曰大國崛強天子致其來朝而作詩以示懷諸侯之意焉當是宣王時詩蓋大雅也采菽采菽筐之筥之興也君子來朝何錫豫之雖無豫之路車乘馬又何豫之玄衮及黼興意菽鄭氏以為大豆也詳見七月字義采非謂采葉為藿當如采芑之采蓋五榖之大者莫如菽既采而貯之筐筥以收斂之使無散逸喻諸侯之強大亦當收之使有所歸也路車詳見渭陽字義玄衮及黼詳見九罭字義君子指諸侯也豫之以車馬衮黼者未實與也因其不常修朝禮而以是警之謂於女分所當有者未嘗吝也此章言諸侯來朝而天子必有寵命也觱沸檻泉言采其芹興也君子來朝言觀其旗其旗淠淠鸞聲嘒嘒載驂載駟君子所屆興意觱沸泉湧出聲檻與陷同深也芹水菜潔白有節氣芬芳可為葅泉自下湧出勢本流通但為芹所塞則流始窒耳采其芹所以去塞而使通也淠淠旗來貌嘒嘒小聲將至君門不敢疾馳而其聲細也自其服外兩驂而言則曰驂併兩服而言則曰駟皆謂諸侯乘馬也即其旌旗車馬而知諸侯之至則有以服強梗之國而於治無所壅矣此章言天子懷諸侯因其至而喜之也赤芾在股邪幅在下彼交匪紓天子所豫樂只君子天子命之樂只君子福祿申之賦也脛本曰股邪幅逼也邪纒於足如今行縢所以束脛在股下也諸侯見於天子服赤芾而以邪幅纒足則在股者不動便於行也交上交也匪紓行之疾也如此則諸侯急於盡職而可樂矣可樂則當為天子所豫而錫以車馬衮黼之命命之不已即是福祿之所申也此章言諸侯能盡臣職而後得天子之寵命也維柞之枝其葉蓬蓬興也樂只君子殿天子之邦樂只君子萬福攸同平平左右亦是率從興意殿多見反平牌延反柞説見車舝以喻諸侯之強梗枝葉則喻其左右之臣也雨露不以惡木而不滋故其枝葉猶蓬蓬然而盛以喻諸侯雖強梗天子曷嘗有所棄哉惟諸侯有可樂之德不以崛強梗治使天子之邦得以殿安則必有寵命及之而萬福同聚於其身矣其諸臣亦皆平平然無險僻之心而率循殿安之德無一人異志者則所謂枝葉蓬蓬者蓋在此矣所以為萬福攸同也此章言天子福澤無處不到而諸侯當盡臣職也泛泛楊舟紼纚維之興也樂只君子天子葵之樂只君子福祿膍之優哉遊哉亦是戾矣興意紼繂索也纚維皆繫也葵與揆同度也膍厚也楊舟泛泛必以紼而纚以維之庶幾有定以喻諸侯放恣必以德維持之然後歸一所謂德者揆度其心而已能揆則必矜其不能而所以處之者無不曲盡凡寵命之加而為福祿之膍者皆揆諸侯之德也歐陽氏謂紼纚維舟如天子以爵命維持諸侯是已此在諸侯恪共臣職以求為可樂之君子也戾背也若優遊怠緩不急自新則於福祿之膍者自相戾矣此章言諸侯當早定自安之計也采菽五章章八句角弓經旨曰周王不能以身教兄弟而惟驕傲以致其踈遠君子憂之故作是詩舊説以為幽王好讒佞而骨肉相遠則未見其有疾讒之辭耳騂騂角弓翩其反矣興也兄弟昏姻無胥遠矣興意騂一作觪調利也翩與偏同反之貌也言角弓本調利而不善紲檠則翩然而反猶兄弟昏姻本皆切近而不與相親則外反而去矣言王不可遠也爾之遠矣民胥然矣爾之教矣民胥效矣賦也此承上章相遠而言以明其當身教也上之人於兄弟而相遠則民莫不然而亦遠之矣若以親親之道教民則民莫不效之而相親矣孰肯有相遠者哉民指兄弟而言後章同此令兄弟綽綽有裕不令兄弟交相為愈賦也令音零令猶教也綽綽有裕言其有寬容之量而無計較之私有計較之私則交相為病矣此申上章之意民之無良相怨一方受爵不讓至于已斯亡賦也怨者遠之所生也一方猶言一隅偏執已見而不相通也爵錢氏以為酒爵也已斯亡猶言亡斯已也言人惟不善所以偏執已見而怨局一隅全無綽綽有裕之量也至於飲酒受爵之際禮之所宜讓者此蓋徐行後長之類本無難事而亦侈然受之不辭以喻人但欲責望於人雖其施已厚而不知也則不至於亡身不止矣此言人之所以當教也老馬反為駒不顧其後如食宜飫如酌孔取此也駒小馬也尚未羈銜其行無制老馬則間習之久者也苟於人不知所以教之則雖老馬無不恣行亦如駒之無制而亂馳矣不顧其後者望前而行則不知其後之有失也飫飽也惟人不知禮讓則求欲無厭如食者宜飽至於已飽則可已矣而欲飲者酌取至甚無所止極豈其宜哉蓋以食與飲互文以終其意也此申上章言不教者之無良如此無教猱升木如塗塗附比也君子有徽猷小人與屬賦也猱獮猴也猱性輕佻本善升木無待於教教之升木則益佻矣塗本用泥宜以粉飾又以塗附則益汚矣以比人之無良者不以善率之則適以長其惡而不能去矣君子指王言有徽猷是以身教也如此則小人皆屬附之而為善矣此章言感應之速而在上者不可不以身教也雨雪瀌瀌見晛曰消比也莫肯下遺式居婁驕賦也婁音屢瀌瀌急而盛也晛日氣也雨雪雖盛見日而消以比人雖無良見善即化也下卑下之意謂讓道也遺猶施也婁與屢同常也上之人莫肯以卑下之道施教於民但常驕以自居若與人不相親者則民之無良豈民之罪哉此承上章言民本易化而人莫肯教也雨雪浮浮見晛曰流興也如蠻如髦我是用憂興意浮浮者積髙而將流之貌流流而去也髦當作髳蠻髳無禮義而相殘賊是王以夷狄之教率之也此詩言兄弟之有不善係於君之身教不能化而為善則其情遠而不親必至責望而生怨矣角弓八章章四句菀柳經旨曰此因竂友有喜於有為者而諷之以養晦待時也故作此詩舊説以為諸侯不朝王而作則其言非所以為訓矣有菀者柳不尚息焉興也上帝甚蹈無自昵焉俾豫靖之後豫極焉興意蹈踴躍喜動之貌靖靖亂也自昵者自取之意豫指所諷之人而言菀然茂盛之柳不庶幾可止息於此乎言其可止而不止也上帝甚蹈言天行之動而不息也蓋指好動而言矣然不可以為天意如此而昵之以必行也必待其使我靖安邦國責有所歸然後極其力而為之乃無咎耳有菀者柳不尚愒焉興也上帝甚蹈無自瘵焉俾豫靖之後豫邁焉興意愒息也瘵勞病也自䁥必至於自病皆自取也邁往也有鳥髙飛亦傅于天興也彼人之心于何其臻曷豫靖之居以凶矜興意傅音附傅與附同彼人謂他人不與我同休戚者居以存諸心言凶矜者凶危矜慎之意鳥之髙飛傅天喻好髙之狀也言雖喜於有為而不足以副人責望之心彼之責我亦何所至止哉就使加我以靖亂之責我亦當何以處之必須常以凶矜存心然後可以善後不然則好大喜功鮮有不敗者矣菀柳三章章六句詩説解頥正釋卷二十一
