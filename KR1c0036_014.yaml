body:
  text: 詩説解頥正釋卷十二明季本撰陳朱子曰陳國名大昊伏羲氏之墟在禹貢豫州之東其地廣平無名山大川周武王時帝舜之胄有虞閼父為周陶正武王賴其利器用與其神明之後以元女大姬妻其子滿而封之於陳都于宛丘之側與黃帝帝堯之後共為三恪是為胡公今按陳即今開封府陳州也鄭譜謂大姬好巫覡禱祈鬼神歌舞之樂民俗化而為之此因詩中有此辭而附會也恐武王之女親被太姒之化必不如此意者春秋時陳服于楚楚敬鬼尚巫而漸其俗也華谷嚴氏謂陳詩十而七為淫靈公之事世變已極詩訖於此據株林為説也亦不知古經果如是否耳宛丘經旨曰陳俗遊蕩無度故詩人賦此以刺之也集傳得之矣子之湯兮宛丘之上兮洵有情兮而無望兮賦也湯徒浪反湯蕩也情謂遊樂之情思也望謂人所瞻望之威儀也坎其擊鼓宛丘之下無冬無夏值其鷺羽賦也坎詳見伐檀字義值遇也坎其擊缶宛丘之道無冬無夏值其鷺翿賦也缶瓦器非樂器但民俗用以節樂耳易所謂鼓缶莊子所謂鼓盆即此事也宛丘三章章四句東門之枌經旨曰陳俗淫蕩每以賽神會男女如仕族之女亦出遊焉因男子悅己而贈遺之此淫俗也故詩人賦其事而刺之直斥子仲之子而又言不績其麻其為刺誚明矣東門之枌宛丘之栩子仲之子婆娑其下賦也枌説見山有樞栩説見鴇羽華谷嚴氏曰陳都宛丘之側其東門與丘間乃國之交會處又有枌栩二木可以休息故陳大夫子仲之子乃婆娑遨遊於其下蓋相誘悅也張子曰婆娑不必謂舞但裴徊翺翔之義士大夫之子不得過市今也遨遊於市井中爾榖旦于差南方之原不績其麻市也婆娑賦也榖善差擇也擇其日之善者謂其晴明無隂雨也凡民俗賽神必擇吉而會衆原野也蓋賽會之處在南方之野而子仲之女遨遊於此耳觀不績其麻之言可以知其為女子矣榖旦于逝越以鬷邁視爾如荍貽我握椒賦也越於也鬷總也衆也國衆總於是日而往也荍荆葵也小草似葵紫色多花少實葉又翹起握椒一握之椒椒芬芳之物也視爾如荍愛之甚也貽以握椒知其愛已而以香物致殷勤也衆聚之中而二人自通情欵不以為耻焉故詩人即其言而爾我之以見其無耻之甚也東門之枌三章章四句陳聖人之後不宜有此夷俗蓋必其國近楚服從日久而變於夷矣今楚之南鄙當川貴之交尚有男女出遊女以答歌擇配者豈其遺風尚有存者邪衡門經旨曰集傳謂隱居自樂而無求者之詞得之矣衡門之下可以棲遲泌之洋洋可以樂飢賦也衡古文橫字也橫木為門無阿孰堂宇言其淺也棲遲遊息也泌與泉水之毖同言其流也洋洋安流廣長貌樂飢樂而忘飢也豈其食魚必河之魴豈其取妻必齊之薑賦也魴説見汝墳豈其食魚必河之鯉豈其取妻必宋之子賦也鯉詳見魚麗字義陸農師曰河性宜魚故曰河之魴河之鯉衡門三章章四句東門之池經旨曰小序謂疾其君之淫昏而思賢女以配君子得之矣集傳以為男女會遇之詞則恐非淑姬之義耳東門之池可以漚麻興也彼美淑姬可與晤歌興意池城池也陳之遊者多在東門故即其池而言漚麻水經注云陳東門有池水至清而不耗竭漚漬也治麻者必先以水漬之東門之池可以漚紵興也彼美淑姬可與晤語興意紵苧也科生宿根在地至春自生去其皮之表以其裏緝布東門之池可以漚菅興也彼美淑姬可與晤言興意菅説見白華此詩以漚麻漚紵漚菅起興即女工而言也董氏曰周姬姓陳因元女以封故詩人猶言淑姬孔氏曰晤偶也傳以晤為遇亦對偶之義蘇氏曰陳君荒淫無度不可告語故其君子思得淑女以化之於內婦人之於夫日夜處而無間庶可漸革其暴如池之漚麻漸漬而不自知也東門之池三章章四句東門之楊經旨曰此男女期會而有不至者故因所見以起興也東門之楊其葉牂牂興也昏以為期明星煌煌興意牂牂葉盛可藏貌煌煌大明貌東門之楊其葉肺肺興也昏以為期明星晳晳興意肺蔽芾貌晳晳明悉見貌東門之楊葉盛可以藏蔽但以失黃昏之期以致明顯耳此必男子有他志而失約也東門之楊二章章四句墓門經旨曰賢者以人之不良而欲諭之於道故作此詩以針之也墓門有棘斧以斯之興也夫也不良國人知之知而不已誰昔然矣興意棘蒺䔧也詳見楚茨字義斯析也墓門乃葬死之地而棘生焉猶人之趨惡道也棘必藉斧以斯之猶人之惡必藉賢人之言以去之以墓門之棘起興喻為惡者乃死亡之道也夫指其人也不良惡也不已不改也賢者言此人之惡國人皆知宜乎改矣人皆知之而不改昔者果誰使之然哉追言昔之相與處者使之而然所以今日之言不及也墓門有梅有梟萃止興也夫也不良歌以訊之訊豫不顧顛倒思豫興意梅美木也墓門有梅言人雖惡而善心猶在也梟怪鴟其聲主凶惡鳥也萃集也訊告也梟集於梅則若小人之攻善者衆矣故以起興而言此人不良我今作歌以訊之汝復不顧我訊至於顛倒之時而始思我則無及矣墓門二章章六句防有鵲巢經旨曰此淫女憶所私者而憂或間之之詩也防有鵲巢卭有旨苕誰侜豫美心焉忉忉賦也卭音蛩防者防備之意爾雅云容謂之防郭璞注形如今狀頭小曲屏風所以自防隱防之為義蓋取諸此鵲巢者鵲善為巢且知避風故以比居室綢繆如鵲巢然後可以防人也卭與䅃同韻會云稰也熟穫曰稰玉篇云稰食也蓋穫以供食之意旨苕美菜侜猶迋也中唐有甓卭有旨鷊誰侜豫美心焉惕惕賦也唐堂下至門之路即堂塗謂之陳者也甓即磚也以磚砌路則平實而不患於傾跌矣旨鷊亦美菜可供食者也淫女言我所居室可蔽而甓可行又有美菜可食以待所美之人亦可一來為誰所侜而使我心之懷憂乎防有鵲巢二章章四句月出經旨曰此詩男子因女子有相念之情而思之亦淫風也月出皎兮興也佼人僚兮舒窈紏兮勞心悄兮興意僚音了皎月光潔貌佼好也僚好貌舒遲也窈幽逺也紏愁結也悄默憂也月出皓兮興也佼人懰兮舒懮受兮勞心慅兮興意皓月光白也懰好貌孔氏云一作嬼妖也懮受憂藏於中之意慅心不安而騷動也月出照兮興也佼人燎兮舒夭紹兮勞心慘兮興意照光及人也燎明也夭紹夭媚而其心糾緊也慘戚然不樂也當月出之時感其所見而言月光能照所美之人而其人則外若舒遲而中實急切有使人不能忘者安得不勞我心之懷思乎月出三章章四句株林經旨曰陳靈公委政於夏徴舒就之決事焉故國人作此詩以諷之也胡為乎株林從夏南匪適株林從夏南賦也株夏氏邑野外曰林即株野之外也南徴舒字也集傳曰君胡為乎株林乎曰從夏南耳然則非適株林也特以從夏南故耳駕我乘馬説于株野乘我乘駒朝食于株賦也此言從夏南之意馬馬之大者駒馬之小者既有乘馬又有乘駒可見車之非一乘矣但言乘駒而朝食則見其不欲以徒衆煩夏南耳株林二章章四句左傳所載陳靈公通於夏姬之事不可謂無但中間亦有失實者靈公之適夏南豈盡為夏姬哉徴舒威權已重勢力已強故就之決事因朝食焉然言朝食則非夜聚也言乘馬則非微行也當國柄臣豈肯顯然使其母與其君淫於家哉然不能正身以威巨室則靈公見弒之原蓋在此矣其事詳辨於春秋私考宣公十年陳殺其大夫泄冶下澤陂經旨曰此亦男懷女之詩淫風也彼澤之陂有蒲與荷興也有美一人傷如之何寤寐無為涕泗滂沱興意澤水所鍾也陂澤之障也蒲詳見王風揚之水字義無為無心於理他事也涕自目出者也泗自鼻出者也滂沱雨盛貌言其如雨也彼澤之陂有蒲與蕳興也有美一人碩大且卷寤寐無為中心悁悁興意卷其員反蕳當作蓮卷言鬢髮之美其垂如拳也悁悁言其憂思如水流之涓涓不息也彼澤之陂有蒲菡蓞興也有美一人碩大且儼寤寐無為輾轉伏枕興意儼矜莊貌輾轉詳見關雎字義伏枕卧而不寐伏於枕也澤陂美人所居之地也蒲喻其容之柔弱荷蓮菡蓞喻其色之芳華也故以起興澤陂三章章六句觀陳風所存諸詩可以見陳之先亡矣詩説解頥正釋卷十二
