body:
  text: 詩說解頥字義卷一明季本撰字義詩以溫柔敦厚為教所重在於興群觀怨而事父事君乃其實行之大者也理性情者於此盡之於文義若在外而無所待焉然而鳥獸草木之名聖人欲人多識豈為鬪靡哉蓋鳥獸草木各有自然之情因其名而求其情則萬物之所以同體者可以得之於我而有感即通亦性情之助也故名物者通乎萬物之情者也通則心體無礙文義豈真在外哉周南關雎一章雎鳩爾雅以為王雎毛氏傳謂其摯而有别鄭氏箋云王雎之鳥情意深至然後有别諸家多以摯為猛摯之摯故郭璞以鶚釋之而曰鵰類許慎以鷢釋之而曰似鷹陸璣以鷲釋之而曰如鴟歐陽氏則謂先儒辨雎鳩者甚衆惟毛公得之但后妃淑善之德而以猛摯之物比之豈不戾哉是以猛摯不可言后妃矣故取其别不取其摯而於鄭氏所謂情意深至者亦不以為然焉惟朱子集傳則有取於鄭說非苟然者考之語録有云嘗見淮人說淮上有之狀如鳩差小而長常是雌雄兩兩相隨不相失然亦不曽相近立處須隔丈來地所謂摯而有别是也則集傳定為狀類鳬鷖之訓蓋亦察之審矣此豈可以語鵰鶚鷢鷲之鷙鳥哉蓋摶擊之義不可以興窈窕鳥雖有别其性悍不可以為關關惟以為鳬鷖之類而後與經文意合也華谷嚴氏惑於左傳雎鳩氏司馬之說而謂司馬為摶擊之官斷乎復以雎鳩為鵰鶚之屬也求其說而不得則有鳥之鷙者不淫之解殊不知古之司馬所主在於容民畜衆息爭休兵豈以摶擊為能哉以摶擊而名官蓋末世霸功之見耳河龍門下之大河也太姒生於洽陽正在河西臨河之地故即雎鳩之在河洲者以起興蓋本其所生而言也集傳乃以北方河水之通名釋之必以河乃四瀆之一自西河南出而東大姒宫中之化當在岐周非大河所經故泛言之以為北方之水皆入於河可以通名也而不知詩人之意蓋有所指耳二章荇接余也根生水底莖如叉股上青下白葉紫赤圓徑寸餘浮在水面可為菹輾轉反側孔氏以輾轉為卧而不周反側為卧而不正鄭氏何人斯箋反側即輾轉也其訓猶未盡明集傳以為輾者轉之半轉者輾之周反者輾之過側者轉之留則精切矣三章琴七弦瑟二十五弦堂上協歌之樂也鍾大鐘鼓晉鼓皆以起堂下之樂者也詳見廟制考義卷二廟樂考成鍾一作鐘蓋傳寫異耳許慎以金旁從童之鐘為樂器從重之鍾為酒器則過於分别矣殊不知古字通作鍾也葛覃一章施毛氏訓移疏謂引蔓移去其根也蓋谷本水注溪之名書注云谷是兩山間流水之道則根在地而蔓延於谷中言其覆芘之逺也但施之訓移稍近於晦不若直作引蔓延及之義耳中谷以谷中倒用蓋古人語皆然詩中如此者亦多如中逵中林中阿中沚中陵中原中田之類皆倒語也黃鳥一名黃鸝一名黃鶯一名倉庚一名摶黍當椹熟時來在桑間三章言本言語之言詩人多用之助語如言采言念薄言駕言之類亦以其見為實事而可言也毛鄭以言訓我爾雅亦然則於義無所取矣師氏即公羊傳所謂傅母也孔氏昏禮疏云婦人五十無子出而不復嫁能以婦道教人者為姆汚煩撋之以去其汚猶治亂而曰亂也煩撋猶捼莏也私衵服婦人近裏衣曰衵見左傳宣公九年卷耳一章卷耳爾雅以為苓耳郭璞云叢生如盤陸璣云葉青白色似胡荽白華細莖蔓生可煮為茹滑而少味四月中生子如婦人耳璫本草謂卷耳即今蒼耳則可用於麯蘖而不可以茹又非蔓生其說非也周行經有三周行皆訓大道或以道德言或以道路言此章置彼周行與鹿鳴示我周行皆言道德也大東行彼周行則道路也毛氏以周行為列位與左氏同則其說有不可通矣華谷嚴氏亦以周行為使臣在道路而矜其跋涉之勞庶幾近之但下章言崔嵬髙岡之不可往者與大路之義不相協耳二章罍酒器尊彛之類罍則畫為雲雷之形而上有龜目其飾以金故謂之金罍與尊彛皆祭祀時用之彛則畫以雞鳥之形以盛秬鬯尊則畫以犧象之形以盛五齊而罍亦與尊同用彛罍通名為尊故陳氏祥道曰尊者彛為上罍為下又曰尊亦謂之彛彛亦謂之尊以為通名則罍固可通用於上下者也闕古用瓦其後貴者以金賤者以木以金者不必黃金凡五金中之可範者皆是也臧文仲謂大伐小取其所得以作彛器銘其功烈則銘功之器必不以瓦與木也而尊罍以金亦貴者之所宜用也若民間通用則或以瓦以木耳韓詩云天子以玉飾諸侯大夫皆以黃金飾士以梓此說未為非是云飾者飾之而已非言其質而以梓則其質矣但大夫而飾以金則與諸侯無别似或末世之僭禮耳然則文王之金罍其即諸侯之酒器歟其文或刻或畫皆無可考恐刻則但可施於木而不可施於瓦與金也故直以為畫焉其受或大或小各因所宜先儒謂罍實一石尊實五斗彛實三斗亦偏辭也金罍之外宜尚有大器如今釀酒之缶也或曰缶容二石云酌金罍者自大器而酌於金罍也酌兕觥者自金罍而酌於兕觥也行葦之四章曰酌以大斗孔氏曰勺五升徑六寸長三尺所謂大斗也此蓋從大器中挹之於尊用此勺耳其在尊中不當用如此之長勻也則酌於大器者用大勺酌於金罍者用小勺亦各有攸宜焉三章兕野牛一角重千斤觥爵屬以兕角為觥也韓詩說云一升曰爵二升曰觚三升曰觶四升曰角五升曰散然宗廟之祭尊者獻以爵卑者獻以散尊者舉觶卑者舉角則爵貴而其餘為賤自觚以下其字從角古者必皆以角為之而或以玉或以碧或以象或以木則漸因時而異制焉凡以角為之者皆以兕角謂之兕觥其受則觚以二升觶以三升角以四升散以五升各有差焉而皆謂之兕觥故兕觥不列於觚觶角散之中先儒論觥之所受或以為七升或以為五升則觚觶角散之外復設一觥將何為者邪今考古之為升者以十合合者前漢志所謂合籥為合也籥起於黃鍾之管中容千二百黍則合籥當容二千四百黍也戰國以後以千勺為合則加五倍非古法也古之升當今二合每爵受酒二合人亦能勝若至二升則四合矣五升四升五升雖善飲者莫能當之况七升乎竊意韓詩之說未可據以為定論也或又以為兕二角善觸故先王制罰爵以兕角而謂周禮有罰觥之事及觥不敬者謂其皆取諸此則亦鑿矣故以觥罰之猶言取觶立飲也豈必專以兕觥為罰爵哉且文王之酌兕觥非為罰也觥之用兕為其性之剛也與童羖相反焉芣苡一章芣苡本草云令人有子蓋車前强隂益精故也陸璣以為其子治産難則王雪山謂婦人服之下血非可治産難者蓋辨陸說之為非矣若本草之說則必當時已驗之方耳漢廣一章漢水源出陜西漢中府沔縣西嶓冡山隴西之地也始出曰漾水南合沔水東流為漢入湖廣鄖陽府界流經襄陽府東至漢陽府大别山入於江江水源出四川成都府茂州岷山又謂之汶山西南流經灌縣又東北流經重慶夔州府界入湖廣荆州府歸州出峽東流過常德府又北至武昌府合漢水於漢陽府之太别山東北至揚州入海武昌在江之東漢陽在江之西而漢水在漢陽之北江漢合流蓋在武昌漢陽之間武昌自漢唐以來為都㑹之地意江漢詩所謂江漢之滸四月詩所謂南國之紀者其治所或當在此歟三章駒以之子于歸而欲秣之則亦可乘矣如株林所謂乘我乘駒不必拘於二嵗也故集傳曰駒馬之小者二嵗曰駒之說蓋本周禮庾人鄭氏注而毛氏傳此詩乃謂六尺以上曰馬五尺以上曰駒則以大小為差耳考之庾人馬八尺以上為龍七尺以上為騋六尺以上為馬龍騋非民間所能有則以六尺者為馬不為無據但以五尺者為駒近乎臆說既以大小論則不得不為之别也汝墳一章汝水源出南陽府汝州天息山東流徑汝寧府義鳯陽府穎州入淮汝在豫州之域其下流入淮則南為揚州北為徐州之域文主時汝墳蓋指豫州之域者歟召南鵲巢一章鳩拙鳩也小序誤以為鳲鳩而毛傳因之謂為秸鞠即爾雅之鴶鵴也而諸家或以為布榖或以為戴勝皆鳲鳩之别名也歐陽氏則謂今之布榖戴勝與鳩絶異今人直謂之鳩其辨之審矣故鳩之拙者别一鳩耳不在左傳所謂鳲鳩雎鳩祝鳩爽鳩鶻鳩五鳩之內者也采蘩一章蘩白蒿也香美可蒸祭祀則以豆薦蒿菹陸農師曰蒿青而髙蘩白而繁白蒿葉粗於青蒿白於衆蒿故曰皤蒿可以為菹沼池之曲者也沚小渚也爾雅曰水中可居曰洲小洲曰渚小渚曰沚小沚曰坻二章澗山夾水也三章被髲髢次第髮長短為之故周禮追師謂之次即今假髮非編髮為之之假髻也夫人從祭之首飾本用副而以被言於祭者蓋副必臨祭時所加而在宫治葅醢以實籩豆之時則服居常見君之髲也詳見君子偕老字義草蟲一章草蟲竒音青色好在茅草中作聲或以阜螽蝗屬而即螽斯非也詳見七月字義草蟲阜螽皆似蝗生於草間者曰草蟲生於陵阜者曰阜螽草蟲鳴阜螽躍而從之故阜螽謂之蠜草蟲謂之負蠜形色不同種類亦異故以阜草别之歐陽氏以異種相合合所不當合而詩人引以為戒則過矣蓋物類相從其性如此故集傳但以為感時物之變也采蘋三章宗室大宗之廟室也諸侯之庶子為别子别子為大夫則立宗此大宗之始祖也其主設於室中西南隅之奧正當南牖之下故曰牖下齊與齊同其義為敬然亦根於齊一之齊本從羈反齊不齊而致其齊然後讀齊為齊則側皆反故齊為一而齊為敬也又有讀齊為粢盛之粢如小雅甫田所謂粢明者則精咨反各隨其義求之而已矣羔羊一章羔羊之皮者大夫以羔皮為裘故孔氏曰大夫之裘羔而已然毛氏謂小曰羔大曰羊並言之者分釋字義耳其實羊乃小大之通名羊之小者得稱羔羊也凡視朝之服用黑羔裘而以緇衣裼之上加朝服其服臣與君同但其别則君用純色而臣則飾以豹褎君之用純非不飾也色用純耳如隋虞世南凖禮圖裘以羔正黑者為之取同色繒以為領袖即用純之制也既退朝則諸大夫適治事之館釋朝服而以緇衣聼政言緇衣則為羔裘矣館乃所直之廬亦公所也及自公所而退食於家人猶見其服此羔裘以歸故即所見而稱之非以此為在家燕居之服也若私家燕居之服則為狐貉之厚以居如毛氏所謂大夫狐蒼裘者而羔裘不宜䙝用矣詳見唐風羔裘字義素絲者以素絲為線而合其縫也孔氏謂織素絲為組紃以英飾裘之縫中紃亦組之類素絲非線也錢氏因之遂謂兩皮之縫不易合故織白絲為紃施之連屬兩皮因以為飾此說似有不通蓋凡為裘必合衆皮其橫縫不在五紽之內者尚多豈能盡飾意必有裏以夾之若其外則毛深而縫不可見安得施紃邪織紃之說徒使人難曉耳紽縫之别名也曹氏謂一裘之功必合衆裘而成故其縫殺不一其言亦不分曉蓋裘雖合衆皮而成其縮縫則惟有五故以五為數不論皮之多寡也摽有梅一章摽本蔈落之義梅蔈落然後見其失時也華谷嚴氏訓與邶柏舟寤辟有摽之摽同則非矣梅木名似杏而酢騶虞一章毛傳云豕牝曰豝本爾雅釋獸文觀駟鐵詩云奉時辰牡則將為乾豆之具用牝者非也鄭箋云豕生三曰豵亦本釋獸文觀七月詩云言私其豵獻豜于公則豵本小獸之名以為豕生三者亦非也此詩先言豝後言豵亦必有差蓋葭叢髙而豝藏焉蓬叢低而豵藏焉則豝必大於豵以其體肥故謂之豝但大而有力或不及豜耳不然則田獵所射未必盡皆小獸而毛氏一嵗為豵之說鄭氏不得不異矣豵雖小獸亦豈必限以一嵗哉田獵得獸不論狼獐鹿豕雉兔而必以豕目豝豵則亦拘矣凡此類舊說多有附㑹但以經義推之可也發發矢也禮射每發四矢集傳若謂發四矢而得獸者五則獸多於矢意其間必有疊中者故以中必疊雙明之殊不知古人之射不以多殺為能車攻詩所謂不失其馳大庖不盈者是其法也若以中必疊雙為能則亦可以合圍掩群矣豈仁人之心乎蓋五豝五豵非舉得獸之數毛傳所謂虞人翼五豝以待公之發者是已翼驅也驅獸多則中密驅獸少則中疏今以五獸而當四矢則射疏難中明虞人之不欲多殺也君止一殺至大夫殺則止佐車取田獲三品而已騶虞毛氏以為義獸白虎獸文不食生物有至信之德則應之此本無據蓋附㑹之說也而漢之夸封禪陳祥瑞如司馬相如東方朔者從而和之其後陸璣陸農師解釋文義又祖而述之則若真有騶虞如毛氏所云者而不知其皆誣辭也縱使有之則野鳥為鸞之類豈可信其為真哉三代以前言靈物者但云麟鳯龜龍而騶虞不與焉則古無此獸可知矣歐陽氏曰漢世詩說四家毛最後當毛詩未出之前說者不以騶虞為獸也文帝時賈誼新書以騶為文王囿名亦不經見又曰書言騶虞者多矣如七騶六騶蓋馬御而澤虞山虞則山澤之官月令季秋教田獵命僕及七騶咸駕周官山澤虞皆當田獵致禽獸則騶虞二官田獵之時乃其職事也今按騶虞為騶所御之虞人也獵以虞為主觀易有即鹿無虞之戒可知矣以周禮考之君乘田車則以射獸也虞人乘佐車即驅逆之車則以從左驅獸而待射者也皆掌於田僕而御之者騶人也馭夫掌馭從車而趣馬掌駕說之頒以聼馭夫即其事也騶虞雖二官而虞人為騶所御則已當田獵驅獸之時主乎虞人而言矣詩人之意蓋謂茁壯葭蓬之中乃禽獸繁殖之所也一發四矢之間虞人僅翼五豝以待射不欲道人以多殺使其比而得獸真有若丘陵弗為之志非仁人而能若是乎故特詠其事以嘆美之而文王德盛化行仁義成俗於此亦可見焉詩說解頥字義卷一
