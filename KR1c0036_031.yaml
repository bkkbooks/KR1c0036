body:
  text: 詩説解頥正釋卷二十九明季本撰魯頌魯者諸侯之國也成王時封周公之子伯禽於魯在今兖州府曲阜縣實奄之故地也夫諸侯之國冝皆有頌蓋太師陳詩之時諸國雅頌必兼采之但以意在觀風故併入於風而雅頌亦於其中自有别焉魯以周公之後其國猶有聖人之風故臣子之頌其君者無有諛辭如泮水閟宫二篇可以見其實意而師摯為魯太師其序樂必有定次孔子以魯為宗國必親有考焉故特别以魯名見魯之可頌者如此也若周公之德亦宜頌於宗廟而今無之必亦散失矣其駉駜則似風而篡入者安得遂以魯為有頌無風哉詳見總論六義駉經旨曰此詩蓋美伯禽牧馬之盛也體亦似風要當與定之方中為一類耳小序謂僖公能遵伯禽之法儉以足用寬以度民務農重榖牧于坰野魯人尊之於是季孫行父請命于周而史克作是頌此以意為之説也黃東發嘗有辨矣夫僖公非賢君也考其始終棄義趨利報怨行私無所不有何善之足稱哉特以在齊桓時為其所庇故能不失聲聞耳詳見春秋私考僖公二年冬十月不雨下序乃盛稱其美此非虗譽邪至於請命于周而作頌之語則尤誕矣故謂此詩非伯禽不足以當之駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黃以車彭彭思無疆思馬斯臧賦也牡馬剛健而能致逺者言馬之牡而復係以駉蓋駉者逺之義也致逺惟牡馬能勝故特言之在坰之野鄭氏以為避民居與良田是也薄言駉者謂略自駉者而言之自駉之外尚多也驈皇驪黃言其色之多也彭彭馬之壯盛也以車者馬以之也以無疆之思而思及於馬此馬之所以善也駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾思無期思馬斯才賦也伾伾大而有力也才者善而有力也駉駉牡馬在坰之野薄言駉者有驒有駱有駵有雒以車繹繹思無斁思馬斯作賦也繹繹連屬之貌言馬之善走也作者強奮也駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車祛祛思無邪思馬斯徂賦也祛車之捷也徂往也言馬之能行也此詩之旨所重在思上三章思之無疆無期無斁皆緝熙不已之意而末則總而歸之於無邪正以見思之所以為思在於無邪而已蓋修德工夫莫要於此故孔子取以蔽三百篇之旨此非虗稱之辭蓋言伯禽之實德也蘇氏謂昔之為詩者未必知此孔子斷章取之非也孔子必以實德示人若假空言則不能感物矣駉四章章八句有駜經旨曰此詩亦美伯禽君臣相慶樂之辭蓋必伯禽時君臣和德相與故有此氣象魯他君不足以當之此與駉為一類亦風體也有駜有駜駜彼乘黃夙夜在公在公明明賦也振振鷺鷺于下興也鼓咽咽醉言舞于胥樂兮興意咽音淵下章並同駜馬肥強貌有駜卿大夫所乘之馬也乘黃四馬皆黃也公公所夙夜在公謂勤政也明明者無時而不明以起下章飲燕之不亂也鷺鳥名詳見宛丘字義此以鳥言集傳以為鷺羽非也鷺潔白之鳥鼓聲振動則或下或飛故謂之振鷺以興潔白之士因作樂之鼓聲而鼓舞於德也咽與淵同鼓聲之深長也言卿大夫乘此乘黃而夙夜在公以修明其政事故在公燕飲則皆醉酒飽德興起於善曰醉言舞則善心起而不知為之者矣是其君臣相忘而可以樂也有駜有駜駜彼乘牡夙夜在公在公飲酒賦也振振鷺鷺于飛興也鼓咽咽醉言歸于胥樂兮興意在公飲酒相導以和也明明在其中矣醉言歸止而不過之意有駜有駜駜彼乘駽夙夜在公在公載燕自今以始嵗其有君子有榖詒孫子于胥樂兮賦也載燕亦飲酒而相和也君子指其君有有年也榖善也君有和德則足以致豐年而垂世善此頌禱之辭也以和德為本此今日之樂所以鼓舞而不能自己者也見其樂之正而非淫矣有駜三章章九句泮水經旨曰此詩美伯禽之治惟於泮水講學而服逺之功皆本於此也舊説以為美僖公者誤矣思樂泮水薄采其芹魯侯戾止言觀其旗其旗筏筏鸞聲噦噦無小無大從公于邁賦也思發語辭泮詳見文王有聲字義樂泮水詩人言泮水之可樂也芹菜名説見采菽可為葅但味不如蓴之美以菜而生於泮水則尤潔地也故方欲采之以為豆實而魯侯適至也下二章藻茒亦然筏筏飛揚也噦噦聲有節而小也公即魯侯也無小大而皆從公以往於泮從之者衆而皆欲問學也此章言伯禽之始至學也思樂泮水薄采其藻魯侯戾止其馬蹻蹻其馬蹻蹻其音昭昭載色載笑匪怒伊教賦也藻説見采蘋蹻蹻舉足高貌昭昭謂魯侯之德音也蓋見其馬而知其為敷教來也色笑所謂即之溫也匪怒即色笑其教如此敷教以寬也此章言伯禽至泮而善誘循循也思樂泮水薄采其茒魯侯戾止在泮飲酒既飲旨酒永錫難老順彼長道屈此羣醜賦也茆鳬葵也與荇菜相似葉大如手赤圓而滑江南人謂之蓴菜者也魯侯講學泮宫每至必燕飲故魯人於其來每采芹藻茆以待之正為飲酒故也永錫難老蒙上文飲旨酒言願神錫之以難老之福使之順君子之長道以屈服魯國之群衆欲其久於敷教以致治安也穆穆魯侯敬明其德敬慎威儀維民之則允文允武昭假烈祖靡有不孝自求伊祜賦也伯禽為治專在學宫此周公之家法也穆穆即無聲無臭之意敬明其德敬慎威儀內外合一之學也維民之則即皇建其有極也允文允武亦自德言烈祖指文王也言魯侯之德具文武之實則與文王不二矣寧不有以昭格烈祖乎靡有不孝孝也自求伊祐一孝足以感神明而福自求之也詳此語意是何等學術功夫蓋非伯禽不足以當之此豈虗誇之辭而可以語僖公邪此言伯禽之能感格烈祖也明明魯侯克明其德既作泮宫淮夷攸服矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚賦也陶音姚明明即穆穆之著見也克明其德即敬明其德也惟敬明故克明矣當時為魯患者淮夷詳見江漢經旨下即費誓所謂淮夷徐戎並興也故特舉淮夷攸服言之馘謂截所獲者之左耳也詳見皇矣字義淑善也問訊囚也囚所虜獲者蓋古者出兵受成於學及其反也釋奠於學而以訊馘告即此事也獻馘獻囚俱指淮夷獻皆在泮可見魯侯常在泮聽政而受成告訊常在此也先王時諸侯為治類如此言淮夷之服以見講學之效也濟濟多士克廣德心桓桓于征狄彼東南蒸蒸皇皇不吳不揚不告于訩在泮獻功賦也狄他歷反此言將士以和德而成功也濟濟衆多齊一之貌多士則承命征淮夷之士即泮宫講學之人也克廣德心不以一毫私意自蔽所謂萬物一體也桓桓武貌狄與逖同逺也東南即淮夷也蒸蒸衆也皇皇大也吳喧譁也揚夸張也訩爭訟也不告于訩正多士廣德心之實言濟濟征夷之多士無一人不廣其德心者故其桓桓于征狄彼東南之逺雖蒸蒸然衆進皇皇然大張而皆以德自居無一喧譁夸張者泯其爭訟之私無辭以告于官惟在泮獻其成功而已德心何其克廣邪角弓其觩束矢其搜戎車孔慱徒御無斁既克淮夷孔淑不逆式固爾猶淮夷卒獲賦也觩弓曲貌搜矢疾聲慱大也徒徒行者也御御車者也無斁無有厭倦者謂競強也不逆言其順服無復作慝正孔淑也承上章言將士一心而人人競勸勇於用武故能克淮夷而甚善不逆也式固爾猶非致戒之辭此時淮夷已服矣蓋本伯禽之德能式固爾猶故終致淮夷之服如此申上文之意而歸德於伯禽之能固其謀也謀即訏謨定命之謀謂敷教泮宫使人知義也翩彼飛梟集于泮林食我桑黮懷我好音興也憬彼淮夷來獻其琛元龜象齒大賂南金興意黮與椹同此言淮夷來服也首四句有意義之興也蓋梟夲惡鳥攫鳥子而食者也詳見墓門字義今亦集泮林食我桑黮懷我好音可見講學之功格於禽鳥矣矧淮夷雖逆亦人類也其不憬然悔悟而貢獻其所有邪憬字就淮夷心之警省處言之琛寶也兼龜象言元龜大龜也千嵗滿尺二寸漢志云不盈尺不為寶荆揚貢金三品地在淮南故曰南金南金獨曰大賂賂遺也鄭氏謂賂君及卿大夫是也蓋其淮南之所有者故所遺者多也淮夷來獻且賂以見教化之能感人心其效如此按梟集泮林食桑黮而懷好音意當時必有此事故傳云桑黮甘甜鴟梟革響陸農師亦曰梟食桑黮則變而美其色好其音是知梟食桑黮則其音變而美也此言蓋有所本似非臆説矣泮水八章章八句閟宫經旨曰僖公命奚斯新作周公之廟而詩人樂周公之德欲僖公之善繼也故美其事而願其夀考焉以此祝頌僖公蓋志在周公也可謂得性情之正矣此詩孟子謂之魯頌是當時夲以頌名也閟宫有侐實實枚枚赫赫薑嫄其德不回上帝是依無災無害彌月不遲是生后稷降之百福黍稷重穋稙稚菽麥奄有下國俾民稼穡有稷有黍有稻有秬奄有下土纘禹之緒賦也閟宫周公廟也以其宫深密故謂之閟侐靜也正閟字意實實言其根基之完固也枚枚言其條件之分明也此先題作廟之盡善以見僖公崇重周公之意也次述薑嫄生后稷之由以推本周公相武王功業之所始也薑嫄生后稷事見生民降之百福者欲以開周也黍稷重穋稙稚菽麥諸榖名詳見七月字義此言后稷能知榖性有相之道而堯以其有功於民故封於邰使之奄有下國也后稷教民稼穡誕降嘉種而俾民有稷黍稻秬則天下人心無彼疆此界莫不歸之所謂奄有下土也纘繼也平水土者禹之緒也稷降播種所以繼之此申奄有下國之意蓋天之生民安之必欲養之平水土則既安矣非播種何以養乎此禹稷之功所以為大而百福之所以歸也周家功業蓋已發端於此矣黍稷稻秬與生民嘉種不同互有詳略耳后稷之孫實維大王居岐之陽實始翦商至于文武纘大王之緒致天之屆于牧之野無二無虞上帝臨女敦商之旅克咸厥功王曰叔父建爾元子俾侯于魯大啓爾宇為周室輔賦也大王遷岐肇基王迹而商之人心日漸歸周如翦之也故曰翦商非謂其有翦商之志也至文武克纘其緒則積功纍仁矣屇至也謂人心皆欲伐商是天命之已至也武王因天命之至而師於牧野所以致之也順人心以伐商不敢二之而有所疑慮惟以天命為可畏也此與大明上帝臨女無二爾心義同敦如敦琢之敦故訓曰治之治商猶言正商也旅者合將士之衆而言見其以一心而成功蓋為周公有大功發也故成王告以欲封其元子之意焉元子指伯禽啓開宇居也此推周公之功以起下章廟祀之意乃命魯公俾侯于東鍚之山川土田附庸周公之孫莊公之子龍旗承祀六轡耳耳春秋匪解享祀不忒皇皇后帝皇祖后稷享以騂犧是饗是宜降福既多周公皇祖亦其福女賦也上章言俾侯于魯告周公之言此言俾侯于東則實命伯禽矣附庸小國不能五十里而附於魯者周公之孫莊公之子則為僖公無疑龍旗者交龍之旗諸侯建於車上者謂乘此車以出承祀於周公廟也耳耳轡垂貌享獻也春秋匪解享祀不忒四時之廟祭錯舉二時也忒差也宗廟合禮之祭何差之有祭皇皇后帝而以后稷配郊祀也饗歆其祭也宜以其祭為冝也是饗是宜降福既多郊神格而降福也周公皇祖稱周公為皇祖非指群公也福女謂廟格之福也大意以祭周公為重當時魯之郊祀非禮天必不饗故先言龍旗承祀而不懈於春秋之祀者為不忒以見周公之廟為所當祭也至於郊后帝而配以后稷用騂犧之享恐天惡其禮之忒而不以為冝也則必無福故言天亦降福以見未厭魯德之意今天既以魯郊為冝而饗之則周公又安得而不畀之福哉即郊以起廟此詩人之微辭也按成王賜魯以天子禮樂者特使之用於周公之廟耳必無命魯郊天之理蓋魯自僭之此章言魯得祀周公而有致饗之道也秋而載嘗夏而福衡白牡騂剛犧尊將將毛炮胾羹籩豆大房萬舞洋洋孝孫有慶俾爾熾而昌俾爾壽而臧保彼東方魯邦是常不虧不崩不震不騰三夀作朋如岡如陵賦也周正之秋始於午中盡於酉中則在酉中之前即夏正秋嘗之日也此亦主祭於周公之廟而言楅衡止觸恐壞其角也周禮封人惟牛牲言設楅衡於羊牲不言也竊意牛羊皆有角則冝並設楅衡矣白牡與騂剛並言則白牡謂羊騂剛謂牛蓋指太牢之二公羊傳附為周公用白牡魯公用騂剛之説此求其説而不得又從而為之辭也犧尊畫牛於尊腹也將將大也毛炮周禮封人祭祀有毛炮之豚注云爓去其毛而炮之也胾切肉也羹大羹鉶羹也大羹太古之羹湆煮肉汁不和盛之以登貴其質也鉶羹肉汁之有菜和者也盛之鉶器故曰鉶羹大房半體之爼足下有跗如堂房也籩豆大房之下當脫一句如鼓鐘喤喤之類故集傳定此章為十七句夫牲具大牢酒用犧尊毛炮胾羹之品籩豆大房之器言其禮之備也鐘鼓喤喤之聲萬舞洋洋之舞言其樂之和也禮備樂和而孝孫有慶謂僖公祭周公盡禮而獲福也熾盛也昌者熾之逹也臧者壽之善也昌熾以福言夀臧以壽言國人以其能感格周公故祝頌之而欲天假之福夀使得以永守周公家法而大魯國焉三壽三卿也曰三夀者謂人君表正百官使之敏德而可久居其位則三卿皆老成之人故以夀言耳以之為朋則典刑不失國如岡陵之固而不至虧崩震騰魯國之常長可保矣非以岡陵祝三卿之夀也自俾爾熾昌以下皆頌禱之辭俾爾云者願天之使之也公車千乘朱英緑縢二矛重弓公徒三萬貝胄朱綅蒸徒增增戎狄是膺荆舒是懲則莫我敢承俾爾昌而熾俾爾夀而富黃髮台背夀胥與試俾爾昌而大俾爾耆而艾萬有千嵗眉夀無有害賦也大國之賦十井出車一乘諸侯方百里提封萬井共得千乘故曰公車千乘每乘三十人千乘共得三萬人故曰公徒三萬舊説以為方十里出車一乘每乘七十五人者非也詳辨於讀禮疑圖卷三增增衆也戎狄不止西戎北狄蓋蠻夷之通稱而徐戎淮夷皆在其中矣膺服膺不忘懲警戒不忽也此二句夲周公言周公留心於戎狄荆舒故孟子兩引之皆歸於周公非以此頌僖公也承繼也即孟子以承三聖之承言人莫有如我之敢承周公者若曰惟魯能承之耳蓋魯國車徒之盛足以壯國威而承祖志故國人願其夀考也富年之盛也本夀而言黃髮老人髮白而更黃也台背説見行葦亦祝君夀之辭夀胥與試蘇氏謂願其壽而相與試才力以為用者得之大亦本昌而言即熾之所逹也耆者年老之稱艾歷也謂更歷無窮也疾苦則能害夀無害所以萬有千嵗也此反覆祝之以求夀考欲其長禦外患以安魯也僖公之時椘人暴橫淮夷徐戎強盛而僖公僅從齊桓公伐楚及桓公沒而魯遂與楚通至於淮夷徐戎略不加意賴周公餘澤而得少安故詩人因其新周公之廟而以周公之功望之泰山巖巖魯邦所詹奄有龜蒙遂荒大東至于海邦淮夷來同莫不率從魯侯之功賦也詹與瞻同望也泰山非魯夲封內地後世兼併以為望耳故曰詹奄大也龜蒙則魯封內二山也奄有者本其所固有而言也荒者開拓而大之之意大東極東近海之地也極東之海邦如萊牟之類是也萊牟與淮夷相近萊牟服則淮夷同而諸夷莫不率從矣曰荒曰同曰從皆謂以德綏之而得其歸心如大王文王之得人心也保有鳬繹遂荒徐宅至于海邦淮夷蠻貊及彼南夷莫不率從莫敢不諾魯侯是若賦也鳬繹亦魯封內二山名保有者保其所本有也徐宅謂宅於徐州之地者也徐宅之海邦如郯莒之類是也蠻貊如徐州之戎衛北之狄是也南夷如荆楚是也僖公時戎狄荆楚皆為中國患及從齊桓霸令修政交鄰故郯莒服而淮夷無不服矣淮夷服而蠻貊南夷莫敢不諾矣即上章淮夷來同莫不率從之意也若順也謂順魯侯之德也淮夷在魯東境素號崛強而東南往來之要衝也故所重在淮夷而特舉以為言此兩章蓋因前章戎狄是膺荆舒是懲則莫我敢承之言而終其意也天錫公純嘏眉壽保魯居常與許復周公之宇魯侯燕喜令妻夀母宜大夫庶士邦國是有既多受祉黃髮兒齒賦也前章纍言俾爾熾昌夀臧富大耆艾諸福之備是天所錫之全福也祭時所嘏之福不外乎此故曰純嘏非謂郊天錫嘏之辭也保魯即前章奄有龜蒙保有鳬繹之意常與嘗同近薛之邑許近鄭之田考之春秋僖公時無復常許之事蓋必常易薛地在春秋之前許易鄭祊在春秋之初久猶未復故詩人以此望僖公歟謂欲服四夷當自保魯國始而周公之故地不可不復也魯侯燕喜者本其有德而安於所喜言也妻指聲薑母指成風令妻者令其妻使之順從也夀母者夀其母使之安樂也宜大夫庶士者宜其群臣使之恪恭也此修身以刑其妻以悅其親以正其臣之序言欲保魯國又當自此始也邦國是有正謂保魯也保魯而至海邦以及於夷狄是多受祉也故又願其黃髮兒齒享夀無窮以永終魯國之治焉兒齒齒落而更生細者亦夀徴也此詩所以頌僖公者欲其正身以正家正家以正朝廷正朝廷以正邦國正邦國以正四夷乃為多福而皆歸於夀蓋非夀無以致成功不可以為福也徂來之松新甫之柏是斷是度是尋是尺松桷有舄路寢孔碩新廟奕奕奚斯所作孔曼且碩萬民是若賦也徂徠新甫二山名斷斬之也度量之也八尺曰尋桷榱也椽方曰桷舄方貌新廟即周公之廟以其更新故謂之新廟奕奕上下相承之意作者營治其事也奚斯必以周公為重而營作盡心故特以作廟之功歸之曼長也且碩即寢廟孔碩也連奕奕言之則曰曼耳萬民是若順萬民之心也蓋周公德澤及於天下萬民莫不被其澤而欲其廟貌之新者見僖公之興此役非妄勞民力也故春秋之中凡用民力於所不當為必書而獨不録閟宫之作則謂此為當作不以為勞民耳閟宫九章五章章十七句二章章八句二章章十句此集傳所分章也舊説以后稷之孫至克咸厥功十二句為一章以王曰叔父至如岡如陵三十八句為一章集傳則自后稷之孫至為周室輔十七句為一章自乃命魯公至亦其福女十七句為一章自秋而載嘗至如岡如陵十六句為一章謂籩豆大房之下當脫一句如鼓鐘喤喤之類均之為十七句且王曰叔父及魯宇輔皆與女旅叶韻於義為長詩説解頤正釋卷二十九
