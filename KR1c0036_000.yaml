body:
  text: 詩說解頤詩類提要臣等謹案詩說解頤四十卷明季本撰本字明德號彭山㑹稽人𢎞治丁丑進士官至長沙府知府本師事王守仁著書數百萬言皆發其師說是書其一也凡為總論二卷正釋三十卷字義八卷大抵多出新意不肯剽襲前人而徴引該洽足以自申其所見凡書中改定舊說者必反復援據務明著其所以然如以南山篇之必告父母句為魯桓告父母之廟九罭篇之公歸不復句謂以鴻北向則不復為興下泉篇之郇伯為指郇之繼封者而言皇父卿士章謂以寵任為先後故崇卑不嫌雜陳頍辨篇之無幾相見句為兄弟甥舅自相謂如斯之類皆足於集傳之外備說詩之一解欽定詩經傳說彚纂亦頗引用之雖間傷穿鑿而義多徴實究非王學末流以空談求勝者比也明洪武中大學士朱善作詩解頤四卷名與本此書相同然推陳出新則本此書較善多心得焉乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀序詩遭秦火全經不存世儒收拾於煨燼之餘綴為三百五篇之數非古經也春秋諸大夫所賦之詩如野有蔓草之類所謂亂世之音也此乃孔子未正樂之前流於民俗習而不知正其在所刪者班固乃謂詩三百五篇遭秦火而全者以其諷誦不獨在竹帛故也失經意甚矣詩之失傳大抵如此漢初言詩者齊魯韓毛四家而毛氏之傳自謂出於子夏著之為傳始露萌芽至於鄭𤣥力主毛說而為箋以發其意於是毛詩行而三家之說廢矣自兹迄宋莫不宗毛小序之言據為定案謂學詩而不求序猶入室而不由户也故雖大儒如程子嘗以已見發眀其意而亦不以其說為非則若其傳真出於子夏者矣惟鄭夾漈作辨妄以詆小序而朱子取之亦為辨說一洗序說之陋而又為集傳以詳解之可謂有功於詩學矣特其所見猶泥舊聞而詩之大意不䏻超然悉㑹於言表則反有以起人復尋毛舊如東萊吕氏之讀詩記者矣夫東萊朱子之同志也而猶不䏻信從則何以俟聖人於百世哉隋王通以諸侯不貢詩天子不采風樂官不達雅國史不眀變而作續詩是經尚可續而况於傳乎張子曰置心平易然後可以言詩涵泳從容則忽不自知其解頥矣此說詩者以意逆志之宗㫖而詩傳之所以可續也苟得其意而於詩學少補分毫則其為說雖朱子亦當謂其䏻繼志矣庶幾一解頥焉自漢匡衡傳載匡說詩解人頥之語而宋范處義國朝朱善皆以解頥名詩說則解頥者釋經舊名也今愚亦以是名書其名同其義不相襲也蓋於舊說多所破之而一以經文為主書有總論二卷以提其綱正釋三十卷則說正經者也别為字義八卷附於其後以補正說之所未備而性情之本名物之詳一覽可盡矣嘉靖丁巳嵗三月既望紹興彭山季本書詩說解頥總論引豫輯詩說解頥有正釋三十卷字義八卷比諸家舊說為詳然一以經文為主而於舊說多所破之覽者或未䏻悉逹故述總論二卷以冠其端知總論然後知作詩之本義而考見得失由是而讀全經則條理分眀可以得其指意之所在而凡與先儒之說有不合者可以照徹而無疑矣故總論者讀詩之要訣也今特摘出以便觀云嘉靖壬戌嵗冬十月晦日七十八翁彭山季本識於東郭書齊
