body:
  text: 詩說解頥正釋卷二十四明季夲撰生民經㫖曰此詩詳述天生后稷起養民之功以見周家配天之業自后稷始蓋亦周公作此以戒成王也故為大雅若以為尊后稷配天而作歌於郊祀之時則郊以祭天以天為重然而詩述后稷甚悉殊無祭天之文卒章雖有上帝居歆一語不過為后稷肇祀以來能饗帝而發耳則用於郊祀之說不可通也若以為郊祀之後亦有祝釐頒胙之禮則飲福之時所重在天錫嘏而其辭亦宜簡嚴今觀文義亦非飲福所宜用則此詩之作何從而得其夲意邪厥初生民時維姜嫄生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷賦也民謂周人也姜姓嫄名古無諡號故以名行姜嫄炎帝後有邰氏之女史記以為帝嚳髙辛之元妃鄭氏以為高辛氏之世妃皆非也歐陽氏固辨之矣但謂其以帝武敏為上帝大足拇而姜嫄履之歆然感娠以生后稷為怪妄之說則不知天地之生人蓋有氣化者而亦何必疑哉蓋姜嫄必女而未婦者也詳見廟制考義賢賢條下其曰克禋克祀者天子於𤣥鳥至之日郊媒蓋亦祭天而以先媒配也姜嫄為女在邰非嚳都也安得與祭郊禖哉意者侯國亦必有配媒之祭但不若郊耳當祭之日其國中女子必皆齊戒致敬故以克言也弗與祓同祓除也姜嫄必有聖德而能致敬故天降之祥而示之以感動之幾大人迹拇即其祥也姜嫄履之歆然驚動於心而化生之氣即此有感矣如草木之捭然因雷震而萌生者蓋皆如此非必夫妻交媾而真有人道之感也歆字當屬上句介助也攸介謂天之所助也攸止謂所助者止於其身也震娠也謂懷孕而動也夙謂豫居側室也生氣之活也育如易婦孕不育之育生而有氣則曰生孕而能生則曰育時是也后稷堯時司農之官名棄此章言天生后稷之神異也誕彌厥月先生如達不坼不副無菑無害以赫厥靈上帝不寧不康禋祀居然生子賦也誕發語辭彌終也終十月也先生者首生也達小羊羊子易生無留難也凡人首生者最難産而如逹之易不苦其難則其神靈之赫也有所割裂曰坼有所襯貼曰副疾痛苦之曰菑禍患侵之曰害不寧寧也不康康也康禋祀謂姜嫄因禋祀致敬而生子之易是即天所饗也居然安然也此章言姜嫄生子之易以見其為天所福也誕置之隘巷牛羊腓字之誕置之平林㑹伐平林誕置之寒氷鳥覆翼之鳥乃去矣后稷􅈱矣實覃實訏厥聲載路賦也置與置同隘巷巷狹小而非人所通行處也蓋人所不見則牛羊出入必致踐履而死而牛羊乃以腓字之腓足肚隨足而動者字愛謂牛羊舉足而避有字愛之意也平林亦人所不見而禽鳥之所往來也置之於此意其必致攫食㑹值也值人伐平林之木則不得置故又置之寒氷寒氷距𤣥鳥至日禋祀始孕正當十月而生之時也置寒氷不死而鳥又以翼覆之􅈱啼聲也覃長訏大載則也言其聲之長大聞於路也屢欲棄置而不可得見天之必欲生后稷也夫姜嫄因履巨迹生子固自以為異但以其無夫則父母亦無以自明又恐其為人妖長必生禍則以棄之隘巷棄之平林棄之寒氷故名之曰棄設使姜嫄夲果有夫則雖感於天而生子是因禱而生也古今夫婦生子如此類者蓋多有之有何可異人亦何疑而忍以嬰孩棄之乎惟其生子而棄是以知姜嫄為女而未嫁也否則周人序生民之始何以但言姜嫄而不及其夫乎此事理之甚明者也而諸儒紛紛之說亦可以無辨矣誕實匍匐克岐克嶷以就口食蓻之荏菽荏菽斾斾禾役穟穟麻麥幪幪瓜瓞唪唪賦也匍匐手行伏地也岐嶷立而竦峻之貌言鳥去聲呱之時尚以手伏地而行即已能立而就口食以自養此后稷之所以異於人也集傳以為六七嵗時則岐嶷承匍匐之下其就口食當已屬於匍匐時矣不然則鳥去聲􅈱之後何以得生乎荏菽大豆也斾斾如斾之揚起也役列也穟穗通穟穟禾多穗也幪幪茂密也唪唪多實也荏菽禾麻麥詳見七月字義瓜瓞見綿后稷所就之食即五榖也知其可食其後即以此藝之而荏菽麻麥之類遂成嘉種矣蓋至其童時逰戲而已如此見其種植之異出於天性也按閟宫言后稷之黍稷重穋稙稚菽麥於奄有下國之前則亦未即有邰家室時事也而詳略異者各從文便耳誕后稷之穡有相之道茀厥豐草種之黃茂實方實苞實種實褎實發實秀實堅實好實穎實栗即有邰家室賦也種實之種上聲後凡種類之種並同惟種之則去聲相謂輔相化育之功凡人力之所自盡者張子謂他人之穡則任其自然惟后稷則盡人力之助有相之道焉是也茀草盛之名因草盛而治去之故茀即為治也種之謂布之也黃茂種之茂而至於黃者以嘉榖言即黍稷禾麻菽麥之類也去豐草而種之必使黃茂見其有相之道也方苞言其種之漬也種褎言其芽之生也發秀言其苖之榮也堅好言其榖之成也頴栗言其榖之盛也堯以稷善蓻五榖有代天之功故舉為農師邰國名后稷之母家也即邰家室而封為諸侯可見稷夲民家之子依母以居故就其家室所在之地而封之為諸侯也誕降嘉種維秬維秠維穈維芑恆之秬秠是穫是畝恆之穈芑是任是負以歸肇祀賦也降種者播種於民也即書所謂稷降播種孟子所謂后稷教民稼穡者也秬秠黍也糜芑粱粟也亦黍類詳見七月字義五榖之中黍為尤美可為酒食以供祭祀故特舉而言之恆常也言他榖有時而可闕惟此四榖則當遍殖嵗以為常也觀閟宫俾民稼穡之中有稷稻則他榖固亦教民殖矣穫收也畝在田也任肩任也背背負也既成則穫而棲之於畝任負而歸以供祭祀也秬秠言穫畝穈芑言任負互文耳肇始也祀謂內外百神之祀也后稷有國得主羣祀而教民稼穡因制祭祀之禮以教民孝敬此正陳常于時夏之事也夫祭祀之禮雖上古有之然當其初明水大羹薦血蠢豚而已為饎之禮未備也至是既有嘉榖則為酒食而牲殽則加燔灸禮於是大成焉此蓋自后稷始故云肇祀言其起事神之禮也誕我祀如何或㫪或揄或簸或蹂釋之叟叟蒸之浮浮載謀載惟取蕭祭脂取羝以軷載燔載烈以興嗣嵗賦也㫪搗也揄抒米以出臼也簸揚去糠也蹂與揉同淘米而以手揉之也釋淅也瀝米去水也叟叟水瀝聲浮浮蒸米氣也此以所種之嘉榖為酒食也如此則饎具而可以祭矣謀者圖之審也以戒備言惟者思之專也以潔誠言蕭蒿也脂者所殺牲之膟膋也宗廟之祭取蕭合脂以爇之而求神於陽故曰祭脂即郊特牲焫蕭合羶薌臭陽逹墻屋之事也羝牡羊軷毛氏以為道祭即鄭氏所謂七祀行神也冬月隂往陽來故有此祭祭在廟門之外見月令注非必有逺行而始軷祭也故內言宗廟外言軷祭而一嵗羣神之祀兼舉於其中矣烈即炙也燔炙兼宗廟軷祭而言蓋廟與軷皆有尸所以為尸羞也興嗣嵗者謂興起祀事使嵗嵗嗣行庶知所重在此也此章詳言后稷祭祀之事以終上章肇祀之意祭脂詳見廟制考義末篇廟禮考成軷詳見泉水字義卬盛于豆于豆于登其香始升上帝居歆胡臭亶時后稷肇祀庶無罪悔以迄于今賦也卬我也葅醢盛之於木豆大羹盛之於瓦登器用陶匏大羹不和言禮至簡也始初也居安也鬼神食氣曰歆謂周王祭天香氣初升不待久而神即安然受饗也此豈以馨香之誠得時哉正為祭祀之禮后稷所肇後人世世守之皆能盡其誠敬而無罪悔以至于今故能致天神之格也此可見周家配天之功全在后稷始而后稷又夲姜嫄感天而生後王其可不知所自哉生民八章四章章十句四章章八句生民之詩叙后稷之事也凡詠先祖之事者意其皆以告成王也如公劉叙公劉之事也綿叙大王之事也文王叙文王之事也而皇矣則總序大王王季文王之事也大明則總叙王季文王武王之事也其餘詠文武事者尚多蓋皆以陳於成王而當時周公輔相日久意多出其手歟行葦經㫖曰此武王燕同姓兄弟立異姓為賔因行射禮而乞言之詩也文王世子有云公與族人燕則異姓為賔膳宰為主人公與父兄齒據此禮則天子可推矣陳氏祥道謂先王之於同姓有時燕焉有因祭而燕焉因祭而燕者謂燕毛也此則祭畢賔歸如楚茨之燕不及異姓也若時燕則特設以合好故宜立賔行射禮以為樂有賔則宜以君為主而膳宰但可以攝主事而已若遂以為主則與曽孫為主之文不合矣集傳以此為祭畢而燕則其禮恐不必立賔而亦奚以射為哉故燕而有射時燕也王肅所謂燕射也敦彼行葦牛羊勿踐履方苞方體維葉泥泥興也戚戚兄弟莫逺具爾或肆之筵或授之几興意敦厚也行葦道上之葦也牛羊勿踐履者喻兄弟相親而不可為賤物所傷也根之盤結曰苞體幹也泥泥潤澤貌戚戚內相親也具邇即莫逺也肆陳也筵鋪陳也詳見下章字義几所以憑而尊者憑之以為安也鄭氏謂年稚者為設筵而老者加之以几是也言厚聚之行葦勿使牛羊踐履則根夲固而泥泥然有生意之潤澤矣戚戚之兄弟宜乎不相逺而相邇也我之肆筵授几正欲兄弟之相親耳言兄弟則諸父在其中矣肆筵設席授几有緝御或獻或酢洗爵奠斚醓醢以薦或燔或炙嘉殽脾臄或歌或咢賦也古者席地而坐故在下為鋪陳在上為席也緝續侍御言侍者相代不乏使也進酒於客曰獻客答之曰酢主人洗爵酬客客受而奠之不舉也楚茨言獻酬而不言酢此言獻酢而不言酬皆從略耳斚殷爵也周時亦通用之醓醢之多汁者燔用肉灸用肝臄口上肉也歌者比於琴瑟也徒擊鼓曰咢即靈臺奏公之鼉鼓也此章言燕禮之盛備所以欲其相親也敦弓既堅四鍭既鈞舍矢既均序賔以賢敦弓既句既挾四鍭四鍭如樹序賔以不侮賦也句音勾敦與雕通畫也序賔者同宗無相為賔客之道故為之立賔也賢者射以多中為賢也不侮者不以中病不中者也燕而繼之以射燕射也既燕而射以觀德則所以立親親之夲者在是矣曽孫為主酒醴維醹酌以大斗以祈黃耇黃耇台背以引以翼壽考維祺以介景福賦也曽孫武王也燕同姓故稱曽孫以其為宗子也宗子而謙以孫稱非必主祭而後言曽孫也醴說見吉日醹醇厚也大斗勺也容五升詳見卷耳字義黃耇說見南山有臺台鮐魚也大老則背有鮐文祈黃耇者乞言也黃耇台背之人而以善道引導輔翼其君景福之所係也故願其壽考維祺以長助君之景福也祺吉也引翼之而使其君成德即是介景福也此章言乞言助福之事可以見古之燕禮皆有益於德矣行葦四章章八句既醉經㫖曰此必同姓之臣答祭畢而燕之詩非答行葦也既醉以酒既飽以德君子萬年介爾景福賦也德即已之明德也謂之飽德者承上醉酒而言王者以酒娛我非徒以養口體蓋所以感動其良心而使此德充滿盈溢孟子所謂飽乎仁義是也君子指王也言君子之恩惠如此願其享年久而得福多我之所助者惟此而已既醉以酒爾殽既將君子萬年介爾昭明賦也殽俎實也將進也昭明以德言有德然後為景福也此申上章之意昭明有融髙朗令終令終有俶公尸嘉告賦也融融化言德之渾然無迹也朗虛明也明德無迹斯髙朗矣德既髙朗則愈久愈盛而以善終矣俶始也德之所始在幾能於一念幾微之際而謹之則天理不差德日髙朗而有此令終也集傳以考終命為令終恐非臣子所以祝君也有俶之言最為切要非知德者其能以此望其君哉公尸以先公言也周稱王而尸但曰公尸蓋因其舊如秦稱皇帝而其男女猶稱公子公主也嘉告者謂神之所嘏以善也此章言盛德足以格神之意其告維何籩豆靜嘉朋友攸攝攝以威儀賦也籩豆靜嘉言其禮物之修也朋友謂助祭之人攝謂助祭者皆檢束而能敬也威儀以君德足以為法者言言公尸所以嘉告者以其禮物之潔修而助祭者皆則效君之威儀以相檢束而備物致敬能當神意故足以格神而嘏之福也威儀孔時君子有孝子孝子不匱永錫爾類賦也上章言祭祀致敬皆夲於君之威儀故遂言君之威儀曲盡而動容周旋無不中禮則事事合宜而孔時矣如此則能修身而化及其子使之成德而繼緒無窮其子孫亦能致孝不匱錫於世類也所謂不匱錫類者如此其類維何室家之壼君子萬年永錫祚𦙍賦也此推言其錫類之由也壼宫中之巷由內出外之路祚福也𦙍嗣謂子孫也室家而曰壼蓋始於閨門之意謂修身以刑寡妻則威儀無不時矣故為之子者皆有所取法以為孝子而祚𦙍逺矣𦙍賢即福祚也然則君子欲求祚𦙍其必自刑寡妻始其𦙍維何天被爾祿君子萬年景命有僕賦也被覆被也爾祿即祚𦙍也僕僕僕然煩急不已之意此言天以祚𦙍之福被於君身而使之其來無窮也其僕維何釐爾女士釐爾女士從以孫子賦也釐豫也女士猶言女丈夫也以其能無違夫子之教則賢妻也以女士釐之而又繼以子孫之賢者與之則君子之有孝子為無窮也景命豈不僕哉此詩稱願之意主於修德故因威儀而推言之謹威儀端身教則刑寡妻乃其有俶處也如此自有孝子而祚𦙍不替矣臣子愛君而願之孰大於此既醉八章章四句鳬鷖經㫖曰宗廟之祭有尸既祭之明日暖其祭食以燕為尸之人所謂繹也故作此詩以為樂歌集傳得之鳬鷖在涇公尸來燕來寧爾酒既清爾殽既馨公尸燕飲福祿來成賦也鳬野鴨也一名鶩青色卑腳短喙鷖鷗也皆水鳥之忘機者涇水入渭渭在鎬京北羣舟雜聚之處涇未入渭之時其上流幽靜而鳬鷖在焉猶公尸無計較之心而在幽靜之地故以為况爾指主人鳬鷖在沙公尸來燕來宜爾酒既多爾殽既嘉公尸燕飲福祿來為賦也沙水旁也為猶助也鳬鷖在渚公尸來燕來處爾酒既湑爾殽伊脯公尸燕飲福祿來下賦也湑以茅泲之而去其糟也脯乾脯也鳬鷖在潨公尸來燕來宗既燕于宗福祿攸降公尸燕飲福祿來崇賦也潨水所㑹也來崇來居尊位也于宗之宗義同鳬鷖在亹公尸來止熏熏㫖酒欣欣燔炙芬芬公尸燕飲無有後艱賦也亹兩山夾水如門之中也熏熏和悅也欣欣意相得也芬芬香也鳬鷖五章章六句假樂經㫖曰古序以為美成王今亦無可考正但以顯顯令德稱周王苟非武王則惟成王庶可當之姑從序說集傳以為公尸答鳬鷖則鑿矣假樂君子顯顯令德宜民宜人受祿于天保右命之自天申之干祿百福子孫千億賦也假音嘉右音祐假中庸左傳皆作嘉嘉樂德美而和樂也君子指成王也顯顯令德德盛而顯著也宜民猶言能安民也宜人猶言能知人也德足以宜民人故受祿于天而為天所保右也保右即是命命之不已所謂申也干祿百福夲上文令德受祿而言是以德干之也與干祿豈弟意同否則有意於求福豈能致百福哉子孫千億謂其後世子孫衆多而傳之無窮也此即自天申之之意穆穆皇皇宜君宜王不愆不忘率由舊章威儀抑抑德音秩秩無怨無惡率由羣匹賦也穆穆敬之存皇皇美之著皆言天子之德自國中所主宰而言則曰君自天下所歸往而言則曰王其實一人之通稱也舊章先王心法之彰著者非徒典章法度之陳迹也自古帝王相傳惟有一心法耳威儀抑抑謂行不肆也德音秩秩謂言有倫也無怨惡謂坦懷而不與為讎也羣匹謂羣臣之志同道合者循而用之與率由舊章相對率舊章則法祖矣率羣匹則尊賢矣此德之所以能受祿也受福無疆四方之綱之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸墍賦也解音懈後凡懈怠之解並同受福無疆則及於子孫矣然所以受福無疆者惟在於為四方之綱也綱舉則紀必隨天下治平輔治之朋友亦賴以安矣百辟以諸侯言卿士以諸卿言即朋友也媚愛解怠塈息也言朋友所以安者皆媚愛天子而不怠於其職此民之所以息也民得所息則朋友安矣皆係於君德之能綱四方也然則人君之治可傳於永久而為無窮之福者豈不以令德為之夲哉假樂三章章八句朱子夲毛氏定以四章章六句嚴華谷依陳氏則分為六章章四句今更定之如左公劉經㫖曰舊說據小序謂召康公以成王將蒞政當戒以民事故詠公劉之事以告之也辨說則謂未見其為召公之作蓋亦有疑矣今觀詩意皆陳公劉遷豳之事而略不及文武繼緒之言又文辭竒古與文王大明諸篇體製不同則似豳人夲有此詩以詠公劉如七月亦豳人自述豳風而周公舉以告成王後人遂謂周公所作則公劉之詩得無周公亦舉以告成王者歟成王蒞政之初為相者周公也而謂召康公以成王將蒞政而戒之亦臆說耳故竊嘗意此詩當屬於豳風云篤公劉匪居匪康乃埸乃疆乃積乃倉乃裹餱糧于橐于囊思輯用光弓矢斯張干戈戚揚爰方啓行賦也篤以愛民之厚德言公者侯國尊君之通稱如大王之稱古公也劉名商以前無諱禮亦如古公之稱亶父也並詳見綿字義康寧也埸小田塍也疆大田界也積露積也倉屋藏也餱乾食也糧食米也橐無底而小可以盛乾餱囊有底而大可以盛糧米思念輯和光大戚斧揚鉞也鉞大而斧小方始也此述公劉自戎翟間遷豳之始事也公劉初在不窋故地不敢寧居而治田疇實倉廪以使民富既富而後遷豳也行者裹糧至此而其故居之不能盡遷者亦必有處焉非併其倉積之地棄之而來也觀思輯用光之言則知其志在安和百姓而界於戎翟之居非所以光大國家矣弓矢干戈戚揚之器具整飾而行欲使翟人知有備而畏威也然此惟以自衛而已而公劉之心所重則在於足食食足而得人則兵自足也篤公劉于胥斯原既庶既繁既順乃宣而無永嘆陟則在巘復降在原何以舟之維玉及瑶鞸琫容刀賦也胥相與同來而至於此原也庶衆繁多謂從遷者衆也順者不拂其情也宣者能通其志也君之於民順其欲通其志則民之所好好之民之所惡惡之所以來者即安而無懷土之思故無永嘆也陟升也巘山頂也民之好惡既同於是相土而上下山原焉未及定居也舟載也瑶亦美玉故與玉並言但光之搖動者則為瑶耳鞸琫說見瞻彼洛矣容刀鞸琫所容之刀也佩玉以節行文具也佩刀以禦侮武具也皆貴者之服飾見其貴而能勞夲以為民所以為厚此言公劉至豳相度之忘勞也篤公劉逝彼百泉瞻彼溥原乃陟南岡乃覯于京京師之野于時處處于時廬旅于時言言于時語語賦也百泉衆水之所自出溥廣也溥原即衆水所合處往百泉而望廣原自下觀之也南岡岡之在南者謂面山也覯見也京髙丘也陟南岡而覯髙丘自上觀之也京師者謂此京之原乃衆心所歸非為一人之故也未有室廬故曰野相度之審如此乃曰于此可以為居室以處處處居也于此可以禮賔旅以廬廬旅寄也于此可以宣號令而言言言自言也于此可以集羣議而語語語論難也區畫定而宫室營焉此言公劉相度邑居而始營宫室也篤公劉于京斯依蹌蹌濟濟俾筵俾几既登乃依乃造其曹執豕于牢酌之用匏食之飲之君之宗之賦也京即上章乃覯于京之京依依之以居也蹌蹌濟濟說見楚茨此則以羣臣之落成者言俾使也使人為之設筵几也既登登席也乃依依几也曹羣牧之處也牢飬豕之間也以豕為殽以匏為爵初立國從儉以質也食之飲之以勞羣臣也自其長國人而言則曰君自其主族人而言則曰宗其實一人之稱此章言宫室成而與羣臣落之也食飲而與羣臣相親乃所以君宗之非若東萊吕氏所謂建國立宗也篤公劉既溥既長既景乃岡相其隂陽觀其流泉其軍三單度其隰原徹田為糧度其夕陽豳居允荒賦也溥長言土地之墾辟也景者考日影以正四方也岡者登髙岡以望四逺也隂陽者向背寒暖之宜也流泉者水泉灌溉之利也蓋欲民居之無不善也三單者三軍也世衰政亂諸侯多以羡卒益軍而公劉無羡故曰三單見其遵大國三軍之制而不以困民也詳見讀禮疑圖卷三徹即助也助夲通力之義故殷時之助未名徹而徹意存焉故亦謂之徹荒大也豳地多山夕陽之所及皆度以授民而豳居於是大矣此章言其定民居而制賦稅也篤公劉于豳斯館涉渭為亂取厲取煆止基乃理爰衆爰有夾其皇澗遡其過澗止旅乃密芮鞫之即賦也館者初至豳時未有室廬而暫居客舍也渭在豳之東南而涇水自豳流入者也亂者以舟渡水之名厲砥石也煆治鐵之名取厲取煆則器用備而有室可居矣止居也謂居止之基也止基以居其民則民聚而衆矣疆理以理其財則財足而有矣皇大也遡逆而向之也旅衆也芮水名鞫窮也言澗之大者則夾兩旁而居之其上澗水旁出而橫過者則又遡而居之其民衆多而所居既密則又就芮水盡處而居之凡民之居不窋故地皆已來依新邑矣然非為之疆理則民無所賴而豈能致從者之衆哉可見公劉厚民之意在於足其食也此章總叙遷豳之始終以見其專於為民而得民之甚也首章所謂思輯用光者蓋如此公劉六章章十句按公劉商時之諸侯也觀徹田為糧一語則徹即商之助法也其先世后稷封邰至不窋當夏之衰而竄居戎翟之間在今慶陽府即北翟界上北翟者獯鬻也但以其西南近西戎故併言戎翟耳其實不窋非居西戎也當時必王政不綱諸侯强暴而微弱不能自存故竄依於此耳豈其所得已哉然能謹於事大無失禮焉則蠻貊可行故其後世至公劉之初猶足以致富庶謂北翟將張非可安民之所乃始圖遷必已當商之盛世而漢書謂公劉避桀居豳者誤矣九傳而至大王則又當商道之衰玁狁遂橫每侵及之而大王事之不得免於是盡棄其地以與之而自豳遷岐焉蓋公劉之遷豳當商之盛也大王之遷岐當商之衰也其事固不同矣而其立國規模則皆以安民為夲而安民以疆理為先無非后稷相傳之家法也然史記言不窋者后稷之子其代稷為侯必在啓之盛世何為不能保稷之子而使竄居戎翟歷數傳而不得復邪竊意不窟必稷之世裔非其子也舊說亦有以其為當夏之衰而竄者但啓之世不可以為衰既竄久而不復必在其後世矣故史記所序之世次不足信也不然則自后稷至於武王僅十六世而歷夏十六君歷商三十君共四十六君何其世次不相當之甚哉泂酌經㫖曰舊說以為召康公以戒成王也泂酌彼行潦挹彼注兹可以餴饎興也豈弟君子民之父母興意泂逺也行潦道上汙濁之水餴蒸米一熟而以水沃之乃再蒸也饎酒食也言行潦之水在逺無人用者也而自逺酌之置於大器之中亦可以待其澄清又即其所酌大器之中而挹取之以注於此小器之中則可以灌沃餴米以為酒食謂可以供祭祀也猶穢惡之人而能自新則亦可以事上帝也蓋欲人君舍短取長不録人過也如此則中飬不中才飬不才而可以為民父母矣泂酌彼行潦挹彼注兹可以濯罍興也豈弟君子民之攸歸興意濯滌也罍者宗廟之器可以濯罍則不特餴饎而已泂酌彼行潦挹彼注兹可以濯溉興也豈弟君子民之攸墍興意溉亦滌也可以濯溉則無物不可濯非但一罍而已以喻人才養成無所用而不可也慶源輔氏曰攸歸謂為民之所歸往也攸塈謂為民之所安息也皆所以終首章父母之義也泂酌三章章五句卷阿經㫖曰集傳謂召康公從成王逰於卷阿之上因王之歌而作此詩以為戒也有卷者阿飄風自南比也豈弟君子來游來歌以矢其音賦也卷曲也阿大陵也飄風回風也其起甚驟南方溫厚之地而回風驟起猶人夲溫和而忽然暴戾當如卷曲之阿虛中無我也君子指王也來游來歌謂王來游而歌也矢音康公自言賡歌也臣以詩陳於君前故曰矢游歌所以養德性和人心也但矢音或未免有所規誨則在人君消融其忿怒之心耳伴奐爾游矣優游爾休矣豈弟君子俾爾彌爾性似先公酋矣賦也伴奐融釋之意優游充裕之意爾指王也彌滿也似如也酋終也謂大王王季文王武王皆成王業此其所以為善終也蓋王業皆從德性中出故不可不滿其性也爾土宇昄章亦孔之厚矣豈弟君子俾爾彌爾性百神爾主矣賦也昄章版圖也天下歸之故曰厚百神爾主則為王而先公之酋者在我矣爾受命長矣茀祿爾康矣豈弟君子俾爾彌爾性純嘏爾常矣賦也茀蔽盛之貌言受命長為天子則祿之康爾者蔽盛而無闕缺之處矣此以彌性故能致如此之久也純嘏大嘏以神之所嘏者言福也受命長故純嘏有常也此上三章皆申言游歌有益於君德之意有馮有翼有孝有德以引以翼豈弟君子四方為則賦也馮謂可為依者翼謂可為輔者馮翼以賢臣之適於用者言孝德以賢臣之夲於心者言引謂導其前也翼謂相其左右也人君能致賢人以為引翼則惟以德自將而無為民化故曰四方為則此以下言有德而得天命之由顒顒卬卬如圭如璋令聞令望豈弟君子四方為綱賦也顒顒可望也卬卬可仰也圭璋者人君所用於宗廟朝廷尊嚴之器也見其不動而敬儼然人望而畏之聲名自然洋溢也衆目皆由我提綱而張是為四方之綱也此申上章無為民化之意鳯凰于飛翽翽其羽亦集爰止興也藹藹王多吉士維君子使媚于天子興意鳯凰靈鳥也雄曰鳯雌曰凰以鳯凰為言惟以興天下賢才非因時鳯凰至而以為喻也翽翽羽聲之小也以况小心翼翼之意爰止言其未用也藹藹衆多也使用也言用則能愛君矣鳯凰于飛翽翽其羽亦傅于天興也藹藹王多吉人維君子命媚于庶人興意傅于天言其見用也用則體君心而愛民矣此兩章皆言賢才之有益於國也鳯凰鳴矣于彼髙岡梧桐生矣于彼朝陽菶菶萋萋雍雍喈喈比也髙岡岡之髙者也鳯凰鳴于其上則聲聞于逺矣賢者之媚天子媚庶人有益於人國者似之朝陽之地萬物萌生梧桐生於其地則其葉可以藏鳯凰矣人君為崇奉人才之地者似之菶菶萋萋梧桐生之盛也雍雍喈喈鳯凰鳴之和也梧桐生之盛而後鳯凰鳴之和則欲鳯凰之和鳴者先當使梧桐之盛也君子之車既庶且多君子之馬既間且馳矢詩不多維以遂歌賦也庶如金路象路副車之類多則以各車之數言間者習之素熟也馳則行之不失則也承上章言菶菶萋萋則雍雍喈喈矣君子之車馬既庶多間馳足以待天下之賢者而以之奉迎則何賢者之不至哉我之陳詩豈有多言惟有繼王之聲而遂歌之以養王和德使賢者皆樂為之用而王享無為之治耳蓋因首章矢音而結其意也此詩中和之氣藹然讀之自不容不感發興起然大意則為游歌以彌德性祈天永命之本蓋在此矣康公善於開導此其所以為格心之學歟卷阿十章六章章五句四章章六句民勞經㫖曰集傳以為同列相戒之辭以詩詞觀之大抵得之矣但所謂同列者必王所親信之人故末章曰王欲玉女戒同列即所以戒王也同列相戒之辭當為小雅民亦勞止汔可小康惠此中國以綏四方無縱詭隨以謹無良式遏冦虐憯不畏明柔逺能邇以定我王賦也汔幾也民勞則國危故因周民之勞而欲其幾於小康也中國京師也四方諸夏也京師諸夏之夲愛此京師則可以安天下矣對夷狄言之則總諸夏為中國對四方言之則指京師為中國也詭隨者心知其非而懷詐面從也詭隨之人阿諛取容而不忠於所事非善良之士也但竊其權以為冦虐耳故戒用事者無縱此詭隨之人以謹無良而遏冦虐此愛京師之要務也憯錢氏訓痛是也不畏明者肆行於人所共見之地也言當痛此詭隨之不畏明者無俾作慝害正以為民憂也柔逺以逺而難馴者言能邇以近而易使者言此治逺者先自近始之意定我王謂定王國也民亦勞止汔可小休惠此中國以為民逑無縱詭隨以謹惛怓式遏冦虐無俾民憂無棄爾勞以為王休賦也逑謂民聚不離散也惛怓謂惑亂主聽也爾勞謂其前功也小休之休息也王休之休美也民亦勞止汔可小息惠此京師以綏四國無縱詭隨以謹罔極式遏冦虐無俾作慝敬慎威儀以近有德賦也華谷嚴氏曰詭隨之人無所不至所謂罔極也無縱詭隨而必近有德謂逺佞而親賢然非修身則賢不可得而親故必敬謹威儀而後可以近有德民亦勞止汔可小愒惠此中國俾民憂泄無縱詭隨以謹醜厲式遏冦虐無俾正敗戎雖小子而式𢎞大賦也愒息泄去厲惡也正敗正道敗壞也戎汝也小子指用事者非指王之辭也𢎞大謂其所關者廣大也民亦勞止汔可小安惠此中國國無有殘無縱詭隨以謹繾綣式遏冦虐無俾正反王欲玉女是用大諌賦也繾綣謂小人之固結其君也正反甚於正敗正敗但壞之而已若正反則盡反而為不正言愈切矣玉者愛之如玉也此詩五章皆首言息民以固邦夲而無縱詭隨則息民之要㫖也章末皆丁寧勸戒之辭其憂國之情切矣民勞五章章十句板經㫖曰此詩切責同列用事之人蓋老臣不為王所敬信者所作也大意與上篇同上帝板板下民卒疸出話不然為猶不逺靡聖管管不實於亶猶之未逺是用大諌賦也板如木板然謂障隔而不通明也卒盡疸病也出話不然謂其言則非先王之道而不合於人心也此其為謀不逺故也靡聖管管謂不以聖人之法自管攝也不實於亶謂夸毗而無誠心即是不以聖為管也猶之未逺蓋夲於此此章言同列無為民之逺猶以明作詩之夲意也天之方難無然憲憲天之方蹶無然泄泄辭之輯矣民之洽矣辭之懌矣民之莫矣賦也蹶顛躓也天之難蹶即板板而民疸也憲憲欣喜而不知憂懼也泄泄怠緩而不思勤勵也輯和洽合懌悅莫定也辭輯而懌則非出話不然者矣言天方難蹶之時必須言辭合於人心而後可以定亂不可視為不急也蓋申上章之意我雖異事及爾同僚我即爾謀聼我囂囂我言維服勿以為笑先民有言詢于芻蕘賦也異事不同職也同官曰僚言同為王臣也囂囂自得不受善言之貌我言維服與書乃言惟服之服同謂可服行也言而可行則逺猶之輯懌者也芻蕘謂采薪者古人尚詢及之况僚友乎戒其當聼已之言也天之方虐無然謔謔老夫灌灌小子蹻蹻匪我言耄爾用憂謔多將熇熇不可救藥賦也虐即前章難蹶也謔謔戲侮也亦憲憲泄泄之意灌注也謂注之於其耳也此必老臣告同列之少者故自稱老夫而謂其人為小子云老夫則知其涉厯之已多矣蹻蹻舉足高貌言其驕也耄老而昏也憂謔以憂為戲也多謂積久也熇熇熾盛也不可救藥謂病甚藥不能救也此章戒以不聽善言之禍天之方懠無為夸毗威儀卒迷善人載尸民之方殿屎則莫我敢葵喪亂蔑資曽莫惠我師賦也懠怒也天之為虐而使民卒疸是怒我也夸自大也毗附人也務為夸毗則譸張無實威儀盡迷而接物之際施施聲色足以拒人故為善人者皆端默無言而如祭祀之尸矣殿後也殿屎猶言遺屎之急也爾雅釋殿屎為呻吟亦以急而呻吟耳葵度也善人不為用則民情雖急莫有以逺猶與之葵度者矣故民喪亂無所資以為生而卒無恩惠及於衆庶此所以不可救藥也此章申言拒善言之禍天之牖民如塤如箎如璋如圭如取如攜攜無曰益牖民孔易民之多辟無自立辟賦也牖通明也塤箎詳見何人斯字義圭璋詳見卷阿字義塤箎以與人言謂其協而和也璋圭以持已言謂其潔而重也協和則無乖戾之情潔重則無卑汙之行此言人心固有中和之德而天惟以此開明之也但為邪僻所蔽則與人多至於乖戾而不協和矣持已多至於卑汙而不潔重矣故能開明其心則如取而即携不待有所增益也其牗民豈不甚易哉故民之多辟由君自立辟也不自立辟民豈有邪德哉此言民心感化而不為亂則無殿屎之患而天亦不為虐矣然則牗民之夲豈不在君身哉價人維藩大師維垣大邦維屏大宗維翰懷德維寧宗子維城無俾城壞無獨斯畏賦也價人邉界之人也藩籬也大師萬民之衆也垣城也大邦指京國而言也屏樹也所以為蔽也大宗指夲宗而言也翰幹也宗子指天子而言即天之宗子也城城之也立幹所以城也價人逺故以為藩蓋使之為外護也大邦近故以為屏蓋使之為內蔽也惟民則所以守國所係最重故以為垣立幹以城之者城此垣耳城此垣而不固謂之城壞城壞則無民我將獨處而可畏矣此可見民之為重不可使至於亂矣敬天之怒無敢戲豫敬天之渝無敢馳驅昊天曰明及爾出王昊天曰旦及爾游衍賦也王音往戲豫逸豫也渝變也馳驅恣行也王往也出而往也旦明也衍寬舒之意此章言天不可以不敬也所以敬天者亦惟修身以牗民耳蓋欲同列以此告其君亦格心之助也板八章章八句詩說解頥正釋卷二十四
