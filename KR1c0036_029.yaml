body:
  text: 詩説解頥正釋卷二十七明季夲撰臣工經旨曰此康王時詩也武王既踐天位首重民食所以允釐百工已有成法而後王每申明之故康王嗣位而又作此詩以戒農官使民急於治田也并噫嘻當合為一篇以噫嘻言成王故知為康王時詩也此天子戒臣下之辭宜為大雅嗟嗟臣工敬爾在公王釐爾成來咨來茹賦也嗟嗟歎辭臣工以在朝群臣百官言公者朝廷之事釐整治條理也成先王之成法也即春耕夏耘秋穫一定不易之法式也咨者謀之於衆茹者度之於心言王方釐正三農之成法爾當來此咨謀茹度而講求力行之庶幾敬爾在公而王所釐者不虛也嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年命我衆人庤乃錢鎛奄觀銍艾賦也保介農官蓋專治田事者也云保介者取有助之意高誘注吕覽以為副故集傳因謂農官之副如此則以何者為農官之正乎莫春者周正建寅之月也三陽交泰則可以始興農事矣田三嵗曰畬謂已成之田也欲復治之故言當此之時别無所求惟如何於畬而新之明即天之明命也來牟方盛雖未及熟而天命屬於有周將有受明之幾矣蓋天之明昭鑒周有德常以豐年畀之則豐年者係於王者之德而盡力於農畝則在農人耳錢銚鎛鋤奄忽也銍穫禾短鎌也使之命我衆人早具農器以起田功則天命明昭忽然觀銍艾矣謂民當體天心以力農而農事不可緩也上章通戒百官此則專戒農官也噫嘻成王既昭假爾率時農夫播厥百榖駿發爾私終三十里亦服爾耕十千維耦賦也噫嘻亦歎辭成王時嘗以此戒農官故曰既昭假爾謂昭告而感格之也集傳以為成王始置田官而嘗戒命之則非矣農事古人所急治農之官自古有之况武王所重者民食豈待成王而始置哉命農官率農夫以播百榖必自耕始故以此戒之上章言先具農器此則言先事耕田也駿大服事也駿發爾私耕私田也終三十里則百畝計步為里之數也此以助法之私田言非謂鄉遂之田也蓋以一井之田一方三百步為一里一夫百畝畝百步百畝之田縱橫各百步積之得萬步以三百步為里法約之得三十三里三分里之一言三十者舉成數也田一面百步計之為一畝以千步計之則為阡阡為十畝是百畝之田為十千也十阡之內以耦耕之是百畝為一耦也大抵古之耕者步百為畝其徑六尺為一步畝為三畎廣尺深尺耜廣五寸以二人並耕左右起土其深者為畎髙者為壠是以一面之百步計畝也詳見讀禮疑圖卷一言駿發爾私而不及公田所重在民也臣工三章一章四句一章十一句一章八句集傳以臣工噫嘻分為二篇今合為一篇而分三章振鷺經旨曰武王時封紂子武庚為殷侯因其來朝助祭而留之講學故作此詩古序以為二王之後來助祭似亦臆説也武王既有天下封堯後於薊封舜後於陳封禹後於把而陳與把宋為三恪不列堯後既已可疑而此來助祭獨言二王之後何為併陳而不之及邪竊意此詩必專為武庚而發蓋武庚庸愚不知天命故欲使之觀樂辟雍以飬德庶幾其能忠順耳此與有瞽同為一時之事而此則當列於有瞽之後蓋大雅也振鷺于飛于彼西雍我客戾止亦有斯容賦也鷺之為鳥好自低昻其翔集必舞而後下蓋有振起之意故曰振鷺詳見宛丘字義雍辟雍也我客指紂子武庚作賔於周故以為客戾至也亦有斯容言亦有振起之容也蓋美其講學興起有不知手舞足蹈者在彼無惡在此無斁庶幾夙夜以永終譽賦也斁本音繹讀為丁故反者協韻也彼無惡言逺之則有望也此無斁言近之則不厭也永終譽即世為天下法則之謂也此言講學之有益於德以勸勉之也振鷺二章章四句集傳一章分二節今為二章觀於此詩則武王所以處殷後者蓋將飬之成德以永厥世武庚雖愚豈不知所感動使非管叔道之則異日奚至以殷畔哉故武庚之叛管叔之尤也豐年經旨曰此農事有成而報賽之樂歌也蘇氏以為秋祭四方冬祭八蠟分為秋冬二事其曰秋冬以夏正言也集傳則以為祀田祖先農方社之屬夫田祖農事所始是為先農即八蠟之先嗇也而社主春祈為壇於社方主秋報為壇於郊時各不同地亦有異夲分二祭也惟以其均有功於田事故此詩合而為一其必人君省斂因年豐報賽總祭一方之神而先農與社方一時並列歟一方之方社不得與大社四方專祭之貴神同尊先農雖古帝諸侯因農事而報夲反始於禮亦宜及之但不可屈尊而居一方方社之下則以先農主之猶先嗇之主八蠟也故集傳序田祖先農於方社之上不兼蠟也而蠟祭之小神不與焉蓋與大田來方禋祀義同若春社秋方冬蠟則在國中各有一時之專祭不在此限矣然此詩所謂萬億及秭與載芟同辭蓋諸侯公田所入之米數也有似豳詩故先儒或疑豐年即豳頌然則周禮籥章所謂國祭蠟則吹豳頌擊土鼓以息老物者其即此詩歟蠟有先嗇即田祖也故亦用之但既為豳頌則宜列於豳風耳豐年多黍多稌亦有高廪萬億及秭為酒為醴蒸畀祖妣以洽百禮降福孔皆賦也高燥宜黍下濕宜稌黍稌皆多則髙下之地無有不熟所以為豐年也亦語助辭廪倉之别名廪高則所藏者多矣以下文為酒醴觀之則萬億及秭蓋以米數言也酒酒味之厚者即周禮三酒所以待賔客也醴酒味之薄者即周禮五齊所以供祭祀也蒸進畀子也洽情相浹也百禮事神之衆禮也皆遍也既饗祖妣而旅酬燕毛皆以此而篤親親之恩無不周焉蓋民以孝弟為德而孝弟原於尊祖故特舉祭祖妣者言之以見不忘本之意而百行具於其中矣此見神降福之遍所以當報也豐年一章七句有瞽經旨曰此武庚助祭於周廟既畢而武王欲留之辟雍講學以觀作樂之成故作此詩篇當列於振鷺之前亦大雅也序以為作樂而合乎祖則似不知詩意之所在矣有瞽有瞽在周之庭設業設虡崇牙樹羽應田縣鼓鞉磬柷圉既備乃奏簫管備舉賦也田與􅉧同音引瞽樂官也庭者周之廟庭也以武庚殷後故言周以别之在周之庭一句屬下文蓋為設樂器發而有瞽當自為一句以與虡羽鼓圉叶韻瞽以視瞭相之而為之設樂器者皆視瞭也既備者設樂既備也乃奏則瞽奏樂矣簫管備舉所以奏也此言周人作樂於廟庭以見樂之為重也喤喤厥聲肅雍和鳴先祖是聽我客戾止永觀厥成賦也喤喤和之大也此言樂聲之美起於人心之肅雍故其和鳴足以致先祖之聽我客至此既觀其成矣苟永觀之則樂之感人必深將不覺其成德焉蓋欲留之觀樂辟雍以飬德也有瞽二章一章八句一章五句集傳一章分三節今為二章此與振鷺當合觀之濳經旨曰此周王薦魚於寢廟之樂歌也猗與漆沮濳有多魚有鱣有鮪鰷鱨鰋鯉以享以祀以介景福賦也與音歟後猗與同漆沮馮翊之水與吉日之漆沮同濳者積柴飬魚使得隱藏避寒則夏正冬月之事也故月令季冬命漁師始漁天子親往乃嘗魚先薦寢廟季冬者夏正建丑之月大寒之候孔氏謂冬月既寒魚不行乃性定而肥充故特薦之又黃河魚美自渭而上漆沮依山穴而藏故漆沮多魚而生致之鎬京也序併春獻鮪言之蓋附於月令季春薦鮪於寢廟之説則季春者建辰之月也魚於時已不濳與詩意不合矣然薦以薦新為義非正祭之禮而享祀則正祭之名也蓋追敘平時嘗取魚於此供爼實以祭而既獲福見漆沮之魚為先祖之所嗜也介助也濳一章六句雍經旨曰此蓋武王祭文王而徹爼之詩也故周禮樂師亦名為徹云有來雍雍至止肅肅相維辟公天子穆穆賦也言諸侯來至於廟而助祭其來雍雍然而和及其至也則肅肅然而敬相助也助祭之辟公和而能敬如此所以天子得穆穆篤恭不待有所作為也穆穆即肅肅之不顯處此言諸侯之助祭能成天子之敬也於薦廣牡相豫肆祀假哉皇考綏豫孝子賦也廣牡大牲也肆陳也薦廣牡者武王薦之也相肆祀者辟公相之也天子薦之而諸侯相之此則得天下之歡心以奉其先王所以皇考之神感假之而有以安我孝子之心也此言武王能得人心而致文王之感假也宣哲維人文武維后燕及皇天克昌厥後賦也宣者通於事也哲者明於理也宣哲則盡人道矣故曰維人文武則備君德矣故曰維后此文王安民之本也能安民則天心亦安矣故天下歸心諸侯各以其職來祭而後人得以享久安之福也此以武王之得人心而享福之久者歸功於文王之德也綏我眉夀介以繁祉既右烈考亦右文母賦也綏眉夀介繁祉此正昌後之實也烈考與皇考同皆指文王也文母太姒也烈考文毋皆得右之非為天所福者不能也此承上章言所以能饗親之意雍四章章四句集傳一章分四節今為四章觀末章既右烈考亦右文母之言則此詩但可用於祭文王之徹其他歌徹恐有别詩如仲尼燕居所謂徹以振羽振羽或謂即振鷺亦未必然也但相維辟公天子穆穆之言則必不可歌於三家之堂耳載見經旨曰此諸侯來助祭於武王之廟既畢而慰勞之詩也似當為大雅云載見辟王曰求厥章龍旗陽陽和鈴央央鞗革有鶬休有烈光率見昭考以孝以享賦也見音現載則也發語辭辟王謂成王求厥章者稟受法度也和在軾前孔氏謂和亦鈴是也爾雅有鈴曰旗之説經無此義也此因諸侯來見而言其車服之盛以美之休美也烈熾盛也休有烈光以其有志於治道言也於是成王率之以見昭考武王之廟而致孝享焉見諸侯以其職來助祭乃先王之所悅也以介眉夀永言保之思皇多祐烈文辟公綏以多福俾緝熙于純嘏賦也承上章言諸侯為我致孝享於昭考則昭考助我以眉夀使我永保大業惟有眉夀故能永保大業即多福也此皆女辟公助祭之所綏而使我緝熙至于純嘏也蓋辟公來求厥章皆欲修德者也則天子之懷諸侯豈得不修身以立人極哉是緝熙者保大業之本而純嘏之所由錫也所謂綏多福者如此載見三章一章八句一章六句集傳一章分二節今為二章有客經旨曰成王既誅武庚復封微子於宋以為殷後因其始受命來朝將歸而勉留之故作此詩蓋致繾綣之意以慰其心焉亦大雅也有客有客亦白其馬有萋有且敦琢其旅賦也敦都回反後取敦琢義者並同微子雖封為宋公然作賔於周故曰有客白馬者殷尚白而修其禮物也萋盛也且多也以其來朝之禮儀言也敦琢夲治玉之名而借以為選擇之意旅微子之卿大夫從行者也選同德以從行則皆敬慎而不至於獲戾耳此敘其自國而來者如此有客宿宿有客信信言授之縶以縶其馬賦也縶絆也縶其馬愛之不欲其去也此言至周而留之之情如此薄言追之左右綏之既有淫威降福孔夷賦也薄言者謂從容慰諭之而不迫脅也追者已去而還之見其愛之無已也左右言無方也綏安也淫威謂踰常之等威蓋使之統承先王得用天子之禮樂也言我周既降以淫威之福於心蓋甚平夷欲其坦懷不疑也所謂綏之者如此有客三章章四句集傳一章分三節今為三章今按微子賢聖與武庚之庸愚者殊異故此詩與振鷺意亦不同然周之所以處殷後者其德之厚則一而已當以類相從而觀之武經旨曰此祭武王之樂歌蓋成王時詩也然闕誤多矣於皇武王無競維烈允文文王克開厥後嗣武受之勝殷遏劉耆定爾功賦也耆音旨皇大也無競不爭而不見其強也遏劉止殺也言大哉武王之功不以力爭天下維以德服之執競而無競者也蓋因文王允有文德克開我後人而武王嗣而受之其所以勝殷者亦因文德止殺以致定其功耳見武王之功不以武而以文也夫以掃除殷穢平定天下而不以殺為武則武之為武不出於文之外矣大武之詩所存者五章皆此意也武一章七句今按大武六章武為首章賚為三章桓為六章則左氏嘗言之勺與般二章皆有詩而不言章次所存僅五章而尚闕一章然皆不可考矣勺賚及般之名皆後人所加集傳以為樂節之名如祭統所謂舞莫重於武宿夜則武宿夜亦武舞之别名耳按樂記武有六成即此六章之舞節也當為祭武王之樂歌然天子廟樂禮宜九成意必尚有文舞九成如禮記所謂八佾以舞大夏者蓋即周禮鐘師之九夏也而不在此武舞六成之數歟蓋九夏者文舞也樂記所謂既奏以文也武者武舞也樂記所謂復亂以武也孔氏曰樂有文舞有武舞其入廟也必先文而後武則武舞者其入在文舞之後者也故祭統曰及入舞君執干就舞位冕而總干率其群臣以樂皇尸通典序此於九獻之後其知樂舞之節者歟詩説解頤正釋卷二十七
