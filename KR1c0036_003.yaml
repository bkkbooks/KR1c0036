body:
  text: 詩説解頥正釋卷一明季本撰正釋正釋釋正經也以别於總論之提大綱字義之盡餘意矣國風風者諷也民俗私相咏歌之辭有嘉人之善而感動良心者有刺人之惡而感動耻心者皆諷言也閨門鄉黨邦國可以通用其言宜皆出於性情之正而不可加以淫辭風之有淫辭世儒之所雜入也周南召南文王武王時之詩也邶鄘以下十三國成王以後之詩也天下之國不止十三其間必有賢君可咏歌與輿情之得正者而所載止十三國其詩且多不係於勸戒此理之不可通者也至宋魯無風則鄭氏以為宋王者之後魯聖人之後是以天子巡狩不陳其詩以禮之夫陳詩以觀得失而行黜陟焉此天下之大政也列國諸侯宜皆有風乃以為王者後聖人後而詩獨不陳則宋魯二國之政可以恣行矣又安有此理邪周詩自雅頌二南之外猶有王風魯雖有頌獨不可仍存其風乎今考何彼穠矣定之方中諸篇皆似魯詩而竄入於他國者不可謂魯為無風也若宋自微子之後君臣代有賢哲而又謂其無一詩可繫於風邪詳見總論六義下其諸國序次説見刪次下未盡之意於各國下論之他詩雜入者則論於各篇周南周召二邑名周即今鳯翔府岐山縣以周公之采邑言也召即今鳯翔府鳯翔縣以召公之采邑言也二邑本皆文王岐周之地文王遷豐而其地空及武王遷鎬於豐之近地而始以岐周故地分二公為采邑鄭氏以為文王受命作邑於豐乃分岐邦周召之地為周公旦召公奭之采地則以為文王所賜也周召二公至武王時乃始輔佐在文王時未嘗用事也故書君奭歷舉文王之臣惟曰虢叔閎夭散宜生泰顛南宫括五人而不及周召安得以岐周地賜之及武王為天子而後使二公分陜以治括地志云今陜州有陜原去州西南二十五里分陜從此原為界理或然也周公治內自陜以西王畿在焉故所主皆國都之事召公治外自陜以東侯服在焉故所主皆諸侯之事而風亦以此分焉文王以諸侯為西伯得專征伐雖三分天下有其二不過言西方人心之歸而已然其所治惟在故封若陜外之國則各有諸侯主之文王方當事殷之際小心翼翼安敢盡制其國之事哉至於武王為天子而天下始兼統矣惟以周之先世公劉自翟疆遷豳太王自豳遷岐本自北而南故岐周之地遂以南名武王有天下而陜外東西之國雖盡有之亦但通謂為南猶今北方稱中國為南朝也程大昌乃以南為樂名不主自北而南之説夫詩列樂官固為南部然豈二南所以為南之本意哉至於分陜之説公羊以為成王時事先儒蓋有疑者而亦無確論惟黃氏以為分陜當在武王得天下之後而二南之繫當在二公分陜之後此説得之蓋陜內之民漸化者久陜外之民被化者新則周南之詩文王為多而召南之詩武王始備也但文王止為諸侯未嘗巡狩采詩而巡狩采詩乃武王時事也采詩之後其在諸國者必以核實於方伯而召公因以文王時詩併入獻之周公之於國都亦然否則二公各輯治內所存文武之詩以成編而使人肄習邪然則二南之詩乃周召二公之所手録也二南之係周召殆以此耳且二公皆聖人也故其所次篇章皆切倫理而二南之教天下遍行故孔子教其子伯魚使為周南召南則二南之名古所已有此豈可與他詩不關風化者並論哉二公分治甚久周公之沒在成王之末召公之沒在康王之初則文武之詩采輯盡矣成王以後風化不及二王不得入周南者則别為王風不得入召南者則别為國風欲人專以文武為法也其用意深矣今觀破斧九罭皆周公既歸而人愛之之詩在成王之初當屬於王風而誤為豳國甘棠乃召公既去而人思之之詩在成王之後當屬於所嘗聽政之國如郇伯之在曹而竄入召南此詩之所以雜亂而難通也夫詠周公者當為王風而詠召公者不當為召南則二南之詩可以知其為文武之正風而不待辨矣關雎按鄭氏箋舊解云三百十一篇詩並是作者自為名但小序多失作者之意朱子於辨説既詳辨之今細繹其辭以意逆志首揭數語於篇端謂之經旨其與朱子不合者則亦稍加辨論焉經旨曰關雎宫人詠后妃之德能使人畏而愛之也蓋已事后妃時詩矣后妃即文王之妻太姒未嘗稱后乃後人追稱后妃如西伯之追稱文王云爾關關雎鳩在河之洲興也窈窕淑女君子好逑興意關關樂意相關而其聲應也雎鳩水鳥狀類鳬鷖河大河之近洽陽者指后妃所生之處而言也洲水中可居之地窈窕委曲深微之意淑善淑女指后妃女者婦人之通稱如綿之詩稱太王之妃為薑女也君子指文王好亦善也逑與仇同匹也文王之志在於宜家人以教國人而后妃之德能與之合故曰好逑參差荇菜左右流之興也窈窕淑女寤寐求之求之不得寤寐思服悠哉悠哉輾轉反側興意參初金反差初宜反下章同參差不齊貌荇叢生水中長短隨水淺深也左右言隨所處而無一定之方如此章以順水之勢為左右下章則以制荇之宜為左右也流者順水之流而求之未言得也故爾雅直謂流求也荇可為茹其性柔順故以起興寤寐以夜卧言寤於寐中也則無思而不思矣服猶佩服之服謂藏於心也悠長也輾轉反側卧不安席之意此宫人求后妃之歡心而不得之辭也自怨自艾自責自修有哀痛迫切之意焉故思之長而不安席也參差荇菜左右采之興也窈窕淑女琴瑟友之興意參差荇菜左右芼之興也窈窕淑女鐘鼓樂之興意樂音洛後凡和樂歡樂嘉樂之樂並倣此采取而既得也芼熟而薦之也琴瑟皆絲屬堂上之樂與歌聲協比者也得相親密故曰友友者親愛之意鐘金屬鼓革屬堂下之樂所以起作樂者也自此八音並奏樂形於外比友為舒暢矣此宫人言既得后妃之歡心而相與愛樂於琴瑟鐘鼓之間也孔子曰關雎樂而不淫哀而不傷以其得性情之正也朱子以為后妃之德宜配君子求之不得則不能無寤寐反側之憂求而得之則宜其有琴瑟鐘鼓之樂是以憂樂因於后妃而後為得正也竊意未有其人而先思則思為懸想已得其人而即喜則喜為縱情如此則憂樂有所繫矣尚得為正乎蓋后妃在宫肅雍易事難説宫人非賢無由進御故不得其歡心則憂其德之有虧寤寐反側不能自安見其內自責也得其歡心則樂其德之有合琴瑟鐘鼓方能相洽見其不敢肆也憂以反躬則哀止於禮義之正而非毁性之哀故曰不傷若道心不行而一於困鬱則其哀為毁矣樂以謹禮則樂約於音律之中而非縱情之樂故曰不淫若畏心不主而流於歡娛則其樂為縱矣故關雎所以為得性情之正者以宫人感於后妃肅雍之化而各修其德亦和而敬也周公作樂列於房中孔子刪詩序於篇首非以此為文王之化行於后妃而可以為修身正家之本乎春秋之時世俗所尚不過鄭衛淫哇之聲耳而師摯入官之初獨以關雎為教至其卒章音節已急而聲氣和平終始一貫故孔子嘆之而曰關雎之亂洋洋乎盈耳哉其所得於關雎者深矣關雎三章一章四句二章章八句此房中之樂也國中之化皆由此始故以為周南之首而鄉樂亦多用之葛覃經旨曰后妃自敘治葛覃而欲歸省其親見其處富貴之地而能勤儉孝敬也婦德莫先於肅雍關雎是也婦功莫先於勤儉葛覃是也葛之覃兮施于中谷維葉萋萋黃鳥于飛集于灌木其鳴喈喈賦也施音異後凡延施之施並同葛草名蔓生可為絺綌者覃延施引蔓相及也中谷谷中也萋萋盛貌灌木叢木也喈喈和聲之逺聞也此章追敘葛葉方盛而有黃鳥鳴於其上蓋初夏之時也葛之覃兮施于中谷維葉莫莫是刈是濩為絺為綌服之無斁賦也斁音繹亦作射皆取厭怠之義後並同莫莫茂密貌刈斬濩煮也精曰絺粗曰綌斁厭也此言盛夏之時葛既成而治以為布也服之無斁言安於絺綌之服而無外慕羅綺之心也治葛之時蠶事亦宜並舉后妃但言治葛而不及蠶事者以治葛乃盛暑煩縟之事樂於親執其勞而不欲輕視耳言告師氏言告言歸薄汚我私薄浣我衣害浣害否歸寧父母賦也害音曷言者語辭師氏女師也言告言歸謂所告於師氏者以歸寧也薄不敢大肆之辭猶言略也汚謂去其垢浣則濯之而已私衵服也衣常服也舊説以禮衣為衣則禮衣不可以浣也害何也寧安謂問安也后妃自洽陽嫁於周國在渭水傍自周歸洽以寧父母由文王為西伯時言之乃境內也故有歸寧之禮若在鄰國則諸侯猶不得越境况其妻乎歸寧之禮詳見春秋私考莊公二十七年杞伯姬來下此言治葛既畢而始歸寧父母必告師氏者蓋師氏乃君子所選以掌閨門之教者不敢專也葛覃三章章六句集傳曰此詩后妃所自作故無贊美之辭然於此可見其已貴而能勤已富而能儉已長而敬不弛於師傅已嫁而孝不衰於父母是皆德之厚而人所難也卷耳經旨曰文王懷賢臣逺役而不得置之左右以論大道也當紂之時四方叛亂賢臣久勞征役困於險逺之地而不得歸焉諸家皆據小序求賢審官之説而義與文乖多曲為之解歐陽氏辨之審矣集傳之説亦深得其文義但以為后妃思文王而作則采卷耳而置道路酌罍尊而解憂傷似與后妃貞靜端居表率宫人之德不類故直以為文王懷賢耳然亦初為西伯德化未行於紂之叛國時所作也采采卷耳不盈頃筐興也嗟我懷人置彼周行興意卷上聲頃音傾後凡言頃筐並同采采非一采也卷耳草名可以為茹故采之頃欹也筐竹器筐欹則不滿故曰頃筐懷思也人指賢臣置與置同棄也周行大道也言頃筐易盈之器欲以卷耳為茹而采之又采猶不易盈况於賢才之難得者乎故以興所懷之人本有大道可以正君善俗而乃棄於逺地使之久勞不得大用安得不嗟嘆哉陟彼崔嵬我馬虺隤我姑酌彼金罍維以不永懷賦也陟升也崔嵬小雅谷風傳謂山巔是也蓋言其髙爾雅以石山戴土釋之則臆説耳虺隤馬罷不能升髙之病姑且也罍成酒之器惟人君得用金飾永長也懷即上章懷人之懷陟彼髙岡我馬玄黃我姑酌彼兕觥維以不永傷賦也山脊曰岡玄黃者玄馬病極而色變為黃也兕觥以兕角為爵也此二章皆欲登髙山以望所懷之人而往從之則馬罷病而不能進亦可以見其地之險逺矣而賢人久勞於彼乃不得歸則姑酌酒以自解庶幾不至於過傷懷抱耳金罍兕觥皆人君所與諸臣酬酢之器蓋雖憂勞逺臣而亦不廢諸臣燕飲之事也陟彼砠矣我馬瘏矣我僕痡矣云何吁矣賦也砠爾雅以為土山戴石蓋言其髙處之險阻也瘏馬病不能進也痛人病不能行也吁憂嘆也言賢人既在險逺之地望之不可得見則將如之何哉但有嗟嘆而已此可以見其懷賢之切也卷耳四章章四句樛木經旨曰南國美文王屈已下人之德也南有樛木葛藟纍之興也樂只君子福履綏之興意樂音洛只音止後凡言樂只及語辭之只並同南南國猶周南之稱南也木下曲曰樛藟葛類一名巨瓜亦蔓延生纍纒繞也只語已之辭君子指文王舊説指后妃非也未有婦人而可目為君子者履如易視履考祥之履綏安也南有樛木葛藟荒之興也樂只君子福履將之興意荒庇覆也將猶扶助也南有樛木葛藟縈之興也樂只君子福履成之興意縈回旋也成就也此詩三章以文王能屈已下人故以樛木起興而言其為福祿之所歸也人心之歸即是福祿樛木三章章四句蘇氏曰凡詩每章有先後淺深之異者固自有説若樛木螽斯之類皆意不盡申殷勤而已欲強求而説則迂雜而不當矣東萊吕氏曰詩亦有初淺後深初緩後急者然大率後章多是協韻按此二説可以為詩中通章復咏而文句相同者之通例螽斯經旨曰美后妃之化也后妃有不嫉妬之德故衆妾輯睦而化及於子孫也螽斯羽詵詵兮比也宜爾子孫振振兮賦也振音真後凡言振振並同螽斯蝗屬一生九十九子斯語辭如鸒斯鹿斯之類蓋非斯螽亦非阜螽也詳見七月字義以羽言所重在羽也詵詵和集貌爾指后妃振振感動相親之意説見麟趾螽斯羽薨薨兮比也宜爾子孫繩繩兮賦也薨薨群飛聲繩繩會聚相聫之意螽斯羽揖揖兮比也宜爾子孫蟄蟄兮賦也揖揖斂戢貌蟄蟄退藏不競之意蟲之生子多者莫如螽斯故以比衆妾此詩之義重在衆妾之輯睦觀下文宜爾二字蓋本於此非以興子孫也螽斯始化其羽詵詵然比次而起已化則飛薨薨然有聲既飛復斂羽揖揖然而聚衆妾之輯睦如是故其子孫亦皆振振而親繩繩而聚蟄蟄而藏其德皆如其母不但生育之衆多而已凡此皆后妃不嫉妬之所致也螽斯三章章四句桃夭經旨曰美后妃之化能使女子之嫁者皆盡婦道也桃之夭夭灼灼其華興也之子于歸宜其室家興意華音花後凡華實之華並同桃木名華紅實可食夭夭少好貌灼灼華盛如火然也桃之有華婚姻之時也故以時物起興因以見女子德容之美也之子指嫁者而言但不知其為何人之女其必文王之公子公族而后妃所教於宫中者歟于於也指所往也故毛氏以往訓之婦人謂嫁曰歸男以女為室女以男為家室者夫婦所居而家則一門之內也處室家而皆得其宜女子之賢可知矣桃之夭夭有蕡其實興也之子于歸宜其家室興意蕡大也以實之大起興見其當有嗣子之昌也上章言室家以宜室而推及於家也此章言家室以宜家而歸本於室也皆見化本於閨門之意桃之夭夭其葉蓁蓁興也之子于歸宜其家人興意蓁蓁美盛貌此以葉之盛起興見其當致家道之盛也家人一家之人也家人宜則老老長長慈幼無不得其所矣朱子曰木少則華盛三山李氏曰桃之少壯則結實必大其葉必蓁蓁然盛若非少壯則雖結實不復大雖有葉不復蓁蓁此皆謂女子當及盛年而嫁也然則貴於盛年者不在容色而在於有德耳蓋年少而有德則其精神運用足以宜家而昌大其族此桃夭所以為后妃之化也詩人之意豈借桃以詠容色之美哉桃夭三章章四句東萊吕氏曰桃夭既詠其華又詠其實又詠其葉非有他義蓋餘興未已而反覆咏嘆之耳兔罝經旨曰美兔罝賤士才德兼全能勝武事之任見文王之能揚側陋而野無遺賢也肅肅兔罝椓之丁丁赳赳武夫公侯干城賦也丁陟耕反後凡言丁丁並同肅肅整飾貌罝罟也丁丁椓杙而與空林相應聲設兔罝而肅然整飭可以見其人之不苟矣赳赳武貌以居武職故曰武夫公侯指文王見文王未嘗稱王也干盾也扞蔽如盾防守如城謂其勇力足以任守禦也肅肅兔罝施于中逵赳赳武夫公侯好仇賦也施設也中逵謂九逹之道中也爾雅云九逹謂之逵好仇者相與為友也謂其智謀足以資論議不但干城而已肅肅兔罝施于中林赳赳武夫公侯腹心腹心同德之謂謂其忠信足以寄腹心不但好仇而已夫以守禦武夫而其德猶如是可見周南之世賢者在位能者在職而所謂才者皆本於德也豈專以勇力為武者哉兔罝三章章四句芣苡經旨曰美后妃無嫉妬而欲衆妾之有子也舊説化行俗美家室和平婦人無事相與采芣苡以為樂恐非婦人之宜而亦不得為俗美矣文王之化豈如是哉采采芣苡薄言采之采采芣苡薄言有之賦也芣苡車前蓋宜子之草也欲宫中之人宜子而皆采芣苡可以見后妃之不妬忌矣采始求之也有既得之也采采芣苡薄言掇之采采芣苡薄言捋之賦也掇拾也捋取其子也采采芣苡薄言袺之采采芣苡薄言襭之賦也袺以衣貯之而執其袵也襭以衣貯之而扱其袵於帶間也采而有有而掇掇而捋捋而袺袺而襭采收之序如此芣苡三章章四句漢廣經旨曰美文王使人及時嫁女以絶其逰戲之端也舊説以為文王之化及於江漢故其出遊之女人望見之而知其為端莊靜一非復前日之可求且當于歸而欲秣其馬其心猶愛慕之則文王之化獨能使婦人女子知禮義而不能化男子説懌女美之本心也豈所以語文王之治哉南有喬木不可休息興也漢有遊女不可求思興意漢之廣矣不可泳思江之永矣不可方思比也息韓詩作思當從之上竦無枝曰喬大抵木下蟠則隂廣上竦則隂少云喬木則其下無蔽翳矣蓋狎邪之人平時於此求遊女而今不可休故即此以興遊女之不可求也漢水自西流至漢陽而江水自南來合焉主漢而言也泳潛行也方桴即竹筏也漢水合江則闊故言泳江則其流本長故言方本詠漢遊女而併及於江者蓋遊女之不可求者以其既嫁也既嫁則地近人逺咫尺千里語其近則如漢之不可泳語其逺則如江之不可方蓋即遊女所近之水逺不可從者以為比皆美文王之辭也翹翹錯薪言刈其楚興也之子于歸言秣其馬興意漢之廣矣不可泳思江之泳矣不可方思比也翹翹髙竦貌錯雜也楚木名荆屬孔氏曰楚在雜薪中尤翹翹者是也秣飼也文王之治先使漢之遊女及時歸嫁以絶其好遊之心蓋其施為之序自化大族始所謂巨室之所慕一國慕之也如翹翹錯薪之中而刈其楚則以楚比巨室之特出者以起興而言遊女方秣馬以嫁而平時欲求者皆不可得此文王正民風之首務也翹翹錯薪言刈其蔞興也之子于歸言秣其駒興意漢之廣矣不可泳思江之永矣不可方思比也蔞蔞蒿也陸璣曰葉似艾白色長數寸髙丈餘據此則蔞亦雜薪中之翹翹者上章言刈木此章言刈草蓋因喬木之下無蔽翳而言駒小馬之名漢廣三章章八句汝墳經旨曰婦人因其夫免於征役而以得遂室家之願歸德於文王也文王時為西伯而汝在豫州已依為父母則此時已得三分天下有二之人心者歟遵彼汝墳伐其條枚未見君子惄如調飢賦也調音周汝墳汝水邉之墳起如墳也枝曰條幹曰枚惄思食之意調一作輖謂重載也思日久則亦重矣君子行役於外其妻為樵蘇之事而親伐薪則庶人之妻也此蓋喜其夫初歸而追賦其未歸時思念之情也遵彼汝墳伐其條肄既見君子不我遐棄賦也斬而復生曰肄伐枚而又伐其肄則踰年矣至是見其君子之歸而喜其不相棄也云不遐棄則見其夫雖在逺道而亦專念其妻無二心於他慕也魴魚頳尾比也王室如燬雖則如燬父母孔邇賦也魴即今鯿魚身廣而薄魚之少力者也頳赤也魚勞則尾赤魴尾本白而赤則勞甚矣且取少力而勞以為細民困於重役之喻燬以紂之酷烈言父母指文王孔甚邇近也蓋下民征役之勞實由紂酷烈之政此本文王未專征伐時言也及既為西伯德化漸行則從役者歸得遂室家之願而婦人因謂其夫可依父母以宜其家也當紂之虐連年逺役猶不敢違而况於文王之行仁者乎其尊君親上之意藹然見於言表矣華谷嚴氏謂是時商王尚存西伯之事皆幹蠱王室婦人從而勉其夫以王事雖急如火不得少休然父母相去不逺不必念家而怠王事此言甚厚但既有文王專征伐則從役之民豈復憂王室之如燬乎故意此征役之歸必已被文王之澤矣汝墳三章章四句麟之趾經旨曰此借麟以美文王之化能行於子姓見治國平天下之本在於一家之仁也麟之趾振振公子于嗟麟兮比也于音吁後凡言于嗟並同麟麕身牛尾馬蹄不履生蟲不踐生草王者至仁乃出獸中之最靈者也牡曰麒牝曰麟通名為麟耳趾足也有足者宜踶而麟有足不踶振振振動之意舊注有訓盛者有訓信厚者而集傳於此則訓曰仁厚皆於振字之義不相關故直以振動釋之麟之定振振公姓于嗟麟兮比也定額也有額者宜抵而麟有額不抵麟之角振振公族于嗟麟兮比也有角者宜觸而麟有角不觸麟仁獸也其性不殺見之者皆感悅焉而非盛世則不出文王之德由親親而逹於仁民愛物故其公子姓族皆振動其良心莫不興起於仁可以任民物之責皆文王之化也故即麟以比文王而嘆之曰于嗟麟兮蓋美其能感動人者皆自近始其仁亦如麟之世不常有也麟之趾三章章三句詩説解頥正釋卷一
