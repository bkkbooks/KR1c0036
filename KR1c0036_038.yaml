body:
  text: 詩說觧頥字義卷六明季本撰小宛一章鳴鳩似山鵲而小短尾青黒色多聲華谷嚴氏以為鶻鵰也即氓詩食葚之鳩郯子所謂鶻鳩氏司事莊子所謂鷽鳩也非斑鳩也陸農師曰鷽鳩多聲故名鳴鳩鳴鳩小物决起而飛搶榆枋時則不至控於地而已矣今飛鳴戻天勉強故也性食桑葚三章螟蛉桑上小青蟲也似歩屈其色青而細小蜾臝細腰土蜂也俗呼螉舊說蜾臝取桑蟲負之於木空中七日而化為其子其說蓋本陸璣蟲魚䟽而范氏觧頥新語乃曰近世詩人取蜾臝之巢毁而視之乃自有細卵如粟寄螟蛉之身以養之其螟蛉不生不死蠢然在穴乆則螟蛉盡枯其卵日益長大乃為蜾臝之形穴竅而出蓋此物不獨取螟蛉亦取小蜘蛛置穴中寄卵於蜘蛛腹脅之間其蜘蛛亦不生不死乆之蜘蛛盡枯其子乃成今人養晚蠶者蒼蠅亦寄卵於蠶之身乆之其卵為蠅穴繭而出殆物類之相似者而以為說者考之不精此其為說似嘗究物理者然自莊列揚雄皆有純雄自化類我速肖之說則其來已乆而非起於漢儒矣且與詩義相合豈范氏所言别是一蟲而誤指為果臝歟不然則蜾臝之與螟蛉有互相育化之理邪姑两存之小弁一章鸒斯鸒鳥名斯語辭爾雅謂之鵯鶋郭璞註云鴉烏也小爾雅以為小而腹下白不反哺者謂之雅烏白項而羣飛者謂之燕烏今按烏之得名以其純黒也純黒則腹下不白此反哺之烏也若雅則腹下白及頸有白者不可以為烏矣然皆以烏名而北風集傳釋莫黒匪烏亦以為鵶鵶與雅即鴉也豈鴉烏可以通名而其或黒或白則不可以無别鸒斯本以名鴉以其不反哺者言也何人斯七章塤箎皆樂器土曰塤大如鵞子銳上平底似稱錘六孔竹曰箎長尺四寸圍三寸七孔一孔上出徑三分凡八孔橫吹之蓼莪一章莪蘿蒿也一名蒿陸璣曰蘿蒿生澤田漸洳之處葉細科生三月中莖可生食又可蒸香美華谷嚴氏曰始生為莪長大為蒿莪至長大之時則非莪矣乃蒿也其始為莪猶可食其後為蒿則無用蔚馬薪蒿也蒿之尤粗大者也據此則莪蒿蔚本一種也初生為莪既長為蒿尤大為蔚爾雅則分而為三曰莪則以蘿釋之其義如前陸璣所云是也曰蒿則以釋之郭璞謂今青蒿香中炙啖者曰蔚則以牡釋之郭璞謂無子者然陸璣牡蒿三月始生七月華華似胡麻而紫赤八月為角角似小豆銳而長意此似非無子者既曰無子則蔚又何從生乎故蒿與蔚必皆莪之所成也華谷之言是矣鹿鳴食野之蒿與菁菁者莪皆此莪與蒿也但蒿之為種多矣蓋草之髙者也其草至秋髙大故曰蒿有蘩則白蒿也說見采蘩字義有蓬則蓬蒿也說見伯兮字義有蕭有蓍並蒿属也詳見曹下泉字義又有艾即艾蒿也爾雅謂之氷臺可以炙而乂病故謂之艾乂病則安故字書訓艾為安此皆詩中所載蒿類之相疑者也故併論於此三章缾酒器舊説皆以為缾小而罍大惟華谷嚴氏謂缾非酒器如易羸其缾之缾因以罍為罍水在洗之罍而皆云盛水之器則當為以缾汲水而注之於罍是謂貧貽父母之耻也義近卑污惟以為酒器則卷耳釋金罍者固曰酒器容一石而禮器尊於缾之缾卑賤用之則酒器之小者也蓋以缾取酒於罍而於維罍之耻義不背矣大東一章匕其制如匙雜記云匕用桑長三尺吉禮則用棘蓋用桑者謂䘮祭也用棘者吉祭及待賔客也長三尺然後可以載鼎肉而黍稷之七其制則小也孔氏曲禮䟽曰飯黍無用箸當用匕故少牢廪人溉匕與敦註云匕所以匕黍稷也則黍稷之匕與牲體之匕誠不同焉敦即簋之别名也陳氏祥道曰敦量不過三豆髙不過一尺則黍稷之匕小矣集傳謂匕以載鼎肉而升之於爼是待賔客之禮也則以大匕言矣但大東詩意所重在民食之足主於載黍稷耳五章漢天河也在箕斗二星之間其長竟天餘詳見雲漢字義織女在漢旁三星鼎足望之跂然而成三角三角即三隅故毛氏曰跂隅貌襄鄭氏以為駕謂更其肆也集傳曰天有十二次日月所止舍所謂肆也經星一晝一夜左旋一周而有餘則終日之間自卯至酉當更七次也六章牽牛亦漢旁星爾雅以河鼓為牽牛然李巡孫炎皆以為二星以漢天文志考之河鼓在牽牛之北則非一星矣啟眀長庚或以為二星或以為一星然經文分東西言之則二星也夾漈鄭氏曰啟眀金星長庚水星金在日西故日將出則東見水在日東故日將沒則西見集傳謂金水二星常附日而行以其先日而出故謂之啟眀以其後日而入故謂之長庚與夾漈說同天畢畢星也狀如掩兎之畢七章箕四星其踵似箕且有舌上二星為踵下二星為舌踵狹而舌廣斗六星其方如斗且有柄四星為斗二星為柄箕與斗相連之宿而箕在斗南故稱南箕如璧在室東而稱東璧井在參東而稱東井也斗在箕北而稱北斗義亦如之非謂三垣之北斗也若三垣之斗則常見不隐不但見其西柄而已翕鄭氏訓引於義難通惟毛氏以為合庻㡬近之而亦未詳也蓋翕對張而言箕之舌廣如開張之狀張正所以翕也故以翕言猶治亂而曰亂也舌張欲翕是欲吞噬於東之意也西掲其柄是欲挹取於東之意也觀此詩所叙之星自漢箕以至於畢皆戍亥月夜所及見之候也而又有葛屨履霜之言其必作詩者因時有感而借以發意歟四月六章鶉鵰之大者又名鶚陸農師曰鵰似鷹而大黒色俗呼皂鵰其飛上薄雲漢三山李氏曰若以為鶉鵲之鶉則無戾天之理七章桋舊說以為桋赤棘也樹葉細而岐銳皮理錯戾好叢生山中中為車輞如此則不可以言於隰矣華谷嚴氏取曹氏茅始生之說今從之鼓鐘一章淮水出汝寕府信陽州桐栢山至淮安府安東縣入海楚茨一章茨蒺藜也棘刺也經有二棘一名小棗一名蒺藜皆以其有刺故謂之刺楚茨所言乃茨之刺也華谷嚴氏曰方言凢草木刺人北燕朝鮮之間謂之茦自關而西謂之刺江湘之間謂之棘享祀皆祭之通名也或曰享或曰祀或曰祭一而已矣蓋享獻也以禮物獻神之謂也故書傳云奉上之謂享祀字從已蓋懼精誠之通於神者或有已時故說文曰祭無已也祭者與神相交際也其字左從夕肉也右從之手也象右手持肉以獻於神也周禮以祀為祀天神祭為祭地示享為享人鬼若以互文見意則可若分為專名則不可經中凢言以享者多作享而此章則自古本以至吕嚴諸本亦俱作享惟集傳作饗必傳寫之誤也享古字為亨後人妄作一畫耳享與饗義各不同雖或有通用者而此章之享則本非饗也下章神保是饗之饗從鄉從食謂向之而饗其食也故廣韻曰向也歆也受也饗又為燕饗之饗義與此不同詳見彤弓字義三章俎狀如今神前案卓周設下跗於两端如户閾然故謂之房也陳氏祥道曰髙下脩短無文舊圖謂髙二尺四寸廣尺二寸不可考也竊意古者席地而坐故籩豆簠簋皆可就食周禮旊人云簋豆皆崇尺則簠籩之崇可知俎以陳牲非席地可取食者宜略髙矣俎有薦腥薦爓薦熟之不同腥謂豚觧而腥之殊两肩两脾两胉與脅為七體此上古之禮也爓謂體觧而爓之又分豚觧為十一體以湯爓之而不全熟此中古之禮也熟則以其所爓者先煑於鑊既熟則以鼎重煑之升於俎此近代之禮也既熟於鑊而又易鼎以煑之必欲致㓗故也内饔䟽所謂陳鼎於鑊西俎陳於鼎西南以牲體入鑊時已觧訖取於鑊實於鼎取於鼎實於俎者是已又割其餘以制之則有燔炙之事燔者火燒之名炙者逺火之名難熟者近火故肉則燔之易熟者逺火故肝則炙之燔炙皆臠而貫炙之燔亦炙也但以逺火近火而異名耳燔炙亦皆熟之但比熟則更加味而馨香耳俎由鼎升俎有九鼎亦有九九之下有七有五有三牛也羊也豕也魚也腊也腸胃也膚也鮮魚也鮮腊也俎之九也去鮮魚鮮腊則為七俎矣又去其二則為五俎矣又去其二則為三俎矣此皆正俎天子諸侯大夫士之所以别也又有陪俎非正俎則膷臐膮之三臛臛者羮也即鉶羮也牛臛為膷羊臛為臐豕臛為膮又有昕爼所以載心舌而燔炙之皆從獻之物故鄭氏以為從獻之俎考之禮俎無從獻之名意者其本在九爼而割者歟九俎皆神前之俎神俎之體尸既嚌而反其餘於昕俎者謂之尸俎尸俎之外又有主人主婦祝佐賔長兄弟宗人衆賔及衆兄弟内賔宗婦公有司之俎而楚茨所謂為俎孔碩者則䝉執㸑而言謂神前薦熟之俎也燔炙則特舉其烹調之美而言以見神之所嗜耳東萊吕氏曰為俎孔碩謂薦熟也或燔或炙謂從獻也燔肉與肝炙豈得謂之孔碩乎是以俎分大小也亦過於分析矣又牲之升俎意必有盛之之器如膷臐膮之臛盛於鉶也禮家言升牲於俎者似直以俎盛之此以語腥猶可若以語熟則棘匕載肉於鼎而升之俎懼其有失脫則執畢义以臨之特牲饋食註可考也况可在俎而無盛乎無盛則進神之時將移俎以從之乎周禮掌蜃祭祀共蜃器陳氏祥道謂腥曰脤熟曰膰蜃以盛之其說是已但註䟽多不以蜃眀言於俎耳牛人祭祀供牛牲之盆謂殺牛以盆盛血亦禮家釋血毛者之所不言也豈可盛肉而不以蜃乎蜃器蓋即今之托盤以蜃為飾而色白故以蜃名耳豆所以盛内羞庻羞内羞榖物謂􅀈食糝食之類庻羞牲物如麋臡鹿臡之類三羞所以盡歡心也賔客尊者為賔賔長也卑者為客衆賔也按禮家每以諸侯為賔卿大夫為客孔氏䟽所謂尊卑異也然又曰賔客相對則别散文則通是亦可以通言也但此以為賔為客别言之似有尊卑之差耳又按特牲但言宿賔孔氏曰士將祭宿属吏内一人為三獻之賔不言筮賔也蓋擇之於諸臣耳集傳以賔客為筮而戒之使助祭者則與孔䟽不同矣獻酬者賔既獻尸而遂與之相獻酬也交錯旅酬也主人酌賔曰獻賔飲主人曰酢主人又自飲而復飲賔曰酬酬𨗳飲也特賔飲一主人則飲二蓋欲𨗳賔使飲也賔受之奠於席前而不舉至旅酬而後少長相勸交錯以徧也笑語言交談時皆歡樂也鄉射記曰古者於旅也語文王世子曰凢祭合語陳氏澔謂旅酬之時皆得言說先王之法㑹合義理而相告語也五章位謂阼階上西南乃主人聼尸命之位及既告利成而後䧏阼階下送尸集傳於工祝致告之前即為往阼階下西南之位則與儀禮不合矣工祝致告謂告利成也與前章告嘏辭者不同告嘏在酳尸尸酢主人之時告利成則祭畢而尸遂起矣皇尸尊稱之也然上下皆得通稱故特牲士禮而曰皇尸卒爵少牢大夫禮而曰皇尸未實此詩皇尸則天子之稱尸也徹鄭氏謂諸宰徹去諸饌君婦籩豆而已朱子於論語註則曰祭畢收其俎蓋互相備也信南山五章清酒者清㓗之酒美酒之通名此言清酒則鬱鬯之酒也鬱鬱金香草也鬯從米從凵釀米在器之義以秬黍醸酒而條暢故謂之鬯以鬱和之然後謂之鬱鬯郊特牲云鬰合鬯言合則鬰鬯本二物禮緯以鬯即為鬰金草誤矣蓋灌地䧏神之獻灌與祼同亦謂之祭非指朝踐饋食酳尸之時故用鬰鬯以其氣香可以求神也朝踐饋食酳尸所獻之酒則用周禮所謂五齊五齊用稻秫麯蘖為之非鬰鬯也五齊之下又有三酒則諸人所飲之酒也蓋五齊皆特醸其味薄鬼神享德不享味唯以致敬而已三酒皆舊釀其味厚卑於五齊則人所飲也三酒之中亦有清酒久醸最清味比諸酒為尤厚然非祼神之清酒也烈祖既載清酤乃祼神之酒也與此祭以清酒同若旱麓清酒既載則兼祼獻而言鬰鬯五齊矣韓奕清酒百壺則諸人所飲之三酒也故清酒者美酒之通名猶曰爾酒既清云耳太古無酒祭用元酒元酒者水也非清酒也元酒又與眀水不同眀水者㓗著之義由月而生故謂之眀即周禮司烜氏掌以鍳取眀水於月者也後世有酒則眀水元酒設而不用周禮司罇彛䟽云鬰鬯與齊皆配以眀水三酒配以元酒存古之義也毛鄭氏以為告純血鄭氏以為告殺蓋本楚語觀射父所謂毛以示物血以告殺之言而以示物為告純者則又本於郊特牲毛血告幽全之物貴純之道也此皆未為深眀禮意夫純與殺豈可告於神者㦲禮所謂血毛告於室者謂薦血也薦血則必當以毛從血而告之以見血本於牲之純耳所重在於薦血也取膋則以脂染蕭合黍稷而焫蕭合羶薌也大意如此祭義云祭之日君牽牲既入廟中麗于碑卿大夫袒而毛牛尚耳鸞刀以刲尚耳者以耳毛為㓗也或以為牛耳濕則無病故尚耳殊不知大牢中有羊豕之血亦取其毛以别之豈以無病而耳濕邪其以鸞刀以刲属於卿大夫袒而毛牛之後則固謂卿大夫所殺也而臨川王氏及長樂劉氏乃以為王執鸞刀以親殺此何據邪考之儀禮特牲則曰主人立於門外視側殺少牢則曰主人即位於廟門之外司馬刲羊司士擊豕宗人告備乃退則士大夫猶視殺而不親刲安有天子而可以自殺牲乎若祭義君牽牲入廟問而殺於神前之說則非所以體先祖不忍聞聲見死之心既辯於廟祀考成矣今其說附於廟制考義末卷甫田一章耘除草耔壅本蓋后稷為田一畆三畎廣尺深尺而播種於其中苖葉以上稍耨草因壝其土以附苖根壟盡畎平則根深而耐風與旱也此耘田也亦属省耕之事二章社土神亦名后土土以代天生物養人百榖皆土所出故祭社則以稷配蓋后稷能殖百榖而有功於民者也鄭元以為社是五土之神而配以勾龍稷是原隰之神而配以后稷王肅則謂社祭勾龍稷祭后稷皆人鬼也而不以為土榖之神鄭說蓋略近之而亦未盡是也夫稷土所生之一物也以后稷養民功大故特舉以報之緫命之曰社稷五榖已在土中不必以五榖為稷而與社列為二祭也故經傳凢言祭者但言祭社而稷在其中矣祭法曰王為羣姓立社曰大社自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成羣立社曰置社大社者即冡土也其位在國庫門之内右周禮小宗伯所謂建國之神位右社稷左宗廟者也國社之建亦如之故大王為諸侯時建社亦冡土也王社所在古無眀文崔氏云王社在籍田王所自祭以供粢盛侯社亦在籍田其說於義為長蓋耕籍終畆之庻人亦有嵗時祭禳讀法之事自宜别立一社也此社既為籍田而設亦農事也然而一事之社不得與大社國社同尊宜不以稷配也故西漢及魏有官社無官稷晋之時有帝社無帝稷官社帝社即籍田之社也而有社無稷其尚存古之遺制歟陳氏祥道曰王社侯社國中之土示而已無預農事故不置稷其言不置稷者則是而謂無預農事則失之矣天子之社又有郊社並稱者則似周禮大司樂澤中之方丘與地上之圜丘相對者也圜丘一名泰壇說者以為南郊之丘方丘一名泰折說者以為北郊之丘是以國之南北郊分二處也然以禮考之則天地本合祭者也中庸曰郊社之禮所以事上帝也地之氣主宰於天故言上帝以兼之而言郊多不言社也祭法曰燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢夫犢角繭栗者也祭天牛角繭栗而用特牲祭社牛角尺而用大牢今緫言騂犢亦主宰乎天而言也以其合祭故以地從天以地從天則稷之配天即其配社者矣彼圜丘方丘既有此名果何所用㦲竊意圜以象天方以象地因形為丘理亦無害但郊社既合自當同壇方圜二丘宜依一處用以為燔柴瘞埋之所而已至於行禮奏樂恐湏在合祀之郊而禮家以南北二郊截然分為二祭其果周公制禮之意乎王制云祭天地社稷為越紼而行事以天地社稷並言則天地者郊社之合祭也社稷者大社之專祭也郊社在郊大社在社郊社之位其不同者如此考之召誥周公營洛丁巳用牲于郊牛二翼日戊午乃社于新邑牛一羊一豕一郊用牛二者以稷配天而異牲也社用牛羊豕各一者大牢也因初定大社之位而祭又郊天方以稷配則大社可從略矣不然在禮天子社稷皆大牢諸侯社稷皆少牢謂之皆則社與稷皆異牢也而安可以一言㦲然此為營新邑而告祭非常祭也求禮意者宜亦從宜焉自合祭之外社皆以稷配也凢國之農事兵事與夫大故天烖無不祭且告者郊特牲曰社所以神地之道地載萬物取財於地故敎民美報焉周禮肆師社之日蒞卜來嵗之嫁大祝國有大故天烖彌祀社稷大師宜於社設軍社大㑹同宜於社建邦國先告后土大司㓂大軍旅蒞戮于社此皆社之所宜有事者也而民間之有置社雖與大社國社大小不同然亦為農事而立猶漢之里社也蓋其嵗時祭禱讀法之事與籍田之社同但一鄉之社亦猶一事之社也故亦不置稷焉孔氏謂天子諸侯大夫皆有稷則亦仍原隰為稷神之誤耳若甫田二章之所謂社則天子省耕於畿内而所至之方與方神合祀之社蓋春祈之事不當與常祭並論矣方與祊同謂四方之祭也周禮大司馬春獻禽以祭社秋致禽以祀祊月令建戍之月祭禽於四方即其事也但四方之祭見於禮書者屢矣其義亦多不同而說者卒無定論有以為五官之神者有以為四望者有以為八蜡之百物者隨其文義而求之各有攸宜若強合於一則有不通者蓋禮家多以四方為四望與山川並列而四望即望于山川也似不可以為方然小宗伯及司服皆序四望于山川之上則四望之外又有山川矣是以五嶽四海為名山大川而又以山川列其下則為國内山川之小者矣曲禮謂天子祭四方祭山川諸侯則曰方祀祭山川以四方對方祀則四方為四望而方祀則祀其方之名山大川如梁山為晋望江為楚望也其餘山川則亦其小者矣曰四方又曰山川與郊特牲言祭四方而下又言祭山川亦猶小宗伯司服之言四望山川也四方固可以言四望而與社對祀此何禮乎若以四方為八蜡百物之神則疈辜之小祀而五官之神又人鬼也皆不應與社相對且五帝之數目逾於四何可以強合於四方哉竊意方社之方乃四方之合祭即土氣之運行於四時而功用充滿於四方者也但以其質具於地則謂之社以其氣行於天則謂之方其實一也故春初氣尚聚則本其含章而言祭則因壇於社壝而求神於后土秋後氣已分則就其發用而言祭則為壇於郊外而求神於四方皆順氣之聚散而祭之所以不同也聖人知鬼神之情狀故其制禮如此不然則社主春祈方主秋報秋報之方何與於五帝四望百物㦲方亦通於上下之祭也但甫田之方則天子省耕而合社以祈耳田祖即先農謂神農也孔氏曰神農始敎造田謂之田祖先為稼穡謂之先嗇神其農業謂之神農名殊而實同也今按神農雖嘗為帝而農事由之以起故天子諸侯為民祈報者皆得祀之或據郊特牲䟽以為先嗇古之天子而諸侯不得祭殊不知禮父為天子子為士塟以天子祭以士是士亦可祭天子也特其禮物有殺耳况萬世之人共享農利而為民祈報之祭可以不及乎其説亦太拘矣琴瑟協比而歌也擊鼓所以節樂也鄭氏釋此蓋本周禮籥章凢國祈年于田祖則龡豳雅擊土鼓以樂田畯而為之說殊不知祈年乃孟春祈榖于上帝而後及田祖之事專祭田祖則詩宜有頌如豐年之類似不當用豳雅也其曰龡豳雅者但可以樂田畯耳而况此章以田祖合祀社方非祈年于田祖之專祭又安得用樂田畯之樂乎大田三章方房也以孚甲初生未合時言與生民既方之訓房者不同彼謂生意初動於房中未有孚甲也孔氏於此則謂米外之房米生於中若人之房舍也孚者米外之粟皮甲者以其在米外若鎧甲皂以實未堅時言長樂劉氏曰榖粒之生而未充滿曰皂堅華谷嚴氏曰成實而堅也好禾之無所損也華谷嚴氏曰禾雖已堅實或大風所偃或淫雨所腐或早霜所殺之類則損壊不好稂童梁莠稗草皆害苖者也螟螣蟊賊皆害苖之蟲爾雅食苖心螟食葉螣食節賊食根蟊陸璣云螟似􅀈蚄而頭不赤螣蝗也賊桃李中蠧蟲赤頭身長而細耳或說云蟊螻蛄食苖根四章騂黒毛氏以為騂牛也黒羊豕也今按牛羊豕者大牢也羊本白牡然亦有黒者故併豕而言黒也來方者謂所至之方非以方為四方之神也蓋天子省耕至於其地一時報成不能分祭故合田祖於社方而祭之詳見豐年正釋鄭氏則引周禮牧人陽祀用騂牲隂祀用黝牲之文黝黒也謂陽祀祭天於南郊及宗廟隂祀祭地於北郊及社稷原鄭之意不知以何神為陽而用騂何神為隂而用黝邪即其所謂祭地者而言之則祭法有云燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢地亦用騂而不以黝别陳氏澔固嘗疑之而謂隂祀者或是他祀歟然亦必指小祀耳孔氏則又遷就鄭說而謂方祀各以其方色牲如大宗伯青圭禮東方赤璋禮南方白琥禮西方元璜禮北方皆有牲幣各放其器之色及牧人望祀各以方之色牲之說然孔子嘗謂仲弓犂牛之子騂且角雖欲勿用山川其舍諸則魯在東方分青土以立社者也其方望之山川宜亦依方之色而用青矣何為而亦以騂邪竊意周已易命改觀尚赤以為一代之制故祭必用騂以為神之所享在此而豈區區為觀美哉故小祀不必備禮者則毁事也或用厖可矣而用騂之正禮無間於天地隂陽也禮家附為紛紛之說其必秦承戰國之陋制歟况來方禋祀乃以先農主方社而合祭者也何所取於分方而各以其方之色邪頍弁一章蔦寄生也葉似當廬子如覆盆子赤黒甜美本草曰一名寓木凡桑桞楊楓等樹上皆有之此物自感造化之氣而生别是一物也女蘿兎絲也一名唐蔓連草上黃赤如金陸農師曰上有兎絲下必有茯苓其實不属也淮南子云兎絲無根而生蛇無足而行魚無耳而聼蝉無口而鳴皆自然者也賔之初筵一章大侯謂燕射之侯主君而言故謂之大抗舉侯而張之也凡射張侯而不繫左下綱中掩束之至將射司馬命張侯弟子脫束遂繫下綱蓋侯上下左右皆有舌以維持之而綱則持舌繩也事未至故左下綱未繫其餘皆已繫之於植侯向堂以西為左掩向東也將射則脫束而繫左下綱以射也射夫羣臣也同以比射夫之耦射禮選羣臣為三耦三耦之外其餘各自取匹謂之衆耦爵罰爵射以酒為罰者恐其不勝則氣有不平故假酒以樂之耳而勝者之發有的但祈免此爵而已可見射而飲酒非為好飲也舊說謂祈爾爵為求勝以罰不勝則疑於欲人之負者未為譲道也惟曹氏曰求免於罰爵蓋本射義求中以辭爵之意華谷嚴氏取之其義似勝當射時用酒惟以示罰非有所求也采菽一章衮衮冕九章之服也凡冕服皆元衣而纁裳故曰元衮衮畫龍於衣九章之第一章也黼繡於裳九章之第八章也九章之服衣有五章裳有四章但言衮黼者各舉其一而以黼協韻虞書孔氏䟽曰黼若斧形考工記云白與黒謂之黼釋器云斧謂之黼孫炎云黼文如斧形蓋半白半黒似斧刃白而身黒黻謂两已相背謂刺繡為已字两已字相背也考工記黒與青謂之黻刺繡為两已字以青黒線繡也據此則黼亦以黒白線刺如斧半白半黒之形矣餘詳見終南及九罭字義角弓八章蠻毛氏以為南蠻髦書牧誓作髳孔氏以為髳在巴蜀是也今按荆楚以南皆南蠻之地則西與巴蜀連界矣括地志以為古髳國之地有髳州則今雲南楚雄府定逺縣也如此則去周京太逺而安能與庸蜀徽盧彭濮同從武王伐紂哉當周之衰荆楚率羣蠻為中國患尤梗王化故以此况之都人士二章臺笠陸農師曰臺夫湏莎草也可以為蓑又可以為笠則蓑者披於身者也笠者戴於首者也此野人出田時之服一以禦暑一以禦雨緇撮緇布冠其制小僅可撮其髻故曰緇撮庶人雖得服委貎而儉者服緇布冠故緇布冠庶人之常服也瓠葉二章炰燔并三章炙鄭氏箋謂治兎之宜鮮者毛炰之柔者炙之乾者燔之孔氏䟽曰鮮而新殺者合毛炰之若割截而柔者則臠貫而炙之若今炙肉也乾者謂脯腊則加之火上燔之若今乾脯也柔謂殺已多日而未乾也今按合毛炮之說者多以爓去毛為觧然爓去毛非包字之義也蓋必以物而包燒之故曰炰亦不必專言以毛包也詳見六月字義燔炙者楚茨箋以為燔肉炙肝䟽謂燔者火燒之名炙者逺火之名以難熟者近火易熟者逺之故肝炙而肉燔也華谷嚴氏又釋之曰燔燒也近火燒之如今之燒肉火焰所及也瓠葉傳云加火曰燔䟽以為加置火上是燔燒之也炙瓠葉傳云炕火也䟽以為炕舉也以物貫之而舉於火上以炙之是炙為逺火也此皆因註䟽而為說也惟錢氏曰凡肉置火上曰炰爇之曰燔近火曰炙此與前說不同蓋以燔為爇之於釡内如今之炒肉也炙為燒之於火上如今之肉脯也其說似亦有理姑两存之以備考焉但以炰為肉置火上則無以見包字之義耳何草不黃四章有棧之車棧閣也閣木於車上故謂之棧車周禮巾車註云士乗棧車庶人乗役車先儒皆以役車為牛車則棧車駕馬非牛車也而此詩棧車毛氏以為役車者以其出於民言也夫役車在鄉以牛任載者也若行役四方其所載者乃司馬法所謂斧斤鑿鋤之類古之人如召伯之城謝蓋亦用之然必官與之顧直不空役也蓋古者寓兵於農公乗之外不以煩民詳見讀禮疑圖卷三今以逺征非牛車所能任故用駕馬之棧車而實役於民間故毛氏直以為役車耳此賦於公乗之外者也而民困甚矣詩說觧頥字義卷六
