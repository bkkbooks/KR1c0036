body:
  text: 詩説解頥正釋卷二明季本撰召南説見周南鵲巢經旨曰此以妾媵之從至備百兩美諸侯妻之無嫉妬也媵女雖父母之事然其所教於女者亦足以法矣維鵲有巢維鳩居之興也之子于歸百兩御之興兩音意亮後凡以車兩言者並同鵲鳩皆鳥名鳩拙鳥不能作巢多在屋瓦間或於木上架結木枝初不成巢便已生子往往墜􅙿隕雛鵲作巢甚堅既生雛散飛則棄而去容有鳩來處彼空巢者此有似於諸侯夫人之嫁而其妾媵與於車乘之中也故即以起興之子指夫人也百兩百乘也車有兩輪故稱兩諸侯一娶九女二國來媵皆以姪娣從故車有百兩之多百兩者諸侯之禮也御用也與服御之御同舊説訓迎因謂諸侯之子嫁於諸侯送御皆百兩殊不知此詩本為諸侯夫人不嫉妬而作不宜遽及所迎之車也維鵲有巢維鳩方之興也之子于歸百兩將之興意方所也以為安居之所將送也維鵲有巢維鳩盈之興也之子于歸百兩成之興意盈滿也成成禮也初言御治具而用之也中言送則既行而送之也末言成則既至而禮成也其言之序如此鵲巢三章章四句天下之化無不起於閨門鵲巢乃諸侯妻當于歸時妾媵之從至備百兩見其無嫉妬之心此后妃之化及於南國而嫁女者皆以此成其女也宜家人以正四國實本於此故以為召南之首采蘩經旨曰此美公侯之夫人有肅雍之德而先序其采微菜以供祭祀見其德之可羞於神明也于以采蘩于沼于沚于以用之公侯之事賦也于以采蘩于澗之中于以用之公侯之宫賦也蘩非水菜而生於水中之地則潔矣故夫人以之供祭鄭氏所謂以豆薦蘩葅者是也舊説采蘩以供蠶事非矣蘩固可以生蠶然隨地所生皆可以取今于沼沚澗中則取之水中之地貴其潔也事祭事也宫廟也又云公侯之事公侯之宫則語意亦皆不為蠶事發者其為奉祭祀之用無疑矣被之僮僮夙夜在公被之祁祁薄言還歸賦也還音旋後凡還歸之還並同被與髲同髢也僮僮竦敬貌步雖移而被不動也祁祁舒遲貌安舒無疲倦也此形容夫人之敬德在於公所助祭其被則僮僮然竦敬無忽於夙夜及其旋則祁祁然舒遲無所疲倦尚有餘敬也此其肅雍之德蓋有周旋中禮者則雖蘩菜之微可羞於神明矣詩人序采蘩於章首豈無意哉然此疑非后妃不能及此意必周南之詩而誤入召南者歟采蘩三章章四句草蟲經旨曰婦人因君子行役未歸而思念之切也喓喓草蟲躍躍阜螽興也未見君子憂心忡忡亦既見止亦既覯止我心則降興降户江反後凡意歸降之降並同喓喓鳴聲躍躍躍貌草蟲生於草間之蟲阜螽生於阜間之螽草蟲鳴則阜螽躍而從之蓋物類之相感者如此謂微物亦有倡隨之樂而人不如就以為興耳憂者憂其夫之在外也忡忡心不寧也覯遇也止語辭降下也猶言放下心也陟彼南山言采其蕨興也未見君子憂心惙惙亦既見止亦既覯止我心則説興意説音悅後几喜悅之説並同蕨山菜也似龞腳一名為鱉初生無葉時可食土人謂之稂雞惙惙憂之結也言見人有登山而采蕨者雖微菜可以食貧而行役者不如則亦有感而興憂思之意也陟彼南山言采其薇興也未見君子我心傷悲亦既見止亦既覯止我心則夷興意薇亦山菜似蕨而差大如巨擘剝而食之甘美莊子謂之迷陽即山間人所謂迷蕨也夷平也人喜悅則心平夷當世道之衰風俗之薄夫出而婦人獨居不守禮義者多矣惟草蟲之詩能思念其夫行役於外切於憂傷必俟其歸而始夷悅見其心之專一也亦既見覯云者非謂已歸乃待其歸之辭也蓋世所僅有故録以示勸舊説以為大夫妻被文王之化而能思其君子則文王之時如此人者亦婦道之常不足以為異而何為獨有一詩乎且以為大夫妻則亦鑿矣竊意此必民間之婦所作而亦不知其以何風纂入召南耳草蟲三章章七句采蘋經旨曰南國大夫之妻以少女而能敬於主祭故家人敘其事而美之見后妃閨門之化所被深矣于以采蘋南澗之濵于以采藻于彼行潦賦也蘋大萍非藻也藻則但可以養魚而非可茹之物矣濵崖也藻生水底莖如叉股葉如蓬蒿好聚生故謂之聚藻行潦流潦也蘋藻皆可糝蒸為茹本非嘉蔬而澗濵行潦就其所便而不計其潢汙非若沼沚澗濵之潔地采而治之亦可以供祭祀所重在於敬耳蓋為末章有齊季女而發也于以盛之維筐及筥于以湘之維錡及釡賦也盛音成方曰筐圓曰筥皆竹器湘者烹之粗熟而淹以為葅也錡釡屬三足曰錡無足曰釡則筐筥錡釡乃盛湘所常用左氏以筐筥錡釡之器可薦於鬼神為説而毛氏亦為抑辭因曰陋器説者遂多襲之殊不知此器但為盛湘之用不以陳於神前有何所嫌而以為陋邪故語物之薄而不足以為美者但在澗濵之蘋行潦之藻而盛之湘之不過為牗下之奠推原制用之由耳于以奠之宗室牖下誰其尸之有齊季女賦也齊側皆反後凡齊敬之齊並同奠置也宗室大宗之廟也牖下室西南隅之奧也尸主齊敬季少也季女為大夫妻以主祭祀則為主婦祭祀之禮主婦主薦豆實以葅醢上言采蘋於澗濵采藻於行潦此非潔地之嘉蔬然奠之於宗室牗下者季女也惟其盡敬所以能薦於鬼神以少女而能敬可見其年未富而德已成蓋后妃閨門之化行於南國而文王修身齊家之效亦可見矣少女非以質美言也采蘋三章章四句甘棠經旨曰民被召公之德者思其人而愛其樹也此必非召南之詩蓋召南詩召公所采而經其手筆者蔽芾甘棠勿翦勿伐召伯所苃賦也蔽芾隂翳茂盛也甘棠棠梨也子白者其味美為甘棠赤者其味澀則為杜翦謂斷其枝伐謂斬其幹武王既得天下自陜以東召公治之蓋召康公也名奭凡為方伯者皆稱伯説見嵩髙茇取草舍之義謂止於其下以自蔽也蔽芾甘棠勿翦勿敗召伯所憩賦也敗謂殘壞之憩息也蔽芾甘棠勿翦勿拜召公所説賦也説音稅後凡稅止之説並同拜謂攀屈其枝如人之拜也説止也召伯當武王時敷政於諸侯之國而觀省民俗或舍於甘棠之下非其所當居也甘棠久猶茂盛而民思其德不忍翦壞耳舊説以為聽訟於甘棠之下不重煩百姓者則近於刻畫矣戴岷隱蓋嘗辨之伐敗拜皆蒙勿翦翦為輕也華谷嚴氏曰始則相戒不可斬伐而去之中則相戒不但不可斬伐但殘壞之亦不可終則相戒豈特不可殘壞但低屈之亦不可愛之愈深護之愈至也甘棠三章章三句行露經旨曰女子能持擇配之正不為強暴所陵故作此詩以明其志小序謂召伯聽訟貞信之教行強暴之男不能侵陵貞女然詳玩詩辭有似於暴男興訟以迫貞女略不見政教之能禁戢姦邪也先王盛時宜不如此雖使召伯果能聽訟則亦非大畏民志者烏足以語二南之化乎故王雪山謂暴男侵貞女女固可尚男為何人豈王化獨及女而不及男邪意此必衰世之詩録其女之不苟隨耳厭浥行露豈不夙夜謂行多露賦也厭於葉反厭浥濕意行露道上之露也夙早也言本欲早行不憚夙夜但道上多露故不敢耳此以明早行恐為強暴所迫也事宜赴訴故欲早行而又畏不敢出亦可見政治不明橫行者肆貞女不得其所矣誰謂雀無角何以穿我屋興也誰謂女無家何以速我獄雖速我獄室家不足興意角音鹿女音汝後凡爾汝之女並同角尖嘴也雀有咮而無角女指強暴者而言無家謂其無家業也速促也質正於官曰獄室家謂其人凶戾不足與為婚姻也誰謂鼠無牙何以穿我墉興也誰謂女無家何以速我訟雖速我訟亦不女從興意牙牡牙也鼠有齒而無牙墉墻也告辨於官曰訟言雀雖無角而以咮穿屋鼠雖無牙而以齒穿墉皆不可謂其力不能而遂不敢肆也故以興無家者乃無藉之人也苟無禮義則肆其強暴能促人於獄何待於富厚之力哉然非正人則不足與成室家之好故其志不苟從也雖聽訟者未知其能斷與否而女之執正蓋有不可得而奪者矣故特録而美之行露三章一章三句二章章六句羔羊經旨曰美南國之大夫退朝而從容自得見其心之無私也羔羊之皮素絲五紽退食自公委蛇委蛇賦也委音威蛇音移後凡言委他並同羔羊之皮以羔皮為裘即緇衣羔裘也素白也言以素絲為線而縫之縫在裏故不必其色之稱也其縮縫有五故曰五紽紽者縫中突起之名退食退朝而食於家也公公朝也委蛇從容自得之貌言其委順如蛇也羔羊之革素絲五緎委蛇委蛇自公退食賦也革亦皮也緎裘之縫界也羔羊之縫素絲五總委蛇委蛇退食自公賦也縫縫皮合之也新安胡氏曰縫之突兀謂之紽有界限謂之緎合二為一謂之總此詩專重委蛇上疊山謝氏曰中心無愧怍故外貌有威儀使胸中微有愧怍其步趨非躁則急不遲則速安能委委蛇蛇哉華谷嚴氏曰在公之謹飭勉強可能也退食而委蛇則顯微無間矣羔羊三章章四句殷其靁經旨曰婦人以其夫從役在外而思念之故作此詩然不敢必其歸也其思雖切而無怨言亦可見其忠厚之德也殷其靁在南山之陽興也何斯違斯莫敢或遑振振君子歸哉歸哉興意殷音隱後凡殷殷之殷並同殷靁初發聲隱然也山南曰陽何斯斯此人違斯斯此所也或間或之義遑暇也不敢或遑則無一時之暇也殷其靁在南山之側興也何斯違斯莫敢遑息振振君子歸哉歸哉興意息休息也殷其靁在南山之下興也何斯違斯莫或遑處根振君子歸哉歸哉興意處居處也首章但言不敢遑後言遑息遑處則所謂不遑者乃息與處也婦人聞靁聲隱然初發謂其能動物也故以起興而言君子逺行從役不敢或遑其心亦必聞靁而振動思歸矣但王事靡盬未必能即歸耳故曰歸哉歸哉錢氏曰哉疑辭殷其靁三章章六句摽有梅經旨曰世亂民貧女子有父母終無與為主而不得及時歸嫁者願為有室女之同情不能已於有言故作是詩欲男子之早議婚也其言雖若女求於男然欲庶士以婚姻之禮相求則庶士之中猶有所擇而擇吉通言亦不苟從也庶幾知從一之道而無淫邪之心衰世中得如此女者亦可謂不失正矣若謂召南之化則恐文王之時未宜有此失時之女不得其所而至於自言耳摽有梅其實七兮興也求我庶士逮其吉兮興意摽婢小反下章同摽與蔈同韓詩作莩零落也梅摽而在樹者七則零落者多矣士男子未娶者之稱逮及也吉謂卜而得吉也摽有梅其實三兮興也求我庶士逮其今兮興意梅在樹者三則落者又多矣今今此之時也毛氏以為急辭臨川王氏以為不暇吉日之擇皆非也摽有梅頃筐塈之興也求我庶士逮其謂之興意塈本以仰塗為義於梅曰塈則仰取之意也鄭氏謂取之於地則摽梅言有謂在樹而未落盡者烏可以為在地哉云頃筐者謂取之已盡頃筐不能滿也如此則落者又多而實之存於樹者又不及三矣首章曰七二章曰三此章曰頃筐言梅落漸盡而過時也謂者謂庶士當使媒妁通言非謂不待其禮之至而往也但不必大備云耳摽有梅三章章四句小星經旨曰宫中之人進御公所者能敬而安於勤事雖勞不怨也宫中進御之人猶今所謂上直蓋賤者之事非一娶九女中之妾媵可以當夕者也故小序以為賤妾若媵中之妾則為側室豈至自抱衾裯以御其君哉此詩賤妾所自作大抵見其言之忠厚和平耳集傳謂其美南國夫人能不妬忌則未見其然焉嘒彼小星三五在東興也肅肅宵征夙夜在公實命不同興意嘒微明貌三五言其稀昏時星也日始沒則東方之星先見者小而光嘒耳此蓋即所見以起興也肅肅嚴敬貌宵征昏時始往也自昏時進御而早夜常在公所見星而往見星而還不敢有違其往來之勤如此皆其肅肅處蓋自知命分之賤而不敢同於夫人也故曰實命不同實與實同一云是也嘒彼小星維參與昴興也肅肅宵征抱衾與裯實命不猶興意參昴西方二宿名參昴初見則戌亥月之候也衾被裯單被也云抱衾與裯則漸寒可知矣猶如也賤妾往來宫中夙夜致敬以事其上安於天命而無怨心庶幾樂天知命矣非薰蒸后妃忠厚之化豈易至哉小星二章章五句江有汜經旨曰江水之旁媵有待年於國而嫡不與偕行者因嫉妬之既長不使于歸其後悔而迎之故媵女喜而作此詩也夫媵女待年而不與嫡偕此亦常事但嫡或嫉妬而幡然改之則於女德為難耳然亦不足以此為盛治不知何時事也説者以其列於召南而槩以為被后妃之化則鑿矣果如其説則當其嫉妬尚在紂時邪江有汜興也之子歸不我以不我以其後也悔興意水決而岐流復入還本水者曰汜漢陽沔陽之間多有之以之為言用也如不使大臣怨乎不以之以江有渚興也之子歸不我與不我與其後也處興意處音杵後凡處置居處之處並同渚小洲也水岐成渚與同黨也如暴虎慿河吾不與也之與江有沱興也之子歸不我過不我過其嘯也歌興意沱江之别出者過過從之過謂不使我得過從也嘯蹙口出聲以紓憤悶之氣言嫡之悔時也歌則得其所處而樂矣蓋兼上兩節之意而言汜渚沱皆江水之岐流而其岐流皆復合本水如嫡之有媵始踈而復親也以其地在江間故因所見以起興而以得嫡歡心為樂然略無怨心亦可見其忠厚矣江有汜三章章五句野有死麕經旨曰此淫風也女子有為吉士所誘者而不忍絶以峻辭諭使徐徐過從故詩人樂道之也舊説以為南國被文王之化女子以貞潔自守不為強暴所汙則於辭意全不相類矣野有死麕白茅包之興也有女懷春吉士誘之興意野牧外也麕麞也鹿屬無角野則其縱遊之地也包褁懷思也當春而情動故曰懷春吉士猶言美士以其才華可愛而言也誘調戲也林有朴􅈪野有死鹿白茅純束興也有女如玉興意朴􅈪小木名鹿所隱蔽處也鹿獸名有角出於朴􅈪則縱於野矣純與屯同聚也束縳也言聚茅而縳之也麕鹿俱善群聚其性淫而聚麀者也故以起興而言麕鹿既死於野則可包束而不動若女子之含生情必懷春而安可制乎况其人色美如玉則宜為吉士之所誘矣蓋佳人才子不能不相感悅之意舒而脫脫兮無感我帨兮無使尨也吠賦也舒緩也脫脫舒緩貌感動帨巾尨犬也上言女為吉士所誘而此則以溫言接引之使之徐徐而來也蓋帨不動則其步履輕犬不吠則其音聲靜欲使密其形蹤不為人知也觀於此言則淫邪之情宛然可見必欲強為之解而曰女子以貞潔自守何可通哉野有死麕三章二章章四句一章三句何彼穠矣經旨曰此刺魯使單伯為齊襄公迎王姬也詳見春秋私考莊公元年蓋魯事也故疑其當為魯風耳何彼穠矣唐棣之華興也曷不肅雍王姬之車興意唐棣一名栘即郁李也詳見唐棣字義穠韓詩作茂盛也言華以喻容也肅敬雍和也周姬姓故女曰王姬六禮不備貞女不行魯單伯為齊襄公迎王姬非禮也而王姬從之以往非能以禮樂檢身者不可以為肅雍之德故詩人因其往嫁而以唐棣之華起興曷不肅雍者諷之之辭見其無實德也何彼穠矣華如桃李興也平王之孫齊侯之子興意李木名華白實可食桃李言華與唐棣意同平王即平王宜臼齊侯即僖公祿父其子則襄公諸兒也史記以平王崩太子泄父蚤卒立其子林是為桓王王姬者桓王之女則當為太子泄父之孫而於平王則為曾孫矣意必桓王其即平王之子故於王姬得為平王孫耳此言王姬乃平王之孫則齊侯當親往逆於魯何與而使單伯為之逆乎其釣維何維絲伊緡興也齊侯之子平王之孫興意釣以釣魚言也伊亦維也緡合絲而為綸也此以釣喻釣利以綸喻婚姻之合謂魯欲因齊之得婚王姬而釣利也故以起興而言婚姻相合之意或先言平王之孫或先言齊侯之子反覆歌詠之而已非有他義也何彼穠矣三章章四句騶虞經旨曰此詩美虞官之仁以見文王之化能及禽獸也彼茁者葭一發五豝于嗟乎騶虞賦也茁生出壯盛之貌葭蘆也亦名葦一發凡射一發四矢也豝獸之肥大者也騶騶從也虞虞官即周禮山虞澤虞非獸也彼茁者蓬一發五豵于嗟乎騶虞蓬草名蒿屬豝以大獸故藏於葭豵以小獸故藏於蓬一發四矢之間虞人但翼五豝五豵以待射見其不以多殺為能而美文王仁之所及也騶虞二章章三句詩説解頥正釋卷二
