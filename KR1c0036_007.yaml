body:
  text: 詩說解頥正釋卷五明季本撰衛風說見邶風淇奧經㫖曰衛人美武公之德也孔氏謂武公在幽王時已為卿士然猶未以其詩斷為幽王時作也華谷嚴氏始定為幽則恐幽王暴虐至於殺身武公於此略不見有庇君匡國之效何足以語淇奧之學哉其必平王時平戎有功而始入相耳歐陽氏補圖屬之於平蓋有見矣瞻彼淇奧緑竹猗猗興也有匪君子如切如磋如琢如磨瑟兮僴兮赫兮咺兮有匪君子終不可諼兮興意奧於六反下章同猗與依同倚也互相依倚則不摧折而得以成其美以興工夫之夾持也匪與斐同文之可見者也切磋琢磨以治玉之次第喻工夫也舊說以骨象玉石四者分言恐非以玉比德之意瑟嚴密貌僴武毅也言其僴瑟然也赫明盛貌咺宣著也言其咺赫然也瑟僴則為恂栗蓋美之存於中者乃其德也美在其中而暢於四肢則赫咺而為威儀然後其美斐然而足以感人雖久不可忘也故以終言德至於此則為盛德矣詳見大學私存瞻彼淇奧緑竹青青興也有匪君子充耳琇瑩㑹辨如星瑟兮僴兮赫兮咺兮有匪君子終不可諼兮興意㑹古外反青青鮮潔貌以興琇瑩充耳瑱也天子玉瑱諸侯以石琇石之次玉者瑩玉色之光榮也琇瑩猶言瓊華瓊英詳見著字義㑹縫也辨皮辨諸侯視朔及待賔通用之冠㑹辨者綴玉於辨中之縫礫礫如星也此皆諸侯之服飾以琇玉為貴而武公有斐之德能稱之也瞻彼淇奧緑竹如簀興也有匪君子如金如錫如圭如璧寬兮綽兮猗重較兮善戲謔兮不為虐兮興意簀床棧言其密比也金錫皆金也金至精而剛錫則金之柔者也此言其能剛能柔也圭璧皆玉也圭有角而方璧則玉之圓者也此言其能方能圓也剛柔方圓隨宜曲盡可以見其德之密矣寬𢎞廣也綽開豁也較在車箱上五尺五寸立時所憑之處也箱上三尺三寸為式式上二尺二寸為較併式為兩重故謂之重較蓋在輿時人所共見因即所見而言其器量之不急迫也戲謔者混俗之言同於汚世本欲開導人心未嘗流於縱肆則戲謔乃為善耳若接人之際厲色嚴聲指斥其短即是虐矣虐與戲謔相反而善則戲謔之不失正處見其與人之樂易也此四句皆言德之安身善俗見其密而動容周旋無不中禮也上章所謂恂栗威儀而有斐者蓋如此淇奧三章章九句衛武公之德能使人終不可諼如此幾於聖矣史記乃謂其攻殺共伯何其不知德之甚哉考槃經㫖曰此詩美賢者隱居樂道以終其身而無求於世也然其樂道即是求志苟志之所向安於離羣則為忘世而非道矣考槃在澗碩人之寬獨寐寤言永矢弗諼賦也考成也槃者架木為屋盤結之義也碩人者有大抱負之人也寬者胸中𢎞廣無所憂戚之意言者言其所自得也既寐而寤當寤之時亦發於言則其所自得者無時而不在中乃其所獨知也此亦足以自樂可以自誓終身不忘不復有外慕之心矣集傳以為不忘此樂則所樂何事不幾於玩物乎考槃在阿碩人之薖獨寐寤歌永矢弗過賦也曲陵曰阿薖與窩同因阿而言窩見其為斂藏之處也歌者歌其所自得也無外慕之心則無過求故曰弗過考槃在陸碩人之軸獨寐寤宿永矢弗告賦也高平曰陸軸范氏處義訓為卷猶言卷而懷之是也宿止也謂雖獨寤亦止於其所自得而不以告人也不告則不求人知矣考槃三章章四句賢者不遇於時則隱居求志而已素貧賤行乎貧賤豈有外慕哉故孔叢子云於考槃見遁世之士無悶於世斯言得之矣碩人經㫖曰莊公惑於嬖妾使莊姜賢而不見答終以無子國人閔之而作此詩也莊姜事見緑衣燕燕等篇碩人其頎衣錦褧衣齊侯之子衛侯之妻東宫之妹邢侯之姨談公維私賦也衣錦之衣去聲後凡此類並同碩人指莊姜頎頭竦貌言其德容也錦文衣也褧襌衣也衣錦而加褧見其服飾暗然不事表暴也齊侯之子而嫁為衛侯之妻見其體之敵也東宫太子所居之宫齊太子得臣也繫太子言之者明與同母言所生之貴也女子後生曰妹妻之姊妹曰姨姊妹之夫曰私邢侯談侯皆莊姜姊妹之夫互言之也諸侯之女嫁於諸侯則尊同故歷言之此章極稱其族類之貴以見貴族之女而敬德暗然賢可知矣不惟正嫡小君為當重也手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮賦也茅之始生曰荑言柔而白也凝脂脂寒而凝者亦言白也領頸也蝤蠐木蟲之白而長者瓠犀者瓠瓣也謂瓠中之子方正潔白而比次整齊也螓如蟬而小其額廣而方正蛾蠶蛾也其眉細而長曲倩口輔之美也盼黑白分明也此章言其容貌之美而莊公不當不親愛也碩人敖敖說于農郊四牡有驕朱幩鑣鑣翟茀以朝大夫夙退無使君勞賦也朝音潮後凡朝㑹朝廷之朝並同敖與遨遊之遨同敖敖間適之意曹氏以為優游舒遲是也農郊近郊也言始至衛而止於此以待之其意思間適也四牡車之四馬也牡馬力强故常用以駕車驕壯貌幩鑣飾也鑣者馬㗸外鐡在旁包斂其口者也人君則以朱纒之鑣鑣非一鑣言四馬各兩鑣皆以朱飾也翟翟車也茀蔽也婦人之車前後設幛為蔽而夫人則以翟羽為之故曰翟茀朝者自農郊而入君之朝也大夫夙退欲羣臣之早退朝也玉藻曰君日出而視朝退適路寢聽政使人視大夫大夫退然後適小寢釋服蓋聽政久則君體勞矣此章言夫人初至國人欲其君退朝之早而與之相親也觀此則莊公之踈於莊姜非國人之所欲也河水洋洋北流活活施罛濊濊鱣鮪發發葭菼揭揭庶姜孽孽庶士有朅賦也活音聒河在齊西北流入海洋洋盛大貌活活水流聲施設也罛魚罟也濊濊罟入水聲鱣鱑也大魚似鱘黃色鋭頭口在頷下背上腹下皆有甲即鱘黃也大者千餘斤可作鮓鮪似鱣而色青黑頭小而尖口亦在頷下一名鮥大者不過七八尺味不如鱣發發奮躍之意河水北流而施罛以得鱣鮪言其地之有魚也葭葦之未秀者也菼荻之初生者也揭揭高起貌言其地之有薪也庶姜謂媵嫁之姪娣孽孽者萌芽旁發之意所謂庶孽也庶士其媵臣也朅武壯貌言衛在河西與齊接壤今以婚姻之故齊有魚薪之利衛得資焉其男女之從嫁者皆為衛用所賴於齊者多矣見莊姜之不可負也碩人四章章七句此章無一語及莊姜不見答之事但言族類之貴容貌之美禮儀之備士女之從以深寓其閔惜之意而已辭雖微婉然即其稱之為碩人而又以衣錦褧衣首言其不事外飾則以表其為賢而詩意亦可默悟矣氓經㫖曰淫婦與人苟合至於見棄而作此詩以自追悔也一失其身雖悔何及况其所悔止在不詳於擇夫乎亦不得為正矣氓之蚩蚩抱布貿絲匪來貿絲來即我謀送子涉淇至于頓丘匪我愆期子無良媒將子無怒秋以為期賦也將七羊反後凡以請為義者並同氓者小民惛懵之名蚩蚩愚蠢貌貿交易也貿絲蓋周正季夏時也抱布貿絲託以貿絲為名也託貿絲而即之謀娶可以知其先有私期矣但不言所起耳頓丘土一成之名蓋在朝歌東近淇之地愆過將請也涉淇送至頓丘不與俱往也先有私期而不與俱往故男子以為愆期而怒之然女之意亦欲其假媒售正因男之怒於是又恐失其歡心遂與定為秋期則不待媒妁之言矣此見其相誘之初苟合之易也乘彼垝垣以望復關不見復關泣涕漣漣既見復關載笑載言爾卜爾筮體無咎言以爾車來以我賄遷賦也垝毁垣墻也復關地名或以為在開州西南未知是否此男子之所居也蓋不敢顯名其人而託言之耳漣漣涕出接續之貌龜曰卜觀其兆也蓍曰筮觀其象也體兆象之體也言繇辭也望復關不見而涕泣不知其幾登垝垣矣蓋其望已在秋期也及其既見而即以車來遷賄男亦如期而至矣卜筮無咎言其已得吉而來非問之之辭也觀賄遷之言則女亦有資財者而下章言三嵗食貧則不擇男家之可否而甘心以養之女之淫奔一至此哉桑之未落其葉沃若于嗟鳩兮無食桑椹興也于嗟女兮無與士耽士之耽兮猶可說也女之耽兮不可說也興意落退也沃若潤澤貌椹桑實也耽樂甚也桑未落以比男子情愛之方盛也葉沃若比其眷愛之恩光也鳩無食椹以興婦人不可恃男之愛而貪欲也恐男行之易二耳婦治蠶事故以桑為喻可說謂士得以正言女之不淑也不可說謂女以淫取賤無辭以自解也此言恩愛難恃而為男所賤也桑之落矣其黃而隕興也自我徂爾三嵗食貧淇水湯湯漸車帷裳女也不爽士二其行士也罔極二三其德興意湯音傷後凡湯湯並同漸音尖隕墜地也桑落比愛衰黃隕比恩薄湯湯水盛如沸也漸漬也帷裳以帷幛車如裳也此言見棄而歸復乘車以渡淇水也爽差也不爽謂與之勤勞家事不負初言也罔極謂不可測知也二三其德即是二行此因上章無食桑椹之意而指言其不足恃之實也三嵗為婦靡室勞矣夙興夜寐靡有朝矣言既遂矣至于暴矣兄弟不知嘻其笑矣靜言思之躬自悼矣賦也靡室勞言諸務無不盡力不止勞於室中之事而已靡有朝言興於早而寐於夜不止朝旦之勞而已言既遂即上章所謂不爽也暴即上章所謂二其行也嘻笑貌以勤勞見棄於夫此情之甚苦而可哀者也然始之相奔乃其自主不敢以勤勞之情告於兄弟故兄弟不知一無閔恤但如常情之外示歡顔嘻然一笑而不以其見棄為意也則平日所以惡其私奔者亦可見矣言兄弟則必無父母前章所謂賄遷者乃父母所分之私財也始也不謀於兄弟今亦安望於兄弟之為謀哉此章言其情無所訴而自傷悼也及爾偕老老使我怨賦也淇則有岸隰則有泮興也總角之宴言笑晏晏信誓旦旦不思其反反是不思亦已焉哉興意此言總角之時即往為婦僅三嵗耳未為老也云老使我怨謂本期偕老今未至於老而已棄雖使至老亦終歸於怨而已見其夫必非有終之人也岸水涯也泮與判同高下所分處也晏安樂也旦旦明也反猶背也蓋有岸泮則有依泊背而棄之即前章所謂罔極也有何邉際可止乎不思者言始焉不思其如此也始惟於其反處不思則今日雖悔無及矣已焉哉者無可為之辭也此詩本淫風性情未為得正宜在所刪而存之於經表記又引此章之言以明信其必秦火後之所掇拾而漢儒之記禮者又據以為正論歟氓六章章十句此詩雖若自悔其失特以見棄於夫無可奈何耳非其真有恥心也何足以為訓哉然聞之者亦足以戒矣竹竿經㫖曰衛之男子因所私之女既嫁思之而不可得故作此詩亦淫風也籊籊竹竿以釣于淇豈不爾思逺莫致之賦也籊籊長而漸殺之貌釣者衛之男子也舊說以女子嫁於諸侯思歸釣於淇水而不可至則釣豈可言於女子哉爾指已嫁之女而言逺謂既嫁而逺也泉源在左淇水在右女子有行逺父母兄弟賦也泉淇二水詳見泉水字義女子有行謂其嫁去也其人既嫁而不可見但見衛之二水而已淇水在右泉源在左巧笑之瑳佩玉之儺賦也瑳鮮白色笑而見齒其色瑳然佩玉詳見有女同車字義儺腰身裊儺也因二水而思女子之容色也淇水悠悠檜楫松舟駕言出遊以寫我憂賦也悠悠長流貌此因女子不得見而欲駕松舟出遊於淇水以自解也觀於此章則以為外女歸衛而思淇水之遊益不通矣竹竿四章章四句芄蘭經㫖曰世俗父兄不能教童子習幼儀而躐等以騖高逺也故詩人作此以刺之芄蘭之支比也童子佩觽雖則佩觽能不我知容兮遂兮垂帶悸兮賦也芄蘭一名蘿摩爾雅謂之雚蔓生斷之有白汁可啖其體則柔弱不能勝重者也支與枝同觽錐也以象骨為之所以解結成人之佩非童子之飾也能才能也容遂容體自遂也垂帶與都人士垂帶同禮大帶垂三尺亦非童子所宜服也悸驚貌芄蘭之葉比也童子佩韘雖則佩韘能不我甲容兮遂兮垂帶悸兮賦也韘開弦之决也能射則佩韘尤非童子所宜佩矣甲長也不我甲猶言不為我所尊也言童子稚弱如芄蘭然於禮但當佩容臭耳而使之佩觹韘則為躐等欲速之事矣然其才能則不足以為我所知為我所甲故其容體雖若自遂而垂帶見人之際其心不能不自驚悸也為父兄者以此教童子亦獨何哉此與孔子戒闕黨童子意同芄蘭二章章六句河廣經㫖曰宋桓公夫人衛宣姜之女也見出於桓公而歸義不忘宋故作此詩也夫宋桓公賢君也其出夫人不知何故豈以宣姜通於公子頑而以其為亂家子歟然於夫人何尤焉觀其惓惓望宋而略無怨言則其守義之正亦可見矣舊說以為思其子襄公而義絶不可往則亦常情耳何足特録於經哉誰謂河廣一葦杭之誰謂宋逺跂豫望之賦也衛在河北宋在河南河雖廣而甚相近一葦束蘆葦以浮水上也杭如航之渡水也一葦可杭甚言其易渡也跂舉踵也望望桓公之來迎也誰謂河廣曽不容刀誰謂宋逺曽不崇朝賦也曽則容猶用也刀與舠同小船曰刀不容刀謂一葦可杭也不崇朝謂不終朝而可至望其來迎之速也河廣二章章四句伯兮經㫖曰此衛宣公時詩也左傳桓公五年蔡人衛人陳人從桓王伐鄭衛之婦人以其夫從征不歸而思之故作此詩亦可見其哀怨之至情矣伯兮朅兮邦之桀兮伯也執殳為王前驅賦也為音謂後凡訓因訓助之為並同伯婦人目其夫之字也朅解見碩人桀與傑同才過人也殳擊兵前驅在車前為先鋒也言伯方為王當前導之車見其有勇力也餘見本章及秦無衣字義自伯之東首如飛蓬豈無膏沐誰適為容賦也適音的後凡的主之適並同首如飛蓬謂容不理而髮亂如蓬也膏所以澤髮者沐滌首去垢也適專主也此言夫不在而無意於整容也孔氏曰鄭在衛之西南而言東者時蔡衛陳之國兵至京師乃東行伐鄭也其雨其雨杲杲出日比也願言思伯甘心首疾賦也其者冀其將然之辭夫婦和而合歡如隂陽和而得雨故以雨為比杲然日出則又不得雨矣甘心首疾謂思之不已而安於頭痛也焉得諼草言樹之背願言思伯使我心痗賦也諼與萱同一名鹿茐食之令人好歡樂忘憂故謂之忘憂草背北堂也在堂後婦人所居心痗則痛在心而甚於頭痛矣蓋其思之深雖得諼草而不足以解憂之意集傳以為寧不求此草而心痗不辭則誤矣伯兮四章章四句有狐經㫖曰婦人因夫久從征役寒且無衣人有欲淫之者故作此詩絶之以見其一意於夫也舊說以為寡婦欲見鰥夫而嫁之此豈人道哉有狐綏綏在彼淇梁比也心之憂矣之子無裳賦也狐以比欲淫獨處之婦者綏綏獨行遲疑之貌之子指夫言有狐綏綏在彼淇厲比也心之憂矣之子無帶賦也岸近危處曰厲帶所以申束衣也有狐綏綏在彼淇側比也心之憂矣之子無服賦也婦人獨處而其夫久戍不歸人有欲淫之者如狐之妖媚獨行遲疑故以狐為比然已之所憂惟寒到夫邊尚未有衣而志不在於他也則其凛然不為非禮所干意自見矣有狐三章章四句木瓜經㫖曰舊說衛有狄人之難齊桓公救而封之衛人思之而欲厚報故作此詩皆誕說也狄之入衛本未嘗滅何封之有齊止城邢實無救衛之事故許穆夫人以為控于大邦誰因誰極何所施於衛而欲厚報之邪辨見定之方中下惟集傳以為男女相贈答之辭如靜女之類得其㫖矣投我以木瓜報之以瓊琚匪報也永以為好也賦也木瓜懋木也實如小瓜酢可食言木瓜以别於瓜瓞瓊玉之美名非玉也琚佩玉之名詳見女曰雞鳴字義投我以木桃報之以瓊瑶匪報也永以為好也賦也木桃桃也言木桃以别於羊桃瑶美玉也投我以木李報之以瓊玖匪報也永以為好也賦也木李李也以别於雀李玖亦美玉也瓜桃李皆木也而琚瑤玖皆瓊也以瓊報木報之厚也而不以為報蓋其心將永以為好則親愛無已之情也實淫風耳木瓜三章章四句詩說解頥正釋卷五
