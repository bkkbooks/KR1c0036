body:
  text: 詩說解頥字義卷七明季本撰大雅文王三章楨築墻所立兩木也一謂之翰亦謂之幹幹華谷嚴氏曰楨也翰也幹也一物也幹字當作幹傳寫誤作幹大明二章摯國名奚仲之後任姓仲大任字也傅氏以摯為殷畿內國故云自彼殷商如此則畿內之地亦有以封諸侯者但亦附於逺界如周畿之韓密其地不以列於畿方千里之內耳京周京以大言也鄭氏謂王季時其居未得稱京師而以為周國之地小别名殊不知自得天下以後追言之則於周地皆得以京師稱耳惟公劉京師之野非天子所居則當别立義耳四章洽陽洽水之陽漢置郃陽縣故城在唐河西縣南三里水經注云郃陽城南有瀵水東流注于河瀵水即郃水也集傳則謂洽水夲在同州郃陽縣今流已絶故去水而加邑渭水亦徑此入河據此則郃陽地在河西臨河而渭水自西南來徑其地觀水經載渭水入河而不言與郃水合况謂其流已絶則必無渭流合郃之故道矣然曰在渭之涘涘崖也正以莘國之界言耳故臨川王氏曰郃陽莘國所在夲在洽陽必言渭涘者以下章親迎于渭也今按莘夲禹後姒姓在今郃陽縣南二十里此與伊尹耕於有莘之莘不同伊尹之莘史記正義以為汴州陳留縣東五里故莘城是也陳留今屬開封府又有春秋荆敗蔡師之莘則在南陽府裕州地各不同五章親迎于渭至於洽陽之渭涘矣諸侯無出境親迎之禮而文王逺至渭涘者蓋周為西伯洽陽猶為境內而况文王尚為世子不嫌於逺逆也造舟為梁造作也梁橋也作船於水比之而加版於其上以通行者即今之浮橋也傳曰天子造舟諸侯維舟大夫方舟士特舟爾雅注曰造舟比船為橋維舟維連四舟方舟併兩船特舟單船綿一章古公亶父周夲侯爵而稱公者蓋臣子之辭諸侯國內之通稱也亶父居豳之時國勢正弱必未嘗為方伯入為三公於禮不得稱公也古公猶言先公對後日為天子時而言蓋以後人追稱也亶父古公之名如春秋季孫行父公孫歸父之類皆名也夏商之前未有諱禮人臣對君時常稱君如虞廷稱堯舜為帝也至其後世無諡可舉則臨文之際恆直稱名如史臣叙事而稱粵若稽古帝堯帝舜也古公至周已追尊大王且其時諱禮已行故詩書率以大王稱之此詩周公所作不稱大王而稱亶父者以遷岐之初但知避狄無意於王業之興也故據商禮稱名以見其初為諸侯而尚微耳一說綿之詩文王時所作而周公舉以告成王也末章附以虞芮質成事蓋錯簡焉三章堇孔氏以為烏頭蓋即爾雅芨堇之堇也集傳祖之惟華谷嚴氏以為烏頭毒物不可食安能變而為美獨取內則婦事舅姑以堇荁之說注云荁似堇而葉大說文云堇根如薺葉如細柳蒸食之甘是堇為美菜若毒物安可以之事舅姑乎故堇乃內則堇荁之堇非烏頭也荼為苦菜亦非蓼屬詳見邶谷風字義五章室家人君國中所居也朱子曰國都如井田樣畫為九區面朝背市左祖右社中間一區則君之宫室宫室前一區為外朝凡朝㑹藏庫之屬皆在焉後一區為市市四面有門左右各三區皆民所居而外朝一區左則宗廟右則社稷焉此國君都邑規模大槩也七章臯門應門此殷時諸侯之制意周制亦不甚相逺也禮天子五門雉門當中其外為庫門而臯門在庫門之外其內為應門而路門在應門之內魯有庫雉路三門殺於天子周禮閽人疏曰魯有三門雉門有兩觀為中門陳氏祥道曰諸侯有臺門無兩觀魯有兩觀為周公故也夫諸侯之制宜得二門綿之臯門應門是也庫臯二門近外故諸侯之外門謂之庫可也謂之臯可也路應二門近內故諸侯之內門謂之路可也謂之應可也明堂位曰庫門天子臯門路門天子應門正以魯之庫門臨外當天子臯門之位路門在內當天子應門之位未嘗言門制之僭天子也而疏以為二門制似天子非矣魯門之僭天子特在多立一雉而又旁設兩觀耳豈以門名之有不同哉且書有畢門南門則路門之别名也周禮有中門則雉門之别名也爾雅有正門則應門之别名也臯門應門既大王為諸侯時所得為則庫門路門似之不為僭矣八章柞舊說皆以為櫟也而鴇羽之栩亦以柞櫟解之謂即今之皂斗子其殼可以染皂皂斗蓋即橡也考之爾雅則柞與櫟夲二木栩釋為杼郭璞以為柞樹而櫟則釋云其實救邢昺疏曰櫟以樗之木救盛實之房也櫟實橡也綿之集傳釋柞則以為枝長葉盛叢生有刺則與所謂皂斗者不同而亦謂之櫟故徐州謂櫟為杼或謂為栩秦人謂柞櫟為櫟故崔豹古今注云杼實為橡或以柞為櫟或以櫟為柞或混而為一名稱之亂久矣故綿之柞即鴇羽之栩有刺者也晨風之櫟即似樗之櫟橡也非柞杼也此可以正舊說之誤矣棫爾雅以為白桵郭璞注云桵小木叢生有刺實如耳璫紫赤可啖混夷即昆夷皇矣作串夷一名緄夷史記自隴以西有緄戎漢胸奴傳曰昆夷亦曰犬戎韋昭曰犬戎昆夷之别名今按其地當在豳岐之西九章虞芮二國名皆殷時諸侯郡縣志故虞城在陜州平陸縣東北五十里虞山之上古虞國芮城在陜州芮城縣西二十里古芮國間原在平陸縣西六十五里即虞芮爭田讓為間田之所今按平陸芮城俱屬山西平陽府解州在河東通典謂同州馮翊縣為古芮國非也馮翊故城在陜西安府髙陵縣南二里乃河西地去平陸逺史記正義亦辨之矣孔氏謂芮伯為周同姓國亦附㑹也虞芮質成見文王得諸侯之歸也按毛氏曰虞芮之君相與爭田久而不平乃相謂曰西伯仁人也盍往質焉乃相與朝周入其境則耕者讓畔行者讓路入其邑男女異路班白不提挈入其朝士讓為大夫大夫讓為卿二國之君感而相謂曰我等小人不可以履君子之庭乃相讓以其所爭田為間田而退天下聞之而歸者四十餘國棫朴一章璋璋瓉也半圭曰璋鄭氏曰祭祀之禮王祼以圭瓉諸臣助之亞祼以璋瓉按禮王一祼后亞祼而云諸臣助之亞祼者后或有故則大宗伯攝之即祭統大宗執璋瓉亞祼之事也而諸臣則又以其助祼將之事者言之非專指宗伯也周禮玉人祼圭尺有二寸有瓉而璋則半之故曰半圭也陳氏祥道曰圭璋其柄也瓉其勺也柄則圭璋純玉為之勺則玉多石少可矣據此則勺與柄各用一玉也瓉有圭璋之名特以柄玉之全半為别耳玉人云墇厚寸則圭之厚宜亦如之而所謂半者半圭之尺二寸矣又云鼻寸衡四寸注謂鼻勺流也衡勺徑也流者所以流鬯也而二瓉之制可知矣其餘凡流皆為龍口及瓉下有槃之說則先儒蓋約漢制言之而陳氏辨之固謂古者有圭瓉璋瓉而無下槃有鼻而無龍口矣不必據以為周制焉旱麓三章鳶鴟類按爾雅有狂茅鴟郭璞注謂似鷹而白有怪鴟郭璞注謂即鴟鵂華谷嚴氏曰鴟有二鳶飛戾天者鷹類也亦單名鴟也惡聲之鳥者怪鴟也皇矣二章菑木死者也翳自斃者也死之木妨他木生長為木之害故曰菑生木自倒枝葉覆地為隂翳作之屏之者作起屏除皆去其根使不至於妨物也灌叢生者也栵行生者也修之平之者修治平夷皆理其亂使不至於礙行也柳河柳似楊而小赤色生河邉椐匱也腫節似扶老可為杖皆屬美材也啓之辟之者啓拓辟開皆以其為無用之散木而去之也檿山桑材中弓弩其蠶之絲中琴瑟柘亦桑屬弓人取幹枳為上木理有文亦可旋為器具有用之美材也攘之剔之者攘抑剔解雖美材亦必去其繁冗使不為礙也此皆為通道而發五章密古密須氏姞姓之國括地志隂密故城在鶉觚縣西其東接縣城即古密國按鶉觚故城在今平凉府涇州靈臺縣西五十里與邠州西界相接蓋亦戎翟問之國阮在密之南界亦近邠之國也張氏曰阮國名共阮國之地名皆在涇州今有共池即此也八章馘獲而截其左耳也孔氏曰玉藻云聽嚮任左故不服者殺而獻其左耳曰馘罪不聽命服罪故取其耳以計功也安安程子以為不輕暴即鄭氏徐徐為之不尚促速之意也但文王夲以好生為德雖訊其可殺然既出降服罪則欲生之使其心安焉故所當馘者亦安之也類類聚群神而祭之之名也鄭氏王制注謂其禮亡則固無傳矣故先儒言類者亦每不同或謂因事而類告之或謂類正禮為之或謂二說文異而意同而爾雅則以為兵祭蓋為釋詩類禡而發類非專為兵祭也凡攝位出征巡狩皆得謂之類義取於類聚群神耳類非常祭故異其名而為類如舜攝堯武王伐商而書皆曰類于上帝又巡狩而曰柴望宜亦類祭蓋互相備也凡此皆禮之大者鄭氏小宗伯凡大烖類社稷宗廟注謂類為禱祈禮輕而疏因謂祭饌略少陳氏祥道亦謂類禮其詳不可得而知要之劣於正祭與旅也則豈知天下之事尚有重於攝位出征巡狩者乎故類非輕也以别於常祭而異其名也旅亦旅衆神之名而或以日月或以山川或以水旱或以疫癘之烖有所禱祈而祭此則禮之小者故大祝六祈有類而無旅是以類為旅之通名也小宗伯既為大烖而類則旅也非類也名稱既混宜其說之不通矣周禮於類旅皆言上帝是天子之禮也惟小宗伯大烖類社稷宗廟是告烖之旅而通稱為類也則類之為說可知矣文王雖為方伯亦諸侯也集傳以其類為祭上帝得非僭天子之禮乎故類者類聚群神之名也文王之類必類其當祭之神如山川方社之類歟禡軍行之祭也蓋如今祭六纛之神集傳謂至所征之地而祭始造軍法者謂黃帝及蚩尤也此說夲於肆師凡大田獵祭表貉注竊意黃帝聖人也蚩尤敢與黃帝拒戰逆臣也而得與於祭此豈先王制禮之所宜乎鄭氏於王制之言禡固謂其禮亦亡而妄取一說以為證其背理甚矣臨臨車孔氏所謂在上臨下之名也衝衝車孔氏所謂從旁衝突之名也陳氏祥道謂臨車高衝車大高則可以臨下大則可以突前孫武子曰攻城之法修其轒輼蓋衝車之類也楚子使解揚登樓車以告宋人蓋臨車之類也竊意臨衝皆臨時所制非田賦所出之革車也然古者寓兵於農所賦惟以兵數而車皆官所自造故能合轍臨衝之直則亦取於賦兵常數之中非使民另為此車以供軍用也靈臺一章靈臺在西安府鄠縣東三十里蓋在豐宫東五里通典所謂靈臺鄉豐水上者也二章囿即孟子所謂方七十里者也苑有垣故曰囿臺下有囿囿中有沼夲在一處三輔黃圖分為三處誤矣三章辟雍亦與靈臺同處鄭氏所謂辟雍及三靈皆同處在郊是也靈臺之辟雍文王之學也詳見文王有聲字義虡業以懸鐘磬者孔氏曰兩端有植木其上有橫木謂直立者為虡謂橫牽者為栒栒上加大板為飾謂之業刻板捷業如鋸齒也其懸鐘磬處又以彩色為大牙其狀隆然謂之崇牙樅即崇牙之貌樅樅然也賁鼓鏞鐘並詳見廟制考義二卷末廟樂考成文王有聲二章豐即崇國之地在今西安府鄠縣杜陵西南崇即今鄠縣也西安府唐為雍州雍州西三十里即漢長安城長安城在今咸陽縣東北二十里括地志云周豐宫在鄠縣東二十五里鎬在雍州西南二十五里徐廣曰豐鎬相去二十五里皆在長安南五章豐水出終南山東北流經豐邑東鎬京西至咸陽縣入渭鄭氏曰豐邑在豐水西鎬京在豐水東六章辟雍學名也辟璧通雍壅水為澤亦名澤宫古人於此習射又名為序水旋邱以節觀者故曰辟雍古無此名文王時始為之及武王有天下遂因其制而為天子之學於鎬京焉其諸侯之學則東西南方有水半辟雍之制以其形如半璧故名其宫為泮宫不得復為辟雍矣生民一章武迹敏拇夲爾雅釋詁文其傳久矣而歐陽氏獨不信之故朝氏謂歐公平日不信符命嘗著書以周易河圖洛書為妖妄今又以生民𤣥鳥之詩為怪說然張子則曰生民之事不足怪人固有無種而生當民生之始何常便有種固亦因氣化而有蘇氏亦曰凡物之異於常物者其取天地之氣常多故其生也或異麒麟之生異於犬羊蛟龍之生異於魚鱉物固有然者矣神人之生而有以異於人何足怪哉又曰帝王之興其受命之符卓然見於詩書者多矣河圖洛書生民𤣥鳥之詩豈可謂誣也哉朱子亦以張蘇之說為然而東萊吕氏亦取之則知歐公所見之不廣矣禋者精意以享之謂通於諸祭者也舜典謂禋于六宗即六宗而言禋耳非以禋為六宗之專名也祀亦諸祭之通名禋與祀一也但自致敬而言則曰禋自盡禮而言則曰祀祀又與祭享並言詳見楚茨字義五章方房也謂生意在房而初動也苞甲而未拆此言其種之漬也種謂甲拆而種見裒謂抽芽漸長也此言苖之生也發發蕊也秀吐華也此言苖之榮也堅實固也好不損也此言榖之成也穎垂穟也栗粒大也此言榖之盛也所謂種之黃茂者如此邰即漦也在渭水南郡縣志漦城一名武功在武功縣西南二十里古邰國也今屬西安府八章豆木為之以薦俎醢詳見伐柯字義登瓦豆也以薦大羹祭天大羮不和臨川王氏曰釋之蒸之簠簋尊爵之實也羝俎實也豆登則實以葅醢大羮之器也或言其器或言其實互相備也行葦二章筵亦席也鋪於下則為筵其在上為人所蹈藉者則為重席故鄭氏曰鋪陳曰筵藉之曰席其實筵席可通名也周禮司几筵序天子三重之席有莞席此即鋪陳之在下者也加於上有蒲席有次席此即在上之重席也莞席以小蒲為之蒲席以蒲蒻為之次席以桃枝竹為之不過如斯干所謂下莞上簟而已則燕饗之席固與寢卧之席同也二章斚亦爵也夏曰盞殷曰斚周曰爵皆以玉為之但形飾不同而異其名然皆器之重者也周於養老所以致敬爵受一升斚受六升人之量有淺深故爵之用有大小也三章敦弓敦與雕通孔氏曰敦與雕古今字之異雕是畫飾之義弓人為弓惟言用漆不言畫則漆上又畫之其諸侯公卿宜與射者自當各有其弓不必畫矣三山李氏曰公羊注云天子雕弓諸侯彤弓大夫嬰弓士盧弓此言敦弓即所謂天子雕弓也今按大射禮疏君射大侯大夫射參侯士射干侯恐與尊者為耦故各射已侯若君與賔為耦同射大侯士與大夫為耦同射參侯以其既與尊者為耦不可使之别侯别侯則非耦類故也如此則雕弓亦可用於同耦之賔故統而言之曰序賔以賢况君臣燕射合歡忘分之時非以嚴上下之禮也鍭鐡鏃之矢名也每射必發四矢故曰四鍭鈞者毛氏以鍭矢三亭孔氏曰三亭者謂三分矢一在前二在後輕重鈞亭四矢皆然故言四鍭既鈞矢三分一在前二在後三訂之而平者前有鐡重也舍矢發矢也均二耦中均也投壺禮曰某賢於某若干純竒則曰竒均則曰左右均是也按純音全二算為純竒音畸又加一算則我勝而彼為竒矣左右均皆得二算相敵也賢猶勝也射以中為雋也句彀通謂引滿也挾謂手挾之也射禮搢三挾一孔氏曰搢者插也射用四矢故插三於帶間挾一以扣弦而射也每挾一矢今言挾四鍭已遍釋之也搢三挾一蓋謂卿大夫若其君則使人屬矢不親挾也今按挾者兩物挾一物之名矢在弦之外二指之內故曰挾如樹者如手就樹言其堅正也此禮射不主於貫革公劉三章百泉者平凉府北地所出之水皆流入涇至邠州故隋置百泉縣於漢朝那城今鎮原縣地也溥原則為豳京師之野矣據此則經百泉所逝者皆屬豳地也五章隰原下濕廣平之通名而豳之原隰詩書尤著孔氏曰禹貢雍州原隰底定原隰屬雍州也公劉居豳度其隰原以治田是豳居原隰之野蔡氏曰其地在豳今邠州六章芮一作汭地理志芮水出右扶風汧縣吳山西北東入涇按汧縣今為鳯翔府隴州周禮職方云雍州其川涇汭則汭亦水之大者故與涇並稱也卷阿六章圭璋一用於宗廟鄭氏所謂祭祀之禮王祼以圭瓉諸臣助之亞祼以璋瓉是也詳見棫朴字義此宗廟之重器也一用於朝廷周禮玉人所謂瑑圭璋八寸以俯聘使執圭以享於天子執璋以獻於后也皆以半圭為璋又有琬圭牙璋皆天子之瑞節琬圭九寸以治德結好牙璋七寸以起旅治兵皆朝廷之重器也板六章牗取牗有通明之義故集傳曰牗開明也許慎曰在屋曰窗在墻曰牗蕩七章鬼方荆蠻也其俗尚鬼故謂之鬼方唐高祖紀以為夏曰熏鬻商曰鬼方周曰玁狁漢曰胸奴唐曰突厥本一國而異名一說鬼方於漢則先零戎又曰東至浩亶金城金蘭州之地其說皆非也大王避熏鬻之患本在殷時則商亦仍熏鬻之舊未嘗有鬼方之名也至周始名玁狁耳黃東發以鬼方為荆楚者是也蓋高宗伐荆楚即是伐鬼方之事說見殷武正釋桑柔七章贅毛氏訓屬蓋以繫屬見其危也春秋公羊傳襄公十六年㑹于溴梁大夫盟君若贅旒然何休注曰贅旒旗旒贅屬之辭按此則贅是贅於其上有危意焉非贅即是危也雲漢一章漢天河也曹氏曰或謂水氣在天為雲水象在天為漢或謂箕斗間為漢津雲出漢津謂之雲漢皆非也夫雲合散不常漢則隨天而轉漢之在天似雲而非雲故曰雲漢也雨者水之施也天將雨其兆先見於漢今按天河以有雲為雨兆夜晴無雲則天河明故曰昭回昭回非雨候也牲鄭氏謂三牲蓋用特牲或大牢或少牢隨其神之尊卑而用也按左傳謂凡天災有幣無牲而此云靡愛斯牲者孔氏以為設文之意各有所主彼因日食大小而發言天之見異所以譴告人君只欲改過修善故據正理用幣於社以告請伐鼓於朝退以自責不宜用牲於社至於水旱荐至禱祀群神以祈福祥遏止災沴者則不得不用牲也司徒荒政索鬼神謂祭祀之也蓋偶有災變則事小災變荐臻則事大故其禮不同圭璧禮神之玉也孔氏曰典瑞云四圭有邸以祀天兩圭有邸以祀地祼圭有瓉以肆先王圭璧以祀日月星辰璋邸射以祀山川皆祭神所用言圭璧總稱又按大宗伯有蒼璧禮天黃琮禮地青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方之說是或一義也寧何也集傳每有此訓按華谷嚴氏曰詩多用寧字或訓曽或曰猶偏或為願辭不可執一但此章寧莫我聽則取鄭氏寧曽也之訓下章寧丁我躬則取曹氏寧願辭也之訓二言句法相同而分為二解則不若集傳訓何之為愈耳五章魃旱神孔氏曰神異經云南方有人長二三尺袒身而目在頂上行走如風名魃所見之國大旱赤地千里一名旱母蓋是鬼魅之物七章疚救荒盡力而至於病也蓋統冡宰趣馬師氏膳夫以及左右而言矣人人以救荒為急而於官職之崇卑體統之上下亦散漫而不暇綱維故曰散無友紀毛氏釋趣馬師氏膳夫左右之義嵗荒年榖不登則趣馬不秣師氏弛其兵馳道不除祭事不縣膳夫徹膳左右布而不修大夫不食粱士飲食不樂此夲於曲禮其言互有不同而師氏弛兵膳夫徹膳之言曲禮所無孔氏亦謂其餘不知所出也竊意諸臣之近王者殺禮節財固亦救荒所宜有之事但所以勸王修德以消天變者宜不止此耳况師氏與趣馬膳夫皆周禮所有之官而師氏掌以媺詔王非掌王門之兵者而謂之弛兵集傳因以師氏為掌以兵守王門者則併經文而誤解矣其言雖可取而移經就傳之失亦不可不正也嵩高一章嵩總四嶽而言也嶽山之尊者毛氏曰嵩高貌山大而高曰嵩嶽四嶽也東嶽岱南嶽衡西嶽華北嶽恆堯之時姜氏為伯掌四嶽之祀然爾雅釋山有曰嵩高為中嶽則五嶽也而云四嶽者孔氏謂堯之建官立伯主四方之嶽不主中嶽故堯典每云咨四嶽而不言五也竊意自山而言則有五嶽自所主之四方而言則曰四嶽觀舜之巡狩止於四嶽亦可見矣故此言嵩高毛傳不以為中嶽而以為高貌孔氏以為此詩之意言維嶽降神祐助姜氏姜氏不主嵩高故知嵩高維嶽謂四嶽也三山李氏曰申甫四嶽之後安得指為中嶽凡大而高者皆可名之曰嵩甫申皆國名詳見王風揚之水正釋夲四嶽姜姓之子孫其初各有封國甫封於吕申封在宛但此云生甫及申指國名者不知其以二賢改封而名其國為甫申邪抑先已改名邪及考禮記孔子閒居引生甫及申之言鄭氏注謂仲山甫及申伯也而此詩之箋則與毛傳同孔氏謂鄭之注禮在前未得毛詩傳其說是矣且仲山甫者樊仲山甫也豈可與申伯同言於嶽神所生哉五章介圭大圭也爾雅曰圭大尺二寸謂之玠陳氏祥道曰王之大圭長三尺則尺有二寸所以錫諸侯者也諸侯之圭長不過九寸錫以尺有二寸使寶之而已竊意公之命圭為桓圭九寸比於侯伯之命圭各七寸者為獨長此即所謂封圭朝覲㑹同見王及諸侯相見時之所執也不得用尺有二寸之介圭惟為州牧者則王以介圭錫之故申伯韓侯獨有介圭也鄭氏謂圭長尺二寸謂之介非諸侯之圭故以為寶諸侯之瑞圭自九寸而下其說是矣集傳以介圭為諸侯之封圭則非矣蒸民一章仲字山甫名毛傳以為樊侯也孔氏謂樊即陽樊在東都畿內畿內無侯爵傳稱樊侯不知何據竊意纘戎祖考之言則似其先夲侯爵而世居輔相之職者樊即左傳王賜晉文公樊邑也杜元凱注樊一名陽樊野王縣西南有陽城野王夲河內今屬懷慶府夾漈鄭氏以為陽樊在濟源東南三十八里濟源南與河內相鄰即其地也周平王東遷雒邑去陽樊不逺故以為畿內宣王之前則雒邑在河南樊在河北河北之地固諸侯之所封也韋昭謂食采於樊亦求其說而不得之辭耳未入畿內之時安得以為采邑而分授卿大夫哉韓奕一章梁山據括地志在同州韓城縣東南一十九里又按其地臨河上當龍門之南西隔漆沮經耀州三水縣而後至豳去岐尤逺非大王遷岐所踰之梁山也孔氏謂梁山在岐山東北則豳之梁山乃為大王之所踰耳韓國名即韓城縣地當在梁山西北武王子姬姓左氏所謂韓武之穆也成王時所封夲侯爵其後受命為北邉州牧則或成或康其世無可考也為州牧故得稱伯二章淑旗淑善也交龍為旗旗之善者故曰淑旗旗蓋諸侯所載也綏章綏垂也即旗竿所注旄牛尾之垂下者以章别貴賤故曰綏章鄭氏以綏為所引登車者則是升車之索不可以屬於旗也旗綏並詳見干旄字義簟茀以竹簟為車蔽也錯衡者錯置文采於車衡也並詳見采芑字義𤣥衮者以𤣥為衣而畫以衮龍也詳見采菽字義赤舄赤色之舄諸侯服冕之所著也詳見九罭字義鉤膺馬婁頷之鉤在其胸前者也鏤錫者鏤刻也凡眉上曰揚故馬眉上之飾名錫鄭氏所謂刻金飾之今當盧也孔氏以為鏤金加於馬面之錫當盧者當馬之額盧在眉眼之上蓋諸侯皆得用之亦並見采芑字義鞹鞃淺幭謂以去毛之皮施之軾中而又以淺毛之虎皮幭於軾上也幭者覆蓋之義毛氏曰鞹革也鞃軾中也淺虎皮淺毛也幭覆軾也孔氏以為鞹去毛之皮也軾者兩較之間有橫木可憑者鞹鞃者以去毛之皮施於軾之中央持車使牢固也獸之淺毛者惟虎耳幭禮記作幦周禮作字異義同以淺毛之皮為幭也􅀈革毛氏曰􅀈轡也革轡首也今按爾雅轡首謂之革郭璞注謂轡為靶孔氏曰馬轡所靶之外有餘而垂者謂之革􅀈皮為之故曰鞗革曹氏曰以鞗皮為轡也而其餘垂者謂之革是也厄與扼同金厄以金為環纒扼轡首也孔氏謂轅端之木名衡衡即軛軛上著環以貫轡是也今按古者駟馬凡八轡二服馬皆有軛則但以四轡纒繫於環驅之使不得出如所謂脅驅者斯可矣若驂馬之頸不當於衡則皆以鞗皮繫頸而在內者繫於隂板在外者貫於游環而金厄不可以言於服馬之轡也互見小戎字義三章祖宿餞詳見泉水字義孔氏曰始行而為祖祭者為尊其往也反則自歸其國非復所尊而亦作祖如始行焉祖與所宿不是一處祖於國外畢乃出宿餞訖然後出宿今出宿之文在餞之上者示行不留於是也故於祖之下即言出宿也屠蓋在鎬京東北之地未詳其處或以為在同州䣝谷則太逺或以為即鄠縣之杜陵則其地在鎬京南不當至此也壺酒器亦尊罍之屬但質而無足禮器注曰壺大一石此以壺之大者言也云百壺則必小壺矣或瓦或木不可得而知焉酒至百壺可以及衆也炮鱉鮮魚與六月炮鱉膾鯉同孔氏曰炮毛燒肉也一曰蒸煮之也新殺謂之鮮魚餒則不任為膾鮮魚中膾者言鮮以見新殺也蔌毛氏以為菜殽也孔氏曰蔌者菜茹之總名釋器云菜謂之蔌故云蔌菜殽對肉殽故云菜殽謂為葅也今按蔌對殽而言則殽為肉蔌為菜通言之則殽可以兼菜果蔌亦可兼魚肉隨文便耳筍鄭氏以為竹萌蒲鄭氏以為深蒲孔氏曰天官醢人加豆之實有深蒲筍葅是葅有筍有蒲也筍皆四月生唯巴竹筍八月九月生始出地長數寸煮以苦酒䜴汁浸之可以就酒及食蒲始生取其心中入地蒻大如七柄正白生噉之井脆煮而以苦酒浸之如食筍法是說筍蒲葅之法也六章百蠻蠻夷也追貊北方夷狄之二種在韓之北界其後為玁狁所迫稍稍東遷故漢初其種皆在東北孔氏曰追貊二種之大名其種非止一國亦是百蠻之大總也按曲禮有東夷北狄西戎南蠻之文此以其分方者言如言蠻貊則為南蠻北貊也總而言之則通名耳故孔氏曰北狄亦謂蠻范氏補傳曰蠻夷可以通稱北可以稱蠻猶西可稱夷也貔許慎曰虎豹之屬陸璣曰似虎或曰似熊一名執夷一名白狐遼東人謂之白羆豹孔氏曰毛赤而文黑謂之亦豹毛白而文黑謂之白豹陸農師曰花如錢黑而小於虎文文豹隱霧七日不食欲以澤其衣毛成其文彩羆有黃羆有赤羆大於熊餘詳見斯干字義江漢五章秬鬯者祼神之酒也秬黑黍五榖之中黍最美故祼神用之以釀酒其氣條暢謂之秬鬯鬯從米從凵從七凵者器也七所以扱也未加鬱謂之秬鬯加鬱謂之鬱鬯鬱鬱金香草也王制曰諸侯賜圭瓉然後為鬯未賜圭瓉則資鬯於天子圭瓉說見棫朴字義卣尊彛之屬彛為上罍為下卣居中孔氏曰鬱人掌鬱鬯以實彛而陳之則鬯當在彛而云秬鬯一卣者當祭之時乃在彛未祭則在卣賜時未祭故卣盛之瞻卬三章梟與梟不同梟音驕梟音枵其聲亦異梟即鴟梟鴟者梟之大名故但言鴟詳見墓門字義陸農師曰梟食母說文云不孝鳥也故日至捕梟磔之字從鳥鵛在木上古者天子以春解祠黃帝用梟獍說者以為梟食母獍食父獍如貙而虎眼黃帝欲絶其類使百姓用之故後世於嵗始祓除凶災取以解祠黃帝漢使東郡送梟五月五日作羮以賜百官此遺制也又按陸璣謂梟肉甚美漢供御物各隨其時梟冬夏常施之以其美故也按璣此言與農師相類蓋一事而誤分耳以梟羮賜群臣所以懲惡而於梟又復以供御則梟雖可為羮炙亦非正味也何必以味美故而冬夏常施哉其為誤梟於梟無疑矣梟食母賊害其親者也鴟攫鳥子而食賊害他人者也故以為哲婦傾國家之喻召旻四章潰有三訓有訓怒者谷風有洸有潰是也有訓遂者小旻是用不潰于成是也有訓亂者召旻無不潰止是也項氏云水之潰者其勢橫暴而四出故怒之盛者為潰怒遂之盛者為潰遂亂之盛者為潰亂其理一也五章疏糲米也稗精米也朱子曰九章粟米之法糲十稗九鑿八糲米一斛治而成稗則九斗矣詩說解頥字義卷七
