body:
  text: 詩說解頥正釋卷十六明季本撰南陔白華華黍此朱子所謂笙詩也按華谷嚴氏曰董氏以為笙入有聲而無詩非失亡之乃本無也此說非也樂以人聲為主人聲即所歌之詩也若本無其辭則無由知其義矣此說於理為合故特存之後由庚崇丘由儀並同此三篇毛公序在魚麗之下朱子特據儀禮序正其辨於集傳頗詳令姑從之但詩之失次者甚多雖儀禮所存亦衰世以意為之之事不足為據詳見總論詩樂條下魚麗經㫖曰此詩為尊禮賢者而作因用以為燕饗之樂歌蓋亦大雅也魚麗于罶鱨鯊興也君子有酒㫖且多興意麗歷也罶以曲簿為笱而承梁之空者也君子指主人㫖美也多者無所不備也魚麗于罶魴鱧興也君子有酒多且㫖興意多㫖即上章之意取協韻故覆言耳魚麗于罶鰋鯉興也君子有酒㫖且有興意有即多也闕其所宜有不可以為多此前三章皆以魚麗于罶起興以見賢者為國所羅之意魚最多故以為喻物其多矣維其嘉矣賦也物謂水陸之羞嘉即㫖也本前章多且㫖而言物其㫖矣維其偕矣賦也偕即多也言水陸之物皆備也物其有矣維其時矣賦也時即美也物及時然後為美前三章皆言有酒乃置酒之通名也言酒則非食禮矣後三章皆言物則其所謂㫖所謂多者皆以殽言矣雖或言㫖或言嘉或言時或言多或言有或言偕用字不同其實嘉與時皆所以言㫖也有與偕皆所以言多也不過即㫖多二義反覆歎咏以見主人禮意之殷勤耳如此賢者豈有不樂就哉魚麗六章三章章四句三章章二句此詩義與嘉魚同由庚說見前華黍下南有嘉魚經㫖曰此詩與魚麗同南有嘉魚蒸然罩罩興也君子有酒嘉賔式燕以樂興意周都西北以南方之魚為美故曰南有嘉魚非指丙穴也蒸衆也罩所以取魚嘉魚而罩罩喻得賢之多也以酒燕樂禮賢之至也南有嘉魚蒸然汕汕興也君子有酒嘉賔式燕以衎興意汕所以撩魚也求賢士者如之三山李氏曰上籠之如罩下撩之如汕先言罩後言汕言得賢無方也南有樛木甘瓠纍之興也君子有酒嘉賔式燕綏之興意瓠有甘有苦甘瓠可食者也樛木得甘瓠之纍猶君有謙德而得賢者之歸翩翩者隼蒸然來思興也君子有酒嘉賔式燕又思興意隼孝烏以喻賢者之有孝有德也隼之飛群然而來類聚猶賢者衆多各以類至又又燕也見其欵洽也思語辭南有嘉魚四章章四句崇丘說見前華黍下南山有臺經㫖曰此人臣頌美其君之辭蓋頌體也與天保同舊說以為燕饗之樂則亦歌此以答君之賜也當為大雅矣南山有臺北山有萊興也樂只君子邦家之基樂只君子萬壽無期興意南北謂周地之南北君子指其君無期言無窮也華谷嚴氏曰有期則有時而止南山有桑北山有楊興也樂只君子邦家之光樂只君子萬壽無彊興意光德之所顯著也南山有杞北山有李興也樂只君子民之父母樂只君子德音不已興意大學云民之所好好之民之所惡惡之此之謂民之父母南山有栲北山有杻興也樂只君子遐不眉壽樂只君子德音是茂興意眉壽說見七月南山有枸北山有楰興也樂只君子遐不黃耇樂只君子保艾爾後興意黃耇老人靣之凍黎色如浮垢也保護也艾安也山以生物為性無物不生猶人君以愛人為德無物不愛也故以山木起興臺萊桑楊杞李栲杻枸楰不問小大美惡或可為食或可為材皆無所棄然後為天地之德人君於人無所不愛然後為父母之心父母之心樂育之心也故云樂只言止有此樂也樂只君子是此詩之大㫖邦家之基德固而根本立也邦家之光德盛而光輝著也此皆以父母之德為無期此德長久然後不已故祝其萬壽焉眉壽黃耇皆所以為萬壽也故又申祝之皆欲其德之不已也德音是茂聲名揚溢也保艾爾後慶流子孫也如此乃為福祿無窮矣所以祝頌而必以壽者意蓋如此南山有臺五章章六句由儀說見前華黍下蓼蕭經㫖曰此天子喜諸侯來朝而送歸之詩也當為大雅集傳以為諸侯朝於天子天子與之燕以示慈惠故歌此詩謂用此詩以燕非為燕而作也說見菁菁者莪蓼彼蕭斯零露湑兮興也既見君子我心寫兮燕笑語兮是以有譽處兮興意蓼長大貌蕭一名荻香蒿也詳見下泉字義湑潤澤也君子指來朝之諸侯寫傾㵼也燕安也笑語假以辭色也譽處謂名譽得安於所居也露湑於蕭猶天子之惠及諸侯也故以起興凡諸侯自君其國常恐讒言及於天子之側則其心不安而無以保其令名天子恐其自疑也而來朝之際示以坦懷故其言如此我心寫兮者天子自言得見諸侯而傾倒其心也如此則諸侯之心無所疑於天子而以得假辭色為安則諸侯之名譽所以得安於所處實在此矣此皆天子欲諸侯相忘於形迹之言也蓼彼蕭斯零露瀼瀼興也既見君子為龍為光其德不爽壽考不忘興意瀼瀼露蕃貌龍光以德言自其警惕於心而言則曰龍自其發越於外而言則曰光為龍為光勉之之辭有龍光之德然後不差故又祝之以壽考使之常存此德而不忘也上章開其解疑之懷而此章則勉其進德之實也蓼彼蕭斯零露泥泥興也既見君子孔燕豈弟宜兄宜弟令德壽豈興意泥上聲後凡泥並同泥泥露濡貌孔燕言其安之甚也心無所疑則一以德為安矣豈樂弟易即龍光之德其樂易如此也宜兄宜弟諸侯德之所施莫切於此蓋諸侯繼世而立多疑忌其兄弟以生亂故特指而言之以見實德之所在也令德壽豈即其德不爽夀考不忘之意此章申言上章之意蓼彼蕭斯零露濃濃興也既見君子鞗革冲冲和鸞雍雍萬福攸同興意濃濃厚貌鞗革詳見韓奕字義冲冲下垂貌集傳以此言諸侯車馬之飾也東萊吕氏則謂韓奕之二章王錫韓侯鞗革金厄三章曰其贈維何乘馬路車即其事也今按諸侯來朝而天子賜以車馬禮之常也但冲冲雍雍乃行時之言非賜時之言也蓋謂以此所賜之車馬乘之而還則人皆以為天子所寵益歸心焉而譽處由之矣故曰萬福攸同不然則不獲乎上民不可得而治欲福之皆同得乎蓼蕭四章章六句湛露經㫖曰此天子燕諸侯而留之夜飲之樂歌集傳得之矣但當為大雅耳湛湛露斯匪陽不晞興也厭厭夜飲不醉無歸興意湛露者以飲酒為恩澤之喻也陽日也喻君命君之燕臣不命之止則不止止酒必待君命猶露之必待陽而晞也歐陽氏以為露以夜降因其夜飲故取以為比厭厭蘇氏曰久也夜飲者私燕也歐陽氏曰天子燕諸侯當以晝而此言夜飲者燕禮有宵則設燭之禮是古雖以禮飲酒有至夜者所以申燕私之情盡殷勤之意以見天子恩禮諸侯之厚也箋疏皆以夜飲為留同姓諸侯則臆說耳湛湛露斯在彼豐草興也厭厭夜飲在宗載考興意豐草以比諸侯蓋豐草則得露多也宗尊也謂所尊者之室也燕於路寢之中即所謂宗也非宗室之謂也考成也成燕禮也湛湛露斯在彼杞棘興也顯允君子莫不令德興意杞山木棘小棗雖有大小而皆有用之木能勝露而不仆猶君子能勝酒而不亂也顯明允信君子指諸侯之與燕者顯允以著於外者言而令德則存於中者也其桐其椅其實離離興也豈弟君子莫不令儀興意桐椅詳見定之方中字義離離言實之分明而不混以比有實德者飲酒不亂也豈弟以存於中者言而令儀則著於外者也此詩前二章以君之勸飲者言欲其盡歡也後二章以臣之承恩者言喜其盡敬也樂而不淫此所以懷諸侯而天下畏之湛露四章章四句自鹿鳴至此二十篇舊皆分為二什毛氏則進魚麗於南陔之前而以鹿鳴南陔分什集傳則退魚麗於華黍之後而以鹿鳴白華分什然詩當散亡之後不可知其序次之正非大義所關略之可也今以南陔從亡詩之類而與白華華黍為同卷以序之詩說解頥正釋卷十六
