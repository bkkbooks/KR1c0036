body:
  text: 詩説解頥字義卷五明季本撰小雅鹿鳴一章呦呦猶喓喓聲之細也鹿本淫獸交則聚麀知禮者之所惡也詩人奚取焉此詩特以在野而食見其山林之性初非為其鳴而相呼也舊説以呦呦為和聲似以鹿為善者非經意矣承筐是將筐竹器之方者以盛幣帛則即是篚書所謂篚厥元黃是也此章小序謂實幣帛筐篚以將厚意孔氏以為飲有酬賔送酒之幣食有侑賔勸飽之幣食而以幣勸飽本公食大夫禮燕禮則無眀文但鹿鳴燕禮也既曰承筐是將則亦有幣即聘禮注所謂酬幣乃酬賔勸酒之幣也燕禮有旅酬無侑食不當以勸飽言耳四牡一章騑騑馬行疾貌蓋騑字從馬從非古字非與飛通同故有以飛作蜚者有以霏作霏者曰騑騑則如飛之意也禮記少儀車馬之容匪匪翼翼注以為行有文是以騑取裴義也與詩意不同矣毛氏以為行不止之貌其説近之二章嘽嘽衆多聲今考單字之義從吅從卑卑在衆口之下有單薄之義故單為薄然吅火袁反喧也喧則衆矣以單加口則為衆口有聲毛於采芑訓衆蓋略知此意也但於此章則又以為喘息之貌自相戾矣白馬黑鬛曰駱四牡下特言駱馬蓋齊其力而取其皆善走也陸農師曰今之駱馬最耐勞苦四章把枸把也華谷嚴氏曰本草云一名仙人杖根名地骨莖幹三五尺作叢春作羮茹詩中有三杞將仲子無折我樹把柳屬也有臺南山有把湛露在彼把棘山木也此詩集于苞把雅枤杜北山言采其把四月隰有把桋枸把也五章載驟駸駸許慎曰驟馬疾步也錢氏曰駸駸馬前進也常棣一章常棣與唐棣不同爾雅以唐棣為栘常棣為棣蓋分為二栘一名郁李一名薁李即七月詩所謂薁也棣一名雀李一名車下李即七月詩所謂鬱也二物皆可食而形亦略同故名稱多亂但栘大棣小棣先熟而栘後熟耳二章脊令與小宛脊令同即雪姑也爾雅謂之雍渠郭璞云雀屬飛則鳴行則搖華谷嚴氏曰小宛取義在於飛則鳴故曰題彼脊令載飛載鳴此詩取義在於行則搖故曰脊令在原程子以為首尾相應是也鄭氏以為水鳥宜在水中在原則失其常處故飛鳴以求其類非也今雪姑非水中之鳥若失其常處而飛鳴以求其類凡鳥皆然何獨脊令哉伐木二章釃酒釃與湑同毛氏曰以筐曰釃以藪曰湑孔氏曰筐竹器藪草也漉酒者或用筐或用草用草者用茅也左傳云包茅不入無以縮酒是也又按禮縮酌用茅皆湑酒之意諸父朋友之同姓而尊者也諸舅朋友之異姓而尊者也兄弟朋友之同儕者也先諸父而後諸舅者親踈之殺也先諸舅而後兄弟者尊卑之等也孔氏曰禮天子呼諸候同姓大國曰伯父異姓則曰伯舅小國曰叔父異姓則曰叔舅安成劉氏曰詩言兄弟多矣鄭風揚之水婚姻之黨唐枤杜雅常棣頍辨斯干行葦等篇同氣之親也此詩則同儕之友也各隨所指而不同耳八簋者盛黍稷之簋有八也若稻梁則簠盛之毛氏曰天子八簋長樂劉氏曰簋八則籩豆倍之天子燕之數也餘詳見權輿字義三章乾餱説者以為食而曰乾飯為餱又或引公劉乃裹餱糧為證殊不知此詩乃燕禮也禮無侑飯之節但以籩實之中有糗餌乃熬大豆與米實籩以羞賔客是乾餱之義也天保三章山阜岡陵爾雅曰下溼曰隰大野曰平廣平曰原髙平曰陸大陸曰阜大阜曰陵大陵曰阿可食者曰原陂者曰阪下者曰溼又曰山脊岡據此則岡為山之髙者陵為阜之大者四章吉毛氏訓善故集傳以為諏日擇士之善蠲毛氏訓潔故集傳以為齋戒滌濯之潔安成劉氏曰諏日者君臣諏謀祭日於旬有一日之先至次日乃卜所諏之日吉否也擇士者大射於澤宫以選與祭之士齋戒謂七日齋三日戒之類滌濯謂溉濯祭器掃除宗廟之類采薇一章玁狁北狄即夏之渠搜商之熏鬻漢之胸奴也在周則為玁狁世居北邊其地當在北河之北大王時侵入河南即今黃河套也而漸逼於豳大王以其國強不可與敵故避而居岐當時北有熏鬻西有昆夷而所以處之者不同故於熏鬻則事之於昆夷則字之順大小強弱之勢也故自王季至於文王纘承大王之緒恩威先及昆夷而信義因孚北狄玁狁見周德之盛天下歸之豳之故地雖其往來所嘗駐牧今亦退歸漠北不復南侵矣漢胸奴傳謂武王伐紂復居于豐鎬放逐戎夷涇洛之北以時入貢此理之所必然也但其放逐則在文王時經略有方不待兵革而自服耳厲王失道戎狄交侵至於宣王遂自鎬方而入則信乎文武之時狄人已不在豳境矣四章路君車之名禮天子諸侯之車方得稱路采薇之將帥駕戎車以出亦以路稱者必將帥之命數如諸侯也詳見采芑字義但采芑之路言象路而此則言戎路耳出車二章旐旄旟詳見千旄字義鳥隼曰旟前朱鳥也龜蛇曰旐後元武也下章交龍曰旗左青龍也但熊虎曰旗當為右白虎經文偶略之耳龜山楊氏曰師行之法四方之星各隨其方以為前後左右進退有度各司其局則士無失伍離次矣斾斾但狀旟旐之飛揚非以建斾言也蓋當在郊時未宜設斾三章方即朔方今陜西寧夏衛蓋靈夏等州之地而漢武帝於此置朔方郡者也在今固原西闕五百餘里毛氏以為近玁狁之國本無眀文但以國語考之則侯衛賔服之外戎翟荒服之內有蠻夷為要服即周禮大司馬所謂蠻畿小行人所謂要服而巾車所謂革路以封四衛者亦即此也故鄭氏謂四衛為蠻服以內孔氏云蠻者縻也以近夷狄羈縻以政教要者亦要束以文教也故亦封諸侯使為守衛禮記云四夷雖大皆曰子其殆謂此歟然而無城郭有待於南仲之城者必翟患未肆之前常倚山河為固而不待設險者歟及玁狁自鎬侵之則將有決藩之勢其地始為華夷之要區而不得不為城以守矣觀其命南仲為將而宣王之經略居可見焉五章西戎在今鞏昌秦州之地史記稱隴以西有昆夷蓋隴西者秦州之東也昆夷即犬戎乃西戎之族所分耳韋昭曰犬戎西戎之别名是也魚麗一章鱨一名揚陸璣曰今黃頰魚似燕頭魚身形厚長頰骨正黃大而有力解飛鯊一名鮀體圓有黑點文陸璣曰鯊魚狹而小常張口吹沙二章魴今鯿魚也説見汝墳鱧一名鮦本草云味甘氣寒無毒今黑鯉魚道家以為厭者也陸農師曰鱧元鯉諸魚中唯此膽甘可食與蛇通氣其首戴星夜則北向北方之魚也竊意鱧之得名以其禮斗故道家以為厭陸璣以鯉為鯇然爾雅以鱧與鯇分二種則璣説非矣三章鰋似鮎與鮀各為一種郭璞曰鰋今鰋額白魚鯉今赤鯉魚也魚中鯉為最貴陸農師曰鯉脊中鱗一道每鱗上有小黑點文大小皆三十六鱗躍龍門過而為龍夀有至千嵗者又曰鱨魚黃魴魚青鱧魚元鰋魚白鯉魚赤則五色之魚具備又曰鱨鯊之美不若魴鱧魴鱧之美不若鰋鯉故其序如此南有嘉魚一章罩一名篧捕魚籠也編竹或以荆為之以罩魚罩罩者不一罩之辭也二章汕樔也今之撩罟以薄汕魚者也罩籠之於上也汕撩之於下也陸農師曰魚欲逸則罩之使入魚欲伏則汕之使出求賢之道如此而已南山有臺一章臺一名夫須即莎草也陸農師曰可為笠又可為簑萊草名葉香可食陸璣曰今兖州人蒸以為茹謂之萊蒸按此專指可食之一草若草萊之萊則草之總名非皆可食者也二章桑可為弧楊即蒲柳可為箭並見車轔正釋三章杞山木也陸璣曰一名枸骨其樹如樗理白而滑可以為函李可食之果四章栲杻俱山木栲可為車輻杻可為弓弩幹並見山有樞正釋五章枸枳枸也陸璣曰枸樹髙大似白楊有子著枝端大如指長數寸噉之甘美如飴八九月熟謂之木蜜楰鼠梓也陸璣曰其樹葉木理如楸山楸之異者也今人謂之苦楸曹氏曰宫室之良材蓼蕭四章和鸞皆鈴也陸農師以鸞之雌者曰和雄者曰鸞故以為名取雌雄相應之義耳東萊吕氏曰後漢志注曰干寶周禮注和鸞皆以金為鈴鸞者在衡和者在軾馬動則鸞鳴鸞鳴則和應舒則不鳴疾則失音故云和鸞雍雍言得其和也然毛氏則謂在軾曰和在鑣曰鸞而鄭氏駟鐵箋以為驅逆之車置鸞於鑣異於乘車陸農師釋之曰驅逆之車尚輕疾故也如此則乘車之鸞當有雍雍之節矣乘車者鄭氏以為玉路金路象路是諸侯得同於天子之車也其行之遲速固與戎車不同但詩中凡言車者皆曰八鸞此非置於馬銜兩旁之鑣則兩服之頸不當於衡安得以八名哉竊意鸞聲不必以在衡在鑣分遲速也干寶之説本於魯訓韓詩雖相傳已久而於義則未安也今從毛氏彤弓一章饗鄭氏以為大飲賔也孔氏曰饗者烹大牢以飲賔是禮之大者以大禮飲賔獻如命數殽牲俎豆盛於食燕周語曰王饗有體薦燕有折爼公當饗卿當燕是其禮盛也一朝者言王殷勤於賔早朝而即行禮燕始至夜饗則如其獻數禮成而罷故以朝言之左傳昭公元年鄭饗趙孟禮終乃燕是饗不終日也今按饗食燕者公禮之三等也有三饗三食三燕者有二饗二食二燕者有一饗一食一燕者有一食再饗有一食一饗而其燕無數者其差各如其爵然饗禮與食則皆烹大牢但饗有酒而食無酒饗有獻酢而食無獻酢所以别也蓋饗者天子所以饗諸侯及卿大夫之有功與諸侯之饗鄰國使臣者食禮雖無酒皆大禮也燕則繼饗而燕賔客及祭畢而燕同姓與無事而燕羣臣其禮不若饗之盛矣饗禮重燕禮輕公卿皆然不但如周禮所謂公當饗卿當燕而已賈氏聘禮疏曰受賔聘享皆在太祖廟若饗食則於禰廟燕又在寢彌相親也周禮大宗伯疏亦曰饗賔獻以命數在廟行之燕者其牲狗行一獻四舉酬降脫履升坐無算爵以醉為度行之在寢據此則燕以狗為牲不必少牢也而况於大牢乎於燕止言一獻則知非饗之獻依命數者矣於燕云四舉旅則知饗之無旅酬矣於燕云降脫履升坐則知饗為立成不坐如左氏所謂設几不倚者矣於燕言無算爵以醉為度則知饗之有獻至命數終而止如左氏所謂爵盈不飲者矣饗務行禮而不在食則半解牲體以薦之而無解折故饗有體薦所以訓共儉也燕則體解節折升之於俎使肉可食而情與相親故燕有折俎所以示慈惠也此又燕饗之所以别也饗也燕也皆人君待賔客及其臣之禮也若臣民私飲而非由君設者則謂之飲如鄉飲酒及吉甫飲御皆謂之飲者是也故燕禮記疏亦有君禮臣禮之分焉食則通乎上下有與大饗並言之食其私食則與私飲同科矣然又有通稱者如七月朋酒斯饗本鄉飲也而亦謂之饗饗又有以為祭饗之饗歆饗之饗者義各與此不同别見楚茨享祀字義二章右鄭氏以為右之者主人獻之賔受爵奠於薦右既祭俎乃席末坐卒爵是取賔奠於薦右為義主饗而言也則其意拘而不廣矣三章酬鄭氏謂飲酒之禮主人獻賔賔酢主人主人又飲而酌賔謂之酬亦主饗而言也誠太拘矣故毛傳不主飲酒而直訓為報王肅亦云酬報功也蓋借酬以眀報義耳華谷嚴氏遂謂饗訓共儉爵盈而不飲未必有酬酢則又考之不詳矣按郊特牲大饗君三重席而酢三獻之介君專席而酢安得謂無酬酢邪大行人注上公之禮行朝禮在朝乃行三享在廟既訖而饗禮九獻謂日後王速賔賔來就廟中行饗饗者烹大牢以飲賔設几而不倚爵盈而不飲饗以訓共儉九獻者王酌獻賔賔酢主人主人酬賔酬後更八獻是為九獻舉此則侯伯子男卿大夫可以例推矣其禮之儉但不若燕之有旅酬耳烏得遂謂無酬酢邪六月一章戎車兵車也挽之以革而漆之無他飾故又謂之革車餘詳見車攻字義常服戎事之常服也周禮司服凡兵事韋辨服鄭氏注韋辨以韎韋為辨又以為衣裳春秋傳曰晉郤至衣韎韋之跗注是也今時伍伯緹衣古兵服之遺色賈氏謂韎是蒨染赤色也跗謂足注跗屬也袴屬於跗裳亦用韎韋也伍伯者宿衛之行長是古兵服遺象至漢時是兵服赤之驗也故陳氏祥道謂兵事上下同服正謂此耳然集傳以韎韋為辨又以為衣而素裳白舄此則衣從冠色舄從裳色之制蓋本聘禮君使卿餼賔有韋辨之文而注遂附會其説耳夫衣從冠色舄從裳色此禮服之制也而以言兵服之韎韋可乎陳氏祥道固謂其無據而於淇奧字義亦辨之矣則此當依司服注韎韋為衣裳之説如此則與聸洛韎韐有奭以作六師之義亦相合矣二章比物四驪比齊同也物者以色分類之名四驪者同一色也周禮校人職曰凡大祭祀朝覲會同毛馬而頒之凡軍事物馬而頒之注云毛馬齊其色物馬齊其力毛氏則謂宗廟齊毫尚純也戎事齊力尚強也田獵齊足尚疾也爾雅亦與毛同今按齊色齊力齊強之説雖其分如此而亦有不盡然者孔氏曰戎事齊力尚強不取同色而曰四驪者雖以齊力為主亦不厭其同色故曰駟騵彭彭又曰乘其四騏田獵齊足而曰四黃既駕是皆同色也無同色者乃取異毛耳騏駵是中騧驪是驂是也據此則馬蕃畜者可以兼之益見其養馬之善否則舉其所重亦各有專主耳四章穫一作護蕉穫藪名周畿內地爾雅十藪周有蕉穫郭璞注曰今扶風郡池陽縣瓠中是也今按蕉穫澤在涇陽縣北池陽廢縣在三原縣東北二十里涇陽在三原之西皆屬西安府相鄰之邑而去鎬京百餘里毛氏以蕉穫為周地之近玁狁者非矣鎬劉向以為千里之鎬謂周畿千里盡處也以玁狁自此至方而始侵涇陽故知非鎬京耳然亦不詳所在今以吉甫薄伐至于大原觀之未嘗窮追逺出也而言其來歸則曰自鎬鎬必大原之邑名也以其地髙平故謂之鎬漢魏於此置髙平縣非以其為大原歟方即朔方詳見出車侵鎬而遂入方必其北邊相近之地侵鎬犯周畿也又以方遏西戎相通之路故復侵之尋復大肆以深入涇陽整兵以屯蕉穫其不可茹者如此織旗各有文為號以識别之故旗謂之幟鳥章鳥隼之章即幟文也師行有青龍白虎朱鳥玄武招搖五方之旗獨言鳥章舉朱鳥之一旗耳斾或作茷附旗之帛郭璞云末為燕尾理或然也但爾雅謂繼旐曰斾而説者遂以垂斿釋之則斿如流水之勢而數之多寡不同非燕尾之形也斿亦有五色如左傳定公四年載分康叔以蒨茷則赤色之斾也獨言白斾亦猶五方旗之單舉鳥章耳昭公十三年載晉人以諸侯有間會于平丘八月辛未治兵建而不斾壬申復斾蓋斾者將戰始設未戰則但建旗而不斾也王者之師有征無戰而曰白斾央央者蓋示必征之意非若後世之斾則必戰也長發武王載斾義同元大也戎即戎車以奉王命為大故曰元戎此與秦小戎義異五章大原舊説以為在大原府陽曲縣蓋謂河東之大原也竊謂大下無點乃大原非太原也當時河東之大國有晉兵雄晉陽而足以制羣狄河西之大國有韓世為州牧而足以控百蠻玁狁之部落近於周疆必不自河西道入觀其由朔方而至涇陽則必取固原之道向豫嘗聞之友人謂大原即固原其説必有所受矣蓋固原去朔方約五百餘里而玁狁在其東北則其入周之要路當在此也餘見前章字義六章炮鱉鱉穹脊連脅甲蟲也水居陸生爾雅謂合毛炙物曰炮蓋以毛炮而炙之即禮記注所謂包褁燒之也但謂之包則或茅或菜皆可用不必定以毛包也如鱉之無毛將以他毛包之乎若華谷嚴氏謂鱉可煮不可炮則於炮鱉之義不可通矣詳見瓠葉字義膾鯉以魚之鮮者聶而切之為膾即今之魚腥也許慎以為細切肉蓋即論語膾不厭細之意鱉非燕飲之常膳鄭氏謂加珍美之饌以極勸也采芑一章芑榖名三山李氏曰毛以薄言采芑為菜豐水有芑為草維􅐘維芑為榖王氏皆以為榖新田即由災而治已柔者也既柔則和而為畬災則初耕地而反草者也爾雅云田一嵗曰災二嵗曰新田三嵗曰畬路車蓋象路非即戎之革車也孔氏以此為金路蓋緣周禮巾車有金路鈎樊纓之説而不知鈎乃天子諸侯車飾之通名方叔又非同姓諸侯其路不可必其以金耳巾車又言象路朱謂車色也正合路車有奭之義方叔所以不乘革路者孔氏謂以革路臨陳所乘也集傳以戎路釋路車則革路革挽而漆之不可以言奭矣簟茀以竹簟為車蔽也説見載驅正釋魚服説見采薇正釋但采薇魚服以矢服言而此則直以飾簟茀耳蓋此上下文所言皆車飾也孔氏引左傳夫人歸魚軒注云魚皮又可以飾車也義與此同鉤膺鉤婁頷之鉤也以金為之膺馬之胸前也蓋從頷夾馬頸而婁之以鉤於胸前也集傳謂馬婁頷有鉤而在膺有樊有纓樊馬大帶纓鞅也今按樊或作繁取鞶革之義故讀如盤杜氏謂之馬腹帶是以樊纓為二物而樊在馬腹纓在馬胸也然纓鄭氏以為合馬鞅賈氏儀禮疏云古者謂之纓漢時謂之鞅舉漢法為况則鞅之為字從古有之其字從革必革為之也鄭司農云纓當胸以削革為之其説未為非是但所謂纓者所以飾鞅而陳氏祥道以為纓非鞅也蓋本左氏遊纓及杜氏纓在馬胸前如索裙之説曰遊則若今之纓緌可以遊移者而舊注直謂纓為鞅則非矣夫纓王十二就公侯九就伯七就子男五就就重也一重為一匝也皆以五采罽飾之罽續毛使長用五采染織依命數為就聚而成纓以綴於鞅此惟諸侯得用之天子之卿視侯大夫視伯元士視子男其纓之就宜與諸侯同他皆不敢用也故衛叔仲于奚請樊纓孔子以為名器不可假人若以樊為馬腹帶則此帶無纓以别尊卑人人所得通用而何係於諸侯之名器哉故有纓之樊在前者也馬腹之帶在後者也在前之樊即鞅也如此則纓在鞅中為當胸而鞅之兩旁婁頷之鉤之所貫也賈氏謂後鄭以纓是馬夾頸則又非矣蓋鉤是金纓是罽本不同也陳氏祥道知馬腹帶不可以為樊纓之樊而以樊然釋之則又失樊字之義也大抵馬飾之名多矣起於周禮巾車而為説者之所以不一亦由巾車之文本雜亂無倫也今即其言而備論之巾車掌公車之政令王之五路一曰玉路錫樊纓十有再就建大常以祀金路鉤樊纓九就建大旗以賔同姓以封象路朱樊纓七就建大赤以朝異姓以封革路龍勒絛纓五就建大白以即戎以封四衛木路前樊鵠纓建大麾以田以封蕃國注云玉路以玉飾諸末金象亦然朱以朱漆車而飾之即路車有奭也革路挽之以革而漆之無他飾木路不挽以革漆之而已此路車之飾也錫馬面當盧刻金為之所謂鏤錫也勒馬頭之絡也有御曰勒龍勒者以龍為飾如儀禮士貝勒然此皆馬首之飾也鉤樊纓説並見前曰條纓者條讀為絛以朱白蒼三色絲為絛而不用五采罽如士喪禮馬纓三就也三就以三絛聚而為一其著鞅則如五采罽然實非五采罽之纓也前樊者正謂樊之在馬胸前也鵠杜子春謂故書或為結蓋言無就而結之耳如此則絛纓乃垂而長者不為結而纓之結者則又降於絛纓矣鄭氏以前為翦以結為鵠皆以色言而陳氏祥道皆無取馬此皆馬膺之飾也大抵玉路惟天子得用之其曰同姓異姓者則五等諸侯皆在其中而金路則非有功為上公及同姓之異等者亦不以封也然則象路亦豈止以賜異姓者乎若革路之革鞔而漆即大夫之墨車也木路之不革挽而漆即士之棧車也上得以兼乎下故曰天子之五路諸侯之於革木二路亦然然而巾車所載車馬之飾若有所分配者蓋因車之貴賤而各因以為差耳非截然一定之制也如九就七就五就之制宜備於金路象路之中而乃以五就言於革路天子之大夫視伯非乘革路者也而乘墨車之大夫即諸侯之大夫也天子之元士視子男當用五就則天子之中士下士當用條纓而馬纓三就之在士喪禮者正絛絲也以其不得同於元士之用五采罽故以三就之絛為别耳諸侯之卿大夫纓無眀文其必與天子之中士下士同制歟鄭氏謂王之革路絲絛則宜以三就而巾車乃言五就安可通乎故知九就七就五就之等自為差耳非從五路以為序也如此則木路之言結纓乃為諸侯之士言也其差自宜降於條纓矣如以天子諸侯用之則纓亦如其命數之就可也而豈真在五就之下哉故此詩言方叔之車鉤膺鞗革嵩髙言申伯之車鉤膺濯濯韓奕言韓侯之車鉤膺鏤錫夫方叔以卿士受服申伯以異姓改封則象路矣而皆有鉤膺韓侯以同姓受命則金路矣而有鏤錫是錫不特施於玉路而鉤不特施於金路也故陳氏祥道曰禮所謂錫也鉤也朱也龍勒也條也各舉其一互相備也若夫木車則質而已故結其前五者之飾皆其首面頷膺之著者也故不及腹帶知此則可以觀其會通而不牽於文句矣二章軧詩詁以為轂之旁出者也考工記三分其轂長二在外一在內以置其輻是轂之外者長而內者短也在輪中通名為轂轂之旁出者為軧約軧者毛氏曰長轂之軧也朱而束之孔氏疏曰轂則謂之軧兵車乘車其轂長於田車是為長轂也朱而約之謂以朱色纒束車轂以為飾蓋以皮纒之而上加以朱漆也又曰錯者雜也雜物在衡是有文飾其飾之物注無云焉八鸞四馬在鑣之鈴也瑲瑲與鶬鶬同衆集聲也命服謂受天子命而得服者玉藻云三命赤韍蔥衡今云朱芾是赤芾之通名也蔥謂蒼玉之色孔氏曰三命以上至九命皆蔥珩非謂方叔唯三命也鄭氏以命服為天子之服韋辨朱衣裳是以戎服言也恐戎服不宜有茐珩之佩耳且與路車有奭者不類三章鉦鐃也鐲也孔氏曰鐲鐃皆得以鉦名之鐲似小鐘鐃似鈴有大小之異耳凡軍進退皆鼓動鉦止非臨陳獨然此文在陳師鞠旅之上是未戰時事也濮氏曰周禮云鼓人以金鐲節鼓以金鐃止鼓即無鉦名則鐲鐃通謂之鉦而節止實由於鼓據此則鉦人伐鼓者即鼓人也主鉦而言故曰鉦人耳車攻二章田車在周禮巾車謂之木路不挽以革而但漆之蓋朴素渾堅之制也輿廣六尺六寸與兵車乘車同惟輪則田車小兵車乘車三寸説者以兵車乘車皆駕國馬而田車駕田馬故也然既差馬而齊之故四牡孔阜皆良馬也特以田車欲便於搏獸故其輪稍低所謂田馬雖不及龍馬之八尺蓋亦七尺之騋矣甫草韓詩作圃草鄭氏曰甫田之草也爾雅十藪鄭有圃田郡國志圃田澤一名原甫在鄭州中牟縣西北七里其圃東西五十里南北二十六里集傳曰圃田後屬鄭地宣王時未有鄭國圃田屬東都畿內故往田也今按中牟在鄭州東今𨽻開封府圃田者常狩之地也三章敖敖山下地名在鄭州滎陽縣西十五里當甫田之西界東萊吕氏曰敖山之下平曠可以屯兵翳薈可以設伏所謂東有甫草即此地也四章亦芾鄭氏曰芾者天子純朱諸侯黃朱純朱者朱芾也黃朱者赤芾也孔氏謂朱深於赤對文則朱赤淺深有異散則皆謂之朱故天子純朱眀其深也諸侯黃朱眀其淺也舉其大色皆得為朱芾也然其所以異者特以朱臨下赤朝上之禮宜有差耳故臨川王氏曰人君宜朱芾而此赤芾者會同故也蒞其臣庶則朱芾君道也故方叔服其命服則朱芾會同於王闕謂之伯按周禮校人春祭馬祖夏祭先牧秋祭馬社冬祭馬步所謂馬祖本不知其何指惟鄭氏以馬祖為天駟天駟者孫炎以為房四星也竊意星名亦後人所加馬非因此而生安得以為祖蓋亦臆説耳先牧馬社馬步之名則亦因其字義而推之可也祭各以時祭之常也今將田而祭馬祖則亦欲齊其足而求神之祐耳二章漆沮二水名雍州之域有二漆沮而皆入渭其一在漢馮翊之地涇之下遊也其一在漢扶風之地灃之上遊也禹貢導渭東會于灃又東會于涇又東過漆沮入于河渭水未會灃之前所受之漆沮扶風之漆沮也不言渭之所過於會灃之上而言所過於會涇之下者則馮翊之漆沮也意者扶風漆沮小而可略而馮翊漆沮大而當詳歟漆沮於經常並稱之必二水相敵也然二水名稱相亂或以沮水言於馮翊而沮自為沮或以漆水言於扶風而漆自為漆或以漆沮為一水故釋經者往往無定論以今考之沮水出延安府中部縣西南子午嶺流經西安府涇陽縣嵯峩山南及耀州富平縣至粟邑廢縣會于洛粟邑今同州白水縣西北地也洛水出慶陽府城東北廢洛源縣於白山非洛陽之洛也流經延安府甘泉縣西及鄜州洛川縣至同州澄城縣西北南流合沮水至同州朝邑縣入渭竊意洛水即漆水也蓋二水異源而同出慶陽流長俱大故漆沮並稱孔安國注禹貢漆沮亦曰洛水此説是也但不當以沮併為洛耳然比之寰宇記所謂漆水自耀州同官縣東北界來經華源縣合沮者則沮大漆小不得並稱而耀州之漆不可以當漆沮之漆矣此馮翊之漆沮也又一漆水出鳯翔府北麟逰縣西普潤廢縣故漢漆縣也流經岐山北大欒水自西北注之南與杜水合杜水出杜陽山在府城東北二十五里故杜陽縣地也其並稱之沮水則諸家以為未詳然有大欒諸水合流豈即沮之别名而失傳歟此扶風之漆沮也馮翊之漆沮即此漆沮之從天子之所與潛猗與漆沮者是也扶風之漆沮即綿自土沮漆者是也何以别其如此邪以公劉遷豳大王遷岐觀之大略可見矣蓋不窟之徙居戎翟也在今慶陽府公劉自不窋故地而遷豳在今邠州淳化縣西廢三泉縣界當涇水之西其道甚便而沮在涇之東漆又在沮之東俱隔大山公劉初遷必不至馮翊之漆沮也及大王自豳遷岐踰梁山而始至岐山北漆沮合流之處梁山在今西安府乾州城西北五里當豳之西南大王初至於此時尚未有室家也故陶復陶穴以居沮漆耳當其在豳則公劉時先已有館况至大王時在豳既久豈得復言陶復陶穴哉但其地水源所出俱在岐周之北扶風之地非豳也顔師古謂自土沮漆齊詩作自杜公劉避狄而來居杜與漆沮之地其謂杜與漆沮為三水則是而曰公劉來居蓋本鄭元詩譜之説則失之矣蓋漆沮之會於同州者去鎬京三百餘里據爾雅則周人常狩之藪焉蕉穫近於漆沮其山多獸其水多魚順渭流而下取獸取魚恆必從之故吉日及濳之漆沮當言於馮翊也不然則二漆沮混而無别此為説者所以紛紛無所的從歟鴻鴈一章鴻鴈似鵝之鳥孔氏曰鴻鴈皆是水鳥其形鴻大而鴈小春則避陽暑而北秋則避隂寒而南庭燎一章庭燎大燭也以松葦竹灌脂束之諸侯將朝則司烜供蕡燭庭燎注云拊於門外曰大燭門內曰庭燎疏云以庭名之眀在門內故以大燭為門外文對故異散則通也沔水一章朝宗本諸侯見天子之名周禮大宗伯曰春見曰朝夏見曰宗秋見曰覲冬見曰遇注云朝猶朝也欲其來之早也宗尊也欲其尊也覲勤也欲其勤王之事遇偶也欲其若不期而偶至竊意諸侯以四時至者如舜典巡狩以四時分東南西北嵗遍也大宗伯所言則十二嵗侯甸男采衛要六服之諸侯盡朝於京師亦以四時分方而至也朝宗覲遇各舉一邊孔氏所謂互見為義諸侯朝覲天子豈有别乎此云朝宗于海者猶書言江漢朝宗于海也以見民心有歸之意黃鳥一章榖木名下榖字善也安成劉氏曰二榖字異義據韻則一從木一從禾我行其野二章蓫牛蘈仲春時生可采或曰惡卉陸璣曰今之羊蹄似蘆蔔而葉長赤煮為茹滑美三章葍葍也陸璣曰其根正白宜著熱灰中溫噉之荒嵗可蒸茹以禦飢曹氏曰蓫葍皆野生斯干五章莞小蒲濮氏以為燈心草即苻離也按周禮有莞席蒲席莞與蒲宜有大小之别故鄭氏以莞為小蒲之席而華谷嚴氏以為莞精而蒲粗也竹葦曰簟司几筵有次席注以為桃枝竹所次成文者其即此簟歟莞席在下即筵也竹簟在上即重席也孔氏曰寢卧之席自天子以下宜莞簟同熊羆皆有力之獸也熊強毅有能而羆尤強陸農師曰熊似豕堅中山居當心有白脂如玉味甚美好舉木而引氣謂之熊經冬蟄不食飢則自舐其掌故其美在掌熊之摶擊先伏而後動羆似熊而大為獸亦堅中長首髙腳猛從木能緣能立其白生於心之下肓之上亦如熊白而粗春夏則有秋冬則無猛憨多力能拔大木虺蛇皆毒螫之蟲虺蝮也孫炎曰廣三寸頭如拇指有牙最毒陸農師曰虺狀似蛇而小舊説蝮蛇怒時毒在頭尾螫手則斷手螫足則斷足蛇之尤毒烈者也蛇紆行曰委蛇蓋取諸此蛇盤常向壬壬北方也無羊一章犉毛傳以為黃牛黑唇此與爾雅雜黑脣同竊意周人尚騂何取於義而以黃牛黑唇為貴乎一説牛七尺為犉庶幾可通但恐繭栗之牛亦未必至七尺耳故今宜以騂牛之一色者為犉四章衆維魚矣衆者人衆也夢人衆而乃是魚者魚是豐年之祥見人之衆多者皆為豐年也陸農師曰俗云春魚遺子如粟埋於泥中眀年水及故岸則皆化而為魚如遇旱乾水不及故岸則其子為日暴乃生飛蝗故説者以為隂陽和則魚多豐年夢魚理或然也旐維旟矣旐旟旐龜蛇之旗北方藏伏之象也旟鳥隼之旗南方飛揚之象也夢旐而乃是旟見其由藏伏而飛揚其昌盛之勢不可遏也集傳據周禮大司馬郊野載旐之説而曰旐統人少又據司常州里建旟之説而曰旟統人多則其序乃隨時之所部分而非不可易之制也安可以是定多寡哉已詳辨於干旄字義矣節南山二章憯毛氏訓曽鄭氏亦從其義而後儒遂因之不改然以理求之於曽義亦無所當考之韻書但以為慘戚愁恨耳惟錢氏曰憯痛也得之矣後皆倣此正月六章蜴蜥蜴也陸璣曰大如指形狀可惡陸農師曰蜥蜴蝘蜓守宫也博物志云以朱飼之其體盡赤搗之萬杵以點女人終身不滅如赤志偶則落故曰守宫守宫鱗色如蛇而四足亦與魚合如此則守宫者水蟲也故與魚合爾雅以蜥蜴釋蠑螈以蝘蜓釋守宫以守宫釋蝘蜓形狀相類而四名則本一物也然許慎謂在草曰蜥蜴在壁曰蝘蜓邢昺謂在草澤中者名蠑螈蜥蜴在壁者名蝘蜓守宫詩詁亦謂守宫蜥蜴二物蜥蜴尾通於身如蛇而加足有黑色者有青緑色者常居草間守宫褐色有尾偃伏壁間故名蝘蜓亦謂守宫常在屋下也今按蜴與虺並稱則亦有螫毒者也但今在壁間者名蠍虎能螫人而在草澤間者名五步蛇不能螫人則蜥蜴當在壁間與蝘蜓守宫同一物而蠑螈在草澤間當自為一物耳大抵此二物者名稱亦多相亂故方言云秦楚西夏謂之守宫或謂之蠦􅫢或謂之蜥蜴南陽呼蝘蜓南楚謂之蛇醫或謂之蠑螈初不以為二物也然東方朔云非守宫即蜥蜴則又以守宫蜥蜴分而為二殊不知蜥蜴在壁間能螫則不當與守宫分二類矣虺説見斯干字義八章褒姒褒國名姒姓夏所封其地在今漢中府褒城縣括地志故城在縣東闕百步褒人有罪入此女於幽王以贖罪是為褒姒王為廢申后及太子宜臼而立以為后十月之交一章日有食之集傳曰歷法周天三百六十五度四分度之一左旋於地一晝一夜則其行一周而又過一度日月皆右行於天一晝一夜則日行一度月行十三度十九分度之七故日一嵗而一周天月二十九日有竒而一周天又逐及於日而與之會一嵗凡十二會方會則月光都盡而為晦已會則月光復蘇而為朔朔後晦前各十五日日月相對則月光正滿而為望晦朔而日月之合東西同度南北同道則月掩日而日為之食望而日月之對同度同道則月亢日而月為之食是皆有常度矣然王者修德行政用賢去姦能使陽盛足以勝隂隂衰不能侵陽則日月之行雖或當食而月常避日故其遲速髙下必有參差而不正相合不正相對者所以當食而不食也若國無政不用善使臣子背君父妾婦乘其夫小人陵君子夷狄侵中國則隂盛陽微當食必食雖曰行有常度而實為非常之變矣今按上古陽盛日不常食故一食即為大變夏書所謂乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走可以見其警懼之甚矣觀春秋二百四十二年之間而書日食者止三十六亦未若後世之數食也四章卿士杜預以為王卿之執政者按孟子云天子之卿受地視侯大夫受地視伯元士受地視子男蓋謂所食采地之祿非實封也惟為卿則為王所重而加之子爵以其下親民事示子養之意耳其受祿則固視侯而食采也豈若外諸侯之世襲子封哉然子爵止謂元士謂之卿士而卿未有爵以侯伯者陸淳曰畿內諸侯皆曰子殷制已然箕子微子是也周因之王臣稱子皆畿內諸侯也蘇子單子尹子是也然則周書顧命有芮伯彤伯衛侯皆周之六卿何以不為子爵邪蓋成王之時周都鎬邑而芮彤衛皆以外諸侯入為天子六卿故稱其本爵耳由是知王制所謂天子縣內封方百里者九又封方七十里者二十一又封方五十里者六十三皆附會之説矣司徒地官掌邦教冡宰天官掌邦治本皆卿也然既為卿則宜稱子意者畨與家伯因未有爵封而不得為卿士歟不然則若咺糾闕耳膳夫上士掌王之飲食膳羞者也屬天官內史中大夫掌爵祿廢置殺生豫奪之法者也屬春官趣馬中士掌王馬之政者也屬夏官師氏亦中大夫以媺詔王而喻諸道德者也屬地官司徒當在宰下而序於其上膳夫趣馬皆以士而序於大夫之上蓋皆近幸之臣必當時寵任各有所專重而為之差歟皇父畨棷蹶楀皆氏也家伯仲允皆字也稱氏者由世族而進用也稱字者本大夫而兼攝也稱子者年尚少也艷妻煽方處艷妻謂褒姒意此詩作於幽王六年之後按唐書志十月辛邜日食在幽王六年而國語載三川震岐山崩於幽王二年三川者涇渭洛也此即所謂百川沸騰也岐山崩即山冡崒崩也蓋十月日食以前事而詩人追言之也史記載幽王三年王之後宫見褒姒愛之生子伯服竟廢申后並去太子宜臼以褒姒為后以伯服為太子曰竟廢申后則要其終而言也亦必在四五年之間而煽處亂政則又當在其後矣故曰此詩作於六年日食之後也六章向孔氏以為東都之畿內而引杜預河內軹縣西有地名向上之説則軹縣者今之濟源也在懷慶府西七十里集傳則謂向今孟州河陽縣河陽今為孟縣在懷慶府南六十里軹孟本相鄰之地蓋必一處而分屬不同也但幽王之時尚未東遷洛邑洛邑去鎬京八百餘里而向在洛邑東北約又二百里不應併其三卿而逺城於此意者宣王中興以來常至東都朝會諸侯郊祀天地而向可以為東都湯沐之邑故皇父因有寵於王而請城耳以王命城故曰禮則然矣蓋幽王之世犬戎方盛患將逼周皇父知有東遷雒邑之幾欲先為自安之計故擇三卿及其士大夫之富而有車馬者皆往居而實之此與董卓築郿塢事同可以見權在之不顧國家矣九域志謂同州有向城雖所傳聞之處不同其為自安計一也詩説解頥字義卷五
