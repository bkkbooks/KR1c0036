body:
  text: 詩説解頥正釋卷六明季本撰王王者周之國都成王時尚都鎬平王時則都王城也周初武王自豐遷鎬是為宗周至成王乃即武王定鼎郟鄏之處使召公相宅既成謂之王城以為時㑹諸侯之所是為新邑及周公營洛邑謂之成周以為居殷頑民之所是為下都自是以鎬京為西都洛邑為東都東都時㑹既畢則復歸西周猶未遷洛也及平王因犬戎之亂徙居王城而東都遂為東周至敬王之世徙都成周則又以王城為西周成周為東周與平王之時不同而詩之正則不逮敬王之世矣西周在文武時國都内之詩已列於周南成王營洛之後則其風為王而地兼洛邑言之以見後王之風不復能及西周二南之盛也詩之雜入他國及二雅者各説見本篇諸國叙次義不可求惟王風則當在二南之下鄭譜移就豳上則非矣豐在今西安府鄠縣文王既伐崇而即其近地以都者也鎬在豐東二十五里亦為鄠縣地武王徙近豐之地而為都者也成周在今河南府洛陽縣東洛誥所謂瀍水東也王城在洛陽之西今河南府治洛誥所謂澗水東瀍水西也王城成周之分只在瀍水東西之間耳洛一作雒黍離經㫖曰舊說因大夫行役至於宗周過故宗廟宫室盡為禾黍閔周室之傾覆彷徨不忍去而作今以事理論之似不盡然當時周雖東遷雒邑而岐周舊地已盡封秦假使故宫為其所毁則都城之内宜為室廬乃以黍稷為言則當在野外之地而豈可語於城内哉且五榖者民之所資以養者也而稱其黍稷之盛則其民猶為勤力似有嘆羡之意與言蔓草荆榛者不同矣其必秦得岐周之後務本力農周大夫出過其地而見之知秦地廣民勤將以富强雄天下而傷周室之不競乎彼黍離離彼稷之苖行邁靡靡中心摇摇知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉賦也彼指秦而言離離言其實之垂也黍稷詳見七月字義黍實稷苖非同時可見蓋嘆其黍稷之盛耳邁行及逺也靡靡猶蘇蘇氣索之貌心憂謂憂王室不競之出於心也何求疑其為名也此者對彼而言指周王也呼天而嘆之無所望之辭也彼黍離離彼稷之穗行邁靡靡中心如醉知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉賦也穗秀而成穗也不但吐華曰秀而已蓋秀雖未實然亦有穗矣如醉者昏而不知之意彼黍離離彼稷之實行邁靡靡中心如噎知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉賦也噎食窒也如噎而氣逆不通也苖而穗穗而實雖亦有序取於叶韻以嘆稷之盛故總以配於黍之離離非以行役之乆前後所見如此也黍稷三章章十句君子于役經㫖曰婦人以其夫乆役於外未有歸期而思念之故作此詩君子于役不知其期曷至哉雞棲于塒日之夕矣羊牛下來君子于役如之何勿思賦也君子婦人目其夫也曷至哉當與下章曷其有佸意同鄭氏以為何時當來至是也鑿墻而棲曰塒日夕則羊先歸而牛次之思者思其夫之乆而不得歸也君子于役不日不月曷其有佸雞棲于桀日之夕矣羊牛下括君子于役苟無飢渇賦也佸㑹桀杙括至也苟無飢渇言苟且以免於飢渇而不甘於飲食見其思之深也日夕而雞棲牛羊下言物皆有休息之期也君子行役無休息之期而婦人能切於思念甘心食貧豈易得哉君子于役二章章八句君子陽陽經㫖曰君子遭亂世欲全身逺害招其友隱於禄仕而為伶官其友樂而作此詩也君子陽陽左執簧右招我由房其樂只且賦也陽陽自得其氣充也我者君子之友自謂也房者作樂之處國君有房中之樂則以樂音言也君子陶陶左執翿右招我由敖其樂只且賦也放平聲陶陶自如其情暢也敖者燕舞之位則以樂舞言也君子陽陽二章章四句揚之水經㫖曰舊說平王以申國近楚數被侵伐而申平王之母家也遣畿内之民戍之而戌者怨思故作此詩今觀采芭詩宣王時楚已强盛但命方叔徂征而蠻荆來威迄于平王楚猶未敢為患直至桓王十年蔡侯鄭伯㑹於鄧而始懼楚事在左傳桓公二年則此時楚始為患而申與甫許皆與鄧相隣之國且近於周遣兵往戍理宜有之但不當為平王事耳至謂申為平王母家而戍之則尤臆說矣集傳序申侯與犬戎攻宗周弑幽王之事而責平王忘親釋怨之罪此信舊說之過也辯見春秋私考隱公元年揚之水不流束薪興也彼其之子不與我戍申懐哉懐哉曷月予還歸哉興意其音記後凡言彼其並同揚悠揚水緩流貎喻王綱之弛束薪喻諸侯之羣聚為黨而以之水興之子不流興不與也其語辭申姜姓國本在南陽府宛縣今之南陽縣也至宣王時遷謝在南陽郡棘陽東北百里今汝寧府之信陽州也揚之水不流束楚興也彼其之子不與我戍甫懐哉懐哉曷月予還歸哉興意甫亦姜姓國在今汝寧府新蔡縣界本穆王時吕侯之國不知何時改吕為甫耳甫與申即崧髙生甫及申之國也揚之水不流束蒲興也彼其之子不與我戍許懐哉懐哉曷月予還歸哉興意蒲草也許亦姜姓國在今開封府許州薪楚蒲皆以易致之物言而束則難動矣歐陽氏曰揚之水其力弱不能流於束薪猶東周政衰不能召發諸侯獨使周人逺戌乆而不得代爾彼其之子周人謂他諸侯國人之當戌者也曷月還歸者乆而不得代也揚之水三章章六句中谷有蓷經㫖曰凶年饑饉室家相棄婦人悲嘆而自述此詩也小序以為閔周周誠可閔但婦人作詩之時何暇有閔周之念乎中谷有蓷暵其乾矣興也有女仳離嘅其嘆矣嘅其嘆矣遇人之艱難矣興意乾音干蓷充蔚也葉似萑方莖白華華生節間又名益母草婦人資此以治産難故即以起興暵燥也谷中濕地蓷宜乆生者也暵其乾者謂乾者先旱以興饑饉則貧者先悴也仳别也嘅嘆聲人指夫而言中谷有蓷暵其脩矣興也有女仳離條其歗矣條其歗矣遇人之不淑矣興意脩長也高起之意言蓷之有力而高起者亦旱以興饑饉乆則粗給者亦乏絶矣條聲長貌歗與嘯同解見江有汜不淑以嵗歉言中谷有蓷暵其濕矣興也有女仳離啜其泣矣啜其泣矣何嗟及矣興意暵其濕者謂下濕之地亦旱以興饑饉之甚雖可生者亦不免也啜泣而縮氣也何嗟及謂雖嗟亦無及於事也婦人為夫所棄畧無怨懟之辭但歸於饑饉不能相養而已蓋諒其夫之不得已也其必能安於義命之正者歟范氏處義曰歗甚於嘆泣甚於歗中谷有蓷三章章六句兎爰經㫖曰周道衰㣲政刑紊亂君子語及時事易觸禍機故欲自晦而作此詩也有兎爰爰雉離于羅比也我生之初尚無為我生之後逄此百罹尚寐無吪賦也爰爰緩意兎性狡而自適以比小人得意也鳥網為羅雉性耿介而罹羅以比君子觸禍也我生之初謂初生時猶及盛世也無為謂天下治而無事可為也及世亂多事則憂危百集矣罹遭也謂遭憂也吪動也謂動即觸禍不如寐而不動也有兎爰爰雉離于罦比也我生之初尚無造我生之後逄此百憂尚寐無覺賦也罦爾雅謂之罿今之翻車也可以掩兎無造謂天下無待於造作也有兎爰爰雉離于罿比也我生之初尚無庸我生之後逄此百凶尚寐無聰賦也罿即罦也庸用謂天下無待於用意也黄東發曰寤則憂寐則不知故欲無吪無覺無聰付世亂於不知耳近世釋以為欲死者過也兎爰三章章七句葛藟經㫖曰序謂刺平王棄其九族本無所據集傳謂世衰民㪚有去其宗族而流離失所者得之緜緜葛藟在河之滸興也終逺兄弟謂他人父謂他人父亦莫我顧興意緜緜長而不絶之貌岸上曰滸緜緜葛藟在河之涘興也終逺兄弟謂他人母謂他人母亦莫我有興意水涯曰涘緜緜葛藟在河之漘興也終逺兄弟謂他人昆謂他人昆亦莫我聞興意夷上洒下曰漘昆兄也葛藟必生於山谷丘野之地延蔓於草木條枚之上今生於河滸水涯不得其地猶人去其親族而流離失所人莫親焉如葛藟之不能附本根也故以起興葛藟三章章六句采葛經㫖曰此婦人淫奔之詩也集傳得之矣彼采葛兮一日不見如三月兮賦也彼指男子而言蓋與女所私者采葛以為絺綌也彼采蕭兮一日不見如三秋兮賦也蕭爾雅謂之蕭萩即蒿也莖可作燭有香氣采蕭以備熏爇舊說祭則焫以報氣恐非民間之祭所得為也彼采艾兮一日不見如三嵗兮賦也艾艾蒿乾之可炙采艾以療疾病男子本與女子相滛託以采此三物而來故女子指其人而自言思之深切如此也采葛三章章三句大車經㫖曰此詩必妻為其夫所棄而誓死不嫁其後夫服毳衣乗大車以出而妻望見之故作此詩舊說以為男女淫奔而女畏大夫不敢則其詩當以所思之男為主而曰畏我大夫如將仲子畏我父母之例今以大車起語而終之以死則同穴之言其語意所重全在夫妻乃以屬之淫奔之女不惟文義之失而使貞婦之志不白於後世豈不害教之甚哉大車檻檻毳衣如菼豈不爾思畏子不敢賦也大車者平地任載之牛車與小雅大車同蓋民間之所常用而非貴者之乗車也檻車輢在輿兩旁望之如檻也毳獸細毛以之為布即褐也舊說以毳為毳冕之毳豈有服毳冕之服而乗大車者乎此必農家之富者耳菼詳見碩人字義如菼者色青如菼也爾與子皆指乗車者即其夫也不敢者畏其怒而不敢近也大車啍啍毳衣如璊豈不爾思畏子不奔賦也啍啍厚重聲璊與虋同即生民之糜而爾雅謂之赤苖者也義見說文上章言青此又言赤者蓋色在青赤之間也奔往從也榖則異室死則同穴謂予不信有如皦日賦也榖生穴壙皦白也有如皦日誓辭也婦人見棄誓死終身而無怨言不賢而能之乎大車三章章四句丘中有麻經㫖曰周之賢人隱居田園而於丘中殖麻麥果實以生國人思之而冀其來仕也故作此詩但序以為莊王時詩則鑿矣丘中有麻彼留子嗟彼留子嗟將其來施施賦也留為田園之樂所留也子嗟賢人之字也將者望之之辭施施徐行貌蘇氏曰民思其賢而冀其徐來以從我也丘中有麥彼留子國彼留子國將其來食賦也子國亦賢人之字也毛傳以子國為子嗟父則歐陽氏既辯其無據矣食食禄也蘇氏曰庶㡬肯來從我食也丘中有李彼留之子彼留之子貽我佩玖賦也之子通指前二人也子嗟子國皆在田園則可見賢人之見棄者多矣佩玖所佩之玉也詳見木𤓰字義以喻善道欲其以善道來遺我也遺善道則福及於民矣丘中有麻三章章四句詩說觧頥正釋卷六
